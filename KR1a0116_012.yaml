body:
  text: 欽定四庫全書日講易經解義卷十二震下震上震取一陽生於隂之下有奮迅激發之意焉然當變動之時而能恐懼修省則可致福而逺害故曰亨此卦以初為震主其餘諸爻各就其位以明處震之義耳六二守正於震來故復得也六三去不正於震時故無眚也九四沈溺於二隂故未光也六五中德自守以恐懼為心故能易亂為治以危為安使無喪而有事也人君致治也在一念之兢惕知其危則思保危憂其害則思弭害故雖如上之隂柔而處震極猶能早圖而無咎也觀震卦自上六之外别無凶者以其有危懼之心無逸豫之志也然與其臨震而方懼不如未震而豫防故境之震出於猝至者未可知也心之震惕於平時者可自主也能以心御境境可無患矣震亨震來虩虩笑言啞啞震驚百里不喪匕鬯此卦上下皆震一陽始生於二隂之下有突如其來逃奮激發之義是當震而能動者也故名為震卦辭言人心常存恐懼乃為致福之道也震來當震之來時虩虩恐懼驚顧貌震驚百里以雷言也七所以舉鼎實薦則升於俎上鬯謂以秬黍酒和鬱金以灌地降神不喪七鬯存主有定也以長子言震為長男故有長子之象文王繫震彖辭曰時至於震則變動不寧若不可以得亨矣不知生全出於憂患而安樂得於艱危震蓋自有亨之道焉震亨何如人當震之來時茍能虩虩然恐懼修省而不敢有一毫慢易之心則圖維之周慮事之熟始於憂勤終於安適而一笑一言皆啞啞自如矣雖或卒然之頃變起意外如雷之奮擊百里之內莫不為之震驚然此中之主宰素定身心泰然無改常度不猶長子之主祭者恪守所主之重而不喪七鬯乎震有亨道如此按震有自內出者則為恐懼修省有自外至者則為憂患災害然聖人不恃震之不來而恃我有處震之道故兢業日惕於神明抑畏時凜於夙夜蓋惟懼乃可以不懼惟危乃可以不危詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅言其敬也若不知敬懼而以慢易乘之則事變之來將惶惑而不知所措矣故臨大事而不失者惟始終一敬而已此處震之道也彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也此彖傳是釋震彖辭以明震之所以亨也則法也出謂繼世而主祭也出可以守宗廟社稷上當有不喪七鬯四字孔子釋震彖辭曰震而繫以亨者蓋人事之安危係於一心之敬怠心能震動則自有亨道不待言矣又云震來虩虩者蓋憂患災害自外而來惟心存戒懼不敢少寧則憂患消而安樂至恐雖非福乃所以致福也又云笑言啞啞者蓋遇事而懼則審慮必極其精區畫必極其當一舉一動無不合於法則此所以得相安無事而笑言啞啞也所謂驚震百里者蓋言國家事變卒臨衆志搖動如雷震百里之內逺邇皆為之驚懼也當此時而有長子之責者乃能處之凝定不失所主則持重之德真足以負荷重器可以守宗廟社稷而為天地神人之祭主矣按易以乾為人君之象震為儲二之象蓋能成其為子斯無負其為君震之懼即乾之惕震之動即乾之健人情懼則畏威之念迫而省過之心生動則怠慢之氣祛而明作之功奮乾道之乘時御天長子之主鬯宗廟乾與震無二理也象曰洊雷震君子以恐懼修省此象傳是言君子畏天之學也洊再也孔子釋震象曰雷聲至重洊則加厲震之象也君子體之以為禍患之來皆人事所感召自非反身修德何以格天而弭災於是內存恐懼而作於心者罔敢有怠忽之時外務修省而見於事者罔敢有茍且之行戰戰兢兢實圖率德改行以無負天心之仁愛斯處震之道得矣按人未嘗無恐懼之時而恆不能盡修省之實蓋徒恐懼而不修省則變至而憂慮百出變已而怠緩自如矣君子則憂其變之來而恐懼以圖之於先思其變之弭而修省以救之於後所以能盡畏天之學也昔周宣王遇災而懼側身修行宋景公一言合道熒惑退舍恐懼修省誠人君挽回天心之要道哉初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也此一爻是言人能先事而戒則可以無患也周公繫震初爻曰初為成震之主處震之初是能常存敬畏而虩虩然恐懼修省者如是則思患豫防始於懼而後可以不懼笑言啞啞安樂自如不亦吉乎孔子釋初象曰初九震來虩虩者豈終於恐懼乎蓋心存敬惕之念自獲安適之休可以致福也笑言啞啞者豈出於幸致乎蓋心當恐懼之後宰物之機已熟御事之權已定自有處震之法則也按周公繫震初之辭即文王之彖辭先儒言震為長子有主器之責文王既以全彖當之周公專屬之初九何也初陽在下即乾之潛龍古者天子之元子與公卿大夫元士之子凡民之俊秀同齒讓於學宫為有君父在則禮然此爻辭所以專屬之初九欲令後世知早諭教之道風愆之訓無逸之篇師保日陳於前也其餘諸爻則又各就其位以明處震之義焉六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也此一爻是言二為強暴所迫惟能自守則可以獲安也十萬曰億謂大也九陽數之極九陵言其極高也七日者卦位有六七乃更始事既終時既易也周公繫震二爻曰六二陰柔乘初九之剛以柔弱之資而遇強梁之人是當震之來而危厲也且不但危厲而已因怖懼而大喪其所持之貨貝且逺避而升于高陵之上其不皇自安如此幸柔順中正足以自守所遭雖為不幸而此心不為之亂及時過事平其所喪者不待追求而七日自獲矣孔子釋二象曰震來厲者蓋六二乘初九之剛以柔遇強力不相敵危厲之來勢所必至豈德不足哉按陽剛之人多震動有為陰柔之人多因循不振以柔乘剛往往得困固其宜耳然能居中履正以退為進始雖有不克自全之憂後自有復還故物之喜其喪也乃所以為得也六二之勿逐自得其殆善處震者歟六三震蘇蘇震行無眚象曰震蘇蘇位不當也此一爻是言三之無德致危因示以善反之術也蘇蘇緩散自失之狀周公繫震三爻曰六三以隂居陽不得其正是當危懼之時而猶行險僥幸罔知修省以致災難愈迫不勝其驚懼之心而精神渙散有蘇蘇之象若能以此懼心而震動激厲去其不正以從於正則難處之中尚有善處之術危者可以復安何至於眚乎孔子釋三象曰凡人必有奮發之心斯無怠緩之失三之震蘇蘇者由其處位不當失中正之則是以皇恐失措至於蘇蘇也按三為危地當震懼之來即以剛居之猶慮弗勝隂柔處此宜其操持不固至於自失也然天下禍患之生無不可戡之道惟懼其自暴自棄畏難茍安則終於不振耳何如奮發有為而祛怠惰之習憂勤惕慮而勵修省之圖安在亂者不可反而治亡者不可轉而存乎聖人以震行之道勵之其垂示者至矣九四震遂泥象曰震遂泥未光也此一爻是言四之溺於晏安而不能振拔也遂泥陷溺而不振之象周公繫震四爻曰九四處柔則失剛健之道居四則無中正之德又陷於二隂之間載胥及溺不克自拔則其往也將遂沈溺而不復起矣孔子釋四象曰當震時而能自奮發庶幾不至於滯溺今震而遂泥則終於幽暗而已豈能自耀於光明乎按震為剛德之首初以剛居剛振動有為震之所以亨也四亦為震之主而失剛不正錮於重隂處危難而無退守之德欲震動而無奮勵之行則日就沈淪終於柔暗震道亡矣春秋傳曰晏安鴆毒不可懷也從古天姿髙絶者往往以一端之嗜好不足亂其聰明便辟之小人不足惑其神志而偶狎近之遂為所中而不及覺矣所以具生知之材又必加以克已之學然後性行光而功業彰庶幾剛德常全而動無不亨也乎六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也此一爻是言五處危懼之時而德尚足以有為也億大也周公繫震五爻曰六五以隂柔而當震之時是懦弱之人履國家之變才既不足以振拔而勢又處夫艱虞宜其往來皆厲無時而不危也然其所處得中才雖不足以濟時而德猶足以自守故能易危而安君德尚可復修治道尚可復振大無所喪而又能有事也孔子釋五象曰六五震往來厲者言以柔弱之才而當此多難之秋其所行皆危厲也所行危厲而猶能以有事者以其實有中德於凡事之來皆恐懼修省以處之知其危則思保其危憂其害則圖弭其害惟事事乃其有備不但止於無喪而已按當震時非有才固不足以成功非有德亦不能以自守六五居位得中雖不足於才而尚優於德故能兢兢業業雖處厲而無喪蓋往來皆厲則更患多而慮事久此多難所以興邦也其事在中則修省密而偏倚消此守正所以制變也惟其始於懼是以終於無懼人君之一心豈非治亂所從出也歟上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也此一爻是言六才弱不足以當禍患而教其防之於早也索索謂志氣消阻矍矍謂瞻顧倣徨征往也周公繫震上爻曰上六純乎隂柔既無自守之操處乎震極又當事變之衝是無才而遇大變者也故當震動之來而志氣索索然以消阻瞻視矍矍然而倣徨以是而往則中先自亂而無以御事之變其凶必矣所以然者由處震極不能圖之於早也茍能思患預防於震未及躬而于其鄰之時恐懼修省則患可弭變可消自不至於索索矍矍之凶而可以無咎然以隂柔處震極雖能警戒預備亦不免於意外之虞即如婚媾乃相親愛者且不免於有言况可晏然而不戒乎孔子釋上象曰震索索之見於外者實原於心之危懼而不自安也若中有主則豈至於是哉雖凶而得無咎者蓋天下之事防於未然者易為力制於已然者難為功今震方在鄰乃鄰所戒也及此時而畏之則有備無患又何咎矣按震卦自上六之外别無凶者以有恐懼之心而無逸豫之志然與其臨震而方懼又不如未震而豫防晉士燮言惟聖人能內外無患自非聖人外寧必有內憂漢史稱魏相在宣帝時敕椽史按事郡國輒白盜賊風雨災變相輒奏言之欲其君知憂懼常如禍患之至可見聖明之主無時不凛淵冰之危忠愛之臣無日不陳綢繆之戒也全卦言處震之道莫切於此矣艮下艮上艮取得止之義物皆有止而以止於理者為大焉聖人欲人動靜皆止於理而不奪於內外物欲之私以免於咎故卦辭豫之以無咎六爻各不相應皆以人身取象以明止善不遷之意初六以隂居下自無妄動越分之失然其才柔質弱有不克終之慮非如四之外無所感內無所動時止而止者故四之占但曰無咎而初必利於永貞也若二之正已有餘而正人不足三之強制於外而反動其心則又非止道之正矣至於六五曰艮其輔言有序悔亡者五為君位有訓導天下之任本中正之德而出言有章皆止機也然止之心力持之不永則止之功德亦積之不厚上九能艮於終則通上下為一身合行止為一道有至剛之德而不渝於久有至健之才而無倦於終艮之極盛也大抵止之義貴合乎時初四時止而止則得之二三時行而止則失之夫曰止其所者時即所之屢遷所即時之貞一有得於時即有得於所無二義也善止者隨境取之而已艮其背不獲其身行其庭不見其人無咎此卦上下皆艮一陽止於二隂之上陽自下升極上而止有止於是而不進之義故名為艮卦辭言君子動靜皆得其所止也艮止也背所當止之處文王繫艮彖辭曰天下之理合體用兼動靜莫不有當止之所猶人之一身惟背為止也人惟不知所止往往內蔽於已私外奪於物欲斯不免於咎耳誠能惟理是主而止於其當止焉有若艮其背矣由是其靜也止於所當靜之理湛然一太虛之體而已縱耳目口鼻之欲為吾身不能無者終不得而纍之也非不獲其身乎何也知有理而不知有身即謂之忘身可也其動也止於所當動之理廓然一太虛之用而已縱聲色臭味之感為人所易動者終不得而移之也非行其庭不見其人乎何也知有理而不知有人即謂之忘人可也動靜皆定內外兩忘無時無事不合於理有以盡已性而立人極矣復何咎哉按艮卦取象於山卦辭又取象於背天地之間雷風水火澤皆動惟山不動人身四體五官皆動惟背不動皆以明止之義也然所謂止者即止至善之義靜有至善動亦有至善體用原不相離孔子稱大舜無為而治恭已正南面固無為也舉十六相屏四凶大賞大刑而我心不動天下不驚亦無為也此正程氏所云靜亦定動亦定者聖學聖治至於艮而無以加矣彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也此彖傳是釋艮彖辭贊其能止之妙而推其得止之驗也艮體篤實故有光明之義上下謂內外卦之六爻敵應謂陽與陽敵隂與隂敵不相應也孔子釋艮彖辭曰卦名為艮者蓋艮則止於理而不遷於義為止也止之義何如人之行止各有其時而當止之理又隨時而在故事物未交時乎當止則藏此理於無形止其所當止也事物既接時乎當行則順此理以推運行其所當行也夫止與行各止其所而不容易故時行則行是動而止於理動不失其時矣時止則止是靜而止於理靜不失其時矣動靜皆止一因乎時而不以已與焉尚安有意必固我之蔽其道不亦光明乎辭曰艮其背何哉凡人一身惟背為止艮其止者言止其當止之所也以卦體言之凡爻隂與陽應陽與隂應今卦之上下隂則皆隂陽則皆陽隂陽各以敵應不相為偶各止其所而不相與也夫惟各止其所是以內焉止於吾身之所知有理而不知其身外焉止於應物之所知有理而不知有人能盡乎止之道而無咎也按艮象獨稱光明者惟定乃明也而定必由於知止不知止則胸次煩擾而日見其昏昧如鑒之為塵所汚而不能照物也能知止則中有定向而日進於清明如水之不為風蕩而萬象皆涵也異端曲説非不曰宇泰定而天光發又曰戒生定定生慧然其所云定與戒者乃清淨寂滅而不知格物窮理靜而無以立體動而無以致用豈吾儒內外一貫之學也歟象曰兼山艮君子以思不出其位此象傳是言君子能止其當止而心與理安也兼山重山也孔子釋艮象曰上下皆艮兩山並峙各止其所艮之象也君子體之以道在天下凡內而身心外而事物莫不各有當止之所乃為位也君子即其所居之位而思之如君臣父子則各盡其道富貴貧賤則各行其素他如在上則不侵下職在下則不奪上權在左則不得涉右在右則不得干左自不至出乎其外而有所思也如是則有得於各止其所之義矣按生人所歷萬有不齊而莫不有一定之位稍出其位即失其所當止然位雖一定而此中經綸變化與時推移其道無窮又不可以不思大學言止仁止敬止慈止孝止信視之似乎庸常而欲窮其理充其量則終身黽勉未能無歉於位之內安敢求多乎位之外哉故曰學然後知不足如此雖欲思出其位而有所不能矣初六艮其趾無咎利永貞象曰艮其趾未失正也此一爻是言初能止於始而又勉以善終之道也周公繫艮初爻曰初六隂柔則無妄動之失居下則無越分之思是身一於理而嗜欲不以汨其心心安於遇而外物不以移其性蓋當止之地而能艮其趾者可以無咎矣然初隂才弱恬靜有餘而持守或不足又必即貞一之功而要之為終身之守一事一物此止推之萬事萬物亦此止庶幾久暫無間乃永貞而不變也何利如之孔子釋初象曰初六艮其趾者蓋至正之理本人所當止惟不知所止而失正者多矣初有知止之明而擇此正於始有欽止之功而守此正於終是能不失其正也按艮趾為止於初之象千里之行始於足下當其發軔之日止得其正由此事成功立可以堅久不廢矣然人之常情有初鮮終始雖克慎厥止或半塗而偶喪焉故艮止非難永貞為難周公於初曰永貞於上曰敦艮合初終以觀止乃見止道之光明也夫六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也此一爻是言二能守已而尚歉於有相之道也腓足肚周公繫艮二爻曰六二當腓之處乃人身之易動者也而居中得正能自止其腓而不動如此則恬靜自守在我固止其所而無失矣然君子之學既貴於正已又貴於正人三為二之所隨上下之分久已相屬乃過剛不中以止乎上至於列夤熏心則匡救之責誠二之不可諉者顧以隂柔之資但能隨之不能拯之於心豈能自安乎是以其心不快也孔子釋二象曰不拯其隨固二柔弱而力不足之故然亦豈盡其罪哉由三止於上不肻退聽乎二則下雖欲諌不能使上之必從其諌若之何其拯之也按程傳言士之處髙位則有拯而無隨在下位則有當拯有當隨有拯之不得而後隨夫下之事上位無大小皆有持顛扶危之任有言不聽勉而隨之乃詭隨矣其可乎然拯雖在二從則在三三不能虛已以受善二亦無如之何是二過三亦過此又在上者之不可不知也九三艮其限列其夤厲熏心象曰艮其限危熏心也此一爻是言不當止而止欲強制其心而反動其心也限身上下之際即腰胯也夤膂脊骨列分裂也周公繫艮三爻曰道在天下時行時止不可膠固而不通如限在人可屈可伸當上下之衝而不可一於止者九三過剛不中據其一偏之見執於止而不知變是艮其限者也如是則事勢乖離物情睽隔若分裂其夤然夫却動求靜心豈能靜外既不合於人情內必不慊於心志其為危厲熏灼於心不安之甚矣孔子釋三象曰止道貴乎得宜原不可以固執九三艮其限而不知變通自謂可以制心而豈知適以裂夤其危厲之勢必至熏心也按寂然不動者心之體固不可以徇物感而遂通者心之用又不可以絶物所以心日應事而常泰然未嘗以強制為止也九三以一竒橫於卦中有艮限之象以一陽間乎四隂有列夤之象限分上下夤列左右各止其所無相資相待之意故此心危厲而不安也由此推之天下猶一身然君臣共治元首股肱謂之一體茍間隔不通則堂陛朝野之間判然為二君澤何由下濟民隱何由上聞欲以興起至治難矣其患可勝道哉六四艮其身無咎象曰艮其身止諸躬也此一爻是言四得其所止而無私欲之纍也周公繫艮四爻曰六四以隂居隂時止而止凡一身之中思不亂營官不亂役視聽言動與夫欲惡得喪俱無所感於外亦無所動於中一於止而止者也為艮其身之象如是則心與理俱靜不失時而此身皆止道光明之身矣何咎之有孔子釋四象曰六四艮其身者豈必絶天下之物而後為得所止哉蓋衆動萃於厥躬而妄動亦起於厥躬惟是從躬之方動而有我之私即止之而不行奚有躁妄之失乎按艮六爻皆於人身取象而獨以身屬之四者以四入上體可合下體為全身趾與腓與限主行輔主言言行有不得其止者莫不歸咎於身艮其身則一身之行止動靜各止於至善而不遷矣卦以不獲其身為無咎而爻以艮其身為無咎蓋身失其所止則此身為味色聲臭之身身得其所止則此身為踐形盡性之身豈有二義哉六五艮其輔言有序悔亡象曰艮其輔以中正也此一爻是美五之能謹言而推本於心之純也輔謂輔頰言所從出周公繫艮五爻曰六五當輔之處正言之所由出者而以隂居陽若不免有失言之悔今止之於輔則有所制而發不茍理之不當言者固止而不言也即當言而言亦得其先後之次時之不可言者固止而不言也即可言而言亦協其緩急之宜有序如此又安有出口之悔哉孔子釋五象曰六五之艮其輔者由其以柔居中而有中德是心安乎理而不偏故言當乎理而不紊則言之大固本於心之一耳按言者人之心聲心之精微不能達者皆於言傳之五為君位有訓導天下之任布之為謨誥宣之為令甲其係尤重髙宗三年不言一言而四海咸仰威王三年不言一言而齊國震驚庶幾此爻之艮其輔而言有序者所謂王言惟作令莫不尊而信之也乎上九敦艮吉象曰敦艮之吉以厚終也此一爻是言大人止於至善而不遷之學也周公繫艮上爻曰上九以陽剛居艮之極則有誠實不妄之德堅確固守之操但見心無一念不協於理理無一息不安於心敦此止於靜專而理之涵於退藏者安固而不搖敦此止於動直而理之達於時措者堅貞而不易為敦艮之象信乎大人止善之學而吉也孔子釋上象曰敦艮而得吉者蓋昧於所止不足以言艮廢於半塗不足以言敦上九心純而守固於理之止於初者愈久而不變蓋不徒止於始而又能厚其終此其所以吉也按自初至五為趾為腓為限為身為輔莫不有當止之道聖人既各就其位而示其義矣然止之心力持之也不永則止之功德積之也不厚上九能敦艮於終則通上下為一身合行止為一道有至剛之德而不淪於久有至健之才而無倦於終書之欽厥止大學之止至善皆在是矣其斯為艮之極盛也夫艮下巽上卦以漸進為義以進得其正為善物知止則進得其正循序有節所以止也從容積纍所以進也彖取象女歸爻取象鴻女歸待聘鴻飛識時漸之義也卦本乾坤三四往來隂進而止乎四九居五而得中下應六二二四皆隂三五皆陽自二至五皆得正位而初上二爻九以陽居上六以隂居下剛上柔下亦當其位六爻中唯九三過剛無應所以有凶而尚有禦冦之利以知君子立身處世凡事當以漸進學問以漸進必無躐等輕浮之患出處以漸進必無躁進失身之患然非有巽順從容之德不能漸非有艮止為之主不能善巽柔之用故同一巽也中孚以巽乘兑上九翰音登於天則凶以其知上不知下巽而説也漸以巽乘艮上九鴻漸于逵則吉以其自卑而髙巽而能止也漸女歸吉利貞此卦艮下巽上其未進也自止而不茍於進其方進也巽順而不急於進有漸進之義故名為漸卦辭言君子之進當以漸而得其正也女適人為歸故曰女歸文王繫漸彖辭曰天下進之有漸莫如女歸六禮不備不敢行也君子之守已猶女子之守身其出身從人如女子之于歸禮備而後行則出處之分明而可以得吉矣然天下固有漸而未必正者今卦體自二至五位皆得正故其進也又必以正自持無枉道以徇人無曲學以阿世乃為利而靡失身之悔也按君子欲以道重天下必先以道重一身使稍有茍且必至屈已以干時躐等而犯義大節一失雖有過人之才智而一遇存亡危急之秋其人必不可恃矣語曰不貞之女必孕而不育不貞之士必賤而見棄明君得此意以進退天下之士則人人皆以禮義廉恥自防而患得患失之鄙夫豈敢復立於其朝哉彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也此彖傳是釋漸彖辭以明漸與正之交重也之進當作漸進孔子釋漸彖辭曰卦名漸者蓋漸有漸進之義也天下之漸進莫如女子之于歸君子漸進亦如女歸然後可以得吉也辭言利貞者何哉以卦變言之自渙而來下卦之九本居二而今進居三是以陽居陽而得其位矣自旅而來上卦之九本居四而今進居五是亦以陽居陽而得其位矣夫臣得其位而無失其為臣君得其位而無失其為君則君臣道合庶績咸熙而可以有功也所以然者以九得三位是臣進以正九得五位是君進以正君臣皆得其正則正朝廷以正百官正百官以正萬民自上及下自近達逺不可以正邦乎夫進以正而可以成正邦之功則進其可以不正耶所以貴於貞也然利貞之義不獨卦變有之也卦體亦有之以二五言則二體皆得其位之正止以五言則九五又得其位之中本諸身措諸政者一皆剛而不過威而不猛寧有過不及之差乎夫即其建中之善而表正之功自無不在矣是亦利貞之義也夫抑漸進之義不特女歸有之也卦德亦有之方其在下則自止而不妄動及其上進又巽順而不迫切以是而動則有以取重於天下而進無所阻寧有窮乎夫即其不窮之動而止巽之德往無不利矣謂非漸進之義也夫按國家登進人才本以正邦而善俗君子在位乃有尊主庇民之效未有不貞之士而可以圖功者也然君者又為臣之表人君好尚一失其當守正持重者或見為迂疏而不喜傾險躁妄者反以為有才而驟用幸進之端一開士皆思爭先捷得躐踞髙位有棄禮讓捐廉恥而不顧者矣誰肯自安於恬退哉此傳既言二五之得位而又獨重五之得中也故曰為政在人取人以身象曰山上有木漸君子以居賢德善俗此象傳是言君子修已治人皆以漸而致也孔子釋漸象曰山上有木以漸而長漸之象也君子體之以德固不可不畜而至德淵深未可以一蹴到也必優遊厭飫深造不已以使之自達而無躐等妄進之弊則德以漸而畜矣俗固不可以不善而習俗染汚未可以旦夕化也必薰陶漸染教思無窮以使之自化而無見小欲速之意則俗以漸而善矣按居德為修已之事善俗為治人之事德以漸而至此所謂始於為士終於為聖也俗以漸而成此所謂日遷善而不知所以化之也漸之義大矣哉初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也此一爻是言始進之士無汲引之人也鴻水鳥往來有時先後有序故六爻皆以取象干水涯也艮為少男而居初故曰小子以喻士之新進者周公繫漸初爻曰初六始進於下既未得其所安而上復無應則又失其所藉為鴻漸于干之象蓋鴻之行有序而進有漸水涯之地則非其所安也夫初以一介小臣漸進之初動多􅑾杌且蒙譏被謗而有言語之傷似難免於咎者然此乃遭時之窮於吾無所虧損雖不免於危厲而可以無咎也孔子釋初象曰小子之厲似乎有咎矣然此乃時命之不偶上復無應而然非已有以致之也故於義為無咎耳按爭名者於朝爭利者於市相傾相軋無所不有此昔人以仕宦為危途也而在始進則尤難賈誼見嫉於絳灌京房被讒於牢石士方離蔬釋蹻而遽欲與人家國之事雖有效忠之心安能免多口之懼哉士君子處此固宜量而後入勿越次以求進勿率意以妄言而聖君在上亦必念新進小臣易招尤謗常曲意以矜全之則孤立之士弗至蒙咎於盛世矣六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也此一爻是言二之德足以安其位而享其祿也磐大石也衎衎和樂之意周公繫漸二爻曰六二柔順中正進以其漸是抱德以待時而無躁進之失者上有九五之應則遭逢聖主而得以展布其謀猷矣故德稱其位而處之不危功以酬祿而享之不愧如鴻漸于磐石之安而飲食衎衎和樂而自適也如是則得君行道而正邦善俗勳業無以加焉其吉為何如乎孔子釋二象曰六二之飲食衎衎非得之不以道也惟其有德而得君則受祿於上皆其分之應得而不為徒飽矣不然能免竊祿之誚乎按人臣事君曷取乎漸進蓋涼德而居髙則有具瞻之愧無功而享厚則有尸祿之譏若漸之六二居天位享天祿而安之以為固然者以其能措國家于磐石之安納人民於燕衎之樂也詩美羔羊之大夫曰退食委蛇嘉伐檀之君子曰不素餐兮其六二之謂歟茍或反是位則竊位也食則伴食也未有竊位而能致君澤民者也未有伴食而不妨賢黷貨者也人可不審所自處乎九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也此一爻是言三之無德無應而不得遂其進也陸高平之地周公繫漸三爻曰九三過剛不中是鮮漸進之德而上無正應又少與進之人如鴻乃水鳥在陸則不得所安為鴻漸于陸之象故擬之於夫則為征而不復矣何也征行之事惟集衆可以成功而剛愎自用孰肻協力以從事其不復宜也擬之於婦則為孕而不育矣何也生育之功必隂陽之相濟而過用其剛隂不足以輔乎陽其不育宜也是皆凶之道也過剛之道無適而可庶幾用以禦冦則剛勇之氣或可成克敵之功耳其不當用於漸進可知矣孔子釋三象曰夫征不復者以其剛愎自用違衆獨立與羣類乖離也婦孕不育者以其過剛不和如有陽而無隂失其生育之道也利用禦冦者蓋禦冦以剛則能倡勇敢之氣使衆人同心協力以相保衛也按隂陽之理當相應之位者為正不當相應之位者為邪九三以剛而比六四之柔於夫婦之義為邪矣蓋以卦體言巽女有歸艮男之象女歸之所以吉也以爻象言四女無歸三男之理相比之所以凶也推之君臣朋友之間莫不皆然正不正之所關夫豈細故哉六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也此一爻是言四之危而能安示以寡過之道也鴻趾連不能握枝故不木棲桷平柯也周公繫漸四爻曰六四以隂柔之資乘九三之剛是人進居高位不幸在剛暴小人之上未免見逼而不得所安為鴻漸于木之象然巽體柔順為能有以善處之則彼雖剛暴亦不得以加於我猶鴻漸于木而不得安或得木中之平柯而因以得所棲止也如是則始雖危而終不危亦可以無咎矣孔子釋四象曰六四或得其桷者以四性順而體巽順則謙沖而無忤於人巽則沈潛而克周於慮遇難處之人而有善處之道此其所以漸進而得安也按天下之事以剛愎自用處之鮮有不僨者况對強暴之人居危懼之地乎惟貴而能下智而能愚從容以釋其疑退遜以消其忌則不徒自全其一身而且克濟夫大事非有識者豈能見及此哉九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也此一爻是言五與二為正應始雖睽而終必合也陵高阜也婦謂二周公繫漸五爻曰九五居尊以臨天下鴻之漸于陵者也然君待臣以𢎞化猶夫待婦以生育六二為五之正應乃三四小人從中間之不得相合以成治功如婦之三歲不孕者然但邪不能勝正一時雖若阻隔久之自然會遇彼三與四豈能奪其正乎故終莫之勝而吉也孔子釋五象曰上下交而德業成五之素願也特為三四所間未得即遂耳今終莫之勝而吉則君臣遇合而治化可成夙昔之志於是乎酬矣按三五二爻皆言婦三以四為婦非正也婦雖孕而不敢育故凶五以二為婦正也婦雖不孕而終莫勝故吉可見天下吉凶之理不越正不正兩途而君臣遇合尤不可以或茍二當羣情躁進之時卓然自守是寧從正道之難而不肻趨捷徑之易者正邦善俗非斯人奚賴五之得二其吉宜矣上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也此一爻是言有德而高蹈者其風世之功甚大也陸當作逵謂雲路也周公繫漸上爻曰上九居漸之極所處至髙出乎人位之外是真超然物表而為賢達之極致也有鴻漸于雲逵之象雖天下之人未得蒙其實德之惠然清風亮節足以激頑起懦而立斯世之坊表如鴻之羽可用為儀身雖不用而其道未嘗無用吉何如哉孔子釋上象曰其羽可用為儀吉者蓋天下之人有志於富貴則富貴亂之有志於功名則功名亂之上之志卓然獨立有非富貴功名所能亂者宜其節著於一時而風垂於後世也按時至末季士知進而不知退羡於寵利貪於勢位習以成俗在上者非表章一二髙世絶俗皭然不淄之士不能起其冥頑而消其奔競古之帝王如唐堯讓位於許由成湯問道於務光髙帝降心於四皓光武屈體於嚴陵豈徒崇尚匹夫之節已哉實見頽俗非斯人莫挽名教非斯人莫興一人之制行而天下之治亂因之漸逵之功不在漸磐之下也人知有用之用而不知無用之用更大漸爻以是終焉有以也夫兌下震上兌女在內震男在外男動女説以女説男不得其正六爻二四隂位而居陽三五陽位而居隂自二至五位皆不正初與上雖當隂陽之位而陽下隂上亦為失位且三本柔而乘二之剛四本剛而為五所乘剛柔易位內外倒置故彖辭為征凶無攸利然歸妹雖為凶占而歸亦有辨所歸果賢女歸即是男女大義若非中非正之女其害乃不可勝言初九有陽剛之德是處卑位而能盡其常職故彖云征凶而爻云征吉二五得中為歸之正三不得位而乘剛上為女歸之終而無應故皆不吉四雖震主而不得位故有愆彖辭之皆為凶占者乃防禁之辭究言其一失所歸其害必至於此也按咸與歸妹皆男女之説止而説則為咸動以説則為歸妹情同而動止異是以咸則取女吉而歸妹則征凶也歸妹征凶無攸利此卦兌下震上以兌少女而從震長男男動而女説又以説而動皆有男説女女從男之義故名歸妹卦辭言男女之合不以正也婦人謂嫁曰歸妹少女也文王繫歸妹彖辭曰男女之交人道所不能無必求諸禮而允協然後可以無敝此卦以説而動既非吉利之道矣况自二至五位皆不正則是男不能肅倡導之綱女不能遵柔順之範正家之節此其失矣征其免於凶乎三五兩爻皆以柔乘剛則是陽不能制乎隂而隂乃敢陵乎陽尊卑之序此其紊矣又安往而利乎按王者正天下之道必托始於閨門閨門之事有取女必有歸妹取女固欲其吉則歸妹豈聽其凶而此卦既言征凶又言無攸利者正欲使人知其凶則思所以去凶而從吉知其不利則思所以逺害而全利恐懼修省以嚴制其説動之情而漸漬於禮義之化庶幾他日無女謁之禍聖人繫辭之意切矣彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也此彖傳是釋歸妹彖辭以明歸妹之義也孔子釋歸妹彖辭曰歸妹之義豈細故哉蓋男女配合古今不易之經天地之大義也何以見之天地不相交感則萬物不興男女不相交感則人道滅息是歸妹雖為女道之終而生育實為人道之始歸妹所係之重如此謂非天地之大義乎然此卦之名歸妹者非以男室女家之常理而言也蓋以順為正者固妾婦從夫之道而有待後行者又女子于歸之常卦惟以説而動則牽於情欲之私而不由於理義之合男女皆為不正而女尤為可醜此所以為歸妹也辭曰征凶者蓋人之相與正則吉不正則凶卦體自二至五位皆不當則男不能以正率乎女女不能以正從乎男而廉恥之間將至廢棄而不顧此所以凶也又曰無攸利者蓋人之相與得其分則利失其分則不利卦體三五兩爻皆以柔乘剛則男不能制乎女女反得制乎男而尊卑之分必致陵夷而莫救此所以無攸利也凡此皆失終始之道矣夫豈天地之大義哉按隂陽交感之常男女配合之理聖賢與凡庶豈有二致所重者發乎情止乎禮義耳有禮義以制其情則男正位乎外女正位乎內閨門肅而治化成無禮義以制其情則男牽欲而失其剛女恃寵而忘其順德業傷而身名壞一念之分而是非成敗係焉其可不為之深警哉象曰澤上有雷歸妹君子以永終知敝此象傳是言君子始合之當以正而後能永其終也孔子釋歸妹象曰澤上有雷雷動則澤隨如女子之隨男而動歸妹之象也君子體此謹於夫婦之道必正其始而後可以善其終茍始合不以正知其終必有乖離之敝是以重以為戒而必謹始以善後也按天下之事莫不貴其有終以為可久之道然事之有終者不於其終之日而見也必有其所由始惟始之得正而不以不正繼之則正其始而後無鮮終之憂矣故曰男女之合不以正以色幸者色衰而愛必弛君臣之合不以正以寵進者寵盡而恩必竭慎厥終惟其始豈不然哉初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也此一爻是言女子有賢正之德雖不得位而亦可以著承助之功也娣從嫡以適人者所謂媵也周公繫歸妹初爻曰女子從人惟居上有應者乃為正嫡初九居下而無正應則其歸於人也不過為娣之賤而已故徒有陽剛之德亦止淑慎其身以承助其嫡而不能大有所為猶跛能履而不足以行逺也然雖止於承助其嫡而於分之所當然則已盡矣故征而吉焉孔子釋初象曰女德以恆為貴初在歸妹之時固為娣矣然九為陽剛則是女子之有恆德者也其跛能履吉者正惟有是恆久之德則雖不得主其功而亦可以著承助之效此其所以吉也按生人所稟陽為淑而隂為慝故男子得隂必為柔媚之夫女子得陽亦稱賢明之婦此陽之所以為可尊也聖人於隂陽之分必為之著其貴賤美惡者豈偶然哉九二眇能視利幽人之貞象曰利幽人之貞未變常也此一爻是言賢女不得所配但當固守其正也周公繫歸妹二爻曰初九女賢而非正嫡僅能承助其上而已九二陽剛得中是女賢而為正室者也乃所應之五反隂柔不正則刑家無主而內助之功不能以大成矣如眇而視不及逺也然豈可以所應非良而遂易其賢正哉亦如幽人不偶於時而抱道以守其貞可也蓋幽人不以時之不偶而變其道女子不以夫之不良而改其節一也孔子釋二象曰抱道守正而不改其常此乃幽人之事今二亦固守其賢正之德而不改其常與幽人之貞同也若或少改其常則亦何所取哉按聖主賢臣相得而彰哲夫淑女相資乃益此皆古今盛事所以讀二典之書而愾慕乎都俞之風頌周南之什而企羡乎好逑之樂也然遇有不齊而節無可變從一而終者女子之常故緑衣之詩曰我思古人俾無訧兮席珍而處者士人之常故考槃之詩曰獨寐寤宿永矢弗告亦盡其在我者而已六三歸妹以須反歸以娣象曰歸妹以須未當也此一爻是言女之不正而為人所賤也須待也周公繫歸妹三爻曰女子之德莫善於正莫不善於不正六三隂柔不中正既非婦順之善為説之主又動情欲之私是女德不貞人莫之取故未得所適而姑待之待之不得而反歸為娣也然則為女子者豈可不出於正乎孔子釋三象曰歸妹以須者以三隂柔而處位不當急於待人而字失女子之正道故人亦莫之取也蓋貴賤之權操乎人而可貴可賤之理則實操於已是以天爵在我則豫奪不能以外加人爵在人斯榮辱不能以自主六三本非賤者而急於從人則先自賤矣自賤而人不賤之者未之有也彼欲速而好進甘於卑下而卒為人所鄙者亦何異於反歸為娣者歟九四歸妹愆期遲歸有時象曰愆期之志有待而行也此一爻是言女之賢者不輕於從人而終得所配也愆期謂過期周公繫歸妹四爻曰九四陽剛有賢正之德居上體有貴重之義而無正應未獲佳配故不輕於從人而寧愆其婚姻之期也然其所以如是者蓋在遲歸以待所歸之時庶幾可得良偶不負夙昔之志而已孔子釋四象曰九四所以愆期者豈終於不行乎蓋天下無無偶之物時至有必行之理窺其隱志蓋欲有待而後行也有待而行決不至有輕身之悔矣按女子守貞而後字士人抱道以待時其理一也夫人幼而學之壯而欲行之得君行道豈不切於中懷而兢兢出處之際者正恐枉尺未必能直尋修之數十年而壞之一旦也故曰君擇臣臣亦擇君惟其不輕於致身方能盡忠於所事古之人當拜爵之始而預卜其畢生建豎大過人者殆以此已六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也此一爻是美女德之盛而能宜家也君女君也周公繫歸妹五爻曰六五柔中居尊下應九二是尚德而不貴飾者為帝女下嫁而服不盛之象夫女子貴飾人情所同乃其君服飾之盛反不如其娣之盛者是但知謙降以從禮而不事乎容飾也夫以至尊貴之女尚禮而不事乎容飾則女德之盛無美不備如月之幾望而蔑以加矣宜家正位何吉如之孔子釋五象曰富貴崇高之家莫不為驕奢美麗之飾而六五帝乙歸妹反不如其娣之袂良何也蓋內既重則視外必輕五居上卦之中是其中德自有可貴者以其可貴之德而行則不文之文足以賁其躬矣又何貴於飾乎按女之所貴者在德而不在飾惟所貴在德則情欲之感無介乎容儀宴私之意不形於動靜詩美南國之夫人曰被之僮僮王姬之下嫁曰曷不肅雍皆所以言其德之盛也推而言之人君屈已下賢以誠不以文者其意實同於此蓋九二具剛中之德本有素絲之風六五有柔中之德克盡緇衣之好誠意交孚賢者未有不樂為之用者矣上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也此一爻是言婚道之未成者大倫所由廢也筐竹器承筐謂約婚之禮刲羊謂約娶之禮周公繫歸妹上爻曰上六以隂柔居歸妹之終而無應隂柔則非賢正之女無應則過桃夭之時而莫有以之為家者矣夫婚姻之禮女子之嫁篚筐以廟見男子之娶刲羊以告廟今女之承筐是將而無幣帛為之實士之宴其新婚而刲羊未見其血焉是則女不成嫁士不成娶違室家之願而廢天地之大義矣何所利乎孔子釋上象曰上六承筐而無實則所承者虛筐而已虛筐足以成女之嫁乎此所以為約婚而不終者也其無攸利宜矣按先儒言曰士曰女未成為夫婦也先女而後士罪在女也其實出身從人責專在已隂險輕躁之夫但知進而不知退一旦為人所棄其不蒙玷而召辱者幾希矣然使終於見棄不過其人之恥倘或誤售於世譬諸鮮節之女忽操家政必至踰間蕩檢不貽中冓之羞必啓司晨之禍其害可勝道哉上六占辭無攸利與彖同是歸妹之不利上六獨當之矣離下震上卦以明動相資為義離明主之而震動將之致豐之本即保豐之道初九明之初九四動之初同為陽剛相須以成其用故曰配與他處之以應為配者不同他卦應爻皆貴隂陽相配獨豐九三以至明之體應上六之至暗剛為柔掩故有見沫折肱之象也六五體本柔暗六二應之九四比之而皆有豐蔀見斗之象至六五本爻而曰來章有慶譽吉者蓋六五為豐之主居震之中六二文明中正乃大賢在下者為之正應五能屈已下賢而來致之即有明動相資之益非豐蔀見斗之説矣按卦為豐亨之象而爻多警戒之辭深慮豐之不可長保必在明以善動動合至明撤蔀屋之蔽取來章之益則盈虛消息皆自我操而常如日中之照天下矣蘇軾曰豐者至足之辭也足則餘餘則溢聖人處之以不足而安所求餘故聖人無豐豐非聖人之事也豐亨王假之勿憂宜日中此卦離下震上以明而動明足以照動足以亨皆致豐之道故名為豐卦辭言人君當天運之隆宜持盈而修人事也假至也文王繫豐彖辭曰豐當時勢盛大之會居天位而富四海天下一統治化四訖豐固亨之時矣夫豐亨之時人民之繁庶事物之殷盛雖為可喜而盛極即為衰之所伏此固可憂者也然王者至此徒憂亦何益乎但能持盈戒滿守常而不至過盛如日之中天而不昃焉則明之所及無所不照可以永保其豐矣按豐者盛滿之象似無可憂而曰有憂道焉憂其極盛而難保耳蓋造化無滿而不損之理惟人君時時以此為懼而不敢存侈肆之心然後大業可以常守而勿墜朱熹謂如捧盤水戰兢自持方無傾側滿溢之患所謂能憂者決不至於有憂矣彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎此彖傳是釋豐彖辭以明保豐之道也孔子釋豐彖辭曰卦名豐者是車書歸於一統禮明樂備物阜民安治功盛大之謂也然何以致此哉卦德離明震動明則察物而無遺動則振作而成務二者相合故事無不立而功無不成此其所以為豐也辭云王假之者蓋王者當豐大之時事有可為而力足自擅則其志欲日廣制度規為自然尚大而有不安於狹小之勢是以有憂道也又云勿憂宜日中者言王者守國常如極盛之時則志氣清明百務修舉而有以遍照乎天下也蓋日惟中方能照萬物君守中乃能照天下一或過盛而不能常中則遺於所照之外者多矣豈人主之所宜乎如是者何也蓋嘗推盛衰之理而確知中之不可過矣日以中為盛日之既中未有不昃者也月以盈為盛月之既盈未有不食者也豈惟日月雖天地之大其盈虛亦隨乎時時乎息也則氣機變化萬物顯諸仁而天地盈矣時乎消也則氣機妝斂萬物藏諸用而天地虛矣時之所在天地尚不能違而况人事者不出於天地之外也治亂相尋其能以常盈乎鬼神者不過為天地之用也屈伸相感其又能以常盈乎盛衰之理無在不然此王者保豐之治宜守中而不可過也歟大抵豐亨豫大之時君臣上下不期侈而自侈豈獨常人為然賢智之辟乃有更甚者非不明也而過乎明則鋪張揚厲之念生矣非不動也而過乎動則好大喜功之舉多矣驕心一生何所不至故聖人急急惕之以憂若曰世之所謂安者乃危之伏也世之所謂治者乃亂之機也蓋先奪其所恃而後可告以持盈保泰之實事也語云以一人治天下不以天下奉一人天佑下民作之君正欲其勞而豈貽之以逸也哉象曰雷電皆至豐君子以折獄致刑此象傳是言君子法天之威明以治獄也折謂剖斷其曲直致謂推致其重輕孔子釋豐象曰雷電皆至威照並行盛大之勢豐之象也君子以為獄者天下之大命而刑者一成而不變者也故於獄之未決則取電之明以折其獄剖斷其曲直而必得其情實惟明克允也獄之既成則取雷之威以致其刑推極其輕重而必當其罪惡惟斷乃成也夫明以折獄威以致刑則用法平允而天下無寃民矣此保豐之道也按噬嗑明在上威在下是明得事理民未有罪而先立法於此以待異日之用故曰明罰敕法豐威在上明在下是用法時能洞悉下情而上之用威方無過差故曰折獄致刑然則王者之用刑雖云威照並用而又必以明為主也初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也此一爻是言人貴相資之益而不可恃才以求勝也配主指九四旬均也周公繫豐初爻曰天下之相應者如隂應乎陽柔從乎剛常非均敵初九與九四同為陽剛則彼此適均宜其不相得矣然致豐之道非明無以照非動無以行原相資也今以初九之明而遇九四之動則明足以灼其理而動又足以致其用是四乃初之配主也雖勢分才力似不相下而德實相成則何咎哉由此而往何功不立何事不濟而且有尚矣孔子釋初象曰初之與四雖皆陽剛而明動相資固可無咎矣然與人共事凡遇才力之均者必虛心以下之庶可以成天下之功也使或萌一求勝之心而欲出其上是為過旬則將相忌相仇而災患隨之矣按人臣事君協恭和衷則相濟而成功負氣爭能則相厄而兩敗漢之盛也魏相以嚴總職丙吉以寬治民未嘗以寬嚴相左也唐之興也房玄齡善謀杜如晦善斷夫且以謀斷交資也此皆一心為公而視人之有技若已有之安有􅎱嫉為懷彼此傾軋以致禍延於國者乎為人君者務求公忠無私之士而用之庶可化偏黨之弊而收師濟之效矣六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也此一爻是言人臣事君當積誠以為感悟之本也蔀障蔽也周公繫豐二爻曰六二當豐之時為離之主是人臣之有明德者而上應六五柔暗之君非不竭智盡力而無如忠愛雖切終不能自達於上正猶豐大其蔀屋而日中之至明反可以見斗是太陽無光其昏已甚矣使不度其勢之不可而往從之遽欲釋其惑以開其蔽則反重君之猜疑以取疾害而已惟在積誠意以感發之艱難有所不辭讒謗有所不懼祗此恪共震動一念歷久而不渝庶蔽可開而惑可釋君心不患其離格也不亦吉乎孔子釋二象曰人君之蔽雖難以口舌爭而其本來之明未有不可發者特積誠未至不足以感動之耳所謂有孚發若者正言一於孚信以感發君志而行其道也事君者可不勉哉按君臣之誼根於天性人臣效忠於主不顧事之濟否而徒欲博一已之名高即此念不可以對衾影安可以對吾君宜乎方員枘鑿之不相入也夫事君如事親然故見志不從又敬不違勞而不怨古來最暗者莫若大舜之親舜惟夔夔齊栗而親自允若由此觀之天下第有不盡職之臣子安有不感格之君父哉九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也此一爻是言人之有德而不見用於時也沛當作斾謂幡幔也沫小星周公繫豐三爻曰九三居明體之上本至明者也乃以至明而應上六之至暗是在我之明反為所蔽而不能以自達為豐其沛日中見沫之象夫豐沛則障蔽更甚於蔀所以沫之小星雖日中而亦見也若是則在已之明亦歸於廢棄而置之無用之地又為折其右肱之象然此非已之不明乃人之不能用其明所遇非其主耳於三何咎焉孔子釋三象曰賢臣必遇明主斯可有為於天下豐其沛者是以已之明而反為人所蔽終不能成濟豐之大事也折其右肱者三之才本足為當世用乃因時而廢亦終於無用而已何其所遇之窮哉按豐之道必明動相資而成三以陽剛之體應上隂柔處震之終止而不動上無可發之明欲為而無所賴三亦何所自見其明乎夫君為元首臣為股肱必元首有明聖之德而後股肱奏匡濟之功覲乎此爻而知聖人責難於在上者至矣九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也此一爻是教人援同德以偕進斯可共濟天下之事也夷謂等夷指初九周公繫豐四爻曰九四以陽剛當豐之時而上比六五柔暗之君諫則不行言則不聽雖有明德為所蔽而不得達與六二同亦為豐其蔀日中見斗之象然君心未明惟在所養一人正之則不足衆賢輔之則有餘幸初九同一陽剛之德乃其等夷四與之同心協力共匡君德庶暗昧可啓豐亨可保其道得吉也孔子釋四象曰豐其蔀而明不得達者由其近六五之柔暗非所處而處居位之不當也日中見斗者處非其位則以已之明投人之暗而反為所蔽是以幽暗而不明也所謂一人正之不足者也遇其夷主者已不足以啓人之暗猶喜藉初之力以共濟庶幾事尚可為而以吉行也所謂衆賢輔之有餘者也按書言昔在文武小大之臣咸懷忠良侍御僕從罔匪正人以旦夕承弼厥辟信乎助成主德非一士之功也而其權則操之大臣昔趙烈侯欲賞歌者其相公仲連進士牛畜荀欣徐越令侍左右烈侯悅之曰歌者之田且止如連者可謂善格君者矣是知大臣之道全在以人事君人君在上但觀大臣之能進士與否而其賢不賢可概見已六五來章有慶譽吉象曰六五之吉有慶也此一爻是言人君能用賢以保豐也周公繫豐五爻曰君道貴於明而病於暗然所謂明者非必盡取之已而足也六五質雖柔暗若能屈已下人而來致章明之賢資人之明以為明藉人之哲以為哲則羣材豫附自足以享豐亨之慶而流美譽於天下是身安而豐可長保也吉何如哉孔子釋五象曰六五之來章而吉者蓋能招來賢士以輔已德其效豈止有美譽而已乎實得用賢之利可以長享其豐而有慶也按人君之德莫貴於明但自恃一人之明其明小能用天下之明其明大此非獨為豐之六五言也稽於衆舍已從人好問則裕自用則小古之聖王莫不皆然矣然又云兼聽則明偏聽則暗達四聰明四目議必集夫盈廷之公論必採夫國人之衆方可去其偏而得其兼不然所信任者或非其人必至欲用人而反為人用此求明而愈失其明安能免豐蔀豐沛之憂哉上六豐其屋蔀其家窺其戶閴其無人三歲不覿凶象曰豐其屋天際翔也窺其戶閴其無人自藏也此一爻是言昏暗之極而不能自反也藏謂障蔽周公繫豐上爻曰上六以隂柔之質居豐極而處動終是當四海無虞承平日久乃恃才妄作好大喜功明極而反暗者也其居高自蔽之象如豐其屋而蔀其家者夫居豐大而高亢昏暗自絶於人人誰與之如窺其戶閴靜無人直至三歲之久而終不覿人也迷而不知自反則障蔽已深其凶甚矣孔子釋上象曰豐其屋者言其居豐之極懷滿假之心處動之終負驕盈之氣若屋之高而翔於天際也閴其無人者豈果無人乎自為障蔽暗而不見人也以亢自居至於久而一無所覿豐其可恃乎哉按上六一爻正與六五相反以五能用人之明以為已之明上舍人之明而適以絶已之明也然其病不在艱難多故之時而在晏安無事之日蓋升平既奏驕侈必生正直之士日逺而諂諛之人日進雖欲聞一善言見一善行必不可得無人不覿凶斯至矣聖人知有天下者豐業已成則豐屋蔀家之事勢所必至故特危辭以戒之敬怠之幾出此入彼而治忽判焉可不慎歟日講易經解義卷十二
