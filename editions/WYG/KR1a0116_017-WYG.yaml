body:
  text: 欽定四庫全書日講易經解義卷十七繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也此一章言卦爻吉凶原於易簡而此四節則先論象爻變動之所自岀以推吉凶之所由生也八卦謂乾兑離震巽坎艮坤三畫之卦象謂竒偶純雜之象因重謂每一衍八重之為六十四也剛柔謂奇偶變謂隂陽變化動謂占者所值當動之爻象孔子意曰易理盡於吉凶吉凶寓於象爻變動象爻變動何自而生乎聖人作易本大極而生兩儀由兩儀而生四象八卦次第成列則乾坤列而純隂純陽之象以著六子列而雜隂雜陽之象以昭象不在成列之中乎由是因已成之卦各以八卦次第加之則内外備而貞悔全逺近貴賤承乘比應之爻即燦然於各卦之中矣由是爻之竒偶即為剛柔而六十四卦三百八十四爻不過剛柔二畫徃來推换則凡隂極變陽陽極變隂不即在此相推中乎由是卦爻之中時有消息位有當否聖人皆繫之辭而明示以趨避之宜此時雖未形於動而占者所值當動之爻象豈能出辭所命之中哉夫辭之所命者吉凶悔吝而已吉凶悔吝雖已備於繫辭之時必俟卦爻之動而吉凶悔吝方始昭然是吉凶悔吝固生乎卦爻之動者也使不先繫辭以命之人將何所適從乎然所謂動者亦因乎時而已蓋六十四卦不外剛柔兩畫方其未動一剛一柔各有定位確不可移則剛柔非立易之本者乎然位有定而時無定及其既動則化裁推行總非自主非順乎時之自然而趨乎時之不得不然者乎可見時之所在動不能違人能變通趨時自然動與吉㑹何凶悔吝之有按天道不外一時聖人合徳天地之學亦不外於一時孔子釋乾五曰先天而天弗違後天而奉天時釋大有彖辭曰其徳剛徤而文明應乎天而時行萃之時用大牲吉也而損之時則二簋可用享屯之時君子以經綸也而需之時則宜飲食宴樂盖莫非時之所宜然也知易之理不外乎一時則知聖人體易之學矣吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也此二節是申明吉凶之故而示人以貞一之學也貞謂正而常也一即理也孔子意曰夫剛柔變通則卦爻動而吉凶生矣然吉凶不容並立常以正而相勝者也吉勝凶凶勝吉雖有萬變不外一貞貞則吉勝於凶不貞則凶勝於吉所謂惠廸吉從逆凶唯影響也不觀之造化乎天地之道消息盈虚至變矣惟以貞常運天垂象地效法歴萬古而不易也日月之道晦朔弦望至變矣惟以貞常照日明晝月明夜亘萬古而不息者也然則天下之動可知矣天下之動得失憂虞萬變無窮其貞常不易者一理而己人之動非順乎理即逆乎理順理則吉逆理則凶勢無常而理有定不猶天地之貞觀日月之貞明乎此吉凶之所以貞勝也按聖人繫辭以斷吉凶原有以見天下之動而觀其㑹通以行其典禮所謂典禮即貞也所謂㑹通即一也故其所繫之辭從之則吉悖之則凶而天下後世不能外也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭此三節推原象爻所由立吉凶所由見而歸功於聖人也確然徤貌隤然順貌動乎内謂揲蓍求卦而值當動之爻象也功業指趨避言變即動動則變也辭即吉凶之辭孔子意曰夫天下之動固貞夫一矣人亦知一之原於天地乎夫乾天也性情確然静專動直氣至即逹自然無為以生萬物眀示人以易矣坤地也性情隤然静翕動闢無所煩擾順承天施以生萬物明示人以簡矣乾坤既以易簡示人聖人憂天下後世不能效法乾坤也因作易以教人而立象生爻焉爻備於因重人知效天下之動也不知奇而陽者效乾之易偶而隂者效坤之簡爻雖至變而有不變之理以主宰於中爻非彷效乾坤之所示者乎象具於成列人知象天下之賾也不知陽息隂消者如戸斯闢象乾之易隂息陽消者如戸斯闔象坤之簡象雖至賾而有至約之理以綱維於内象非肖像乾坤之所示者乎有爻象即有吉凶之辭而吉凶必借揲蓍而後著如人抱蓍問易参伍錯綜通變極數效像乾坤之爻象動乎蓍卦之内而所值或吉或凶即見乎蓍卦之外所謂吉凶悔吝生乎動也此爻象之動即變也既動乎内而為變此時雖未即措之天下而務自此可成業自此可定利用出入百姓與能之功業已見乎此矣然非聖人繫辭以命之則趨避終迷而功業亦無由而見是功業固見於爻象之變必得聖人繫爻彖吉凶之辭然後得失明而從違决聖人與民同患之情不畢見於辭乎此其憂世覺民之功真可比徳天地矣按此章貞一二字最為精要一即天命之性也貞即率性之道也乾坤易簡者性命之原而生成萬物之大本也聖人效天法地立象繫辭者固欲天下各脩其道以盡其性而至於命也故聖人之意盡於象而聖人之情見乎辭學易者可不神明夫聖人之意與情乎天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此一節是言用易之聖人體天地造化之情以為情而著之於功業者也天地無心而成化故不言情而言徳徳之所被無不周遍故言大徳生謂物遂其生也位人君之位也仁當作人理治也孔子意曰易之卦爻既已彰彰矣然易之所以為用者在天地則為造化在聖人則為功業以天地言之天地有大徳曰生而已盖天地之間品物萬形無所不具惟天則確然於上地則隤然於下寂然一無所為而生生不已之機隨處流行若日以生物為事是生固天地之大徳矣以聖人言之聖人體天地好生之徳以生天地所生之民必身膺天位然後可以賛化育而宰群生則又以位為大寳也然大寳在位須兢業以守之而守之則以人焉士民樂業遐邇歸心而後位可守也守位在人須休養以聚之而聚之則以財焉家室盈寕閭閻優給而後人可聚也至若財以聚人宜理也則崇本業省冗費以理之辭以教民宜正也則殊貴賤辨名實以正之民之為非宜禁也則申法令明刑罰以禁之然三者必皆裁之以義焉盖合於義則理之而財得其平正之而辭得其順禁之而民格其非庻聖人之功業與天地之大徳侔矣按易之一書原為與民同患而作故上繫首章由乾始坤成而歸之乾坤易簡之理下繫首章復由乾易坤簡而歸之天地大生之徳得乾坤易簡之理而成位乎其中者聖人之體也行天地大生之徳而以位為大寳者聖人之用也有體則與天地合其徳有用則為天地大其功繫易者其有望於後世有徳有位之聖人也如此哉古者包犧氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物于是始作八卦以通神明之徳以類萬物之情作結繩而為罔罟以佃以漁盖取諸離此一章是言聖人制器尚象之事而此二節言包犧氏作易以前民用而開鮮食之原也文羽毛也與地之宜諸本多有天字宜時令方隅也結繩以麻為之網所以佃罟所以漁葢者疑辭言疑取諸此而非必取諸此也孔子意曰粤稽古昔以聖人之徳履大寳之位而能作易以前民用者昉於包犧氏之王天下也盖羲皇藏徃知來心通造化固已具一作易之本矣而又求之於俯仰逺近之内以驗隂陽消息之理故仰則觀經緯之象於天如日月星辰之屬是也俯則觀一定之法於地如南北高深之類是也至於俯仰之間即鳥獸之文觀之如剛鬛柔毛亦隂陽也希革毛毨亦消息也即天地之宜觀之如春夏則陽之息秋冬則隂之消也髙者陽之息下者隂之消也近取諸身之形體性情逺取諸物之飛潛動植而隂陽消息之理無不畢具於其中於是乃作乾兑離震巽坎艮坤之八卦焉神明之徳不可見者也就徤順動止八者之徳以通之而凡隂陽之理深入無形者易皆與之融貫而無間矣萬物之情可見者也就雷風山澤八物之情以類之而凡隂陽之理顯及有象者易皆與之相肖而不違矣八卦既成顯㣲畢著聖人人作易寧徒為制器而設然而制器之理總不越此古者禽獸魚鼈多而人民少故包犧氏教民結麻為繩以為網罟以佃於山林以漁於川澤使民知鮮食之利焉若是者疑取諸離盖離象為目離徳為麗如網罟之兩目相承而物麗之也按宓犧首畫八卦其神靈意智本不待外象而著特假河圖神物以徴信兆民耳故易之未作全易之理具在聖心易之既作天下之理備於易書雖備物致用聖人未嘗取象於易而究未有出於易之外者其理同也不然網罟之設未必不在畫卦之前則又何從取兩目相承之象而求合之乎包犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下盖取諸益日中為市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑此二節是言神農氏之教民粒食而通有無於不匱也耜耒首也斵木使銳而為之耒耜柄也揉木使曲而為之耨除草也孔子意曰包犧之時鮮食之原既開矣然粒食之道未備也包犧氏沒神農氏作民厭鮮食而食草木之實於是斵木使鋭為耜揉木使曲為耒耒以運耜耜以起土設為耒耨之利而教天下以樹藝之法焉若是者疑取諸益盖二體皆木取益之象其動者在下之耜而入之者在上之耒上入下動取益之徳天下之益莫大於耒耜又有取於益之義也夫網罟設而鮮食足耒耜具而黍稷登則貨財殖矣然有穀者或不給於鮮有鮮者或不給於穀乏者無所取積者無所散則有無不均而所養或缺神農氏於是教民期以日中為市使之道里均趨走便而天下之民無不致矣市各聚其貨使之百物具諸用備而天下之貨無不聚矣交其所有易其所無交易而退則有無相濟彼此相通而人人各得其所矣若是者疑取諸噬嗑蓋卦徳上明下動日中象上明為市象下動卦名噬嗑民不一業貨不一用致而聚之又噬而嗑之之義也按聖人立成器以為天下利其用不止一端而繫易者必先自離次益次噬嗑其説何耶盖食貨乃斯民之大命生養為王政之大端聖王圖治未有舍此而他為先圖者大傳之垂訓也深矣神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治盖取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下盖取諸渙服牛乗馬引重致逺以利天下葢取諸隨重門擊柝以待暴客葢取諸豫斷木為杵掘地為臼臼杵之利萬民以濟盖取諸小過弦木為弧剡木為矢弧矢之利以威天下盖取諸睽此以下是言黄帝堯舜通變宜民之事而此六節皆創制以前民用者也刳刻之使中虚也剡削之使末鋭也弦以絲弦木也弧木弓也孔子意曰神農之時食貨足而生養遂矣然風氣日開人心漸啓樸陋之治不可以久也迨神農氏沒黄帝堯舜氏作三聖人又有因時致治之道焉盖民心之厭淳固而思變為文明也時為之也聖人因其時之變而通之使天下之民亹亹焉日習於其中而不倦焉然其通變之道又不過因其自然之勢而導以自然之理若神化莫測者然故使天下之民皆鼓舞於神化之内而安之以為宜惟其宜之故趨之而不倦也三聖人之通變神化若此豈有他術哉一易理而已矣盖易理即天之理也消息互乘盈虚迭運時處其窮則數盡必更勢重必返未有不變者變則隨時而轉因勢而導未有不通者通則一時適宜後世無弊未有不久者三聖人之通變合乎易即合乎天矣是以民宜之而天祐之吉无不利也嘗即通變而進稽其事始於黄帝備於堯舜定為上衣下裳之制垂之於身以革上古簡陋之俗則貴賤别而上下分民志以定恭已無為而天下治矣若是者疑取諸乾坤盖乾以易知坤以簡能乾坤之變化無為也垂衣裳而天下治聖人之變化無為也衣裳之制度既同将遐邇之嚮風恐後茍川澤梗塞則文教有所不通於是刳木使中虚而為舟剡木使末鋭而為楫舟以載物楫以進舟舟楫之利興而不通者賴以通矣若是者疑取諸渙盖渙之象上巽木而下坎水一如舟之浮出於水上也夫川澤既通而山林阻脩則擔簦重趼負戴勞苦也於是牛以順為道故服而馴之以引重馬以徤為性故乗而駕之以致逺而天下享安驅之利矣若是者疑取諸隨葢卦徳下動上説猶物在下而動人在上而説也川塗既通逺邇錯至暴客或乗而起矣於是設為重門以禦之於外嚴為擊柝以戒之於内雖有暴客之來而警備已宻吾固有以待之矣若是者疑取諸豫盖取豫備之意也耒耜以開粒食之原而民未知脱粟之利於是斷木為杵而使之足以舂掘地為臼而使之足以容杵臼之利興而萬民之養益以濟矣若是者疑取諸小過葢卦象上木下土杵為木臼為土卦徳下止上動如臼止而杵動也外有擊柝以待暴客内有杵臼以精粒食而害之大者無所挾以威之則雖有險而不能守雖有粟而不得食於是弦木使曲而為弧剡木使鋭而為矢弧矢之利所及者逺以威天下之不軌非止重門擊柝以防之於内也若是者疑取諸睽盖睽乖然後威以服之也按天下風氣既趨於文眀則人心嗜慾日繁詐偽亦日甚不予之以利無以遂其求不震之以威無以禁其暴是故利天下者聖人之仁也威天下者聖人之義也仁與義皆所以宜民而已矣上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨盖取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁盖取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察盖取諸夬此三節是言黄帝堯舜易古制以前民用者也棟屋脊檩也宇椽也喪期喪哭之期也書文字也契合約也孔子意曰凡上古未備之噐而不可緩者聖人皆尚象而創其制矣乃上古已備之噐而不可用者聖人尤必尚象而變其制如上古宫室未興冬則穴居夏則野處風雨奄至民無寕居後世聖人易之以宫室之制有棟以直承而上有宇以兩垂而下雖有震風暴雨莫能侵之矣若是者疑取諸大壮盖取壯固之意宫室不壮則不固也宫室既具生者得以庇䕃而死者無所覆藏亦何以教民孝乎古之葬者不過厚衣之以薪葬之中野之地無封土樹木之規無喪麻哭踊之期後世聖人易之棺以周其内槨以固其外計慮久逺而無使土親膚矣若是者疑取諸大過盖取送死大事寧過於厚也上古民淳事簡故小大之事惟結繩以記驗之亦足以為治後世風俗寖薄欺詐日生於是聖人易之以書契言有不能記者書識之事有不能信者契驗之由是百官之功實可稽萬民之情偽可覈而以治以察矣若是者疑取諸夬盖取明决之意以夬能决去小人之偽而防其欺也按歴代聖人制器尚象或尚其徳或尚其名或尚其義或尚其體又或尚其道緫謂之象也盖卦者象而已矣五聖人之制作非必觀玩於十三卦之象而為之而孔子以為取諸云者正以日用事物之間原自有一易之理聖人所為默與之合即邵子所謂畫前之易是也然則千萬世利用安身養生送死之道無一不由於易易豈僅為卜筮之書而已哉是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也此一章是言易之卦爻不外乎象而人當觀象玩辭以知所趨避也材卦之質也效倣也孔子意曰原夫聖人尚象之故而知羲皇既作圖書遂起於是易有小成有大成不過六十四卦三百八十四爻奇偶之象而已然象有本體之象有一爻之象總之不滯於跡彷彿於理之似耳如陽卦六畫之乾以卦言則所以像夫純陽至健之理以爻言則有以像夫潛見惕躍飛亢之理隂卦六畫之坤以卦言則所以像夫純陰至順之理以爻言則或以像一陰之始生或以像隂盛而亢陽亦各自備一理舉乾坤而諸卦可類推矣此聖人作易立象以盡意也象既立矣觀象而繋辭則有彖彖者言一卦之材也如卦徳卦體卦變卦象卦義皆其材也卦兼有善惡卦材之善者辭亦從而善卦材之惡者辭亦從而惡而象之全體形矣於是乎又有爻爻也者效天下之動者也如愛惡相攻逺近相取情偽相感天下之動紛紜變化莫可窮詰而皆爻中之所已具是以聖人一一摹倣於逐爻之下而象之一節昭矣既有卦爻以象告又有卦爻之辭以𤼵揮乎象是故得失之報以明吉凶由此而生焉憂虞之故以晰悔吝由此而著焉盖悔吝在心未著吉凶在事已著吉之生悔之著也凶之生吝之著也總之繫辭以盡言不外乎立象以盡意材者象之質動者象之用吉凶悔吝者象之徴也象立而易之理備矣按宓羲畫象其吉凶悔吝之故已了然於心中特其時當渾穆故不顯著之於辭而止以象告至中古之世詐偽日生凡辭之所繫者皆事之所有故聖人繫之辭以正告天下曰如是則可以悔而得吉如是則必至吝而得凶使天下曉然於趨避之途則聖人之立象繫辭皆因乎時以有功於世道者也陽卦多隂隂卦多陽其故何也陽卦奇陰卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也此一章是即少陽少隂之卦名以見聖人貴陽賤隂之意也君謂陽民謂隂孔子意曰乾坤二卦純陽純隂其畫無有多寡矣至於震坎艮皆為陽卦宜多陽矣其畫乃一陽二隂是陽卦反多隂也巽離兑皆為隂卦宜多隂矣其卦乃一陰二陽是隂卦反多陽也此其故何也凡陽卦以一陽為一畫其二隂各二畫合之則為五畫五竒數也竒則為陽卦矣凡隂卦其一隂已二畫其二陽又各一畫合之則為四畫四耦數也耦則為陰卦矣是皆數中自然之妙非人力所能參也然數未有不本於理由數之所呈以究其理之所合則卦畫之所在即徳行之所在也而其徳行又有公私邪正之不同焉盖陽道尊貴而統隂有君之象隂道卑賤而從陽有民之象陽卦一陽而二隂則其象為一君而二民夫以一君而統二民其道大而公義之正也君子之道也隂卦一隂而二陽則其象為一民而二君其道小而私事之變也小人之道也然則多隂者為陽卦多陽者為隂卦豈非理之一定數之自然而聖人扶抑之深意所隠寄於其中者哉從來君子雖多小人用事其象為隂小人雖多君子用事其象為陽盖小人為君子所制則治君子為小人所制則亂小人為君子所制或能改絃易轍以求當乎君子之意尚可以効一官一職之能君子為小人所制斷難敗行喪檢以求類乎小人所為必至於成相傾相軋之漸此治亂所由分也易之泰卦不曰有君子無小人而曰内君子外小人然則處之得其宜用之得其道雖小人亦烏足為害哉易曰憧憧徃來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日徃則月來月徃則日來日月相推而明生焉寒徃則暑來暑徃則寒來寒暑相推而嵗成焉徃者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以徃未之或知也窮神知化徳之盛也此四節是引咸九四爻辭以明天下感應之理屈信之機皆出自然而無所容心於其間也思者心之用也慮者謀度其事也致極致也咸之四爻以陽居隂不能正固将以私感而害大公故其爻辭曰憧憧徃來朋從爾思孔子釋之意曰天下至廣大也其一感一應之相為徃來者原屬天下自然之理而不碍我空虚之體則又何處可用吾之思用吾之慮哉葢天下之理原於太極本同歸也但一渉於事物則所感者多其塗各殊究之塗雖殊而歸則同天下無二理也理根於人心本一致也但既接乎事物則所應者分慮亦有百究之慮雖百而致則一天下無二心也夫理無二理心無二心則順理行之因心付之足矣信乎何處可用吾之思用吾之慮而以憧憧為哉試以天運觀之因日之徃而有月之來因月之徃而有日之來二曜相推以相代則明生而不匱因寒之徃而有暑之來因暑之徃而有寒之來二氣相推以相繼則嵗成而不缺夫日月寒暑之徃者不待思而往乃氣機之消而屈也日月寒暑之來者不待思而來乃氣機之息而信也一屈一信即造化相感不已之機而明生嵗成之利於是乎生焉是屈信往來孰非感應自然之常理乎因天運而推之物理莫不皆然如尺蠖之行也不有所屈則不能有所信其屈也自有求信之理不待思慮而信也龍蛇之在冬也不蟄而伏其氣則不能存其身其蟄也自能以存其身不待思慮而存身也豈特物理為然哉即驗之聖學亦有自然之機也夫天下事物之感不齊而心能裁制之即為義心之所感不一而義能變通之即為神精硏其義至於入神其於事物之所宜靡不洞察而臻於神妙之地則心不外馳入者不出内之屈也而見理明徹自有以推極其外之用屈之感信也既足以致用而用無不利則應事接物隨其所遇迎刄而觧而身之所履無適不安外之信也而動作得宜自有以增崇其内之徳信之感屈也夫屈信往來無徃非交養互𤼵之理功在於此而效見於彼則亦何在可容吾思慮之擾其間哉夫義求其精用求其利此其機在我可知者也由此内外之間交養互𤼵自有欲罷不能者矣自是以上惟有待其天機之自至而絶非人功之可加又豈我之所能知哉盖窮極天地之神而與合一不測者共藏其域通知天地之化而與推行有漸者㝠契其機始而入神至此神已窮矣始而可知至此知已化矣皆由其徳之盛故能窮神知化如斯也豈徒崇之已乎夫交養互𤼵之機熟之又熟而至於不知者往而屈也神化合一之妙忘之又忘而至於自致者來而信也是亦皆感應自然之理而非思慮之所能及也按咸之象以虚為義至虗之中無不同焉無不一焉然推之晦明寒暑往來屈信之理則同之中有至不同者存一之内有至不一者存此神化所由生也故又推之精義利用及於窮神知化以明同者惟通不同為同然後其同可通一者惟合不一為一然後其一可合孔子之一貫是也若夫俗學之失固患乎思慮之紛紜而異端之學又誤執何思何慮而流入於虗無寂滅将何以致用崇徳而窮神知化乎故九五之志末與憧憧同戒也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期将至妻其可得見耶此一節是引困六三爻辭以戒小人不當揜抑君子而自貽伊戚也易困卦之三爻以陰柔之質上揜四下揜二欲困人而卒自困故其爻辭曰困于石據于蒺藜入于其宫不見其妻凶孔子釋之意曰困之六三以陰柔不中正是無才徳之小人也而居九四之下四之剛堅重不撓足以壓制夫三石之象也三不自量其力而思傾陷乎四之下欲乗其隙而奪之位是非所困而困焉必至公論不與而名辱又居九二之上二之剛英鋭難近不甘依倚乎三蒺藜之象也三不外度其人而思盤據於二之上欲慿其權以搤其腕是非所據而據焉必至貫盈禍至而身危夫名既辱身且危死亾無日矣雖上六正應有妻之象然身且不能保其能有其妻耶故妻不可得而見明上六之親䁥亦不為三應也按君子有不幸之困非其所自致身雖危而名不辱小人欲陵君子卒必至於自困以至名辱身危何如安分自守人已兩全之為愈哉易不唯為君子謀其為小人謀者亦至矣易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者噐也射之者人也君子藏噐於身待時而動何不利之有動而不括是以出而有獲語成器而動者也此一節是引解上六爻辭以明君子當善藏其用也藏收斂不露之意括結礙也成完全無缺也易解卦之上爻居公孤之位而能觧除六三之悖惡故其爻辭曰公用射隼于高墉之上獲之无不利孔子釋之意曰隼者鷙害之禽也弓矢者射禽之噐也射之者操弓矢以射隼之人也解悖之義庻唯君子得之君子抱經邦濟世之才是葢藏其利用之器於其身也弢鋒斂鍔不先不後待其時之可為而動則其噐已素具矣何不利之有若是者正以其藏而後動故其動自利而無足為我括一出則鷙害以除而有獲矣然則觧上爻之語正言公之能善藏以成其噐謀出萬全動無結礙是以獲之无不利也按君子之待小人常疎小人之伺君子常宻必藏噐以待使之不疑不忌而後可乘時以制其命大舜之去四凶孔子之誅少正夘不動聲色而成功於俄頃率是道也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也此一節是引噬嗑初九爻辭以明人君當懲戒小人使之逺於罪戾也孔子意曰仁載於心心莫患乎無恥小人唯不恥不仁故其心入於不仁義著於事唯其不恥不仁故其所為之事常不畏夫不義之名既至於不耻不畏則其中蕩然無名教之可懼而無所不至然小人雖愚彼其初原不知仁義之為利而不仁不義之深為害也苟歆之以所利而怵之以所害彼其趨避之情當必有翻然悔悟者矣故不見利則不勸於仁義不見威則不懲於不仁不義是利與威正人君懲誡之大權也始之懲其小不仁不義於其前而終能誡其大不仁不義於其後此懲之誡之所以造小人之福也易曰屨校滅趾无咎此小懲大誡之謂也按天下之小人非必生而怙終者也大約進無所慕退無所懼流於極惡而靡所底止使有國家者早明勸懲之典則斯世不受僉壬之禍而小人亦得以蒙其福必至於刑措而不用矣善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可觧易曰何校滅耳凶此一節是引噬嗑上九爻辭以明善惡視其所積而禍機伏於所忽也孔子意曰善者成名之機也不積則不足以成名惡者滅身之媒也不積則不足以滅身小人之心不知小善之可以積而至於大善也但以為无益於名而弗為也又不知小惡之可以積而至於大惡也但以為无傷於身而弗去也夫善既不為惡又日積則穢徳彰聞漸不可掩惡極罪大豈復能解乎易曰何校滅耳凶由滅趾不防而至於滅耳也夫安得而不凶哉按旅獒之訓曰不矜細行終累大徳為山九仞功虧一簣漢昭烈之戒子曰勿以善小而弗為勿以惡小而為之盖言積小以致大也至若聖賢之學致謹乎隠㣲不愧於屋漏又豈待小善小惡之著而後兢兢哉子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此一節是引否九五爻辭以明人君常存戒懼之心則能永享天位而固國勢於不傾也孔子意曰凡圖事宜謀其甚全存心貴操其不足故必使其心若危危者乃所以安其位者也使其心若亡亡者乃所以保其存者也使其心若亂亂者乃所以有其治者也君子深鑒其故雖海内寧謐可謂安矣而常慮位之不可久安不忘危之将至也宗廟鞏固可謂存矣而常慮存之不可屢倖不忘亡之或及也紀綱釐舉可謂治矣而常慮治之不可徒恃不㤀亂之漸萌也夫既不忘有危有亾有亂之時則必圖所以安之存之治之之䇿是以身之位得以安而國家可保其久存長治也易曰其亡其亡繫于苞桑玩爻辭而益加儆惕矣按唐虞之時可稱極盛然禹有慢逰傲虐之戒益有怠荒逸樂之箴至若伊尹儆太甲以恒舞酣歌召公訓武王以玩物喪志賈誼陳治安策於文帝之朝魏徴上十漸疏於太宗之世李沆處真宗太平之日而惟以水旱盗賊為言耶律楚材當太祖開創之初而日以生民休戚為告豈故為是已甚之辭哉惟其日慮夫亂亡故能保世於長久然則其亡二語真萬世有天下者之金鑑歟子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也此一節是引鼎九四爻辭以明小人不量才徳而貪位圖功必至於覆國亡身也孔子意曰凡居位必視乎其徳謀事必視乎其知責任必視乎其力若夫徳薄者位亦宜卑知小者謀亦宜小力小者任亦宜輕此理之常也茍始之不自審其徳之薄而貪夫尊位位既得矣又不肯自揣智力之所不足而謀大任重務為好大喜功之論以飾其愚而固其位則敗可立見而位亦旋失不特身名俱喪公家之餗由此覆矣易曰鼎折足覆公餗其形渥凶盖言其位雖尊而才徳不足以勝其任也按古聖賢出處之際必先内度之已外度之君雖卑位㣲秩亦必勝其事而後食其禄况身秉國鈞事關民社豈可不自度量而漫然處於其上乎然用人者人君之事則又當辨才授官不使有尸位素餐之誚此大傳之㣲㫖也以上六節五節皆言小人之事困之三爻以小人而圖君子者也解之上爻以君子而圖小人者也噬嗑之初爻小人之未遂其非僻者也噬嗑之上爻小人之已陷於大惡者也鼎之四爻小人之貽患於家國者也聖人或危之或幸之或指示之或哀矜之或憂慮之總欲使之安其分而不為天下之害御小人者其亦知所以善處之道哉子曰知幾其神乎君子上交不諂下交不凟其知幾乎幾者動之㣲吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寕用終日斷可識矣君子知㣲知彰知柔知剛萬夫之望此一節釋豫卦六二爻義也孔子意曰凡人於處事接物之間其幾必有先動者人心至神本無不燭唯心有所蔽則當幾而不知茍此心空洞無物自然隨觸而覺未有不知幾者知至於幾其神矣乎夫上下之交莫不有幾存焉與上交固貴於恭遜然恭遜之過便近於阿附而為諂與下交固貴於和易然和易之過便近於䙝狎而為凟所争在幾㣲之間耳唯君子上交而不至於諂下交而不至於凟於事理一定之權衡審之極其精而行之無少過其真知幾乎夫所謂幾者乃天理之萌動其動至㣲兆而未著茍順適其幾無有不吉此吉之先見者也衆人所不及察唯君子見之君子一見此幾即作而趨之有不俟終日者盖稍渉濡遲則失其所為幾而違其所為吉矣易曰介于石不終日貞吉言人赴幾之不速由於心溺物欲而不能静見渉依違而不能斷茍其介然如石焉無欲而静堅確而不可移則理定而智圓守固而行决斷可識其不俟終日矣盖天下之理有隠潛而㣲者有顯設而彰者人之處事有巽順而柔者有勇决而剛者人知乎此方能知幾今君子既知其微又知其彰既知其所以柔又知其所以剛四者既知則無所不知所以為萬夫之望此真所謂知幾之神也按繫辭釋豫卦六二爻而言上交不諂下交不凟者以豫之九四不中不正為豫之主初與之應三與之比皆諂乎四六二中正自守在初與三之間上交不諂也初六鳴豫凶不正者也六二雖與之比中正而不凟慢下交不凟也此所謂知幾也乃知易之理不外於知幾而知幾實難必静止之功成於内然後光明所燭能得於義理之精㣲應事接物無少過差動與吉㑹始為知幾之君子也子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉此一節釋復卦初九爻義也顔氏之子謂顔囬也庻幾言近道也孔子意曰人自繼善成性以來止有一善但為氣禀物欲所拘蔽乃漸失其本然矣唯聖人之心純乎至善與道為體賢人之心復其本善庶幾近道若及門之顔回其殆庶幾乎囬不必有顯形之過方其念慮之間或稍有間雜有非繼善之初者即為不善也回於不善之動當體即知無有蒙昧而不及察有不善未嘗不知不待迷而後覺也知其不善之動當幾即克無或遲留而不遽改知之未嘗復行非失久而後復也易曰不逺復无祗悔元吉盖初九一陽來復復之最先所謂不遠之復不至於悔大善而吉者即顔氏子之學也乃知人性之善以能復為功復性之學以知行為要有不善而不知不可言行知不善而復行不可言知如顔子之學知行合一庶幾復性之功乎天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也此一節釋損卦六三爻義也絪緼濃宻也醇凝厚也搆交也致一言專一也孔子意曰造化之生機與人類之事為莫不合兩為一以盡變化而成功能試觀天地本兩也及其以氣相交隂陽絪緼濃宻無間則兩而一矣而萬物之以氣化者於是醇厚而不漓焉男女本兩也及其以形相交隂陽施受精氣感通則兩而一矣而萬物之以形化者於是生生而不息焉夫天地男女所以成化醇化生之功者以其絪緼搆精專一而不二也易曰三人行則損一人一人行則得其友損一人者兩也得其友者亦兩也兩相與則專一若三則雜亂不能成功損其間吾兩之人所以致吾兩者之專一也言致一也按損卦以卦象言三陽三隂地在中爻上下皆天有天地絪緼之象以上下二卦言少男在上少女在下男止女説有男女搆精之象故以天地男女言之六三與上九相應志氣專一故曰致一而本卦六爻應與亦各隂陽相配無非致一也此造化之生機人事之功用所不能外也子曰君子安其身而後動易其心而後語定其交而後求君子脩此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶此釋益卦上九爻義也動見諸政事也易坦易也語施諸號令也求取諸賦税也孔子意曰取益之道在於有恒如臨民出治則有動而君子不遽動也去欲循理以安其身使大中至正畧無偏陂而後萬事萬變慮善而動焉𤼵號施令則有語而君子不遽語也平情抑氣以易其心使坦適從容畧無詭戾而後有體有要因時而語焉制國家之用則有求而君子不遽求也待民若子以定其交使上下感通畧無疑貳而後度地制賦循分而求焉安其身易其心定其交君子脩此三者則取益之道全故動則民悦語則民信求則民與不求益而自益矣若理不足以勝欲則危危以動是自處於可危之地而驟欲動民民誰與而從之心不足以制氣則懼懼以語是我實不徳而告令以空文未免有恫疑之心民誰應而奉之有相臨之分無相感之情則无交无交而求是恩無所施而徒責其報民又誰與而供之至於莫之與則不但不與而已以身𤼵財爭民施奪而傷之者至矣此易之所云莫益之而或擊之由其立心之勿恒是以凶也夫益下者君道之恒有恒者益之本也益之上九陽居益之極求之不巳而專於利巳則失其恒無恒即無益矣此周公所以為殖貨者戒而孔子復詳以釋之使後之君子知立恒以取益也子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳此一章言聖人本陰陽以作易明造化之理示人事之得失也此一節言卦爻之畫從乾坤而出備於理而妙於用也物言有形質也撰猶事也有形可擬曰體有理可推曰通孔子意曰易始乾坤凡六十四卦三百八十四爻皆從此變化而出然則乾坤者其易書諸卦爻之門邪夫一隂一陽之謂道隂陽不可見聖人畫竒為乾以象陽之健是乾乃陽物也畫偶為坤以象隂之順是坤乃隂物也以隂陽之徳言則隂與陽合陽與隂合交錯往來而二物相得其徳合矣以隂陽之體言則剛自為剛柔自為柔各成其質而二物對待其體立矣由是形之可見者如雷風山澤之類易則一一象出之無不形容其似是天地之撰以易而體矣理之可推者如健順動止之類易則一一顯出之無不𤼵揮其妙是神明之徳以易而通矣總之易之為言隂陽往來而巳六十四卦乾坤徃來而巳言其合而未嘗不分言其分而未嘗不合聖人作易因其自然之徃來自然之分合為之陳其數而備其義體天地通神明而不外乎隂陽二物此乾坤為易之門也其稱名也雜而不越於稽其類其衰世之意邪此一節言易書卦爻之辭不出隂陽之變亦因時而作也越踰越也類事類也孔子意曰太始以來唯有隂陽而窮極理數至於不可勝紀於是一卦有一卦之名一爻有一爻之名或言物象或言事變其稱名也可謂紛然雜出矣而總不出乎隂陽之變是稱名雖雜而未始有踰越也然嘗稽考其事類所以盡萬物之變者似非上古民淳俗朴不識不知之語也盖文王周公見中古以來人心日澆迷謬愈甚乃繫卦爻之辭示吉凶之義憂患後世之意甚深且切其衰世之意邪乃知聖人制作因乎其時當伏羲之畫卦凡事物之變巳無不具於其中特上古質朴無用費辭至後世人情物態無所不有文王周公目擊身歴慮之也深故言之也詳易之道乃無餘藴亦時之不得不然也夫易彰往而察來而㣲顯闡幽開而當名辨物正言斷辭則備矣此一節承上雜而不越而更言其理之備也按本義云而㣲顯恐當作㣲顯而開而之而亦疑有誤彰彰明也闡闡𤼵也孔子意曰易既雜而不越則理無不備如天道之已然者謂之往而易書卦爻之變象於隂陽消息已然之理皆有以彰之人事之未然者謂之來而易書卦爻之占辭於吉凶悔吝未然之幾皆有以察之日用所為者顯也易則推其根於理數之幽使顯者至㣲盖以人事本之天道也百姓不知者幽也易則𤼵其端於事為之顯使幽者畢闡盖以天道用之人事也天下不可亂者名分易則於君臣父子之分貴賤上下之等各當其位矣天下不可混者物類易則於乾馬坤牛離火坎水之類各辨其似矣以明卦爻之義則有言易之言皆本典常之道以𤼵之無不中正言之正也以告吉凶之故則有辭而易之辭皆因得失之情以判之無有囬惑辭之㫁也盖易之理精及無形粗及有象無弗備矣而要其所以備者即隂陽二物有以體其撰通其徳也乾坤不信為易之門耶其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隐因貳以濟民行以明失得之報此一節承上節言理之備而詳論其妙也肆陳也貳疑也報猶應也孔子意曰易辭纎悉無遺其稱名嘗小矣然其所取之類皆本於乾之陽坤之隂何其大也天地隂陽道徳性命散見於諸卦爻之中其㫖甚逺矣而其所繫之辭經緯錯綜煥然明白何其文也凡委曲其辭者未必皆中於理而易之言多委曲矣乃適當於義理之極致何其曲而中也将以廸人從也凡敷陳其事者無有隐而不露而易之於事大小本末無有不該極其敷肆矣然至理貫於其中未易窺測何其肆而隐也将以啟人思也易書之曲盡其妙如此盖後世民心不古情偽愛惡柏感相攻而吉凶相雜疑貳紛然莫知趨避聖人因其疑貳之情欲濟其行之所不及故作易定吉凶以告人明其失得之報使知所趨避所以濟民之陷溺者端在乎此聖人慮民之心深矣乃知乾坤二卦巳包三百八十四爻而文王周公卦爻之辭即伏羲之畫先天盡意後天盡言而聖人開物成務之功無不同也易之興也其于中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之脩也益徳之裕也困徳之辨也井徳之地也巽徳之制也此一章是言易有處憂患之道在於反身脩徳而此二節原易之所由興因舉九卦之徳以明其序也中古謂文王時文王拘於羑里而繋彖辭孔子意曰易自羲皇而肇其來逺矣然夏商之末其道中㣲易之復興也其在中古之時乎當是時文王以盛徳而蒙大難因演易六畫之卦而繋之彖辭以垂教萬世操心危而慮變深其有憂患之思乎夫以憂患之心作易則處憂患之道莫備於易矣要其道無如反身脩徳而脩之有序大約於九卦可槩見焉是故徳莫先於立基必謹於踐履之實則身心有所受治而可以為積累之漸履非徳之基乎徳基始立一有驕亢之念即至隳壊必守之以謙退則有所執持而不失謙非徳之柄乎既有執持又必於念慮之萌時時審幾而反復於善以存養其本體故復為徳之本本既在我而不能常守雖得必失又必其守之也恒久不變始安固而不摇故恒為徳之固然持守雖固私欲或未盡去也損則懲忿窒慾以去其所本無徳於是乎脩焉然脩省雖嚴天理或未盡純也益則改過遷善以充其所固有德於是乎裕焉徳既至於充裕則可自驗於處境矣盖當困時凡進退語黙取舍辭受之間最可觀徳當義則是違理則非是困為徳之辨也徳至於可以處困則可施以及物矣盖性體常定始終無改而應變不窮如井之澤及於物而未嘗動焉故井為徳之地也至此則凡事之來能以心順入於其理而裁制得宜盖事理之細㣲曲折非此心巽入則所見必有未徹不無幾㣲之失惟順而能入斯化裁盡妙此巽所以為徳之制也哉凡此九卦皆反身脩徳以處憂患之道也要之聖人之徳純亦不已心與易㑹自居平以及處憂患無非全體乎易豈僅以此九卦為反身脩徳之事哉孔子苐就處憂患之道而舉其近似者言之為萬世學易者之法可以見徳之有序而其用無所不備耳履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隐履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義巽以行權此二節是言卦徳之妙而因以著聖人之用易也物指衆隂言設是施為之意孔子意曰易以九卦為反身脩徳之序而其徳之兼體用而咸備者固無乎不宜也履之為道君臣上下固以各得其所為和矣而平易近情之中無非天理民彞之凖盖至極而無可加也謙之為道卑以自牧固未嘗自處於尊而心愈斂則望愈崇自光顯而不可掩也復以一陽動於羣隂之下善端甚㣲似易為物之所淆而理欲界限判然分明不既辨於物乎事變之來雜然不一每易至於厭怠惟徳能有恒則雖處紛擾而所守常定何厭之有乎損主懲忿窒慾其功固先有所甚難矣而克治既久馴至私累自消後何易耶益主遷善改過其勢固滋長而充裕矣然積累之基皆吾固有何待於施設耶身雖處困而道不與之俱困無入不自得者此其窮而能通也立於不動而可以應天下之動及物而不窮者井之居而能遷也至於巽以應事能劑量萬物之宜而稱物平施不見表暴之迹乃所謂稱而隱者也卦徳之妙如此以觀於其用則何如行已若不以禮遂至乖戾惟由於自然之節文則有從容順適之休此行之所以和也非履何以哉行禮若無節制亦為虗器惟出之以卑遜而自合於範圍之節此禮之所以得其制也非謙何以哉善端所存在於一念憬然自覺而其幾自此日進則復實以之植徳之方在於始終純一無間而不為事物所奪則恒實以之欲之日長也其為徳之害甚大有以逺之而非幾不至於冒貢矣道在於用損徳之當脩也其為身心之利何窮有以興之而積累自此日崇矣道在於用益用困之道以自處則能盡其在我而隨遇皆安自無容其怨尤之意非所以寡怨乎用井之道以處物則安而能慮而事至吾前自不淆於是非之正非所以辨義乎若夫巽順在中則與道為體雖處變事而能委曲合宜此則權之所以行而巽之用為至也卦徳之用如此自非聖人能全備是徳何以能處憂患而裕如哉按易卦屯坎蹇皆有處憂患之義而此不之及聖人處常處變總一脩徳而已如履謙復恒諸卦之徳豈待遇險難而後力行若以憂患言則困而不失其亨即困之一卦已不勝用矣此章隨舉九卦正以見聖人之體用無不備而易之理無往不宜也易之為書也不可逺為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適其出入以度外内使知懼又明於憂患與故无有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虚行此一章專論玩辭觀變為學易之事而深有望於其人也逺猶忘也不可逺猶言不可離不居猶不止也六虚六位也位未有爻曰虚卦雖六位而剛柔爻畫徃來如寄非實有也故以虚言出入者以卦内外體言出者自内之外徃也入者自外之内來也方道也孔子意曰聖人之作易也其書所載皆天地自然之理而人生日用之不可湏臾離者豈可逺乎盖易以中正有常之則而隨時運動其為道也屢遷矣道不外乎隂陽隂陽變動而不居其所常周流於六虚位之間或自上而降或由下而升而上下之无常或柔來而文剛或剛上而文柔而剛柔之相易此豈可以典要拘之哉唯隨時變易以從道適得其宜而巳易既唯變所適故其卦體之一出一入皆道之確然不可踰者範圍乎一定之矩所謂度也度之所在使人知消息盈虚之理出處進退之宜出外入内惕然知所戒懼而不敢妄有踰越此其為教彰彰矣而且於出入以度之中又獨明憂患之事與所以致憂患之故而一一詳切示之使人不致迷其所徃故居則觀象玩辭動則觀變玩占莫不􅅥然恐懼雖無師保之儆戒儼如父母之臨於其上而不敢玩忽則於知懼之中更有懼焉易之示人深切如此其可逺耶故善學易者始由卦爻既變之辭而度卦爻之理則出入之度憂患之故確有定向而不可為典要者今則既有典常可以遵而行之矣然人之由辭以逹變者於無定之中而求有定之體即於不變之理而神其至變之用是在於人之神而明之推類而長之也茍非其人則易道雖日在天下而豈能虚行哉盖古者作易以通神明之徳類萬物之情參伍錯綜固有以極天下之變而為義類之所宗所謂百姓日用而不知者也自非極深研幾之哲則不能由辭以得其意而有以盡易之妙矣此道之所以重有待乎其人也易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其象辭則思過半矣此一章專論爻畫之義以示人而此四節首言立卦生爻之義又析六爻之藴而掲其要也質以卦體言時謂六位之時物謂隂陽中爻卦中四爻也象辭統論一卦六爻之體者也孔子意曰易之為書卦立而爻生焉是以全體而妙大用者也然卦有定體而爻無定用原其一畫之始以要其六畫之終則内外剛柔無不畢備卦之體質立矣至卦有六爻或隂居陽位或陽居隂位相雜而成用則唯六位之時不同而事物亦異隂陽各以時成豈有定體之可執乎故以時物之見於初上二爻者言初則理㣲而難知上則理顯而易知盖初為卦之本其質未明上為卦之末其質已著本末之分也惟難知故初爻所繫之辭必取其象與占而極擬之惟易知故上爻之終但因初之象占而卒成之固無煩於擬議也夫初上既足該始終之時物矣若夫隂陽賾亂之物雜而陳之剛柔中正之徳撰而出之物有純有雜則辨其物中之是與非徳有當有否則辨其徳中之是與非若是者以類萬物之情以通神明之徳以明得失之報洵非中四爻不備也總而論之六爻既備則天道存亡人事吉凶之理具焉噫人亦要其存亡吉凶之所歸則六爻之義居然可洞晰而無疑矣又況於智者能見事於未形雖不必徧觀六爻但觀卦首之彖辭則存亡吉凶之理具於全體中者已得其槩所思不已過半矣哉要之天下不皆知者所以聖人作易既設卦而復陳爻舉凡天道之消長人事之得失闡𤼵詳明使天下後世知所趨避此聖人所以立開物成務之極也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪此二節又申論中四爻之義也近謂四近君也柔指六言剛指九言孔子意曰易書卦爻之義藴固理無不備矣更以二四言之二與四皆隂爻同有柔順之事功然所處之位則異故其善有不同二多聲譽而四則多恐懼焉盖四之位近於五動則有逼上之嫌所以多懼也然論柔之為道必附陽剛而後能自立逺則難援本不利於逺者二柔而逺於五乃其要歸於无咎而多譽則以二居下體之中其用柔得中故也夫觀二之多譽由於得中則四之多懼又豈獨以近君之故乎更以三五言之三與五皆陽爻同有陽剛之事功然所處之位則異故三多凶危而五則多功能焉盖五為君位而貴獨操得為之權三為臣位而賤有難自擅之勢貴賤之等殊也要之三五皆陽位以柔居之懦弱不足以有為三固多凶五亦安能多功鮮有不危者矣惟以剛居之强毅始足以有濟五固多功三亦不至多凶豈有不能勝其事者耶夫逺近貴賤物也剛柔中正徳也懼譽凶功是非之辨也惟中四爻悉備之學易者洵不可不加之意也觀孔子之言是可見人臣當以剛中之徳佐君有為而人君任天下之重臨御兆民曰有萬幾尤必剛健奮𤼵以作於上則股肱良而庻事康天下未有不治者矣易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉此一章言易具天地人之道也變動謂卦之一體非指隂陽老少之變也物指隂陽言不當謂爻不當位也孔子意曰易之為書以綂體言則渾淪而無外極其廣大以條理言則細宻而無遺又悉備也盖天下之道天地人盡之矣方易之三畫成卦上畫有天之道焉中畫有人之道焉下畫有地之道焉是三畫已具三才矣又兼三才而兩之故有六畫是六畫者非它也上二爻即天道之兼隂與陽中二爻即人道之兼仁與義下二爻即地道之兼柔與剛固三才之道也夫道之變動不居如乾之六畫潛見惕躍飛亢之類各得卦之一體是皆道之變動而謂之爻爻有逺近貴賤之等級森然齊列判然分晰故謂之物物之剛間乎柔柔間乎剛六位雜陳經緯燦然故謂之文是文也有柔居剛位剛居柔位而未必當者亦有純剛純柔而位未必皆當者故吉凶生於其間而為人事得失之象焉是則爻也物也文也吉凶也皆道之所出而三才之所統貫也易誠廣大悉備矣哉按孔子以天地人為三才才之為言以其能有為而為萬物之所利賴也天地以覆載萬物為功聖人承天地以成萬物使莫不得其所故中庸言至誠盡人物之性而可以参贊化育斯所以綂三才而建極也歟易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也此一章原易興於文王而𤼵其所以教人之旨也孔子意曰易之所從來逺矣其復興也時當殷之末世周之盛徳而其事當文王與紂之事耶盖末世則人之詐偽滋熾盛徳則易之道有自傳文王以聖人之盛徳為紂囚於羑里於是處憂患而作易故其所繫之辭皆有危懼之意凡危懼者能使之平安亨利吉无咎是也慢易者能使之傾覆悔吝凶害是也盖出於理勢之自然若或使之是其道為甚大舉天下百物之理平未有不生於危傾未有不生於易者禍福之由皆有必然誰能廢之故文王之作易不過教人以危懼存心終如其始則其要歸於无咎而有平無傾矣此之謂易之道也此聖人與民同患之心存於易書之内者也按孔子又嘗言天之生物必因材而篤栽者培之傾者覆之而書仲虺之誥亦以殖有禮覆昏暴為慎終惟始之戒其與此之言危平易傾懼以終始義有相𤼵明者矣夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知噐占事知來天地設位聖人成能人謀鬼謀百姓與能此一章總言作易教人之功而此四節先言聖人體易簡之理於心可以無卜筮而知吉凶次言聖人作易以成天地之能而使百姓皆與其能者不外此易簡之理也徳是乾坤藴諸心者行是乾坤見諸事者侯之二字衍文亹亹是不倦於趨避之意孔子意曰夫易乾坤而巳矣自其純乎理者名乾乾則自強不息天下之至健也以此至健之徳見之於行易固易也即難亦無弗易而見為恒易易本無險故凡險之幾舉歸坐照以坦蕩明白之𠂻燭之而有餘不待險而知自能見險而不陷也自其順於理者名坤坤則安貞無為天下之至順也以此至順之徳見之於行簡固簡也即煩亦無弗簡而見為恒簡簡本無阻故凡阻之幾無不洞晰以卑約敬慎之念處之而無碍不待阻而知自能遇阻而不困也然此知險知阻豈徒知之而巳哉是有其能矣聖人於未事時心與理㑹融洽於中而莫可言喻能以易簡悦諸心焉及應事時理因慮審精晰於中而無所参雜能以易簡研諸慮焉惟悦心是以吉凶之理皆吾心所素藏險阻與否無不先知之而吉凶有不定乎惟研諸慮是以趨避之幾皆吾慮所宻察險阻與否無不預决之而亹亹有不成乎夫既悦心研慮定吉凶成亹亹而其自然之知又可進推矣是故在天道有盈虚消息而變化以成在人事有語黙動静而云為以起此理之顯者也至天道人事各有吉事必有禎祥以徴其感應如變化有吉則祥徴見於垂象云為有吉則祥徴動於四體此理之微者也其在聖人理之顯者循迹觀變比擬其象於既徃則一定之理所謂器者周知而不爽矣理之微者窮幽察隐推驗其占於将然則先兆之幾所謂來者早知而不惑矣若是者聖人之能事不假卜筮而知吉凶百姓何由與能乎試觀天地設位日以易簡之理昭然示人不能使人皆以易知險以簡知阻是其能猶缺陷而未成也惟聖人闡明此理畫卦繫辭作為易書贊天地所不及教萬世於無窮以成天地之能焉由是人欲定吉凶成亹亹者既先人謀以審其是非而趨避未决又抱蓍問易繼之以鬼謀則吉凶可定亹亹可成而聖人知險知阻之能百姓雖愚皆得與之此聖人所以成能者也要之成能者成之以此易此簡而與能者亦不外此易知險簡知阻之能也己八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈此三節首二節言聖人成能之事使人由卜筮以知吉凶末節即人之辭以明卦爻之辭也告告此險阻言言此險阻也相攻是兩情相觸相取是强為要結叛背理也疑可否未决枝兩歧不一失其守無操持也孔子意曰夫聖人成能其事何如天地之精非畫無以示先天畫八卦或以純隂純陽之象告或以雜隂雜陽之象告矣卦畫之藴非辭無以𤼵後天係爻彖或以全體之情言或以一節之情言矣夫象所告情所言不過欲人知險知阻以趨避吉凶耳而吉凶於何見之卦爻中剛柔雜居如初三五剛也或雜之以柔二四上柔也或雜之以剛雜居而當位中正則順理而得雜居而不當位不中正則逆理而失吉凶不於此昭然可見乎然是吉凶也由象辭以見其體必因變占以逹其用方揲蓍求卦之初隂陽老少變動而未定雖未成卦爻而趨避之利已寓言吉固利言凶而使人避亦利也及求卦既成占决巳著遂分吉凶卦爻之情有消息當否之異而辭之吉凶因焉非以情遷乎情遷何如如卦爻中正相與是愛相攻也情孚而理順故吉生如不以中正相與是惡相攻也情乖而理拂故凶生吉凶以愛惡之情遷矣至於吉凶未判曰悔吝吉凶方萌曰利害又何從生也以逺相取則情雖合而病於疎以近相取則情或暌而嫌於妄悔吝不由此生乎以情相感則交以道義而利生以偽相感則合以私邪而害生利害不由此而生乎悔吝利害又以逺近情偽之情遷矣要之凡易之情固貴近而相得或逺而不相得亦無害也惟近而不相得則以惡相攻所以致凶也以偽相感所以致害也且以不善相取所以致悔吝也夫悔吝利害皆吉凶之屬各推其情如此故曰吉凶以情遷可見聖人作易以成能而衆人必由卜筮以知吉凶者此也夫所謂情遷者豈特卦爻之辭為然即凡人之辭亦可見矣理在人心本自難昧如叛正理者其心多愧而辭慚恧理有可否豈宜遷就如疑正理者其心多惑而辭枝離有徳之吉人養深蓄䆳言不妄𤼵而辭寡無徳之躁人輕浮淺露言不由衷而辭多謗善為惡者毁譽失當其辭浮游而不實失所執守者神氣沮喪其辭屈抑而不伸凡此皆人之辭以情遷者也由人之辭以推卦爻之辭則險阻自無遯情此聖人所以成能百姓所以與能者其為知險知阻一而已矣按洪範惟皇作極凡厥庻民不罹於咎其即此作易教人之義也夫日講易經觧義卷十七
