body:
  text: 欽定四庫全書日講易經解義卷一上經乾下乾上伏羲畫卦有畫無辭自文王繫卦辭周公繫爻辭孔子作彖傳及大小象傳文言傳而卦之理無餘藴矣卦辭統論一卦之吉凶而彖傳則或言卦體或言卦徳或言卦變或言卦象皆所以推明卦義與卦辭相發明者也至於爻辭或六爻合撰或各爻殊趣或卦言剛健而爻以為强暴或卦言隂柔而爻以為貞順或隂陽相應而位不免於咎或剛柔當位而時適過乎中蓋有爻辭與卦辭絶不相𩔖而六爻象傳與彖傳亦各不相謀者彖言一卦之統體爻言各爻之時位其不可為典要固如此矣若夫爻位得中惟二與五而二臣象也五君象也上下之位殊尊卑之𫝑異相濟則有功无應則取戾六十四卦同一㫖也惟大象闡因象命名之理於六爻之外别立一義責在用易之君子學者觀六畫之象玩卦爻之辭而叅合於彖象傳之㫖於以用易殆庶幾焉乾取純陽至健之義故其象為天擬諸物𩔖則為龍其功用則曰時成六爻潛見惕躍飛亢皆時也皆聖人之事也三居人位故不稱龍而徳則龍徳也上處陽極不能無悔而處得其正則變悔為吉也文言反覆申明不越此理大抵合乎時則不過於剛而為羣龍无首不合乎時則當初陽在下急於出潛即宜有悔不待上九之亢矣故曰惟聖人知進退存亡而不失其正卦辭言元亨利貞而爻辭不之及六爻皆龍則四徳無不畢具也他卦主隂陽相應而乾坤不相應純陽純隂以同徳應則不以隂陽應也乾坤二卦之隂陽未有專於一偏而不相為濟者故六爻之後復以用九用六明之此則諸卦所不得而同者矣乾元亨利貞此卦六畫皆奇上下皆乾陽之純而健之至故名為乾而卦辭則即天道以明聖人之徳也乾健也元大也始也亨通也利宜也貞正而固也卦辭即彖辭文王繫乾彖辭曰伏羲畫卦為乾純陽至健有天之象蓋以形體言則謂之天而以性情言則謂之乾人能體乾立極斯人道即天道矣天以元徳始萬物聖人本至健之才以開物前民而元一同於天也天以亨徳長萬物聖人奮有為之力以設施舉措而亨一同於天也遂萬物者利之徳聖人因性制宜使無一物不得其所一如天之利也成萬物者貞之徳聖人化裁曲成使無一物不植其命一如天之貞也析之則為四徳統之不越一乾蓋乾道至大至通本無不宜本無不正體乾者實能法天自强以純心行純政則徳化治功自無不與天合撰耳按元亨利貞之辭見於諸卦者皆為大亨而利於正孔子釋乾彖辭獨分指四徳誠以乾徳渾全不可以他卦例也蓋元亨利貞之道即仁義禮智之徳元亨利貞運於天而本乎乾仁義禮智具於心而原乎性維天之命於穆不已乾之道也至誠無息純亦不已性之徳也故法天在於體乾盡心由於知性其實仁義禮智之性與元亨利貞之天道非有二也帝王欲象天行該聖徳亦惟於性學加之意而已矣初九潛龍勿用此一爻是言有徳無時者宜退而不宜進也畫卦自下而上故以下爻為初九陽數故謂陽爻為九龍性屬陽因取象於龍潛藏也周公繫乾初爻曰初九陽居下位是有可為之徳而阻於時之未遇者其象如龍之潛藏未出者然既未出潛即宜靜以自守若不能藏器待時而稍有露才躁進以輕於一試之意鮮有不致僨敗者矣抱龍徳者慎勿急求用世以自喪所守焉可也按易象雖通於卜筮而君子觀象玩辭原不待卜筮而後可以學易即此爻而論未仕者處之則當隱約以俟時已仕者處之則當奉身而遠遯等而上之以天子之尊而玩此爻或時當主靜或事當謹密皆潛之義也推之諸卦之中雖或專言君道臣道或專指一時一事亦不當膠執卦爻之辭而宜觸𩔖引伸以盡其義如此則自天子以至庶人三百八十四爻皆可用矣九二見龍在田利見大人此一爻是言龍徳之及於物也在田謂處地上大人謂大徳之人指九二言周公繫乾二爻曰九二以陽剛中正之徳當出潛離隱之時位雖未尊而徳已衆著上可致君下可澤民如龍之顯見於田而霖雨足以及物之象此盛徳濟時之大人也人君見之則資其謀猷下民見之則資其教養何利如之按本義謂占者若有見龍之徳則利見九五在上之大人此雖主占法之變通而言而易理變動不居原自如是如九二抱徳用世之士非得人主推心委任無由普徳施於天下而成霖雨之功故其義可以𩔖通而其象可以互見也九三君子終日乾乾夕惕若厲无咎此一爻是言處危地者當知憂懼也乾乾兢惕之意下卦乾之終上卦乾之始故取此象周公繫乾三爻曰九三才既過剛又居高位此危地也一念不慎則尤悔叢生豈能無過賴三性體剛健有履危能戒之象所以終日乾乾警懼上思國家寄託之重下念民生屬望之殷雖至日夕猶惕若不敢懈焉夫以投艱遺大之地為動心忍性之資時時思過即時時求所以寡過事事思危即事事求所以持危雖身處危地而可以無功高震主之嫌與恃才絶物之患矣何咎之有大抵聖人教人學易歸於知懼不獨處危地為然天下事未有不成於敬而敗於肆者凡卦言惕言厲言慎言艱貞皆危其辭以使人免過者也故曰懼以終始其要无咎九四或躍在淵无咎此一爻是示人以妄進之戒也或欲進未定之辭周公繫乾四爻曰九四以陽居隂志主進而不果於進其位在上下之交其時在進退未定之際雖事𫝑若有可為而猶遲疑審顧謀出萬全而後動其象如龍之或躍而起而仍未離於淵者然時止時行知進知退又何輕躁妄動之咎哉按先儒釋此爻皆言舜與湯武之事而推其義凡人𫝑位崇高身任天下之重者皆可以此爻擬之惟是處多懼之地能常存難進之心則其樹大勲立大業皆自度乎力之所能為與時之所不得不為而非僥倖以立功名者所可得而妄擬也已九五飛龍在天利見大人此一爻是言聖人在上而萬物樂覩也五天位大人指九五周公繫乾五爻曰九五以剛健中正之徳居至尊之位乗時首出功業休明有龍飛在天乗風雲以霖雨天下之象此徳位兼隆之大人臣民所共仰戴者也君子見之則可以得位行志小人見之則可以養欲給求何不利之有按本義謂有九五之位則利見九二在下之大人其義與二爻互相發明蓋聖人繫乾之二五即首發上下應求之義以見體乾圖治者必貴乎同徳之相濟而在九五居尊臨下汲汲得賢以自輔較之九二得君而事者其利更有不同尊卑異位故也上九亢龍有悔此一爻是言處𫝑位之極者當知所變通也亢過於上而不能下也周公繫乾上爻曰上九居卦之終陽極於上而不下如龍之飛入於天而不復潛蟄於淵之象是亢龍也夫時當盛滿不能持滿戒盈則所處必致失中而所往不能無過動而有悔其能免乎既知有悔而以亢為戒則持以惕而返於潛庶幾不失其為龍徳也矣蓋易之大義最忌滿盈日中必昃月盈必虧天道之不容亢也物窮必變器滿必溢人事之不容亢也聖人不能不處亢之時而有善處乎亢之道故天不能窮聖人而聖人常能御天亦曰隨時處中而已用九見羣龍无首吉此一節是申明體乾之道在以柔濟剛也羣龍謂六陽无首謂變剛為柔周公於乾卦六爻之後復繫之以辭曰乾六爻皆陽則其數皆九九者陽數之極也體乾之道者當思陽極則亢而濟之以柔以善其用如羣龍之剛皆在于首惟能變剛為柔則其首不露而其用不測人之見之有若无首者然本此道以出治負創建之才而不自矜其才具絶物之智而不自驕其智仁以輔義愛以濟威圖事則事無不理馭民則民無不安何不吉之有大抵帝王治法剛柔相濟必無偏勝之理刑名法律之治剛勝而偏者也虚無清靜之治柔勝而偏者也且以操切為剛必流於殘忍則並不得謂之剛以姑息為柔必流於委靡則並不得謂之柔内健而外順體嚴而用和庶有得于用九之義而無失中之弊矣乎彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧此彖傳是釋乾彖辭而合天道人事以明乾徳也彖獸名取其能斷故卦辭為彖辭傳為彖傳六位指六爻之位乗憑馭也太和天地之生氣也孔子釋乾彖辭曰乾之義廣大悉備無所不該而惟天足以當之惟法天之聖人足以配之試觀天道元亨利貞乾之四徳而統言之皆元徳之運行也大矣哉其惟乾之元乎天以生物為心而元則為生生之本當氣機方動萬物初萌無一物不資元之氣以為形之始亦無一物不資元之理以為性之始推至成形成性之後總此一元之徳鼓盪無窮是不獨為萬物之始而且合亨利貞之天徳皆統貫於其中矣此乾元之大也由是以觀乾之亨隂陽之氣氤緼既久一旦由靜之動敷布而為雲和􅂥而為雨凡品彚之物迎此化機皆潛滋黙長一一形露如水之流而莫禦者然蓋資始時氣已畢具而至此乃有其形資生時形已悉萌而至此乃流於外此乾之亨也惟聖人與天合徳觀天道之元亨即大明於四徳貫通之義元為始貞為終而由貞起元不終則無以為始終與始之交相循環總一時之所為而已以此知乾爻六位變動不居正以潛見惕躍飛亢之時各有不同故龍徳運行各以時而成位於是乗此六龍之徳隨時處中時宜顯則顯時宜晦則晦時宜舒則舒時宜斂則斂天道之消長自我御之而行則所往無不亨通可知矣是聖人之元亨一天道也又進觀乾之利貞萬物之理不變則不通不化則不成惟乾道運行由變而之化於是萬物生意充足凡受於天之性與天所賦之命皆各得其正無有欠缺而且氣機就斂萬物即隨之以入方初生時隂陽㑹合冲和之氣至此保固凝合皆復返於其始此天道以收斂為發舒之本以歸藏裕宣洩之用成終成始循環無迹乃乾之利貞也其在聖人既法天之元亨以生物即法天之利貞以成物凡教養生殺之事已盡行於乗龍出治之時至此則恭已穆清首出於臣民之上而深仁厚澤淪洽於人心風動化行感孚於中外萬國之咸寧與萬物之各正保合俱同鼓舞於太和元氣之中是聖人之利貞一天道也大抵造化之理通乎人事性命之學合乎治功孔子傳乾彖而天人之義備矣乾為天之性情而元則變化之所從出是即太極也流形於亨各正於利者一物各一太極資始於元保合於貞者萬物統一太極太極者理也而氣在其中太和者氣也而理在其中明乎此則帝王在上仁以育萬民義以正萬民張弛翕闢總一太極自然之用而所謂太和在宇宙間者即其應天時贊化育之極功而已寧有二致哉象曰天行健君子以自强不息此象傳是勉人法天以修徳也象像也卦之上下二體為大象六爻辭為小象孔子既作彖傳以釋卦辭又作象傳以明卦象之義釋乾象曰乾天徳也而上下皆乾則有天道運行之象天行一日一周終古不息非極天下之至健不能君子觀於乾象以人既受天命以生即宜與天同運乃天運不息而人未免有息者私欲累之耳於是克已自强靜專以立體而所以為萬事之根本者無一時或息也動直以致用而所以善萬事之化裁者無一時或息也天理周流始終無間一如天行之一日一周者然而乗龍配天之業舉而措之裕如矣蓋天與人初不相遠性與反原可同歸一日自强即一日之健也一事自强即一事之健也惟日進而不已則希聖希天皆其擴而充之之事所以成湯聖敬日躋武王以敬勝怠視堯舜之精一執中若有安勉之别而及其成功一而已矣潛龍勿用陽在下也見龍在田徳施普也終日乾乾反復道也或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可久也用九天徳不可為首也此象傳是分釋乾六爻之象而推明繫辭之義也反復重復踐行動必於道也造起也謂在天位孔子釋乾六爻辭曰文王之繫卦辭示象於全體之中周公之繫爻辭復示象於各爻之内所以教天下後世者至明且切矣試舉乾爻之象觀之初九曰潛龍勿用謂九為陽徳而初居下體有可為之徳而未遇可為之時也九二曰見龍在田謂其徳既盛則其化自神如龍之霖雨及物而所施無不徧也九三終日乾乾謂體道之心無時敢懈反復體驗以求去危而即安也九四或躍在淵謂當欲進之際更加詳審則謀出萬全而可免躁動之咎也九五飛龍在天謂大徳之人乗時首出如龍之上騰於天而萬物皆利見也至上九亢龍有悔蓋以天道忌盈進極則退盛極則衰理與𫝑皆不可以久也六爻皆陽而繫以用九蓋以太剛必折濟之以柔則有功用為物先則致敗故天徳雖尊不可以為首也大抵易之為道隂陽消長而已聖人扶陽而抑隂故遇陽則進之遇隂則退之而於乾之六爻予其潛戒其亢復教以无首者非謂陽不當貴也誠以陽徳至健而一有恃剛自用之弊則反為欲所屈矣故論天道則曰下濟論君道則曰下交論處世則戒壯往論濟險則在需時皆以柔濟剛之道蓋必如是然後陽徳為無弊耳文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也此一節書是申言元亨利貞之徳原於天而具於人也文釋也言指彖爻之辭自此至末節皆文言也㑹聚集也和謂無乖戾幹如木之有身也孔子於六十四卦分作彖傳象傳以釋卦爻之辭又以乾坤二卦其道至大而其六爻之義為至廣也復作文言釋之以盡其藴釋乾彖辭曰元亨利貞之義既詳見于天道矣試即天之賦於人與人之全夫天者觀之所謂元者天之所以始萬物也而賦於人則為仁人性之中衆善悉備而元則得之最先統之最全百行由此而出蓋善之長也所謂亨者天之所以通萬物也而賦於人則為禮人性之中衆美各殊而亨則天理之節文人事之品節百度於此㑹歸蓋嘉之㑹也利者天之所以遂萬物也而賦於人則為義義以定分尊卑上下制之極其嚴而皆合乎人心之宜無所矯强是義之和也貞者天之所以成萬物也而賦於人則為智智以察理經權常變辨之極其明而預立夫萬事之基無所摇奪是事之幹也大抵在天則有理氣在人則有性情元亨利貞理也生長收藏氣也有是理即有是氣仁義禮智性也惻隱羞惡辭讓是非情也有是性即有是情惟天之理氣全具於人故人之性情無一不善易書教人盡性而推本於天命正以天人本無二理而人不當以氣拘物蔽自遠於天也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞此二節書是言君子之備徳在能體乾也和義謂得其宜貞固正而固也孔子曰論天命之原元亨利貞之四徳本人所同具而論率性之學則衆人能行之者鮮矣惟君子以仁為心之徳凡其所存所發莫非天理之流行則雖倫𩔖至衆而度量之含𢎞自足以怙冒天下而有餘矣以禮為身之範凡其動容周旋莫不萃集乎衆善則雖經曲至繁而一心之秩序自足以節宣禮治而有餘矣以義能利物而後可以言和於是因物付物使各得其所利而天下之人既以分相安則自以恩相接豈不足以和義而無乖戾乎以智能有守而後可以立幹於是擇正理之所在固守之而弗去而天下之事既裁制之有方自推行之有本豈不足以幹事而無阻礙乎君子之能行四徳如此夫人皆受天之徳而獨君子能行之者何也自人狃於氣質蔽於物欲而四徳之運行遂有時而息惟君子法天行之健以全天徳之剛由是本此健以體仁嘉㑹則仁禮之徳行矣本此健以利物貞固則義智之徳行矣卦辭不徒曰元亨利貞而必首之以乾者誠以天道惟乾故四徳屬於天聖人之法天亦惟乾故四徳歸於聖天人合一之道一乾之至健而已故曰乾元亨利貞夫天徳之所以至健者不外靜專動直而靜專者健之體動直者健之用是靜又主乎動者也宋儒謂聖人主靜立人極又曰無欲故靜然則君子體乾之功其必制私主靜而後能配天行之健哉初九曰潛龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之􅃀乎其不可拔潛龍也此一節書是申乾初九象傳之義也易謂變所守樂謂道行憂道不行也初九曰潛龍勿用其義何謂也孔子曰初九有神明變化之徳而潛藏在下是有龍徳而隱於下位者也蓋惟龍徳剛健無欲故外物不足以奪之常人行履不篤易為習俗所移初則自守其徳不隨世而變易也常人學力未堅易為名譽所動初則自晦其徳不枉道以求名也惟不易乎世則安於遯世矣雖終身遺佚而其心處之泰然何所悶焉惟不成乎名則不求見是於人矣雖舉世謗毁而其心自信有素又何所悶焉是以道有可行之機斯霖雨足以及物此初之所甚樂者樂則出其龍徳以行於世而無所矯强也道無可行之機斯庶物無由各正此初之所甚憂者憂則守其龍徳以違於世而不敢輕試也總之用􅃕之權在人而行藏之道在我身可隱而不可屈道可潛而不可枉知之既明守之復固􅃀乎其不可拔豈尋常隱遯之學所能及哉信乎初之以龍徳而潛處於下位也蓋聖人之學吉凶與民同患意本在於用世不欲獨善其身但既欲行道於天下則必審天時度人事實能有濟於世然後一出而為人所利見故六龍之徳有隱顯而無淺深初之潛與五之飛總一靈變不測之用其不同者時位而已所謂易地則皆然者也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也此一節書是申乾九二象傳之義也正中謂處潛躍之中善世善蓋一世也九二曰見龍在田利見大人其義何謂也孔子曰九二有剛健中正之龍徳而正當不潛未躍之時位雖未尊而徳則已衆著試於其言行觀之言在人倫日用之間者庸言也庸言人所易忽而二必加信焉行在人倫日用之間者庸行也庸行人所易懈而二必加謹焉信謹如此則邪已無自入而誠已無不存矣乃其徳愈盛其心愈敬凡私欲之易乗者必閑之又閑使不至於或萌實理之在心者必存之又存使不至於或間由是備徳在身言皆可師行皆可法善蓋乎一世矣而虚受之至又謙卑自牧而不伐焉由是乗時利物上格君心下正民俗徳施於極博矣而功用之神又遷善不知而幾於化焉此雖未居人君之位而君臨天下之徳已早見於出潛離隱之時易所謂見龍在田利見大人者正以其徳為君徳故直與九五同稱為大人也大抵誠敬者聖學之源而存誠之功又必先之以主敬二之閑邪即主敬之學也邪有自外入者有自内出者不邇聲色不殖貨利所以閑其外也不顯亦臨無斁亦保所以閑其内也内外交養顯微無間帝王心學相傳孰有踰於此乎九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣此一節書是申乾九三象傳之義也至理之極致也終理之歸宿也九三曰君子終日乾乾夕惕若厲无咎其義何謂也孔子曰君子處危疑憂懼之地惟恃徳業以為自全之道故九三之乾乾惕若非徒憂而已實欲其徳之進而業之修也徳何以進凡人無真實之心則私偽日萌而徳日損惟三内主忠信存於心者無一念之欺動於慮者無一事之妄所由進徳於光大也業何以修凡人無篤行之學則虚辭日盛而業日荒惟三修省言辭一言之發必有一行以應之是其出言之時即為誠所植立之地言無虚罔行有實效所由居業於不遷也若其所以用力則何如徳之極致謂之至而其微渺則為幾君子知至之所在而本忠信之心以至之心與理相洽則理之幾微皆為吾心所黙識可與幾也既有知幾之智復有决幾之勇而徳不益進乎業之歸宿謂之終而其裁制則為義君子知終之所在而本立誠之心以終之身與理相安則事之經權皆為吾心所黙運可與存義也既有見義之明復有守義之實而業不益修乎三之終日乾乾夕惕若者其事如此是故徳愈盛而禮愈恭業愈大而心愈小居上位以臨下則持盈而不驕忘乎其為上也居下位以事上則勝任而不憂安乎其為下也故其身處危地宜若有咎而終日乾乾無時不惕則上安下和處无不當雖危无咎矣三之得免於咎也豈倖致哉蓋知至知終即格物致知之事忠信立誠即正心誠意之事其進修不已則日新又新之功而乾乾惕若則緝熙敬止之心也詳繹九三一爻而内聖外王之學無不畢具已九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎此一節書是申乾九四象傳之義也邪枉道而冒進也羣謂在下位之羣九四曰或躍在淵无咎其義何謂也孔子曰乾之九四不果於上而又不安於下遲疑於上下之間而无常位者迹似有冒進之邪而其實非為邪也不决於進而又不安於退躊躇於進退之間而无恒處者迹似離在下之羣而其實非離羣也蓋龍徳之君子徳已進矣業已修矣其意本期有為於天下特患時未可為則不敢躁動以取咎耳今及此可進之時正欲以忠信之徳發為濟世之徳以立誠之業著為配天之業而又何敢避无常无恒之嫌以致坐失事機也哉四之无輕進之咎職此故也蓋天下躁進者有咎失時者亦有咎躁進而至於僨事失時而至於廢事其咎不同而其為害則一也聖人既不欲人倖進而又恐人借持重為口實悞幾務於目前故於乾之九四特申其說云九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其𩔖也此一節書是申乾九五象傳之義也同聲同氣俱泛指物𩔖言親上指動物親下指植物九五曰飛龍在天利見大人其義何謂也孔子曰九五之大人尊居天位𫝑分逈絶於人而天下皆利見之者惟其性情同也試以物𩔖推之凡聲之同者彼倡此和無不相應凡氣之同者彼感此應無不相求水之行必流濕水性趨於濕也火之炎必就燥火性趨於燥也龍興而雲集雲自從夫龍也虎嘯而風生風自從夫虎也惟此六者皆同𩔖相感召而况人為萬物之靈聖人為人𩔖之首乎所以聖人作而在上則凡萬物之在下者莫不近光利見一如聲氣之相孚水火之相就而風雲之相感焉此豈聖人有意於天下之丕應哉蓋聖人之於民亦𩔖也本乎天者為動物動物則同親乎上本乎地者為植物植物則同親乎下天為純陽而動物亦屬乎陽故從陽之𩔖也地為純隂而植物亦屬乎隂故從隂之𩔖也萬物之於聖人戴之如天依之如地孰非以𩔖相從而自動於其所不容已哉所以古帝王有見于此因人心之同施推恩之政教思無窮正民徳也容保無疆厚民生也對時以育物敬民時也養賢以及民重民牧也而推其本原必盡已性乃以盡人物之性一喜一怒惟恐拂乎人情一賞一罰惟恐違乎衆志聲色貨利之欲既不使溺於中而巧令孔壬之徒復不使蔽於外則人主之於天下常如呼吸之相通而一體之相恤也此所以為利見之大人也與上九曰亢龍有悔何謂也子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也此一節書是申乾上九象傳之義也四以下皆從五而不從上故曰无輔上九曰亢龍有悔其義何謂也孔子曰從來滿招損謙受益天之道也今當盈滿之地而一以亢處之則其悔有不可勝言者如居卦之上可謂貴矣而亢則非常守貴之道是雖貴而无位也居卦之上可謂高矣而亢則不能得羣下之心是雖高而无民也下位之賢未嘗無人而亢則高賢晦跡不樂為我用是雖有賢而无輔也无位則無以安其身无民則無以率其下无輔則無以自立於上動而有悔固亢所必致履斯地者可不思所以慎處之哉蓋履亢者天時致悔者人事易書以道義配禍福故不以禍福之至諉之於天而必歸咎於人事之不善如乾之上貴而知懼則有位矣高而善下則有民矣屈已以求賢則有輔矣窮上反下何悔之有所謂古今有不能盡之人事而無不可挽之天時者此也潛龍勿用下也見龍在田時􅃕也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此七節書是再申象傳之義也行事謂進徳修業之事試審度也窮亢極也孔子既詳釋乾爻之義復約其辭而申言之曰所謂潛龍勿用者非其徳不足以利用因位處於下故退而安於潛也所謂見龍在田者非其徳不足以居尊因暫為時􅃕故見而止於田也所謂終日乾乾者非徒為無益之憂實進徳修業力行其所當行之事也所謂或躍在淵者非故示遲疑之迹實審時察𫝑自試其所可進之機也飛龍在天者身居上位得施雲雨之澤故治功成而物皆利見也亢龍有悔者時處窮極不免盈滿之虞故災悔生而動輙得咎也至於乾爻皆陽而繫以用九蓋以乾之元徳包舉衆善不專恃乎陽剛而能以柔濟之故其用人行政悉合乎大中至正之道而天下自無不治也乾爻之義約而言之又有如此者大抵乾六爻各有用九之義潛見惕躍皆相時而進不敢自恃其剛至於五則徳位時俱得其中矣上稍過乎中因以亢悔示戒聖人之意恐後世不知以柔濟剛故特繫以用九又恐不知所以用九故特冠以乾元明於乾元之義而諸爻之克當其位者有一不本于剛柔之相濟者乎潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則此七節書是又申象傳之義也潛藏指造化言革謂變革孔子以乾爻之義無窮又從而申其說曰潛龍勿用者謂當陽氣未通之時生意潛藏于下故君子以陽徳之伏處法造化之收斂也見龍在田者謂龍徳出潛之始功用未顯於時而天下被大人之徳化者已成文明之俗也終日乾乾者謂九三處危疑之時行兢惕之事是時當戒懼而能與之偕行者也或躍在淵者謂九四離下位而上升乾道至此適當變革是進而不輕於進者也飛龍在天豈徒據尊位而已惟其有天徳故宜居天位是乃位乎天徳者也亢龍有悔豈徒逞才𫝑而已惟其任天時之窮故不能通人事之變是殆與時偕極者也乾元用九豈徒事渾厚而已惟其能體天之道故能同天之化是乃見天之法則者也乾爻之義更端言之又有如此者蓋易書之義理無窮聖人之學易亦引伸無盡以乾居六十四卦之首故特取其象反復申明之或以時言或以位言或以造化言或以人事言正所謂廣大悉備變動不居者至於乾坤而外雖無文言而繫辭傳錯舉諸爻以發其義是即文言之㫖也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也此以下是文言第五節申釋首章之意此四節是即物理明乾之四徳而歸本於乾之大也乾始即乾元而亨寓其中不言所利即貞也剛指體健兼體用中謂所行得中正謂所立得正純粹是四者之至極精是純粹之至極也孔子復申彖傳之義曰道之運於天者無形而化之形於物者可見所謂乾元者蓋氣機初動萬物皆資以為始而其自無而有自微而著發榮滋長遂有不可遏之𫝑非即物之始而亨者乎所謂利貞者蓋當元亨之時萬物之性情已畢露於外而其性情之收斂歸藏實理充足必至利貞時始見則乾之利貞非即物之性情乎夫析之雖有四徳之名而合之總屬一元之貫所以乾元資始不止於始而已為能長養亨通以嘉美之利利濟天下之物而且使生物之理保合於既生之後而莫能名言其所以然統天之徳不其大矣哉然而元之徳又乾之所統也大哉乾乎專言其體則四徳之運行無所屈撓何其剛也兼言其用則四徳之通復無所止息何其健也言其行則四徳之遞嬗無過不及可謂至中言其立則四徳之分屬無少偏倚可謂至正且剛健不雜於隂柔而極其純中正不雜於邪惡而極其粹純粹之至無迹可指而又極其精乾之大不可一言盡者如此所以四徳畢該而及物之功無所不備也夫孔子形容乾徳至此已極而其本則不外一誠宋儒周敦頤曰元亨誠之通利貞誠之復蓋天地之内無非實理流行在天為命在人為性自性而發則為情情之善由於性之善性之善由於天命之無不善是以剛健中正之徳全具於人而元亨利貞之理無物不有惟視人能法乾而已矣六爻發揮旁通情也時乗六龍以御天也雲行雨施天下平也此二節書是言天道具於易而聖人能體易以法天也發揮陳示布列之意情即乾之情旁通謂曲盡孔子曰乾之徳至微難名而能闡之使顯者莫如易今觀乾卦六爻布列潛見惕躍飛亢位既不同時亦各異凡天道顯藏動靜之情變化不測者皆於六位時成中曲盡其義則易道一天道也惟聖人知天道備於易而乾之六爻具有神龍變化之徳於是因時建事乗此六龍之徳以運於政事之間其治洽化流直與天之雲行雨施無異而天下之被其澤者遂生復性翕然和平亦與物之各正保合無異觀聖人法乾之功用如此而乾徳之大從可知已夫元亨利貞者乾之徳而文言以屬之君子天人同一體也雲行雨施者乾之功而文言以屬之聖人天人同一用也約言其義則一乾元足以盡之矣體乾者法天之所以立命體元者法天之所以為心全體大用直一以貫之耳君子以成徳為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也此以下七節是復申象傳之義此一節是釋潛龍所以勿用也成徳已成之徳日可見之行謂指日可待也孔子復釋乾初爻曰從來徳為行之本行為徳之用二者相因不容偏廢君子修身體道徳已成矣以成徳而措為事功宜乎旦夕之間即可見於實用乃乾之初九剛徳既成而猶以勿用自守何哉蓋徳以行彰而行以時顯初九居卦之下時方處潛所以謂之潛者機㑹未逢身隱而未見於世勲業有待行立而未底於成雖夙負大有為之才而時位不足以濟之則終不可枉道以求用是以君子上觀天時下度人事寧斂其徳以自守而不敢急於用以失身此其所以為龍徳也不然聖人志在用世豈其樂於隱遯而不欲使大業之成立哉以此見聖賢用世之學與豪傑之士踴躍功名者不同名欲自我立功欲自我成時未至而廹於自見豪傑之士有之而聖賢不然或出或處惟其時之當然而已初之弗用所謂宜潛而潛適當其可者也其終於不用則為簞瓢之顔子其處下位以待用則為居莘之伊尹耳君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也此一節是釋乾二所以為大人也寛優游漸進之意仁行謂不為私欲所奪也孔子復釋乾二爻曰九二未居大人之位而天下皆以大人尊之此非以其位以其徳也夫成徳之功必由學入君子知天下之理散寄於物非遜志以典學無以㑹其全於一心也學焉而多聞多見研索夫古今事物之變而散者無弗聚已所學既博不能無疑非虚已以下問無以晰此理於一心也問焉而親師質友窮極夫是非得失之歸而疑者無弗辨已辨論既明可以坦然居之矣而君子又戒其欲速也養之以寛使優游涵泳心與理洽而後徳之積於内者融㑹而貫通焉蓄積既裕可以毅然行之矣而君子又慮其易雜也守之以仁使踐履真純心與理一而後徳之見於事者周流而無間焉聚與辨入徳之始事也居與行進徳之終事也聖學至此粲然大備矣易曰見龍在田利見大人正以君子積學成徳雖未陟尊位而君臨天下之徳已具此大人之所由稱而萬物之所以利見也以此知聖學之成知行合一而究其極知易而行難仁以行之即所謂法天行健自强不息也體於心以制私為仁及於物以利濟為仁制私者其體利濟者其用體立用行而大人之徳成矣九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣此一節是釋乾乾兢惕所以无咎也九陽爻三陽位故曰重剛孔子復釋乾三爻曰乾之九三必乾乾惕若乃得无咎者何也九三以陽居陽是為重剛質性既傷于過銳而又居下之上不得其中言乎上與九五居天位者不同𫝑近崇高則嫌於偪主也言乎下與九二居田野者不同位隆朝宁則慮其驕人也君子處此物望難副讒謗易生是時之可危未有過于此者所以因時順處乾乾兢惕有徳而不敢自恃有業而不敢自矜力去其過剛任質之偏而實行其進徳修業之事如是則雖身處危地而得免于咎矣從來事變無窮所以處之之道剛與柔而已剛柔無定位所以善其用者中焉而已易之言中與不中有就其位言者有就其徳言者乾之三四皆所處之位失中而所行一有不當則其咎即在人事故三四之憂疑皆能隨時修徳以善處其位此君子持危之學也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎此一節是釋或躍在淵所以无咎也四非陽位重字疑衍文孔子復釋乾四爻曰乾之九四所以得无咎者何也九陽當四隂之位雖質禀剛强而居上之下不及乎中言乎上則分屈於至尊而不在天言乎下則望隆於百職而不在田言乎中則進修之學已終乗時之事方始而不在人此進退未定之幾行藏可疑之地也君子處此欲進而恐失於躁動欲退而又恐失於後時故或之或之者正其熟思審處疑而未决務求天時人事之歸以為樹功立業之本者也慮善而動所往合宜何咎之有夫天下事率意徑行者動而多悔遲回却顧者績用弗成故始貴乎能疑繼貴乎能斷乾之九四獨利於用疑者為其負陽剛之才居得為之位不難於遇事勇决而難其觀變審而識時豫也不然聖人豈欲人積疑生玩而致阻其任事之心也哉夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎此一節是詳指九五之徳以明天下所以利見也先天謂創舉未有之事後天謂效法已然之理孔子復釋乾五爻曰乾之九五為天下所利見者惟其以道為體故咸尊之為大人也夫大人者以剛健中正之徳君臨萬民舉一世之大皆在其覆載之内以視天地之覆載萬物生成無私者同一自然之功化也而不與天地合徳耶附麗於天地而貞明者日月也大人之徳以誠明為體以光被為用與日月之無私照臨者合焉錯運於天地而成序者四時也大人之徳有隂陽不測之施有因革自然之理與四時之無私運行者合焉天地之功用見於惠吉逆凶者鬼神也大人之徳有好善惡惡之誠有彰善癉惡之政與鬼神之無私禍福者合焉徳之同於造化如此所以大人行事無一不與天相通凡天下有其理而無其事者是天之所未為者也大人則先天而為之如敘五行以厚民生備百物以前民用極其思慮之所至黙與道契而行之無不當理即天之不違於大人矣凡天下有其理而並著其迹者是天之所已為者也大人則後天而為之如天有典禮而我惇之庸之天有命討而我刑之賞之酌乎事𫝑之所宜順時而動而行之無不中節即大人之與天為一矣夫天體高遠若不能遽格而道之所在則人定而天從之天且不違而况人得天之道以生者乎况鬼神承天之道以行者乎其不能違於大人固無疑矣所謂聖人首出而天下皆利見之者此也大抵天之從違不可見可見者人事之順逆耳人事順則天心亦順人事拂則天心亦拂大人但求其事之有順無拂而幽明上下自無不應其修徳也盡人以合天其出政也奉天以治人總不外此大中至正之道而已道者萬化之本原天人之樞紐也亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎此二節是釋亢龍所以致悔而又申言處亢之道也進退以身言存亡以位言得喪以物言孔子復釋乾上爻曰凡人履極盛之地惟守正則不失中亢之為言蓋與時俱亢而失其正者也即人身而論有進必有退者理也乃徒知有進而不知有退其究也必不免于退也即居位而論有存必有亡者理也乃徒知有存而不知有亡其究也必不免于亡也即物理而論有得必有喪者理也乃徒知有得而不知有喪其究也必不免于喪也蓋天下數窮理極不能已於通變者雖造物亦無如之何而處窮極之時思變通之道非與造物為徒者不克幾于此矣其惟聖人乎聖人知進之極必有退之幾則進不忘退而不失乎進之正焉存之極必有亡之幾則存不忘亡而不失乎存之正焉或警于未然先時而預防或戒于將然臨事而加謹彼衆人蔽于欲而不能前知賢人知其理而不能即决皆不得其正者也其惟聖人能明于處亢之道斯潛見惕躍無不乗時而合于天則乎要而言之聖人行事惟義是從義之所應為者聖人必不逆計其難而畏避以謝責義之所不可為者聖人亦必不姑試其可而徼倖以漫嘗所謂不失其正者擇是非非擇禍福也計順逆非計利害也卒之所行合義而福與利無不歸之全易之理所為教人以趨避者孰有外於是哉日講易經解義卷一
