body:
  text: 欽定四庫全書日講易經觧義卷十兌下艮上天下之事有不當損而損者損下益上損民益君是也有當損而損者省文存質去奢崇儉是也聖人畫卦以損下益上示戒而以損所當損為法統觀六爻下體本乾三畫皆陽陽過於盈則損乎陽上體本坤三畫皆隂陰過於虚則益乎隂此一卦之㫖也析觀六爻初二以益上之道言初居下而益四量而後入故曰酌損之二剛中而益五道義自持故曰弗損益之三四以取益之道言三陽上而隂下是去其異已者故曰損一人四資剛以濟柔是勇於改過者故曰損其疾五上以受益之道言五體柔居中為虚心好賢故曰或益之上居上益下為因民而利故曰弗損益之此六爻之㫖也大抵損之時貴乎損所當損而必本之以誠誠以存質則禮亦可殺誠以崇儉則用無不節推之初遄徃二利貞誠於事上也四使遄五或益誠於虚已也上弗損誠於益下也至六三一爻卦之所以為損者也戒其三而雜取其兩而專者貴於致一也此又損之精義也宜彖辭首以有孚為訓哉損有孚元吉无咎可貞利有攸徃曷之用二簋可用享此卦兌下艮上卦體損下卦之陽益上卦之隂卦象損兑澤之深益艮山之高皆有損下益上之義故名為損卦辭言處損之道既示以至誠之應而又酌其用雖至薄而無害也文王繫損彖辭曰上之不能不取於下者勢也然當損之時國用固不可缺而民力亦易以匱於此而復示以侈則民有難堪而将至於不繼故必省文以存質去奢以崇儉凡上而朝廷外而軍國一皆示以誠實悃愊之意而煩文縟節皆所不用是之謂有孚也是之謂損所當損也誠能若此則其政尚忠其俗尚愿可以追太古之遺何吉如之且不傷財不害民而無不節之嗟何咎之有自其行之一時若為權宜之計耳而要之誠則可乆即一時可也千萬世亦可也是可貞矣自其行之於上若為救世之權耳而要之誠則可通即行之君可也行之萬邦臣庻亦可也是利有攸徃矣夫損而有孚則有四者之應是有孚者致用之本也而其用果何如哉蓋國之大事莫大於祀而時當可損則雖儉而不病於菲茍感以孚信之誠而畧其虚文之飾即二簋之薄亦可用享矣祭祀可損况其他乎夫損非上所當行也而有孚則可行祭非上所當損也而有孚則可損處損之道誠莫切於有孚之用矣按釋此卦者謂於不得已之時不得不取足於常賦之外但能有孚則民自無不曲諒耳竊謂此後儒之臆説非知聖人繫辭之㫖者也先王之制有節用無加賦魯年饑用不足有若猶以盍徹告之豈因不足而遂可賦外取民乎且古者三年耕餘一年之食九年耕餘三年之食雖有凶荒民無菜色何至闕軍國之需也茍且之術後世無備者為之安得以為有孚之道乎既非有孚一時且不可行况欲以為長乆之規乎損之義葢言盈縮随時禮稱其情則殺禮不為嫌用適其宜則儉用不為固祭祀尚然凡百用度之間賓客燕享好用匪頒之類皆在所損可知此謂有孚則眞有孚矣誠萬世遵行之而無弊者哉彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行此彖傳是釋損彖辭以見損之義無非與時為宜也孔子釋損彖辭曰卦之名為損者蓋以損下卦上畫之陽益上卦上畫之隂是取閭閻之財以充府庫之用損下而益上者也但君之富藏於民民既窮於所損則君不得以獨益是損之道勢必轉而歸上矣此所以為損也夫當損之時而誠有孚損其所當損則吉而无咎貞而利徃固不必言又曰曷之用二簋可用享者豈專以薄為道哉蓋天下時而已時當豐而豐即大牲殷薦不為奢時當儉而儉即二簋不為薄是各因其時而非謂其可常用也且是時也豈獨一享祀為然哉天下之事凡理之當然與數之不得不然者皆時也觀之卦畫則損下卦之剛以益上卦之柔者非他也時有所當損則陽不能以常伸時有所當益則隂不能以常屈此皆理數之不容違者也觀之物理則損其進極之盈以益其退極之虚者非他也時不可以終盛盈未幾而損随之時不可以終衰虚未幾而益随之亦皆理數之不容違者也卦畫以時而成物理以時而變處損之道豈有能外時者哉按上下相闗本同一體益下則雖不加賦而用自有餘損下則雖善聚財而用日不足不幸而遇損之時但當節用以厚民不可剥民以奉已即九廟之享在所宜節况其餘乎此無他天之運存乎時君之行視乎天損益盈虚之間有必然之道焉雖欲不變豐為儉不能也常存此心則時贏尚當從絀而時絀豈反可舉贏也哉象曰山下有澤損君子以懲忿窒欲此象傳是言君子治心之功也懲懲戒也窒遏絶也孔子釋損象曰山下有澤損兌澤之深益艮山之高損之象也君子體之以為為學之要無如損吾心之所當損焉吾心原自和平偶有所觸遂𤼵而難制而忿生矣忿心一生則不能觀理之是非而為血氣所使君子當忿之未起急宜懲之化躁以恬預㧞其忿之根則心體日休安於寧謐之天矣吾心原自潔清偶有所誘遂動而難遏而欲萌矣欲心一萌則不能辨念之公私而為外物所移君子當欲之未溺急宜窒之閑邪存誠預杜其欲之隙則心境光明㳺於粹羙之淵矣此誠得治心之要者歟按忿欲人所同患而有天下者闗係為尤重蓋人君勢處崇髙富有海甸雷霆之威不可嚮邇嗜欲之奉無有窮極稍一任意而妄生於内物誘於外其害有不可言者古之帝王守敬以澄其原主静以絶其誘戒懼慎獨之功既至而見諸行事𤼵皆中節必一怒以安民而後所忿者皆義理之勇矣必欲仁而得仁而後所欲者皆天理之正矣初九巳事遄徃无咎酌損之象曰已事遄徃尚合志也此一爻是言初能盡益上之忠而又示以量巳之智也巳止也遄速也尚指六四周公繫損初爻曰初九當損下益上之時而有陽剛之才上應隂柔之六四是責難之任在我矣於是輟其所行之事汲汲然速徃以益之無非求盡我之心而損彼之疾則事上之責巳罄而可以无咎矣然初下而四上以分言則殊也以情言則踈也雖有欵欵之誠安能必上心之我諒乎又當量而後入因事納誨相機進言視上之所以待我者何如而酌量其損之淺深否則未信而諫必有冐昧之譏巳之遄徃者何以得効其忠而終无咎也哉孔子釋初象曰初之己事遄徃者夫豈造次以干上乎初之志固欲損四之疾而四之志亦欲求助於初而損巳之疾焉合志如此初雖欲不急徃應之而不可耳按事上之道進思盡忠退思補過惟知自靖而巳豈可有所瞻狥於其間哉然致主之心太急不顧利害觸其君之怒以至於僨事則欲損其疾而反增其疾矣酌損云者蓋相度事機法言㢲言随時上下以求其有濟實非懐私營而忘國事觀望而不徃者可得藉口也故聖人交𤼵其義以為益上者凖九二利貞征凶弗損益之象曰九二利貞中以為志也此一爻是言二能守其貞由心之自重乎道也周公繫損二爻曰九二與六五為應而有剛中之徳是重名義輕利禄得在下之貞而勵無私之操者也則身名俱泰而利若希心利禄奔走於形勢之途舉生平而盡棄之則身敗名辱凶孰甚焉然是貞也豈特一巳之利而巳茍能即其守而持之不變則直節之臣朝廷之寳也法家之士社稷之頼也其為益也不亦大哉孔子釋二象曰九二之所以利貞者以其居下之中而抱剛正之徳一念是矢惟知道義之足重而有確乎不㧞之志故能不為富貴利欲所動自守其貞而不妄求也按此爻之義有以貞士言者有以貞臣言者貞士之益潔身獨徃而至行可師如伯夷窮餓而頑亷懦立嚴光垂釣而山高水長是也貞臣之益大節屹然而百折不奪如汲黯在朝而叛臣寝謀董允秉政而僉壬畏憚是也兩説皆通觀二五上下相應似君臣之義尤切故程傳亦主以下益上言而曰能守剛貞志存乎中則有益於上若變為柔媚適足損之而巳語云山有猛獸藜藿為之不採由此言之正色獨立招不來麾不去之臣人君安可一日少哉六三三人行則損一人一人行則得其友象曰一人行三則疑也此一爻是言取友之道當去損而乃獲益也周公繋損三爻曰損之三爻卦之所以為損也下卦本乾而損上爻以益坤有三人行則損一人之象一陽上而一隂下有一人行則得其友之象故於同類之中而有異類之間是三人行也則損去一人而使􅁋朋比徳之徒不得雜乎其間焉夫異已之人既損之使行則同徳之友自可相孚而至切磋黽勉相觀而善此誠致一之道也孔子釋三象曰三人之中必損一人而使之行者豈示人以不廣哉正以三則心術駁而意見乖反生其疑忌而不能以相恊此損之所以為急也蓋凡人之相與惟其心之同而巳茍精神不相孚意氣不相合則羣黨比周固三也即一人之異亦三也是皆不可以不損也精神茍相孚意氣茍相合則二人同心固兩也即千百其朋亦兩也要皆不可以不相得也噫即交友而推之君臣上下之間亦何莫不然歟六四損其疾使遄有喜无咎象曰損其疾亦可喜也此一爻是言四能取人以為益也疾謂隂柔之疾周公繫損四爻曰氣質之偏皆謂之疾六四當重大之任而居隂柔未免委靡不振兹能藉初九之陽剛以濟之至誠延攬使初汲汲而遄徃於我匡扶救正以損其疾不有喜乎夫上有虚受之羙下乃得盡獻之忠取人之善而愈已之疾復何咎耶孔子釋四象曰人能無過固為可喜今四有疾而藉初以損之則有過仍復於無過徳業日新亦可喜也蓋進徳以奮决為先改過尤以疾速為要况四身為大臣有天下國家之責使其疾一日未損則斯世受一日之害所望下之匡救切矣然良藥未免於苦口而忠言恒至乎逆耳茍無殷殷求助之誠雖有嘉謀嘉猷亦安從而入告乎賈誼有言醫能治之而上不使可為歎息者此也初九之遄徃亦在乎六四之能使而已六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也此一爻是言五能虚中取益而受天下之善也兩貝為朋十朋之龜為國重寳周公繋損五爻曰六五柔順居中以膺尊位是抱懿恭之徳虚心好賢而不挾貴以自亢故天下豪傑景從能者獻其才智者效其䇿𤼵乎衆心之誠欲辭之而不得焉如或益之以十朋之龜而弗克違者如是則羣䇿畢舉而百度有惟貞之羙由是而迓天休由是而綿國祚吉孰有大於此者乎孔子釋五象曰六五之獲元吉者非有心於必得也蓋虚中好賢之誠克當天心故譽髦歸之共㐮上理祐以景福而受天下之益也按書言不寳逺物所寳惟賢故楚人以二臣之善珍乎白珩齊王以四子之功羙於照乗十朋之龜國之至寳信乎惟賢乃足以當之也然非聖君在上隆之以殊禮待之以至誠則賢者亦不樂為吾用今六五為虚中之主而有親賢之徳則以君心感多士之心即以人心格上帝之心此卑以自損者乃能大有所益歟上九弗損益之无咎貞吉利有攸徃得臣无家象曰弗損益之大得志也此一爻是言上九普其惠於天下而得遂益民之志也得臣能得人心无家不可以家計也周公繫損上爻曰上九居損之終受下之益既多而欲自損以益下者也然必待損諸已以益人則徳有盡而恵易窮惟是因民之所利而利之即天下自有之益以益天下而可以无此咎矣是乃帝王蕩平之政而非驩虞小補之術所謂貞也則加諸億兆澤無不被不亦吉乎施諸遐邇道可常行不利有攸徃乎由是民心日歸海隅日出之邦靡不率服而無有逺邇親踈之間也其得臣寜有家耶孔子釋上象曰上之於下孰無益之之心哉然益出於己則所及有限未能大得志也今弗損益之則恵出於己無窮澤洽於民甚廣無一夫不獲其所斯其志誠大得矣粤若唐虞之世康衢擊壤帝力相忘四海共安耕鑿之常蒸民惟有雲日之頌巍巍蕩蕩殆兹弗損益之得臣无家之象乎後世𤼵帑救荒亦一時䘏災賑窮之典而省徭薄賦愛飬斯民恵而不費要在平日有天下者其必以純王之心行純王之政也哉震下㢲上益者損之反也凡卦以内為主故損下謂之損而益下謂之益至上之損益則不與焉所以厚其本也益見於王道則有减賦補助約己裕民之政彖傳所謂民悦道光是也益本於天徳則有遷善改過進徳修業之學彖傳所謂動㢲日進是也疏觀六爻自初至四皆以臣之受益言五上二爻則以上之益下言蓋益以興利初利用為大作是為天下萬世之大計非㝷常之報効也二用享帝為靖獻之大誼三益用凶事為盤錯之大任四利用為依遷國為安民之大舉皆非小益之事至九五之元吉由恵心之有孚上九之莫益由立心之勿恒則興利之原未有不本於君心者也所謂有天德然後可以行王道也顧彖傳中正有慶專指二五而小象於三四亦曰中行者何也以二體言則二五各居其中以全體言則三四竝居其中此三四所以稱中行也此又因象繋辭之一例而易之以中行為重者於此可見矣益利有攸徃利渉大川此卦震下㢲上損上卦之陽益下卦之隂有損上益下之義然民富而君不至獨貧則下益而上亦益也故名為益卦辭言益道無所不利以眀恵下之政當急講也文王繋益彖辭曰人君果能損上之有餘以益下之不足則仁恩洽暢上下交孚有所徃而經綸創作事無弗集而功無弗成固極其利矣即使之拯溺亨屯削平禍亂則衆志可以成城一心自能濟變雖渉大川亦無不利甚矣益之可以興利也按損下以益上本以求益也而反成損損上以益下巳不能無損也而䆒為益可見肥巳瘠人者民貧而君亦無所寄約已裕人者民樂而君不至獨憂故曰民為邦本本固邦寜有天下者誠不可不務固本之圖巳彖曰益損上益下民説无疆自上下下其道大光利有攸徃中正有慶利渉大川木道乃行益動而㢲日進无疆天施地生其益无方凡益之道與時偕行此彖傳是釋益彖辭以眀益之道亦不外乎時也中正指二五言震㢲皆木故云木道孔子釋益彖辭曰卦之名為益者蓋以損上卦初畫之陽益下卦初畫之隂則是君能自損以益民民之被其澤而悦者自無疆域之可限矣此豈要結小惠補苴驩虞之治也哉乃朝廷愛民如子恩出九重之上而下逮窮簷蔀屋靡不普徧真如天道之下濟而光眀君益民而民受君之益民悦道光而民之益即為君之益此卦之所以為益也辭言利有攸徃者以二五有中正之徳君臣同志一徳交孚舉凡良法羙意曲暢旁通而無壅蔽之患則福慶不僅在一人而在天下此徃之所以無不利也又云利渉大川者蓋濟川必乗木而濟變必需才震㢲皆木是平時既徳澤下䆒而遇變復謀猷克壮能使徃無不復而陂無不平此大川之所以利渉也夫於卦名可以知上下之胥益矣於卦體可以知常變之胥益矣然豈特此巳哉更以人事與造化觀之人事之益莫大於學問卦徳震動㢲入是作聖之功既奮𤼵精進又遜志沈潛自然徳崇業廣日進寜有疆乎造化之益莫大於生物卦變乾易初而下交於坤天之施也坤易初而上達於乾地之生也天下施地上生萬物竝育其利寜有方乎凡此皆益也皆道之所在而時之所為也學問之道随時而進造化之功順時而新以至人情之窮而復通失而復得物理之消而復長虧而復盈何一非與時偕行者耶益道之無所不該如此按聖人釋損彖曰二簋應有時損剛益柔有時損益盈虚與時偕行釋益彖曰凡益之道與時偕行可見易道不外一時聖人合徳天地之學不外趋時而於損益反覆言之者見損益為盛衰之始尤當兢兢致慎承天時行損其所當損益其所當益而後常變無不宜上下無不利也乎象曰風雷益君子以見善則遷有過則改此象傳是言君子體益象以為學也孔子釋益象曰此卦下震上㢲震雷㢲風風雷之勢交相助益益之象也君子知體益之道莫要於聖學而聖學莫切於遷善改過故見一善若决江河即時遷就如風之疾而莫可遏也覺有過如惡惡臭即時更改若雷之迅而莫能禦也由是遷之又遷善日積而過日寡改之又改過全去而善全復君子體益之學孰有大於此者乎昔大禹聞善言而拜接精一執中之傳成湯能自得師改過不吝而聖敬日躋故曰惟木從䋲則正后從諫則聖然則遷善改過固作聖之功而虚懐納諫又遷善改過之要道也與初九利用為大作元吉无咎象曰元吉无咎下不厚事也此一爻是言受非常之知者必有非常之報而後可無愧也大作謂大有作為元吉謂所作盡善周公繋益初爻曰初居下位而受上益是當進身之始而膺特逹之遇受寵最渥者夫上有國士之知下自當有國士之報故利用大有作為利一身者不為利天下者為之利一時者不為利萬世者為之不徒㝷常事業巳也必如是庻可少塞報稱之責矣然居下則位之最卑者也大作則任之最重者也居下而任上事能免出位之咎乎必其所作者盡善盡羙合乎事理之宜而中乎經權之妙然後天子信焉大臣安焉而不議其為僭也否則作之不善安冀其有成功哉孔子釋初象曰初必元吉而始无咎者蓋天下之大事業必有天下之大責任而後可為也初居下位卑本不當任厚事茍非元吉則不惟無建功立業之譽而且有越職犯分之譏矣誠不可不致慎於其間也按隐居則求其志行義則逹其道幼而學者壮而欲行之况當世有知我之一日乎然既度其身矣又必度其君既度其君矣又必度其時急於自售而昧進退之宜如漢之賈生一遭文帝即流涕痛哭卒至交淺言深以招謗忌而志不獲伸故曰非才之難所以用其才者實難眀於此爻之義庻乎免矣六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也此一爻是言二之受益當忠順不失以報其上也周公繋益二爻曰六二虚中處下上應九五剛眀之君小心翼翼以事一人雖無心於求益也然精誠所感錫賚優渥不期而至有辭之而不得者為或益之十朋之龜弗克違之象此由二守臣道之貞故獲非常之寵誠能一心自矢自始至終守正不變則臣心愈篤主眷彌隆而吉可長保矣然臣之事君與君之事天其分同也君之益臣與天之益君其理同也茍王者用是虚中永貞之徳而享上帝帝必鑒其誠而歆其祀自天祐之吉又何如也天之難諶猶可昭格而况於君哉孔子釋二象曰六二受上之益而云或益之者何也良以六二精白自獻非有希福干禄之心寵錫之來出於意外即大君亦不過因材而篤而非有私於二故曰或也二真可謂純臣矣按損之六五以虚中受下之益損之六二以虚中受上之益然損五元吉而益必永貞而後吉者蓋損五居至尊之位合天下以媚一人固其分之所應得也若益二以人臣蒙上之眷貴不期驕富不期侈一念之溢而遂至於不能自持古來功臣世族徃徃以恩寵太過而啟身家之禍者多有之矣聖人戒之以固守其正誠萬世為臣者之眀鑑乎六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也此一爻是言六三有所警以免過而又告以當盡克艱之道也凶事謂險阻艱難之事公指九五言圭通信之物周公繋益三爻曰六三隂柔不中正特以居益下之時處下卦之上有不容不受上之益者故益之不用吉事而用凶事或投以艱巨或處以盤錯警戒之震動之俾動心忍性以增益其所不能故无咎也然上之待我如此蓋望我去不中以歸於中耳若復不知自責自修焉何以慰在上之意乎故必精白乃心而行事盡善内誠於體國而不欺外恊於中道而不悖庻幾中為實中可以見諒乎君如告於公而用圭以通信焉然後無負成就之意而咎可免也孔子釋三象曰有孚中行之徳人所固有但不免遷於外物而失之耳所以益用凶事者投之以患難非常之任正使之自知警懼而思全其所固有者也按天心仁愛生人則出災異以儆之人君厚期臣下則用凶事以益之必反身修徳然後可仰答天意而變災為祥必至誠不欺然後可上報君恩而轉凶為吉益道真無方也歟六四中行告公從利用為依遷國象曰告公從以益志也此一爻是言六四以益下為心可以得君亦可以得民也公亦指九五言初本坤體坤為邑上遷為四故有遷國之象周公繋益四爻曰居中者民之主也臣者奉上之中而致之民者也世之人臣徃徃仰不能見信於君俯不能見信於民者以其行之不中耳誠能以益下為心凡事小心敬慎斟酌合宜而一毫不敢偏倚如此其中行焉則我以君心為心君亦即以我之心為心諫必行言必聼焉而告公從矣是豈特君從之也哉吾之中既上孚於君則必下孚於民民之情自安於我不惟經常細事可行即時值不得巳勞民動衆至於遷國人亦信其至誠而鼓舞從事罔有少斁焉以遷國且無不利况其他乎孔子釋四象曰進言在臣聽言在君四何以告公而必其見從也蓋四惓惓以益民為志所告又有孚恵心之君是四之志適合乎五之志君臣上下一心一徳故告之而無不從從之而無不利也按臣道與地道同所謂無成而代有終者益卦於三四兩爻一則曰中行告公用圭再則曰中行告公從總見𤼵政施仁乃大君之事為人臣者承流宣化惟盡其所當為而不可少萌市恩沽譽之心庻幾上不疑而下不忌功成而無震主之嫌也歟九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也此一爻是言九五誠於益下故能収得民之效也我徳謂五之徳惠我徳謂下感五之徳周公繋易五爻曰天地生成萬物不外一誠大君懐保小民亦不外一誠誠者上下同流而物我無間者也九五為益之主陽剛中實凡所以損上益下者咸本不忍之心行不忍之政念念出於至誠事事本於忠厚無一毫違道干譽之私如是則何待問而知其元吉哉但見上以誠感下以誠應而民之惠我徳者自有孚而無間相喻之機固有至神者矣孔子釋五象曰人君惟無益下之實心徳澤偶施即不勝沾沾自喜此要結民心之小惠而非大公無私之正道也如果惠下之政出於至誠惻怛其為元吉又何俟問焉至於民惠我徳則我之惠及於天下矣王者康濟一世之志不大得乎所謂民説无疆其道大光者如此按洪範言惟皇建極斂五福以錫庻民惟時厥庻民於汝保極保極者錫福之眀騐也益下之主有孚惠心則受益之臣民亦有孚恵我徳所謂羣􅀺百姓徧為爾徳者也可見上下之勢雖甚懸而感通之理則甚㨗故曰至誠而不動者未之有也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也此一爻是言上九專利之害而深致其戒也周公繫易上爻曰此卦上三爻咸有益下之責六四能體君心以益下故有利而無害九五有孚惠心而民惠我徳此皆上下交益者也獨上九以陽剛居上是在已有餘而非不足者乃專利好貨求利不已全無公利濟人之心因而衆叛親離交征互奪有莫益之而或擊之者焉所以然者由其立心之不恒耳夫愛人者人亦愛之益人者人亦益之此恒道也上惟知剥民奉己一念反常事事皆悖凶豈能免乎孔子釋上象曰上九居上位而無以益人專欲益已其為害已甚但言莫益之者即其求益不遂據一偏而言之也其實財聚民散爭民施奪或擊之凶自外而至出於不測有非意料所能及者豈特莫益之而已哉昔芮良夫言夫利百物之所生也天地之所載也而或專之其害大矣人君專之則害於國人臣專之則害於家甚矣利之不可專也此卦自五以下皆言益下之吉惟上獨言求益之凶正見上居髙位懐利事君止知為一身之計是以台鼎之尊而工壟斷之術者其能免於僇辱乎宜聖人之深戒之也乾下兌上夬取決去之義五陽長而将極一隂消而将盡衆陽上進決去一隂故為夬以五陽決一隂是君子之勢甚盛小人之勢甚孤其決而去之也似乎甚易然而聖人不敢以易心處之也所為決之之道必期於盡善焉蓋隂之勢雖㣲蔓或可滋窮或為敵君子無時不戒懼而於小人道衰之時尤不可忘戒懼也故彖為危懼警戒之辭不一而爻於五陽未嘗許之以吉初以始進之陽而決居高之隂則慮其不勝二以剛中之才而凛警備之戒則幸其勿恤三與上應而剛壮外見恐啟中傷之禍故敎之遇雨以善其決四與上同體而居隂不正恐來黨奸之悔故敎之牽羊以助其決五與上比而狎昵近習不可無獨斷之能故敎之中行以致其決至於上六則直絶之曰无號其為君子防者至周且備而所以去小人者不遺餘力矣要之決小人以健為體以和為用二之中道五之中行皆所謂和也初壮趾不勝三壮頄有凶四聞言不信非不能和之故哉夬揚于王庭孚號有厲告自邑不利即戎利有攸徃此卦乾下兌上五陽上進決去一隂不勞餘力決之而巳故名為夬卦辭言君子去小人雖有其勢又必盡其道也揚者聲小人之罪也孚號集君子之勢也告自邑嚴自治也不利即戎不逞其力也文王繫夬彖辭曰天下最快意之事莫如君子去小人天下最難處之事亦莫如君子去小人蓋以小人居高近君其巧佞足以邀虚譽奸回足以蔽主知蠧國殃民之罪有一國皆知天下皆知而人主不悟者故夬之道首在揚於王庭以聲眀其罪使無所逃於天地之間此決小人最要之道也然或衆君子議論紛紜而泄泄從事或自治功踈而恃勢憑陵則反授之以隙而小人不可決矣必也呼號廹切齊心一意共存憂􅅥之懐不可以小人之勢孤而遂安肆也且嚴自克治使在我者無過可指有以服小人之心不可恃君子之勢盛而輕攻擊也如是則防奸之法既嚴自治之謀又宻以是而徃振風采於朝端伸正氣於天下小人盡去而君子之道沛然大行利何如哉按君子小人之進退天下之治亂所由闗歴觀古今治常少而亂常多君子常難進而小人常難退所以夬卦與剝卦相對於剥則見五隂剝一陽之易於夬則見五陽決一隂之難聖人深知利害之原不覺望之深慮之廹丁寜告誡不厭其詳所以為君子計者切矣所以為天下萬世計者至矣彖曰夬決也剛決柔也健而説決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸徃剛長乃終也此彖傳是釋夬彖辭而備言去小人之道也孔子釋夬彖辭曰卦名夬者決而去之之義也蓋以五陽決一隂是為剛決柔也夫委靡固不足以圖功而過剛又恐其激變卦徳乾健兌説是内存秉道嫉邪之志而外有和平樂易之休故其決小人也既不以弛慢坐失事機亦不至躁激致生他變決而能和真決之善道也辭言揚於王庭者卦以一柔乗五剛是一狐媚小人用事君側舉朝受其牢籠悞國殃民罪逆大矣揚於王庭庻朝野上下共知其奸小人之罪状既著始不能一日安於其位也所謂孚號有厲者蓋小人奸謀叵測視之不可泄泄必操心危而慮患切戰兢惕厲謀出萬全而後決小人之道乃為光大也所謂告自邑不利即戎者蓋正巳始能正物而惟理可以服人若專尚威武與小人争一時之勝負則君子必為所困而不能敵乃自窮也其云利有攸徃者蓋剛反必長始於一陽之復終於六陽之乾夬時五陽雖盛猶必再長決盡一隂而剛長始為有終是能俾小人盡去而朝廷之上忠良濟濟正道大行故徃無不利也然非健而説決而和則小人豈可以力勝哉按春秋傳言見無禮於君者如鷹鸇之逐鳥雀也人臣為國除奸豈顧利害但不審時度勢而冐昧一決則有奸未除而禍先叢者矣而其要尤在不予小人以口實使以君子自命而立心有一毫未光眀處事有一毫未中正不能無諸巳而徒欲非諸人人主豈能亮之天下豈能信之而惟所欲為乎然而難言之矣君子之自治即甚嚴而小人之中傷乃愈巧求全之毁既難防於一時浸潤之言又恒積於平日讒謗既多主心安能無惑此審賢奸以為取舍察情偽以定是非全在乎知人則哲之聖主也象曰澤上於天夬君子以施禄及下居徳則忌此象傳是言君子體夬之義以布徳行恵也居徳積而不施之謂孔子釋夬象曰澤水之氣上通於天勢必沛然下決而成雨露夬之象也君子體之知下之待禄於君猶萬物之待澤於天也於是施禄及下錫予厚於君子樂利遍於小人而無一毫留滯吝惜之意焉此王者如天之仁也若居其徳惠積於上而不下䆒是外本内末以身𤼵財而犯不仁之戒矣豈大君之宜哉按夬為三月之卦正人主施恩布徳之會而衆正滿朝又小民翹首望澤之時所貴行之以勇出之以斷耳居徳則忌殆所謂仁心仁聞而功不下逮者故曰有不忍人之心繼之以不忍人之政而仁覆天下矣初九壯于前趾徃不勝為咎象曰不勝而徃咎也此一爻是言居下位者不宜恃壯輕進也初居下象趾徃謂徃決上六周公繋夬初爻曰君子決小人必事出萬全而功収一舉方為有利而無害初九剛而在下無決小人之權乃獨先衆陽恃壮輕進欲決在上之隂柔有壯於前趾之象彼自謂理所當決無可咎者然小人竊據高位人皆畏之不敢輕擊而我獨逞一時之意氣與之鬭力其不能免反噬之咎宜矣豈時勢之不利哉孔子釋初象曰君子決小人慎之又慎操必勝之道以徃猶恐有意外之憂今不審巳量力而欲一擊以快其憤是眀知不勝而鋭志輕徃也豈善於決小人者乎按君子去小人事成則以為功不成則禍及身而國亦随之適足為害而已若李固杜喬之於漢李訓鄭注之於唐莫不皆然初之不勝而徃聖人直斷之以咎非以哀其志之不就而深惜其謀之不臧也可弗懼乎九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也此一爻是示君子以有備無患之道也周公繫夬二爻曰九二當決之時剛而居柔又得中道不過乎剛而審事之宜者也故能憂惕以深其謀呼號以集其衆戒備如是小人雖隂謀不測變生意外如莫夜之有戎而自治既嚴無隙可乗亦可勿用憂恤矣豈有決而不勝者哉孔子釋二象曰莫夜有戎事起倉卒可懼之甚也而能勿恤者以九二得中自處盡善既不至躁動以滋變又不至坐守以後時故能憂惕呼號以自警備而無他虞也按小人立志甚奸深而行事甚暧昧其搆禍機也常伏於暗伏於暗者伺人之不覺而中之也故其賊害則為戎而幽晦不眀則為暮夜二以惕號處之正所謂其危乃光者我有光則彼之暗不足憂矣九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也此一爻是言君子決小人之道貴於盡善也頄面顴也夬夬決於決也遇雨謂暫與小人相合也若濡謂迹似為小人所染也有愠謂見怒於同類也周公繫夬三爻曰九三過剛不中而當決時是欲決去小人不勝其忿而逞於一𤼵者有壯於頄之象如此則謀露機泄勢必召意外之變而有中傷之凶矣然三在諸陽之中獨應上六其義不可不決顧其決之何如耳若果深知小人之害而存必決之心則當密其謀老其識而藏其迹雖暫與上六相合如獨行遇雨跡似濡染於小人而見愠於衆君子者然卒之伺瑕乗釁推其墜而絶其根清君側之惡以収廓清之效者必此人也夫何咎乎孔子釋三象曰九三獨與上六為應自其迹觀之未為无咎今能果決其決則向之委婉曲折正見通權逹變之妙用始雖若濡有愠終必觧悖除奸而見信於同志矣安有致咎之理歟按古來建立事功者必有深心大力但求其謀之克濟而形迹之間一時有所不及顧如王允謬譽董卓温嶠偽事王敦初皆辱身降志卒能剪除元惡皆有合於夬夬无咎之義者也然茍非真能舍經用權磨不磷湼不緇可以轉移一世而不為一世轉移者則寜介然皭然危言危行守其不亂羣之戒雖或無補於天下而亦不至自失其身矣九四臀无膚其行次且牽羊悔亾聞言不信象曰其行次且位不當也聞言不信聰不眀也此一爻是言處難進之時當思所以善處之道也臀无膚謂居不能安行次且謂行不能進羊者羣行之物牽者挽拽之義言挽拽以随其後也周公繫夬四爻曰九四亦君子之類志在決小人者也然以陽居隂無剛果之才又不中正無飬重之徳故居則不安欲與諸陽竝進而行又多疑不能決以成功為臀无膚其行次且之象夫四之進退維艱如此宜不免於悔矣為四計者但當譲諸陽前進而已随其後衆方揚庭以聲其罪我則從而和之衆方呼號以集其羣我則從而應之如牽羊者然庻幾因人成事而悔可亾也然聞善而能用克己以從義惟眀決者能之惜乎四之隂柔才弱志在競進而力復不能聞此牽羊之術而不信也悔其能免耶孔子釋四象曰四當決之時君子道長乃次且而不能進者由其處位不當才徳不足故也聞言不信者以好進之念横於胸中本來之聰障隔不眀故猶豫狐疑雖聽之而不能翻然信從也按四當大臣之位以其居隂不正而與上同説體恐其去邪而不能決惟能牽引羣陽以自助斯足仰成九五夬夬之光而自免黨奸之悔矣聖人欲長五之剛必藉四一剛聨合羣剛之力故其辭之激切開導如此夫小人日在君側為大臣者與其排一小人而有觸忌人主之患不若進衆君子以輔導人主而有潛消匪類之功誠能萃衆正於朝廷俾吾君朝夕與處是非既眀好惡自正君子有不日進小人有不日退者哉九五莧陸夬夬中行无咎象曰中行无咎中未光也此一爻是言人主決小人貴於斷而去私也莧野菜也感隂氣之多者故以比小人上六象陸髙平之地九五象周公繫夬五爻曰上六隂柔而切比九五如莧之生於陸然其柔媚奸佞最易蠱惑君心故必毅然獨斷不牽於内嬖之私而決於去之焉然小人近在肘腋除之太速恐生意外之憂其決之之道既不可優柔寡斷亦不可過激失宜從容詳慎中以行之則有合於健而説決而和之道始可去小人而无咎矣孔子釋五象曰九五以陽剛之主而又不為遇暴合於中行固不為小人所累而无咎矣然䆒極其心事而言則猶未得為光也蓋人心惟無欲方為光眀五之於小人特屈於義之不可而後去之則其牽係之私猶有潛伏於中而未能脱然無累也自古小人每以小忠小信自結於上而使不覺其奸人主一為所惑雖廹於公義勉强去之而中懐眷戀反若出於不得巳者故忠言讜論君子未及伸其謀而潛滋默長小人復得乗其間夬未終而姤巳萌皆由於此宜聖人之惓惓以為戒也夫上六无號終有凶象曰无號之凶終不可長也此一爻是言小人終當決去而深慶君子之得志也周公繋夬上爻曰上六以隂柔小人居窮極之時黨類剪除巳盡一時之人皆識其奸而志在必決情窮勢孤无可呼號終致殄滅凶其所必然矣孔子釋上象曰小人比周為惡流毒四海自謂終身無患孰意黨滅援絶无所號呼終當決去即欲長居其位不可得也為小人者盍早從事於正以免无號之凶乎按聖人釋剥上爻曰小人剥廬終不可用也見剥盡則為純坤天下從此大亂矣故云終不可用戒之也於夬上爻曰无號之凶終不可長也見夬盡則為純乾天下從此大治矣故云終不可長慶之也一治一亂雖由天數而進君子退小人使天下有治而無亂其權全在乎人君豈可忽哉㢲下乾上姤者相遇之義主一隂遇五陽而言也蓋決盡則為純乾一隂忽自下生其勢甚悍又為㢲之一隂其性善入其用潛隐尤君子之所難知而難防者使以一隂之㣲忽之而不及察則進而為遯為否為剥為坤皆自一隂之相遇始矣制之者當於其㣲而未盛之時也故總一卦而言一隂有敵五陽之志則危之曰女壯就一畫而言一隂潛伏五陽之下則防之曰羸豕壯可畏也羸不可忽也於二四觀之則曰魚於九五觀之則曰瓜象其隂而在下也惟二宻比初能包之以制其逸惟五為卦主能包之以防其潰四與初相應者初不自止則曰見凶四不能止之則曰起凶皆以眀繋之不可不早也若三與上一居下卦之上一居上卦之上於初皆無所遇雖無制隂之功亦無比匪之害不遇不足為咎巳要之敢於遇君子者小人而善於制小人之遇者尤在人主之一心君心之踈宻即小人消長之闗也小人之消長即天命去留之本也故於九五之含章尤惓惓焉姤女壯勿用取女此卦㢲下乾上是純陽用事之時而一隂忽生於下不期而卒與五陽相遇故名為姤卦辭言防小人之道當嚴之於始也文王繋姤彖辭曰姤以一隂初生而遇五陽是以一小人之㣲而欲敵君子之衆原其心則蔑貞之謀巳蓄而䆒其勢則堅冰之漸巳形君子於此當遏其惡於将萌杜其機於将動勿喜柔佞而與之合勿因㣲弱而聽其長猶剛壮之女不可取以為配也昔晉習鑿齒有言一隂遇五陽有女壮之象故戒占者勿用取女以其女徳不貞不能從一而終也從來女子小人最易使人惑溺養鶖棄鶴皆始於當時一念之錯豈知日後貽莫大之禍哉一隂初生聖人即曰女壮曰勿取防其漸也鑿齒此言深得聖人繋辭之㫖可不兢兢致戒乎彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉此彖傳是釋姤彖辭以示謹㣲之意主持世道者宜慎其防也天地相遇謂五月一隂初生剛遇中正指九五言孔子釋姤彖辭曰卦名姤者不期而遇之謂也以一柔遇五剛是在位者皆君子而一小人卒然而遇可駭也而亦可畏也夫剛性直方而柔多巧佞柔而遇剛柔必善於趨承而剛必喜其妍媚一與之合必将依附曲從攀援而上為遯為否為剥将來不測之禍皆始於此是小人之長非自能長也皆君子不知所備有以與之故日盛月長而不可遏也卦辭戒以勿用取女言當防㣲杜漸不可因其柔順輕與之合使之牽引朋類滋蔓而不克制也然就所謂柔遇剛者思之其間相勝之幾固最㣲而相湏之理又最切試觀之造化乾為四月純陽之卦至五月而一隂始生天陽地隂兩相遇合而此時品物之形形色色莫不章眀著見也再觀之人事從來有位者不必有徳而有徳者未必有位徳位恒不相遇卦體九五以陽剛之徳居建中表正之位是徳與位遇而治化昭眀於天下也夫品物咸章氣化隆於上天下大行治化隆於下是遇亦未嘗不善矣然霜冰之漸巳兆於庻類蕃廡之㑹否剥之機即萌於治道全盛之時非有真識見者不能先機早計非有大力量者不能斡旋挽囬姤之時義豈不大矣哉按姤卦五陽一隂是小人之勢至㣲君子之道方盛然易制者嘗患不為之制可圖者恒慮不為之圖宋儒邵雍有言復次剥眀治生於亂也姤次夬眀亂生於治也時哉時哉未有剝而不復夬而不姤者此其故不在小人能害君子而在君子不能拒小人蓋姤者存乎彼取者存乎我彼雖欲姤而我終勿取則小人其如君子何而禍亂之端可以永弭矣象曰天下有風姤后以施命誥四方此象傳是言人主有遇民之道而通天下之情也孔子釋姤象曰風行天下宣天地之和而開萬物之鬱天下之物無不遇焉姤之象也元后體此爰施命令以誥四方焉蓋人主深居九重尊卑之分懸絶與民相遇甚難惟王言一布天下曉然共喻朝廷之意而萬民共禀一王之敎令矣其何異於天之以風遇萬物哉按記云王言如絲其出如綸蓋君命者中外臣民之所共敬奉也自古太平日乆衆心玩愒人君深居髙拱下情隔絶小人因之竊弄威福恣肆横行多起於此則命令之施固以通上下之情愫亦正誥誡嚴切遏抑僉壬化戢奸宄之道也初六繫于金柅貞吉有攸徃見凶羸豕孚蹢躅象曰繫于金柅柔道牽也此一爻是戒小人不可輕進竝示君子使早為之防也柅止車之物金取其堅九二之象羸豕瘠豕也蹢躅跳躑也周公繫姤初爻曰自古小人未有侵害君子而已獨自全者初以一隂始生誠能知幾安分居九二之下止而不前如繫于金柅然則克守小人之正必受君子之福不亦貞而吉乎若越禮犯上徃而肆害必不為衆正所容凶立見矣然此特以理言也如以勢而論則小人浸長之勢必不可遏目前雖弱異日必有強梁肆志之時猶羸弱之豕暫若安静固可決其氣盛力壯必至蹢躅也君子可不早為之備哉孔子釋初象曰初戒以繋用金柅者以初六柔邪之道最善牽引今雖一隂初生勢必號召羣邪牽連而進肆其蹢躅故不可不止其進而預為之防也蓋邪正不竝立而辨之於始實難然郭子儀能識盧杞之險李沆能辨丁謂之奸而卒不能禁其不得志者以賢奸消長之數轉移總由君相而不在他人故也徳宗云人言盧杞奸邪朕殊不覺冦準云如謂之才顧能使之乆居人下耶小人之傾動君相其可畏如此甚矣知人之為急也九二包有魚无咎不利賓象曰包有魚義不及賓也此一爻是言制小人之道當專其責於巳不可委之於人也魚指初六言賓者對主之稱指衆陽爻言周公繫姤二爻曰初一隂始生漸将遍遇諸陽而九二切與之比是小人正在籠絡之中如包中有魚御之自我而機有可制也如此既不寛縱以飬奸又不廹激以致變可以无咎矣夫初在二下受其約束則二為主而衆陽皆賓若失此不制使之漸長至於象陽相遇為遯為否為剥為坤害将無所不至不利孰甚焉可不戒乎孔子釋二象曰二之包有魚則權既在二所以制之者亦專在於二以義揆之固不得令及於賓而致有不利之虞也按爻曰不利賓為衆陽危也所以告天下之君子使皆早知所備也象曰義不及賓專責二也所以告君子之遇小人者當身任其責而早為檢制不可縱惡長奸使小人得肆其害而徒悵恨於事後也聖人防㣲之意切矣九三臀无膚其行次且厲无大咎象曰其行次且行未牽也此一爻是言君子之於小人可逺而不可近也周公繫姤三爻曰九三過剛不中性欲上進但上下无應勢孤而不得遂其意如臀无膚而其行次且然是雖有寡助之危然既無私遇亦不至以比匪受傷而大有咎也孔子釋三象曰三之其行次且蓋以孤立無援不免遲疑而不進然尚未與柔道相牽連則隂邪不得而中傷之所以无大咎也按夬一隂在上故五陽皆上行夬四之上行次且欲決上而不能也姤一隂在下故五陽皆下向姤三之下行次且欲遇初而不得也其象雖同而其情則異大抵君子之決小人可緩而不可急而君子之遇小人可近而不必於近聖人於夬四敎以牽羊而随衆陽以竝進見決小人之不可急也於姤三喜其行未牽而不為一隂所害見逺小人之可免禍也逺近緩急之間君子宜審所處巳九四包无魚起凶象曰无魚之凶逺民也此一爻是言在上者不可以失民而深有以儆之也魚亦指初而言周公繫姤四爻曰九四居上位而與初為正應當相遇者也乃初遇於二而反離乎四則是己所應有之物忽而不制棄而不収有包无魚之象焉民心既失邦本不固厲階自此起矣凶不亦宜乎孔子釋四象曰九四无魚之凶者豈徒民之逺我也哉良由在上者置斯人於膜外無以結民之心是上自逺乎民也其咎誠無可諉矣按以淑慝言陽君子則隂小人不可使有也以貴賤言陽為君則隂為民又不可使無也故同一初六以小人視之為害正之邪則欲其逺之惟恐為已之累以民視之為所臨之衆則欲其近之惟恐不為己所有亦以見易爻之惟其時物如此九五以杞包𤓰含章有隕自天象曰九五含章中正也有隕自天志不舍命也此一爻是言制小人之有道而功能回造化也杞高大堅實之木君子之象𤓰甘羙善潰之物小人之象周公繫姤五爻曰九五以陽剛中正主卦於上而下防始生必潰之隂是以君子居尊位而下防始生之小人如以杞而包𤓰者也然隂陽貞勝時運之常在彼駸駸有日盛之勢我任其滋長而不思所以制之固不可茍制之而未能盡善又豈可哉是必内含章羙默為圖維不動聲色不尚威武實得勝之之謀而不露勝之之迹乃可挽回造化斡旋氣運而陽之将消者倐然來復若從天而降也此誠為善制小人者矣孔子釋五象曰九五能含章者以其有中正之徳也蓋惟有中正之徳故既不因循以長慝亦不輕動以生變為能内含章羙静以制之也有隕自天者由九五之志不舍乎命也蓋隂陽消長固係一定之數人惟立志不堅付於天命之無可如何而不思所以轉移之則命即從此去矣五之志務期人定以勝天故命亦為五所轉而有隕自天也信乎惟徳可以動天耳按文言釋乾之五曰先天而天弗違先天者事未至而幾已兆聖人先知灼見而黙運其神謀經綸措置先乎天也故能制治於未亂保邦於未危命自我立而天不能違所以言君相能造命也然則姤五之志不舍命其即乾五先天弗違之大人乎上九姤其角吝无咎象曰姤其角上窮吝也此一爻是言剛介孤立者無制隂之功而亦無比邪之害也角剛而在上之象周公繫姤上爻曰姤一隂遇五陽之時二五皆有剛中之徳故能包而制之若上九則剛而在上於初隂非應非比而不得遇有姤其角之象是諸君子皆有防奸之道而巳獨抗懐孑立驕亢之吝其能免乎然既無所遇則免黨隂比匪之傷而亦不至於咎矣孔子釋上象曰遇之為道貴於委曲包容善全其用上九之姤其角者蓋剛居上位全以盛氣凌人畧無調劑挽回之術適自取夫困窮也然能介然自持無茍合之失故雖吝而无咎耳按姤卦五陽皆以遇初隂取義於初則止其進恐其害君子也二五能包則予之欲其制小人也三上不與初遇有厲吝而无咎雖惜其無制隂之功而又幸其無比隂之禍也蓋不遇其所當遇固不免於孤立不遇其所不當遇亦不至於傷害聖人著此兩義使知處遇之時不可不遇而又不可妄遇也坤下兌上萃升二卦皆以二陽統四隂故卦辭萃曰利見大人升曰用見大人彖傳皆曰剛中而應萃以五為大人升以二為大人重陽也五四皆陽然衆隂從五則貞從四則非貞九四近君有聚物之嫌故戒以必大吉然後无咎九五陽剛中正即假廟之王利見之大人故五曰萃有位而四則曰位不當君臣之分不同也元永貞之辭與比卦同然比獨以九五為主故元永貞言於彖萃有兩陽爻故元永貞言於五六二牽引二陽同萃於五所謂利見大人得萃之貞者君則假廟臣則用禴精誠所孚主臣一心也從來致天下之萃不易保天下之萃尤難内難外患多生於不意當無事之時宜為有事之備象傳不虞之戒何其深切著眀乎萃亨王假有廟利見大人亨利貞用大牲吉利有攸徃此卦坤下兑上卦徳坤順兑説君民相萃也卦體九五剛中六二應之君臣相萃也又澤上於地水聚不流皆有萃聚之義故名為萃卦辭備言親親尊尊之義以眀保萃之道也萃指世運之盛言上亨字衍文假昭假也大人指九五言利見指上下五爻言文王繫萃彖辭曰當萃之時必上下各盡其道而後可以保萃在上之道莫大於享親而有廟者祖考之所依也王者於萃時必假有廟焉萃一巳之精神以通祖考之精神而上下左右之間有洋洋乎若或見之者矣兹其親親之義矣乎在下之道莫大於從王而大人者民物之所主也君子於萃時必利見大人焉合萬邦之􅀺獻而戴一統之大君彼此交孚其亨宜也然又必萃出於正不枉道以求合乃為利耳兹其尊尊之義矣乎夫假廟固以交於神也而禮有未備神将不歆故必用大牲盡志盡物以表其誠而所以致神之格者此矣吉孰加焉何也萃則可以備天下之物時豐則從而豐也見大人固以致君也而道有不行何取輕出故必有攸徃興事赴功以竭其力而所以酬主之知者此矣利孰甚焉何也萃乃可有為之時時隆則從而隆也所謂上下各盡其道者如此蓋世道之萃在人心而人心之萃在忠孝用大牲以假廟孝也見大人而利徃忠也人主敎天下以孝而天下報大君以忠其理本出於一貫而其機尤妙於相感上作而下應故曰孝者所以事君也萃道孰有大於此乎彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸徃順天命也觀其所聚而天地萬物之情可見矣此彖傳是釋萃彖辭以眀萃道之大也孔子釋萃彖辭曰卦名萃者言其合天下之異以為同聚天下之疏以為戚固有聚之義也卦徳坤順兑説是為之民者效順以從君而君又以説道先諸民則元后黎庻共為一心而聚成於野矣卦體五剛中而二應是為之君者推誠以禮下而臣又一徳以承夫君則元首股肱相為一體而聚成於朝矣此萃之所由名也辭曰王假有廟者非以要福也宗廟之立有親道焉而王者假之蓋極一心之誠孝以盡享獻之儀也利見大人亨者非以干禄也大人之尊有君道焉而君子見之蓋行吾君臣之義以盡為下之分也然不徒曰假廟而又曰用大牲吉不徒曰利見而又曰利有攸徃何哉一順乎天命耳夫天不外於理而理不外於時萃之時天下之物聚矣大牲之用夫亦順其命之當隆者而隆之非過為侈靡也萃之時君子之學聚矣攸徃之利夫亦順其命之當行者而行之非好為事功也夫萃之名與辭如此即所萃而博觀之陽倡隂和乾施坤承天地亦此萃也形交類感聲應氣求萬物亦此萃也眀乎萃道而天地萬物之情皆莫能遁矣豈特逹於朝野通於幽眀已哉此萃道之所為大也按易言天地萬物之情可見者三咸也恒也萃也咸主於感應所以見情之通恒主於永貞所以見情之乆萃則主於合渙所以見情之同同者同於聚也上下之情聚於君親天地之情聚於施受萬物之情聚於應求情之所趨即命之所集順命所以順情而見情即以見命有保萃之責者可不致審於斯歟象曰澤上於地萃君子以除戎器戒不虞此象傳是言君子體萃象而思患預防也除謂修治戒謂戒備不虞謂意外之變孔子釋萃象曰兌澤上乎坤地則水聚不流草木暢茂萃之象也君子知水聚而不防必有潰決之憂衆聚而不防必生爭奪之亂故觀萃象而修除戎噐以謹伺夫猝然意外之虞庻有備無患而其萃可長保矣蓋天生五材誰能去兵佳兵者固不祥忘戰者亦必危也君子當萃聚之世而除戎器豈專尚威武哉特戒不虞而巳彼始皇之銷鋒鏑鑄鐘簴則非謂之除戎器若漢武席文景富庻之極至窮師黷武以求浩大之功又豈戒不虞之義乎初六有孚不終乃亂乃萃若號一握為笑勿恤徃无咎象曰乃亂乃萃其志亂也此一爻是言萃道貴堅守其正也不終謂變其初號謂號呼九四一握隂聚之象周公繋萃初爻曰初六上應九四求萃於四之意本出至誠不欺但切比二隂未免為所牽引為有孚不終乃惑亂其心志而妄萃於匪類之象若能知初念之為是而號呼正應以必求其萃則一時所為未必不以從違靡定之故貽笑於妄求妄萃之徒然笑者妄也號者正也惟勿憂恤其笑而堅意以從之則其孚克終而所萃非亂矣復何咎哉孔子釋初象曰夫人必有一定之志而後不為外誘所惑初之乃亂乃萃者以志無定主故為二隂所惑亂也按物不可以不萃而萃又不可以不正得其正則同道為朋所重者名節所輕者利禄而為君子失其正則同利為黨所言者浮夸所行者變詐而為小人故周公惡初之妄萃而敎之以若號孔子推妄萃之由而斷之以志亂無非欲其去邪而反於正也夫方以類聚物以羣分人之有萃決不能免在上者但當觀其行事之公私起念之誠偽由外而求其内因迹而得其心則君子小人較如黒白之不可混流品清而國是定何至以朋黨之患貽聖眀之憂哉六二引吉无咎孚乃利用禴象曰引吉无咎中未變也此一爻是言以人事君者可以得時行道也引謂引同徳之士以事君禴夏祭名夏時物未備惟以聲樂交於神眀祭之薄者也周公繋萃二爻曰六二柔順中正為下卦之主而上應剛健中正之九五不惟一身公而忘私且牽引二隂同萃於五得集思廣益之道無妨賢病國之非吉而無咎固其宜矣夫人惟起念不出於公徃徃君臣之間情意輙多扞格二之至誠既可信友自能獲上猶祭者有其孚誠即用禴亦可格神而何不利之有哉孔子釋二象曰人臣始進孰無愛君之心然徃徃溺於朋比奪於私交始萃而終變者多矣二惟有中徳其忠君報主之念出於此心之誠然未嘗稍變其初志故能薦賢為國而誠可格君也按人臣之善莫大於進賢而人臣之姦莫大於蔽賢先儒有言姦人不樂進賢其情有三保位固寵常恐失之以賢者見用必能建功立業掩巳之名形已之短其情一也姦人樹私必人附已乃引之賢者進退以道不肯趋附小人以為不附已而引之則不感已之恩不為己之黨其情二也姦人心既不公識必不眀雖遇賢才不能深知以為引而進之必累乎已其情三也小人之不肯引賢其情如此然則萃之六二真可為人臣法哉六三萃如嗟如无攸利徃无咎小吝象曰徃无咎上㢲也此一爻是言三求萃於近而不得因示以知所從也周公繋萃三爻曰六三隂柔不中不正上无應與欲萃於四而不可欲萃於五而又不能嗟悼躊躇一无所利将如何而後可哉惟有上六情雖不相得而分則實相應徃而從之為合於萃之正而无孤立之咎但困然後徃而復萃於隂極無位之人縱獲其萃亦必不能得志行道小吝終不免矣孔子釋三象曰三之徃萃於上而得无咎者上雖無英眀之才足以益人然居説之極性柔志謙必能㢲順以受三之萃也小吝奚足恤哉按萃原取隂萃於陽下萃於上之義故以見大人亨為聚以正夫見大人而後為聚以正則九四尚非當聚之人况上六齎咨涕洟而求萃不得者乎然則上㢲而徃无咎者何也蓋萃之為道論理之是非不計勢之強弱上雖隂極無位實三之應也宜應而應之即不失其正矣但君子自處終願為六二之引吉不願為六三之徃无咎此眀良之遇古今所以同致羡也夫九四大吉无咎象曰大吉无咎位不當也此一爻是告四以盡善寡過之道也周公繫萃四爻曰四以陽剛居近君之地上逼九五下比衆隂無大人之位而有聚物之權君之所忌咎之所歸也故必不植黨不徇私虛公寅畏盡善盡羙而大吉焉庻處上下之間兩得其道而專擅之咎可免矣孔子釋四象曰四必大吉始无咎者由其以陽居隂所處之位不得其當則於君也未免有邪媚之嫌於民也未免有干譽之迹故其為萃之道必期於至善而後可也按功名之際人臣所最難居古今勛業之盛無過於伊周然伊尹則戒以寵利居成功周公則赤舄几几遜碩膚而不有皆深有合於此爻之義者故知勞而不伐有功而不徳非獨示謙亦以免咎後之人亦可知所警鍳巳九五萃有位无咎匪孚元永貞悔亾象曰萃有位志未光也此一爻是言萃天下之道貴於修徳也萃有位謂當萃時而居君位匪孚謂有不信從者周公繫萃五爻曰九五以剛中之徳居至尊之位是真徳位兼隆之大人而為朝野臣民所信從萃有位而无咎者也然天下大矣豈無偏方下邑未沾聲敎而下情不能上逹者乎匪孚之悔固難免矣然人之不孚於我必我之徳有未至而未足感乎人也惟反諸身果有元善長人之徳且始終無間而永純正不雜而貞焉自然徳盛化神無思不服而又何悔之不亾哉孔子釋五象曰人君誠信昭著務期近悦逺來萬邦作孚而後巳五之萃有位而猶有匪孚蓋其天下一家萬物一體之志尚不免於愧歉而未光大故必元永貞而後悔乃亾也按比之時一陽在上權無所分故曰顯比吉言其光眀洞逹無一毫疑忌之私也萃之時九四一陽應初比三位近勢逼五之大權嫌於旁落不能無疑忌之私周公敎以元永貞孔子譏其志未光固知修徳正心而外别無招携懐逺之道所以収衆心者在此所以攬主權者亦在此矣上六齎咨涕洟无咎象曰齎咨涕洟未安上也此一爻是言求萃不得者惟戒懼可以免害也齎咨嗟嘆之聲涕洟悲泣之状周公繫萃上爻曰上六處萃終萃極則憂散居兑體説極則生悲且羣隂在下聚順於五而巳獨以孤隂居其上欲順而不能求説而不得處上而危反説為悲有齎咨涕洟之象然當其時能恐懼修省以改前此之非則危者必平将不終於無萃而咎可免也孔子釋上象曰當萃之終羣隂皆在下而萃於五已獨孑然處其上求萃不得豈能晏然自安乎誠非憂懼靡寜反身修徳不可耳按上六隂柔説體切比九五不安於處上聖人敎以反説之道莫如憂操心危慮患深則能審分自安而不至有妄動之咎矣總之萃之為卦羣隂萃於二陽聖人於九四尚慮其抗五取咎以示尊無二上之義况上乃隂極無位者乎宜垂戒之辭如此其切耳日講易經觧義卷十
