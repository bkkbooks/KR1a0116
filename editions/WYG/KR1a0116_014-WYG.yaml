body:
  text: 欽定四庫全書日講易經解義卷十四兑下㢲上中孚之為卦三與四二柔在内為中虚二與五二剛得中為中實中虚則無我中實則無偽唯此心洞然而虚則至誠充然而實矣充然者𤼵於中而孚於外所以為中孚也六爻惟取柔而正剛而中者初九中孚之初上應六四隂陽皆居正位而有六三之隂柔不正者隔於其中故爻辭設有他之戒九二與五陽剛相應至誠感孚有鶴鳴子和之象三不得位而應亦不正一為說之極一為信之窮於中孚之義無當也六四得位故无咎九五剛健中正有中孚之實徳與二同徳相信合為一體包二隂以成中孚者也上九失位居中孚之極故為貞凶按中孚六爻獨於五言孚葢二五皆中實實則誠誠則未有不孚者而五又為之主則使一卦六爻如一氣然而靡不為之用者唯九五也他卦二五皆取隂陽相應而中孚則取以剛應剛以知中孚之道不主於情而主於理不孚於外而孚於中一誠相通君臣道合化邦而應天端在於是非他卦應與之比也中孚豚魚吉利渉大川利貞此卦兌下㢲上以全體言為中虚以二體言為中實中虚信之本中實信之質信𤼵於中故名中孚卦辭言信能合理所以善用其孚而無不通也豚魚無知喻難化之人渉川至險喻難濟之事文王繫中孚彖辭曰中孚以孚信在中為義有一心之孚有兩情之孚總之本於在中而𤼵見於外則至誠所感何人不格雖物之㝠頑如豚魚之無知亦可感動之而得吉况有知者而有不格乎何事不濟雖事之艱險如大川之難渉亦可濟之而利况平居時而有不濟乎然其所以為孚者一皆本於義理之至正而不為硜硜之小信膠執不通然後信所當信而合於貞焉斯人無不感事無不濟乃為利耳按聖賢脩身持世莫不以孚信為本原然而言不必信行不必果恐其不皆出於正也古之聖人至諴感神至於化傲象格有苖經權常變無不各得其至正若後世之君不失虞人之期不廢徙木之賞是信失其正者也此利貞所以善成其孚歟彖曰中孚柔在内而剛得中說而㢲孚乃化邦也豚魚吉信及豚魚也利渉大川乘木舟虚也中孚以利貞乃應乎天也此彖傳是釋中孚彖辭備言孚之體用明盡人可以合天也柔在内指三四剛得中指二五乘木舟虚取外實中虚之象孔子釋中孚彖辭曰卦名中孚者以卦體言之三四以柔居一卦之中是中虚也二五以剛居二體之中是中實也中虚而能實虚所以受信實所以為信此孚之存乎已者也以卦徳言之下說而上㢲說則臣以和衷上感乎君㢲則君以虚懐下應乎臣上下交孚自能化行邦國此孚之及乎人者也而一本於在中之孚中孚之所由名以此其曰豚魚吉者謂信由中出自通於物無不輸誠感化即如豚魚無知之物亦且能及之而吉此孚之驗於物者也曰利渉大川者謂以實體運乎虚中應變無窮如卦象木在水上木體本實而為舟則虚也舟惟虚可以行水心惟虚可以行世何不利渉之有此孚之驗於事者也若是其中孚而猶曰利貞者葢孚命於天渾然至正若意見未融一徇於人為即非正矣惟孚出於人心之正而合乎天命之本然乃與天相應斯感無不化也按天命流行物與無妄中孚之理即是天心通於億兆人之心而又通於億兆物之心人惟失此心之本體所以不能通人物之心以應乎天心耳葢天之道孚貞而已故又曰利貞乃應乎天者惟恐擇之不精持之不固或稍渉乎偏私而不合乎天心之正是以丁寜若此此即中庸以人達天之義乎象曰澤上有風中孚君子以議獄緩死此象傳見君子好生之心善體中孚之意也孔子釋中孚象曰兌澤之上有㢲風澤至實而風至虚風無形而能感澤猶誠無象而能動物中孚之象也君子體此以用獄當獄之未成則用議以求其入中之出即獄之既成猶用緩以求其死中之生哀矜惻怛總出於至誠無私所謂求其生而不得則死者與我俱無憾焉此君子為民之意有以深入乎民心上感而下受亦中孚之義也按天地之大徳曰生人君至誠懇惻之心莫大於好生不殺此即孚以應天之理也書曰欽恤舜之中孚也有虞之民協中從欲天下之中孚也後世如唐太宗之縱囚約其自歸以就法雖未合於純王之道亦必其一時不忍之念有以深入乎民心此亦可謂得於中孚之義者也三代而下如太宗者不亦仁民愛物之主哉初九虞吉有他不燕象曰初九虞吉志未變也此一爻言信得其人當善保其初志以成孚也虞度也燕安也周公繫中孚初爻曰初九陽剛得正與柔正之六四相應此孚之至正而貞者也在初能度其可信與之交而成孚則學業事功觀摩效法有得朋之慶獲所安而吉矣若失其初心而復有他焉是疑信不一舍正而求不正中無定主將無以成孚寜得燕而安乎所當致戒也孔子釋初象曰初九所以虞而得吉者以其當中孚之初剛而得正私情未起從正之志未為所變也是以得吉若能守正而善保其初斯誠能孚者矣按聖人立敎莫先於辨志志之所向邪正分焉一於正則不正者蔑由進矣惑於不正則正者亦蔑由安矣中孚之初未有所主正辨志之時也其志未變欲其審於始未變而不能保其不變更欲其慎於終閑邪所以存誠要在初之自為審持耳九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也此一爻見君臣同徳相孚其感應出於至誠也鳴鶴指二言子和指五言好爵懿徳也靡與縻同猶繫戀也周公繫中孚二爻曰二與五中實相應君臣一徳而成孚也二居隂位人臣幽隱之誠本於在中以自鳴其素而為之君者亦以誠信之念不期而孚同聲相應猶鳴鶴在隂而子和之之象所以然者懿徳良貴人所同好二既有此懿徳不敢自私其所有其致君忠愛之心出於至誠五亦繫戀之而不能自已故感應之象有若此耳孔子釋二象曰五之應二若其子之和豈有所矯飾於外哉君心所願慕者徳也二之鳴既由中而𤼵五之和亦根心而生是誠出於中心之願有不知其然而然者也按諸爻有應皆有間隔惟二五無間隔乃以同徳相孚中虚相感此即盛世君臣同心一徳賡歌拜稽於一堂無尊卑濶絶之憂無彼此形骸之隔是以上下交而治道成為有合於中孚之義也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也此一爻為信失其正不能自主者戒也得敵指上九之應鼓是鼓舞作事之意周公繫中孚三爻曰六三以柔而不正應上九之剛而不中此居說之極是為無恒彼當信之窮則為太固與之相應實相敵而不相助矣於是或鼓而前或罷而廢見行止之無常或泣而悲或歌而樂見憂喜之無定則中懐紛擾莫所適從以此圖功立事不亦難乎孔子釋三象曰人心惟中虚以理為主自動靜憂樂各中其節若三之或鼓或罷由隂居陽位處不中正而無中孚自主之徳所以臨事無恒動失其度揆厥由來豈徒得敵之咎哉按中孚諸爻各有相信之理而貞不貞則有異六三之得敵不當信而信憧憧往來莫適為主既不能如二五之同心相應又不能如初之虞吉而得所安此不貞而不可以為信者也然究其故實由己而不由敵故君子貴克己之學而無攻人之過斯信所可信而有以成其孚歟六四月幾望馬匹亾无咎象曰馬匹亾絶類上也此一爻言大臣當絶私交專心以事上也望是月盈匹配也指初與四應絶類是絶初九上是上從九五周公繫中孚四爻曰六四居隂得正位近於君相得而承寵眷徳隆勢盛如月之將盈而幾望也此正羣心歸附之時猜忌易生四乃柔順自處恪守臣道履盛而不矜雖與初為應而相匹能奉公事主不樹私交猶馬之相匹而亾其匹也若是則精白一心而無罔上行私之咎矣孔子釋四象曰古純臣公爾忘私未有一心為私一心為公者四所為馬匹亾者四與初為類而四必絶其私與惟克盡其誠專心上事於五所以无咎也按君子以同道為朋小人以同利為黨正與不正各有其類同道為朋者其意主於為國家同利為黨者其意專於為一已昔歐陽脩謂退小人之偽朋用君子之真朋則天下可治是在人主熟察而明斷之矣九五有孚攣如无咎象曰有孚攣如位正當也此一爻見君臣相信之深能以一徳成天下之孚也攣固結也周公繫中孚五爻曰九五中實而居尊為孚之主下應九二之賢亦中實而相輔君臣同徳和之以中心縻之以好爵相信之深有猜疑所不能間䜛忌所莫能離者自然固結而不可解為有孚攣如之象如是則上下交而孚乃化邦正在此矣何咎之有孔子釋五象曰五之有孚何以有攣如之固以五徳稱其位而為中孚之主則位正且徳以位顯而成天下之化則位又當故也使居至尊之位而無中正之徳雖當而不正何能一徳相孚而化及於天下乎此攣如之義葢有取也按中孚諸爻不言孚惟九五獨言有孚者葢五以中孚之實成化邦之功由竭誠信賢相與經綸密勿國家恃以治安非推心置腹之誠始終無間殆未易言攣如之義也上九翰音登于天貞凶象曰翰音登于天何可長也此一爻言處孚之窮為信非所信者戒也翰是羽翰音言鷄鳴必振其羽也周公繫中孚上爻曰天下事理當與時勢變通方能善用其信而無窒礙難行之患上九居中孚之極徇偏執之見乏融通之識不度可否順逆固守其信而必欲行之猶翰音本非登天之物而强欲登于天非貞而自以為貞則必違時拂勢而取凶矣孔子釋上象曰孚信所以可久者惟能通其變而不窮也今翰音登于天登非所登猶信非所信不知變通至於窮極而立見其敗尚何長久之可望哉按中孚之道有常有變初爻宜守常而惟恐其變虞之所以得吉上爻宜通變而固執其常貞之所以得凶夫貞何以凶也宋襄之行仁適足以取敗荀息之死難無補於格君拘一時之小信而不通古今之大義識者譏之所謂好信不好學其蔽也賊非凶之道乎艮下震上小過四隂二陽隂過之卦易貴陽賤隂二隂函四陽為大過四隂函二陽為小過陽雖過而二五得中其勢進而有為故有攸往之象小過隂柔居中陽剛失位故可小事而不可大事利在居貞而已夫處小過之時貴於辭尊而居卑勇退而不進此二五所以得柔中之應而三四不當位以陽剛處之惟在慎防以免患也初六隂之始進上六隂過之極以小才而有躁動之失不能下而上至於亢極宜其凶災之洊至矣君子惟謹其在我之所得為者於尋常之事過於周防而不敢為非分之舉此所謂過以得中也方諸箕子之明夷文王之用晦其得小過之義者乎小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉此卦艮下震上卦中四隂二陽陽為大隂為小隂多於陽小者過也故名小過卦辭言處小過之道當安分以守正也飛鳥遺音是輕舉留音無甚大過之象文王繫小過彖辭曰小過以隂過乎陽為義其在人也才不足而守有餘就其作為於人無所逆於事無所拂有可以得亨者然必不自恃其可亨惟安守分義不失當然之貞乃為利耳其利貞何如如尋常之事無甚艱虞吾之才分所能為而量力為之則可如事關國家舉動非常吾之才分所不能為而强為之則不可即所謂小事亦湏收斂退讓不居亢而居卑若飛鳥遺音下而不上者然葢不宜誇張而凌上但宜謙抑而處下也凡此皆小過之貞可長保其亨而大吉矣按易止隂陽二義陽過乎隂為大過隂過乎陽為小過易於大過許其利往然剛中而必㢲恱乃亨以小心用其大才斯無不亨也况處小過者乎隂柔過勝才小而心愈欲小故亨必利貞不貞則不亨也若力小而任大徳薄而上人未有不失其貞而獲戾者聖人致戒於隂之過深矣彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也此彖傳是釋小過彖辭言因時而不失其正處小過之要道也柔得中指二五剛失位指三四孔子釋小過彖辭曰卦名小過以卦體隂過於陽是小者過也以義言之小心過甚無輕舉妄動之失即可以是而得亨也然必利於貞者以小過之時必量力安分謹密周畏之獨至與時偕行始得貞而為利也時行何如以二五爻言之柔而得中柔非幹理之才本不足以任事幸其得中則善用其柔不至於因循廢棄尚可以處小事勝任而得吉也以三四爻言之剛失位而不中剛固有圖大之才但失位則無權不中則累徳不能善用其剛而鮮𢎞濟時艱之畧安可任大事而有為乎且以卦體言之内實外虚有飛鳥之象有其象則當思其義卦辭所謂飛鳥遺音不宜上宜下大吉者正以小過之時若處於驕亢而有上人之心則拂於時為逆安於卑遜而有下人之心則協於時為順惟上逆而下順所以不宜上宜下必與時行之為貞也能與時行有不得亨而吉者乎按小過利貞而釋之曰與時行者葢違時則中者亦過適時則過者乃中故可小而不可大宜下而不宜上此即君子時中之學乎若小人者不安於小而妄欲居上所謂無忌憚而反中庸者是也聖人於小過之時丁寜反覆所以勉君子而警小人無所不至矣象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉此象傳言君子體小過之義善用其過而趨於正也孔子釋小過象曰山上有雷聲離於地而未升於天小過之象也君子體之以時當小過豈能居髙圖大務為驚世駭俗之事就一身之中日用常行無關於天下國家者皆小也皆其可以過者也如行已易傲寜過乎恭而但不至於足恭居喪多易寜過乎哀而但不至於滅性制用患奢寜過乎儉而但不至於失禮此皆小事而宜下總見慎小之意多而張大之心少是過得其正而不為過矣按時當小過世道日漓所貴補偏救弊矯不正以歸於正此恭哀儉三者有舉趾髙之莫敖正考父矯之以傴僂有短喪之宰予髙柴矯之以泣血有三歸反坫之管仲晏子矯之以敝裘所以勵人心而維風俗有所為而為之其亦因時制宜善體小過之義乎初六飛鳥以凶象曰飛鳥以凶不可如何也此一爻為舉動躁妄不宜上而上者示戒也以凶謂以飛致凶也周公繫小過初爻曰小過之時凡事宜收斂處下初六隂柔上應九四以躁易之性喜應助之力志滿氣揚不安於下欲進而妄邀非分震動一時如飛鳥然鳥本在下飛則上而不下違時逆理以此招尤取敗凶所自致不亦宜乎孔子釋初象曰凡人凶害未有不可救止者如初六不安其分居下而欲上憑勢作威孽自己作凶之至也莫可救解亦無如之何矣此聖人致戒之深謂其宜下反上不能處小過而貞也按叔季之世小人憑藉聲援得時用事相與傾危國家逮天下既被其患而身家之禍敗亦隨之此初六之凶所以莫可如何也人君知此當制之於始不使勢重難反則可無尾大之憂與凌上之禍矣六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也此一爻言純臣守分以事君得小過之貞也三四陽爻皆居二之上有祖之象五隂爻有妣之象相過之謂過凌逼之謂及適相當之謂遇周公繫小過二爻曰六二以柔居中純徳之臣也其進而事君循理守分克驕亢之心秉恭順之節過三四而遇六五是去陽而就隂去亢而從順以象言之猶過其祖遇其妣也如此則不敢凌廹其君居下處順適得為臣之分以義言之是不及其君而遇其臣也不疑不忌何咎之有孔子釋二象曰六二之不及其君者豈才力有不足乎人臣之分固不可稍過乎君臣而過君小則專恣而不敬大則僭越而不忠有斷斷不可者惟不可過所以不及二之能免於咎者其以此歟按司馬光曰君臣之分猶天地之不可易然後上下相保而國治安王風既降君弱臣强如魯三家晉六卿之類蔑棄名分駸駸乎有及其君之勢罪莫大焉聖人於小過二爻特申之以大義曰臣不可過所以立綱常之凖為萬世之防其猶春秋尊王之義乎知其不可過而不過此六二之柔中為能恪守臣道而不失其貞也九三弗過防之從或戕之凶象曰從或戕之凶如何也此一爻見君子之防小人不可不過為之慮也周公繫小過三爻曰凡事不可太過獨防小人之心不可不過九三以陽剛之徳失位不中時當隂過正衆隂之所欲害者也若自恃其剛逞其才力謂可制之有餘不深思逺慮過為之防小人從此乘間而入為所中傷致有意外之虞大則患及於國小則危及其身凶可知矣孔子釋三象曰天下事惟有備可以無患今三無防患之術則戕害之者乘其無備出於意表始既莫知所自來終又莫究所底止其凶之甚也如此防之容可弗過乎從來小人之伺君子常密君子之待小人常疎漢之陳蕃竇武相與協謀剪除羣小惟機事不密反召禍端唐之李徳裕君臣契合近倖潛伏不知其志欲求逞一𤼵而遭貶逐此皆弗過防之故也聖人於九三諄諄告戒葢必立身不敗之地然後天下事可有為耳九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也此一爻言當善用其剛隨時合宜而不失其中也周公繫小過四爻曰九四當過之時剛而不中宜有咎矣然能以剛處柔寜過於柔而為恭弗過於剛而為傲適合乎處過之宜為弗過遇之之象所以无咎者在此若使任剛而往則躁進而任事或疎用壯而去邪過激是過於剛矣故有厲而當戒所以然者亦其時適當然耳如因戒往厲專於用柔則將柔過而廢矣故又勿用永守以為貞但當斟酌時宜善用其剛以求合乎中則處過之善道也孔子釋四象曰四之弗過遇之者惟其以剛居柔而不當位雖不中可以求中所以弗過於剛而適合其宜也若往厲必戒往則過剛失中終至於敗豈久長之道乎按剛柔貴於得中九四所居之位有中道焉然當羣隂用事以君子處小人之間進而圖功則為所傾陷退而守道亦不免孤危進退行藏之際岌岌乎難言之矣惟審機觀變動與時行則剛柔並用可以守中而不過此四之所以无咎也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也此一爻為居髙無助不能有為者戒也在穴隂象指六二已上過上也周公繫小過五爻曰六五以柔而中其才僅可小事乃居尊任大又當隂過之時優柔寡斷不能大有所為以沛澤於民如雲自西郊雖密而不雨之象是在已固不能為矣為五計者或得剛陽之佐扶持興起代君澤民則不雨者猶可雨也乃弋取者又六二之隂柔以無能之臣輔不振之君安能相助為理以圖天下之事乎孔子釋五象曰密雲不雨之故六五才弱而乃居尊過髙不能虚已下賢以求輔則膏澤屯而不下安望其有濟乎所處已上不能有為者也按小過之二象曰臣不可過其在六五曰已上是不特臣不可過即君亦不可過也若君處於太髙則上下暌隔必至下情蔽而不上通上恩壅而不下達天下之患莫大於是矣故君道則天而下濟佐理得人則民隱周知而澤可下究記曰天降時雨山川出雲言得賢輔佐之義也五之不雨殆可反觀而自見矣上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也此一爻明亢非小過之宜極言其凶以示儆也離過之逺也周公繫小過上爻曰上六柔而過中處極過之時又居動體之上凡事率意妄行弗合乎宜違理過常如飛鳥宜下離之而逺去則過髙已甚一蹶而不可救矣以此致凶天人交忌災眚不期而至皆上所自取非出於不幸也孔子釋上象曰當過之時宜下不宜上者也亢且不可况至於過亢乎上之弗遇過之者由其已亢而不能下所以犯上逆之戒而致天人之忌凶莫甚於此矣按小過初爻從下而上言凶之始上爻已上而亢言凶之終甚言小人在上乘時負勢釀禍作災不獨凶在一身亦且毒流天下故凡災眚之來如水旱凶荒日食星變山崩地震之類自天降者數猶可逭惟小人之凶孽由人作是謂災眚不可倖而免也聖人言之切慮之深總見處過者任小而不可大居下而不宜上能與時偕行尚何凶之有哉離下坎上既濟水火相交各當其用天下萬事已濟之時也而卦爻之辭皆有警戒之意正以安不忘危乃持盈經久之至計葢既濟雖非有患之時而患每生於既濟之後也初之曳輪濡尾則可保无咎二五雖相應而不能下交以取益則盛極而衰之漸矣三陽剛而有動衆之慮四居柔以逺患為亟至上六懐亢滿之志有入險之勢載胥及溺既濟可常保乎葢天下之理時過則衰日盈則昃月盈則虧牙孽萌生多伏於豐亨豫大之㑹故天地交而為泰而有无平不陂之占水火交而為既濟而有初吉終亂之戒聖人之垂訓切矣既濟亨小利貞初吉終亂此卦離下坎上水火相交各得其用六爻之位各得其正故名既濟卦辭言保濟之道當慎終如始而固守其貞也文王繫既濟彖辭曰既濟以治定功成為義當斯時也君明臣良同心協力處置咸宜而事無不濟矣但時當既濟則盛極將衰雖處承平之會常有不測之虞其為亨已小豈不可畏保濟者正宜存心戒懼祗畏以敬天省惕以勤民固守其貞方為利耳所以然者當濟之初多以謹畏而得吉及濟之終多以慢易而致亂始憂勤而終逸樂人情類然此保吉弭亂之所以必利於貞乎按水火交而為既濟猶之天地交而成泰也泰極則否既濟之反為未濟葢一治一亂天運之常而所以制其治亂者實由人事也三代以後貞觀之治號稱極盛然魏徴之告太宗莫切於十思十漸不以内外治安為喜而以居安思危為戒其於治亂危微之機慮其不克終者籌之熟矣圖治者所當三致意焉彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也此彖傳是釋既濟彖辭勉守正而戒止心所以通濟道之窮也濟下疑脫小字剛正謂初三五柔正謂二四上初吉指六二孔子釋既濟彖辭曰時當既濟治定功成豐亨之盛已過而衰微之兆將開其所為亨亦僅得其小者耳然非守之以貞雖小亨豈易保乎故辭言利貞者卦之六爻初三五以陽居陽是剛得其正而當乎剛之位二四上以隂居隂是柔得其正而當乎柔之位剛柔正而當本位則剛能勵精以圖治而不好大以生事柔能持重以固守而不因循以滋弊保濟之所貴乎貞也如此其初之得吉以六二當濟之初柔順得中柔則敬慎而不渝中則善用其柔而不過有謹畏之小心無廢弛之失事濟道方興而得吉宜矣至終之所以亂者非終自為亂也當既濟之終人皆有苟且安止之心則始之憂勤漸衰終之怠荒日起將百度俱廢莫可支持亂之所由生也使人無止心亂安從生此濟道之窮人所自取可不以利貞為兢兢乎按既濟之時剛柔各正其位極治之象也然濟之初吉不取剛正而取柔中何也柔中則持盈戒滿任人守法不事躁妄更張而又非因循而止故事治功成自可久而不亂若止則過柔而非中一切不為有良法而不能守有正人而不知用道窮則亂所當深戒矣象曰水在火上既濟君子以思患而豫防之此象傳見防患不可不豫君子所以善體濟也孔子釋既濟象曰此卦坎水居離火之上水能潤下火能炎上相交而各得其用既濟之象也君子體之以保濟時方未有患也常恐患生於所忽每隱而不及覺故貴用思思以善其終也又恐患生於所伏一𤼵而不及持故貴用防防以謹其始也徹始徹終反復紬繹既慮其患於未形又嚴其備於未至則雖患至而有弭患之道濟可長保而無虞矣從來國家之患常由於己治已安書曰儆戒無虞罔失法度記曰禁於未𤼵之謂豫古帝王制治保邦未有不深思逺慮防患於未然如成湯之危懼大禹之克勤是也叔世之君每恃其富盛而不謹於幾微遂馴致於禍亂而不可救如唐之明皇宋之徽宗是也孰得孰失有國者可不為殷鑒乎初九曳其輪濡其尾无咎象曰曳其輪義无咎也此一爻見能敬慎於始處於不敗之地也曳輪濡尾皆在下不前之象周公繫既濟初爻曰初九當既濟之初剛而得正剛則有圖濟之才正則又慎重周詳不敢輕為躁進其任事也重若輿之將進而自曳其輪不輕進也其慮患也深若狐之將渉而先濡其尾不輕渉也當濟之初而謹戒如此則防患豫圖釁隙不生豈有終亂之咎乎孔子釋初象曰車以輪而行能自曳之則不亟行矣今初之任事長慮却顧不急於求進其慎重如此以義度之必不至於顛車覆轍所謂无咎也固宜矣此可見天下事莫不成於持重敗於輕躁當濟之初無大險難其患尚淺防之猶不可不慎况處遺大投艱之日乎古來英材濟事必以臨深履薄戰兢小心為本才如武侯克任大事其所自明之語不過謹慎而已其不敢輕於求濟乃能有濟也此初之所以无咎歟六二婦喪其茀勿逐七日得象曰七日得以中道也此一爻見守中以待時方成保濟之功也茀婦車之蔽七日得是隂陽之數窮於六七則變而可通也周公繫既濟二爻曰二以中正上應九五之君同徳相濟宜得君行道矣但五當濟之將終未免茍止之心生任賢之意怠臣不得君無以行道猶婦喪其茀而失其所行之具也然為二計者中正之道豈容終廢惟待時而動不汲汲於求行久當見用不猶喪茀者勿逐而七日得乎葢揆之理數終將得君以行道也孔子釋二象曰二之能勿逐而自得豈無故哉以其得中道則濟時之任有舍二不能者數窮理極久而必合所以七日得也又何事於逐而後能得乎從來濟世之君子懐才抱徳不先時而動不後時而廢以進退從違之機在我而不在人也故畎畝樂道而任天下之重巖野旁求而成濟川之功下固可以無求於上上且不得不有求於下此主持濟運者尤當下賢禮士用正人以行良法庶可保吉而不至於終亂矣九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也此一爻言兵不可輕動當以擇人為要也鬼方北方幽逺小國憊困也周公繫既濟三爻曰三以剛居剛當濟之時與上為應内治將終而或勤於逺畧以誅罰不庭然險陷在前難以驟克有髙宗伐鬼方至三年方克之象夫以髙宗之賢主伐鬼方之小國勞民動衆遲之又久其用兵之難如此若任用小人輕啓兵端志在逞威挾忿殘民肆欲其患可勝言乎故小人必在所勿用也孔子釋三象曰伐必三年後克者則師老財匱亦已憊甚也兵可輕舉乎按時當既濟之後承平日久啓多事之端於無事之日舍内治而召外釁皆小人為之也隋末之經畧西域始於裴矩前宋之謀破遼本於安石小人開邊釀亂貽害國家此其較著者矣故曰戎寇之禍逺小人之禍近聖人於用兵之時每戒以小人勿用其在師之上六與既濟之九三具有深意所以為萬世訓豈偶然哉六四繻有衣袽終日戒象曰終日戒有所疑也此一爻言有備患之具尤當存備患之心也繻當作濡舟漏也袽敝衣所以塞舟之罅漏周公繫既濟四爻曰六四柔而得正當濟之時小心畏懼過於敬慎不恃其久安無事凡所以拯災弭亂之術無不豫備而其心猶不敢自安也每患變生於意外禍𤼵於不虞防之又防如乘舟者慮或罅漏濡濕而豫備衣袽似可無患矣猶恐漏至俄頃而不及覺終日戒懼罔敢稍懈葢處過中之會恐生茍止之心慎之至也孔子釋四象曰四之終日戒者豈漫為無益之憂哉其心誠有所疑畏常恐一息不謹禍患旋生雖謀出萬全不敢自信此戒心之無已而深於保濟者也按既濟之世不有外患即有内憂二者皆所當慎防也然内憂之所伏每起於外患之既除若外無蠻方敵國之患而内有失人敗度之憂則天下之罅漏莫大於是矣在昔晉平吳亂而晉自亂隋取亾陳而隋自亾惟侈然恣肆茍止偷安不為終日計也是安得不豫備而切戒之如四之拳拳不已者乎九五東隣殺牛不如西隣之禴祭實受其福象曰東隣殺牛不如西隣之時也實受其福吉大來也此一爻言處濟者以實不以文方可得時而保吉也東隣陽也指五西隣隂也指二殺牛是盛祭禴是薄祭周公繫既濟五爻曰九五以陽剛中正為濟之主但濟道將終若有一滿假之心未免驕侈易萌文治有餘而實意不足不如二當初吉恪守中正之徳文不足而實有餘足以致濟而輔五之治象如東隣殺牛其祭雖盛反不如西隣禴祭之薄而能實受其福也孔子釋五象曰東隣之盛不如西隣之薄者以其時不同也二當初吉之時不務虚文能乘時圖濟有真實受福之具所以昇平之福方來而未艾也若五當終亂之時過於侈盛安可不防維收斂以保其吉乎按人主當既濟之時坐享盛業惟誠敬之心為祈天永命之本若此心一衰徒事誇張則治功不進而倦且止矣非所以格天心而膺多福也聖人諄諄垂訓以明濟之時宜畏不宜肆猶祭之時在誠不在物主濟者明於此義可以得時而長保濟矣上六濡其首厲象曰濡其首厲何可久也此一爻言不能防患以濟險為終亂者致儆也濡首謂首尾俱溺周公繫既濟上爻曰上六居險體之上當既濟之極乃以隂柔處之惟務為因循玩愒偷安委靡不振至於末流將險愈深而亂愈不可治象猶狐之渉水而濡其首則身已沈溺其何能濟此正道窮之日危可知也孔子釋上象曰上之濡首而厲者葢自恃為濟怠心日勝不能思患豫防一旦患至而無其備莫可如何惟有淪胥及溺而已豈能久乎按既濟六爻由離明而入坎險内三爻言已濟之事外三爻言由既濟而開未濟之漸可見保濟之道當安不忘危治益求治乃為長治久安之道也至上六所謂終止則亂天時人事危微絶續之關聖人於此不言凶而言厲正救時之深意欲人於不可久之中求可久之道也如輪臺之悔過興元之罪已君子猶有取焉然亂至而圖不若未亂而防尤為制治保邦之要道而處既濟之日者亦可有終無亂矣坎下離上易不終既濟而終未濟者何也造化之理無往不復人事之變終則有始既濟則功已畢未濟則事復始有生生之義生生之謂易所以終未濟也為卦下坎上離水火不交六爻皆不當位故為未濟然剛柔皆相應應則隂陽相助而未濟者終於必濟故彖辭言亨既濟已然之亨也未濟方來之亨也然處未濟者必有進作有為之才慎始持終之力後能濟天下之艱難初六六三二爻皆隂柔失位一處險之初一未離乎險故有凶吝之占九二剛中與五相應為佐濟之才然身在坎中猶必舒徐審慮有待而進九四以剛居柔剛而不輕用其剛征伐鬼方三年而後奏績葢於未濟求濟若斯之難也六五離明之主以文明之盛而養之以晦以精斷之智而運之以柔方且虚其中以照臨百官堅其誠以信任羣下安得不一掃大難為無難之世一變未濟為既濟之時乎至上九之濡首乃有所陷溺而不能濟者所以於爻終示戒也總之聖賢之處世在既濟之日則無時非未濟之心在未濟之日則無時非欲濟之念乾之自强不息終日乾乾而夕猶􅅥若者由此道也是故既濟未濟合而易道終矣未濟亨小狐汔濟濡其尾无攸利此卦坎下離上水火不交不相為用卦之六爻皆失其位故名未濟卦辭言求濟之道當以敬慎持其始終也汔幾也濡尾力竭而不能濟之象文王繫未濟彖辭曰未濟以治功未定為義當斯時也衆心未協人謀未臧事不能遽有所濟然以天運言之終有可濟之理故可以得亨顧所以致亨之道必老成持重敬始慎終慮出萬全而後克濟如不自度其才力果銳以求進而不謹密以圖成使紀綱稍振法度粗舉即以怠忽乘之若小狐幾濟而濡其尾則事終於不濟尚亦安所利哉按未濟之時大險未過世難方殷其勢非天下之大才不能濟天下之大事是在離明之主慎擇其才而用之使老成練達者倡率於前方可驅䇿羣力經營逺大若衡量失當誤用小才冒昧當先必不能出險以終事此圖濟之道全在得人聖人取象小狐深以為戒不可不慎也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也此彖傳是釋未濟彖辭明柔中之善於濟事又貴相助以成其濟也柔得中指六五未出中謂未出險中孔子釋未濟彖辭曰未濟而辭曰亨者豈徒有可濟之時哉卦體六五柔而得中柔則能小心謹慎得中又處事得宜故終於能濟有可亨之道耳其曰小狐汔濟者時當坎險雖有事於圖濟尚未出險之中値此將濟未濟之時正湏畢智竭能以求必濟而辭乃謂濡其尾无攸利則究其所事由於輕為躁動始銳而中懈若狐之首濟而尾不濟不能繼續以成其終也又何利乎然非時之不能濟惟人之不善濟耳而所以可濟者未常不在也卦之六爻雖隂陽皆失其位謀猷未臧而剛柔各相為應猶能同心協力補偏救弊於理於勢可以共濟而續其終也何至幾濟而濡其尾哉此未濟之終可濟而得亨也如此按既濟未濟兩卦其理互相𤼵明既濟之吉以柔得中未濟之亨亦以柔得中則敬慎勝也既濟之亂以終止未濟之无利以不續終則克終難也既濟之貞以剛柔正未濟之可濟以剛柔應則交濟之功得也總見聖人求濟之事敬慎以保其終則事無可輕忽之時相應以補其偏則人無不可濟之事反覆紬繹濟之能事畢矣象曰火在水上未濟君子以慎辨物居方此象傳言物當各止其所君子以慎辨體濟之用也孔子釋未濟象曰離火在坎水之上上下不交不能相濟為用未濟之象也君子體之以為時當未濟則物之倒置易位者多矣不可不謹慎而明辨之因器命名縁分定制使疎不得擬親卑不敢抗尊小不致絜大則物各有方所而居之不遷始於相别終於相得而濟世之業俱出其中未濟者何憂不濟乎按繫辭傳曰方以類聚物以羣分如水火異物各居其所天地自然之定位也王者承天意以從事自一身以至天下國家莫不各有當然之分既濟未濟之所以不同者惟分定與亂故耳故君子以慎致辨順天地自然之位使分定不亂如水火之不相雜而未始不相為用焉則可以贊化育而成濟功矣初六濡其尾吝象曰濡其尾亦不知極也此一爻言不能量力妄進為終於不濟者示戒也極是終周公繫未濟初爻曰初六以隂柔居下當未濟之初又値難濟之時無才無位豈能進而圖功乃不自為量度而欲輕為冐進急於求濟若狐之渉水而濡其尾則終於不濟而已豈不可羞吝乎孔子釋初象曰凡事必敬始而後可以善終若初之濡尾豈獨時之難濟哉由其所以濟者亦昧於敬慎之道不審勢量力冒昧干進是但知始之欲濟而不知終極之不能濟也亦可惜矣按古之濟大事者未事之先必能見其始而要其終區畫時勢瞭若指掌及其任事而有成也不出其規模之所素定三代以下如韓信之權楚漢諸葛亮之度孫曹皆預決於築壇命將之日與草廬三顧之中其後卒如其當時之所言者凡以規模之素定也若其始漫無成見臨事嘗試而欲倖其成功者未之有也此濡尾之羞不能繼續以終其事既專著於彖辭而爻又首及以示戒歟九二曳其輪貞吉象曰九二貞吉中以行正也此一爻言能恭順自守得臣道之正也曳輪是不遽進之意周公繫未濟二爻曰九二以陽剛之才上應六五柔順之君急於有為未免有太廹之虞乃以剛居柔能恭順退守不欲速專成冒進以邀功若車之行而自曳其輪不輕於求進在人臣之道為甚正而濟時之業可徐圖其貞而得吉也宜矣孔子釋二象曰二以貞得吉可謂能行正矣然所以能正者由其居柔得中惟中則宅心恭順見之行事自能虚衷謙退寵利不居以行乎臣道之正所以為吉也從來幹濟之臣處艱難之地往往事權太重威福得專不克保有其功名者多矣皆由不明於貞吉之義者也為人臣者敬守此義而勿失焉庶可成濟時之功而善其終矣六三未濟征凶利渉大川象曰未濟征凶位不當也此一爻見濟險不能獨任當資人力以求濟也未濟謂未出坎險也周公繫未濟三爻曰三以隂柔不中正居未濟之時本無濟世之才徳以為出險之具使獨往以求濟則力微任重鮮不至於胥溺能無凶乎然未濟有可濟之道險終有出險之理所患者獨力不能以濟耳今三以柔乘九二之剛得倚仗之人而時將出險又値可濟之㑹誠能資其才力以匡將出之險亦何渉川之不利哉孔子釋三象曰凡圖事者必有可為之具三所以未濟征凶者由其隂柔而居剛位所處不當既無才徳而獨力以往未有不敗者故得凶也按未濟五爻不出卦名獨於六三一爻見之葢以六三隂柔又不中正居險之極必不足以濟險也又云利渉大川者謂若得陽剛之助則亦可以出險而有功其如三之不能何也夫以六三之隂柔而猶以渉川望之則𢎞濟時艱者不在同心之助哉九四貞吉悔亾震用伐鬼方三年有賞于大國象曰貞吉悔亾志行也此一爻言大臣有濟世之責當振作有為以成其志也震震動也周公繫未濟四爻曰九四居上卦之下方出乎險雖無内憂而未免於外患又以剛居柔常恐畏難避事疑於不正而有悔也能勉之以貞則匪躬盡瘁克殫臣職而獲吉夙夜匪懈問心無愧而悔可亾矣然所為貞者何如時方未濟反正之功非可因循以圖必震𤼵有為攘外以安内且至功深日久期於底績乃克有成為震用伐鬼方三年有賞於大國之象如此則非貞何以得吉而悔亾乎孔子釋四象曰四當未濟而志存乎濟世能以貞自勉則明作有功克壯其猷無不濟之悔而志可行矣按聖人作易止此一動一靜之義安危得喪之機皆由此出焉如同一伐鬼方也既濟之時雖克而猶憂其憊利用靜也未濟之時必伐而後行其賞利用動也且既濟之三過剛恐其宜靜而妄動未濟之四居柔又恐其宜動而反靜此聖人互明其義一為保濟者戒一為求濟者勉其意深矣六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也此一爻言柔中之徳能始終盡善以成濟也周公繫未濟五爻曰五以隂居陽疑於不正然為文明之主本體虚靈既心知正道覺悟善反又居中應剛能虚心下賢克己勝私至於陶融純粹無復慙徳矯偏而一歸於正故得貞吉而无悔矣由是而為闇然日章之君子暢於四體見於猷為其光輝𤼵越一皆誠意相孚非有假飾於外者吉之道也孔子釋五象曰君子之光在己固無不吉矣至於盛徳之孚不但暢逹於一身亦且光被於四表成功文章無不煥然可見將文明日啓天地為昭其暉而得吉非濟功之極盛乎按六五為未濟之主經綸匡濟一本於有孚之誠正非好智用察以聰明才辨自矜而陵人者所可同日語也故曰君子之光光從孚出而暉又從光生故和順積中英華𤼵外不獨君子之獲吉而凡被其暉英者無不獲吉矣此爻終始言吉反覆歎美深有味乎柔中之㫖歟上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也此一爻見處濟有善道不可過於自縱也周公繫未濟上爻曰上九以剛明居未濟之極有能濟之才時已將濟功已垂成若才過乎剛求濟不已則反生患但當從容自信不妄作為而與時休養若有孚於飲酒然自无欲速僥倖之咎然非一無所事而侈然自縱也若使過躭逸樂沈溺不返如飲酒而至濡首則信非所信為有孚失是而事終不濟矣所當戒也孔子釋上象曰飲酒而至濡首但知有孚之為是而不知是之所在有當然之節不可過也使裁度得中不至於失是則慎終者可以保始而寜患其不濟乎按千聖傳心之要典不外乎一中易為盡性至命之書所言無非是也既濟之九五言時未濟之上九言節時與節即所謂中也乾知進退存亾其聖人之中乎未濟以不知節為戒節正隨時以取中也知節即知進退存亾而不失義命之正易之始終大義畧可見矣中庸曰時中又曰中節為得性命之傳其在是乎日講易經解義卷十四
