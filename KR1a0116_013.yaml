body:
  text: 欽定四庫全書日講易經解義卷十三艮下離上卦內艮外離止而麗於外有旅象焉又山止不動猶舍館也火動不止猶行人也居莫如止故以艮為體往莫如明故以離為用旅莫善於柔爻柔者吉剛者凶處旅之道也旅不能無得喪爻柔則得剛則喪必然之理也卦唯二三兩爻得其正位然九三剛而不中處非其地唯六二柔順中正與六五兩柔相應有賔主同德之象六五雖不得位然卦從乾變六五舍乾之剛健而得柔之文明居上卦之中以順乎二剛得處旅之道彖所謂小亨旅貞吉者二爻是也行旅之間柔得中不取辱順乎剛不招尤止而不妄動明而識時宜亦安往不吉而亨乎孔子以東西南北之人而為萬世師用旅之道者也且聖人之隨寓而安過而不留何者非旅又不特一行旅之用矣旅小亨旅貞吉此卦艮下離上山止於下火炎於上有去其所止而不處之象故名為旅卦辭言處旅者當以正道自守也旅謂羇旅文王繫旅彖辭曰人當羇旅則失其本居而身寄於外親寡情疏難以得亨以卦體六五得中而順乎剛卦德艮止而麗乎明雖羇旅本無大通之理而處之有道則尚可以自通而小亨夫旅非常居似若可以茍者然道無往而不存茍非善處鮮不失矣故必禮以律身智以照物非賢不主非善不與守其旅之正而須臾不離斯得處旅之道而吉矣大抵常變久暫惟遇所遭故旅者生人之所不能免也而吉凶悔吝全在乎處之正不正聖人之垂戒深矣哉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉此彖傳是釋旅彖辭而明旅之難處也孔子釋旅彖辭曰旅之所以小亨者何哉蓋處旅之道貴乎得中而病於自用今以卦體言之六五柔得中而在外順乎上下之二陽是在已既有柔中之德而謙卑適宜又能順附乎陽剛而恭順不失處已處人兩得其道則其所如皆合矣抑處旅之道貴於靜正而患於不明以卦德言之艮止而離麗乎明是內既靜專而不失於妄動外灼物情而不迷於所往內外交盡其善矣是以在旅而小亨而為旅貞吉也夫卦德卦體如此而僅得小亨則非得中而順剛內止而外明即不得以小亨矣必守正而後得吉則少不正而即不得吉矣是難盡者旅之義難處者旅之時則旅之時義不其大哉甚矣旅之難處也按人當羇旅是失其所居之時剛必招禍而柔必取辱所以處之者誠不可無其道也然平陂之形雖在於世而貞正之守則在於我君子素其位而行亦惟正已而不求於人已矣象曰山上有火旅君子以明慎用刑而不留獄此象傳是言君子慎刑之道也孔子釋旅象曰山上有火去而不留旅之象也君子以主刑者民之司命故當其用刑之時審察必極其明而使無遁情又不敢以慢易之心乘之而務加謹慎輕重得宜出入惟允如山之止以為慎而不敢輕忽也明慎既盡而斷決隨之當刑即刑當宥即宥如火勢之不留而不至淹滯也按明慎者君子之仁也不留者君子之義也仁義並用而治獄之道盡矣義而不仁則傷於暴而濫及於無辜仁而不義又傷於懦而威阻於強梗必如君子然後可當折獄之任而天下無寃民也乎初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也此一爻是為處旅卑陋而召禍者戒也瑣瑣細小卑賤之貌周公繫旅初爻曰初六以陰柔居下位是旅之志意汙下而規模局促者也其才質瑣瑣而無遠大之槩如是則誰其豫之乎自輕而人輕之自侮而人侮之災咎之至非自外來實已有以取之耳孔子釋初象曰人之志量原不可以卑陋初六之旅瑣瑣者其志量局促亦已窮矣所以來人之輕侮而取災也按旅之致窮不在位之卑下而在志之猥瑣舜之陶漁尹之鼎爼説之版築鬲之魚鹽聖賢未遇之時未嘗不親瑣事顧志趣超然物自不得而纍之初之位與志皆極瑣陋故窮而致災如此君子所以惡居下流也哉六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也此一爻是言處旅之最善者也即謂安次謂舍周公繫旅二爻曰六二柔順中正與物無忤而處置得宜以是處旅有無往而不吉者故次者旅之居二則即次而有以安其身資者旅之用二則懷資而有以裕其用童僕旅之服役者二則得僕之貞信為能無欺而有所賴藉蓋旅中之善要不出此三事惟其德全故旅中之所當得者皆無不備耳孔子釋二象曰當旅之時不能無賴乎童僕之用亦不能免乎童僕之欺使不得其人則即次不安而居亦難保矣今得童僕之貞則無欺有賴而可以無患是以終無所尤也按天下無事不藉乎人而當旅之時得人為尤急茍能得人則身不勞而勢不孤所以保其居而裕其資者皆有賴矣然惟御下有方仁足以育義足以正衆自樂而從之故曰水就乎下人就乎善豈不信哉九三旅焚其次喪其量僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也此一爻是為過剛而失處旅之道者警也周公繫旅三爻曰處旅之道貴於柔順謙下今九三過剛不中居下之上驕亢自髙而御下寡恩鮮有不困於旅者矣故以此處人則人莫之與如焚其次而失其所安以此處下則下皆不從為喪其童僕而一無所賴夫所居既無爰處之安而在下復有叛離之患雖九三之心初未嘗不正然能免於失依寡助之厲乎孔子釋三象曰旅而焚次則身失其所安亦已傷矣况又喪其童僕乎夫當旅之時童僕乃其所藉賴者乃過髙自亢而失其心何以致其服從而樂為我用乎其義必至於喪也按三與二正相反觀二之所以得則知三之所以失矣夫居剛用剛在平居猶不可况羇旅之時乎若三真可為過剛無徒者以此接物而御衆安往而不致困窮哉九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也此一爻是言處旅者身雖安而志未得也資謂資身之財斧謂防身之器周公繫旅四爻曰九四以剛居柔是能用柔而下人者故於人無所忤於事無所拂以此處旅雖未獲即次之安然旅其所可旅之處是已得所歸而安矣雖未能懷資而裕然既得資則足以自利得斧則足以自防矣但在上之五非陽剛之與在下之初惟陰柔之應則所處非久安之地所與非可仗之人何能伸其才而遂其志乎故雖有旅處資斧之善而心終有所不快也孔子釋四象曰旅貴於行處而不行非旅之亨矣所謂旅於處者九四以陽居隂非其正位故處而不能行也上無同德之助下無可援之人豈能盡如吾意哉故雖得資斧足以自利而自防然其心終有所未快也按四以近君為當位獨旅之六五不取君義故四為未得位而心有不快蓋士君子本以得志行道為願當旅之時豈肯以茍安自便而遂已哉六五射雉一矢亡終以譽命象曰終以譽命上逮也此一爻是言得遇其主而名獲顯也雉文明之象命名也周公繫旅五爻曰六五為離之主本體柔順其德文明而又得中道者也以羇旅之人觀光上國不免道途之費如射雉者亦未免於亡矢也然身名由此顯終克以譽命傳之無窮則所喪者少而所得者多矣孔子釋五象曰終以譽命者以其有文明之德而為命世之才則出其學術抱負以達於君而名譽升聞於上也按此卦六五爻辭所以不取君象者以天子四海為家無旅故也故變其例以旅人之觀光者當之然即以在上者言因其德之柔順文明而來四方之士未始不可取象於君也可見變易之中而有不變易者存易無典要殆謂是歟上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也此一爻是為過剛而失所居者警也旅人指上九周公繫旅上爻曰上九過剛處旅之上是驕亢自高而卒無所依夫自髙而失其所依如鳥以巢為居而見焚則不得所安矣其在旅人始焉鳴豫自適而驕樂於未焚之先終焉後事興嗟而悲號於既焚之後旅之極困者也所以致此者由其過剛處旅之上當離之極自驕以乖和順之德如牛為柔順之物而忽然失之似喪牛于易者然焚號之凶其能免乎孔子釋上象曰當旅之時惟謙順可以自安上九處旅時而好髙自上必不見容於人以義揆之自應巢焚而失所安也又言喪牛于易者由其驕氣方盛故失其柔順之德而不自聞知也使其早能覺悟亦何至於焚號乎按旅之時宜用柔不宜用剛故三陽皆為不利九四之不快不及乎中也九三之焚次上九之號咷過乎中也不及雖未免於弗振而過剛必至於摧折蓋天下志驕氣溢之人但知取快目前而不悟後患之至凡事皆然豈獨處旅之道哉巽下巽上巽以順乎人情如風之動風無微而不入以為天之號令故有風以先之復有風以隨之上巽以象君之出命下巽以象民之從命論成卦則以初四之柔為主論六爻則以二五之剛為重蓋巽本取柔之卑伏然當巽之時陽亦用巽道以懷服乎下故史巫紛若先庚後庚皆有丁寧詳審之意焉總之巽之為卦以居中得位為善二得中而失位三四得位而失中初與上則中位俱失唯以九居五位乎中正所以吉無不利而為申命之主蓋陰始生而陽順之二五其最近者也剛而有巽義所謂剛巽乎中正也二五據用事之地而初四處其下無違乎教命所謂柔皆順乎剛也巽小亨利有攸往利見大人此卦上下皆巽以一陰伏於二陽之下其象為風其性能巽以入故名為巽卦辭言人有所為自用則小而資人則大也文王繫巽彖辭曰凡天下之事陽剛有任事之力陰柔無幹理之才此卦以陰為主才力不足未克大有所為僅可以小亨耳幸能以陰從陽則已於人無所拂人於已有所資事可立功可成而利有攸往也然必所從者為陽剛中正之大人乃為得其正而有利見之益可不慎歟按八卦之重上經先乾次坤先坎次離下經先震艮次巽兌皆崇陽也巽次旅旅曰小亨離之一陰順乎上下之二陽也巽曰小亨巽之一陰上從乎二五之陽也從陽則利不從陽則不利可見陽為貴而陰為賤矣聖人示陰以從陽之利正欲其安為賤之分也哉彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人此彖傳是釋巽彖辭以明剛柔有相資之義也剛巽乎中正而志行指九五柔指初六六四孔子釋巽彖辭曰此卦上下皆巽是重巽也巽之義為入重巽則深入之至矣夫人君之入人莫重乎命令巽則人君所以施命而告四方者不厭反覆丁寧之詳有以直入乎人之隱此重巽乃為申命也卦辭言小亨利有攸往利見大人者蓋以卦體之九五言之天下剛者恆不能巽順九五剛也而巽入乎中正之德是為上者剛足以斷執而出之以中施之以正則以一人之中而使天下之不中者歸於中以一人之正而使天下之不正者歸於正以此建中於民表正於世而為所欲為則志無不行矣又以卦體之初六六四言之天下柔者多不能自振今以初之柔而順二之剛四之柔而順五之剛則柔得剛以為助不徒一於巽順而可以奮發有為矣夫柔皆順乎剛是以小亨而利有攸往然有五之剛巽乎中正而志行則又為大人之象而利見大人也按剛柔不可獨用亦不可偏廢一於剛而不得其中則必至暴戾而無以宜衆一於柔而失陽之助則必至退怯而不能自行夫惟剛柔交濟則不競不絿無所施而不當矣若徒以一陰潛伏之為巽而不知初四有順乎陽剛之象五有順乎中正之德則巽之所以致亨者豈可得而見耶象曰隨風巽君子以申命行事此象傳是言君子體巽之象而有深入民心之政也隨相繼之義孔子釋巽象曰風本善入之物風行相繼則無物不入巽之象也君子體之以為訓示萬民而命令不詳無以入斯民之志凡事關紀綱法度之大禮樂刑政之重利所當興弊所當革必以其所行之事先為申其命令致丁寧反覆之詳使自近及逺無不曉然於上之意指然後從而行其所命之事焉自有以深喻乎民而無不遍矣按人君出政必有命令以布之諄諄於言語之間惟懼不明且盡此何心哉無非欲通上下之情而始不至扞格耳茍無真實之心而徒鋪張於誥戒之煩則元朔之詔不能回廉恥之風建中之詔不能戢強藩之弊雖申命何益耶此大哉之言必本於一哉之心也初六進退利武人之貞象曰進退志疑也利武人之貞志治也此一爻是言初之無斷而示以矯偏之道也進退謂不果周公繫巽初爻曰初六以陰居下為巽之主是卑巽之過一於柔懦者也於是凡事之來皆退怯而不敢為當行復止方進復退為進退不果之象夫天下之事惟斷乃成退怯如此曷克有濟若以武人之貞處之振其懦而作其氣出其果斷以濟巽之所不及則自不安於退而能遂其進矣何利如之孔子釋初象曰天下事之行止皆由於志初六之志有所疑而不決故欲進而不果於進也又曰利武人之貞者蓋人之志治則決亂則疑茍能先治其志而有一定之主尚何進退不果之足患哉按人之氣質必有所偏惟能力矯其偏斯為善變化夫氣質洪範三德正直而外髙明者則用柔克沈潛者則用剛克初之柔弱不振所謂當以剛克治之者也聖賢教人之法帝王治世之權皆不外乎此矣九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也此一爻是言二能卑巽以逹其誠也床下謂卑者所處古者尊者坐於床卑者拜於床下也史職卜筮巫主禱祠皆通誠意於神明者周公繫巽二爻曰二以陽處陰既不敢自安而居下得中又不為已甚故能順以自持行過乎恭矣然由實意以逹外初非流於諂也卑以自牧事過乎謙矣然本至誠以發越又非失之媚也猶巽在床下而用史巫丁寧煩悉其辭以道逹於神明之前此為善用其巽者也如是則克盡事上之道而收格君之功吉而無咎又何疑焉孔子釋二象曰二之用史巫紛若而乃得吉者何哉以二居下體之中為得中道小心而不失於卑諂巽順而不同於取容此所以為吉也按下之事上固貴乎柔巽然必有至誠以將之所謂敬發乎中不以迹而以心也勿欺矢於靖獻之先納牖出於積中之素則將順其美固見夫恪恭而匡救其失彌形夫忠愛唐太宗謂魏徴人皆言其疏慢朕獨覺其嫵媚誠有以也夫九三頻巽吝象曰頻巽之吝志窮也此一爻是言不恆其巽者有取辱之道也周公繫巽三爻曰九三過剛不中既非下人之資居下之上又挾上人之勢本非能巽者也其巽也特勉為之耳夫勉為之者雖可強飾於一時而不能堅持於永久為頻巽而頻失之象如是則終歸於不巽而以滿招損不亦吝乎孔子釋三象曰巽本不可以偽為九三之巽非出於中心雖強以欺人而故態復發自不可掩則終不足以欺之矣其志不已窮哉按天下之理誠則可久不誠則不可久若勉為巽而不出於誠是欲以聲音笑貌襲而取之者也自以為其術甚工而其患卒不免於窮作偽心勞日拙亦何益之有哉六四悔亡田獲三品象曰田獲三品有功也此一爻是言能下人者來多助之益也田謂田獵三品一為乾豆一為賔客一以充庖周公繫巽四爻曰六四隂柔無應是既不得在已之力而復不得在人之力者况上之所承為五下之所乘為三又皆陽剛而非陰柔所能處似不免於悔矣然其用柔能下秉謙恭以接物本和易以近人故所承與乘之陽剛非獨不之侵反為之助而悔可亡且不獨僅有所獲而已賢才彚集共效協贊之功群策畢妝咸獻匡勷之益殆如田獵所獲之多足以備三品之用也孔子釋四象曰田獲三品則所獲者為已多矣四謙以下人而人為我助則凡事無不得其所求者故不但無悔而實有功也按人之不肻下賢總欲功必自已出耳不知能虛懷下人妝天下之賢豪以為國用則天下之功皆其功也此其理尤為人臣者所當知故曰中臣事君以身上臣事君以人事君以身者勞而寡效事君以人者逸而多獲此之謂矣九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也此一爻是言貴更新以善治也庚更也先庚三日謂丁後庚三日謂癸丁所以丁寧於其變之前癸所以揆度於其變之後周公繫巽五爻曰五居巽體恐其承前人之積弊未免有茍且偷安之意宜有悔矣然幸有陽剛中正之德終能奮勵改圖則有貞而吉可無巽懦之失是得亡其悔而無不利也夫始之有悔是無初也亡其悔則有終矣此皆改圖之善也然當其時必丁寧於未變之前而熟思審處務為先事之防使吾之所為者果皆盡善之規然後從而變之又必揆度於既變之後而逺慮深謀求為善後之䇿使吾之所為者果皆經久之圖然後從而安之如是則所革皆當人皆信從世為法則而得吉矣孔子釋五象曰五之所以得吉者以其所居得陽位之正而居卦之中有此中正之德則意見不偏施為允協所以丁寧而揆度者莫非本此德以行之故貞而吉也茍無其德安能善變而得吉乎按蠱言先甲後甲巽言先庚後庚蓋甲者十干之首事之造端也蠱之敗壞已極故以造事言之而取諸甲庚者十干之過中事之當更者也巽之積弊漸萌故以更事言之而取諸庚此聖人謹其始終之意也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也此一爻是為過巽而無斷者警也喪其資斧失剛斷之象正必也周公繫巽上爻曰上九處巽之極巽不以正而失其陽剛之德象為巽在床下而過於卑巽以至懦而不立威斷絶無如喪其資斧者然縱使施於當巽之地而柔弱無以自振遂致取人之侮雖得其貞安能免於凶乎孔子釋上象曰巽在牀下者言上居巽之極專以巽順為心其巽至於已甚而窮也喪其資斧者過巽則失其剛斷自然取辱而招侮有可必其凶者矣按上九巽在牀下與九二之取象同而有吉凶之異者蓋九二巽在牀下而用史巫紛若則為過而不過所謂不至已甚者也故逹其孚誠而得吉此爻巽在牀下而喪其資斧則為巽之太過而失其陽剛之德矣故流於卑諂而獲凶學易者其可不知所以自處乎兌下兌上取坎水而塞其下流為兌澤澤有喜氣洋溢之象又一陰進乎二陽之上為氣之舒散乎外者故近乎説然説之為道茍不以正則流為邪媚故彖戒以貞而爻貴夫剛焉蓋説之易涉於不正者病在柔外而説之所以得其正者實本剛中三與上為柔外故能説二與五為剛中故能利貞三以柔居剛為下兌之主來而求陽之説其惡易見故本爻凶上以柔居柔為上兌之主引而致陽之説其情難測故比爻尤不可以不戒六畫唯初有廓然大公和而不同之象為得説之正而已按聖人於三女之卦多以貞戒之離曰利亨貞巽曰利貞兌曰亨利貞蓋陰柔之質多病於不正故皆以正言也兌亨利貞此卦上下皆兌一陰進於二陽之上非其所望喜見乎外故名為兌卦辭言説當出於正而不可妄説也文王繫兑彖辭曰卦體剛中而柔外人誠能以剛中之正説人則人情無不樂吾之可親上感下應歡忭交通而自亨夫説固有亨道非道求説又在所當戒故必其所説者一出於天理人心之正而無邪佞柔媚之私乃為利也按説有亨道而必利於貞者是因其所不足而戒之之辭也此王道之熙皥所以異於霸者之歡虞歟彖曰兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉此彖傳是釋兑彖辭而極言其説道之大也剛中指二五柔外指三上孔子釋兌彖辭曰卦名兌者以一陰進於二陽之上喜見乎外有和説之義故名兑也夫説固有亨道矣而又利貞者何哉蓋以卦體二五以剛居中三上以柔居外剛中固無不正而柔外似有不正之嫌故必其所説者出於義理而無妄説之私則所説得其正乃為利耳夫其所以利於貞者推而極之天人之大亦總不外此正而已矣蓋説而既得其正則上合天理可以順天而不悖下契人心可以應人而不違由是本此説道之正而率民以趨事則民皆樂於效力而忘其勞率民以犯難則民皆急於向義而忘其死夫逸與生人之所好勞與死人之所惡今乃忘其勞忘其死豈人之情也哉不知説以先民則勞之正所以逸之説以犯難則生之所以為仁殺之亦所以為仁也豈非説道之大自能使民勸勉矣哉按説之大者以其正也正則民勸而其説乃大如大禹之治水八載周公之東征三年可為忘勞忘死之驗矣象曰麗澤兌君子以朋友講習此象傳是言君子體兌象而得互相滋益之道也麗附麗也孔子釋兑象曰凡天下之不相説者多由於不相同兩澤相麗彼此相資是雖無情之物而同氣相求同類相益實有相説之義兌之象也君子體之而以朋友講習焉蓋徒講不習則中無實得徒習不講則開悟無從於是論説以講之於先體驗以習之於後則究其理而所知者益精踐其事而所能者益固相説之益莫有加於此者矣按習者服習其事而朋友則所以講明其義也其義既明至於踐行其事則非朋友所能用力矣故曰知之匪艱行之維艱也初九和兌吉象曰和兌之吉行未疑也此一爻是言説人者當出於正也周公繫兌初爻曰初九以陽居卦下而無應夫陽剛則不失於柔媚處下則不失於上求無應則又不失於私係是其所説者出乎性情之中正而於天理無所乖於人情無所拂如是則其所説者無偏黨之私而得其正矣何吉如之孔子釋初象曰凡説人者於理未順則所行不正而有可疑矣和兑而得吉者其所行皆本謙恭以待物而無偏私之可疑也使其不正則有所疑矣安得為和哉按和之與同有異初處説體之下得陽剛之正是説而不流於邪者故為和而得吉耳九二孚兌吉悔亡象曰孚兑之吉信志也此一爻是言説人之出於誠也周公繫兑二爻曰九二以陽居陰似不足以取信於人所行有悔矣然以其有剛中之德則所説一本由𠂻之誠而非偽為於外者以孚而説則上焉得君下焉得民內焉順親外焉信友孚誠所感未有不動者也是雖有可悔之事而亦不見其為悔矣故得吉而悔亡也孔子釋二象曰説而不出於孚則其志不誠矣所謂孚兌之吉者由二之孚信一出於誠實之志而無少偽妄所以孚兌而得吉也按二處大臣之位當兌説之世乃天下視其所説以為趨向者也茍非孚信出於剛中之志鮮不為説媚之所惑矣六三來兌凶象曰來兌之凶位不當也此一爻是為阿諛而求説者警也來兌謂來就二陽以求説周公繫兌三爻曰六三陰柔而不中正是説之妄者也又為兊主則深於説者矣夫位居下體則所説者宜在上乃上無所應而反來就二陽以求説初之剛正二之剛中三雖求説而不能得其説欲説人而人不我與則淪於汚賤而可恥矣其能免於凶乎孔子釋三象曰三之來兊而凶者蓋以陰柔不中正德不足以自守甘於妄説而人莫之與所以無往而不凶也按説貴出於正三以陰柔之質而説不以正夫非正而求説則為邪佞之徒矣其得凶也所謂名實交喪者耳不亦可以為媚悅求容者之大戒乎九四商兌未寧介疾有喜象曰九四之喜有慶也此一爻是言去邪從正者當決其志於一也商兌謂商度所説周公繫兑四爻曰九四上承九五之中正下比六三之柔邪將欲説五則三乃情之所係將欲説三則五乃理所當從君子小人之間度量而擇所從未能自定為商兌未寧之象當此之時正天理人欲公私之界不可不審所從也幸四質本陽剛則陰柔原非其類為能介然守正疾惡柔邪是始雖疑而終則斷也去邪從正不亦深可喜乎孔子釋四象曰天下之理是非不兩立故好善則疾惡從正則逺邪此君子小人之分也使一牽於柔則將淪胥而為小人之歸矣今九四能介然守正而疾邪則有以保其名位而不墜其風節將得君行道福澤及物是不但有喜而實有慶也按大臣處近君之位貴絶私黨以奉公使不審所從而輕為親比則奔走於下而求説者必多幸進之門矣聖人以介疾有喜言之正所以開示正道而隄防其邪心也然正人之謇諤雖君子亦憚其過剛宵小之柔邪即賢者亦樂其易近是以尤貴有知人之明而嚴辨之於早也九五孚于剝有厲象曰孚於剝位正當也此一爻是為人君惑於小人者戒也剝以陰消陽也指上六而言周公繫兌五爻曰上六陰柔小人為説之主而處説之極能妄説以剝陽者也九五陽剛中正當説時而居尊位密近上六之小人狃於所説而相信之是孚於剝也夫陰柔小人內則蠱壞人之心術外則虧喪人之行業信非其人則有危道矣孔子釋五象曰九五孚於剝者以五剛健中正而居尊位自恃可以去小人謂其不能為吾害也乃反為小人所惑受其剝而不自知非五傷於所恃乎按説之感人易於相得不知其感之者將以剝之也故以虞帝之聖而畏巧言令色豈非説之易入而深可懼乎聖人以孚剝言之所以戒輕信之失者切矣上六引兌象曰上六引兑未光也此一爻是言小人之説不以正也引謂引下二陽周公繫兌上爻曰上六以陰柔成説之主而居説之極是所務專在於説人也故引下二陽相與為説在人之從不從固未可必而彼之性質柔媚其欲致人昵已者則如此耳孔子釋上象曰凡説之出於正者其心必正大而光明上六引人以為説是其心之所存私而不公邪而不正其心迹隱晦而未至於光顯也若本剛正剛中以為説其心迹人得而共見之矣按以動而求陽之説其惡易見以靜而誘陽之説其情難知此引兌之所以未光也坎下巽上坎水在兌澤之上則為澤所節止坎水在巽風之下則為風所離散故曰渙井以木出水故居塞而能通渙以風行水故通之極而至於渙散二四為成卦之主下卦本坤剛來居二不為陰柔所困上卦本乾六四以柔居柔得位之正不應初而上同於五剛不為柔困柔不與剛忤剛柔相得渙之所以能亨也以六爻言唯剛柔上下相合而不散者為能拯渙初柔而二剛二附就初在下相合以任拯渙之責故初馬壯吉而二奔機得願也五剛而四柔四上同五在上相合以成濟渙之功故四渙群元吉而五渙汗無咎也此皆協力以拯渙者至三上居相應之位以逺而不相及故三則但能渙其躬之難而無悔上則不過渙血以逺害而已渙亨王假有廟利涉大川利貞此卦坎下巽上風行水上有離披解散之象故名為渙卦辭是言人君濟渙之道也渙散也假至也文王繫渙彖辭曰卦以巽風而行坎水之上水遇風則渙散渙之象也夫渙則人心已散若難以得亨者幸卦變自漸而來九來居二而得中六往居三得九之位而上同於四是有可據之勢既有其才復有其輔則渙有必濟之理而可亨夫時當渙散是天下之渙皆在所當聚而自王者言之則當先其大者也蓋渙之時以九廟則震驚王者當假廟孝享以聚祖考之精神而使神靈之已渙者復安以世道則潰亂卦則木在水上而能涉川王者當拯危濟險以展才略於天下而使民心之已渙者復合凡此皆治渙之道也然假廟而不以正是媚神也故假廟則必尊祖敬宗而不敢為邀福之祀涉川而不以正是行險也故涉川則必順天應人而不敢為僥幸之謀二者皆正乃為利耳茍或不然則神不歆而人不與渙何由而得亨乎按渙兼二義有因民渙散而萃之意假廟是也有渙天下患難之意涉川是也爻則全以渙為美事各有不同不可以一例觀也彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也此彖傳是釋渙彖辭以明渙之所以得亨也剛來謂九居二柔得位謂六居三外謂外卦上同謂三上同乎四孔子釋渙彖辭曰時當渙散不易得亨卦名渙而辭即繫以亨者何哉蓋當渙時非據可為之地與能為之才而復得人之助皆不足以濟渙也今卦變自漸而來九來居二而得中則得其所安之地是山河險固可為據守之資形勢利便可施攻取之計所以濟渙者有其地矣六本柔也乃往居三得九之位是本之以寬仁濟之以雄斷則恩足以結人心而威足以禦強敵所以濟渙者有其才矣又三與四皆陰乃三上同於六四當國步艱難而得朋以助則戮力同事可以扶危定傾而收再造之功名所以濟渙者又有其助矣是以不終於渙而可亨也辭云王假有廟者非徒為觀美而已也蓋當渙時祖考之精神散失王者乃聚一已之精神至於宗廟之中上以楊謨烈之盛下以作臣民之心則對越如在而祖考之精神有所憑依而不至於散越矣辭謂利涉大川者非幸致也蓋渙之時非救時之才不能有濟卦象乘巽木於坎水之上則以經綸幹理之才為澄清天下之略有以成濟渙之功也按渙為險難之時非形勢才力之兼善則不能以有濟而又必假廟以收人心之散必涉川以拯天下之難渙之得亨豈易言哉象曰風行水上渙先王以享于帝立廟此象傳是明先王以仁孝而得濟渙之道也孔子釋渙象曰風行水上渙散之象也當渙之時郊廟之禮廢上帝祖宗幾於無主使無以合之將終於渙散而不聚矣先王享帝于郊以明父天母地之禮而上帝之精神散於清虛之表者乃萃於郊祀之餘矣立廟於國以報祖功宗德之隆而祖考之精神散於杳冥之中者乃聚於廟祭之時矣夫享帝以明有尊而人皆知尊尊之義立廟以明有親而人皆知親親之義仁孝兼至而誠無不通幽無不格此治渙之大者也按渙之象因人各有心不相聯屬貫通而天下之勢遂至乖離必有所以鼓動感孚之使歸於一則渙者不求而自合故敬天尊祖自展仁孝之思而天下之心已知天神無二主不敢以下而犯上知人物無二本不敢背死而忘生聯屬人心莫切於此武王克商至豐祀於周廟越三日柴望大告武成而光武初營洛陽即立郊社宗廟豈曰神道設教而已哉初六用拯馬壯吉象曰初六之吉順也此一爻是言人臣資有才者以成濟渙之功也拯救也順謂順從九二周公繫渙初爻曰初六居渙之初是渙之始也當始渙而拯之其為力猶易况初以柔而居九二之下若藉九二剛中之力以拯之則資其雄斷之略賴其英武之謀是拯難而得馬之壯也夫拯之於初為力既易得人之助功復易成如是而往則渙可濟而吉矣孔子釋初象曰初六陰柔本非濟渙之才而乃得吉者何哉以九二陽剛之才足以任天下之重初能順而從之則藉其力而資其用所以能成濟渙之功而吉也按五爻皆言渙而初獨不言者以救之尚早可以不至於渙耳然當渙之方萌而泄泄然因循玩忽且不能虛已推賢資天下之豪傑以共濟艱難則必至於渙散而拯之為難矣圖事者所以貴知幾之識也九二渙奔其機悔亡象曰渙奔其機得願也此一爻是為當渙而得所藉以成功者幸也機謂人所憑以為安者周公繫渙二爻曰九二當渙之時失其所居本不足以濟渙者夫渙而不能濟則有悔矣然當渙時二為得中之地若能速來居此是離散之時失其故居而得善地以自處則進戰退守皆有所據不猶人當渙奔之時得其機而可憑之以為安乎向者失其所居之悔可亡矣孔子釋二象曰渙時皆有願安之心今渙而奔得其機來就所安而無失其故居之苦則有以得其所願矣按九二剛自外來有奔象雖有二陰阻隔不為遲疑且動乎險中不窮於險故能據上遊以成控制之勢如蕭何之取漢中鄧禹之據南陽資其險要而沈幾觀變以漸圖興復則混一有其基非徒以目前之得所安為願也六三渙其躬無悔象曰渙其躬志在外也此一爻是言人臣忘身以濟渙也外指天下而言周公繫渙三爻曰六三陰柔而不中正本有自便自利之私者宜有悔矣幸居得陽位則志在濟時為能以天下為已責而汲汲謀所以濟之凡一身之利害得喪俱不暇計有渙其躬之象夫為身謀而不顧天下者其心必有所不安今乃忘身以急國難渙之濟否雖未可必而舉動光明何悔之有孔子釋三象曰人臣報主念殷其立志在天下則為人之念重而為已之意輕矣所以能忘身而濟渙也按人之所以膠執而不能自脫於險者有我而巳六三能釋然散其有我之私故能出險而濟渙使人臣私有未忘而欲求渙之濟其可得乎六四渙其群元吉渙有丘匪夷所思象曰渙其群元吉光大也此一爻是言大臣能渙小人之私群而成天下之公道也群謂私黨丘謂丘陵夷平常也周公繫渙四爻曰六四居陰得正上承九五是輔君以濟渙者也夫當人心渙散之時各相朋黨締其私交而不能混一今四下無應與是能渙小人之私群而成天下之公道洵為大善而吉也夫私黨既散公道自行使所散者聚而盡歸於五而有如丘陵之髙是散其小群而成一大群合忠殫慮共濟時艱其功業之盛豈常人思慮之所及哉孔子釋四象曰六四之渙其群元吉者何以得此乎蓋人之植黨者其心多暗昧而不光狹小而不大四散小人之私群以成天下之公道以其心光大而不自私乃能有此誠非常人思慮之所及矣按六四非陽剛之才似不足當大善之義不知柔順之臣不專其權而杜絶私交以布公道其善固甚大也尹吉甫稱仲山甫曰夙夜匪懈以事一人豈非渙六四之心乎九五渙汗其大號渙王居無咎象曰王居無咎正位也此一爻是言人君施令散財而能濟渙也渙汗謂如汗之出而不反也大號謂命令居謂居積周公繫渙五爻曰當渙之時民心解散凡以情意乖離而恩澤不能下究也九五陽剛中正而居尊位如渙之時所宜散者莫大於號令居積之二者散其號令以動天下之心則人因王言之大而知王心之一矣散其居積以濟萬民之命則財散於上民聚於下矣如是則濟渙有道而天下之大勢可合於一何咎之有孔子釋五象曰九五不徒渙號且渙王居而無咎者何以得此哉凡濟渙者非有其才雖居尊位而不能渙非居尊位雖有其才亦欲渙而不能九五以陽剛中正之德而居尊位則有其德而志不限於推行有其位而權不阻於運用是以能公其利而無咎耳使非正位渙何由而濟乎按平天下者必在君臣之合德若三之渙躬四之渙群可謂靖共盈朝矣然天下非無群臣僇力之患所患君意鬱而不宣君澤壅而不廣則政令弛而下之心疑封殖固而下之志懈雖群臣協力匡勷而君德未明何以懷徠四海而坐致太平故濟渙之善䇿必在正位有德而為發令散財之道也上九渙其血去逖出無咎象曰渙其血遠害也此一爻是言人臣能撥亂而成濟渙之功也血去謂無傷害逖出謂無憂懼周公繫渙上爻曰上九以陽剛而居渙極夫陽剛則有撥亂反正之才渙極又當亂極思治之候以此濟渙必能出乎渙矣故當渙時海內瘡痍皆有傷害之危今禍亂已息為能渙其傷害而傷害已去且人心驚恐皆有憂懼之思今傾危已安為能渙其憂懼而憂懼已出夫傷害既去而畏懼復忘則出湯火而登之衽席濟渙之功成矣誰得而咎之乎孔子釋上象曰時當渙散不免傷殘憂懼之害今乃渙其血去逖出者蓋上九以陽剛居渙之極則危者已安否者已泰能出乎渙而逺於害矣按渙有分裂之象生民之害為大幸上卦已出坎險之外上九又居渙之極去渙愈逺而血去逖出是天心合而運數可回人事盡而謀猷克展此時之民自無不出險而就安矣可見天下未嘗無艱危之勢全在大臣有匡濟之才如漢之陳平周勃當諸呂擅兵之時唐之李泌陸贄值藩鎮紛爭之日皆能深思逺慮芟除禍亂百姓復安其扶危定傾之功炳在之册豈非得濟渙之道者哉兌下坎上水流無窮而澤有限以有限而蓄乎無窮猶水之在澤盈則溢而平則容節之象也兑説坎險説過則流險以止之節之義也凡事有節則裁制得中自有亨道過而不節非中也節而至於苦人病其難行亦非中也處得中正節而能通天地之道帝王之治不外乎此矣六爻大抵以當位為善初四五當位者也故初無咎四亨五吉二三不當位者也故二凶而三嗟上當位而亦凶者當節之極處上之窮其義固殊也又節之六爻各相比而相反初與二比初不出而無咎二不出而凶二反乎初者也三與四比三不節而嗟四安節而亨三反乎四者也五與上比五得中而甘上過中而苦上反乎五者也善節者虛則蓄之盈則流之其權在澤而其用在水節之時義大矣節亨苦節不可貞此卦兌下坎上澤上有水其容有限故名為節卦辭言節道貴於適中而不可過也節有限而止也文王繫節彖辭曰坎為流水而無窮澤為止水而有限澤上有水滿則不容有節之象故為節夫節則立身制用各適其中而無過不及之偏自可通行而無敝有不亨乎若過於節則拂情逆性而失其中是為苦節矣不惟處世塞而不通即在己之所行亦不能以永久豈可固守以為常哉按節者所以適乎中而通行於天下亦天地自然之限制也若流於太過則矯廉以鳴髙過潔以絶物如申屠狄陳仲子之流其持身非不正然不近人情鮮合中道不可以言節亦不可以言亨也彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民此彖傳是釋節彖辭而極言節道之大也剛柔分謂陰陽各半剛得中謂二五皆陽當位中正指九五制謂節制度謂法度孔子釋節彖辭曰卦名節而辭繫以亨者何哉夫乾為剛而坤為柔使剛柔偏勝則豐儉無節矣今以卦之全體言之陰陽各半而無過不及之偏是剛柔均分也以卦之二體言之則二五皆陽剛而居中位是剛得其中也夫剛柔均分則無一偏之患而豐儉皆適其宜剛而得中是本陽剛之正道以為節而節制皆得其中矣此其所以亨也夫節之所以亨以其中也若辭所謂苦節不可貞者則失之於過而不得其中必於天理有所不順人情有所不堪以道揆之必至於窮矣節道過苦則窮而不通固理勢之所必至若節之所以通而不窮者蓋以卦德為説以行險夫人於所説而不知止則易至於流若見險難而思止則其進有節而不至於流矣節之義也卦體九五當位以主節於上其所節者又皆中正而無過奢過嗇之患可以通之天下而無阻此節所以為善而無不亨也若推極而言之天地之道陰極陽生陽極陰生寒暑往來氣序有節而不過故二分二至四序不差而歲功於是乎成矣使天地不節四時不且失其序乎人君以節而立為制度量入為出既無過取亦無泛用有損己益人之實而無剝下奉上之為故無濫用而不至於傷財自無橫征而不至於害民矣使人君無節則侈肆所致有不傷財害民乎凡此皆節道之通而不窮也按天地節而四時成王者節而天下富自古開財之源不若節財之流文景之節儉不勝武帝之黷武窮兵隋文之節儉不勝煬帝之窮奢極欲天下之治亂安危實係於此故量入為出不傷財矣取民有制不害民矣聖人之言真萬世制用之長䇿也象曰澤上有水節君子以制數度議德行此象傳是言君子應用立身皆當合乎中正也數謂多寡之數度謂隆殺之度德謂得於中者行謂發於外者孔子釋節象曰澤上有水水之所止有限節之象也君子以應用立身皆不可以無節故數有多寡度有隆殺則為制之而自器用宮室衣服各有定限而不使之過使賤不踰貴下不侵上則各安其分矣德存於心行見於事則為議之而自出處進退周旋皆為商度以求其中節使其無過亦無不及則各適其宜矣按制數度所以定萬用之限議德行所以嚴一身之限賈誼以世侈靡相競欲定經制而令上下各有等差姦人無所幾幸蓋凡物之大小輕重髙下文質皆有品節使民截然不可踰者此即禮也至於厯代冠服等威之制雖各有不同要以凖於古先聖王者為宜此尤禮之所最急者然聖人猶以制民之禮為未足必貴反而議吾身之德行焉故曰大禮與天地同節初九不出户庭無咎象曰不出户庭知通塞也此一爻是言士不妄進而能審所處也户庭户外之庭也周公繫節初爻曰初九陽剛得中居節之初宜出者也然有陽爻蔽塞於前而所應之四又為坎體既遇險難之人則不可以出而有為矣初能抱道自守不妄出以求仕有不出户庭之象夫當節初即能知止自無枉道辱身之咎矣孔子釋初象曰時有通塞通則當行塞則當止初九之不出户庭知時之塞而未通故不出也使時值其通亦必出而用世矣是初不惟知塞而能知通塞者也豈徒知塞而不知通者哉按處節之道不可膠於一偏蓋節而能止者易節而能通者難呂望遇商紂則避北海之濵遇文王則應龍彲之兆是誠能知通塞者也沮溺荷簣之流豈可與孔子之仕止久速同日語哉九二不出門庭凶象曰不出門庭凶失時極也此一爻是明時有可仕不當以隱為髙也門庭門內之庭也極甚也周公繫節二爻曰九二當可行之時乃出潛離隱之地也而失剛不正固自餒於進矣且上無應與又下能以獨進是不仕而以隱為髙者為不出門庭之象夫當可為之時乃不出而為之則知節而不知通自失可為之機矣不亦凶乎孔子釋二象曰九二之不出門庭為凶者何哉蓋士君子幼學壯行患不得其時耳今幸有其時乃執迷而不出豈知時通變之士耶其失時甚矣安得而不凶也按不出户庭不出門庭一也以初則無咎以二則凶者初在卦下為士而二則臣位也處補衮綴牘之任而託隱默以求容操決疑定難之權而好遜讓以避怨亦思其所處為何時乎失時之譏所不免矣六三不節若則嗟若無咎象曰不節之嗟又誰咎也此一爻是為不能知節者警也周公繫節三爻曰六三當節之時本不容不節者以陰柔不中正而居説極則非能節者矣故以之立身則不能守其節而無以自立以之制用則靡費於前必至匱乏於後矣至於傷財敗德形為咨嗟而慨嘆皆其所自致也亦將何所歸咎哉孔子釋三象曰六三之不節而嗟者豈由外致歟蓋既違節道禍必及之其無聊而發為咨嗟實已有以取之耳又將誰咎乎按三本能節者乃縱欲妄費説極而悲至於無所歸咎則其失已不可追矣故聖人深為致警云六四安節亨象曰安節之亨承上道也此一爻是言人臣能遵君制而無過也安順而無勉強之謂周公繫節四爻曰九五主節於上六四順正以承之凡立身制用無一不本乎天子之制其為節也出於自然而無所勉強是能安於五之節而守之以為常也成法自式而動無愆違不亦亨乎孔子釋四象曰安節之亨者九五之所節四皆承順而行之此豈􅑫安為下之分乎蓋九五之節其道為中正以通之道實所當承者四能不作聰明以亂舊章而惟順承其道是以亨也按書曰惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食又言臣之有作福作威玉食則凶害於家國流禍於人民蓋書之明訓節之道也反是未有不及於敗者安節之所由得亨其深有合於書之義歟九五甘節吉往有尚象曰甘節之吉居位中也此一爻是言人君有中正之德以為節也甘樂易而無艱苦之謂周公繫節五爻曰節道貴乎中正然非操節之權亦不能以其道通於天下而可久九五為節之主而有中正之德其所以為節者無矯情拂衆之為而有善俗宜民之道不傷財不害民節之甘而不苦者也以此為節行之一已而自安通之天下而皆適何吉如之且立法於一時而即可垂範於後世是不特吉而且往有尚矣孔子釋五象曰德惟中正始能節而不過九五甘節之吉者以其所居之位在上爻之中是本一中以存心而制作皆極於盡善化行俗美而有以成一世恭儉廉讓之風此節之所以為甘也按節卦他爻之節節其在我者也九五當位之節是節以天下者也夫節天下而使天下共以為甘而不苦真能得乎節之道矣漢史臣贊文帝苑囿服御無所增益其有不便輒弛以利民身衣皂綈帷帳無文繡以敦朴為天下先而朱熹亦稱文帝為三代以下恭儉之主豈非節之甘者歟上六苦節貞凶悔亡象曰苦節貞凶其道窮也此一爻是言節之太過而失其中正也周公繫節上爻曰凡節之道貴於得中上六居節之極是其所以為節者至纎至悉一意求節而失於矯是過於節而為苦節矣夫節而既過雖無越禮犯分之事必有拂情逆性之傷縱使得正其能免於凶乎然禮奢寧儉雖有悔而終得亡其悔也孔子釋上象曰苦節之貞而不免於凶者何哉蓋節之道貴通而不可窮若上之苦節是節而無制不近人情雖可以範一身而不可以治一世或可行之於一時而不可垂之於永久其道必至於窮也按節惟中正所以能通故於三戒其不節於上戒其凶者過猶不及其失均也然苦節之悔則終勝於不節之嗟矣日講易經解義卷十三
