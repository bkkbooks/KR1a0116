body:
  text: 欽定四庫全書日講易經解義卷十八説卦傳按伏羲畫八卦後重為六十四卦八卦為六十四卦之本前繫辭中畧言八卦小成又曰八卦成列至所謂引而伸之重三成六之意猶未明晰又所謂仰觀俯察近身逺物之象亦未詳及焉孔子於此復一一推究明言之并備陳卦位卦徳卦象之説以垂訓後世故名説卦傳首論生蓍倚數立卦生爻為作易之本原卦爻既具然後言道徳義理性命以明作易之極功葢易為道徳性命而作非蓍數卦爻無以發其蘊也夫所謂性命之理即陰陽剛柔仁義是也統言一卦三畫巳具三才又兼三才而兩其畫故六畫成卦六位成章正聖人作易以順性命之理合觀兩章則引伸重卦之由不昭然可見乎次論伏羲文王先後天卦位之不同先天圓圖始乾坤而後六子八卦之序也方圖先六子而終乾坤終始相生造化無窮之道也後天圓圖始震終艮為造化流行之序也而要統之一神正見流行對待體用相須之妙合先後天而歸於一者也次論卦徳卦象性情言其真形象取其似而復間以人道焉其義何居葢盈天地之間皆物而物物各有男女之象人特其貴焉者故以人言之耳至於末章廣言八卦之象錯舉類推雖取象不同要不過通神明之徳類萬物之情而形上形下之道無不同條共貫畢具於此矣昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命此一章言蓍之所由生數之所由起因而立卦生爻見聖人之作易有以盡三才之藴而極功用之大也聖人指伏羲神明者化育之主宰孔子意曰昔者聖人之作易也有蓍策以神其用蓍何自而生乎由聖人在上與天地合徳天地化育之功生成變化微妙不測原極神明而聖人中和之徳篤恭不顯默為感格有以幽贊之靈氣所鍾而蓍因以生焉葢神物雖由神明而生其實原本於聖人之幽贊也蓍既生矣揲蓍求卦則必有數數何自而起乎數原於天地天之體圓圓者徑一而圍三各為一竒是天原有三數也聖人本陽全之理故參天而為三地之體方方者徑一而圍四合為二偶是地原有兩數也聖人裁陰半之義故兩地而為二然後七八九六之數皆依此而起焉三三則九三二則六兩二一三則七兩三一二則八無非倚此參兩而自得之耳於是七為少陽八為少陰九為老陽六為老隂此易之所以有數也數既形而卦斯定矣揲蓍求卦時參伍錯綜觀其隂變陽陽變陰為純為雜則所値之卦於是立焉卦既列而爻亦備矣初三五為剛二四上為柔從而闡發之或動或靜則當動之爻從此生焉由是以思其功用為何如哉則所稱共由曰道自得曰徳而義即道徳之散殊也易於進退存亡之道健順動止之徳有以旁通其情融㑹其㫖無少乖逆而和順矣且於和順之中又随事各得其宜而晰之極其精也不其理於義乎是道徳與義合之為理賦之為性而理性之本原則為命也易則窮事物之理研究甚微盡人物之性區處甚當且於理性之所從出者一一溯源根極與之渾合而無間也不有以至於命乎若是者微顯無不該天人無不盡蓍之所以神其用而聖人作易之功所以極其大也按蓍數所起非天地無以開聖人之先卦爻所設非聖人不能洩天地之秘故一畫為萬世文字之祖孔子韋編三絶所以屢為稱説而不巳乎昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章此一章言易卦爻位之義所以闡發天人性命之㫖不徒為卜筮之用也孔子意曰昔者聖人之畫卦作易也豈徒迹象之粗哉將舉物所受為性天所賦為命之理一一摹寫之而毫無違拂以順之焉耳何以見其順也六爻上二爻為天下二爻為地中二爻為人天非以象立也有立天之道焉自其氣而言之有成物之陰與施生之陽靜専與動直合而天道有常運矣地非以形立也有立地之道焉自其質而言之有順承之柔與持載之剛靜翕與動闢合而地道有常凝矣天地既立人生其間有立人之道焉自其性而言之有慈恵之仁與裁制之義惻怛與果斷合而人道有常協矣是三才有由立皆性命之理也聖人作易成卦成章所以順此性命之理也當其畫卦三畫巳具三才之道又統兼三才而各兩之故易有六畫然後一卦之體成則初剛二柔三仁四義五陽上陰而性命之理已順之於全體中矣六畫所處有其六位分二四上為陰初三五為陽既分陰陽乃迭用六八之柔爻七九之剛爻而來居之或以柔居陽位或以剛居陰位更相為用而不滯故易有六位而陰陽間雜自成經緯之文章則剛柔交錯仁義相濟陰陽逓運而性命之理又順之於一節中矣洵乎易為盡性至命之書不徒備卜筮之用也按為學貴乎剛克柔克為治貴乎有執有容太剛則折太柔則廢必不競不絿乃為無弊之道古帝王開天明道即具有此理稽古者尚其深思而自得之乎天地定位山澤通氣雷風相薄水火不相射八卦相錯數徃者順知來者逆是故易逆數也此一章是論伏羲先天圓圖上節分列先天八卦之位見其對待之體自寓流行之用下節承八卦相錯而言見易數之逆正以成其順也相薄勢相迫也不相射謂不相害也錯交也孔子意曰先天圖位乾居南坤居北是天確然在上地隤然在下兩儀之位定矣由是艮西北而兑東南則山以融結之氣下通於澤澤以滋潤之氣上通於山也震東北而巽西南則雷因風而益迅風因雷而益烈相迫而成震蕩之功也離東而坎西則水得火以濟其寒火得水以濟其燥相資而不相害也然此對待之體即有交變之用焉以乾兑離震為主各與八卦相錯則自復至乾三十有二之陽卦成於圓圖之左以坤艮坎巽為主各與八卦相錯則自姤至坤三十有二之陰卦成於圓圖之右此先天圖位之列觀其對待而流行自在其中矣若其生出之序又可按圖而知也圖由中起而分左右自其左方數之起一陽之震歴離兑以至純陽之乾此卦之巳生者葢由震四而離三而兑二而乾一則巳然之迹可見如從今日以計徃日不亦順而易知乎自其右方數之起一隂之巽歴坎艮以至純陰之坤此卦之未生者葢由巽五而坎六而艮七而坤八則將來之兆未形如因今日以推來日不亦逆而難知乎夫圖之中分固有順而有逆而要其生出之序則皆逆而後順有乾一而後有兑二離三震四巽五坎六艮七坤八無不自己生而及未生故易之八卦皆逆數也逆故知來所以能前民用者於此可見矣按聖人作易彰徃而察來既徃之事將來之幾備在卦爻之中成王定鼎卜世三十卜年八百皆逆計而知之此豈後世䜟緯之學所能測其萬一乎雷以動之風以散之雨以潤之日以晅之艮以止之兑以説之乾以君之坤以藏之此一章論伏羲先天方圖具造化之全功也孔子意曰先天方圖中起震巽而始終於乾坤夫震巽之位相對雷為震象所以奮動萬物之生意風為巽象所以發散萬物之鬱氣此始物之功乎坎離之位相對雨為坎象既散之化機由此滋潤日為離象既潤之材質由之晅明此亨物之功乎艮兑之位相對艮之徳為止使物止其所而性命之各正兑之徳為悦使物遂其生而太和之保合此成物之功乎六子既巳循其序而司其職矣然孰綱維是乾居圖之始六子皆統宗乎乾而分職以治則實君之也抑孰翕受是坤居圖之終六子皆包涵乎坤而乗時以出則實藏之也觀其圖惟卦位之成列而究其義悟造化之流行圖學之所以令人紬繹而不窮歟按論尊卑之序宜先天地而論化功之成則歸乾坤先天圖位合觀兩章而自見矣帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮此一章論文王後天圓圖上節先列後天八卦之位見帝為生成之宰其出入不可見下節即物之出入以可見者明其不可見也致役者致力以為之役也戰則搏擊之謂孔子意曰先天圓圖固有以立對待之體矣文王取而更置之於以象一嵗之運焉葢造化之主宰謂之帝當其出而生物令方行而氣方動化育發端則出乎震焉以震居卦位之首也出則必齊前此之萌動者至此而化機畢逹是在巽矣而巽固次震之位也齊則相見前此之畢逹者至此而光輝發越是在離矣而離固次巽之位也凡此皆帝之出也由是而出者將入相見則致役陰代陽以有終於是乎效力而長養其在坤乎以坤位次離也致役則必説養既盛而化始歛於是乎歡忻而交暢其在兑乎以兑位次坤也説不巳則戰故次之以乾肅殺用事與生育之氣相為搏擊而成戰矣而乾固戰之位也戰不已則勞故次之以坎終嵗勤動則物皆歸藏得所休息而慰勞矣而坎固勞之位也凡此皆帝之入也自是而入者復將出既勞則有成一元奏效終則有始帝乃生尅嗣續於斯焉艮之所以次坎而居卦位之終也卦位具而嵗功成有如此然帝之出入不可見即物之出入見之帝出乎震何也以萬物出乎震也所以然者震居東方於時為春草木萌動物之所自出也出則齊乎巽矣巽居東南時為春夏之交物之長短不齊者至此畢逹無不潔齊也何以相見乎離離徳以明盛為義萬物至此皆形色交輝而相見所以然者卦居南方於時為夏品物咸亨之候也顯推其義聖人宅中御極位必南面布綱紀於天下葢取諸南方與文明之會也坤者地之象於五行為土土徳王於夏秋之交前此之火得土以制其烈後此之金得土以制其寒盡其力以長養萬物而不靳也故曰致役乎坤至於兑居西方時為正秋物無不向於實生意充足欣欣有得所之意矣故曰説言乎兑戰乎乾何也乾居西北時為秋冬之交陰盛陽微陰與陽相薄而不免於戰也何以勞乎坎坎於五行為水卦居正北方出而用事者其歸勞在此卦乎萬物至此説者恬休戰者寧定而得所歸宿矣故曰勞乎坎成何以言乎艮艮居東北時為冬春之交在今年為嵗功之終在明年又為嵗功之始而皆受成於此固萬物之所成終而成始也故曰成言乎艮即物之出入而帝之出入不可見乎按天之帝即世之君盡臣之所為功而莫非君之功盡造化之所為生成而莫非帝之化帝生萬物聖人成萬民其主宰洵有同符矣神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此一章合論先後天之圖而歸之於神見先天之對待自具流行之用而後天之流行未嘗無對待之體也疾速也撓散也逮及也相濟之意既盡也孔子意曰乾坤之功分寄於六子而六子之用總歸於一神神也者不離乎物不倚乎物無方不測有莫知其所以然者葢妙萬物而為言者乎物之始生必有以鼓動其生意震雷奮而物随以動何疾如之物之既動必有以撓散其滯機巽風發而物随以撓何疾如之離為火火以燥其濕而物乃得堅凝則熯莫如火兑為澤澤之所濡生機利遂無不欣暢則説莫如澤坎為水水徳用事根荄滋潤自然充足則潤莫如水至於斂其實於既徃而終萬物之所無啓其機於將來而始萬物之所有惟艮兼主其事則盛莫如艮六子流行之用無非神之所為也然所以流行之故未有不從對待中出者故惟坎離得偶水火恒相逮而相濟矣震巽得偶雷風不相悖而相助矣艮兑得偶山澤通氣而交相感應矣然後陰陽合而自無趨有為變自有返無為化所以動撓與燥成萬物之始説潤終始成萬物之終也可見流行者原本對待而對待者自具流行總之一神之妙萬物也圖學之理先後天一而巳矣按專言六子非去乾坤也六子皆乾坤之功也猶大君主治六卿分職神則其治道之精微也堯曰廣運舜曰無為其殆神之謂乎乾健也坤順也震動也巽入也坎䧟也離麗也艮止也兑説也此一章即八卦之形體以言其性情也孔子意曰八卦之畫不同則其性情亦異三畫皆竒曰乾其體剛毅不撓其用運行不息葢健也三畫皆偶曰坤其體至靜無為其用至簡不擾葢順也震一陽起於二陰之下内有奮迅之志外有發舒之氣其動乎巽一陰伏於二陽之下内有沈潛之體外有婉轉之機其入乎坎陽䧟於陰中則徳蘊於中而用藏於事故曰䧟離陰麗於陽中是冲虛内涵而文明外被故曰麗一陽止於二陰之上為艮陽動之終而主乎收歛則止而已一陰見於二陽之上為兑陰靜之終而主乎發散則説而已按易以通神明之徳性則徳之所存情則徳之所發皆於卦畫之陰陽推究而得之固學易者所當先知耳乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊此一章逺取諸物見萬物無非易理也孔子意曰八卦之象未及旁通先有可專舉者乾純陽至健物性之至健而行不息莫如馬也乾則為馬坤純陰至順物性之至順而任重載莫如牛也坤則為牛震陽動陰下而龍潛隱在田以時而奮起矣震不為龍乎巽陰伏陽下而雞雜處在幽以時而出聲矣巽不為雞乎坎外柔而内剛豕則外汚濁而内剛躁故其象為豕離外剛而内柔雉則外文明而内柔怯故其象為雉艮陽止於二陰之上狗外剛能止物而内實懦艮則為狗矣兑陰見於二陽之上羊外柔能悦物而内實狠兑則為羊矣此取諸物者然也按易以類萬物之情其變不可勝窮也此專舉一物以擬一卦之象自在讀易者神而明之取其象以究其理耳乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口此一章近取諸身見人身無非易理也孔子意曰八卦不徒有象於物即吾身求之有可分觀者乾積陽在上而覆物人首會諸陽有居高體元之尊故乾為首坤積陰在下而載物人腹藏諸陰有民胞物與之度故坤為腹震陽動於下人足在下而動超越而善行震則為足也巽陰偶居下人股兩垂於下随足以為動巽則為股也坎陽䧟陰中人之耳輪内陷聰徳具於中坎不為耳乎離陰麗陽中人之目睛外附光明照於外離不為目乎艮陽在上為止人手剛在上而能按止艮葢為手矣兑陰在上能悦人口開於上亦善諛悦兑葢為口矣此取諸身者然也葢人身一小天地故五官四肢不徒為形骸之末而實有神明之用然衆人同具此理惘然莫知惟能踐其形者法乾坤之健順盡坎離之聰明體震艮之動止循巽兑之謙和大人與天地合徳豈外此哉乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女此一章申解後天卦圖之義明尊卑有等長幼有序本陰陽以正名分也索求也謂陰陽交相求也孔子意曰觀文王八卦次序乾坤稱父母六子稱男女固矣而其義何居乾純陽至健其象為天物皆資始猶父為人所資始也故父之稱不易焉坤純陰至順其象為地物皆資生猶母為人所資生也故母之稱不易焉至於六子是乾坤互相求索而以次得者也震初畫為陽是坤一索而得乾之初畫體一而實性動而健男之象也以其得之最先故謂長男巽初畫為陰是乾一索而得坤之初畫體二而虗性静而順女之象也以其得之最先故謂長女其在坎以坤再索而得乾之中畫性情形體猶之男也以其得於再索而繼震則謂中男其在離以乾再索而得坤之中畫性情形體猶之女也以其得於再索而繼巽則謂中女至於艮乃坤三索而得乾之上畫猶之震得乾道以成男也以其三索得男而次坎則謂少男至於兑乃乾三索而得坤之上畫猶之巽得坤道而成女也以其三索得女而次離則謂少女八卦之稱謂如此易所為正名定分之書也按卦象先天多言天道後天多言人道人道莫大於名分此孔子申明其義以垂訓乎乾為天為圜為君為父為玉為金為寒為冰為天赤為良馬為老馬為瘠馬為駁馬為木果此一章推廣八卦之象此一節言乾象也孔子意曰三竒之卦惟乾積陽成象而行健不息其為天乎從天之象而推之其體旋轉而循環不窮為圜也象人之至貴莫如君父乾則主宰六子猶君之統萬民也故為君資始萬物猶父之撫諸子也故為父象物之至貴莫如金玉乾則體純粹而不雜猶無瑕之玉也故為玉質堅剛而不屈猶能斷之金也故為金言乎卦位乾在後天位居西北於時為寒寒之極而水始凝則為氷乾在先天位居正南於時盛夏而屬火其色則為大赤取諸動物則健行不息者為良馬健而最久者為老馬健之最堅者為瘠馬健之最猛者為駁馬取諸植物則陽之體實猶木果之實陽之體圓猶木果之圓又為木果乾象之無所不該如此按易道精入無形粗及有象此廣八卦葢推舉有象者以為言也要之皆本至理形上形下固合精粗而為一者由乾象推之通徳類情無不可得意而忘象矣坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒此一節廣坤卦之象也孔子意曰坤象純陰積陰而下凝者惟地故為地從地象而廣之則資生萬類有母道焉故為母自其動闢而言能敷布其發育之澤為布虛而容物為釡自其靜翕而言歛其生意聚而不施為吝嗇且賦形廣大氣機所動無不周遍為均其順承天施則為生生不息性極柔順之子母牛不但如上章之僅取象於牛也其徳厚載物則為歴久彌堅廣而容載之大輿不但如坎之僅取象於輿也且其畫皆三偶經緯燦然而文象顯矣偶數繁多錯綜不一而衆形著矣柄以持物而坤能持載則為柄黒乃陰色而坤本純陰則為黒坤象無所不該如此按經文坤卦六爻皆為臣道立訓此章上文既言乾為君而此節獨不言坤為臣者葢以臣道无成凡應盡之職業皆屬君上所命不敢自以為功則坤象之所有無非臣道也要之坤元有配天無疆之徳故為推廣其象以見柔順利貞之所發者如此震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮此一節廣震卦之象也𤣥乾色黄坤色大塗通衢也決躁取其剛動也蒼東方之色筤竹筠也萑葦即蘆荻下實上虛馬左足骹白曰馵作足馬騰足也的顙白額馬也反生稼根反在上也孔子意曰震以一陽下動猶雷奮於地故為雷從雷象而廣之則龍以陽物而奮起於淵亦如陽之動也乾坤始交而生震兼有天地之色故為𤣥黄陽氣初施化育流行而無潛伏則為旉陽氣一動萬物沛生而無壅滯則為大塗取象於人一索得男性稟陽剛位居元胄為宗社所托有主鼎執鬯之尊故為長子陽動而决二陰其進也鋭有見義必為之勇故為决躁取象於物則震居東方有蒼筤竹深青之色下實上虛有萑葦根實幹虛之象取象於馬則二陰上折猶馬之開口而善鳴也一陽下動猶馬之馵足而懸起也陽動而健猶馬之超騰而作足也二陰色白猶馬之上顙白也取象於稼則陽反動於陰下如萌芽自下而生故為反生陽動必長長則中上二爻皆變而為乾之健故其究也為健既變為乾則陽氣極盛草木莫不蕃育而鮮明矣震象無所不該如此按震卦之義雖無所不該而其切於人事者獨稱長子誠重之也是以古帝王之訓太子禮以脩外樂以脩内入則有保出則有師皆以養其陽剛之萌而底於乾健之徳然後統緒相傳而國祚永於磐石夏之啓周之成王皆是道也震之義不洵大矣哉巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦此一節廣巽卦之象也孔子意曰巽以一陰伏二陽之下其徳柔順而善入而物之善入者莫如木故為木從木象而廣之氣之善入者莫如風故又為風乾交於坤一索得女故為長女繩者所以糾木之曲而使直工者所以引繩之直而制木巽者徳之制也故為繩直為工巽屬少陰而位西方故於色為白風之行入乎微而遍乎逺長也木之生由萌蘖而至千尋高也陰性多疑中無决斷故為進退為不果一陰下鬱二陽外達而上行故其象為臭以人之體言之髮屬陰額屬陽眼之白者屬陽黒者屬陰巽陰在下陰血不升為寡髮二陽在上陽氣極盛為廣顙一陰二陽為多白眼自人之情言之義屬陽利屬陰巽以陰為主而又善入是善於生財者如市物而獲利之多為近利市三倍其究則三爻皆變為震卦之决躁矣巽象無所不該如此按六子中獨震巽有其究二字葢陰陽之始也震一陽望其變中上二爻而究歸於乾巽一陰望其先變初爻之陰然後盡變其中上二爻而究歸於震此聖人扶陽抑陰之微意也推而論之君子陽也小人陰也公理陽也私欲陰也是以人君當進君子而退小人人臣當急國事而後家事儒者當存天理而遏私欲皆是道也夫坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盗其於木也為堅多心此一節廣坎卦之象也矯者使直為曲輮者使曲為直孔子意曰坎居北方其體内陽而外陰猶水屬北方其體内明而外暗故為水從水象而廣之大為溝小為瀆所以行水互相灌注流而不盈故為溝瀆自其陽匿陰中隱而不露似君子存心之密韜晦不行非為隠伏乎陽在陰中抑而能制似君子克已之勇矯偏歸正非為矯輮乎弓體彎中勁以發矢輪體圜内實以行地皆矯輮所成也非為弓輪乎其取象於人也陽陷陰中則險而不寧操心危而慮患深憂所以加倍也心以虛而睿耳以虛而聰坎體中實則私欲蔽錮心將以物累而病耳亦以物壅而痛也在地則為水在人則為血故為血卦大赤者乾之色也坎得乾之中畫故為赤其取象於馬也陽明在中為脊之美焉剛躁在内為心之亟焉陽昂陰低上畫陰為首故下而不昂焉陽厚陰薄下畫陰為蹄故薄而不厚焉陽前陰後蹄薄則不能致逺故為行之曳而不進焉其取象於輿也有險陷而多阻碍則為多眚葢行於險道不若坤輿之行於平地者易且安也又自水類取之通者水之性月者水之精故為通為月又自人類取之陽匿陰中未免有盜名盜利之心故為盜其於木也陽剛在内則為堅多心堅取其剛多心以其剛在内也坎象無所不該如此按坎為重險故其取象皆有險危之義然帝王法天險而謹其禮樂制度以防於無形法地險而脩其城池兵甲以防於有形自能化艱危而為蕩平矣雖險何懼乎離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蠏為蠃為蚌為龜其於木也為科上槁此一節廣離卦之象也孔子意曰内暗而外明體陰而用陽者火之徳也離卦内陰外陽故為火從火象而廣之火之精非日乎火之光非電乎乾與坤交再索得女非中女乎甲以衛身胄以捍首其質外堅離陽在外故為甲胄長而戈鎗短而兵刃其鋒上鋭離陽在上故為戈兵陰中虛而能容物故於人為大腹火炎上而能燥物故於卦為乾卦鼈性靜象離之中柔焉蠏性躁象離之外剛焉蠃善麗象離之陰麗乎陽蚌中虛象離之一陰内伏焉龜則中具五行外負八卦有文明之象離徳文明取象於此此五者皆以其内柔而外剛也其於木也則中之空者上必枯槁有似離之中虛而上躁故為科上槁離象無所不該如此按日本陽精火電皆具陽體乃屬於陰卦之離者葢以上下兩爻皆陽而陽中藏陰猶之坎卦上下兩爻皆陰而陰中藏陽此固陰陽互藏其宅之至理也至於體繼離出治之道則虛中以受善明作而有功而離照遍於四方矣艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔喙之屬其於木也為堅多節此一節廣艮卦之象也植生曰果木實也蔓生曰蓏草實也黔黒色鳥屬之喙多黒故曰黔喙孔子意曰隆起於地上者山也艮以一陽起於坤陰之上故為山從山象而廣之一陽横亘於上有似山上之小蹊故為徑路一陽竣立於上有似山上之卷石故為小石上畫相連中下二畫雙峙而虛有似門闕之可通出入故為門闕以物言之結實於山谷之中者在木為果在草為蓏艮以一陽居上而實非果蓏乎以人言之掌王宫中門之禁而止人之入者閽人也掌王之内人及女宫之戒令而止人之出者寺人也艮者止也非閽寺乎人之能止物者指也物之能止物者狗也艮剛在前而䑕剛在齒鳥剛在喙皆剛之在前者也艮剛在外而木之堅多節則剛之在外者也艮象無所不該如此按艮之徳為止故其取象皆有止之義君子體之而起居必飭言動必慎有範圍不踰之則而行無過舉有鎮靜不移之守而心無軼思一切非禮之視聽越位之謀為皆禁遏而不敢縱夫然後萬物各止其所而艮卦之理備矣兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊此一節廣兑卦之象也毁折條枯實落之象附决者柔附剛而剛决之也鹵者水之死氣坎水絶於下澤見於上則足以為鹵其地不能生物也孔子意曰兑之卦體變坎之下陰爻而為陽是塞坎水之下流也有象於澤故為澤從澤象而廣之三索得女故為少女兑徳為悦象巫之以言悦神口舌之以言悦人焉兑時為秋象物之全者以毁剛者以折焉觀於人情則君子有嫉邪之義柔附於剛必决柔也兑以一陰處二陽之上故為附决察乎地宜則石田無生物之能土有下堅剛而上濕鹵者兑以一陰在二陽之上故於地為剛鹵陰少而賤為妾妾固以悦從人者内剛外悦為羊羊固見草則悦者兑象無所不該如此按兑卦彖辭兑有剛中柔外之徳順天應人之用其義甚大而卦象所取多係卑賤不正之物者葢天地間陽尊而陰卑陽貴而陰賤况兑屬陰之尤少者乎此亦聖人抑陰之意也大抵孔子此章廣八卦之象皆以通神明之徳而類萬物之情凡首句為取象之始其下俱以類取或以卦畫或以卦徳或以先後天之位或因象而轉為義或取其性或取其變相反相因錯綜互見可見易道之妙微而造化顯而人事大而君臣父子細而草木昆蟲無所不備非天下至聖其孰知此君子能於仰觀俯察之間豁然貫通其理則即器即道觸目皆易人事既盡造化不違將見天地平成鳥獸咸若而羲文周孔之奥義體諸身而見諸治一以貫之矣序卦傳此上下經六十四卦之序孔子因卦名以叙其次第之義也大抵易者變易也如反需為訟泰為否随為蠱晉為明夷家人為睽此不善變者也如反剥為復遯為壯蹇為解損為益困為井此善變者也文王示人以可變之機則危可安亂可治特在轉移間耳可見後天之學以人事贊天地之妙條貫之中具有精理故名序卦有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰此一章是發明序上經之義也孔子意曰序上經之卦始於乾坤終於坎離者何也乾天也坤地也自太極判而兩儀生動生陽而成天靜生陰而成地然後二氣絪緼化生萬物氣以成形而理亦賦焉是天地乃萬物之父母故乾坤居諸卦之首也萬物既生則凡飛潛動植血氣心知之屬盈塞於天地間者皆物也故乾坤之後受之以屯屯有雷雨震盪充塞滿盈之義然屯剛柔始交形質初開又有物始生之義物之始生純朴未散知識未啓是物生必蒙也故屯之後受之以蒙蒙者蒙昩而無知覺又幼穉而難遂長物穉而不養則無以遂其生而天地之化育幾於息矣有開世覺人之責者必思所以養之故蒙之後受之以需需之象飲食宴樂養道也然飲食者人之大欲欲之所在爭端必起於是乾餱致愆酒醴生禍强凌弱衆暴寡不至於訟不止故需之後受之以訟訟則相援相傾朋黨必衆故訟之後受之以師葢用大兵以平其爭也然師者衆多之義衆無所綂則亂必仰比一人以為之君施政敎申約束使號令一而衆志定故師之後受之以比比者衆所比輔也夫民之比我謂我能畜養之也則必制田里輕徭役凡所以道之而遂其生者宜施於既庶之後矣故比之後受之以小畜民既富矣禮敎可興也則必明彝倫勅秩敘凡所以敎之而復其性者宜施於既富之餘矣故小畜之後受之以履履者人之所行也循禮而行則上下有辨親疎有序此心泰然而天下各得其所故履之後受之以泰斯則由庶而富由富而敎而四海莫不乂安矣按乾坤者天地之太初也屯蒙者人物之太初也有聖人出焉為之養其穉而平其爭小罰則平以士師大罰則平以司馬使海隅日出咸知大一統之義而親附於上然後畜以養之履以敎之而蕩蕩平平卒致久安長治之模豈非王道之大成哉昔湯武除暴以安天下而即汲汲焉制助徹之法申庠序之訓遂能使萬民受保乂之徳國祚安磐石之固用此道也泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有随故受之以随以喜随人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也此發明否以下諸卦之義也孔子意曰泰者天地交而二氣通氣化人事交通之謂也然古今治亂迭相倚伏物無常通之勢故泰之後受之以否否者上下不交氣化乖隔之謂也然亂極必治挽救在人物亦無終否之理故否之後受之以同人此世運之循環如是也同人者君臣同心協力以濟其否也既與人同則能得天下之心而人土財用皆為我有矣故同人之後受之以大有所有既大或好大喜功滿盈為害有未可保也故大有之後受之以謙有大而能謙則宜民宜人受天百禄可以長亨其有而樂以天下矣故謙之後受之以豫此君道當如是也夫人君能以謙致豫則臣有欽若之思民有從乂之志無不丕應而随順故豫之後受之以随然人之喜悦而來者非茍随也必上下同心而有事於脩治故随之後受之以蠱蠱者政壊而振起之必將有所事也既有事於勵精圖治而後一代之大功可以由此而起故蠱之後受之以臨臨者遍臨萬國有大無外之象大則可以照曜天下而文明光被赫然可觀故臨之後受之以觀天子炳大觀於上海内自觀化於下東西南朔來享來王而罔不合志矣故觀之後受之以噬嗑此治道之相因者然也嗑者合而為一也然使直情而行不加文飾是為茍合其始雖合其終必離是當有禮以飾之故噬嗑之後受之以賁所為文以救質也賁者禮以飾情之謂質而有飾亨道也然飾不可致致飾則繁文盛而實意衰亨道反盡矣故賁之後受之以剥所為質以救文也此文質之變如是也剥者剥盡之義也物盡則反無終盡之理剥陽窮於上則必反生於下天心隠而復現人心息而復生皆此理也故剥之後受之以復此造化之機如是也人心一復則天理之誠常存人欲之妄盡絶故復之後受之以无妄心既无妄則善日積而崇高惡日去而淨盡可以畜徳而至於大故无妄之後受之以大畜所畜既大而優游涵泳以俟其自化是得養之義焉故大畜之後受之以頤頤者涵養之正也有大涵養方有大設施未有養不豫而能動無不臧者故頤之後受之以大過可見大過人之功必由於盛養也此聖學之序也然凡事貴乎得中若恃才妄動則終過而失中必有險陷之患故大過之後受之以坎坎者一陽之陷也既陷於險而求出險之道則必有所附麗以自振作庶可藉以免難故坎之後受之以離離者一陰麗於二陽有附麗之義也上篇始乾坤而終坎離者葢以水火共濟為天地間之至理也按古今治亂一泰一否原自相循全恃君臣一徳以保泰濟否如舜得五臣而拯昏墊之災武王得十人而致遏劉之烈用能朝野同風天下順徳此同人大有之明徴也然史之贊堯曰允恭克讓舜之稱禹曰不矜不伐乃知謙以致豫千古同道所以萬姓歸懐百度具舉居高臨下敎洽刑清治道之隆於斯為極至如持文質之流察造化之幾敦一誠以養聖學察人事以審時宜内聖外王之學莫備於斯矣有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎此一章是發明序下經之義也孔子意曰序下經之卦始於咸恒而終於未濟者何也咸有夫婦之義夫婦者人倫之始天地者萬物之始下經始咸恒猶上經始於乾坤也自有天地則氣化形化而萬物生有萬物則分陰分陽而男女辨有男女則陰陽配合而夫婦成此有夫婦之所由也有夫婦則生育相傳而後有父子有父子則生齒日繁不可無主而後有君臣有君臣則尊卑貴賤定分不淆而後有上下有上下則制之節文為禮處之得宜為義莫不各有其措置此有夫婦之所致也夫本於天地以為萬物男女之防維錯為禮義以為父子君臣上下所托始夫婦所關大矣所關既大則倡随之道不可不久故受之以恒恒者久也然特夫婦之道宜久耳若論君子出處之理則盛滿久者造化所忌崇高久者禍機所伏物不可以久居故受之以遯遯者退避不居也然屯極則亨屈極則伸物無終遯之理由退而進勢將壯盛故受之以大壯壯必進用有為而不可以徒壯故受之以晉晉者上進也然不審乎盈虛消息之數而鋭進不止必有黜辱之傷故受之以明夷夷者傷害之義既傷於外必反家以就安故受之以家人此以君子之出處言也家道難齊漸至於窮極則父子兄弟夫婦之間情義乖離故受之以睽睽者乖離之義人情既乖則戕賊萌於一心戈矛起於一室而内難必作故受之以蹇蹇者所遇之蹇難也然物無終難之理難極則反身脩徳正已可以正邦而難可解散矣故受之以解解者解緩之義難既解則怠緩易生偷惰荒廢必有所失故受之以損自睽至損皆由家道以推之於世道以進退治亂之理言也損者懲忿窒慾其功不已則人心日㣲道心日長未有不蒙其益者故受之以益益者遷善改過其功不已則裕内利外盈科以進有若江河之決者故受之以夬此以君子之理學體用言也夬又有君子決小人之象小人決盡則君子必遇矣故受之以姤姤者遇也君子既遇則拔茅彚征而同徳相聚矣故受之以萃萃者聚也君子既聚則多賢効力而大猷允升矣故受之以升然爵禄非一人之私升而不已則貪戀禄位招尤犯忌困必及之故受之以困既困而不容於上必降而伏處於下至下者莫如井故受之以井自夬至井皆以君子進退之理言也夫井久必淤猶法久必弊道不可以不革故受之以革革物之故而為新者莫若鼎猶欲變成法者必操大權也故受之以鼎按下經始於咸恒者葢夫婦為人倫之首漢儒所以言婚姻之禮正然後品物遂而天命全也若出處之機治亂之數理學之消長進退之合宜其間盈虛消息各有天時而匡救挽回全賴人事聖人欲人於未變之先防危慮患以謹其㣲更欲人於將反之際旋轉乾坤以救其極古大臣之持盈懼滿而不敢自暇自逸者知此道也至於革故取新如湯武能以開剙為革殷武周宣能以中興為革洵乎建大功者必在於攬大權哉主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉此發明震以下諸卦之義也孔子意曰上文既明鼎為重器而主此重器者莫如大君之長子秉元良之徳居儲副之位所以上承宗社下統臣民故受之以震此以治道言也然震義主於動物無終動動極必靜天之道也故受之以艮艮義主於止物無終止靜極復動亦天之道也故受之以漸漸者循序漸進也此以造化之氣機言也氣機動靜相因而生如人學問有漸則成章後達自然理有歸宿猶女之得所歸也故受之以歸妹既得所歸則萬民歸於帝王萬善歸於聖賢而聖功王道無不極其盛大矣故受之以豐豐者盛大之義然使窮極侈大欲敗度縱敗禮必失居安之道故受之以旅旅者寓於外也在外則心不自安而無地可容不得不巽順以求返於所居故受之以巽巽則心入於理矣夫心能入理自覺意味長而㫖趣永此怡説所由生也故受之以兑兑則理説於心矣夫理可説心自覺性情洽而睟盎著此泮奐所由來也故受之以渙此以聖學言也然渙又有離散之義若人心分離解散而無所底止非處渙之道必當制度數議徳行大為坊表以節制之故受之以節節道既立則朝皆信道野皆信法百姓莫不中心誠服矣故受之以中孚此以君道言也然天下事又當因時制宜不可徒恃其信茍硜硜然不度時勢而必信必果必至以過中而妨義故受之以小過夫人雖不可過於信然不可無過物之才茍才可過人則必能撥禍亂定太平以成濟世寧民之功故受之以既濟此以人事言也夫物至於既濟則其功已成而數已窮矣然物無終窮如天地不窮於運㑹之循環萬物不窮於化育之生息人事不窮於治亂之倚伏終而復始生生不息故易以未濟終焉此以氣運言也按此篇推之於治道㕘之於造化㣲之為聖賢之學問顯之為帝王之治功驗於人事極於氣運總不出卦體所自具至於六十四卦循環徃復變化相生所為終則復始貞下起元先儒邵雍皇極經世一書大指皆本於此真能貫天地之陰陽究古今之變化者歟雜卦傳此是雜揉衆卦之剛柔動靜吉凶禍福而錯綜其義與上文序卦互為經緯者也孔子恐人紊亂序卦之次上篇乃即卦名立義以聯絡之又恐人株守序卦而失其反對之義此篇乃復雜揉其卦而錯綜之故名雜卦乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也兑見而巽伏也随无故也蠱則飭也剥爛也復反也晉晝也明夷誅也井通而困相遇也此錯雜乾坤至困三十卦以明其義也孔子意曰乾畫皆竒純陽至健其徳則剛坤畫皆偶純陰至順其徳則柔比以一人而君四海徳位俱全道可大行故樂師以一人而統三軍行險動衆安危攸係故憂臨則容保无疆敎思无窮有與民以恵與民以善之義觀則建中表正於上而民有於我求中於我求正之義或與以應其求或求以視其與感應之理固然也屯以震遇坎震動則見而坎險不行是動乎險中而能固守不失其所居之貞也蒙以坎遇艮坎體雖幽而艮象光明是質雖暗昩而學能破愚為明雜而能著也此以人心言也震者陽起於下靜極而動化機由以發端艮者陽止於上動極而靜化機由以收歛此天道通復之機也損下將以益上然君不能獨富雖未遽衰為衰之始益下似乎損上然君不致獨貧雖未遽盛為盛之始此世道治亂之漸也大畜以艮畜乾乾健難止而今能止者時適然也此見適然之福不足喜而當有善後之道也无妄以乾而動不當取禍而不免災者亦偶値也此見偶値之災不足懼而當思弭變之方也萃是考徳問業同聚於野而不徃以隠為高升是得時行道同升諸朝而不來以仕為通君子之出處分於此謙則虛已下人輕以自視豫則志得意滿怠以居衷君道之敬怠分於此噬嗑如有物見食去其强梗以合天下之間刑敎也賁以无色受采去其文飾以反天下之本禮敎也兑剛内柔外見其情而説人其人心之感而接物乎巽剛外柔内隠其情而順物其人心之寂而退藏乎随則上下相交幸无事故之可虞蠱則廢壊已極亟宜更化以善治葢守成中興之異如此剥者一陽窮極於上生意潰爛而歸於無復者一陽更生於下生意復萌而反於有葢造化消長之機如此晉以明出地上而為晝此文明之象世道所由隆也明夷明入地中而見傷乃晦塞之秋世道所由污也井以養物不窮是吾道之通而澤得以遍及也困則剛為柔掩是吾道之塞相遇而為所制也按乾坤至困三十卦適符上經之數咸恒至夬三十四卦亦符下經之數而各雜十二卦於其中者此變易之義也而上始乾坤下始咸恒變易之中仍有不易之義可見聖人詮易各具妙㫖大約皆於相反之中分其吉凶消長之理而上經所雜諸卦則君民感應化機循環出處異宜刑禮異治聖狂分於克罔運㑹别其污隆無一不關於治亂安危之數人主能體聖人雜卦之意知其相反之故而剖别幾微去此入彼則唐虞三代之盛不難致矣咸速也恒久也渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也此錯雜咸恒至夬三十四卦以明其義也孔子意曰王道有過化存神之妙咸者感人心而天下和平綏來動和其道必速王道無近功淺效之時恒者久於其道而天下化成漸仁摩義其道必久民心有離合之端渙以風散水為擕貳之象無以合之故離節以澤限水為制節之象有以限之故止國勢有安危之别解出乎險從容寛緩之時也蹇在險中患難危急之秋也人情有親疎之異睽則情意乖隔疎而外之矣家人則㤙義聨屬親而内之矣否則大往小來而小人道長泰則小往大來而君子道長其類相反至此已極氣運之循環又如此陽之方壯不可恃壯而失防陰之道故大壯則止而不宜輕進陰之方長慮其逞勢而肆害陽之心故遯則退而不可冐進大有之勢六合一家而所有者衆同人之情兆姓一體而來附者親革以去故必舉積習之陋而盡更之鼎以取新必舉維新之政而悉布之治道如此則莫不尊親而弊無不去利無不興矣過不可有細行不謹雖小有失亦過也信不可無色取宜戒中心之孚乃信也制行立心不可不審已豐則明動相資勢盛而喜於有為其故多也旅則窮大失居勢孤而誰與為徒其親寡也處事處人不可不審已離火陰而附乎陽其性炎上坎水陽而附乎陰其性潤下此陰陽之精氣互藏其宅為造化自然之理也小畜以一陰畜衆陽小難畜大為寡不敵衆之象履以和説躡剛强柔能制剛為能進而不處之象此見小人之寡不足害君子而君子之剛自足禦小人也事莫善於需孚貞待時為見險不進之象事莫凶於訟險健求勝為與人不親之象此見靜安義命者為君子而動爭是非者為小人也大過本末俱弱非遺大投艱之才故顛姤以一陰遇五陽猝然相遇遇不以正者也君子以漸而進如女之歸必待男之六禮備而後行則進得其正矣頤者内而養徳外而養身見君子之學術皆有正道而不入於厖雜既濟者綱舉目張禮備樂和見君子之治功克致底定而不入於功利歸妹者婦既從夫終身有托為女之終未濟者三陽失位夫道無權為男之窮夬之義為決以五剛決一柔是陽徳大行君子道長陰邪屏息小人道憂也世道如此不亦大可慶幸哉按乾剛坤柔以下惟姤曰柔遇剛夬曰剛決柔葢姤為柔進之始進極則為坤夬為柔退之終一決則為乾故獨以二卦言之且以乾始必以乾終夬之一陰決盡即為純乾所謂貞下起元孔子贊化育扶世變之㣲意也日講易經解義卷十八
