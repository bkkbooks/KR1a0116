body:
  text: 欽定四庫全書日講易經解義卷六坤下巽上觀化在民所以為觀者在已九五居上四隂仰之觀之位也內順外巽觀之德也以中正示天下觀之道也然順巽與中正實非有二順則不假作為巽則不露形迹此皆渾然在中不可見者中與正即此不可見者隱躍示人於聲臭之表以默成中正之化觀道也即天道也故謂之神大抵卦以觀示為義爻以觀瞻為義下四爻皆所以觀人者上二爻皆所以為人觀者天下未有不觀諸已而能為觀於人者也故五以君道觀天下而必反觀我生上以師道觀天下而必反觀其生其道要不外中正而已蓋五之自觀則曰生出於我者也自四觀五則曰光達於國者也初無二也若初六之隂柔安於淺近而為童觀六二之暗蔽遺於見聞而為窺觀不惟不能如四之觀國之光亦且逺遜三之審於進退豈得觀道者哉觀盥而不薦有孚顒若此卦坤下巽上九五一爻四隂仰之有觀示天下之象故名為觀卦辭言為天下所觀者當盡其建極之道也自上示下曰觀自下觀上曰觀卦名之觀去聲六爻之觀平聲盥將祭而潔手也薦奉酒食以祭也祭未有盥而不薦者特假此以明慎重之義孚信也顒若尊敬之貌文王繫觀彖辭曰人主以一身涖萬物之上斯世無不尊而仰之觀化者雖在於人而為觀者實在於已誠能精一執中無為守正沖然穆然端拱於上無俟制度文為從事顯然之迹而實德在中自足建中表正於天下猶祭者方盥手致潔酒食未薦時孚信在中而顒然可仰也蓋祭者以誠敬為主未及於薦則誠敬常存至既薦之後禮數繁縟則人心𣪚而精意不若始盥時矣夫格神以誠不以文觀民以心不以貌在上者正其儀表以為下民之觀當莊嚴如始盥之初勿使誠意少𣪚如既薦之後可也按四陽二隂之卦曰大壯四隂二陽之卦曰觀四陽之為大壯以陽之盛言也四隂何不以隂盛言而獨取二陽在上為四隂所觀仰蓋扶陽抑隂聖人固有微意存焉天下多者必受治於少况陽實為隂所樂從者乎但當盡其為觀之道耳舜恭已南面而天下自治文王不大聲以色而萬邦作孚可以得此卦之義矣彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣此彖傳是釋觀彖辭而極言觀之道也大觀在上以卦體言順巽以卦德言中正以所觀之道言下觀而化以效言四時不忒天之所以為觀也神道設教聖人之所以為觀也孔子釋觀彖辭曰卦名觀者以中正示人而為人所仰也然無位則其道不尊無德則其道不立而難達乎天下矣今卦體九五在上其下四隂仰之卦德內順外巽而九五以中正示天下焉則是大觀之主身居上位而為臣民所具瞻所以為觀者有其位矣溫恭以宅心而內焉於理無所乖審察以制事而外焉於理無所拂所以為觀者有其德矣由是自一身以達庶政一皆大中至正之理為觀之道天下皆得而見之此其所以稱大觀也夫觀道以中正為極而中正以民化為徴中正為觀一若祭者之盥而不薦有孚顒若然所謂建其有極也其下皆服從而化革面革心所謂歸其有極也此其間有不言而喻之機非天下之至神其孰能之試觀天道無聲無臭氣化流行道何神也而春夏秋冬不爽其序試觀聖人不識不知民皆順則道何神也而一道同風不顯其德聖人之神道設教一如天之神道也觀之為道豈不大哉按中正以觀即聖人之神道以設教也下觀而化即天下服也卦辭取象於祭故揭神道言之視之弗見聼之弗聞體物而不遺者神是也聖人正身以率下至誠所孚非有聲音非有象迹而應感之機捷於影響蓋所存者神則所過者化豈人力之所能為者歟象曰風行地上觀先王以省方觀民設教此象傳是言先王體觀以為治也孔子釋觀象曰坤下巽上是風之行乎地上也吹噓披拂無物不遍為觀之象先王以身率人固足以範民於中正之路然慮天下之大有難以遽齊者於是因巡狩之期舉省方之典遍考其風俗而設教以示之如國奢示儉國儉示禮使之一軌於中正是其以道觀示天下之民亦猶天之風行而及天下之物矣聖治之同天者如此按省方之典虞夏商俱以五載而周則十二年一巡有疏數之不同者蓋上古天子之出車徒省少供應簡略不致勞民動衆至周而其禮漸繁矣漢唐以後出入警蹕儀物滋多非復前代之簡易豈能復循先王之舊乎漢武微行東方切諫孝成媠出谷永進規深知萬乘之不可輕動也人主誠能廣闢四門達聰明目則雖不下堂階而自灼見萬里之外亦何必古制之是泥哉初六童觀小人無咎君子吝象曰初六童觀小人道也此一爻是言隂柔無識不獲觀光者也卦以觀示為義據九五以為主也爻以觀瞻為義皆觀乎九五也童觀如童稚不能逺見君子小人以位言周公繫觀初爻曰九五以中正示天下天下所樂觀者也唯初六隂柔在下既無自致之資又處絶逺之地不足以自振拔而觀大君道德之光有如童稚之見不能逺及此在無位之小人不足致咎若有位之君子當以天下國家為己任而如是焉可羞吝矣孔子釋初象曰初六童觀而曰小人無咎蓋百姓日用而不知乃草野之常分小人之道固當如此所以不足咎也豈君子之所宜哉按童之象位陽而爻隂陽則男而隂則稚也蒙之六五亦曰童蒙但蒙者一聼於人受教有地故吉觀者無識於已仰德靡由故吝義各不同耳六二窺觀利女貞象曰窺觀女貞亦可醜也此一爻是言在內者不能觀乎外其所見者小也窺從門內而窺外周公繫觀二爻曰凡人所見貴乎逺大故雖身居一室而天地民物之事無不周知乃丈夫之觀也六二以隂柔之質居下卦之中則其見不能及逺天下之事遺乎見聞之外者多矣故其象為窺觀乃女子之貞也蓋婦無外事則自門內以觀門外乃分之常丈夫得之則非所利矣孔子釋二象曰窺觀特女子之貞耳若丈夫以四方為志而乃所見如此局量褊淺有負明時寡見謏聞醜孰甚焉按大觀之主雖以神道設教然不能必天下之人盡知其所以為觀之道初之童觀二之窺觀亦各隨其分量所至耳聖人於童觀名為小人於窺觀名為女子正欲在上者衡鑒無爽勿使小人女子之倫冒昧進干髙位而在童觀窺觀者亦宜急審自處而知所勵志焉庶可自立於大觀之世矣六三觀我生進退象曰觀我生進退未失道也此一爻是言君子之出處當自量也我生我之所行也周公繫觀三爻曰士君子出處之際既度之人又度之已六三居下之上是其所處在可進可退之間然則當何所取衷哉惟反觀已之動作施為能成天下之務則從而進時當通而通也不能成天下之務則從而退時當塞而塞也但取決於已可矣孔子釋三象曰君子之進退有道存焉而要皆視乎我也茍不度德量時貿貿然旅進旅退於其間則失道者多矣觀我生以為進退則其進其退我皆得而主之何至於有失哉按聖人嘗言樂則行之憂則違之又言用之則行舍之則藏皆兼進退之義此全視乎世以為去就者也若大觀之主在上惟患我之不能用世不患世之不能用我故不必問之世而但當問之已其殆古人量而後入之義乎士君子出處之間可以知所審矣六四觀國之光利用賔於王象曰觀國之光尚賔也此一爻是言六四近光之盛而示人以從王之義也賔言為王者所賔禮也周公繫觀四爻曰六四于中正為觀之九五最為切近凡大君之盛德發而為邦國之光者身得親炙其休有觀光之象焉夫遭逢聖明此固一時遇合之盛而凡豪傑之士爭自奮興之會也當斯時也宜何如哉已仕者則利於朝覲以膺賔禮之隆未仕者則利於仕進以應賔興之典皆思乘時委贄而致身恐後矣何其隆乎孔子釋四象曰六四謂之觀光者豈枉道以求合哉亦尚乎人君賔賢之禮而已蓋君子孰無效用之心惟在上者無下賢之風故在下者髙不見之節耳今九五以賔禮接天下之賢則無論在朝在野皆感慕興起孰肯自外于折節之盛者哉按古者諸侯入為卿士或朝宗覲見于王王以賔禮接之既享以訓恭儉又燕以示慈惠故蓼蕭之詩曰既見君子為龍為光此所以待已仕者也鄉大夫以三物教萬民而賔興之獻賢能之書于王王拜受之論定然後官之此所以待未仕者也而皆有賔之義焉可見人君未有不以禮而能致天下之賢者若徒以富貴爵祿頤指氣使當世之士則所得皆貪冒無恥尸素保位之人矣君子其肯為我用乎九五觀我生君子無咎象曰觀我生觀民也此一爻是言人君以中正示人而為人所觀仰也周公繫觀五爻曰九五陽剛中正大觀之主巍然在上其下四隂仰而觀之君子之象也居是位者必觀已之所行凡出身加民者陽剛而無委靡之失中正而無偏頗之纍誠為履天位而不疚之君子焉則足以觀示天下而答四方之望矣復何咎哉孔子釋五象曰五之所以觀我生者將以考一身之得失也然欲考所行之當否但當視民俗之善惡所謂本身而徴民是也不則徒觀諸已而不觀諸民其得其失曷從而驗之乎按九五中正以觀天下聖人繫辭何不豫之吉亨而僅曰無咎蓋人君一日二日有萬幾行一事而違宜必有一物失其所者矣用一人而不當必有一方受其害者矣兢兢然臨深履薄不遑暇逸凡水旱之有無逺邇之叛服刑辟之多寡財賦之贏縮無非觀民以觀我生之事能如五之無咎足矣敢以吉亨自詡為哉上九觀其生君子無咎象曰觀其生志未平也此一爻是言上九居尊位之上雖無事任而亦當盡為人觀仰之道也周公繫觀上爻曰上九以陽剛之德處於上為下之所觀而不當事任是賢人君子不在其位而道德為世羽儀者也故必反觀其身果言出而為世則行成而為人師確乎無忝其生之君子焉則模範以隆無負師表之望而可以無咎矣孔子釋上象曰上九之觀其生者蓋以人既望之為儀表即宜自知戒懼兢兢業業期無負乎一世之觀瞻豈以不當其位遂晏然放廢而無所事乎按上九所處雖超人位之外而志未嘗不在民與物蓋觀惟二陽為下所觀五當其位君也上不當其位師也孟子曰聖人百世之師聞伯夷之風者頑夫廉懦夫立聞柳下惠之風者鄙夫寬薄夫敦誰謂一人之制行遂不關於斯世斯民之大乎震下離上此見天下事所以不和合者由讒邪間隔於其間聖人觀噬嗑之象推之天下萬事皆使去其間隔而合之則強梗去而德化行矣去天下之間在任刑罰小則懲戒大則誅戮以除去之故卦取用刑為義象雷以用威象電以用明明罰敕法以使人不敢犯此去間之大權也六爻皆言用獄初過小而在下為用獄之始上惡極而怙終為用獄之終中四爻有位俱屬用獄之人二惟良折獄者也三困於強禦者也四有司執法之義也五人君矜恤之仁也卦才之剛柔不同故所噬之難易以異統而觀之惟四五能盡治獄之道彖以五之柔為主故利用獨歸之五爻以四之剛為主故吉獨歸之四主柔而言以仁為治獄之本主剛而言以威為治獄之用仁以寓其哀矜威以懲其姦慝剛柔迭用而治獄之道得矣噬嗑亨利用獄此卦震下離上為卦上下兩陽中虛頤口之象九四一陽間於其中必噬之而後合故為噬嗑卦辭言凡事必先去間而去間之道又當用折獄之勇也噬齧也嗑合也物有間者齧而合之也文王繫噬嗑彖辭曰凡天下事未得亨通者皆有物以間之也噬而去之則物無所間於我而凡所措施推之皆準動之皆化亨其宜矣即如治獄一事使不得其情而頑梗未服猶有物以間之必利用此噬嗑之道為之别白是非剖析情偽則姦惡屏除庶幾刑措不用而大化可成矣大抵世雖極治不能保下無方命之人姦宄不法間我治化者也則合之以刑寇賊不靖間我疆圉者也則合之以兵推之他事莫不皆然蓋卦有治間之道而於用獄尤深切著明故六爻皆以治獄為言其實利用獄者噬嗑而亨之一端耳彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也此彖傳是釋噬嗑彖辭而極言去間之道貴於威明得中也震為雷離為電雷取其威電取其明孔子釋噬嗑彖辭曰卦名噬嗑者蓋卦上下兩陽中虛有頤口之象而九四一陽獨間其中猶頤中有物必齧去之而後合故名之為噬嗑也辭曰噬嗑而亨者天下惟有間故不通噬而嗑則無有強梗以為間者此其所以得亨也又曰利用獄者卦體三隂三陽剛柔中分則是剛不過暴而存好生之仁柔不過縱而非姑息之愛得其中也卦德震動離明則是可否以斷而不屈於勢利是非以辨而不惑於虛辭有威明之善也然威明非特卦德為然卦象震雷離電合而成章是威而濟之以明其威益有所施明而濟之以威其明益有所用威明相需而不偏也得中亦非特卦體為然卦變自益六四之柔上行以至於五而得其中是有仁恕之德而不失之委靡有哀矜之念而不流於姑息一張一弛之當其可也凡此皆具用獄之道故雖六五以隂居陽或失於柔然衆善悉備則折獄致刑未有不得其理者而何用獄之不利乎按柔中雖不當位而利用獄者蓋人命至重死者不可復生斷者不可復續故折獄之道雖貴剛斷而尤貴柔中禹之泣罪湯之解網王制之三宥皆柔中之謂三代盛王卜年久逺而非後世可及者其皆以忠厚為立國之本歟象曰雷電噬嗑先王以明罰敕法此象傳是言體威明之象以見其利用獄也雷電當作電雷明者辨别精審之意敕者整齊嚴肅之意孔子釋噬嗑象曰離象為電震象為雷是威明以去天下之間者有噬嗑之象先王以為與其有間而後合不若未間而預防於是因大小之罪定輕重之罰一出一入秩然有條而不紊俾後之用法者有所遵守而罔敢少踰如此則國憲昭明於一時紀綱振肅於萬世庶人知警懼而無或犯矣兹非去間之大權乎按明罰是明劓剕宫大辟以至流宥鞭朴金贖之類使罰必當其罪而後人不疑於所坐姦吏不得舞文以出入也就此卦言之如罪薄過小宜罰之以屨校惡極罪大宜罰之以何校一一彰明而申警之此往古有讀法之制即今條例中講讀律今一款但有司奉行不力視為具文遂至百姓冥趨犯刑日衆耳欲刑期無刑者可不以先王為法哉初九屨校滅趾無咎象曰屨校滅趾不行也此一爻見小懲而大戒為小人之福也初上無位為受刑之象中四爻為用刑之象校足械屨如納屨然謂著於其足滅沒也周公繫噬嗑初爻曰初陽肆惡罪所當刑然無知犯法罪薄過小但當輕刑以懲其始為屨校滅趾之象夫人之惡方形而遽為懲戒則悔其既往慎其將來自無怙惡不悛之咎矣孔子釋初象曰初之屨校滅趾者蓋趾在下乃人之所以行滅趾則有所警懼而不罹於惡為不行之象咎之所自免也按止惡於初不但小人之幸即在上者亦易於施法不致釀成禍患興起大獄殃及無辜否則屨校不懲必至何校滅趾不戒必至滅耳安知罪薄過小之初不流為惡極罪大之上乎六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也此一爻是言治獄者能行其罰可以服剛暴之心也噬嗑食也中四爻膚臘胏肉皆取頥中有物之象膚柔脆易噬者滅鼻強梗難治之象周公繫噬嗑二爻曰六二當用刑之任而居中得正則聽斷合宜以此治獄信有可以片言折人者如噬膚之易矣但以二柔遇初剛強梗弗順欲其屈服未免煩乎刑誅故又有滅鼻之象然當噬嗑之時刑所當刑而不至骩法以縱惡何咎之有孔子釋二象曰噬膚而至滅鼻者以乘初陽之剛乃用刑於剛暴之人不得不為深嚴以明正其罪此正柔而得中者也若偏倚於柔則不足以斷而委靡不振安能免於咎哉蓋國家有法原以詰姦懲惡威克厥愛􅏷侯所以治羿黨也刑兹無赦康叔所以處大憝也以至公孫𢎞之誅郭解王猛之誅樊世皆有合於剛亦不吐之義二之乘剛而滅鼻此正不得不然否則優柔姑息如東漢之於宦官唐末之待藩鎮明知其惡畏其強而不敢行誅為害可勝言乎六三噬臘肉遇毒小吝無咎象曰遇毒位不當也此一爻是言用刑而不得其中無以遽服民志也臘肉獸臘堅韌之物毒謂傷於口治人而人不服之義周公繫噬嗑三爻曰三當用刑之任而隂柔不中正既無剛斷之才又失用刑之道以此治獄是非不決輕重失平人自不肯輸服有噬臘肉遇毒之象誠有愧折獄之任而不免於小吝矣然時當噬嗑在我雖有剛明不足之患在彼實為有罪當刑之人治所宜治於義為無咎也孔子釋三象曰三何以噬臘而遇毒哉非獨治獄之難也蓋以隂柔則剛果不足不中正則聽斷或偏德薄才疏以致若此者位不當也然則治獄須才德兼備之人豈可不擇而後任哉按二之乘剛遇難治之獄難在人也故曰滅鼻三位不當無治獄之才難在我也故曰遇毒然初雖難治而二得善處之道天下無長抗法之民是以終無咎也三雖無才而有治獄之任有罪之民亦終當輸服是以小吝而亦無咎也皆緣遇噬嗑之時耳九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也此一爻是言得聽訟之宜者猶未可忘戒懼也胏與胾同肉之帶骨者金矢周禮獄訟入鈞金束矢而後聽之言能使其心服也周公繫噬嗑四爻曰四當治獄之任以剛居柔是有剛柔相稱之道既不傷於優柔又不嫌於剛暴雖頑梗弗率之徒亦有以得其情而俾中心輸服焉故有噬乾胏得金矢之象然獄者天下之大命治獄者天下之大事尤必艱難其心無所慢易正固其守無所偏私則刑當其罪能如是而後吉也孔子釋四象曰利艱貞固可以得吉矣然為民上者必使民無訟治道大光乃為可貴今雖善於決獄而猶待於聼訟是則治其末未正其本塞其流未拔其源其道則未光也按以全卦之體言四為一卦之間則受噬者在四以六爻言四反為噬之主與三陰同噬初上者蓋卦言其位則梗在其中爻言其才則剛足以噬取義固不同也王制大司寇以獄成告於王王命三公參聼之則九四大臣固有折獄之任然雖聽訟得宜而爻戒以艱貞象惕其未光周孔聖人無非慎重民命即如得其情哀矜勿喜之意云爾六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也此一爻是言六五為訟獄之主非明德慎罰者不能得當也噬乾肉難於膚而易於臘胏者黃中色金亦謂鈞金也周公繫噬嗑五爻曰五居尊位天下訟獄之主也而以柔中居之則寬而不過仁而不偏得用刑之道以此治獄隨其輕重皆得其情刑罰清而民自服有噬乾肉得黃金之象然又不敢以人無不服而遂易以處之必正固其守而出入惟允惕厲其心而恣睢不萌庶幾刑必當罪罪不失刑得用獄之宜而無咎矣孔子釋五象曰五所以貞厲無咎者蓋為治莫大於獄而難治亦莫甚於獄惟能貞則斷合乎理能厲則聼無不當所治之大小輕重皆得其宜乃無咎矣按九四以剛噬六五以柔噬以剛噬者有司之守惟在於法之中以柔噬者大君之仁時行於法之外也然猶貞厲則無咎如帝舜欽哉惟刑之恤穆王訓誡祥刑而曰朕言多懼其敬慎之心誠有可為後世法者歟上九何校滅耳凶象曰何校滅耳聰不明也此一爻是言惡極罪大之人不可逭也何校負械於頸也周公繫噬嗑上爻曰初卑而無位上髙而無位故皆為受刑者過極之陽怙惡不悛當服上刑有何校滅耳之象凶孰甚焉孔子釋上象曰王者明罰敕法聳動衆聽在人無不共聞何上之昏迷不聰乃自陷於大惡滅耳之刑正以罪其聼之不聰也於人何尤哉按初上皆為受刑之象初則罪之小者用輕典以治之小懲大戒也上則罪之大者用重典以治之怙終賊刑也滅趾於初以使其不進滅耳於終以罰其不聰聖人之於人勉其始而戒其終如此總欲消天下之有間而歸於無間耳離下艮上卦變剛柔交錯卦德文明以止皆有文飾之義賁雖尚文然必以質為本蓋人情自質而趨於文也易自文而返於質也難文王於賁深慮末流之失故亨之下即繼以小利有攸往也全彖皆是此意六爻中得其賁者惟二之賁須三之賁濡而永貞之戒已隨其後外此則四之皤如固不成賁而初之舍車而徒則以幽人之貞賁矣五之束帛戔戔則以丘園之野賁矣上之白賁又且以無色賁矣於賁飾之時而取不賁之義何一非文王小利攸往之心乎夫周公制禮作樂其文郁郁然皆因天道自然之文以成人道當然之文並未嘗以已意增飾一事然後知周禮之作猶是取丘園取白賁之心也已賁亨小利有攸往此卦離下艮上內離明而外艮止是內裕文明之德而外無踰等之弊又卦變自損既濟二卦而來柔來文剛剛上文柔剛柔相錯而文生焉故名為賁卦辭言文固不可不用而亦不可過用也賁文飾也亨小利有攸往以變卦言文王繫賁彖辭曰文質得中則行之通達而無弊文質失序則僅可粉飾一時而終有文勝之虞也如卦變柔來文剛是能以淳朴為主而文濟之得其中矣且離明於內則制禮作樂皆斟酌時宜務求至當文之四達而不悖也何亨如之又卦變剛上文柔是徒以藻繢為主而質反輔文失其序矣且艮止於外則布政宣猷皆塗飾文具不能經逺文之可小而不可大也則亦小利有攸往而已按自古帝王未有無文而治者四代之典謨訓誥禮樂刑政皆治世之文也然質為本文為末本為大末為小文以輔質此賁之所以致亨文以滅質此利之所以為小故陶唐有憂深思逺之風夏禹有克勤克儉之美伊尹有慎乃儉德之規孟子有賢君恭儉之訓皆敦本尚實而專務於其大者也若徒事繁文以長浮偽又豈所以為賁乎彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下此彖傳是釋賁彖辭以明聖人用文之大權也賁亨之亨字疑衍先儒謂天文也句上當有剛柔交錯四字止謂各得其分孔子釋賁彖辭曰卦之名為賁者果何以致亨乎以卦變言之自損來者損之二本九也今則三之六來居之是以柔文剛也損之三本六也今則二之九上居之是以剛文柔也又自既濟來者既濟之五本九也今則上之六來居之是亦以柔文剛也既濟之上本六也今則五之九上居之是亦以剛文柔也以柔文剛則質為主而加之以文達之天下後世無有不準故亨若夫剛上文柔則文為主而質反輔之推之天下後世必有其弊故小利有攸往文王之繫辭如此茍明乎賁之所由亨而悟賁之為道豈徒文已哉其於天人之理固已兼盡之矣剛柔交錯卦之變也是即日月之推移星辰之旋轉其懸象於天燦然而森布者非天自然之文乎離明艮止卦之德也是即五典之所由敘五禮之所由秩其昭著於人截然而不可越者非人固有之文乎惟交錯為天文則觀乎卦中之天文而或剛或柔時變因之剛來文柔見時之通而以為春夏也柔來文剛見時之復而以為秋冬也可以察四時之變焉惟明止為人文則觀乎卦中之人文而為文為止大化因之文以聯其情則天下皆有禮以相接而不漓也止以定其分則天下皆有分以相守而不瀆也可以化成天下焉賁道何其大哉按賁之世文象昌明天人之機至此不得不開而恐相沿既久文必勝質故文王繫以小利孔子示之文明以止其為慮至深逺矣象曰山下有火賁君子以明庶政無敢折獄此象傳是言人君敷政慎刑以章文治也折辨晰也孔子釋賁象曰山下有火光被羣生此賁象也蓋山在上則法有所必守火居下則明有所不矜君子體此於水火兵農錢榖之庶政務用吾之明以綜核之而無使少有暗昧以傷文明之治至於獄者民命死生之所係也衡文析律稍恃其明而輕為讞決則民之失入而死於司刑之刀鋸者蓋不知凡幾矣况賁尚文飾獄貴得情須先有哀矜慈恤之心以去其慘刻深文之習而臨獄之時自無敢輕為折也按賁雖以文飾為尚而貴有實意行乎其間曰明庶政則後世鋪張粉飾之文反若以為陋矣曰無敢折獄則後世慘苛煆鍊之風不知其何以消矣昔漢文帝承創造之後躬親細務其於食貨農桑纎悉不遺而於治獄一事詔令再三佩其辭旨至今令人感頌此真能體賁之義而無愧於為文者與初九賁其趾舍車而徒象曰舍車而徒義弗乘也此一爻是言君子抱道自守而安貧賤也趾足趾也徒徒行也周公繫賁初爻曰士君子處世既貴其有德尤重其有守初九以陽居陽有其德矣而居明體之初在賁之下是其時潛而未曜隱而未章道宜自賁棲遲草野安於貧賤而能有守焉為賁其趾之象彼其心專以天爵自麗而不以人爵為華其於世人章服之美毅然去之若凂而任吾素履以往不稍濡滯故又為舍車而徒之象也孔子釋初象曰所謂舍車而徒者豈其惡富貴而逃之哉顧身在下位而侈車服之滎非義也決於義以定取舍故寧舍彼而安此非專尚乎隱以為名髙也按初九在下為趾其分至卑而有剛明之德足以自賁雖六四應之欲下求於初然四求初為貴德初求四則為趨勢矣蓋在下之剛以安於在下為義初之賁在德不在車也人人有貴於已者令聞廣譽施於身不願人之膏梁文繡賁之道豈資非分之車服以自文者乎六二賁其須象曰賁其須與上興也此一爻是言人臣同心共濟能資於人以有為也須附頤而動者周公繫賁二爻曰二以隂柔居中正三以陽剛居正是皆同德相輔同氣相孚而又俱無應與則其勢孤而求援益切故二之隂柔才弱必上附三之陽剛而動則其一謀一猷皆仰資乎三以成之如須之附頤而動也孔子釋二象曰所謂賁其須者以三才力有餘居二之上二附之而動將以興起有為則二之與上者乃相須之殷而非附勢以茍合也按二以陰不足以有明也得陽而後明二以柔不足以有立也得剛而後立二以下不足以有興也得上而後興此二之所以必須乎三也然則欲建功烈於當時垂聲名於竹帛豈獨士君子貴有拔茅連茹之風哉古之盛世君明臣良一德一心君臣相資用成郅隆之治則求賢佐理以興起事功實有天下者第一要務也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也此一爻是言處羣才輻輳之會當示以正大之情也濡如潤澤之象周公繫賁三爻曰九三以一陽居二隂之間則左右後先咸思殫其材智以效用於我凡所施為自能集思廣益以成文明之化為賁如濡如之象然上下皆隂又非正應則鮮終不可以不慮又三處明體之極或過恃其明人將飾貌以昵我而為非道之悅者有之故必永守其正而有以起其畏敬消其不遜則賁常得其所濡而吉矣孔子釋三象曰凡人之相陵必起於相狎永貞之吉三蓋永以正自處而不稍開人以玩褻之端雖人之伺其色笑者甚衆而剛明不阿無間可乘終莫得而陵之也按嚬笑不以假人讒諂實能誤國自古君子因小人之昵就不察其詐而狎近之卒反為所陵者多矣如孟子於王歡朝暮見而不與言行事宋璟待楊思朂在道數月終未嘗通一辭所謂絶之於始不惡而嚴彼小人者雖欲侮我豈可得乎六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也此一爻是言求賢之誠心惟專於正應也皤白也翰如言行之疾如飛翰也周公繫賁四爻曰四與初本為正應相為賁者而為九三所隔遂至心雖相合迹則相睽不得其所賁而為皤如之象然四以柔居隂本具柔正之德不肯妄有所應故其求初之心更為迫切如白馬飛翰之疾者然九三剛正本非有害於四亦欲與四相為親善以成賁道而其如四之守正而不妄應何哉孔子釋四象曰人之相疑者位而相信者心四所處之位逺於初而近於三疑若為所附而動故來三之求然位雖近於三而心實信於初故確然以正自守急求於初而不與三賁雖三亦諒其誠而終不尤四之不我與也又何他患焉按此爻與屯之六二相似屯剛柔始交賁剛柔交錯皆有婚媾象然屯之二乘馬班如應五之心何其緩賁之四白馬翰如應初之心何其急蓋屯二應五下求上也故不可以急賁四應初上求下也故不可以緩時地固有不同焉耳六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也此一爻是言當文明極盛之時而有挽回世運之微權也丘園朴野之象束帛薄物戔戔淺小之意周公繫賁五爻曰六五以柔中居尊敦本尚實純以儉朴居心而一切繁華之見不得淆其中雖身履朝廷文物之盛而不失山林朴素之風為賁于丘園之象至於束帛雖微可以享神求賢禮宜隆渥而亦戔戔自持則外此之不事華縟可知己夫當賁時而儉嗇若此似不免為鄙為僿之吝然踵事增華終不若安於儉素之為善也故終則吉焉孔子釋五象曰六五之吉者以賁之世人皆尚文主世運者深厪溺文滅質之憂五實能崇尚儉朴為天下先絶非有所矯飾而然終能化成天下而得吉則可以遂其返朴還淳之志不有喜乎按賁為文飾之卦六五又人文化成之君而反取丘園之賁者蓋治不可以無文而文不可以太盛賁至六五已過中矣文勝之時也聖人慮其過而預防之將驅天下而歸之中也東周之末禮儀過繁鏤簋朱紘歌雍舞佾僭侈之習上下無等故孔子言禮樂必云從先進而答時人之問禮亦以寧儉為言此皆相時敝以立論其有合於此爻之旨者乎上九白賁無咎象曰白賁無咎上得志也此一爻是言文之極而返於質也周公繫賁上爻曰上九居賁之上處艮體之終是文之至盛而得所止者也故能盡去浮華獨標真素為白賁之象以白為賁則文盡而返質又何有文勝滅質之咎乎孔子釋上象曰上之時正致飾而亨盡之時也故上之志急欲救文而還朴今白賁而無咎則人皆向風而上所以挽回賁道之志遂矣何不得之有按賁卦曰亨曰小利文王所以立文質之防曰丘園曰白賁周公所以垂救世之論曰喜曰得志孔子所以決從古之心三聖人所為存至道於一時防陵替於奕世觀其辭之諄復而知意至深逺矣坤下艮上剝卦以上九一爻為主當五隂盛長一陽消落之時君子豈可有所往彖傳釋卦辭而繫以順止非終不往靜以觀時有待而往也為君子謀也六爻初猶未害君子二則漸害君子聖人皆慮及蔑貞而惕之以凶四則蔑貞已肆隂禍切身不復言蔑貞而直言凶皆所以戒小人也至於三之應上五之從上一繫之以無咎一繫之以無不利其於小人之改邪為正者又未嘗不許之蓋聖人於柔變剛之際重惕小人之害君子而必欲其受制於君子是則撥亂為治轉危為安之深心也夫事起於微禍伏於忽自一柔變剛而為姤再變為遁三變為否四變為觀以至於五變則為剝是其始也不過一隂生於下其勢甚微初若可忽而其後卒至黨羽已成凶惡日肆為君子害彼小人亦知己之欲去君子為名不正言不順而乃浸潤侵蝕使之日消月鑠而不自知然則小人之為計狡而為禍深矣為君子者可不防之於早以杜其惡於未形也哉剝不利有攸往此卦坤下艮上是羣隂盛長而孤陽頽落之日也故名為剝卦辭言當此之時妄行躁進必為小人所害而無所利益也剝剝落也文王繫剝彖辭曰五隂盛長於下一陽將盡於上是小人之勢焰處於極盛而君子之氣機幾於將絶此時而再往必至一陽盡消而變為純坤矣君子於此宜惕然思吾之出處甚重豈可輕於一往以蹈禍機惟宜晦迹退處以養其才於不試故不利有攸往且卦德內坤順而外艮止亦宜順時而止不可違時而往也按漢唐之世黨錮之禍毒遍海內然必有一二君子沈幾觀變超然於塵壒之外而不攖其患所謂得處剝之道也然君子進退係世道之興衰為人君者不能審於是非而使小人肆虐致仁人志士不敢一日安於其朝此豈國家之利蒼生之福哉彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也此彖傳是釋剝彖辭言柔盛變剛之日惟當順以俟天止以待時也柔變剛言柔進於陽變剛為柔也孔子釋剝彖辭曰卦之名為剝者卦體一陽在上而將盡由五隂剝落之也柔變剛初而為姤二而為遁三而為否四而為觀五而為剝蓋小人之去君子原於名義不順必隂謀深固使之日漸消鑠潛移不覺然後可以肆其排沮之力而盡變為小人之黨也辭謂不利有攸往以小人之勢如莠之方長而不可遏之時也卦德坤順艮止有順而止之之象君子觀其象而悟其理則不輕攸往政所以處剝之道也然君子所以毅然不往者豈冥冥無所決擇於中而徒委之無可如何之勢乎蓋陽息而盈則天運復陽消而虛則天運剝順之則吉逆之則凶君子隨時敦尚運處極剝知其後之將必至於復而沈謹自守以求合乎天行之數而已太抵平陂倚伏一定之理觀變不審徒欲與小人角一日之勝負既非保身之哲又重天下之禍且使維持補救者反無以施其具也從來挽回世運非深心大力遵時養晦之士不能平勃之重安漢室仁傑之復興唐祚斯其人矣象曰山附于地剝上以厚下安宅此象傳是言人君當思剝之可危宜急於固本安邦以盡治剝之道也附連屬也孔子釋剝象曰卦象山髙于地而反附著于地頽剝之象也為人上者思剝之所來必自下起故防剝之道必先厚固其下以安其居也蓋上何所宅唯民所止以為宅宅茍不安則上何以寧下茍不厚則宅何以安故必豫以安全以厚民生則下之宅自厚而上之宅亦安矣按卦爻皆著剝陽之義惟大象獨言治剝之道卦體坤為地厚下以象坤也艮為土安宅以象艮也唐太宗曰君依於國國依於民尅民以奉君猶割肉以充腹是明於厚下安宅之理者人君法此以治剝其亦危者使平之道也歟初六剝牀以足蔑貞凶象曰剝牀以足以滅下也此一爻是言小人有害正之漸而深懼君子之將危也蔑無也謂消無正道也周公繫剝初爻曰隂之剝陽必自下起初在卦始其力雖未能去君子而奪其位然中懷疾害己岌岌乎縶其進而侵其權猶剝牀而先及其足之象夫初之敢於發難者彼其心蕩然無名教之足畏而疾正如仇勢必欲消蔑無餘而後己殊不知以邪侵正以小人消君子雖君子蒙其禍而小人亦鮮有幸全者祗自取其凶而已孔子釋初象曰初之剝取牀足為象者以隂侵陽而陽滅沒於下也禍起自下惡稔在初覩其幾之微而知其勢之必至於危矣按剝之一隂即姤之一隂姤之初受制於九二若羸豕之繫於金柅故吉而無咎剝之初自二三以上無切近之陽莫或制之故其為害始似甚微而後必至於不可勝窮可見朝廷之上一日無端人正士而憸邪遂漫無顧忌得以恣其所欲為宜乎小人之汲汲求去君子也哉六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也此一爻是言小人之勢漸長而害正之機浸成也辨所以分隔上下牀之幹也與黨也周公繫剝二爻曰二居坤體之中又進乎初是小人之權勢得行於中而由下可以害上者象剝牀而及其辨者也又以隂居柔則其心甘為小人而樹君子之敵勢必至於蔑貞而自取葘害故再警之以凶焉孔子釋二象曰剝牀至辨較之於初為惡滋甚幸居卦之下黨與未盛君子尚可預自為圖以免害正之嫌若失此不圖將去辨即膚而禍難逭矣蓋小人欲為不善以害君子未有不藉黨援以相濟者然穽深而機巧在人主之前多為謹身自媚以使其不覺及至布置既定羽翼已成外廷耳目皆其朋黨肘腋近幸悉彼私人忠良蒙禍世道阽危人主縱覺之無可如何矣初二連進勢已不孤而象以未有與為言猶欲及其未盛而為防之之道夫羣邪得志在君子不過逺引以避之而已而人主孤立於上可晏然而不早加省乎六三剝之無咎象曰剝之無咎失上下也此一爻是言小人去其黨邪之失而獨能從正以避咎也上下指四隂周公繫剝三爻曰衆隂方剝陽之時而三獨居剛以應上之剛是其心深知君子之不可絶而去其黨以從之則不惑於朋比之私而無染於隂邪之禍在剝之時其義為無咎矣孔子釋三象曰剝之所由旡咎者以三居四陰之中上下皆陰而獨與一陽相應則所失者陰是其失乃所以為得也於處剝之道又何咎之可及乎按諸爻皆陰惟上九一陽近陽者最善六五是也故可以治剝能應陽者次之六三是也故不為剝聖人於陰之從陽者未嘗不幸之許之所以堅其從正之心而開其補過之路化小人而為君子尚賴此潛移默轉之微權乎六四剝牀以膚凶象曰剝牀以膚切近災也此一爻是言小人之播惡既深而君子之受禍為己酷也膚肌膚也周公繫剝四爻曰四以陰居陰是邪黨密布於朝廷流毒遍加於海內凡忠臣義士之在位者靡不親受慘酷身攖戮辱為剝牀以膚之象剝而及膚小人之為蔑貞計者蓋已至矣然時雖極剝而正氣未嘗不留於天地之間故不許其蔑貞而直示之以凶以明君子雖危彼小人者安能獨全乎哉孔子釋四象曰剝牀以膚則非以足以辨僅至不安其身而已直以危亡已至而切近災禍也縱欲逺而去之已無及矣自古小人傾害君子無所不至而毒螫未極人恆不知其禍之烈四居上體在牀之上為膚剝而至膚則君子之貞幾為所盡蔑矣故聖人特危言悚之曰何不早為之所而使至此極也此非張小人之勢正深咎為君子者制禦無方而釀成其惡在己不得辭其責也六五貫魚以宫人寵無不利象曰以宫人寵終無尤也此一爻是言六五為羣陰之長能率其類以順聽乎陽也魚陰物貫魚如魚之連貫而進也宫人嬪御也周公繫剝五爻曰五居羣陰之上又近上之一陽是其力足以統攝羣陰而又心知害陽之非義故能率其黨類而受命於陽使一切朝政國柄皆歸之君子而受成焉如貫魚順序以宫人承寵於其君之象夫國有君子不特善類膺福而亦足以庇蔭小人五能如是寧有不蒙其利者哉孔子釋五象曰五之以宫人寵者羣陰剝陽已極五能翻然悔悟統率儔類順序聽命君子方嘉與維新必不苛繩前愆始雖有尤終則無尤廓然而涵濡於君子度量中矣按五為君位不言君而取象於后妃者蓋此卦陰盛五為衆陰之長又有一陽在上故别立一義欲其率先衆類俯首以聽君子之命也聖人貴陽賤陰夬之時決陰之權在陽則教陽以制陰之道剝之時剝陽之權在陰則教陰以從陽之道所以贊化育而參天地者固在於此而夫夫婦婦男正外女正內者亦在乎此矣上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也此一爻是言剝盡將復之時君子以一身為民情所歸附也碩果碩大之果也輿所以載也剝廬自剝其廬舍也周公繫剝上爻曰上九以一陽在上不為衆陰所剝而勵節彌堅立品彌髙小人自不得而傷之如碩果不為人所食將見復生之象夫當剝極之時人心思治尚留此一君子以為邦家之慶用能保國庇民民皆載之如得輿者然是知唯君子能覆蓋小人而小人亦藉君子以庇其身若小人必欲剝盡君子而後快則君子亡而家國破小人亦無所容其身象如自剝其廬已耳孔子釋上象曰君子何以得輿蓋以一陽獨留此天意也天意攸存即民心所屬君子雖勢處甚孤而繫結於民心者更切相與承事而共載之誰能剝焉若小人用盡機謀詭詐以剝君子終於自剝其廬夫亦安所用之也按此卦以上九為主曰碩果不食幸一陽之存也其五陰則順乎陽者吉不順乎陽者凶初二四取象於牀見君子在下小人可藉以安身上爻取象於廬見君子在上小人可藉以庇身君子在上在下皆有益於小人如此而小人必欲去之君子去而危亡立至載胥及溺小人亦未嘗獨免則害君子正以自害耳故天下之惡無有甚於小人天下之愚亦無有甚於小人也震下坤上復取一陽復生之義當剝之盡而為坤陽氣已生於下至此一陽之體成而來復乃天運循環理當如此非人力所能為也故卦辭専以氣數言彖傳釋復之亨曰剛反以自剝一陽窮上反下而為復也釋利有攸往曰剛長以自復一剛自下進上而為臨泰以至於乾也然以陰陽反復之道計之其消而息往而反者乃天行之必然動而以順行亦惟法此而已矣豈有岐哉六爻専以人事言雖其間功有淺深德有厚薄較然不同然皆於復之義有合焉獨至上六則私欲錮蔽善端滅息為迷而不復聖人極言災眚以示戒深著迷復之不可也合氣數人事觀之可見動靜者天道之復也善惡者人道之復也在天運有其自然在人事宜盡其所當然必須不遠復與休復方吉敦復方無悔獨復亦可以免凶咎若頻復則雖厲而亦可以無咎至迷復則凶所必然而災眚之來莫可究極矣此皆人事所致君子不可不於善端萌動之初而存理遏欲以全剛反之復也復亨出入無疾朋來無咎反復其道七日來復利有攸往此卦震下坤上是陽氣窮於上而復生於下一陽來復其幾甚微故名為復卦辭言復則必亨乃君子之常道而天運之必然也旡疾無有害之也朋謂羣陽七日謂自姤至復凡歷七爻也文王繫復彖辭曰卦體君子既往而復來卦德震動而坤順既有可為之時而又有可為之才宜其亨也雖君子之處勢甚微而氣機昌遂其一出一入寬然無復有沮害之者以至朋類相孚翩然而來亦會其時之可亨而無摧抑之咎亨在己既信其有獨復之機亨在人又驗其有浸長之勢此豈人力之所能為哉進稽陰陽反復之道自姤一陰始生歷二陰之遁三陰之否四陰之觀五陰之剝純陰之坤以至一陽之復凡更七爻為期七日天運循環無往不復則剛德方長自此進而為二陽之臨三陽之泰四陽之大壯五陽之夬以至純陽之乾理勢有必然者又何道之不可行而功之不可建哉利有攸往復之所為必亨也按臨言八月有凶不言日而言月惡陰之浸長而遲之也復言七日來復不言月而言日喜陽之方來而速之也然有天道之復焉有人道之復焉天道之復乃氣運之自然人道之復皆行事之所致夫使氣運將復而行事無自復之道則其復必不固所以古之聖王當天命既屬而修德益謹行善益力自此羣剛相繼同德協心往無不利大勳畢集庶幾來復之權在我而不在造化矣彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎此彖傳是釋復彖辭詳言復道之亨而因以發明天地生物之心也剛反一陽復生也天行天之運也剛長既生而漸長也孔子釋復彖辭曰復何以亨卦體剛復生於下如往而復反是賢人君子久遭凋落之後而復遘登庸之日將見一賢初進而羣才來附也何亨如之然君子於此上凛乎天命之靡常而下慮夫人情之難合故不敢以久鬱乍伸逞其鋭進之氣惟不輕於動也而順以行之則出入皆自復之道而朋類之來亦附我之順動以牽復矣是以己得無疾而人亦得無咎卦辭謂反復其道七日來復者天行以七日為期復之速也君子以順動之道密審於天行之數而知天行無消而不息之理君子之順動亦有轉亂而為治之才則善於順動乃所以善承天行也利有攸往者一陽既生於下其勢自不容禦必至駸駸盛長吾道大行而無往不利矣夫觀復於世道固足以見陽德之亨而觀復於造化其不有以見天地之心乎蓋天地無心生生不息乃其心也純坤之時生意滅息天地生物之心幾於蔽塞矣逮夫一陽既動則無中含有而乾元資始者於此露其機貞下起元而坤元資生者於此呈其朕生物之心雖非至此而始有實乃至此而始見雖在積陰之下而昭然發露者孰得而掩之哉按陰陽之理以天行為開復之數而復之君子以順行為保復之機故必出入無疾而後朋來無咎朋來無咎而後利有攸往茍徒冀天行有常而不以順行將終於滅息而已則所為盡修能以符氣化非君子之責而誰乎象曰雷在地中復先王以至日閉關商旅不行后不省方此象傳是言先王體復之義而制為安靜之法以養微陽也至日冬至之日也省方省視四方也孔子釋復象曰雷在地中靜極而動復之象也一陽初生於下其氣甚微當靜以俟之不可擾也先王順承天道冬至之日舉凡政事云為之間可以休養微陽者靡不垂為令典以著裁成之用故關所以掌道路也而閉之商旅出諸塗也而不行使之外不得入而無有害之者矣古者歲十一月朔巡守而后於是日則不省方使之內不得出而無有泄之者矣蓋天地生物之心主于動而先王參贊之功主于靜合以成之而所以保護微陽者固已至也按微陽之氣天地之根而萬物之母也氣方息而遂泄之故夏有愆陽冬有伏陰精未聚而先發之故人多夭扎物多疵癘此復之所以貴安靜也夫寂者感之君翕者闢之本冬藏為一歲之復夜息為一日之復喜怒哀樂未發為須臾之復誠能奉若天道深潛完密主靜以立其極用之于國則寧謐而不勞用之于躬則沖和而不竭壽身壽世之道孰有外焉者乎初九不遠復無祗悔元吉象曰不遠之復以修身也此一爻是言復之貴早以克全繼善之體也祗抵也周公繫復初爻曰初為卦之一陽復之主也又居動體而在事初未涉物感則動而即覺覺而即復復之最先者也是不遠而復也夫人惟過失顯形然後思復未免困心衡慮而有悔初當意念方萌即自省悟而改圖亦何至於悔乎復至此則心體粹然不為人欲所纍而適還其天理之本初大善而吉之道也孔子釋初象曰凡人之妄皆從心起心過不改則形於外而為身過矣善用力者即一念之悟而速反之省察克治圖之於早內既直而外自正此不遠之復所以為修身之要也按春秋公孫敖如京師不至而復公如晉至河乃復皆以不極其往為復復善貴早故易以不極其往者言之善失之遠而復必至有悔惟失之未遠而復所以不祗于悔然非初之剛隨時審察而勇於自治者不能所謂有不善未嘗不知知之未嘗復行方為不遠之復而元吉者乎六二休復吉象曰休復之吉以下仁也此一爻是言二能下比於初以成復道之美也休美也仁謂初九周公繫復二爻曰二居震體之中其心易動動即離於善矣幸二柔順則能從人中正則能擇善上無係應而下近初九之賢自能以友輔仁資其切磋之力優遊不迫日進於善而不知復之休美者也烏得不吉哉孔子釋二象曰復之休美而吉者二去初未逺上無私應而又深信初為克復之仁人故能降心抑志從初而復則其吉也宜矣按天地生物之心曰元人得天地生物之心以為心曰仁為仁固由己而不由人然亦有己未能復禮而資人以輔仁者初不遠之復自修之意多二休美之復資人之益多及其成功一也夫布衣窮處之士猶須親師取友輔成其德若君天下者而得仁人之助將盡一世之大皆可使反剝而為復焉又豈獨一身之克復己哉六三頻復厲無咎象曰頻復之厲義無咎也此一爻是戒三頻失之危而又豫以復善之義也頻屢也周公繫復三爻曰三以陰柔不中正又處動極是其天資蒙昧秉性躁妄其於天理人欲之界見之不真守之不固為頻復之厲然三之厲也在於頻而三之幸也亦在於頻頻而失亦頻而復與迷於復者又相逺矣倘自省其失而終復之又何咎焉孔子釋三象曰過而不改咎乃歸焉六三頻復則屢失屢改固非遂非而文過亦非畏難而茍安雖其心不能免乎危厲而於義也又何咎哉先儒謂頻失為危頻復非危聖人危其頻失故曰厲以警之開其頻復故曰無咎以勸之夫頻失頻復固為善補過倘失多而偶不復咎將何如乎孔子稱顔子不遠復又云得一善則拳拳服膺而弗失之惟其弗失方謂之能復則勸之者正所以警之而已矣六四中行獨復象曰中行獨復以從道也此一爻是言四不為羣陰所溺而獨能從初以復乎善也中行四陰之中也道謂初九周公繫復四爻曰四居羣隂之中而下應初之陽剛其志趣髙潔拔乎流俗與衆同行而不與衆俱靡是中行而獨復者也當此之時陽氣甚微而四以隂居柔其才力不足以有為然其心獨能依附於仁人君子以復於善真所謂特立獨行之士也又奚必較計功利為哉孔子釋四象曰中行獨復者四以初抱道在下而去其類以從之是見道之在初而不見其類也故其下而從也非從初也乃所以從道也宜見之眀而決之勇耳按四之抗志違衆獨得其夲心如陳良楚産而學周孔夷之墨者而見孟子以至舍生取義棄邪從正一念獨惺萬夫莫撓理所宜然吉凶弗計非豪傑之士其能克自振拔如此耶六五敦復無悔象曰敦復無悔中以自考也此一爻是言六五復善之已純自無私欲之纍也敦厚也考成也周公繫復五爻曰六五以中順之德而居尊位是其資淳質美孜孜焉以復善為心而無一毫浮薄之念得入其中故其操之也密毋始勤而終怠守之也固毋久毖而暫荒能敦厚於復也初雖修身於下僅可無至於悔而已若五則私意淨盡天理流行而來復者皆天地之心又何悔之有乎孔子釋五象曰五之敦復無悔者蓋人受中以生原無虧缺五之功深理熟以我之所固有者我自成之渾然一中之初體天地全而賦之我自全而凝之矣此復之所以獨美歟大抵既名為復未有不由工夫而得者敦復無悔所謂反之之聖也六五居至尊之位縱使天資髙妙見道甚蚤勵精圖治立志甚堅而聲色逸樂交攻於內便辟讒佞環伺於外非心易縱而難制也善事易格而難行也有道仁人之輔導於下者易隔而難親也茍非朝考夕糾省察存飬則見於己有銖兩之偏施於事有尋丈之失豈得云無悔哉成湯制心制事而後可建中於民武王敬勝義勝而後能作稽中德有合於此爻之義矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也此一爻是言上六迷復已極天人交困而無一事可為也災天災眚已過十年數之終也周公繫復上爻曰上以陰柔居復之終既無復善之德又逺仁賢之助蔽錮已深善端滅絶迷而不復其凶可知夫災自外來眚由己作天之所厭已則招之迷復如此無施而可以是行師必終有大敗不惟禍萃其身而且及其國君雖至十年之久終于不克征以雪其恥也豈不可畏哉孔子釋上象曰迷復之凶者謂復則合道既迷于復則與道相反也雖君行之猶為反君之道况其下者乎甚矣迷復之凶也按卦之六爻初之不逺復賢而希聖者也五之敦復聖而希天者也二之下仁其親賢取友以成其德者乎四之獨復其棄邪從正而不牽于流俗者乎三之頻復其猶日月之一至焉者乎皆合于復之義者也惟上之迷復怙終不悛害于身凶于國有不可勝言者故聖人于三猶曰無咎而上則曰災眚曰大敗其重改過而惡怙終者何切也日講易經解義卷六
