body:
  text: 欽定四庫全書日講易經解義卷七震下乾上无妄之謂誠以天道言實理之自然也以聖人言實心之自然也震者動也動以天為无妄動以人則妄矣彖傳釋卦辭曰剛自外來而為主於内剛徳在内心不妄也為震主動不妄也動而健則勇於義而不屈於物欲九五以剛居中在己正也下應六二柔順中正所應正也正則天命之當然也匪正則違乎天命之正而不可以有行矣對時育物先王亦順天時而已何有妄焉初之吉二之利其无妄也一時也三之災四之貞五之疾上之𤯝亦非有妄以致之也亦一時也時當動而動不當動而不動所謂動以天也所謂正也彖辭於利貞之下即繫以匪正有𤯝不利有攸往明无妄之不可不出於正也爻辭於无妄之極亦繫以无妄行有𤯝无攸利明執一不變者即匪正而妄也然則彖言全體爻言一節其無不以正垂訓也意深切矣有无妄之實心者可不審時以趨於正也歟无妄元亨利貞其匪正有𤯝不利有攸往此卦震下乾上本天而動動而不妄故為无妄卦辭言心出於正則隨感而皆通稍渉於妄則往行而有礙也无妄實理自然之謂匪正謂不合正道也文王繫无妄彖辭曰盈天地間惟此真實之理而已卦變剛來而為震主其心純乎天理動而皆實卦徳震動乾健卦體剛中而應則徳既純一而誠能動物此无妄之所以元亨也然其所以亨者利於至正耳若知有未至理有未窮而以偏倚之見行之則自信為正者政匪正之所伏也雖无妄心而不合於自然之理即匪正矣匪正則災𤯝隨之以之處事應物徒有紛擾之患而安能利有所往哉按无妄即所謂誠誠則自無不正而又勉以利貞何也葢人無格物致知學問思辨之功則有志在祛妄而反墮於妄本欲從正而反悖於正者以此自治必有言偽而辨行僻而堅之失而受病在一身以此治人必有不諳物情不識時宜之弊而受病在天下從來妄之溺於利欲者易見妄之溺於意見之偏學術之誤者難知惟其難知是以果於自用輕試之世道民物而貽害無窮也宜聖人極論而深戒之歟彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有𤯝不利有攸往无妄之往何之矣天命不祐行矣哉此彖傳是釋无妄彖辭以明无妄則應天之命匪正則失天之祐也内外以六畫之卦言下三畫為内上三畫為外以三畫之卦言下畫為内上畫為外凡畫卦者自下而上有由内及外之義也剛中指九五何之言無所往也祐助也孔子釋无妄彖辭曰卦之名為无妄者以卦變剛自訟之二來而居初則天徳之剛不馳於外而還為一心之主此中渾然一无妄也卦徳震動乾健既有震動之才而不屈於物欲之擾所主之剛不因動而移也卦體五之剛中下應於二既有實意之孚而不渉形迹之偽所主之剛不因應而私也无妄如是理宜大亨而必利於以正者葢以天之賦命於人本無不正之理而人之受命於天必盡去邪妄之私斯人之妄去而天之命見矣所謂其匪正有𤯝不利有攸往者以正則可行而匪正則不可行乃猶自以為无妄而欲往焉動而輒阻又何之矣失其所主之剛而悖乎天命之正其何以獲祐而行之哉葢天人無二理總不出於一誠所以惟命不于常惟徳為有常若無无妄之實而逞其私智妄意天命可冀其不流於後世圖䜟之説幾希矣聖人之書不且為奸雄嚆矢哉象曰天下雷行物與无妄先王以茂對時育萬物此象傳是言先王體无妄之象以盡參贊之道也茂盛也對時順合天時也萬物之物兼人言孔子釋无妄象曰卦體乾上震下為天下雷行之象雷行於天下隂陽交和相薄而成聲正發生萬物之時天所賦與洪纎高下各正其性命無有滲漏是隨物而皆與以无妄之理先王法天理物以為天之无妄不可見其可見者時也受天之无妄以成形者物也本至誠充積之衷以對天時而順序布和以育萬物而省刑弛禁則時與物皆歸无妄之中而先王亦惟順承夫天命而已矣按尚書有羲和之命周禮重教養之條皆本无妄之念以對時育物使各得其性而已若稍渉妄念如漢武之封禪梁帝之戒殺又奚足法焉為人君者其務以聖帝賢王為則哉初九无妄往吉象曰无妄之往得志也此一爻是言无妄之初動與天合者也无妄以心言往吉以事言周公繫无妄初爻曰初九剛自外來而為主於内是其中心誠實遏人欲之萌存天命之正而又在卦初上合九四兩剛相遇不牽於係應之私无妄者也但居動體之下理無不往然初非有心於往也至誠所感而物我交通此以誠求彼以誠應何吉如之孔子釋初象曰所謂无妄之往者葢天下惟誠能動物初志存於无妄以之處事則順而祥以之臨人則感而化又何往而不得其志哉大抵身世之扞格皆由私見之未除无妄則一實理相感召所謂至誠而不動者未之有也聖賢之待物帝王之御世總不出一誠而已矣六二不耕穫不菑畬則利有攸往象曰不耕穫未富也此一爻是言六二任天而動不襍以人欲之私也耕春耕穫秋收菑開田畬成田一歲之農始於耕終於穫三歲之田始於菑終於畬未富無求利之心也周公繫无妄二爻曰凡理之自然而然者非妄也心之有為而為者乃妄也二柔順中正又上應五之中正居動體而能順乎中正實能无妄者也其於天命之正所宜盡者純其心於无間而絶無求得於外之心辟之耕穫菑畬皆求得於外者也去其耕穫菑畬之心而後可還其无妄之本體故有不耕穫不菑畬之象然有无妄之心亦有无妄之福二能如此福澤自至則有所往而自無不利矣孔子釋二象曰所謂不耕穫者二之立志淡漠泊乎無營絶不念及於利而為之則无妄之心一如未富之心也漢儒董仲舒曰正其誼不謀其利明其道不計其功人但盡所當為而已利害得失豈足營心乎然不正誼則已正誼則利必歸焉不明道則已明道則功必集焉又屬一定之理以此在下則孔子所云寡尤寡悔祿在其中以此在上則大舜之有天下不與而祿位名夀之必得此六二利有攸往之㫖也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也此一爻是言六三處不得正而致无妄之災也邑人謂居者周公繫无妄三爻曰三以隂居陽不中不正處下之上則居非其地應上之剛則遇非其人是无妄而有災者也然天下事有失則有得乃三處得失之外而獨攖其災此葢出於尋常意計之外者象猶或繫之牛行人牽之以去而居者反遭詰捕之擾也君子於此亦惟聽之適然之遭以順受乎天命之正已爾孔子釋三象曰得之所在災亦及之此人所及防也行人得而邑人災此葢有不及防者君子於此惟有順以聽之而安能預為避患之計乎按六二得位而有无妄之福六三失位而有无妄之災皆時為之也如李泌周旋肅代之朝深為小人所忌而得以功名終此无妄之福也陸贄竭知盡忠濟其君於險難卒以被讒而斥逐此无妄之災也君子亦惟盡其在我而禍福不以動其心庶全乎天之正命矣九四可貞无咎象曰可貞无咎固有之也此一爻是言九四以正道自守而无妄動之失也有猶守也周公繫无妄四爻曰四得乾體之剛下無係應是天徳為主於中而物交不引於外无妄不待言矣然剛則思動動即離於咎幸以九居四絶無過恃其剛之心故可堅守其剛而事變云為皆不為之動則天徳在我而命亦祐之又何咎之有孔子釋四象曰四之可貞无咎者葢以无妄之理去與來其幾甚㣲也稍懈即妄矣故必固守而勿失之然後可免於咎耳按諸卦有以九居四為不正者為其以剛居柔而損剛正之徳有以九居四為可貞者為其以剛居柔則不過乎剛而有可貞之道大抵剛不足則以居隂為戒剛有餘則以居柔為羙无妄震動在下乾剛在上此剛有餘者必固守之而後无咎其亦剛柔相濟之義乎九五无妄之疾勿藥有喜象曰无妄之藥不可試也此一爻是言制變在乎能靜不可輕動以滋咎也試謂少甞之也周公繫无妄五爻曰五以中正居尊位二復以中正應之是君臣道合政治脩明无妄之至者也然世變無常人心叵測或逺人不服而外侮堪虞或奸頑弗率而内化未謐是為无妄之疾設鍼砭過當攻擊太深則毒深而愈不可治故必鎮靜以俟之彼將自然消弭而底於寧晏為勿藥有喜之象所謂不治正所以治之也孔子釋五象曰人之有妄乃宜治之既无妄矣復藥以治之必至傷損國脈朘削元氣而妄反生矣藥其可輕試乎葢邪不能勝正而徳可以動天元氣固則疾自平内治脩則敵必服虞苖之格格於舞羽非格於誓師也周頑之化化於保釐非化於忿疾也彼躁妄而動動即招尤漢武馬邑之師太宗征遼之役豈不可以為鑒哉上九无妄行有𤯝无攸利象曰无妄之行窮之災也此一爻是言上剛已過極妄行而取災者也窮極也周公繫无妄上爻曰上九以陽居卦之終无妄而處時之極者也極而不知變將自恃其无妄不可行而行必至有過情越理之失而乖乎天命之正矣𤯝必及之而又何利焉孔子釋上象曰所謂无妄之行者特以勢處於窮決不可有所行耳行則與災會矣三猶可委其災於人上直自掇其災於己耳此卦六爻皆无妄初得位而為震動之主時之方來故无妄往吉上失位而居乾體之極時之已去故其行雖无妄而有𤯝无利是故善學易者貴識時初與二之可動而動時也三四五上之不當動而靜亦時也理無不可行而時或有所尼君子不得不順時以聽焉此洪範之稽疑所以亦云用靜吉用作凶也乾下艮上大畜之義有二一止畜畜乾也一藴畜畜徳也彖傳兼此二義象傳專以畜徳言六爻專以畜止之義言六爻中下三爻乾體皆受畜者也上三爻艮體皆畜下者也然受畜者貴止而不進故初二皆止三利艱貞但初與二已為四五二隂所畜至三為畜極而通之時又與上皆陽爻不相畜而俱進則良馬之逐自與初二不同矣畜下者貴防於未然故四能止初惡於未形而得元吉五則於陽之已進而止之雖言吉而不如四之元吉也至上則畜極而通之時强暴盡除反側盡平而治化洋溢乎四海則天衢之亨又與四五不同矣合而觀之凡畜徳者非有剛健篤實輝光之盛不能成日新之徳畜惡者非有徳禮潛移黙化之機不能臻蕩平之治天徳王道聖人於大畜一卦已盡發明則觀大畜之象玩大畜之辭天下之道可以旁通而無遺矣大畜利貞不家食吉利渉大川此卦乾下艮上以艮畜乾所畜者大故名大畜卦辭言畜道必出於正然後可以享君之祿而成天下之功也不家食謂食祿於朝渉大川言能匡濟時艱而成功也文王繫大畜彖辭曰道之所貴者正君子為畜之道而可茍哉必精以擇之一以守之使吾之所畜莫非天徳王道之精而不雜於異端覇術之陋則不徒畜之大而且畜之正矣然徒畜而不知所以適用是自私也而可乎故必舍其家食之賤以膺天祿之尊則所畜得以顯其施而利貞之守以達矣何吉如之然徒出而不能有以自見是茍祿也而可乎故必當天下之大難以成天下之大功則所畜得以懋其猷而利貞之效以彰矣何利如之夫大畜利貞體之所以立也不家食渉大川用之所以行也必有其體而後有其用信乎畜之貴大而正也此卦有止畜藴畜二義六爻中下三爻以君子為小人所畜言上三爻以君子畜小人言此畜止之義也大象傳以多識前言往行言此藴畜之義也彖言人必有大藴畜方有大設施故推其所畜之正者以之食祿於朝則吾道藉以大行以之匡濟時艱則世道賴以安奠似亦專主藴畜而言然彖傳又以艮畜乾為能止健則未甞不兼畜止之義當是具此二説故聖人謂智者觀其彖辭思過半矣以見彖之無所不統也彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也此彖傳是釋大畜彖辭以明所畜之正而大也孔子釋大畜彖辭曰卦何以名大畜哉葢徳具於心而見於事者也卦徳内乾是主於内者天理精純而不雜徳性常用而不撓何如其剛健也外艮是見於外者躬行􅈤切踐履真摯而自然光華發越何如其篤實輝光也夫内有無私之本體而外有實踐之光輝所養者日益精明所行者日益堅固徳之藴畜時乃日新而徳為天下之至徳矣此大畜之所由名也辭何取於利貞哉卦變自需來九自五而上是賢者正居臣位也卦體六五尊而尚之是人君能尊賢禮士也卦徳以艮畜乾是又能禁戢强暴使不為惡也剛上而不以正則為枉道徇人尚賢而不以正則為恭敬無實止健而不以正則為化導無方而人不服三者皆非大正不能然則畜徳者可不以正乎此利貞之所由取也辭言不家食吉者葢大畜利貞既為可尚之賢而六五又有尚賢之象是人君共以天祿養以大烹而賢者得食於朝廷之上矣其不家食吉宜也辭言利渉大川者葢大畜利貞既具應用之本而六五下應於乾又有應天之義是不先時有為而拂乎天亦不後時不為而逆乎天操縱閤闢不失時行之道矣其利渉大川宜也易之一書以貞為主乾之大大於利貞坤之大大於永貞畜之大亦大以貞故不徒曰正而曰大正不正則藴畜之徳不大在吾已非賢矣欲其君尚而養之不可得也不正則畜止之得亦不大雖有止健之才欲其應天而濟變不可得也或謂聖人之道神妙莫測在於權而不在於正不知行權正以求得夫正耳豈正之外復有權乎象曰天在山中大畜君子以多識前言往行以畜其徳此象傳是言君子體大畜之象而盡其畜徳之功也多識謂博求而識於心也孔子釋大畜象曰乾天也艮山也天體至大而在山中是大畜之象也君子觀象而知畜徳之方焉葢古人由畜徳之盛而時發於言行之間則前言之畢存非繁文也是徳之精華也往行之具載非陳迹也是徳之實體也君子於是多識前言往行以畜其徳焉得古人之言行即得古人之心得古人之心之理即得吾心之理其所畜不亦大哉按多識言行或以為近於口耳之學未免玩物喪志不知本末精粗道原一貫言行在外而其理根於心心徳在内而其實寓於言行故為學者必居敬涵養以為主而又博聞廣見以為資師心而不師古好悟而不好學豈善畜徳者乎書曰人求多聞時惟建事學於古訓乃有獲帝王聖賢無二學也初九有厲利己象曰有厲利己不犯災也此一爻是言君子進則有危當以義命自安也厲危也已止而不進也周公繫大畜初爻曰初九為六四所畜而又以陽剛居乾體之下剛鋭喜進久為小人所側目宜有厲者也倘復冒昧以往必蹈危機厲其能免乎惟健而能止則沈幾觀變安乎義命之常以為時未可為不妨藏器以有待也全身逺害何利如之孔子釋初象曰災自外至者也人自犯之耳茍身履危困而諉為命之不猶晚矣若初之知有厲而能已是其委蛇順時不至犯小人摧抑之災也按君子出處不可不審非獨為小人所畜當止而不進即為小人所引而輕身就之終必有害葢一有急於用世之念往往忘慮患持難之心也先儒謂乾陽上進不有以止之則其神不定其守不粹故皆以止為義大畜之初九其即乾之潛龍乎九二輿説輹象曰輿説輹中无尤也此一爻是言君子守正不往而能自全其道也輹伏於軸以承輻者輿説輹謂自去其輹而不進也尤過也周公繫大畜二爻曰九二陽剛其才足以有行者特為六五所畜而未可以進二則能以中道自裁審時揆勢止而不行脱然於馳逐之塲而無妄動之虞為輿説輹之象則時不當行而即不行所謂可以止則止者也孔子釋二象曰輿説輹而不行者二有中道故能察乎時之盛衰勢之强弱則進退不失其正而躁動之尤何自而至乎按輿者行之具二已在輿是勢在必行而自説其輹則遂止而不行矣凡尤者咎自外來當不可之時而强為天下任事則僨轅之患將欲誰諉二能説輹以自審非萬全勿動也又何尤焉其殆審幾達務之君子乎九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也此一爻是言君子遇可進之時尤宜審慎以善其進也逐偕行也曰當作日閑調習也衛防衛也上謂上九周公繫大畜三爻曰三居健體之極又遇上九以陽處畜之極志同徳孚乃不相畜而與上共進以馳驅乎王事有良馬逐之象然三不慮其不進但慮其恃剛過鋭而無周慎貞固之力則必有欲速輕動之咎故利於艱難其事而貞固其守如輿所載以行也而衛所以防行之具必日日閑習之使手與器相習而心與身交慎則出也不茍而進也有為攸往之利於三見之矣孔子釋三象曰初則利己二則説輹而三獨利有攸往者以乾陽本欲上進但恐在上無合志之人不能展其素具今三與上皆陽剛上之志合乎三之志而同類感通相為汲引又何嫌何疑而有不幡然竝進者乎按三負良馬之材可以馳驟天衢因其過剛不中故有艱貞之戒而教之日閑輿衛可見君子出任天下之重必臨事而懼如弗克濟然後可遺大投艱而無患不然恃才以騁而顛蹶失防一己之身名不足道矣而悞人家國之託其罪豈可贖哉六四童牛之牿元吉象曰六四元吉有喜也此一爻是言遏惡者當於未萌不使其發而難制也童者未角之稱牿施横木於牛角以防其觸也周公繫大畜四爻曰六四艮體而與初相應畜初者也初居最下陽之㣲者㣲則其惡未形而制之甚易潛消黙化猶牛未角而牿以防其觸之象夫人之惡當既著而後禁則扞格而難勝及其初而豫防則人自不為惡而并冺其禁之之迹矣所謂以禮立教不煩刑誅大善而吉之道也孔子釋四象曰惡己章而治之雖亦足以禁奸戢暴而不免於刑戮之慘其於心當有所大拂也四之止惡未形而元吉葢豫教而民自服無為而物自化四之心葢有所深喜乎此也記有之禁於未發之謂豫人未有爭心而設禮樂以教其讓人未有欲心而懸法制以禁其邪開其向善之端而杜其為惡之路此所謂豫也夫四與五皆以止下之惡論成功之廣狹四不如五之廣故五曰有慶而四曰有喜論用力之難易五不如四之易故五曰吉而四曰元吉五不如四之易者其時不同而四不如五之廣者其位不同乎六五豶豕之牙吉象曰六五之吉有慶也此一爻是言六五止惡有術而慶被於天下也豕謂牡豕攻其特而去之曰豶所以去其勢也周公繫大畜五爻曰五居君位而畜二二之剛已進而欲止之是其惡已形而勞於制矣幸五以柔居尊操之有其要而御之得其術使之知亷恥黜竒邪而自囘心革面如患豕牙之剛不制其牙而豶去其勢有牙雖存而剛自止之象如是則用力不勞而刑清民服何吉如之孔子釋五象曰為民上者不知止惡之方而惟淫刑以逞惡未能制而天下已受其害矣六五之吉葢知其本而制之有道不必徒事禁防而風移俗易福慶被於生民矣按漢之趙張設鉤鉅捕盗賊豈不能使奸人屏迹君子以為不如潁川之教化渤海之勸諭秦之商君刑棄灰制連坐豈不足戢為惡之志君子以為不若虞之化讒説周之感頑民趙張之於牛不牿之以童而惟治其觸商君之於豕不去其勢而欲制其牙故也上九何天之衢亨象曰何天之衢道大行也此一爻是言世運當亨通之會而王道自大行也天衢天路也周公繫大畜上爻曰上以陽剛處畜極而通之時是陽氣久鬱而伸隂氣久凝而散奸回盡殄反側盡平皇路廓清絶無阻礙有何天之衢之象當此之時不必制惡而自無惡可制治化翔洽而頌聲丕應亨莫加於此矣孔子釋上象曰所謂何天之衢者以時與道合也天運無處不昌王化無處不浹葢政教四達而治於此觀成矣其道之大行也何如哉大畜上三爻所以畜下三爻者也四之牛牿其角五之豕豶其牙雖所畜有難有易而皆不能不用其力至上畜極而通則無藉刑驅勢禁而為惡者自相感而化是剛明之臣遇尚賢之主可共濟天下之險而坐收渉川之功矣故曰何天之衢訝之也實喜之也夫不言其難不見畜之之力不言其易不見畜之之成所謂蕩蕩平平無反無側至治之盛其在是乎震下艮上頤取養之義彖辭言養徳養身皆出於正則吉彖傳既釋養正之義復極言養道之大而象傳又舉養徳養身之切務以示人也六爻上止下動故下三爻為自養上三爻為養人震性動動皆累於欲不能自求所養而求人以養己失養之道矣故下三爻皆凶艮性靜靜則得其正求於人以養其下雖不免於顛拂而於養道無失故上三爻皆吉此彖辭之所以言利貞也天地以時養萬物聖人得時則養賢以及萬民利天下而非以自私也故言頤之時大矣哉君子之自養也知棄我良貴悖理求祿之匪正則知砥節礪行之為正矣知下媚上援干求非類之匪正則知不凟不謟之為正矣知簠簋不飾縱欲敗度之匪正則知靜儉節制之為正矣此自養之道當如是也若夫以上下下誠信任賢人臣之吉也養賢及民民被其福人君之貞也任大責重饑溺由已有相之道也此又養人之得其正者也故動不自動而止其所止則頤之道盡矣頤貞吉觀頤自求口實此卦震下艮上上下兩陽中含四隂外實内虚上止下動有頤之象故名為頤卦辭言頤有養義養出於正則身心皆獲所安而得吉也頤口旁也文王繫頤彖辭曰頤之為言養也為卦震動在内艮止在外恐内之或動於情偽之感而心之養不得其正外之或止於嗜欲之安而身之養不得其正惟得正則身心皆得其養而吉然出於正即入於不正危㣲之幾介於毫髪故善養者必靜觀而内求之其養徳也果合於聖賢之道而無異端以淆之則心正而頤正矣其養身也果當於義理之節而無饑渴以害之則身正而口實亦正矣葢正則得吉不正則不得吉頤之所為必出於正也按程傳謂觀頤為觀所養之人自求口實為自求養身之道葢下體三爻皆主自養上體三爻皆主養人上體則觀其養人者得正則吉下體則觀其自養者得正則吉也與本義專主養徳養身不同其實自養為養人之本未有自養不正而能養人者真徳秀云已得其養則吾身先成然後可推而達之天下是也本義專言其體程傳兼明其用解雖各異義實相通總以見易道之無不該而已彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉此彖傳是釋頤彖辭而極言養道之大也所養養徳自養養身孔子釋頤彖辭曰頤以貞而吉者葢養必以正在心常獲天理之安在身無復物欲之擾則吉也稍不正則不得吉矣辭謂觀頤者在觀其所養之道其於性命之正純然無雜而浩然之氣不為之撓則徳得正而吉也辭謂自求口實者在即其所養之道以觀其自養之術其於義理之正凝然不擾而口體之奉不為之動則身得正而吉也養正之道如此推之而天地聖人寧外於是哉夫天地本以養萬物者也茍失其正必至氣候失宜疵厲横行而物有不遂其生者矣聖人本以養民者也茍失其正必至賢奸混雜舉錯失當而民有不安其命者矣故天地養萬物聖人體天地養物之心養賢以及萬民而皆出之以正則頤之時詎不大矣哉從來養萬物者天地而代天地養萬物者必屬之聖人然聖人欲養民非先養賢勢不能徧故不直曰養萬民而必曰養賢以及萬民也唐虞之廷禹平水土稷降播種契敷教臯陶明刑九官十二牧亦止完一養民之事而已仁者無不愛也急親賢之為務豈不信哉象曰山下有雷頤君子以慎言語節飲食此象傳是實言君子養徳養身之切務以明養道之正也孔子釋頤象曰此卦震在艮下是山下有雷震動發生物由此養頤之象也君子觀象以求養正之道而知徳之不正由言語以為之階慎之而言必當理語必合義是言語皆養徳之具而無妄出以招禍矣身之不正由飲食以亂其性節之而飲必徳將食必正味是飲食皆養身之物而無妄入以致疾矣養正之道不於頤備之哉推之有天下者命令政教皆由言語之頒資用貨財無非飲食之事其養徳養身者愈大則慎之節之者愈難所以古之君子誦白圭之什識金人之銘㫖酒必惡飲食必菲兢兢乎謹小慎㣲無一端不合夫養之正而後可為天下後世之觀法也夫初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也此一爻是言失靜養之正而動於利欲之私也爾謂初也靈龜不食之物我謂四也朶垂也朶頤欲食之貌周公繫頤初爻曰初以陽居下本有剛明之徳養息深靜而無外慕者但居動體上應六四不能以剛自守而反上從四之柔則私欲熏其心爵祿嬰其慮而本體之靈棄之若罔恤焉猶舍爾以氣自養之靈龜觀我而朶其頤之象也如是則失其靜養之道而溺於動養之欲沈迷不反何所不至其凶可知己孔子釋初象曰所謂觀我朶頤者以初之剛本為可貴而累於動體從欲而動則將淪於汚賤而可羞矣亦何足貴哉葢士君子立身於理欲之介不可不慎故有以一朝之失足而遂遺千載之恨者矣此無他物重而我輕也孟子曰人人有貴於己者弗思耳誠知在己者有甚貴而世間之利欲豈足動其心乎六二顛頤拂經于丘頤征凶象曰六二征凶行失類也此一爻是言失求養之義故上下皆無應也顛頤求養於初也拂經違其常道也丘土之高者上之象也丘頤求養於上也周公繫頤二爻曰陽剛養人者也隂柔養於人者也二以隂柔不能自養必求養於陽剛若下求於初是在己乏資身之術而俛首豢養於卑賤之流則顛頤於下而拂以上養下之常道矣若求養於上又非正應是才不足以自養見上之權力足以養人而奔走趨附以從之則彼有丘陵之勢而我徒遭摧壓之凶矣是一則於理有所不可一則於勢有所不行故均不能有濟也然則人可不自重哉孔子釋二象曰六二不得於初而往從夫上亦復得凶者以二處非其地上下皆非應與但宜止而弗行也行則皆失其類得凶宜矣按程傳謂女不能自處必從男隂不能獨立必從陽二隂柔不能自養待養於人固天地間之定理然去就之正不正則己得而自主者也夫上而事君下而交友倘以利祿縈心而希圖仕進餔啜為志而攀附交游則中君羞以為臣中士羞與為友矣六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也此一爻是言小人放情恣欲而大違乎頤道之正也周公繫頤三爻曰三隂柔不中正又居動體之極人皆求頤於上三獨拂之而隨下體之動是性既昏迷動復躁妄其所為頤者不過沈湎於嗜欲放恣於口體而拂乎養之常道矣雖飲食亦日用之正猶不免於凶必至没身沈溺而聲名俱喪十年之久終不可用無所往而利也孔子釋三象曰所謂十年勿用者以頤道貴靜動則悖三處動極則大悖矣任情滅理終身不悔莫恤也夫葢貧賤不濫富貴不淫乃得頤養之道二處貧賤而不知守約而濫者也三處富貴而不知節樂而淫者也夫吾心不能以義命自主而隨境轉移豈得云養正之大人乎六四顛頤吉虎視耽耽其欲逐逐无咎象曰顛頤之吉上施光也此一爻是言六四能求賢以養民而復示以用賢之道也顛頤求養於初也耽耽虎下視貌虎視耽耽下而專也其欲逐逐求而繼也周公繫頤四爻曰四以柔居正而下應初之剛正是居上而能信任乎下者也然隂柔不足以及物必藉初之賢以成功則養人者初也而任賢以養人者惟四故為顛頤而吉也是四之於初固己能下之能求之矣苐患下之不專則賢者生疑而養之道未𢎞求之不繼則施為未竟而養之功易竭必能誠信不二而專始終無間而繼如虎之視耽耽而欲逐逐焉則於求賢養民之責無忝矣而又何咎之有乎孔子釋四象曰四之顛頤而得吉何也葢上之於下不必恩自己出然後謂之能養也今能任初之賢以養民焉則初之施即四之施而恩膏所及昭然其光顯矣此其所以為吉也歟按四居大臣之位有養民之責然一身不能獨理必分其任於庶司百職而後可共成治功此其虛心下賢深合乎以人事君之道也或謂上施之上指五而言葢人臣承流布化無非奉行朝廷之徳意譬諸日月之照臨雷霆之鼓動雨露之滋潤寒暑之成實無非為天地養萬物而已謂初之施即四之施可也謂四之施即五之施又何不可哉六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也此一爻是言任賢足以圖治而又當凛不自用之戒也拂經謂以君而從臣也上謂上九周公繫頤五爻曰五以柔居尊位才不足以養人上有陽剛之徳五賴其賢以養之夫君以養人頤之經也反賴上之養以養之是拂於經矣既以己之不足而求養於上必居守貞固篤於信任斯惠澤常流而得吉也若不能審已度力或以拂頤為嫌而冒昧以圖功自用以求濟是猶渉大川而無操楫之任何由而克渉哉孔子釋五象曰居貞之吉者謂五不恃其尊能柔順以從上九之賢而毫無勉强此誠得養賢以及萬民之道故居貞而吉也按君道貴剛柔所不尚然柔而能任剛明之賢則不獨資以自養而天下亦賴之如太甲成王雖不及湯之錫勇武之執競而能信任尹虺周召之賢則未始不可成治功也至若漢元優柔不斷知蕭望之周堪之忠而不能用知𢎞恭石顯之惡而不敢去進賢如轉石去佞如㧞山是其柔也必至於莫捄矣故曰君道以進賢退不肖為大上九由頤厲吉利渉大川象曰由頤厲吉大有慶也此一爻是言上九以養民為己任而天下胥受其福也由頤由之以養也周公繫頤上爻曰六五賴上九之養以養人是上以有相之道而致羣黎康乂之休民生未遂由以遂之民性未復由以復之有由頤之象臣而若此則位高權重寧可以易心處之乎故當皇皇惕慮惟恐上孤君心下失民望乃能勝其任而得吉也然以上九陽剛則有能為之才在上則有得為之勢乗其勢而運其才雖養民極天下之大事自可一身𢎞濟之而有餘而不負君上之倚毗矣夫何渉大川之不利哉孔子釋上象曰養民者以澤被天下為慶以上之躬膺大任果能宅心兢畏以成養民之功則一時受其利萬世蒙其澤而功之所被者溥矣非大有慶乎按豫九四曰由豫由豫在四猶下於五也而已有可疑之迹若頤上九曰由頤上之所處過中而益嫌於不安其可不存兢惕之心哉然艮止之性必無暴戾以招凶自以仁徳而致慶故雖厲而終得吉為人臣者投艱遺大則以身肩任之及事定功成而威福還諸朝廷功名歸於人主斯有譽而无咎矣㢲下兌上卦以四陽過盛而名大過處過之時貴有救過之道必剛而得中内㢲外説則可以抑中强之弊而扶本末之弱雖過而不過矣六爻相對而實相反三四居全卦之中皆有棟象上則隆下則橈也二近初隂五近上隂皆有枯楊之象上則華下則稊也初過於敬慎而有藉用白茅之安上過於有為而有過渉滅頂之凶一承剛一乗剛也就四陽而言二四以剛居柔處過而不過者也故一吉而一利三五以剛居剛處過而太過者也故一凶而一可醜司馬光云大過剛己過矣止可濟之以柔不可濟之以剛也故大過之陽皆以居隂為吉不以得位為羙其道主於黙運轉移而不在於輘踔駿厲葢過柔固不足以有為而過剛亦甚足以僨事自古立非常之大事興不世之大功皆時勢所廹出於萬不得已起而挽回補救非小心翼翼者不能故卦於陽之盛也有危辭而六爻亦無全吉者惟初以慎之至乃得无咎彖辭則言救過之道而即歎其大皆聖人之慎言之也大過棟撓利有攸往亨此卦㢲下兌上卦體四陽居中用事陽氣過盛故名大過卦辭言時當極盛非材弱者所能勝其任惟剛而得中乃可以濟過而有為也棟今謂之檩撓弱也文王繫大過彖辭曰卦體四陽居中棟之象也上下兩隂柔而無力不勝其重則委靡之才不克擔當大事有棟撓之象必如卦之剛中而㢲悦善用其剛而不過以是而往則以大過人之才行大過人之事必能通其時之變而克勝大過之任者矣故利有攸往而得亨也葢人君之保邦猶大匠之作室大匠必得楩楠杞梓之材而後可成巨構人君必得舟楫鹽梅之佐而後可建大功否則用違其量以杖為楹以蒿代柱將見棟折榱崩覆壓是懼何以享莞簟之安乎故曰有非常之人乃有非常之事荷重任者亦勉之而已象曰大過大者過也棟撓本末弱也剛過而中㢲而説行利有攸往乃亨大過之時大矣哉此彖傳是釋大過彖辭以眀大過之時非有大過人之材不能濟也大者過謂陽過也本謂初末謂上弱謂隂柔中謂二五孔子釋大過彖辭曰卦名大過者易以陽為大今四陽居中過盛則世道有盛極將衰之漸故為大者過也辭曰棟撓者何哉葢大過之時以一身任天下之重猶屋之棟然必賴陽剛之力足以維持之而後無傾敗之患卦體初上二隂本末皆弱既不能自强其徳以固其本又不能力挽其失以扶其末此其所以撓也又曰利有攸往亨者何哉葢天下無不可為之事惟患人無善為之道卦體四陽雖過而二五得中是强毅過人固足以幹事矣而又出以時措之宜卦徳内㢲外悦是思慮嚴審固足以通變矣而又行以和順之羙卦有大過人之才如此以是濟時之過則經綸有方可以長保其盛而不至於衰此其所以亨也夫惟有剛中㢲悦之才然後利往而得亨可見非常之時必有非常之人方能處之而有濟大過之時豈不大矣哉夫大過之時何時也正天地平陂之會帝王升降之闗所謂彌綸經緯古今極大事業如堯舜之揖讓湯武之征誅然亦不過順時而為之竝未於時外剙造一事否則寧傳子不傳賢矣寧守節不達節矣後世君臣喜功好大但見外之有餘而不量中之不足罄民財而不惜竭民力而不止以至傾敗而不可救此秦皇漢武之貽悔無窮也當斯任者其可漫然處之哉象曰澤滅木大過君子以獨立不懼遯世无悶此象傳是言君子觀大過之象以自純其無憂懼之心也澤滅木謂木在澤下也孔子釋大過象曰澤本可以潤木乃至浸滅乎木澤水之大過也故為大過之象君子體之而有大過人之行焉彼獨立而人不我輔人多懼心君子當為則為雖一國非之而不顧天下非之而不顧又何懼焉不懼則過人矣遯世而人不我知人多悶心君子以道自樂不以非分之富貴易我不去之貧賤又何悶焉无悶則過人矣此非見之甚真守之甚定學術操守卓絶乎人者不能君子之異於人若此昔人謂獨立不懼㢲木之象周公以之遯世无悶兑悦之象顔子以之然周公顔子非强致而然周公之處常也夔夔然存恭敬之心故遇變也几几然無禍患之慮惟其知懼而後能不懼也顔子之居心也不以簞瓢改其樂故處遇也不以屢空動其中惟其樂天而後能無悶也是以君子不治境而治心不求世而求己初六藉用白茅无咎象曰藉用白茅柔在下也此一爻是言初能過慎以自全而安柔下之義也白茅物之潔者周公繫大過初爻曰初以隂柔居㢲之下過於畏慎者凡圖事濟時處之至安而常懐不安之慮居之甚全而恒厪不全之心猶物之錯於地而必藉以白茅者然夫茅之為質最柔白之取義至潔以柔順居其徳而以精白勵其心慎斯術也以往可以常保其安而无過咎何由及之哉孔子釋初象曰初之藉用白茅者以隂柔在下上承四剛勢不得不過於慎幸其能柔則無矯率豪縱之氣在下則有沈潛精入之思此誠慎而不失於過者也按象言獨立遯世非過亢也見君子植節之偉初言藉用白茅非過謹也見君子慮事之周葢天下莫不敗於輕忽成於兢業誠能心存畏慎一舉一動必思出於萬全則何險難之不可平而紛錯之不可理可見欲建天下之偉節未有不極天下之小心者也九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也此一爻是言二能用柔濟剛而相與以成大過之功也稊根也老夫即二女妻謂初也周公繫大過二爻曰二當陽過之始其雄心壯氣常足以僨事而有餘幸居柔得中无應於上而下比初六資初之柔以濟其剛自能固本而不撥補偏而不廢以圖事於有濟者也象之物則為枯楊生稊而發生之有機象之人則為老夫女妻而生育之有賴枯而復榮老而資少過而不過者也何不利之有孔子釋二象曰大過之時患人之不我與耳今二之於初如老夫之悦少女少女之順老夫隂陽相與何事不諧豈復患剛之太過而不能成相濟之功乎按四陽居中用事力厚勢强而不知陽太盛則隂竭隂竭則不能以資陽九二陽過之始而初隂承之相比親切猶可以濟其偏而補其弊為治者誠知此義勿徒專事恢廓恃其外之揮霍有餘而虛懐下人以求助其所不足則可以集天下之益而收天下之功矣九三棟撓凶象曰棟撓之凶不可以有輔也此一爻是言三過恃其剛而人莫為之輔也周公繫大過三爻曰九三以剛居剛而不得中剛之過甚者也以過甚之剛而當大過之任是剛愎自用而違時拂衆必至傾敗而一無所濟故為棟撓之象而凶也孔子釋三象曰所謂棟撓之凶者以三剛强自用視天下皆無可輔之人人亦不樂進而輔之葢知其勢之必至於覆壊而不可以有輔也按卦辭以二隂不能勝重故曰棟撓九三過乎陽而仍棟撓之象且加以凶者何也卦之棟以隂不足而撓三之棟以陽太過而撓不足者猶可輔故不言凶太過者難為助其凶必矣寗嬴論陽處父曰剛而主能怨之所聚夫剛則難親矣而又主能焉是訑訑之聲音顔色拒人千里之外忠良之士日退讒諂之人日進未有不凶於家害於國者也是可為深戒矣九四棟隆吉有它吝象曰棟隆之吉不撓乎下也此一爻是言四能勝大過之任而不可昵於私應也隆隆起也下謂初周公繫大過四爻曰九四居近君之地當大過之任以陽居隂剛柔合徳而又處兑下是能和悦君心柔懐億兆何事不可為何功不可建如棟之隆起而得吉也但濟大過以剛為主過剛而濟以柔則可今九四非過剛者而下與初應復以柔濟之則反過乎柔不足以成天下之事而為有它之吝矣孔子釋四象曰四之棟隆吉者葢太剛則折斯不足以任重而撓乎下者有之今四以剛居柔過而不過所以能勝重任不至撓敗而吉也按九二比初則無不利九四應初戒之以吝者葢剛固不能不資柔以相濟而亦不可牽係於柔以害其剛故於二既明其相濟之利而於四復著其牽係之害也夫所貴大臣者以其正色立朝不可攀援而後能仔肩天下之重茍悦小人之柔媚而親比之其不為所連累而自損功名者罕矣可不戒歟九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也此一爻是言五當大過之時比於隂柔之小人而無足與有為也老婦謂上六士夫即九五五在上六之下少於上六故曰士夫周公繫大過五爻曰五以陽剛中正而居尊位宜足以勝大過之任矣然下無正應無與共成大過之功而上比過極之隂其所近者皆庸懦之臣柔弱之士其不能相濟以有為可知象如枯楊生華上雖華秀無益於枯也老婦士夫非其匹偶終不能育也雖一時無撓敗之咎而當大過之時君亢於上臣靡於下以是為濟過之道寧有譽乎孔子釋五象曰枯楊不生稊而生華旋復枯矣安能久乎是不能實心任事而國本先摇也老婦而得士夫生育無基寧不可醜是將見讇諛成風而終於可羞也按君之有賢臣如車之有輪鳥之有翼車無輪不可行逺鳥無翼不可高飛君無賢臣何以建不拔之基流無窮之譽乎大過九五專為有君無臣而言然自古為治未有借才異代者亦顧用之何如耳知之極其明位之極其當循名責實以考其成信賞必罰以鼓其氣則人人興事赴功賢者以奮不肖者以勉茍有一長莫不樂為朝廷之用而何至有乏材之嘆哉上六過渉滅頂凶无咎象曰過渉之凶不可咎也此一爻是言天人交困之日惟當盡力之所能為而不可以成敗論也過渉勇於渉也滅頂水没其頂也周公繫大過上爻曰上以隂柔而處過極之地是當國事艱難之秋既不敢委於時勢之不可為又不敢量其才力之不能濟真所謂竭忠盡智以死繼之者也象如勇於渉水至滅頂而不悔焉此殆以身殉天下之事而有凶矣然其心存効節志在成仁無媿於見危授命之義又何咎焉孔子釋上象曰君子幸而成天下之事當論其功不幸而殉天下之事當諒其心上六過渉之凶事雖不濟而其心則已盡矣後之尚論者寧可以其不能濟而追咎之乎葢大過之極非有大過人之才不克濟上以柔正之徳而遇極否之時任過其力至鞠躬盡瘁之死而靡悔於事則凶於義則无咎也夫大過本行權之事而聖人特發守經之義於上六此義明而孔光馮道之徒不得借明哲保身之説以文其偷生賣國之奸矣坎下坎上坎以一陽陷二隂之中是為坎陷之義凡陽居隂之中者為陷坎水也陷者水之體也坎為險難之象所謂時值艱危雖聖人亦處無可如何之勢其能自必者惟心耳彖傳所言剛中有功乃教天下以存心誠信為出險之法也六爻中如二爻之小有得則盡其道而不遇其時者也四以忠信善道結於君心臣之能竭誠以勤於下者也五以陽徳居尊而時將出險君之能剛中而運於上者也若夫初之深入於險三之陷於兩坎上之終極於險是時勢既值其窮而才徳又不足以濟欲以平大難而救大艱曷有濟乎葢天下不能無險阻之時聖人貴有出險之用惟秉陽剛中正之徳因時措宜天下有事則定密策决衆疑以成撥亂返正之功天下無事則畫郊圻固封守以裕思深慮逺之畧必深宫嘗厪險阻之虞而後薄海乃有磐石之固此所以坎卦至險而卦辭必言出險之道歟習坎有孚維心亨行有尚此卦上下皆坎一陽陷於二隂中為坎重之又得坎焉陷益深而險益重故名習坎卦辭言處險之道惟以孚信居之則心有主而成出險之功也習重習也坎險陷也文王繫坎彖辭曰人當重險之來是身已入乎險中而不得免者也所可得而自主者心耳卦體陽實在中為有孚心亨之象則中有孚信而於坎險之内炯炯不昧者維此一心是心之實處即是心之通處禍至而不摇變來而若適而心亨矣夫心既亨通則險阻之境皆吾順行之境而何險之不可出哉是在險而尚於行而不至終於險中也周易上經以乾坤始以坎離終坎得乾之中爻故中實而為誠離得坤之中爻故中虛而為明誠則心有定主而利害得喪不得而入之明則内無偏執而是非毁譽不得而汨之故中實者坎之用中虛者離之用也體易者因坎離之中而悟誠明之妙用古聖人之心學實在於此徒為出險云乎哉彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉此彖傳是釋坎彖辭以明處險之有道而後可以出險也剛中謂二五孔子釋坎彖辭曰卦之名為習坎者以卦體上下皆坎是為重險險不重則彼險此平人情尚可趨避習坎則逺近無可避之地智愚無自脱之人而聖賢之作用見焉卦辭所謂有孚者以坎象為水水體内實而有常故其流也足此通彼不至盈溢妄行此即其信也其信無論行於地中有常而不變即至行乎險阻而不盈如故初何失焉彼人之處險而信義不失者何以異此故曰有孚也維心亨者以二五剛而在中則剛實無偽心有主宰自能通達無碍而亨也行有尚者以其剛中之才而往則至誠感孚行無不達自能芟除大難而有功也夫處險則思出險之方而用險還為防險之道天之險高不可升是也有無形之險矣地之險山川丘陵是也有有形之險矣王公法天險之無形設為法令制度以防其未然法地險之有形設為城郭溝池以制其已然而以守則固國是以寧皆因險之時以成險之用也顧不大矣哉按信與剛中是明處險之道設險守國是明用險之方處險有其道則義命自安雖居患難之中無入而不自得用險有其方則形便已據雖有卒然之虞預備而可無患然山川城池特設險之一端耳若夫尊卑之等貴賤之分明等威異物采凡所以杜絶陵替限隔上下者此誠體險之大用而所謂地利不如人和也用險者尤宜留意歟象曰水洊至習坎君子以常徳行習敎事此象傳是言君子法習坎之義而得治已治人之道也洊至流而不息也常久也孔子釋坎象曰水流洊至兩坎相習之象君子體之取水之有常以常徳行必思所以茂正三徳崇脩六行而學之不厭則理義熟於身心而治己之功備矣取水之洊習以習教事必先使之既安其教又服其事而誨之不倦則政令熟於觀聽而治人之道畢矣皆洊習之義也從來險難皆起於人事故治已治人為有天下之要務徳行不常則有初鮮終私欲横起遇險而不能自持者有之矣教事不常則始勤終怠奸宄萌生當險而不能肆應者有之矣然人君必先慎脩於上日就月將而後海内回心向道風移俗易不待勢制威禁自然相觀而化則治已又為治人之本也初六習坎入于坎窞凶象曰習坎入坎失道凶也此一爻是言處重險之下而失濟險之道也窞坎中之陷處周公繫坎初爻曰初本隂柔之質無濟險之才處重險之下無濟險之勢上無應援無濟險之人是其志氣昏愚所為拂亂非徒不能出乎險也惟益陷於深險耳為在習坎之中而又入於坎窞之象如是則墜於重淵載胥及溺而已其凶可知孔子釋初象曰惟陽剛乃可以出險初以隂柔而居習坎之下是失其陽剛之道而其陷益深矣所以有入于坎窞之凶也葢平陂之形雖在於世而趨避之方則操乎我故最凶莫如坎之初而聖人示之曰失道可見雖在重險之下非無出險之道乃人自失其道而後至於凶此君子之所為惡居下流也九二坎有險求小得象曰求小得未出中也此一爻是言二身處險中雖具剛中之才而僅足小有濟也小得言未大也中謂二隂之中周公繫坎二爻曰二當坎險之時陷於上下二隂之中乃至險之地有險者也幸以剛居中是有孚心亨之人而肩濟險之任宜若可出險而無難然處勢艱難人情阻拂當此者僅可小有所得以為出險之地若欲遽進以求出乎險則將至於三之來往皆險而入于坎窞而已孔子釋二象曰所謂小有得者非二之才徳不足以濟險也以一陽方為二隂所陷在險之地是時尚未能出乎險中而不可大有得也大抵氣數一定雖聖人不能與之爭然具剛中之徳處險阻而得其道則氣數亦不得而終困之曰小有得者非貪茍安而已遵時養晦見可而進其亦有不得不然者乎六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也此一爻是言三上下皆險而無濟險之才也來謂就下之謂往上枕倚著未安之意周公繫坎三爻曰三以隂柔不中正而履重險之間是以委靡之質而當大難之衝其進與退皆無足據者也來亦遇坎之亦遇坎來下則入乎險之中之上則如枕重險焉所處如此則前後皆險舉足蹈危必入于坎中之窞而不能出也禍患已深雖來與之安所用哉孔子釋三象曰所謂來之坎坎者三之心豈肯終于坎哉特以其隂柔不中正雖處平易尚難克濟况履險乎徒見其憧憧往來而終無出險之功也按險為陷人者也而三之隂自陷險中至於跼天蹐地進退維谷嗟乎陽之陷也猶可小得既平隂之陷也一敗塗地而已矣彼陷人者徒自陷耳可不懼哉六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也此一爻是言四居濟險之任惟忠順以事上也樽以盛酒簋以盛食貳益之也缶即酌器也為樽之副牖室之受明處象曰樽酒簋貳之貳疑衍剛柔指四與五際即交際之際周公繫坎四爻曰四以隂居柔下無應援非能濟天下之險者但以其身居大臣之地而當險難之日則上之倚毗於己者倍切於常時故必去虛文捐形迹惟益勵其忠實之心以為事君之本而其進結於君也又必因君之所明以祛其所蔽庶不至任質而疑於戅也為樽酒簋貳用缶納約自牖之象如是則君必信吾心而用吾言以濟其險也夫豈有悾悾為忠益而反以為咎乎終必无之矣孔子釋四象曰所謂樽酒簋者葢以險難之時非誠實不足以固其君臣之交故五以剛而下交乎臣四以柔而上交乎君則精神相通形迹俱捐剛柔自是相際而成濟險之功矣按君臣相遇自古為難而四與五不事多儀即可交合者葢時當無事勢分之相隔故君臣之合常見其難運值多艱緩急之相須故君臣之合偏覺其易四與五在險難之中剛柔相濟臣固切於上交君亦勤於下接宜其作合之易也方之在昔肅宗之於李泌徳宗之於陸贄庶幾似之然贄從其君於多難之日計無不從及禍患寖平一抗直言而遽罹斥逐豈其有乖納牖之道乎信乎君臣之合似易而實難也人主誠深念乎此則其臣自不至信而被謗忠而見疑矣九五坎不盈祗既平无咎象曰坎不盈中未大也此一爻是言五才足濟險而又有出險之機也祗抵也中謂剛中周公繫坎五爻曰五在坎之中未離乎險者也然以剛中之才而居尊位其才其勢俱足以濟險而又時將出險則有可濟之會是以有孚心亨之君而肩濟險之責必漸至於險者使易危者使平猶坎陷之中雖未至盈而出然已至於平而將盈矣夫險患其不平耳既平則險必可濟又何咎之有哉孔子釋五象曰天下之險一日未去則人君之徳一日未大五之坎尚不盈時為之也其未大者乃時之掩乎中而非中之不足濟乎時也按二五皆有剛中之徳可以出險而二曰坎有險五曰坎既平者葢險有能濟之道又有將濟之時二在下坎之中徳雖具而位未隆是以猶為重險所困也五在上坎之中徳位俱隆而時亦將出重險之外矣要之時不可必而道當自盡此所以必有孚心亨而後行有尚也可不勉歟上六係用徽纆寘于叢棘三歲不得凶象曰上六失道凶三歲也此一爻是言上居險之極而終於莫濟也係縛也徽三股索也纆兩股索也寘拘也叢棘重險難脱之地或謂即後世所云棘寺也周公繫坎上爻曰上以隂柔而居險極是其才不足以濟險而又當存亡危急之秋身在險中為險所陷而終無出險之日者也為係用徽纆寘于叢棘之象夫係之寘之所處之困廹何如而至於三歲之久猶不得免則陷溺之深而凶可知矣孔子釋上象曰上六所謂凶三歲者何哉葢出險以陽剛為道今以隂居柔才弱莫濟全失其處險之道矣宜其久而終至於凶也按初上二爻包坎體四爻之外是六爻中陷坎之最甚者然聖人視此不以為天運之適然而必責以人事之當然故始終以失道儆之若險未嘗陷人而人自陷夫險者其勉人以自强之心可謂切矣離下離上離麗也以其一隂附麗於二陽也又明也以其中虛則明也離為火以火體本虛麗於物而始明也彖傳釋卦辭惟在正以出之而順以成之故成炳照萬物之功六爻之中惟九三盛極將衰有不能知止之戒六二則言臣道之能將順也上九則言君威之能丕振也初爻持之以敬則無咎四爻廹之以剛則終凶所為敬勝者吉而太剛者折也至於五爻能以憂危之心收大權而保天祿此堯舜所以勤吁咈而湯武所以朂銘誥歟按文王序上經始之以乾坤而終之以坎離者以坎得乾之中畫離得坤之中畫故坎離者天地之心也坎藏天之陽著明為月離麗地之隂含明為日坎水主北方而司寒離火主南方而司暑月則司夜日則司晝自太極既判兩儀化育以後凡水火日月之用寒暑晝夜之運莫非二卦之所包藴帝王體之以治天下則裁成輔相之道以立聖賢體之以治一身則動静通復之理以明洵乎易道之㣲為能範圍天地而不過矣離利貞亨畜牝牛吉此卦上下皆離隂麗於陽附麗之義故名為離卦辭言附麗乎人之道既貴於正而又必出之以順也牛順物牝牛順之至者也文王繫離彖辭曰凡人莫不有所附麗未附麗之先交不可妄投既附麗之後情不可乖隔故遇合之始必出之以至正而利於貞焉則道徳可以相贊功業可以相資何亨如之然正者易於相忤又必謙卑以自牧柔遜以相先而處其至順如畜牝牛然庶幾在已無違在人無拂而得吉矣此可見貞而能順則貞不失之激順而能貞則順不流於諂此附麗之善道也按離之為卦一隂離乎二陽陽者君道隂者臣道故多主臣麗君而言然臣可以上麗乎君君亦可下麗乎臣為君者黜邪佞登忠良慎之於始矣而既得賢臣則卑躬以隆其體虛懐以盡其情又極延攬之誠焉此君之善乎麗臣也為臣者進以禮退以義謹之於初矣而既事聖主則將順以昭其羙委曲以殫其忱又極納牖之道焉此臣之善乎麗君也三代以下人主巍巍於上百僚唯唯於下君側多狎昵之人盈廷工諛媚之習知此者鮮矣欲求合夫麗之義必交盡其正且順而可哉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也此彖傳是釋離彖辭以明天地君臣各得其所麗之道也重明主人君言明而又明明之不息也正者明得其正不為苛察柔麗乎中正指六二言孔子釋離彖辭曰卦名離者附麗之義也推之人物莫不各有所麗故日月麗乎天是物之成象者有以麗而明也百穀草木麗乎土是物之成形者有以麗而生也大君者位天地之中而為天下之主豈無所麗乎將見人君智周萬物而行所無事推見至隱而不尚苛察是重明以麗乎正也由是一明無不明一正無不正百度惟貞庶績咸熙乃化成於天下矣是君之出治有以麗而成也三才之各有所麗如此此離之名所由取也辭曰利貞亨畜牝牛吉者葢人君以重明之徳作之於上人臣當以忠順之徳附之於下卦之六二柔麗乎中正則是人臣麗重明之君也不驕不亢有恭敬之羙而又裁之以中行之以正不流卑諂之私惟中正也則有貞之義矣故亨惟柔也則有畜牝牛之義矣故吉葢惟君之重明而後可以配天地惟臣之柔正而後能佐人君此上下之相與有成也歟按程傳以重明麗正柔麗中正皆兼君臣言竊謂重明即大人之繼明豈有臣之明而敢與君之明亢者且二五雖皆柔中而五所居未正二正而且中則柔麗中正似專指黄離之臣為得也葢人君一日萬幾非重明不足以辨忠佞非居正不足以式臣民故專屬之君人臣仰事一人非柔則失之專而必至分君之明非中正則失之諂而不足以承君之明故專屬之臣如是則明良會合心志一而功業成矣象曰明兩作離大人以繼明照于四方此象傳是言大人自純其明徳之功而光被乎世也作起也繼明以明相續也孔子釋離象曰上下皆離明而重兩相繼而起重離之象也大人法離明相繼之義以緝熙厥徳則本體有純一之休以覃敷厥世則四方無闇汶之氣在大人止自繼其明耳而文明之化所以照於四方者已具足於大人明量中矣離明之學非大人孰能與於斯按易卦大象或稱君子或稱先王或稱后惟離稱大人葢明明徳者大人之學也繼明即明明徳之義此千古聖學相傳之大原也然離之所以繼明者由乾再索於坤而得其中畫六二敬以直内義以方外則體用無不明矣六五黄中通理正位居體則表裏無不明矣明兼體用徹表裏則已之徳明而即可明明徳於天下光輝所發無逺不届其照四方也宜哉初九履錯然敬之无咎象曰履錯之敬以辟咎也此一爻是言人之不可易於處事而當敬以持之也履在下之象錯然紛錯之貌周公繫離初爻曰初以剛在下而處離體剛徳好動則果於任事離性炎上則喜於麗人是其急於所履而不顧事機之紛錯者也故有履錯然之象夫初在下而跡已動動則失在下之宜而有咎也然其剛明之才若知其義而敬慎之則心有主而動不妄履錯之咎何自而至矣孔子釋初象曰履錯然欲動而必以敬者葢以初居離始所履之善惡邪正紛錯交進莫知適從敬則可以慎其所履而避咎耳茍其敬之雖履錯然庸何咎乎葢天下是非得失本屬一定之理然有平時見之甚明而臨事忽迷謬者此非不明之咎葢明而不敬之咎也聖人於未明者教之以明於已明者教之以敬假使致知明善以後不加以謹幾慎獨之功則高明者之失足與卑暗者之妄行何異乎敬之一言通於六位而特舉初以槩之所謂必敬其初而後能敬其終也六二黄離元吉象曰黄離元吉得中道也此一爻是言人臣能以中正之道而上麗乎其君也黄中色文之羙也黄離羙之盛也周公繫離二爻曰二以文明中正之徳而上麗於文明中順之君是人臣之麗君也將順而濟以匡救渾厚而出以精明所稱臣道之最中者矣故為黄離之象當是時祗見其居中而運絶無功烈之可見而繼明之主徳自昭化成之羙俗自洽君都臣俞而四海從欲嚮風大善而吉之道也孔子釋二象曰所謂黄離元吉者葢黄中色也二居中而麗五是其所以事君者皆得中道而無過不及之差者也惟其為道也能合乎中道故其為離也有取於黄離而元吉之效誠非倖致矣按六二之離則其明也黄則其文也文明由中道而發則其明非一偏之見其文皆至徳之光所謂羙在其中而暢四肢發事業者也重明之主將以明照四方化成天下必有文明中正之臣為之宣布於下非如六二者疇克勝其任乎九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也此一爻是言人當安常以貞遇而戒徒憂者之無益也缶常用之器周公繫離三爻曰以理言之盛必有衰以數言之生必有死此人之大常也三居下體之終是前明將盡盛極將衰之候故為日昃之離當此時也智力既無足恃時會亦難强爭倘不安氣數之常以自適而戚戚於危亡之憂以為旦夕莫保之計如不鼓缶而歌則徒大耋之嗟然竟何益哉祗速之斃耳凶之道也孔子釋三象曰離未至昃猶或可久既昃矣則盛極將衰何可久也明者知其然安常處順又豈足以為凶乎按傳曰有徳則樂樂則能久孔子發憤忘食樂以忘憂不知老之將至衞武公年九十五猶使人日箴戒於側作詩自勵云借曰未知亦聿既髦聖賢以及時聞道為樂以永不聞道為憂豈有教人以時數將盡以樂消日之理乎此爻之㫖亦言人之道徳功業返諸已者無憾然後可居易以聽其自然所謂脩身以俟之耳非一無所用心而徒委諸氣數之謂也九四突如其來如焚如死如棄如象曰突如其來如无所容也此一爻是言四以剛侵上而不容於世也突如其來言猝至也无所容言焚死棄也周公繫離四爻曰九四當後明將繼正天命重回之會人心始向之秋宜以順而動徐以定之可耳而乃以剛廹之狹陋前人之規盡行一已之志更張太驟突如其來如者也則激而生變而厲階之作災必逮夫身矣是固以剛自敗者其諸以火自焚者乎焚則死死則棄矣孔子釋四象曰突如其來如者四之過剛太鋭犯順已極宜其不戢而自焚受禍既酷而公論不予天下之所不容也按剛所以持正也剛而犯上不正莫大焉居大臣之位而不避僭逼之嫌其能逭不敬之誅乎漢景帝謂周亞夫意怏怏非少主臣史稱霍光之禍萌於驂乗此二臣者才徳出衆功冠一時然皆不免突如之戒以至殞身滅宗故知牝牛之義為人臣者尤當三復也六五出涕沱若戚嗟若吉象曰六五之吉離王公也此一爻是言五明於保位之義而出之以憂懼之心也離即麗也周公繫離五爻曰五以柔居尊而麗乎中有文眀之徳可謂繼明之善者矣然處不得其正而廹於上下之兩陽是主權將至下移而國柄慮其倒持者也幸明徳在中故能反躬自治而憂深慮逺既出涕沱若而憂形於色又戚嗟若而憂聞於聲謹畏如是庶君徳克昭奸萌潛杜收主權而固天位吉莫逾焉孔子釋五象曰六五以君而下廹於臣位亦殆矣而言吉者以其存憂畏之心則所行自無乖戾之失有以麗於王公之位而永保天祿也按多難可以興邦殷憂所以啟聖古之明主惕心危慮兢兢若不自保而卒能抑奸暴之志收天下之權皆自此一念致之也不然六五為離明之主何由至於出涕戚嗟乎繼明而戚與方蹶而泄其得失正可㕘觀矣上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也此一爻是言剛與明交濟故能行師而奠邦也折首誅其首惡也醜類也周公繫離上爻曰上九以陽居上在離之極剛明之至者也惟剛明則可以及逺故王者用此道以出征則能戡亂止暴以享有嘉羙之功然剛極則無所縱舍明極則無所掩匿茍不約之以中則剛而失於過嚴明而病於過察矣故其出征也但折取其首惡之人而威自震獲匪其從亂之類而刑不濫既不至養奸以怙亂又不至縱暴而寡恩大憝斯拔羣心傾服而共臻化成之治又何咎焉孔子釋上象曰王用出征匪以黷武也誠念邦之不正由寇賊亂之耳一出征而除暴止刑乃所以綏正其邦國也按繼體之君尤重征伐之事有扈之師啟所以承禹也商奄淮徐之征成王所以繼武也周公作立政終之曰其克詰戎兵以陟禹之迹召公告康王亦曰張皇六師無壊我高祖寡命葢不如是不足以奮揚威武而救陵遲之漸此正邦之王必以出征為急也後世上下茍安口不言兵甚至武備廢弛外寧而遂忘内憂者亦獨何哉日講易經解義卷七
