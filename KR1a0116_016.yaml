body:
  text: 欽定四庫全書日講易經解義卷十六子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門此一章是贊易道之至見聖人德業與天地參無非易理之所悉備也孔子意曰易之理其至極而無以加矣乎何以言之夫夫下德之崇業之廣至於聖人極矣而聖人所以崇德而廣業者用易之理也蓋易中六十四卦三百八十四爻莫非至理聖人以之窮理而崇其德則得之於心者知識日進於高明其知崇也以之循理而廣其業則體之於身者踐履日就於篤實其禮卑也夫言乎崇者莫如天而聖人之知之崇則效乎天心之神明獨超萬物之上而物莫與並焉以此觀德何如其崇也言乎卑者莫如地而聖人之禮之卑則法乎地身之體備不涉一毫之虛而纎悉弗遺焉以此觀業何如其廣也德崇如天業廣如地以天地同此易之理也試觀天設位於上地設位於下乾健坤順二氣運行而其間隂變陽化如日月寒暑之類往來不窮日行乎其中矣聖人知崇而日上禮卑而日下則其易知簡能本成之性存而又存純於不已而其間率由自然之道裁制合宜之義千變萬化皆由此出是存存之成性乃道義之門矣是聖人德崇業廣與天地為一者也而無非體易以得之易之理豈不為至矣乎按言德曰知崇即所謂尊德性致廣大極高明之事也言業曰禮卑即所謂道問學盡精微道中庸之事也而德之崇至於發育萬物峻極於天業之廣備乎禮儀三百威儀三千此即堯舜之德業如天之無不幬如地之無不載者也聖人用易之極功斷在此矣聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化此一章是言卦爻之用而此四節先言聖人設卦生爻立象繫辭有以盡天下之變化用易者所當擬議而法行之也孔子意曰伏羲畫卦有卦之象象也者所以像天下之賾也惟聖人有以見天下之賾紛繁雜亂莫可紀極而各有其形容物宜於將畫卦時倣佛其形容其為純隂純陽者何似其為雜隂雜陽者何似擬諸心目間於是畫卦以曲肖其物宜如純陽之物宜於三竒以象天純隂之物宜於三偶以象地雜隂雜陽之物如雷風山澤之類各有所宜以象之是故謂之象也周公繫爻有爻之辭爻也者所以效天下之動也惟聖人有以見天下之動變化云為莫可拘泥而各有其會通典禮於是觀於會聚之中必有可通之理以行其典常禮法為萬世準於六爻之動有循典禮而行者繫辭焉以斷其吉有背典禮而行者繫辭焉以斷其凶一一效而示之是故謂之爻也夫象言天下之至賾若可厭惡矣然一隂一陽理所必有不可惡也爻言天下之至動若可紊亂矣然一物一則理所不渝不可亂也聖人立象繫爻如此用易者所不可須臾離也是以君子將有言也必觀象玩辭觀變玩占擬之象爻而後言焉將有動也必觀象玩辭觀變玩占議之象爻而後動焉擬之議之而言有語默危孫動有進退存亡執兩用中時措皆宜以成人事之變化與天為一矣孔子言象爻之為用如此下引七爻乃其例也可見易象至賾而有至一者存易爻至動而有至常者存所謂惟精惟一允執厥中帝王心法亦不外乎此也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎此一節釋中孚九二爻義言擬議此爻之辭當知言行之貴於誠也中孚九二之爻辭云鳴鶴在隂其子和之我有好爵吾與爾靡之孔子釋之若曰鶴鳴子和我爵爾靡者誠信感通之理也而感通莫大於言行君子居其室在隱密之中而出其言善當乎天理合乎人心則在千里之外此感彼通必且從其善而應之況其邇者善之所先及有不應乎居其室在隱密之中而出其言不善悖乎天理拂乎人心則在千里之外雖令不從必且舍其不善而違之况其邇者不善之所先及有不違乎言如此行可知矣毋謂一言可忽也言者心之聲天下皆屬耳焉方自身出即已加乎民而不可返矣毋謂一行可忽也行者心之迹天下皆屬目焉方自邇發即已見乎逺而不可掩矣言行之在君子猶戶之運有樞矢之發有機樞運而戶必開機發而矢必逺言行如樞機之發善則人應而榮不善則人違而辱乃榮辱所由感召之主也不但此也人與天地同此理同此氣言行而善則和氣足以召天地之祥言行不善則乖氣足以召天地之殃君子之所以動天地者亦由此也可不戒懼謹獨而慎之乎君子擬議此爻當謹其言行之發矣按宋景三言而熒惑退舍太戊修德而祥桑立枯言行動天地實理感召然也人君端拱深宮一話一言一事一為皆與四海相關與天地相贊不可不慎惟在擇善立誠以端其本而後發號施令頒條布政皆主善以為常則萬姓咸仰大哉王言亦見一哉王心莫不是訓是行近天子之光矣同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭此一節釋同人九五爻義言擬議此爻之辭當求同於心也同人九五之爻辭云同人先號咷而後笑孔子釋之若曰同人九五與六二相應同心者也但隔於三四不能遽同始暌終合故其爻辭云同人先號咷而後笑蓋君子之道其所以相同者不在迹而在心若就迹而論或出而事君或處而獨善或默而緘口或語而論辨似乎不同矣原心而論則出處語默自有相信於形迹之外者寧有不同者乎夫人但患心不能同耳茍二人之心皆出於一則彼此相孚利害不能移讒邪不能間舉天下之物無足以阻隔之者即至堅如金其利足以斷之矣由此發而為言非必其雷同附和自然同歸於道同協於理意味深長雖蘭之臭氣馨香無以過之則甚矣同人之道不以迹而以心也按同人二五同德相孚本為正應所不能遽合者三四間之耳究之心既同則始雖間阻終必得合此孔子指出同心二字與同人于野之旨互相發明也初六藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣此一節釋大過初六爻義言擬議此爻之辭當知凡事之貴慎也大過初六之爻辭云藉用白茅無咎孔子釋之若曰大過之初爻以隂柔居巽下敬慎小心如將一物安置於地必用白茅藉之者然故爻辭云藉用白茅無咎蓋言敬慎之道也彼一物也錯置於地已可以安矣而又藉之以茅自無覆敗之慮何咎之有此其心蓋敬慎之至極其委曲周到也夫茅之為物至微薄而用以藉物則使物益安其用不甚重乎茍能慎持斯術以往凡所設施自無所失矣按凡人處事見為可虞者或能矜持見為已安者易生忽略故聖人教人雖於易忽之處而益加以敬慎之心憂勤惕勵無時不以小心處之思患預防無在不於先事圖之如是則理有萬全事無一失真制事之良規守身之要術也勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也此一節是釋謙九三爻義言擬議此爻之辭當知居功之貴謙也言如永言孝思之言猶思念也謙九三之爻辭云勞謙君子有終吉孔子釋之若曰謙之諸爻無不謙者而九三有功勞而能謙尤人所難故其爻辭云勞謙君子有終吉蓋善居功者也彼勤於王事可謂勞矣而不矜伐於人勞而事成可謂有功矣而不任德於已此由其器識深沉度量宏逺厚之至也則夫所謂勞謙者正語其以功下人而不伐不德者也此其心何心哉其心嘗念德之存於已者必欲其盛故禮之接於人者必欲其恭雖欲不謙不可得也然則謙也者凡以致其恭耳而人道好謙自然不疑不忌位可長保而弗失矣書有之汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功其謙三之謂歟蓋惟不矜不伐而後天下之功能莫與並焉使有一毫自矜自伐之心則其有損於功能之數者正復不少矣是以自矜者無能自伐者無功也聖人於此爻所以極稱其美以為立功之善道歟亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也此一節釋乾上九爻義言擬議此爻之辭當知持盈之道也亢過於上而不能下也乾上九之爻辭云亢龍有悔孔子釋之若曰乾之上九處陽盛之極不知變通而與時俱亢故其爻辭曰亢龍有悔夫乾之上爻何以有悔哉九為龍德可謂貴矣然不得陽位是貴而無位也居於上爻可謂高矣然純陽無隂是高而無民也九三之賢在下而敵體不應是賢人在下位而無輔也此猶人主傲物肆志簡賢虐民而為亢龍之象也如此則處亢之時而與之俱亢不知盈虛消息之理一有所動悔輒隨之矣按盛衰循環固必然之理然時之必至於亢者天也能不與之俱亢者人也人主當此之時茍能識時觀變保泰持盈則安富尊榮位可長享四海歸心多士樂附又焉有亢龍之悔乎至於爻辭但言有悔而孔子釋之曰動而有悔者蓋當亢之時宜靜而不宜動上處亢而妄動欲求無悔難矣通書云吉凶悔吝生乎動吉一而已動可不慎哉亦足與孔子之意相發明云不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也此一節釋節初九爻義言擬議此爻之辭當知凡事之貴密也節初九之爻辭云不出戶庭無咎孔子釋之若曰節之初九居節之初未可有為貴乎能節而止者故其爻辭曰不出戶庭無咎夫口舌為召亂之端故亂之所生每以言語為之階如君為臣謀而能密其言則終始交孚自無姦邪之妬若不密則失其臣矣臣為君謀而能密其言則謀猷就理自無反中之傷若不密則失其身矣至於利害伏於幾微成敗係於毫忽所謂幾事也能密其謀則無不成若不密則人忌其成而樂其敗是事可成而自害之矣是以君子戒之慎密其言而不輕出也按古之人君言語必飭嚬笑必嚴其深謀逺慮雖左右近侍不得窺其意旨而為之臣者周詳謹飭守口如瓶不敢以禁廷密勿之語宣示外人良有鑒於此也然其慎密之事又必出於大公歸於至正為君者必如宋太祖所云我心如重門洞開茍有私曲人皆見之為臣者必如司馬光所云吾生平所為無不可對人言者然後慎以將之密以濟之庶不失聖人立言之旨歟子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也此一節釋解六三爻義言擬議此爻之辭當度德而居位也慢藏不謹慎而暴露之意冶修飾也孔子意曰作易者其知致盜之由乎易解之三爻曰負且乘致寇至此言何謂也蓋負也者小人勞力之事小人之所宜也乘也者君子所乘之器君子之所宜也若小人而乘君子之器處非其所適啓謀利者覬覦之心盜思奪之矣其所以然者何哉蓋小人竊據所乘上則不忠而慢乎君下則不仁而暴其民謀利者得執之為名而盜思伐之矣此豈人之咎哉猶之我慢其藏是我教人之盜之也我冶其容是我教人之淫之也易曰負且乘致寇至正言六三無德據位而為盜之招也此作易者所以為知盜也觀於此則為人臣者當度德量力不得妄居高位以貽尸素之譏為君者尤當辨材授官不得輕褻名器以開僥幸之路庶幾政平事理而無致寇之患也歟天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一章是言天地之數由圖而載揲蓍之法由圖而出統而歸之於神而此二節乃言河圖之數也變化指五行之生成而言鬼神指隂陽之屈伸往來而言孔子意曰昔伏羲時龍馬負圖而出於河其背上旋毛有自一至十之數人但知其一六居下二七居上三八居左四九居右五十居中而不知其何所屬由今觀之天為純陽其數竒圖之一三五七九皆竒則皆天數也地為純隂其數偶圖之二四六八十皆偶則皆地數也河圖具天地之數如此統而計之彼一三五七九屬天是天數有五也二四六八十屬地是地數有五也五數在圖各有定位是為五位而五位又相得而各有合焉何謂相得一與二三與四五與六七與八九與十竒在先偶在後其序秩然不紊不有如兄弟之相得乎何謂各有合一與六二與七三與八四與九五與十竒主施偶主承其交肫然無間不有如夫婦之有合乎至若以天之一三五七九總之其數二十有五以地之二四六八十總之其數三十合天地之二數則有五十有五而相得有合之數全矣由此而變化於此成焉蓋陽主變隂主化天以一三五生水木土陽變也而地以六八十化成之地以二四生火與金隂化也而天以七與九變成之變起於天者化成於地化起於地者變成於天人但知變化之成而不知所以成變化者此數為之也由此而鬼神亦於此行焉一二三四五生數來而伸也然始生雖來而伸既生則往而屈矣六七八九十成數往而屈也然既成雖往而屈方成則來而伸矣來與往相倚伏而鬼神遞運於不窮屈與伸相始終而鬼神默移於無迹人但知鬼神之行而不知所以行鬼神者此數為之也其功用之妙如此按興神物以前民用固非聖人不能然皆本乎理之自然未嘗強為之説故河圖之數變化無窮而對待流行自有一定而不可易者伏羲觀圖作易以泄天地之竒文孔子就易按圖以明天地之常理兩聖人之所見如出一揆云爾大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒于扐以象閏五歲再閏故再扐而後挂乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也此三節是言揲蓍之法以見策數之各有所象也衍推衍也四四數之也竒零餘也孔子意曰河圖具天地之數而聖人之蓍法由此起焉河圖之數始於中宮以中宮之五為衍母次十為衍子以五之一而乘其十是謂小衍小衍則一十矣以五之一而各乘其十是謂大衍大衍則五十矣故蓍策之數有五十焉及其揲之也以右手取一策反於櫝中虛一不用以象太極之體其用止四十有九於是將四十九策隨手中分置之左右左以象天右以象地是分而為二以象兩儀也隨取右手一策挂於左手小指之間以象人處天地之中是挂一以象三才也於焉兩手所分之策多寡猶未辨也乃用左手取左傍之策以右手四四揲之復用右手取右傍之策以左手四四揲之以象春夏秋冬之四時是揲之以四以象四時也四數之後各有零餘於是將所揲餘策或一或二或三或四扐於左手第三四指之間亦猶一歲之中氣盈朔虛積之以成閏是歸竒于扐以象閏也然不惟扐而又再扐者何也蓋一歲之中氣盈六日朔虛六日積三歲多三十六日以三十日為一閏其餘六日又遲二歲則更積二十四日合前所餘六日共三十日為再閏是謂五歲再閏歷法如是故揲蓍之法既揲左而扐左又揲右而扐右則前之策無餘矣然後别起挂揲以為後揲之端亦猶五歲之有再閏也蓍既揲矣而過揲之策亦各有所象焉蓋揲蓍之法每一變後餘四者為竒餘八者為偶竒圓圍三偶方圍四三用其全四用其半以三變之餘通計之去其初挂之一餘一十二策者謂之三竒一竒圍一三則三竒共圍三三而為九九者老陽之數也餘二十四策者謂之三偶一偶用一四之半則三偶用三四之半而為六六者老隂之數也餘十六策者謂之二竒一偶其數得八而為少隂餘二十策者謂之二偶一竒其數得七而為少陽老陽餘一十二策則過揲之數有三十六策也一爻三十六六爻則二百一十有六矣老隂餘二十四策則過揲之數有二十四策也一爻二十四六爻則百四十有四矣合乾坤六爻之策凡三百六十與期之日適相當焉蓋一歲之中雖有氣盈朔虛之不同三百六十日其常也至於二少過揲之數合之亦總不外三百六十可見時令之行歲序之紀無不出於其中聖人豈無本而臆為此法者乎統上下經二篇過揲之策計之二篇中之陽爻皆乾也陽爻百九十二每一爻三十六則有六千九百一十二策二篇中之隂爻皆坤也隂爻百九十二每一爻二十四則有四千六百八策共萬有一千五百二十適與萬物之數相當焉蓋物之形化氣化雖不同而萬其大數也按揲蓍之理於至明顯中寓精微之妙其適相符會若有天造地設而非人力所能參者其揲之之法當參觀之易學啓蒙一書則如指諸掌矣是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所為乎此五節是言成卦之次第及卦變之妙用又總數法而歸之於神也引加長也伸舒展之也長增益之也神德行即鼓舞盡神之謂使之莫知其然而然也孔子意曰夫蓍法既合於造化如此若用之以求卦又有序焉不可紊也凡卦始於一變謂之易而易何自成乎分二挂一揲四歸竒經四番經營然後或為竒或為偶而易自此成矣此一變也由是三變成爻積之十有八變則六爻皆成然後內外以全貞悔以備而卦於是乎成矣然此乃大成之卦也未有內卦不立而成外卦者方其三十六營以成九變則三畫以具或為乾坎艮震或為巽離坤兌雖外卦尚須九變然內體之卦從此已立而可謂之小成矣六爻既備卦變亦可考而知焉一卦之中老少形而動靜異或變在動或變在靜引其變之端而伸之則一卦可變為六十四卦一卦既變諸卦不可類推乎即以引伸者觸其類而長之則卦卦可變為六十四卦由是吉者趨凶者避天下之能事畢具於此矣蓍卦之變如此其功用何如哉吉凶有不易之理則曰道道至微也而易有辭以顯之趨避之理得之心而見之行則曰德行德行至顯也而易有數以神之夫惟顯之神之如此是故明則有功於人事方卜筮之時受命如嚮儼若賔主之酬酢焉幽則有功於造化開天下之志成天下之務有以贊神化之不及焉故曰天下之能事畢也夫人能因數以成變因法以明理知數法之變化者其知出於理勢之自然而非人力之可與者乎數也法也一變化也其不得不變不得不化者神也知變化則知神矣按天地間有理則有氣有氣則有數龍馬鍾天地之靈泄天地之祕其背上旋毛不過自一至十之數耳而五行之生成造化之功用悉具焉聖人起而制揲蓍之法為天下萬世明得失決趨避其禆益於人世者豈淺鮮哉有河圖而天地之數明有聖人而圖數之功顯此數學之所以大而聖人之所以幽贊神明也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此一章是言易之有功於天下聖人之有功於易而首一節正言易之為用至大也器一定之理變七八九六之變象老少動靜之象孔子意曰聖人本道以作易易之既作道即在易易有聖人之道四焉四者何辭變象占是也聖人以道而繫之於辭固曲中而不越者也人之欲以言商確乎事者尚乎卦爻之辭以為言則淺深詳略各當其可矣聖人以道而裁之為變固屢遷而不居者也人之欲以動措置乎事者尚乎卦爻之變以為動則經權常變不膠於一矣彼裁制於心而欲事有定理者是謂制器則尚乎隂陽老少之象蓋象者變之已定者也尚之則確然不易可以成務矣彼兩可於心而欲決其所疑者是謂卜筮則尚乎吉凶得失之占蓋占者辭之已決者也尚之則從違已斷可以通志矣於此可見易之道開於天地成於聖人用於天下大而家國天下之事小而日用事物之理易皆有以範圍之而不能外大哉易之用乎是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此此一節是言尚辭尚占之事也為為之於身也行行之於天下也命卜筮者之言也如嚮應之速也孔子意曰人之所以尚辭尚占者以辭占之至精也是以君子將有為於一身將有行於天下此時吉凶未定抱蓍問易求卦爻之辭占以決其從違易則受人之命隨叩隨答應之甚速如嚮之應聲凡逺而時地之遼廓近而時地之現前幽而事幾之潛藏深而人心之不測無有逺近幽深而來物之吉凶無不周知焉此由辭占之理純粹不雜其於天道人事究極微密惟天下之至精故能如此非然者安能應之速而無遺如此哉按辭占為卜筮而設而孔子謂之至精者蓋易之理上窮天道之藴下推物則之原細微曲折無一滲漏則豈獨為卜筮之書哉參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此此一節是言尚象尚變之事也參參酌之意伍互合之意錯綜即以參伍者而錯綜之考核之意孔子意曰人之所以尚象尚變者以象變之至變也蓋卦始於一變而變何以成是有參伍之法在始則參之各數其左右之所歸繼則伍之總數其左右之所扐則其策或八九之多或四五之寡而其變成矣此四營成易所謂一變也凡爻成於三變而爻何以成是有錯綜之法在即其參伍者分之左右交錯以稽其變列之低昂總挈以合其歸則其數或九六為老或七八為少而其數明矣此三變成爻所謂一爻也然則參伍以變特一變耳尚未成爻也通三變而皆此參伍則天地之文不成於通變中乎蓋天地之文隂陽老少而已變既通則竒偶錯陳老少間雜宛然天經地緯燦然而成章矣錯綜其數特三變耳尚未成卦也極六爻之數而皆此錯綜則天下之象不定於極數中乎蓋天下之象隂陽動靜而已數既極則天地水火雷風山澤宛然事物之象一定而不易矣此由象變具圓神之德妙屢遷之用惟天下之至變故能如此不然者安能成文定象若此哉按象變祗此蓍數而謂之至變者蓋象變之在易活潑流動無一毫凝滯之纍故能竒偶動靜惟變所適而文與象已具焉此以動以制器者所以必尚之也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此此一節是極言精變之妙也神即精變之所為非精變之外别有神也孔子意曰嘗統精變之妙而計之更有不知其然而然者凡物有心則有思有為易無心也何有於思何有於為方其蓍未揲卦未求時辭占象變泯然無迹寂然不動也及其感而揲蓍求卦也則受命如嚮來物遂知文象遂見則感而遂通矣天下之事本有吉凶易則直指吉凶以示人所謂通天下之故也若此者以辭占至精而精之所通者無方象變至變而變之所通者無體惟天下之至神故能如此非然者安能體用交備動靜咸宜若此哉蓋凡天下之物一於寂者淪於無倚於感者滯於有皆非神也易則無思而無不思無為而無不為是以寂不終寂感而遂通洵乎精變之至神妙無方也此聖人繫辭觀變畫象玩占之功濟萬世而不窮者歟夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也此三節究言易道本於聖心而贊聖人作易之功大也孔子意曰夫易固至精至變至神矣然非易自能精變神也聖人為之也天下吉凶禍福之理隱於無形謂之深深則最難測識而易之卦爻無不備也隂陽老少兆於微茫謂之幾幾則極難剖判而易之蓍策無不具也夫卦爻所具幽逺不測之深蓍策所備微茫難判之幾乃聖人所以究而極之精而研之著為辭占制為象變以開示夫天下後世者也極深以為至精研幾以為至變而神即寓於精變之中矣易之至精既由聖人之極深而成是辭占所具皆幽逺莫測之深也唯深故受命如嚮遂知來物而有以通天下之志易之至變既由聖人之研幾而成是蓍策所兆皆微茫難判之幾也唯幾故成文定象制器斷疑而有以成天下之務唯深幾皆出於自然而神也故無方無體感而遂通不必疾而自速不用行而自至也吾所謂易有聖人之道四焉者正謂聖人極深而為辭占可以通志研幾而為象變可以成務而通志成務一統於至神之謂也可見聖人之道隂陽不測之神也按上章總言易之神此言易之神足為人尚而實本聖心之神推之為大易之神故分之為辭占象變統之為精變神而實本於聖人極深研幾之一心然則欲求聖人之道而會聖心之神者舍學易曷由哉子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑此一章專言卜筮而此一節則統論易為通志成務斷疑之書以明易之功用大也易指蓍卦爻言物指人言開物謂使人知吉凶成務謂使人知趨避冒謂統括也孔子意曰夫易有蓍有卦有爻更伏羲文王周公三聖人而成書必有莫大之用具乎其中而易果何為者也夫易恐人迷於吉凶而得告吉失告凶以開發夫顓蒙恐人眩於趨避而吉使趨凶使避以成就夫事務且天地人物之理盈虛消息之數無不該括於卦爻之中而統冒夫天下之道焉易之為用如斯而已者也是故聖人欲開天下之物而不能自開也故制為卜筮使人不迷乎吉凶以開通天下之志欲成天下之務而不能自成也使人因卜筮所告而勇於趨避以成定天下之業欲冒天下之道使巨細靡遺也故立卦生爻使人觀象玩辭不惑於義理觀變玩占不淆於從違以斷天下之疑焉易之有關於民用如此聖人作易烏可已哉按人生而蒙愚昧未明有父兄之教不能入帝王之令不能行者易昭告吉凶之道如夢頓覺故曰開自建侯行師用獄治歷以至纎細不可枚舉易斟酌從違之宜受命如嚮使人鼓舞不倦有始有終故曰成上自造化氣運之大下及人心念慮之微逺近幽深自卦爻一設包舉其中一無所遺故曰冒天下之道是易賴聖人以成能斯百姓皆可以與能也是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫此一節是言蓍卦爻之德本於聖心以明作易之原也圓神謂變化莫測方知謂定理昭然易貢謂變易以告人孔子意曰夫聖人何以能通志成務斷疑也以蓍卦爻也是故易有揲蓍之法其竒偶老少參伍錯綜圓通不滯而神妙莫測其德不圓而神乎揲蓍所得之卦其中吉凶得失之理盈虛消息之數燦然備陳而範圍莫過其德不方以知乎至發揮於剛柔而效天下之動者爻也爻各一其位位各一其時事因時變辭以情遷其隨時化裁之義非變易以貢人之求者乎此其所以能通志成務斷疑也夫蓍卦爻固足以通志成務斷疑矣使非聖人有洗心之功則亦烏能出其心之神知以生蓍立卦生爻哉聖人知吾心之神本能知來吾心之知自足藏往但恐洗心之功不純使此心馳騖而不存物我有間而不公吾心遂昏昧而不神障蔽而不知耳聖人知其如此也以此日新又新洗濯其心不使有一塵之纍復凝精聚神斂視返聼退藏於宥密淵深之地而存存不息且物我之見皆忘彼此之形悉化或吉或凶與民同患由是一心澄定全體瑩然凡吉凶未兆謂之來來固未易知也而聖心之神善必先知其吉不善必先知其凶光照所燭巨細靡遺事理已定謂之往往亦未易藏也而聖心之知所見以為可者千百世莫能移所見以為否者千百世不能外睿照所及確不可易知來藏往聖心之神知如此其孰能與於此哉唯古之聰明睿知神武而不殺伐之聖人始能不假蓍卦爻而知吉凶也夫按上章言易之辭占象變為聖人極深研幾之書此章揭出洗心二字正極研之實功作易之大原也吾心之神即天地萬物之神人皆有此心心咸具此神然知來藏往獨讓聖人而他人不能者有所蔽也其有所蔽者無洗心之功也聖人能洗其心故能全其神退藏者存存不息也同患者物我無間也知來藏往則其自然之能事也孔子不惑知命耳順從心非洗心之純何以臻此哉是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫此一節是直指聖人興蓍之實也興神物謂制揲蓍之法齋謂齊在內之思慮戒謂間在外之物誘孔子意曰夫聖人之神知既逈絶乎人是以洞燭乎天道之盈虛消息而契吉凶之原詳審乎民情之愛惡攻取而識吉凶之故於是制為揲蓍求卦之法出吾心之神知興此神物以通志成務斷疑而前民用焉民用前而民行濟聖人吉凶同患知來藏往之神知及於天下後世矣然非有洗心之功不及此聖人所以湛然純一齊其思慮肅然警惕間其外誘以神明其德而使之能知來藏往者其以此夫按齋戒二字便是聖人洗心之功聖人有洗心之學然後有神知之用亦必有洗心之學然後能出其心之神知以興神物而前民用至神物興而民用前則一時用之聖人之神明及於一時萬世用之聖人之神明通於萬世矣使不能齋戒以洗其心則吾之德先有所滯而不神有所蔽而不明亦烏能明天道察民故興神物以前民用哉是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神此一節詳言制蓍之由以明前民用之實也闔戶指氣機收斂言闢戶指氣機發生言見謂萌芽初生形謂體質已成制用謂制為揲蓍之法用之以卜吉凶也孔子意曰夫神物興於聖人而生於天地是故造化一氣流行即萬物出入之戶時乎靜而氣機收斂如戶斯闔隂氣用事故謂之坤時乎動而氣機發生如戶斯闢陽氣用事故謂之乾一闔一闢隂陽交換如環無端不謂之變乎闔極而闢闢極而闔流行旋轉往來不窮不謂之通乎夫乾坤變通化育之功如此由是自無生有萌芽初見倣佛未形止謂之象及其著見成形體質已具一定不移乃謂之器象器既具而蓍生於其中矣聖人法乾坤之道準變通之宜制為大衍五十之數使人用以筮而四營成易十有八變成卦受命如嚮感而遂通不謂之法乎由是法立而出入之度以昭民用之出而利民用之入而利一出一入民咸用之鼓舞於趨避而不知其所以然不謂之神得乎此聖人興神物以前民用之實也按蓍亦植物中之一物耳使不遇聖人何由而知為神物使非聖人神明化裁制而用之則神物終屬無用之物亦烏能自著其神耶故神物非神必經聖人之裁制而後成其為神至於利用出入民咸用之則聖心之神直貫乎天下後世矣故謂神為蓍之神可也謂神為民之神亦可也其實皆聖人之神借助於蓍之神以鼓舞乎斯民之神耳是故易有大極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業此二節是言聖人畫卦之序以徵民用之所由前也大極謂至極無上以主宰萬化之理言兩儀謂竒偶四象謂老隂老陽少隂少陽八卦謂乾兌離震巽坎艮坤孔子意曰聖人既興蓍以妙其用必先有卦畫以立其體是故儀象八卦皆隂陽之變化所謂易也易固生生不已變化無端矣然必有至一不變之理主宰於中以為生生之本大極是也大極動而生陽聖人因畫一竒以象陽靜而生隂聖人因畫一偶以象隂大極生兩儀而兩儀一大極也兩儀之上各加一竒一偶而太陽少隂太隂少陽之四象生焉太陽少隂之上再加一竒一偶而生乾兌離震太隂少陽之上再加一竒一偶而生巽坎艮坤四象生八卦而四象八卦亦一大極也由是八卦既成引伸觸類六十四卦三百八十四爻莫非八卦之錯綜變化其間時有消息位有當否得失既殊吉凶立判八卦不可以定吉凶乎吉凶既定趨避昭然一時用之可生一時之大業萬世用之可生萬世之大業真可以通志成務斷疑而前民用也又何一非大極之所生所定耶按易之八卦方圖具有生兩生四生八之象儒者相傳以為畫卦之由但細玩定吉凶生大業之言分明是揲蓍之事則兩儀四象即揲蓍所得或四或八竒偶兩儀三竒三偶之老陽老隂一竒二偶一偶二竒之少陽少隂也下文云易有四象所以示也若以四象為指兩畫言如何示人以所值之卦爻乎此章先言蓍之德次言卦爻之德昔者聖人章先言生蓍後言立卦生爻分明有蓍而後有卦有爻生蓍立卦生爻是一時事人知揲蓍為後人用易之法而不知即聖人作易之原上言興神物以前民用繼言制而用之謂之法而易有大極則詳言興蓍制法之序也易者儀象卦爻也大極者大衍之數也兩儀者四營所成之竒偶也四象者三變所得之老隂老陽少隂少陽也八卦者十八變所成六畫之卦也言八卦而六十四卦在其中矣十八變所成之卦始可以定吉凶生大業若三畫之卦如何定吉凶生大業乎或疑大極如何是大衍之數曰聖人明言大衍之數五十其用四十有九用者大極之用其一即大極之體體靜而用動也乾坤之策三百六十二篇之策萬有一千五百二十六十四卦之策妙合天地萬物之數而皆統括於衍數之中故自其數之推衍無可復加而言謂之大衍之數自其範圍天地萬物包含儀象卦爻而言謂之大極先儒周敦頤所論大極指無聲無臭之理言所謂兩儀指天地流行真隂真陽之氣言也孔子所謂大極指統括天地萬物之衍數而言所生兩儀指分二挂一揲四歸竒所得或四或八之竒偶而言也周子借大極二字論天地生生之理孔子則詳言制法興蓍之序義各有屬其實大衍之數原從圖書中五衍成括盡天地萬物之數而中五渾淪未發括盡天地萬物之理是言數而理即寓於數之中言理而數即含於理之內神而明之非有二也是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜此一節是即造化人事而極贊蓍龜之功用大也孔子意曰易能定吉凶生大業功用之大如此試再即造化人事而究論之是故有形可法有象可像者莫大乎天之無不覆地之無不載也而天地之變化莫測流通不窮者莫大乎四時之推遷錯行也至縣象於上而著明於下者莫大乎麗乎天之日月也若夫效天法地而成位乎中則端有藉夫崇高之位而崇高莫大乎富有天下貴為天子焉若夫效四時之變通盡利神化宜民則端有賴夫制作之利而廣備諸物因其材質以致之於用竭耳目心思立一成之器以為天下萬世之利者莫大乎聰明睿知之聖人焉若夫法日月之明極制作之大探討夫事理之繁賾而精識其原詳索夫事機之隱伏而洞悉其故研究夫性命不測之深而鈎之使顯窮極夫千萬里千百世之逺而致之使近因明得失之報以定天下之吉凶使之勇於趨避鼓舞不倦成天下之亹亹者有大乎聖人所制之蓍龜者哉甚矣聖人興神物之功大也按自古蓍龜並重此章但專言筮法首節言易為開物成務冒道之書次節即言蓍卦爻之德是明言易為蓍卦爻也三節言興神物以前民用興神物即立揲蓍之法四節言蓍生於天地制於聖人大極二節則詳言生蓍立卦之序以明前民用之實也前後俱是論蓍所謂莫大乎蓍龜者乃因蓍及龜見蓍之定吉凶成亹亹與龜同耳聖人興之制之則之總是揲蓍之事時講蓍龜並重失聖人立言之旨矣是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也此二節究言聖人作易之由以明通志成務斷疑之故也神物與前神物同指蓍言變化指隂陽言垂象指日月星辰言四象謂隂陽老少示謂示人以趨避動靜之宜孔子意曰夫蓍之定吉凶成亹亹既與龜同則聖人興蓍之功大矣是故易之有蓍也非聖人自為之也蓍之生也一本百莖下有神龜守之固天生神物也聖人則之立揲蓍之法而圓神之德備焉易有卦象內含變化亦非聖人意為之也天地隂陽闔闢變化無窮聖人效之畫卦立象變動不拘剛柔相易而方知之德備焉易有吉凶之辭亦非聖人自為之也天垂日月星辰循序失序之象而見得失吉凶之徵聖人象之繫彖爻吉凶之辭而易貢之義昭焉然則蓍也卦也爻也無一而非易也實無一而非數也是豈無所則哉天不愛道龍馬負圖而出於河以五生數統五成數而同處其方數之體也地不愛寶神龜載書而出於洛以五竒數統四偶數而各居其所數之用也總之皆易理也聖人則圖而用摩蕩之法其所為儀象八卦者已備則書而用縱橫交錯之法其所為儀象八卦者亦符易皆因造化而作也聖人豈強為哉合而觀之易有七八九六隂陽老少四象所以示人以動靜從違之準而通天下之志也於象之所示而繫以彖爻之辭所以告人觀象玩辭觀變玩占而定天下之業也且卦有小大辭有險易因其得失而定其或吉或凶所以決其何者當趨何者當避而斷天下之疑也易之為用豈不大哉按此章頭緒甚多總是承上章言蓍之所未備故朱子以為專言卜筮然要皆原於造化而神明於聖人之一心聖人能洗心以神明其德故能則之效之象之興蓍立卦生爻以通志成務斷疑建範圍天地之業曲成萬物之功聖人作易之本既自洗心中來後之學易者茍無洗心之功則又焉能神明其意而收寡過之效哉易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也此一節是釋大有上九爻義見惟德可以動天也此節錯簡宜在第八章之末孔子意曰易大有上九曰自天祐之吉無不利天豈私祐上九哉有所以致天之祐者在也蓋祐之為言助之義也天人雖殊理則一致天之所助者順也順則不悖於理故天助之人之所助者信也信則不欺乎人故人助之天人所助既在順信則不必問天不必問人但問我之順信何如耳今上九以剛居上而能下從六五是身所履者信而動必以實心所思者順而慮以下人以此信順又專尚六五之賢如此滿而不溢盡處有之道而克當天心是以自天祐之而吉無不利也按爻但言天而孔子兼言人者天空虛無憑而人真實可據倘言天不言人恐人疑其為矯誣上天且懼世之不盡人事者或諂事鬼神妄希福祐故以人之所助實之見上九之所謂天助者實不出此人助之外也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神此一章見易為聖人盡意之書用易者貴神明其意而此一節則先言聖人作易之事也象指卦畫竒偶言卦指六十四卦言孔子意曰流行於天地萬物則為道存於聖人之心則為意意發而為言言筆之為書是道意者言而載言者書也然書固所以載言而實不能盡言言固所以道意而實不能盡意然則聖人明道覺世之意其終隱而不可見乎非也聖人知天地萬物之理不外隂陽於是畫一竒以象陽畫一偶以象隂則大而天地小而萬物精入無形粗及有象悉包括於中而聖人之意盡矣然人之善惡萬變不越情偽兩端使無道以彰其情偽聖人之意猶未盡也於是即八卦竒偶之象因而重之為六十四卦卦有隂陽淑慝而人之愛惡取舍事變萬端莫能逃其範圍豈不可以盡情偽乎又懼人不能即象以會意即卦以究情偽也復即象之失得卦之大小而繫以吉凶悔吝之辭以盡其言使人因言以會意因言以辨情偽而聖人之精藴益以闡矣夫聖人之意固欲以利天下也人亦孰不欲利特無聖人之辭以指示之因冥行罔覺窮弗能變變弗能通耳聖人既立象設卦復繫以辭明示天下後世以窮變通久之道天下後世之人靜則觀其象而玩其辭動則觀其變而玩其占自能通變趨時無往弗順且趨避之際鼓舞不倦莫測其端莫知其然非所以盡利盡神乎至於盡利盡神而聖人之意尚有弗盡乎按聖人作易之意總是教人趨吉避凶而吉凶原於善惡善惡根於情偽順其性則為情拂其性則為偽情則為君子偽則為小人故從來純忠至孝祗求愜乎至情而元惡巨憝總以行其大偽孔子釋乾二爻曰間邪存其誠誠者情也邪者偽也使人人皆能間邪存誠祛偽盡情而聖人之易亦可弗作矣無如人之行詐者多率性者少始或徼幸一時終必納諸罟擭陷阱而罔知趨吉避凶之道此立象設卦繫辭之所以不容已也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業此二節見易不外於乾坤以明聖人立象盡意之實也緼衣中之絮謂包蓄也乾坤指卦畫竒偶言乾坤息之乾坤指天地之功用言孔子意曰夫立象所以能盡意者以聖人之意盡於易而易盡於乾坤也六十四卦莫非乾坤之變化故易得乾坤而成易猶衣得絮而成裘也試觀乾父坤母左右成列而隂變為陽陽變為隂變化無方之易已立乎其中矣使乾坤卦畫毁而不立則不知何者為隂何者為陽是乾坤毁則無以見易也聖人因天地有自然之易故畫卦作易以形容之使人即乾坤卦畫之變化因以識天地隂陽之變化此畫卦立象之旨也若乾坤之卦畫毁而不可見則隂陽變化之妙無由而測識其端而乾坤之功用或幾乎息矣乾坤之功用幾息而聖人之意又何由而見耶甚矣立象之不可已也是故乾坤一竒偶也竒偶一隂陽也自其超於隂陽竒偶之外而不以形象囿者形而上者也斯則大極真機主宰夫有形之器者謂之道道固乾坤之精也若夫有形可見有象可求者形而下者也斯則有體有質承載夫無形之道者謂之器器乃乾坤之迹也因乾坤自然之化而制為七八九六之數剛柔相推隂陽互易不可為典要惟變所適故謂之變推此化裁之變而行諸日用動靜之間則吉凶明而趨避決事無疑而行不滯不謂之通乎舉此變通之法措諸天下之民使天下之民皆知變通趨利鼓舞不倦則志通務成聖人道濟天下之事業孰有大於此者哉信乎乾坤為易之緼而立象果足以盡意也按形上形下二語論道器精粗最為該括乾坤二字有指天地隂陽言者有指卦畫竒偶言者自卦畫言之則卦之竒偶為形下之器而竒偶中所寓之精意乃形上之道自天地隂陽言之則成象於天成形於地者為形下之器而主宰夫是綱維夫是弗見弗聞無聲無臭者乃形上之道合隂陽竒偶言之則一隂一陽流行不息盛德大業化育無窮者形而上之道而象者像此爻者效此剛柔竒偶確然可據者乃形而下之器也要之非道無以宰器非器無以顯道有隱見之别無彼此之分知此則知聖人立象盡意之旨矣是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行此三節是申言象所由立以示用易者貴即象以會意得意而忘象也上言謂之變謂之通指作易言此言存乎變存乎通指用易言明謂明卦爻變通之理孔子意曰聖人固立象盡意矣夫象豈無所見而能立哉聖人有以見天下之賾莫非道也於是擬諸其形容而畫卦立象以象其事物之宜是象乃以象乎其賾者也是故謂之象象立而卦立卦立而爻生焉爻亦非無所見也聖人有以見天下之動亦莫非道也於是即其動而觀衆理之統會以求一理之可通即可通之一理以立為不易之典常合此典常則繫辭焉斷其為吉悖此典常則繫辭焉斷其為凶是爻乃以效乎其動者也是故謂之爻可見象爻雖形下之器而實寓夫形上之道故極天下之賾而精粗靡不窮盡者實存乎卦觀於卦畫之純雜而天地之撰萬物之情皆可會也舍卦而何以極天下之賾也鼓天下之動而使之亹亹不倦者實存乎彖爻之辭玩其辭之何以吉何以凶而趨避之意不覺踴躍奮迅油然而生也非辭而何以鼓天下之動也化裁謂變是易中已具化裁之變以備人揲蓍之用人茍欲決從違審動靜化裁適宜即存乎七八九六之變察其隂陽老少而動靜從違之宜決矣推行謂通是易中原有可行之通以備人推行之用人茍欲趨夫吉避夫凶通達無礙即存乎變化可行之通宜動則動宜靜則靜自然動靜允協行無弗利矣夫卦爻雖具此變通之理而天下未必皆善用易之人以其滯於象器而不能神明其意即不能神明其道也誠能齋戒洗心以吾心之神會作易之神即象以識其意即器以悟夫道此存乎善讀易善用易之人而未可概責之天下也若夫神明於心即默成於身不睹不聞之際有暗然日省之功不徒事言論講説而存存不息無一毫虛偽欠闕此非素有修德凝道之學至於德成行備者不能也豈不存乎德行哉按孔子言君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利夫君子固所稱神明默成之人也所以觀象玩辭者正以卦能極天下之賾辭能鼓天下之動也所以觀變玩占者正以化裁存乎變推行存乎通也自天祐之不亦宜乎日講易經解義卷十六
