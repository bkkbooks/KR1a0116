body:
  text: 欽定四庫全書日講易經解義卷九離下坤上眀夷以明而見傷為義日入地中明傷昏暗之時非處順安常之日也所以他卦多言利貞而此獨曰利艱貞者雖守正而亦不得直遂其正故當艱難以守正也卦辭止言其理彖傳旣釋其義復舉其人以明之如文王箕子俱當明夷之時但所居之位有逺近故所處之道有難易此彖傳獨以箕子當六五一爻而繫以利艱貞之義也六爻下三爻離體明也上三爻坤體暗也上六暗極為明夷之主自五而下皆受傷者也初明雖傷去上最逺垂翼而已二視初稍近去上猶逺雖見傷而未切亦在速拯之耳三則與上為正應可以南狩而獲其大首矣四入坤晦之門庭其暗尚淺有可去之道惟五則近於難義不可去亦惟艱貞自晦其明而已聖人處明夷之道淺深逺近各有不同於此可見矣明夷利艱貞此卦離下坤上離明為坤地所掩是君子之道為柔暗所傷故為明夷卦辭言人臣遇難當守正保身而曲全其道也艱者敬愼之意貞者正固之心文王繫明夷彖辭曰君子遭逢盛世君明臣良斯可危言危行遂其有為之志今卦象離居坤下明體見傷時固不可為而勢亦無能為矣然君子處患難之道不外於一正自持惟委曲盡忠而行其艱難之貞焉旣不唯諾以徇俗亦不激亢以傷時處亂之道惟此乃為利也盖人臣謀人家國之際其道莫艱於處晦以全忠如使枉道而徇物則將順逢迎之罪固已非貞而欲抗志以匡時則禍患戮辱之來又多不利曰利艱貞者貞由艱出而因艱以行其貞於委曲補救之中而不失其自靖自獻之節此非學問旣深而涵養裕如者不能故孔子釋彖以文王箕子當之也彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之此彖傳是釋明夷彖辭言處難之道而兩舉古人以示法也孔子釋明夷彖辭曰卦象離為日坤為地以離在坤下明入地中有似明之見傷於地者故名明夷夫明入地中固有取於明夷之名矣乃觀諸卦德内文明而外柔順則是睿知中涵素具夫燭照之明而謙恭外昭克篤夫忠順之守以是當宵小之讒譖觸暗主之雷霆而蒙犯大難焉古之人有用此道者其文王與紂之時乎盖文王躬遭困辱囚於羑里而緝熙之德自存事殷之禮不廢故紂雖肆虐於天下而文王得以保其身是處明夷以一卦之道者文王也辭曰利艱貞者觀諸卦體六五一爻居暗地而近上六則是雖有柔中之德本之以昭昭而恐被暗主之傷處之以汶汶自晦其明正艱貞之義也夫身為至親處勢甚近有不可避之難而周旋委曲以行其正古之人有用此道者其箕子居紂之朝乎盖箕子爲殷宗親在其國内而佯狂之辱不逃貞明之志不亂故紂雖肆虐於家而箕子得以保其身是處明夷以一爻之道者箕子也此可見文明柔順本立身之大防而正志艱貞尤處患之善術人臣當患難之來各視其一時之所處若夫義旣不可避誼又無所逃與其顯而抗志徒自蹈於危亡孰若晦而藏脩審其幾於權變古之人操心危慮患深誠有跡愈難而心益貞者迄今讀聖明之操麥秀之歌其柔順晦明爲何如哉象曰明入地中明夷君子以莅衆用晦而明此象傳是言君子臨民不貴苛察惟善用其明而明自不息也孔子釋明夷象曰日入地中明而見傷明夷之象也君子當明夷之時非明無以審事物之理度時勢之宜將倀倀莫知所之矣然一自暴露其明則又觸乎物之忌而懼反爲明之累故其臨莅乎衆也必用晦而明見雖足以察於幾微而不以苛核失含宏之度智雖足以燭於隱伏而惟以端黙宏坐照之神盖不以明為明而以晦為明者也以是而徃則内不失已外不失人處明夷之道孰有善於此者乎昔人云自治用昭去惡乃盡莅衆用晦太察則傷是故日無明暗之分言其體也而晷有晝夜之别象其用也君子於此宜三致意焉又豈獨處明夷之時為然哉初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也此一爻是言君子當見幾而作乃可免於患也于飛行道之象垂翼見傷之象周公繫明夷初爻曰君子得時行道如鳥奮翼而飛今初九陽明在下明夷之初患雖未及而諫不行言不聽道已難行為于飛垂翼之象君子處此惟有早去而已縱所值之困不能安其身至於三日不食吾不得辭也縱所如不合動而得咎至於主人有言吾亦不暇避也盖君子而行雖不免困窮言語之傷而吾之晦其明者猶可以自全君子不行即或免一時之謗而禍亂旣至欲晦其明而不可得終於見傷而已此處明夷之時者宜早為之圖也孔子釋初象曰君子見幾逺去可以速則速則初九之于行豈迫於勢而不得食哉直斷之於義耳義當早去則愛其道更甚於愛其身雖至不食又何足惜甚矣去就之宜决也按繫辭云君子見幾而作不俟終日故幾者動之微吉凶之先見而非衆人所能識也士不幸値頽敝之世自當揆乎義理之宜決乎出處之介高蹈逺引以全身名豈得隱忍遲疑而陷身不測乎此薛方所為保身而自全揚雄所為投閣而不免也吁可慨哉六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也此一爻是言二傷猶未切而示以速去之道也夷于左股是傷猶未切之象股在脛足之上於行之用不甚切左又非便用者故云傷猶未切也拯救也馬壯如馬之壯者能速行也周公繫明夷二爻曰君子得位行道固欲彰其有為之才亦必一德同心方可展其救時之用今六二以明德處暗地較之初九則位已近君然志欲于飛而事多掣肘如傷其左股之象當此時而不去必且身中危機即去而不速亦恐禍患尋至故為二計當速於決去如用馬壯之速以救之則可以全身免禍而吉矣孔子釋二象曰六二所處較近於初而乃得吉者何哉葢知禍將及時可去而不違其時順也去而適合乎當然之理順以則也惟順故能合則亦惟順以則故能得吉茍或不當去而去而徒以茍免為心則揆之於時旣不能順揆之於理又失其則何吉之有哉大抵人臣之遭逢旣殊則此身之去就亦異可以久則久晦明䝉難文王箕子利在於艱貞可以速則速接淅而行孔子去齊吉因乎順則固各有其道也宋儒蘇軾釋此爻獨以二本在朝之臣當忍傷以救君之闇豈可如居下之初潔身逺去所謂用拯馬壯者竭忠盡智彌縫其闕匡救其災要在有濟國事於萬一爾此言亦有合於為臣之義故附錄之九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也此一爻是言除暴之義而示以詳愼之道也南狩向明除害之象得大首是元惡就執之象周公繫明夷三爻曰九三以剛明之德負天下之望而適處暴虐之時其勢不能不除殘以安民為南狩得大首之象然放伐大事以德伐暴其事雖貞必當審愼於其際上觀天命下察人心以不得已之衷行不得已之事然後人不以我為利天下而以我為安天下豈可以除暴為貞而亟於為之耶孔子釋三象曰上下之分無所逃於天地之間者也九三有除暴救民之志而非富天下為心者乃能行此非常之事而為伐罪之舉成大功而得天下也茍志不在南狩則是古今一罪人耳夫豈所云大得者乎從來建非常之事必先問其志之所存故志者公私之分界也志之所存與日月同其光明天人同其運會毫無自私自利之念而天下始有以諒其衷而成其功以成湯之聖而猶慮後世以為口實則豈奸雄亂賊之所可假託哉聖人繫此爻固為人君示其警誡而實以嚴千古臣心之不軌者六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也此一爻是言四能脫身逺害得遂其去亂之志也左腹暗地也出門庭脫身逺去之象周公繫明夷四爻曰坤為腹左者隱僻之所今六四居坤之下是已入暗地身處昏朝而道無由明與其抗節以死初無益於國家不如脫身而行猶不失夫明哲故飄然逺引遂其嘉遯之初懷為能獲明夷之心雖出門庭長往而不悔也孔子釋四象曰六四入于左腹而尚能獲明夷之心者盖人臣之心茍非萬不得已亦何忍舎其君父而恝然逺去今幸居暗地尚淺猶未深受其害外度之勢内度之心誠有不得不去者於是潔身而出得獲其逺害之心意而超然無累也夫六二之夷于左股其受患也淺故用拯馬壯決去而不違其則也六四之入于左腹其操心也危故出于門庭脫身而適獲其心也觀於比干之諫厲疾卽起于門庭而行遯之舉心意獲全于左腹古仁人之用心夫亦各揆其義之所是各遂其志之所安而已六五箕子之明夷利貞象曰箕子之貞明不可息也此一爻是言人臣遭内難而能正其志者也周公繫明夷五爻曰六五地處至暗乃貴戚之卿處王家之難此時諫旣不可回義又無可去惟以柔中之德不徇君之非正志而不亂亦不失臣之節委曲而不激如箕子之守正而貞焉乃為利也孔子釋五象曰箕子當内難而能正其志外固晦其明矣然其本體之明自存不可得而滅息也使明與時息則佯狂何以稱仁人之名作範安能叙彝倫之道耶盖明不可息者正晦其明而利艱貞也處箕子之地當箕子之時非艱無可為貞非晦無可為明盖箕子之明雖晦而箕子之志不可移志不移則明不息明不息而後可以為感悟君心之地矣故志愈苦者守不渝迹愈歛者幾不昧外雖不露其明而精忠炯炯於艱難之中未嘗一念回互一念間斷即運數難挽成敗難期而此心昭然固可千古矣惜乎當日之不諒其心也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也此一爻是言上甘溺於昏暗終有自隕之患也不明晦者昏暴之象周公繫明夷上爻曰上六隂柔而居坤之極乃昏暗之甚者不能自明其德以至於晦而下之受傷者衆矣然傷人之明已亦不免故始雖㨿高位而終必自傷如日之初登于天而後入于地也惟命不于常可不戒乎孔子釋上象曰六之昏暗陷溺初亦儼居尊位有照臨四國之權而縱欲敗度失綂御萬方之則所以致入地之傷而為不明之晦也盖為君者必法天以行健象日以照幽俾海内時雍臣民式化而仰欽明之至治焉斯為交泰之世矣茍或不然必致失則之咎此聖人所以垂戒於明夷之上六也離下㢲上家人男女而已正家之責男女之尊者任之九五男正乎外六二女正乎内内外旣正則卦中諸爻或為父子或為兄弟相觀而化自無不正矣故彖辭專言女貞見正外莫先正内彖傳兼言男正見正内實由正外而總以二五為正家之主若分析六爻則二柔固女也四柔亦女也婦道以順為正故一曰順以㢲一曰順在位至於初三五上皆為陽剛則皆有正外之責三以嚴五以愛初閑於始上威於終蓋因其位之尊卑性之寛嚴時之初終以各正乎外外正斯内正而家道正天下定矣家人利女貞此卦離下㢲上卦體九五六二内外各得其正是舉家無不正之人而家道以成故名家人卦辭言正家之道貴先正乎其内也文王繫家人彖辭曰君子齊家以立教固莫不欲使内外咸得其正也然家之不正恒起於婦人而家之難正亦莫甚於婦人故正家者必以正内為先務惟自脩其身以端其本使一家之中肅然有貞静之風穆然守宫闈之範則内正而外自無不正大化之源肇於此矣何利如之夫詩首周南而以關雎為始見文王之化自家而國也故葛覃樛木諸什皆脩身齊家之效而桃天芣苢則家齊而國治之驗江漢汝墳則天下平之漸矣非深有合於家人之義者乎然必有不顯無射之德立乎刑于之先而後室家以正教化以洽卜年卜世之基無不本於此也帝王正已以正家正家以正國與天下豈有外於女貞之訓者哉彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣此彖傳是釋家人彖辭言所以正家之義以明家正而化自成也女正位指六二柔順男正位指九五剛正嚴君謂一家尊嚴之主父指上言子指初言兄指五言弟指三言夫指五三言婦指四二言孔子釋家人彖辭曰卦名家人而辭言利女貞者盖一家之人内外盡之矣治家之道一正盡之矣卦體六二柔正是女秉順德貞静自守不預外事而正位乎内九五剛正是男秉健徳以義制事不牽内私而正位乎外男女有相成之體内外無侵越之嫌各止其宜而皆歸於正若此者豈細故哉乃隂陽之理萬世所不能易固天地之大義也誠明乎是義則一家之中不一者分不同者情而必有握正大之權立整齊之化所謂嚴君者以主之九五正位乎外克敦父道乃外之嚴君也男之教統此矣六二正位乎内克盡母道即内之嚴君也女之教統此矣以分而言旣足整肅乎一家之分以情而言又克聨屬乎一家之情是故教行於父子則初上秩尊卑之位善作善述而父父子子也教行於兄弟則三五定先後之序以友以恭而兄兄弟弟也教行於夫婦則五三四二嚴内外之别惟義惟順而夫夫婦婦也家道有不正焉者乎一人能盡其倫而人人皆各盡其倫家正而天下之父子兄弟夫婦定矣夫天下之大即於一家定之此家人之所關甚鉅也而正家之道必於嚴君成之此女貞之所為獨先也可見天地泰而萬物化生男女正而内外各治造物不能外隂陽而神其用帝王不能外倫紀而大其功以天下為家者欲一道徳而同風俗豈能舍宮壼之地而别求起化之原乎象曰風自火出家人君子以言有物而行有恒此象傳是言君子脩言行以端風化之本也物謂言之有實恒謂行之有常孔子釋家人象曰此卦上㢲為風下離為火風出於火如化出於家家人之象也君子以家人為風化之始而齊家之本在於脩身脩身之要在於言行言行者一家之視聽攸闗而效法所係者也使言而無物則議論皆虛何以使之承聽乎故闡明綱常本諸眞實君子之言必可守以為則焉抑行而無恒則踐履有虧何以使之觀法乎故敦篤倫理無間始終君子之行必可奉以為型焉如此則飭躬之理得而作則之道全由已以及家由近以及逺天下之定推之而莫外矣盖聖人之學無過言行兩端所以盡一已之脩者在此所以溥及物之化者亦在此而其原總本於一心心有所偽言必不能以有實矣心有所疎行必不能以有常矣惟存其心於眞純之内悦其心於義理之中則言自有物行自有恒而感人者豈徒在告語之文防範之迹乎是故君子脩言行之功必自正心始初九閑有家悔亾象曰閑有家志未變也此一爻是言能嚴於正家之始則家道可成也閑整齊之意周公繫家人初爻曰正家之道莫重於始始而不閑後必有戾將不免於悔矣初九以陽剛處有家之始是初之時固當閑而九之剛又能閑者也於是乘其嫌釁未萌急為篤肫然之愛以閑其疏復請嚴截然之分以閑其僭使一家之中尊卑之誼常明内外之情允協而相陵相凟之悔自無由而生矣孔子釋初象曰初之閑有家者盖正家之道閑之於未變者易為力閑之於已變者難為功當家人之初而能豫為之防則可潛消黙化而未變者終於不變矣此誠謹始慮終為正家久逺之道也乃知天下事嚴於其端而後可杜於其漸審於其幾而後可愼於其微是故君子於家人旣以有物有恒本身為訓而又使左右前後必聞正言春夏秋冬必習正業當氣質未變之初先有以熏陶其德性長養其才智然後教易入而化易成父子兄弟夫婦莫不各循其分敦其倫而可以世保厥家矣此則閑有家之實事也六二无攸遂在中饋貞吉象曰六二之吉順以㢲也此一爻是言女能正位乎内而有柔順之德也無攸遂謂事無專制中饋飲食之類婦人之職也周公繫家人二爻曰六二柔順中正是女之幽閒静好者舉家庭之事一統於夫子而不敢専其成所職者止在於中饋徒酒食是議耳他無所與也惟能正位乎内如此則貞淑之風以著而宜家之化以成吉孰加焉孔子釋二象曰六二克盡婦道而吉者盖由以柔居柔而有至順之德㢲以從乎夫故能必敬必戒無專制之失而昭幽貞之化此所以吉也從來隂道可以濟陽而不可以勝陽内治可以助外而不可以侵外此天地人道之正也天地得其正而後運會有常經人道得其正而後閨壼有雅化誠能體乎隂柔之德協乎㢲順之宜以正位而成家何至女德無極惟厲之階貽詬於世也哉九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也此一爻是言治家寧嚴而不可過於寛也嗃嗃嚴厲之象嘻嘻謂笑樂無節周公繫家人三爻曰治家之道貴寛嚴相濟九三剛而不中過於嚴厲使一家之人畏威懼法而不敢犯有嗃嗃之象雖似傷恩而拂情悔厲在所不免然人心祗畏内治整齊猶為正家之吉也若使一於寛和而不知嚴肅之道致使婦子嘻嘻笑語無節則縱情敗度家政日隳終必有吝矣以二者觀之與其寛毋寧過於嚴也孔子釋三象曰九三家人嗃嗃義勝於情似一以嚴為主然而法度肅倫理明於正家之道未為失也至於婦子嘻嘻則和而流寛而縱失其節矣寧能免於吝乎盖家人之情無窮易失于過節者所以防範其過也立於始為閑調於中為節非有二也言節於三以三在内外之介耳惟脩徳於躬立中正和平之極則軌物是飭旣不嫌於煩苛而樂易為懐亦不傷於放逸斯兩得之矣聖人審於嗃嗃嘻嘻之間而為著吉與吝之辨者非欲人之一於嚴也苐以寛之而無所制寧嚴之而有所守也家人有嚴君焉其即節之謂與六四富家大吉象曰富家大吉順在位也此一爻是言六四能順正以保其家也周公繫家人四爻曰六四以隂居陰而居上位是主門内之政者也秉柔順之德而握閨壼之柄為能制節謹度克勤克儉以開利之源不侈不驕以裕財之用能富其家者也由是則出入有經奢侈不作孝敬仁讓之風莫不成於富足之後吉孰大焉孔子釋四象曰六四富其家而大吉者盖以其有順德而在上位是不徒操一家之權而且得治家之道宜能永保其所有而大吉也按家人之卦四陽二隂昔人謂六二之隂持家之婦也六四之隂其主家之婦乎二惟順以㢲故克盡在下之婦道而貞吉四惟順在位故克盡在上之母道而大吉然陽為實隂為虚故小畜九五稱富泰之六四稱不富今六四以隂而稱富家者易之占法陽主義隂主利故也抑所謂富家者豈止富厚而已哉記有之父子篤兄弟睦夫婦和家之肥也家之肥即家之富矣由此推之而國之富天下之富亦豈出於此爻之義乎九五王假有家勿恤吉象曰王假有家交相愛也此一爻是言人君得内助之賢而天下之化自成也王謂君天下者五君位故云王假至也假有家猶言以此而至於家周公繫家人五爻曰九五剛健中正而下應六二之柔順中正是有刑于之德而又獲内助之賢者也王者以是至於其家則内外得人家無不正上可以奉神靈之統下可以衍嗣續之蕃内可以綱紀乎六宫外可以風動乎四海勿用憂恤而吉可必矣孔子釋五象曰王假有家豈私昵之情哉盖五與二同德相孚君慶内治之得人后樂刑家之有主雍雍在宫以禮相合以義相比而成愛者此所以吉也盖聖德協而壼政脩教化行而海宇定自古雍穆之治未有不起於宫闈者此問夜之勤雞鳴之儆為王化之根本也先儒謂愛有二義有溺於私欲之偏者有𤼵於性情之正者私欲之偏即為禍亂所由萌性情之正則為風敎所自出一念得失之分而天下之治忽因之此脩齊治平之效必本於格致誠正之功歟上九有孚威如終吉象曰威如之吉反身之謂也此一爻是言恩威著而家道昌可以見教成之效也周公繫家人上爻曰凡治家者當愼於其始尤貴善乎其終誠信不足者終必擕威嚴不足者終必凟信與威相濟乃為可久之道今上九以剛居上在卦之終本孚誠以篤恩義而又倫紀森然凛不可犯有孚而威如者也故其言可以體家人之心而無傷恩拂情之失其威可以正家人之志而無凟倫亂紀之愆則一家之中愛敬日隆將見彌逺而彌昌矣不其終吉乎孔子釋上象曰上九威如之吉者非作威之謂也乃反身自治貞度立誠而動静語黙有謹以自勅之幾瞻視衣冠有尊而可畏之象初未嘗有意於嚴厲而家人自服之葢躬行之化不怒之威也可見反身之理為正家之原而主敬之學又反身之要大廷廣衆固無可少忽之時暗室屋漏尤必凛有嚴之志如是則不動而敬不言而信威由孚出孚以威成而家有不肅教有不洽者乎故有家者不可為一時茍且之計而當愼百世永逺之圖有始有終而家人之義全矣兌下離上濟大事必以人心人心喜合而惡離貴同而賤異卦之火澤異性中少異情所以為睽然以旣睽之日而能本濟睽之德乘濟睽之勢以求濟睽之助則通志遂情其機在我故彖辭謂小事吉而彖傳又推廣言之以見時用之大焉至六爻則於君臣僚友先睽後合之際反覆言之初與四以無應而睽三與上以疑貳而睽惟二五居中得應故當睽而不睽原睽所自來莫不始於猜嫌成於乖隔濟睽之道反之而已臣積誠以悟主君降心以求助上下合心剛柔協德委曲綢繆以贊大業則渙者可使之合疎者可使之親而睽不終睽不害其為吉矣此一卦之大㫖也睽小事吉此卦兌下離上上火下澤異其性物之睽中女少女異其志人之睽皆有乖離之義故名為睽卦辭言當世事人心睽異之時未可以大有所為也小事是補偏救弊之事文王繫睽彖辭曰濟大事以人心為本睽則衆志乖異矣尚幸卦德有濟睽之才卦變有濟睽之勢卦體有濟睽之助夫惟有是三者之善雖不能大有所為使睽者一旦而合然以之維持國勢収拾民心亦可徐俟羣志之定不致於終離而小事吉也盖天下之睽散不可一日不合聖人豈肯安於無事但以當睽之日而驟興非常之役建不世之功則衆志猜疑一時難以開釋安望其動必有成乎盤庚之遷邑武王之東征古之帝王有不能遽行已意者惟所遇之時難也從容鎭定而使之不驚批郤導窽而使之無阻小其事正所以大其用此濟睽之善道也夫彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉此彖傳是釋睽彖辭明其體而贊其用也離為中女兌為少女故曰二女得中指六五應剛指九二孔子釋睽彖辭曰卦名為睽者何也以先天之取象言之離火動而炎上兌澤動而潤下其性睽也以後天之取象言之離中女兌少女雖同其居不同其適其情睽也卦之名睽非以是乎睽之時本無可為者何以云小事吉盖天下事惟有德者能成之卦德説而麗於明是内焉心氣和平外焉事機昭徹具有為之才矣又惟有位者能主之卦變自離來者二進居三自中孚來者四進居五而自家人來者兼此二變皆柔進上行是以徽懿之資居崇高之地挾有為之勢矣且惟有輔者能濟之卦體六五得中應剛是本虚中之誠收英傑之助得有為之佐矣備此三善雖在睽時未能大有所為而猶可補偏救弊不至於一無成就是以小事吉也然睽之義豈無所用哉人知睽之為睽而不知睽之終合試極言之天髙地下睽也然天施地生化育之事則同也男外女内睽也然夫倡婦隨相合之志則通也物以羣分睽也然此感彼應應求之事則類也可見睽者其静則别而合者其通則交不睽則無以為合而三才之用幾息矣睽之時用顧不大哉大抵天下事物皆本於一其後散而分之有似乎睽然實未嘗不合所謂理一分殊此即太極之㫖無窮功用所從出常人徇末而忘本拘於形氣之私嗜欲好惡紛争侵奪不相為下遂終於睽而不合故曰惟天生民有欲無主乃亂非亶聰明之元后烏能合天下之睽而盡歸於一耶象曰上火下澤睽君子以同而異此象傳是言君子惟義與比不求異而自異也孔子釋睽象曰上火下澤性相違異睽之象也君子體之而得處之之道焉盖君子以天下之量容天下之人以天下之理處天下之事本無不同也但義之不當同者則介然守正而不為茍同是故如其義也則在家同於家在國同於國而君子不嫌於同矣非其義也則一家非之不顧一國非之不顧而君子不嫌於異矣斯所謂和而不流羣而不黨者歟按彖言異中之同所以責君子濟睽之功象言同中之異所以明君子不茍同之理有同而異者立其體而以異為同者善其用斯眞得處睽之道奚至逐物而喪已乎初九悔亾喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也此一爻是言睽時貴有同德之助尤宜明逺禍之道也喪馬是無正應之象勿逐自復不求而自得之象辟逺之也周公繫睽初爻曰天下之睽必有合而後可濟初九上無正應宜不能濟睽而有悔然幸四亦同此陽剛之德情雖不洽而道則相符終得恊力而悔可亾有喪馬勿逐自復之象然當睽時同德相合正異已者所忌分别太嚴必遭讒搆故或遇惡人雖非與我同德而不可不見之庶釋其猜疑而免中傷之咎盖義當如此非有所屈也孔子釋初象曰睽違之害每起於是非之過明而好惡之太峻彼惡人君子之所逺而恐凂者也然當其相遇絶之過甚則意外之禍必生故不得已而見之正所以辟咎也豈其本心哉大抵世至於睽讒夫得志正士莫容君子處此自有難徑情直行者盖非獨為一身計而并為天下計也孔子曰人而不仁疾之已甚亂也賢者不幸値此時茍能委曲從容苦心調劑豈但君子不受害於小人或可使小人化而為君子則濟睽之妙用即在其中矣九二遇主于巷无咎象曰遇主于巷未失道也此一爻是言二能委曲喻主而得臣道之正也巷是委曲之意周公繫睽二爻曰二與五應君臣之分定矣但值睽時或為小人間隔憂讒畏譏忠悃不白則當委曲竭力或積誠以感其心或匪懈以通其志或負罪以兾其悟所以自靖者不拘一途如遇主于巷焉然後上下交孚乃為無忝臣節而咎可免也孔子釋二象曰人臣事君道合則畱不合則去九二顧遇主于巷何耶盖君臣之誼闗於天性委曲抒誠乃道之正原非枉尺直尋為鄙夫之見也按二五正應而當睽時隂陽相應之道衰剛柔相戾之意勝所以上下之間非曲折婉轉其情不能相通此正忠臣愛君之切體國之至休戚相闗有不出於此而不能者孔子恐後世功名之士必將借此言為口實故特云未失道以明之以見遇非屈已逢迎巷非邪僻由徑必合於道而後可不然而鬻羖羊以進身因寺人而見主一時或得遇合而已先不正矣何以正君哉六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也此一爻是言始雖疑而終有以濟睽也輿曳二之曳於後牛掣四之掣於前其人指三也天是去髪之刑劓是去鼻之刑周公繫睽三爻曰六三與上九正應有君臣之分者也不幸處二陽之間迹若可疑而上猜忌方深三求合不得積疑成惑若見二之曳其輿於後也若見四之掣其牛於前也更若見上之加刑於已而天且劓也睽離如此是無初矣然天下之理邪不勝正二四之求久當自去上九之疑久當自釋究必得遇於正應之君而為有終也孔子釋三象曰三居二陽之間處位不當一時難合於上所以積疑而起輿曳之見也然終遇者由上九剛明其疑易釋終必相得又何睽之不可釋乎自古君臣之間嫌隙不可稍開或因意見之叅差或因奸邪之間阻君心一疑則其臣一言一動無非獲罪之端然人臣當此不可過為猜懼惟有益勵其靖共之節竭其愛敬之忱安常守分以待君之悔悟精誠所感自終見亮於聖主矣此事君者所宜加勉也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也此一爻是言四有同德之助自可以濟睽也孤指无應元夫指初九周公繫睽四爻曰九四當睽之時而無隂柔之應為而或沮之動而或摧之若不免於孤也幸遇初九元善之夫與之同德遂推誠相與以共濟時艱則亦不為孤矣顧人之情在無事之日則安常處順而釁隙不萌當多事之時則變故横生而猜忌易起故必危以處之内杜疑貳之端外防讒間之入惟恐吾之誠信有未至焉然後可保其交孚之美同心協力以濟天下之睽而無始合終離之咎也孔子釋四象曰九四之志本欲濟睽但應之者未得其人則雖有志而不能行今旣獲初九元善之夫以矢心同濟志願遂矣寧慮睽哉按人臣比肩事君惟宜一心一德共僇力以報國若意見各立遂至積成猜嫌互相嫉害此豈社稷之福乎後世人臣之睽莫甚於趙之廉藺唐之牛李廉藺始睽而終合者以兩人之心皆出於公公則自無不可化也牛李始睽而終亦睽者以兩人之心皆徇乎私私則自不能克也四與初皆有陽剛之德同德相遇故始雖睽而終必合欲濟天下之睽者亦觀其心之公私而已矣六五悔亾厥宗噬膚往何咎象曰厥宗噬膚往有慶也此一爻是言人君得賢自輔有濟睽之功也厥宗指九二噬膚易合之象周公繫睽五爻曰六五以隂居陽濟睽之才不足宜其有悔但以柔中之德應九二之賢得人輔治而有以匡其不逮故雖有悔而終必亾之然二五君臣相得豈僅如遇合之常哉盖二本五之正應乃宗子之家相所謂宗臣也當睽之時五固切於下交二又篤於事主情洽意孚誠有如噬膚之易者以是而往可以同心共濟合天下之睽矣復何咎乎孔子釋五象曰處睽患不得所合耳五有厥宗合之如噬膚之易則君臣同德以濟天下之睽此雖一人之福而實四海之慶也盖二五君臣之睽二言合之難者臣道也不敢輕身也五言合之易者君道也急欲下賢也故二言主尊之也下當以分嚴上也五言宗親之也上當以情親下也二依五以為主五親二以為宗相須甚殷自然相見恨晚宜其易於合矣然必君先求賢而後賢乃從君此又愼重於始交之道也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亾也此一爻是言先睽後合而疑慮俱消也豕汚穢之物鬼恠異之類張弧始而疑也説弧終而釋也遇雨和合之象周公繫睽上爻曰上九下應六三本不孤也然以剛明之過處睽極之地猜疑所結妄見多端故睽孤而無與三本非汚而疑其汚如見豕負塗若将凂已也即至一切所無之事盡疑其有如載鬼一車反以幻為眞也由是積疑成忿先張弧而欲射之乃本無是事疑久自消則又説弧而不果射始知三非我冦實為親我之人前疑盡釋而往以遇之猶隂陽和而致雨焉則睽合而不孤矣孔子釋上象曰上九遇雨吉者盖人情有所疑則不能合今兩情式好而乖戾不形二人同心而猜嫌盡冺則向日之妄見至此而俱消矣又何睽之足慮哉大抵上下之交莫難於信莫易於疑信則志同道合一德交孚疑則是反為非忠反為佞故嘉猷入告則疑其好名忠言逆耳則疑其賣直同道為朋則疑其植黨薦賢為國則疑其市恩疑端一開何所不至小人因之播弄其間而忠良之禍不可解矣周公於此爻旣極摹其情状而孔子於象又概之以羣疑以見猜忌不釋則睽終不可得而合所以致儆者不亦深切著明哉艮下坎上蹇之為卦聖人所以教人濟難也見險而止固為審時觀變然禍患之作天所以開聖人誠能擇地擇人正名仗義事亦何不可為者故彖辭曰利曰吉而彖傳備言時用之大為濟蹇之人勸也但彖傳於旣止之後策其奮往故一則曰往得中再則曰往有功而六爻則於徃多戒辭於來多幸辭盖庸懦者遇險輒畏非往無以振因循躁動者冐險妄為非來無以需時㑹沈潛之智與果斷之勇非有二也而要之來非止而不往方且博求才俊聨情合勢以宏濟艱難故爻自初二以上不曰來反則曰來連不曰朋來則曰來碩與彖傳利見大人之㫖實相發明云蹇利西南不利東北利見大人貞吉此卦艮下坎上以艮止遇坎險不能前進故名為蹇卦辭言當蹇之世勢難有為而詳示以濟蹇之道也西南坤方坤順也故為平易之地東北艮方艮險也故為險阻之地大人指九五而言文王繫蹇彖辭曰世運艱難之㑹固不宜輕進然亦豈可終止而不思所以濟之乎故必所據得其地所遇得其人而又行事皆出於至正乃庶幾其有成如平易通逹之地則西南也利於往以資其形勢之便險阻艱難之地則東北也不利於往以失其進取之機地利得而後可以一衆心決大計矣然撥亂不得其人不將病於無主乎若於大人而見之德望可以繫人心謀猷可以匡多難則神器有屬而耆定之功成矣利何如也然施為或失其正又何以服天下乎必以正道而行之不肯行一不義不肯殺一無辜則行事正大萬衆歸誠矣吉何如也得其地得其人得其正具此三者又奚蹇之不濟哉按得地得人得正之説不獨濟蹇之道為然也當世運亨嘉之㑹民物昌遂之時一人躬仁聖之資攬乾綱之柄所謂帝王自有眞也措之事業綱舉目張上合天意下順民心自得其正也中天下而立居重以馭輕安内以輯外有山川設險之固為萬年磐石之安自得其地也則易之理可以引伸觸類於無窮矣彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉此彖傳是釋蹇彖辭以明濟蹇之時用也當位指卦體各當其位孔子釋蹇彖辭曰卦名為蹇者有險難之義也卦德坎為險而坎居上是險在前也艮為止而艮居下是遇險而不進也此所以為蹇也夫明難察於幾微而禍易成於猶豫今見險而能止則熟識利害之勢而灼見安危之幾矣其智矣哉然見險固貴於能止而又不可以終止辭曰利西南者卦變自小過而來四之陽往居五而得中是處平易之地而可為進取之資故利也不利東北者退則入於艮是䧟險阻之地而失形勢之便故不利也又曰利見大人者卦體九五有大人之象往而見之則可資其陽剛之才中正之德以成濟蹇之功此所以為利也又曰貞吉者卦體自二至上五爻隂陽各當其位有正之義正則自無不吉盖扶大義秉大公以削平禍亂整頓紀綱而邦因以正矣此所以吉也合而觀之當蹇之時必得其地必得其人又必得其正而後蹇始可濟蹇之時用豈不大哉按蹇難之世躁於進取者每䧟於險而不能濟昧於圖度者又缺於用而不能濟故必有大人出焉具沈幾觀變之識而又得撥亂反正之資然後可以平大難而福蒼生也要之必以智為本有智則立乎險之外以運於險之中方能操全勝之局而進止皆得其當若冐昧從事則一蹶塗地安能濟蹇而成厥功乎象曰山上有水蹇君子以反身脩德此象傳是言君子當蹇之時惟宜盡自脩之道也孔子釋蹇象曰此卦下艮上坎水在山上曲折艱阻而難行蹇之象也君子體之以行有不得或阻於時命或罹於讒毁此吾身之蹇也要皆實德之不脩階之故怨天尤人無益也行險僥倖非義也惟反之於身以脩其德省察於念慮之微率循於言動之實如是則德孚於人而行無不遂所以濟一已之蹇者在此所以濟斯世之蹇者亦在此矣按孟子謂行有不得者皆反求諸已如反其仁反其智反其敬皆反身脩德之實事也故曰救寒莫若重裘止謗莫若自脩又曰君子脩道立德不以困窮而毁節焉有所未善則改之無歉於心則加勉聖賢之心亦祗見其惟日不足而已矣初六往蹇來譽象曰往蹇來譽宜待也此一爻是言才不足者宜見幾而止也上進則為往不進則為來周公繫蹇初爻曰初六隂柔而居艮始正在宜止之時若當此而欲往以有為則祗有䧟入於險不其蹇乎惟不往而來見險能止則知㡬之譽集於一身斯為知也孔子釋初象曰初六之往蹇來譽豈終於不往哉君子之所不能違者時也時旣不可為正宜考槃自樂以俟干旌之求然後出而應世耳此可見初六之義非終老山林沽名釣譽者比孔子恐人誤為退避故曰宜待待者藏器於身待時而動也他日答子貢問美玉而有吾待賈之言對哀公問儒行而有席珍待聘强學待問力行待取之語正與此爻相發明則知聖人當日雖皇皇環轍不忍忘民與物而其自處不茍如此所以斯世不用則已用則必能濟天下之蹇也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也此一爻是明人臣致身之義也艱險至甚故曰蹇蹇周公繫蹇二爻曰六二柔順精白盡節之臣也正應在上方處蹇中則是當國歩艱難之秋主憂臣辱之日鞠躬盡瘁不避危險以求濟之是王臣之蹇而又蹇者也此其所以然者盖二之心但知君之當急職之當盡必如是而後可以塞臣子之責副君上之託耳非干譽邀寵而為厥躬之計也孔子釋二象曰人臣事君不盡其心者可以尤其心也不竭其力者可以尤其力也若六二之王臣蹇蹇雖事之濟不濟未可知縱使不濟而一念之自靖可以質諸鬼神而無媿於天下萬世矣誰得而尤之乎按五為當位之大人凡天下之蹇五獨任其責而不辭故曰大蹇二與五為正應在王臣之位凡五之蹇二亦獨當其難而不避故曰蹇蹇一以天下之蹇任之於身一以其君之蹇責之於已此其君臣之交中正道合大義已正大節已明濟蹇之道無踰此者漢臣諸葛亮有言鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩三代而下如亮者誠不媿蹇蹇之臣矣九三往蹇來反象曰往蹇來反内喜之也此一爻是言濟蹇之道當求助於同心之人也往蹇是獨力不能有濟來反來就二隂也周公繫蹇三爻曰九三過剛不中而坎險在前又値大難方殷之日於此而毅然前往則獨力不足以成功亦終於蹇而已惟反就二隂與之同心戮力庶克拯救時艱而共濟夫蹇也孔子釋三象曰往蹇來反非强與之合也盖九三有陽剛之德在内二隂不能自立皆喜得三共事而相與有成也使彼無樂附之心縱三欲與之比詎可得乎按九三乃下卦之主是為内之所恃者故不獨初與二喜之而四亦欲連之盖處蹇之時非剛明之才不可以治蹇故隂皆思附陽以求濟亦可見隂之必利於從陽而益信陽德之尊矣六四往蹇來連象曰往蹇來連當位實也此一爻是言才力不足者當資人以共濟也連謂連乎九三實謂九三陽剛當位周公繫蹇四爻曰六四上承九五有濟蹇之責者也然隂柔之質當多事之時孑身以往未必有濟祗䧟於蹇耳幸九三以陽剛在下連之同進資其猷畧以共挽時艱則藉天下之才濟天下之蹇而羣賢之功皆其功矣孔子釋四象曰四之往蹇而必連九三者何哉盖濟蹇非陽剛不能也三乃當位之陽内抱匡濟之實心外展經綸之實用足以有為者故宜連之以共濟耳大抵陽實隂虚虚者必有資於實此隂之必求助於陽也然四位近五大臣之道正當合天下之羣策羣力以共輔其君功不必自已出名不必自已成唯求有濟於艱難而已豈矜一手足之烈乎髙帝有蕭何而淮隂効力藝祖得趙普而諸將歸心其庶幾乎此義矣九五大蹇朋來象曰大蹇朋來以中節也此一爻是言世事艱難之會必得賢而後可以濟也大蹇謂非常之蹇中節能守其中徳之意周公繫蹇五爻曰九五居尊位而當蹇之時是其蹇乃國家安危之闗宗社存亾之係而為莫大之蹇也不幸而值此時非得天下之賢其何以濟所喜者五有剛健中正之德勢力旣足以招徠而信義又足以結納是以豪傑景附自九二正應而外如來譽來反來碩來連之朋羣然歸之効力宣猷而不患其終蹇矣孔子釋五象曰九五當大蹇而得朋來之助豈無以致之哉盖中德存於平居之時易存於變故之時難五能守其中德而不變則造次之頃而志槩弗移顚沛之遭而信義愈篤是以能鼓舞賢豪而得其慷慨悦從之心也按五為蹇主故曰大蹇天下之蹇直以一身肩之湯之萬方有罪在予一人成王之遺大投艱於朕身是也然欲濟天下之大蹇必需天下之大才湯非伊尹仲虺無以昭九有之勳成非周公召公無以著夾輔之烈古之帝王戡亂致治孰有外於得人者哉上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也此一爻是示人以濟蹇之道而因明其所以成功也大人指九五周公繫蹇上爻曰上六居蹇之極則有將濟之機而時可為矣茍徒以時之可為遂欲自往以求濟不得濟蹇之主而奉之則無以行其拯溺亨屯之志而蹇且益甚惟能來就九五則有碩大之功而吉矣盖九五德位兼隆之大人也見而附之則憂時立功之念獲伸於中節之君而撥亂反正之猷得效於朋來之日不惟一身慶其遭逢而實天下䝉其福澤其利為何如哉孔子釋上象曰上六往蹇來碩者以其志欲從九五與之同心共濟相得益彰故能成其功而吉也又必見大人而後利者以九五剛徤中正而居尊位其位與德皆為可貴今往而見之斯能繫天下之望得天下之心於以濟蹇夫復何疑哉乃知大蹇之世君擇臣臣亦擇君五之朋來是延攬羣才以資廓清耆定之畧興王之所以定大業也上之來碩是攀附真主以成旂常竹帛之功名世之所以垂不朽也二者宜其相須甚殷而相見恨晚矣不如此何以濟蹇耶坎下震上解取解難之義凡解難者必有震動幹濟之才乃能易險為平出乎禍亂之外屯之動乎險中固不若解之動乎險外也彖言利西南與蹇同辭者蹇處險而教以擇地則難可紓解出險而教以安静則難不復作然生天下之難者莫甚於小人解天下之難者莫先於解小人故卦之六爻惟初以解難為義而諸爻皆以解小人為義六五以君而解小人者也二四以大臣而解小人者也初三上則三隂之小人也而三隂之中惟六三不中不正竊據髙位尤為肆虐故狐以象其蠱惑隼以象其鷙害負且乘以象其僭竊而於五爻明以小人斥之所以著三之罪也總之君相欲解天下之難未有不以解小人為第一義者也小人不解則難本不除前難方解而後難將復作矣故二曰獲狐四曰解拇上曰射隼五為解主直曰解小人作易聖人其兢兢於去小人盖如此解利西南无所往其來復吉有攸往夙吉此卦坎下震上居險能動出乎險外有患難解散之義故名為解卦辭言險難旣平宜與天下以休息之道也西南亦指坤方平易之地文王繫解彖辭曰險難方解利於平易安静且卦變自升來三往居四入於坤體二居其所而又得中皆平易安静之義故遇解之時國運方復元氣未固當思撫循而培養之以寛大之心行簡易之政而利西南焉若其禍亂旣殄而无所往歟則與民休息相安於無事上不苦於紛更下不致於疲敝而天下享和平之福不亦吉乎若其餘患尚存而不容無所往歟則早往以除其釁早復以収其成旣不至於養亂又不至於黷武而天下収廓清之功不亦吉乎處解之道盡於此矣按程傳謂國家必紀綱廢而後禍患生聖人旣解其難則當脩治道正紀綱明法度進復先代明王之治是來復也自漢以下亂旣除則不復有所為姑隨時維持而已故不能成善治此不知來復之㫖也至哉言乎盖无所往者言天下初定不宜以無益之事輕舉妄動滋生民紛擾之端至一代之興所為規畫布置以建久安長治之規君臣上下孜孜汲汲猶恐不逮固未嘗頃刻可緩也若謂時難甫息便可晏然無事因循玩弛聽其自然以偷旦夕之安恐前難方解而後難復起矣豈有當於此卦之義乎彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉此彖傳是釋解彖辭以明解之義且極言造化之功用而贊其大也險以時言動以才言功是安民之功甲是萌芽包含拆是萌芽發露孔子釋解彖辭曰卦何以名解哉盖蹇雖見險而止然險在前也不可言解屯雖動乎險中猶未出險也未可言解此則卦德坎下震上居險能動動而免乎險故為解也辭謂利西南者何哉卦變三往居四入於坤體而坤為衆又有得衆之義則是平易近人人必歸之此西南之所以利也其來復吉者何哉葢解時以安静為中卦變二居其所而又得中則是内焉宅心安静而無喜功外焉處事循理而無過舉故能與時休息來復而吉也有攸往夙吉者何哉二旣以得中而有攸往制勝本於廟算舉動出於萬全所以早往早復民社獲安寧之福而有功也然解之道不特王者以之生萬民天地亦以之生萬物當天地閉塞之時二氣鬱結不散今倐而解矣解則氣機鼓暢雷雨交作以動以潤凡百果草木枯者萌甲而甲者開拆矣夫天地一解遂成化育之仁而其成之則以時也解之時豈不大矣哉王者法天以行解亦猶此矣葢天地帝王闔闢張弛本同一道天地於時之未解則雷以奮之於先雨以潤之於後而後品彚以昌及其旣解則收歛神功返於寂若此一闔一闢之機所以變化萬物者也帝王於難之未解則經綸乎草昧肇造乎艱難而後大亂始定及其旣解則相與休息垂拱受成此一張一弛之用所以奠安萬民者也説者以人君解難主於静造物解難主於動則是天人有二理矣豈其然乎象曰雷雨作解君子以赦過宥罪此象傳是言君子體解之義以仁其民也孔子釋解象曰雷雨交作則散藴結而為亨通有以解萬物之難解之象也君子之於萬民猶天地之於萬物念兹蹇難之後多罹於法非䧟於不自知即迫於不得已與處常之時不同故矜恤之典行焉於無心之過則赦之而不問於犯法之罪亦宥之而從輕沛以解網之仁開其自新之路誠仰體天地好生之德而然也大抵承平之世赦宥不可數數則奸宄得志而良民不安故明罰勅法昭萬世之常經處危疑之世赦宥不可無無則反側不安而禍難不解故泣罪祥刑見一人之寛政此古帝王治世之微權在因時而用之也夫初六无咎象曰剛柔之際義无咎也此一爻是言初柔得剛以濟而動無過舉也周公繫解初爻曰解難之初擾以多事固不足以安民而弛以無事又不免於滋弊初六以柔在下本安静不擾而上應九四之剛又足以濟之敷政優優與民休息旣免紛更之害亦鮮委靡之譏復何咎乎孔子釋初象曰初處解之始而得無咎者非倖也以初應四柔際乎剛是能鎮静而濟以明作不因循不激變得張弛之妙用時措之咸宜揆之於義固當无咎也按六爻之義有以解難言者有以解去小人言者盖天下之難多自小人致之此諸爻所以主解小人也若初爻則專主解難之意必本之以和平安静而輔之以果斷剛決然後無所往而不失之廢弛有攸徃而不失之煩擾戡亂安民不外此矣然四以初為小人惟恐解拇之不速而初以四為正應惟恐剛柔之不濟又可見六爻之取義各不同也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也此一爻是言二能去邪而得正也田者去害之事狐獸之變幻惑人者三狐指三隂爻言黄中色矢直物謂中直也周公繫解二爻曰二有剛中之德乃秉道嫉邪之君子也而當三隂用事之時為能解而去之以杜惑上殘民之禍夫小人旣去則善類自進而得中行直道之賢故為田獲三狐得黄矢之象如此則舉錯得宜合乎進君子退小人之正道朝廷清而天下治貞而且吉也孔子釋二象曰親賢逺奸不易能也九二能去邪媚得中直而貞吉者何哉盖人惟自處不中故不知邪媚之當去而正直之當親二本中徳君子已心之邪媚無不去故於人之邪媚自不能容已心之正直無不存故於人之正直自相保䕶也所謂惟仁人能好人能惡人者歟從來小人為害人人皆知而不能去之者以其善媚也人好利即媚之以利人好名即媚之以名多方以結人之歡先事以承人之意盖不獨庸衆為其蠱惑即端人君子亦有時誤受其欺蔽者矣然外為巧言令色之態以售其奸詐而中實包藏險毒凶於家害於國有不可言者聖人痛之惡之故於二之爻名之為狐言其邪媚惑人之可羞於上之爻又名之為隼言有險鷙搏噬之可畏俾後之人知所鑒戒慎勿喜其媚而忘其毒也庶有以解天下之難哉六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也此一爻是儆無才德者不宜在高位也負是擔負乘是乘車周公繫解三爻曰天下惟有德者宜在高位六三隂柔不中正而居下之上乃無德而竊據高位者則褫辱所必加斥逐所必至雖得之必失之是猶小人宜負荷而反乘車處非其分當致寇奪也雖爵禄出於公朝本由君上之命自以為貞而不稱之羞豈能免乎其見攘也宜矣孔子釋三象曰朝廷設位以待有德之人也六三負而且乘則在我為非分之福而在人有素餐之譏是誠可醜也所謂致寇至者盖德不配位人將奪之是戎雖在人而所以致戎者則在於我又將誰咎也按古者德以詔爵能以詔禄人人各安其分而不萌僥倖之想後世用人不以行舉不以言揚一小人得志而衆小人生心紛紛競進各挾負販之智而逞暴取豪奪之私其為生民之害豈可言乎夫安民可與行義危民易與為非民旣稔受其毒而出爾反爾犯上作亂之事因之而起故曰負且乘致寇至盗之招也可見天下本無寇盗而用小人者實招致之有天下者與其勞師動衆以殄平寇盗不若愛惜名器以慎絶小人未有小人不去而寇盗可平者三復此爻意葢深切著明矣九四解而拇朋至斯孚象曰解而拇未當位也此一爻是勉四以去小人而因幸其得朋也拇象在下小人指初也周公繫解四爻曰當解之時非剛正之朋不足以同心而共濟四應初柔非其儕類此君子交相疑忌而不至也故為四計莫若斷然解去其拇屏絶匪類以示已無私交則一德之朋至而相孚無間矣孔子釋四象曰四所以解而拇者以四居位不正而下應初六故初得附之為其拇所謂私情之合也以私情比私交則賢士必聞而解體矣非解而去之則終為所累何以來君子之朋耶大抵君子小人氣類各别若使竝立於朝小人未有不日進君子未有不日退者其故何也君子以道事人人必敬之而疎小人惟言莫違人必狎之而親疎者易間而親者難睽也而君子者不得志則樂道自守奉身而退小人者不得志則狡謀百出不進不休君子有時容小人而小人必不肯容君子自古以來斷無小人在位而君子得安其身者也是故仙客用而九齡疎承璀入而李絳出一薰一蕕不可同器有用人之責者可不細玩此爻之義乎六五君子維有解吉有孚于小人象曰君子有解小人退也此一爻是言去小人之當斷也孚驗也言以小人之逺去為驗也周公繫解五爻曰五當君位是君子也乃與三隂同類而相比狎邇小人之咎不能免矣當此之時惟有惕然自省知其決不可畱解而去之一解之外無他術也如是則朝宁清明紀綱振肅吉孰大焉然君子之有解於何驗之即驗諸小人之退而已必小人果退方見我之能解若猶有瞻顧則是外示解之之迹而内無解之之心其何以為能孚也哉孔子釋五象曰小人非難解特患君子之心未必真欲解耳若果能解之辨之極其明而斷之極其勇則小人自消沮屏伏而無所復用其夤緣矣古之眞能退小人者莫如堯舜如共工之象恭滔天驩兜之比周為黨鯀之方命圯族三苗之負固不恭毅然加以流放殛竄之刑曽無姑息養癕之患乃為有解之君子也六五本隂類恐其優柔少斷明知小人之當去而牽於私愛姑飾詞以掩天下之耳目若曰吾已屏黜之矣而隂狎昵之如故則彼益倡狂恣肆惟所欲為而一無忌憚國家之禍遂至於莫救此管子所云惡惡而不能去郭之所以危也豈不可戒歟上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也此一爻是言上能佐五以去小人也公指上六隼鷙害之鳥以喻小人指六三髙墉宫垣也周公繫解上爻曰六三以隂柔小人竊位媚主鷙悍叵測猶隼之立于髙墉者然上六當大臣之任位尊望重一舉而殱厥兇惡有射隼于高墉之上之象如是則僉壬退而禍患除上無負於天子下有禆於蒼生則无不利宜也孔子釋上象曰所謂公用射隼者盖蠧國害民小人悖道甚矣其罪旣明則解而去之正所以除天下之禍亂耳豈為一已之私惡哉按小人恒在人主左右居髙而害物故取象於隼方其棲於山林人皆得而射之惟棲於王宫髙墉之上則如城狐社䑕有所憑依雖欲射之而不能矣不幸與之相值將解去之非其人不敢動有其人非其時亦不敢動必下有九二之中直九四之得朋上有六五之能解而後上六乃得乘其便利除君側之奸功成而天下安之然則去小人寧易易哉日講易經解義卷九
