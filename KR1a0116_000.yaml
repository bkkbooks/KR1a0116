body:
  text: 欽定四庫全書御製日講易經解義序朕惟帝王道法載在六經而極天人窮性命開物前民通變盡利則其理莫詳於易易之為書合四聖人立象設卦繫辭焉而廣大悉備自昔包犧神農黄帝堯舜王天下之道咸取諸此葢詩書之文禮樂之具春秋之行事罔不於易㑹通焉漢班固有言六藝具五常之道而易為之原詎不信歟朕夙興夜寐惟日孜孜勤求治理思古帝王立政之要必本經學嘗博綜簡編玩索精蘊至於大易尤極研求特命儒臣叅攷諸儒註疏傳義撰為解義一十八卷日以進講反復卦爻之辭深探作易之㫖大抵造化功用不外隂陽而配諸人事則有貞邪淑慝之别運數所由盛衰風俗所由治亂君子小人所由進退消長鮮不於竒偶二畫屈伸變易之間見之若乃體諸躬行措諸事業有觀民設教之方有通徳𩔖情之用恐懼修省以治身思患豫防以維世引而伸之觸𩔖而長之而治理備矣於是刋刻成書頒示天下朕惟體乾四徳以容保兆民且期庶司百執事矢于野渙羣之公成拔茅允升之美則泰交嫓於明良而太和溢於宇宙庶稱朕以經學為治法之意也夫康熙二十二年十二月十八日日講易經解義進呈疏字位過密無法显示臣牛鈕字位過密無法显示臣孫在豐等謹題為進呈刋完日講易經解義仰祈睿鑒事臣等於康熙十九年三月十九日奉㫖易經講章應行刋刻欽此臣等叨侍經幃欣承聖藻伏覩皇上體天徳以行健觀人文而化成四子六經討論原委百家諸史綜貫古今頒行歴有成書研究精於大易葢明天道察民故已傳四聖之心而觀㑹通行典禮乃冠五經之首發揮自羲文周孔叅稽於濂洛關閩㫖則遠而辭則文古皇先哲之精微悉歸典要陽必扶而隂必抑君子小人之情狀備極形容此葢聖衷自具乾坤其於弇鄙何知損益九重宵旰時親東魯韋編一介衡茅日給西清筆札每聆天語皆圖書未發之英華兼授人時本河洛以來之理數舉而措之為事業黙而成之於象言煥發絲綸光生梨棗惟自强不息雖隆寒盛暑常披玉軸芸編乃教思無窮俾荒澨遐陬盡作文河學海行且家傳而戸誦有如懸象以著明臣等未測幾深難酬高厚用集微塵於山嶽敢同爝火於日星抱蓍以求在儒者學程朱之學垂裳而治惟吾君心堯舜之心勉效修辭以立誠猶慚覆餗而滋咎總訂二篇之策彚呈乙夜之觀校刻加詳裝潢成帙伏願皇上悅心亹亹成性存存王道易知以簡能聖修徳崇而業廣臨豐履泰常思謙巽以致中孚解困渙屯永躋升恒而登大有則廣矣大矣推行及乎億萬年而鼓之舞之利用暨乎千百國臣等不勝區區之願謹具題恭進以聞字位過密無法显示臣牛鈕字位過密無法显示臣孫在豐經筵日講官起居注侍讀學士臣常書日講官起居注侍讀學士加一級又加一級支四品俸臣朱馬泰日講官起居注侍讀學士臣王封濚日講官起居注侍講學士加二級臣阿山日講官起居注侍講學士加一級臣邵吳遠日講官起居注侍講學士臣徐乾學日講官起居注侍講學士臣髙士奇康熙二十三年四月二十日題本月二十二日奉㫖易經闡發天人理數道統攸關朕朝夕披玩期造精微講幄諸臣殫心剖晰深有裨於典學這所奏知道了着即頒行該衙門知道總裁官字位過密無法显示臣牛鈕字位過密無法显示臣孫在豐曰講官起居注翰林院學士兼禮部侍郎臣張英分撰官通議大夫經筵曰講官起居注詹事府詹事加一級臣傅臘塔字位過密無法显示臣沈荃字位過密無法显示臣蔣𢎞道字位過密無法显示臣嚴我斯經筵曰講官起居注翰林院侍讀學士奉政大夫臣常書字位過密無法显示臣朱馬泰曰講官起居注翰林院侍讀學士臣王封濚曰講官起居注翰林院侍講學士加二級中憲大夫臣阿山曰講官起居注翰林院侍講學士加一級朝議大夫臣邵吳逺曰講官起居注翰林院侍講學士臣徐乾學曰講官起居注翰林院侍講學士臣髙士奇曰講官起居注翰林院侍講加侍讀學士加一級臣董訥曰講官起居注翰林院侍講臣翁叔元曰講官起居注左春坊左中允兼翰林院編修臣秦松齡曰講官起居注右春坊右贊善兼翰林院檢討臣王頊齡曰講官起居注翰林院修撰儒林郎臣歸允肅曰講官起居注翰林院編修文林郎臣曹禾曰講官起居注翰林院檢討徵仕郎臣嚴繩孫校閱官字位過密無法显示臣多奇翰林院侍講學士臣鄔黑翰林院侍讀加三級中憲大夫臣明圖翰林院侍讀承徳郎臣思格則翰林院侍講承徳郎臣戴通翰林院侍講承徳郎臣傅繼祖奉直大夫左春坊左諭徳兼翰林院修撰加一級臣陳論左春坊左中允兼翰林院編修臣朱阜右春坊右中允兼翰林院編修臣李振裕左春坊左贊善兼翰林院檢討臣沈上墉翰林院編修文林郎臣李濤翰林院編修文林郎臣費之逵翰林院編修文林郎臣馮雲驌翰林院檢討加一級徵仕郎臣徐潮翰林院檢討徵仕郎臣閻世繩翰林院待詔登仕郎臣星格禮收掌官翰林院典簿加一級文林郎臣明輔翰林院孔目加一級文林郎臣圖克善翰林院孔目臣朱叔琪翰林院八品筆帖式修職郎臣折庫納翰林院八品筆帖式修職郎臣哈什翰林院八品筆帖式修職郎臣李𢎞文翰林院筆帖式臣雅圖翰林院筆帖式臣鄂琦翻譯官翰林院待詔加一級又加俸一級修職郎臣敦代翰林院八品筆帖式加一級又加俸一級文林郎臣郭􅺱翰林院八品筆帖式加一級又加俸一級文林郎臣常綬翰林院八品筆帖式加一級又加俸一級文林郎臣石殿柱翰林院八品筆帖式加一級文林郎臣殷特布翰林院八品筆帖式加俸一級臣阿哈達翰林院八品筆帖式修職郎臣查哈喇翰林院八品筆帖式修職郎臣黑色翰林院八品筆帖式修職郎臣夏之濬翰林院八品筆帖式修職郎臣魯天錫翰林院八品筆帖式修職郎臣王國華翰林院八品筆帖式修職郎臣阿都翰林院八品筆帖式臣汪國弼翰林院八品筆帖式臣薩鼐翰林院八品筆帖式臣艾哈濟翰林院八品筆帖式臣額爾泰翰林院筆帖式臣邁蜜大滿文謄録官翰林院八品筆帖式加一級文林郎臣圖禮翰林院八品筆帖式修職郎臣倪隴阿翰林院八品筆帖式修職郎臣宋颺翰林院八品筆帖式修職郎臣塞克參翰林院八品筆帖式修職郎臣覺霍拓翰林院八品筆帖式修職郎臣石禮翰林院八品筆帖式修職郎臣吳進泰翰林院八品筆帖式修職郎臣達祖翰林院八品筆帖式臣阿哈達翰林院八品筆帖式臣黑色翰林院筆帖式臣塔蘭泰翰林院筆帖式臣薩克薩里翰林院筆帖式臣花色筮儀擇地潔處為蓍室南戸置牀於室中央牀大約長五尺廣三尺毋太近壁蓍五十莖韜以纁帛貯以皂囊納之櫝中置於牀北櫝以竹筒或堅木或布漆為之圓徑三寸如蓍之長半為底半為葢下别為臺函之使不偃仆設木格於櫝南居牀二分之北格以橫木板為之高一尺長竟牀當中為兩大刻相距一尺大刻之西為三小刻相距各五寸許下施橫足側立案上置香爐一於格南香合一於爐南日炷香致敬將筮則灑掃拂拭滌硯一注水及筆一墨一黃漆板一於爐東東上筮者齊潔衣冠北面盥手焚香致敬齊側皆反筮者北面見儀禮若使人筮則主人焚香畢少退北面立筮者進立於牀前少西南向受命主人直述所占之事筮者許諾主人右還西向立筮者右還北向立兩手奉櫝葢置於格南爐北出蓍於櫝去囊解韜置於櫝東合五十策兩手執之熏於爐上此後所用蓍策之數其說並見啓蒙命之曰假爾泰筮有常假爾泰筮有常某官姓名今以某事云云未知可否爰質所疑於神於靈吉凶得失悔吝憂虞惟爾有神尚明告之乃以右手取其一策反於櫝中而以左右手中分四十九策置格之左右兩大刻此第一營所謂分而為二以象兩者也次以左手取左大刻之策執之而以右手取右大刻之一策掛於左手之小指間此第二營所謂掛一以象三者也次以右手四揲左手之策揲食列反此第三營之半所謂揲之以四以象四時者也次歸其所餘之策或一或二或三或四而扐之左手無名指間此第四營之半所謂歸奇於扐以象閏者也次以右手反過揲之策於左大刻遂取右大刻之策執之而以左手四揲之此第三營之半次歸其所餘之策如前而扐之左手中指之間此第四營之半所謂再扐以象再閏者也一變所餘之策左一則右必三左二則右亦二左三則右必一左四則右亦四通掛一之策不五則九五以一其四而為奇九以兩其四而為耦奇者三而耦者一也次以右手反過揲之策於右大刻而合左手一掛二扐之策置於格上第一小刻以東為上後放此是為一變再以兩手取左右大刻之蓍合之或四十四策或四十策復四營如第一變之儀而置其掛扐之策於格上第二小刻是為二變復扶又反營于平反下同二變所餘之策左一則右必二左二則右必一左三則右必四左四則右必三通掛一之策不四則八四以一其四而為奇八以兩其四而為耦奇耦各得四之二焉又再取左右大刻之蓍合之或四十策或三十六策或三十二策復四營如第二變之儀而置其掛扐之策於格上第三小刻是為三變三變餘策與二變同三變既畢乃視其三變所得掛扐過揲之策而畫其爻於版掛扐之數五四為奇九八為耦掛扐三奇合十三策則過揲三十六策而為老陽其畫為所謂重也掛扐兩奇一耦合十七策則過揲三十二策而為少隂其畫為􅄲所謂拆也掛扐兩耦一奇合二十一策則過揲二十八策而為少陽其畫為􅅀所謂單也掛扐三耦合二十五策則過揲二十四策而為老隂其畫為所謂交也如是每三變而成爻第一第四第七第十第十三第十六凡六變並同但第三變以下不命而但用四十九蓍耳第二第五第八第十一第十四第十七凡六變亦同第三第六第九第十二第十五第十八凡六變亦同凡十有八變而成卦乃考其卦之變而占其事之吉凶卦變别有圖說見啓蒙禮畢韜蓍襲之以囊入櫝加葢斂筆硯墨版再焚香致敬而退如使人筮則主人焚香揖筮者而退筮儀畢六爻不變則占本卦之彖辭一爻變則占本卦之變爻二爻變則占本卦之二變爻仍以上爻為主三爻變則占本卦及之卦之彖辭仍以前十卦主貞後十卦主悔四爻變則占之卦二不變爻仍以下爻為主五爻變則占之卦不變爻六爻變則乾坤占二用餘卦占之卦彖辭欽定四庫全書經部一日講易經解義卷目易𩔖卷一上經乾卷二坤屯蒙卷三需訟師比小畜卷四履泰否同人大有卷五謙豫隨蠱臨卷六觀噬嗑賁剝復卷七无妄大畜頤大過坎離卷八下經咸恒遯大壯晉卷九明夷家人睽蹇解卷十損益夬姤萃卷十一升困井革鼎卷十二震艮漸歸妹豐卷十三旅巽兌渙節卷十四中孚小過既濟未濟卷十五繫辭上傳第一章至第六章卷十六繫辭上傳第七章至第十二章卷十七繫辭下傳卷十八說卦傳序卦傳雜卦傳臣等謹案日講易經解義十八卷聖祖仁皇帝欽定康熙二十二年製序頒行易自漢以後象數義理之說分而䜟緯空虚之弊起朱子集諸家之成作為本義簡而能該我聖祖仁皇帝服膺朱子之書而悅心研慮訂為斯編仍詔講幄諸臣日以進講蓋心契三聖之微言以闡造化之功用序所云以經學為治法者崇徳廣業咸基於此矣乾隆四十年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀朱子圖説河圖洛書伏羲八卦次序伏羲八卦方位伏羲六十四卦次序伏羲六十四卦方位文王八卦次序文王八卦方位卦變圖繫辭傳曰河出圖洛出書聖人則之又曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此河圖之數也洛書蓋取龜象故其數戴九履一左三右七二四為肩六八為足曰圖書蔡元定之象自漢孔安國劉歆魏關朗子明有宋康節先生邵雍堯夫皆謂如此至劉牧始兩易其名而諸家因之故今復之悉從其舊繫辭傳曰易有太極是生兩儀兩儀生四象四象生八卦邵子曰一分為二二分為四四分為八也說卦傳曰易逆數也邵子曰乾一兌二離三震四巽五坎六艮七坤八自乾至坤皆得未生之卦若逆推四時之比也後六十四卦次序放此說卦傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆邵子曰乾南坤北離東坎西震東北兌東南巽西南艮西北自震至乾為順自巽至坤為逆後六十四卦方位放此六十三十十六四卦二卦卦八卦四象兩儀太極前八卦次序圖即繫辭傳所謂八卦成列者此圖即其所謂因而重之者也故下三畫即前圖之八卦上三畫則各以其序重之而下卦因亦各衍而為八也若逐爻漸生則邵子所謂八分為十六十六分為三十二三十二分為六十四者尤見法象自然之妙也右見說卦邵子曰此文王八卦乃入用之位後天之學也卦變圖彖傳或以卦變為說今作此圖以明之蓋易中之一義非畫卦作易之本指也凡一隂一陽之卦各六皆自復姤而來五隂五陽卦同圖異剝比豫謙師復夬大有小畜履同人姤凡二隂二陽之卦各十有五皆自臨遯而來四隂四陽卦同圖異頤屯震明夷臨蒙坎解升艮蹇小過晉萃觀大過鼎巽訟遯革離家人无妄兌睽中孚需大畜大壯凡三隂三陽之卦各二十皆自泰否而來損節歸妹泰賁既濟豐噬嗑隨益蠱井恒未濟困渙旅咸漸否咸旅漸否困未濟渙井蠱恒隨噬嗑益既濟賁豐節損歸妹泰凡四隂四陽之卦各十有五皆自大壯觀而來二隂二陽圖已見前大畜需大壯睽兌中孚離革家人无妄鼎大過巽訟遯萃晉觀蹇艮小過坎蒙解升屯頤震明夷臨凡五隂五陽之卦各六皆自夬剝而來一隂一陽圖已見前大有夬小畜履同人姤比剝豫謙師復右易之圖九有天地自然之易有伏羲之易有文王周公之易有孔子之易自伏羲以上皆无文字只有圖畫最宜深玩可見作易本原精微之意文王以下方有文字即今之周易然讀者亦宜各就本文消息不可便以孔子之說為文王之說也乾為天天風姤天山遯天地否風地觀山地剝火地晉火天大有坎為水水澤節水雷屯水火既濟澤火革雷火豐地火明夷地水師艮為山山火賁山天大畜山澤損火澤睽天澤履風澤中孚風山漸震為雷雷地豫雷水解雷風恒地風升水風井澤風大過澤雷隨巽為風風天小畜風火家人風雷益天雷无妄火雷噬嗑山雷頤山風蠱離為火火山旅火風鼎火水未濟山水蒙風水渙天水訟天火同人坤為地地雷復地澤臨地天泰雷天大壯澤天夬水天需水地比兌為澤澤水困澤地萃澤山咸水山蹇地山謙雷山小過雷澤歸妹右卦象訟自遯變泰歸妹否從漸來隨三位首困噬嗑未濟兼蠱三變賁井既濟噬嗑六五本益生賁原於損既濟㑹无妄訟來大畜需咸旅恒豐皆疑似震從觀更睽有三離與中孚家人係蹇利西南小過來解升二卦相為贅鼎由巽變漸渙旅渙自漸來終於是右卦變乾坤屯蒙需訟師比小畜兮履泰否同人大有謙豫隨蠱臨觀兮噬嗑賁剝復无妄大畜頤大過坎離三十備咸恒遯兮及大壯晉與明夷家人睽蹇解損益夬姤萃升困井革鼎震繼艮漸歸妹豐旅巽兌渙節兮中孚至小過既濟兼未濟是為下經三十四右卦歌乾三連坤六斷震仰盂艮覆盌離中虚坎中滿兌上缺巽下斷右八卦取象
