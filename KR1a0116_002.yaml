body:
  text: 欽定四庫全書日講易經解義卷二坤下坤上坤取純隂至順之義故其𧰼為地擬諸物類則為牝馬四德皆與乾同而獨言牝馬之貞明其以順德承乾也彖傳釋卦辭兼造化人事而言一以柔順為正六爻則二之德極其盛三之美含於中四之愼免於咎五之黃中內充實而外光輝雖德量深淺不同而皆有合於地道之貞順者也惟𥘉與上以隂陽消長言𥘉言堅冰戒隂勢之將長也上言龍戰警隂類之過盛也此與諸爻若不相蒙然而聖人作易之㫖實在乎此蓋論造化之理則隂陽二氣對待流行不容偏廢而論淑慝之分則陽主生隂主殺主生者為善主殺者即為不善聖人欲以人事挽造化嘗以扶陽抑隂之意寓於觀𧰼繫辭之中故諸卦每遇隂爻必勉之以柔順戒之以守貞雖隂之取𧰼不專屬於小人而於君子小人之際尤加謹焉以君子小人之進退為世道消長之所繫也坤為純隂之卦諸爻皆言坤德而獨於𥘉上二爻凛然示小加大賤妨貴之防其㫖深矣坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉此卦六畫皆偶上下皆坤隂之純而順之至故名為坤而卦辭則欲人法地而安於順也牝馬順而健行者主利謂主於順從西南隂方東北陽方朋謂隂類也文王繫坤彖辭曰伏羲畫卦為坤純隂至順有地之𧰼凡人履卑下之位能法地道以自處則無成有終動罔不吉其為大亨何疑所患者性禀隂柔持守不固則有利有不利耳必如牝馬之行地其質至馴其力至健始終久暫無所變易斯有得於坤道之貞者矣所以體坤之君子凡有所往即思履順守貞之道隂之分宜居後而不宜居先若爭先而倡天下之事則必迷惑而致敗惟因𫝑所已然者而後從之則功易成而有得矣隂之德宜主利而不宜主義若主義而斷天下之事則必矯拂以取戾惟因𫝑之自然者而順從之則事易遂而有終矣隂之地宜於西南而不宜於東北往西南以親柔順之賢則同德相應而有得朋之慶矣往東北以從剛斷之人則人不我親而有喪朋之憂矣凡若此者皆坤道之至正而君子之所當安守者也安於居後之貞自無僨事安於主利之貞自無悖德安於得朋之貞自無失人𧰼之有取於牝馬而無往不利者固如此也吉可知已夫坤之義所該至廣而於臣道為最切聖人立教非謂人臣事君專主於順從以為正也蓋坤道承乾所事者陽剛中正之主故君令臣共上下合德是為天下之至順不然將順其美固順也彌縫其闕亦順也順乎正非順乎邪順乎理非順乎欲易之教特為寵利居功驕蹇自用者示戒而豈茍且充位阿意取容之徒所可得而借口也哉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行此彖傳是以地道明坤義而此三節分言元亨利貞之德而因及於人事也生受形之始德合無疆謂合乾德孔子釋坤彖辭曰坤之義博矣而成形之大莫過於地試即地道言之坤有四德與乾相同至矣哉其坤之元乎盈天地之間為萬物當乾元資始時止有氣而無形惟坤元一至則萬物凝成胚胎皆資其理與氣以受生矣然坤非自為之也天以理為物性之始坤特順其理而承之以生無二理也天以氣為物形之始坤特順其氣而承之以生無二氣也乾之所至坤亦至之此坤元之功所以無可加也若坤之亨則何如天以雲行雨施亨萬物德之大至無疆也而坤德之厚持載萬物有與乾德之無疆適相符合者方其化機之藏也生物之意藴蓄於內者無所不包何其含𢎞也及其化機之發也生物之意燦著於外者無所不周何其光大也德之厚如此由是萬物滋榮暢茂咸得其生意而無不亨通博厚之載物與高明之覆物同一功用非德合無疆而能如是乎若坤之利貞取𧰼於牝馬則何如牝為隂屬而馬又行地之物是牝馬固地類也且馬之行地任重致逺而及於無疆既順且健實有坤之𧰼焉故以牝馬之順𧰼乎坤為柔順之德其承天施而生萬物者未嘗居先未嘗專主也以牝馬之順而健者𧰼乎坤為利貞之德其合天行而代有終者無有間斷無有止息也體而行之是在君子君子法其至順以飬和平之心復法其行健以堅正固之守驗之物理合之造化而所行無不利矣故曰利牝馬之貞按宋儒有陽大隂小陽全隂半之說此就施生先後之理言也若以元亨利貞之四德論則乾與坤均無缺陷假使乾施而坤不應則物何從而生故乾健坤順而坤亦未嘗不健但必天以四德行於物然後地因以代終天不資始地無由資生君不行令臣無由奉職是則乾坤大小偏全之别耳先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆此二節是言君子法坤之事也常常道也有慶謂終有得朋之慶孔子釋坤彖辭曰君子法坤行事亦法坤德之正而已無成者坤之道若進居物先則迷而失道矣柔順者坤之常若退居物後則順而得常矣蓋先者非貞而後者為貞君子之行必居於後者也往西南則得朋謂隂居隂方此求彼應乃得其朋類而與之偕行矣往東北則喪朋謂隂居陽方處非其地若反而之於西南乃終得朋而可以獲慶矣蓋西南為貞而東北非貞君子之行必於西南者也惟知居後之為貞而安之則行不越度而循分足以有功知往西南之為貞而安之則交不失人而同類足以相濟其獲吉也不有與地道之含𢎞光大同一無疆者乎地以厚載配天之無疆君子以安貞應地之無疆其理一而已矣按注疏謂東北喪朋以隂之為物必離其黨而後獲吉𧰼人臣離其黨而入君之朝程傳亦從其說與本義不合而其理可以互相發明蓋人臣無私交泰之朋亡渙之渙羣皆取離散朋黨之義在坤為純隂至順自與狎昵柔邪者不同而以隂從陽剛柔相濟固臣道之至正而亦易理所不廢也𧰼曰地勢坤君子以厚德載物此象傳是言君子法地德之厚也天以氣運故曰行地以形載故曰勢孔子釋坤𧰼曰坤之𧰼為地此卦上下皆坤是地德至順且厚故其形勢高下相因愈遠而愈無極也君子體坤之𧰼知地之德不厚斯載萬物不勝其重人之德不厚斯載萬民不勝其勞所以內而與含𢎞者同體則積極其厚舉凡地之所載皆兼容竝生而無有不育焉外而與光大者同用則施極其厚舉凡地之所載皆仁漸義濡而無有失所焉其應地無疆之功如此夫坤臣道也而厚德載物則君道不外乎是觀於師之𧰼曰容民畜衆臨之𧰼曰容保無疆皆以為君之道取法於地則坤象豈獨專屬於臣蓋易之義無所不通惟善體易者神而明之焉耳初六履霜堅冰至𧰼曰履霜堅冰隂始凝也馴致其道至堅冰也此一爻是示人以防微之道也六隂數故謂隂爻為六霜與冰皆隂類馴順習也道指隂道象傳履霜堅冰當作初六履霜周公繫坤初爻曰坤之初六隂始生於下其端甚微而一隂既萌則其勢日浸月長必至於極盛如寒氣初結止見為霜而識微之君子當履霜之時即知異日堅冰之至已肇於此思患豫防可勿凛凛乎孔子釋初𧰼曰初之取象於履霜者何也天下事皆始於微而成於著隂生於下是猶隂氣始凝而為霜也惟不能及時消釋而因循漸積以致隂道之極則不至於為堅冰不止有世道之責者失防於始而徒欲維挽於終不亦可危之甚哉按聖人作易於隂陽消長之際必慎之於始坤之一隂即剝與姤之一隂也剝初曰剝牀以足姤初曰羸豕蹢躅皆言小人始進有必害君子之勢與履霜堅冰之意同一以戒小人一以警君子但剝與姤言凶而此止繫以𧰼者正欲君子觀𧰼而知所懼則能思患預防而不至蒙小人之禍矣六二直方大不習無不利𧰼曰六二之動直以方也不習無不利地道光也此一爻是言純德之合於坤也不習謂不待學習周公繫坤二爻曰坤道至純諸爻中惟六二之德能得之蓋六二柔順中正其德之存於內者粹然天理無所枉曲而直發於外者截然當理無所偏倚而方且無一念不直無一事不方而大其所為直方大者又悉出於自然不待學習而無往不利其德之純為何如哉孔子釋二𧰼曰六二之德合動靜而無間者也而事物未接之時則其德亦無由而見惟是動於念慮則貞固者見其直動於物感則有定者見其方既直且方而大可知已然使直方大之德必待學習而後利或不免有矯揉强制之勞二之不習無不利是盛德之蓄於內者極其含𢎞英華之見於外者極其光大以之配乎地道實全體大用無一不具者也何光顯如之觀此爻之義蓋指成德而言惟其成德故不假於思勉若論修德之功則雖聖人不廢下學如文言所謂主敬守義固下學力行之事而聖人之存飬於未發之時裁制於臨事之際亦未有舍敬與義而能直方大者但功有淺深性反之不同此則存乎其人矣六三含章可貞或從王事無成有終𧰼曰含章可貞以時發也或從王事知光大也此一爻是以坤德有終明臣道也章美德也無成謂無專成周公繫坤三爻曰六三隂居陽位陽德內含是有明體逹用之才而能飬晦退藏深沈不露者此坤道之至正可以固守者也然三居下卦之上德為時用豈能終於含藏如或出而從王之事則其恪守臣順固不敢爭先居首以取專成之咎而有守者自能有為凡其職分所當為與才力所能為者務終其事而後已三之德真順而能健者乎孔子釋三𧰼曰三之含章可貞非自私其美而不發也君子藏器於身待時而動必遇可用之時乃出其內美以發施於事業耳至於或從王事而能無成有終固由才具過人亦其中有定見從來識見不明者器量必隘偶有一長一善即不能自抑欲以表著於人卒之有喜事之名而無任事之實其為不智亦已甚矣六三知臣分不可越而不敢專成又知臣職不可懈而不敢廢事非智慮之光明廣大何以幾此此其德之所以為章美也按坤屬臣道而諸爻皆别舉一義惟三爻乃專以臣道言蓋三為陽位又處多凶之地聖人恐其恃才自專而不能守順也故以先迷後得之義皆於此爻發之然使用易者欲通之於君道則神明默運而喜怒不形即含章也恭已勵精而百職就理即有終也觀無成之為臣道又可知率作興事屢省乃成為君道矣六四括囊無咎無譽𧰼曰括囊無咎慎不害也此一爻是言柔德之宜慎也括囊謂結囊口而不出也周公繫坤四爻曰坤之六四以隂居隂既無剛德又所處失中宜以輕躁淺露為戒故處世則主於退藏謀事則主於謹密出言則主於簡默𧰼如囊之結其口而不出者然夫吉凶悔吝皆生乎動過由動生名亦由動集今謹守如是則無妄動之咎者亦自無成事之譽蓋四處多懼之地惟此為善道矣孔子釋四𧰼曰四之括囊所謂能慎者也慎其身而不輕出斯不辱身慎其事而不輕舉斯不僨事慎其言而不輕發斯不失言何害之有惟其不害是以無咎而無譽非所計已蓋天下務名干譽之事皆有必取禍敗之道而在人臣尤所當謹市已恩者樹私交矜已才者拂衆志譽之所在即咎之所歸故於六四之無譽更見其能慎然既謂之曰慎則其委曲濟時小心應變之學即見於括囊之中若徒以容悅為老成竊位為明哲又非易書教人之㫖矣六五黃裳元吉𧰼曰黃裳元吉文在中也此一爻是言中順之德無往不利也黃中色𧰼五德之中裳下飾𧰼五德之順周公繫坤五爻曰坤之六五以隂居尊位是其徽柔懿恭之德積之極其盛而應事接物之際又絶不以之自矜由是形之身者無非㢲順之容施於政者無非和平之治如黃之中色用以為裳者然如是則守中履順亢厲不形以之處已能盡已之道以之處人能得人之心其為大善而獲吉何疑乎孔子釋五𧰼曰五之黃裳元吉非矯飾於外也蓋居尊位者出身加民事事皆本於心德惟五實有中順之美德充積於中故雖不自炫其文而英華發外自有如此之盛也按五本君位而在坤則說者多屬之於臣如伊尹之寵利不居周公之碩膚几几皆以為有得於黃裳之義者也然而自古帝王崇效天卑法地禮接臣下俯恤民情位高而愈自抑德盛而益守謙君德之美又孰有踰於黃裳者哉上六龍戰于野其血𤣥黃象曰龍戰于野其道窮也此一爻是極言隂盛之害也𤣥屬陽黃屬隂其道指隂道周公繫坤上爻曰隂之不敢與陽抗者理也亦分也然陽不能制隂而使隂至於極盛則隂豈獨與陽抗而且與陽爭勝是戰之象也夫以既衰之陽而與極盛之隂相竸固自處於必敗然而揆之天道度之人事必無隂終勝陽之理則隂之悖理越分以求勝乎陽又豈能卒免於禍害乎如龍戰于野而其血𤣥黃蓋兩敗俱傷之道也孔子釋上象曰龍何以遂戰于野耶隂夲起於至微惟馴致其道以至於窮極則勢難復遏而日與陽爭勝惜乎其制之不早也若當其始凝而能預防其漸又焉有異日之禍哉大抵隂柔之性最為難制其未盛也潛伏而不及防其既盛也橫決而不可禦配諸人事方小人始進未嘗不降心抑氣以求包容於君子及其黨日熾遂不盡驅善類而去之不止所以姤一隂始生合衆君子之力以防一小人而嘗慮其計之疏夬一隂將盡又合衆君子之力以去一小人而猶戒其勢之厲况由一隂以積至於六隂雖欲不為陽害得乎故坤爻初曰堅冰至警龍戰之禍於始上曰戰于野著堅冰之害於終也用六利永貞象曰用六永貞以大終也此二節是申明體坤之道在以剛濟柔也陽大隂小大終謂以陽終也周公於坤卦六爻之後復繫之以辭曰坤六爻皆隂則其數皆六六者隂數之極也體坤之道者當思隂柔之性患在不能固守若能善用其隂柔而以陽剛濟之則其處心制行常確守中順之正道而私欲不為所屈常變不為所移貞固之德安而能永何不利之有孔子釋用六之象曰易之理陽為大隂為小永貞者陽剛之所能也今體坤而能用六則隂變為陽而坤德亦能永貞矣始雖柔弱而終則强毅是始於小者終於大也坤之與乾合德者以此按乾坤之用九用六即書剛克柔克之義一以柔濟剛一以剛濟柔此逆以治之者也所謂沉潛剛克髙明柔克也去其剛之偏而剛德全矣貞其柔之守而柔德全矣此順以治之者也所謂彊弗友剛克燮友柔克也二者之用備而剛柔無失中之患已文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行此四節書是申明坤彖傳之義也方謂有定體主下當有利字孔子釋坤彖辭曰坤之象取義無窮而順而健足以盡之其所謂利牝馬之貞者正以極順之德能持之以健有類於牝馬也蓋坤之不敢專主者至柔也若其動而及物常承乾之氣而發生於不窮既成物之形復成物之性何其剛也坤之寂然無形者至靜也若其德之及物常承乾之施而豫物以各正物具一形而不相淩奪即物具一性而不相假借何其方也柔與靜其順也剛與方其健也柔順利貞之義於此可見矣至卦辭言後得主利何也凡天下屬於陽者以居先主義為常屬於隂者以從陽主利為常惟坤為純隂能居乾之後而守其分所當為即以順為利而盡其力所能為是乃全乎隂柔之常道者君子之法坤安貞獲吉亦於此可見矣且也坤有柔靜之德故萬物之生意悉含於中而積之極其厚坤有剛方之德故化機之鬯逹悉著於外而發之極其盛此其所以為含𢎞光大也要而言之乾先而坤代之終乾始而坤作之成坤之為道其天下之至順乎從來天之生物一時之自然而已天以氣賦於物為形坤即承其氣以行於物而形以時而成矣天以理賦於物為性坤即承其理以行於物而性以時而成矣時未至不敢先時既至不敢後其德之合於無疆者非至健不足以成能而總全其為順而已故曰乃順承天也按坤之德主於柔靜而此兼動剛以為言蓋剛柔動靜乾坤不容偏廢繫辭傳言之詳矣配之人事則君道震動於上而臣下不可以退縮承也君道剛斷於上而臣下不可以㢲懦承也既曰順承則竝所謂動與剛者而亦承之矣夫如是庶可言合德也歟積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也此一節書是申坤初六象傳之義也辨察也順當作慎孔子復釋坤初爻曰天下事由漸而盛由積而成小而一家之盛衰大而人倫之變故未有外於此者如其家積善之久和氣足以召祥則不獨福集於一身而且及於子孫有無窮之慶矣如其家積不善之久乖氣足以致戾則不獨禍中於一身而且及於子孫有無窮之殃矣若其變之大者以臣而至弒君以子而至弒父逆天反常莫此為甚然推原其故非始於弒逆之一日也亂臣賊子之所由來蓋積漸使然也使為之君父者早察其奸宄而逆折其亂謀則禍必不若是之烈其至於若是者由辨之不早辨也甚矣防患者當於其漸而遏萌者當於其微也易曰履霜堅冰至正言持世之君子宜思辨微之道而深致其凛凛焉耳夫小人之為害於國家極矣在上者豈有明知為亂賊而故縱之之理乃竟使其積成凶惡者何也小人中藏禍心外示柔順彌縫之智巧則易為所欺諂諛之術工則易為所溺從來除惡之難不能察者半能察而不能斷者亦半明於易之言慎則審辨而謹防之自不至貽後患已直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也此一節書是申坤六二象傳之義也正言體義言用不孤謂德有夾持而大也孔子復釋坤二爻曰凡人德具于心而所以成德者由於學六二之所謂直者蓋其心本體至正無少偏倚故極其直也六二之所謂方者蓋其心裁制合義無少邪曲故極其方也人心皆有直方之德而獨君子能全之者內外存發之間有實學以成此德耳心不敬則內不直君子主敬以存心使私意不雜而專出於理之一途斯內直矣事無義則外不方君子守義以制事使𡵨念不生而適合於理之至當斯外方矣專求義而不主敬則存飬之功不密而或撓於其外專主敬而不守義則取舍之分不明而或淆於其內惟敬義既立斯內外夾持體用兼備不偏於一善而其德不孤矣所謂不期大而大者此也其又曰不習無不利者何也凡人蓄德未大則臨事每多所疑六二涵飬純熟矜持俱化其一身所行之事皆坦然順適無所疑礙而又何假於習乎此修德之始必致力於敬義而成德之後斯日進於從容也夫乾九二言誠坤六二言敬誠則無不敬而敬乃所以存誠故主敬者下學之要也乾九二言仁坤六二言義仁可以統義而義乃所以成仁故集義者下學之功也天道人道之辨具於此矣隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也此一節書是申坤六三象傳之義也隂謂隂位孔子復釋坤三爻曰六三有章美之德而必以含章為正道何也六三以隂從陽者也隂無專制之義雖內有美德必藴含之而不可輕露即以此德而從王事亦退處於後而不敢居專成之名是非其才力不足蓋揆之於分而有所不敢也從來陽為天隂為地三地道也陽為夫隂為妻三妻道也陽為君隂為臣三臣道也地之為道至柔至靜不敢專成惟順承天施而代有終已耳則三居臣位而代君以終其事非得臣道之正者哉大抵人臣有市美之念則驕吝日生誠明於代終之義雖勳業媲於伊周不過自盡其職業而已負咎之不暇何敢言功思懼之不暇何敢言譽彼夫小器易盈而卒至於身名俱裂者其亦未嘗學易矣夫天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也此一節書是申坤六四象傳之義也變化謂天地交閉蒙塞也孔子復釋坤四爻曰君子之出處關乎世運之盛衰如天氣下降地氣上升則變化之道行矣於時太和翔洽草木亦無不蕃殖而賢才有不連茹而起乎如天氣上亢地氣下鬱則閉塞而不通矣於時運數屯否賢人皆抱道而隱而又豈肯輕出以取咎乎易曰括囊無咎無譽正言所遇當閉塞之時固宜順時而隱謹密而不出也夫世運之盛衰雖屬氣數而必賴人事以為轉移假使羣賢皆隱則撥亂圖治之事將誰責耶蓋易為賢人未仕者謀所以藏器待時道宜於隱若以人君而求賢屯之時利建侯矣以大臣而進賢否之時疇離祉矣所處之地不同故所繫之辭各異且在上誠有用賢之君相則世道寧有不泰而賢人寧有終隱者哉君子黃中通理正位居體美在其中而暢于四支發于事業美之至也此三節書是申坤六五象傳之義也黃中德也通貫通理條理也位指尊位體指下體孔子復釋坤五爻曰六五之取象於黃者何也黃為中色而居五之君子大中之德渾然內含統而觀之則時出不窮無所不貫通也分而觀之則條理不紊無所不精晰也衆理畢備而至善無疵不猶黃之為中色乎其取象於裳者何也君子正位於上而不以尊貴自矜謙抑以禮士和易以近民其所履者雖崇髙之地而其所執者皆卑順之體不猶裳之為下飾乎蓋中為天下之美德而順則其中之用也六五有此美德充積於內於是見於四支而和順之容極其暢適美之不言而喻者然也見於事業而和順之治極其發越美之不見而章者然也德至此則自心而形諸身自身而形諸政至精至粹而無以加矣此五之象所以獲元吉哉按坤之二五皆以德言二言修德之功五言成德之效而其理則可以互通也能敬以直內而後中之體全能義以方外而後中之用備直內方外者內外夾持交致其力而黃中通理則內外一貫幾於聖人之事矣故曰美之至也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃此一節書是申坤上六象傳之義也疑敵也其類謂隂類血隂屬孔子復釋坤上爻曰坤至於上而龍戰于野何隂遂敢與陽抗耶蓋隂盛之極力敵乎陽則必至有兩相爭戰之事戰則陽氣衰而勢不能自全矣何以稱龍聖人以為隂之心雖欲剝陽而陽必無終絶之理正為其嫌於無陽也故稱龍焉且既名為龍則隂不安其為隂矣何以稱血聖人以為隂之心雖欲自離其類而隂必無常勝之理惟未離於其類也故稱血焉其𤣥與黃竝稱者何也隂為陽所敗而陽亦為隂所傷𤣥黃之色相混淆即天地之色相間雜也事出於至變故舉其相雜者以為言然而尊卑之定位貴賤之定分不可干也亦不可紊也天之色為𤣥固不得下同於地地之色為黃終不得上擬於天也豈其因一日勝負之勢而至亂隂陽之常理哉觀坤上爻所繫之辭而尊陽卑隂之意深切著明矣大抵陽剛為天下之正氣造化人事俱不容一日息者也以造化論則自姤至坤為純隂十月之卦然一陽雖生於子而實萌於亥是一歲之內未嘗一日無陽也以人事論則自古小人之類易盛君子之類易衰以小人與君子爭勝君子常不能無傷然而君子既去而小人之禍亦不旋踵非獨人事抑亦天道存焉是極否之運未嘗一日無陽也作易至此聖人之為世道慮者逺哉震下坎上屯取濟難之義凡處險難者必能奮發有為然後可以出而治險故下卦以震德之動為亨屯之本而初畫一陽居下又為成卦之主所以一卦吉凶皆視初爻以起義彖辭雖統論卦體而與初爻之㫖實互相發明其言利貞即初之利居貞也其言勿用有攸往即初之磐桓也其言利建侯即初以賢明剛正之德繫天下之望而宜早建以為侯也惟初既為民望之所歸則凡有志用世者必與初相輔乃克有濟故二乘初則屯邅三不應初則有吝四與初正應則吉無不利五位雖居尊而初得民於下則屯膏上與初地位相逺下無應援則進無所之而不能自振蓋諸爻之辭因初起義者如此至於初為卦主既曰大得民矣乃六二不應其求而反以為難何也合諸爻而言則初九以陽統隂民皆歸往據六二而言則二以隂柔為初陽所逼受制於人此一爻别取一義非全卦之㫖也程傳言之晰矣屯元亨利貞勿用有攸往利建侯此卦震下坎上以震動遇坎險故名為屯卦辭言濟險者當守正慎動而又在立賢以自輔也侯謂諸侯指初九文王繫屯彖辭曰屯難之世正人可大有為之時才足以撥亂力足以扶危應時而動於理當得元亨但屯時大難方殷舉事一不當則機㑹盡失而人心易至解體故必固守正道謀出萬全然後可以有濟決不宜欲速見小利而輕有所往以取困也至於匡濟時艱務在得賢共理如卦之初九為衆望所屬宜亟建立為侯使人心有所統繫庶幾以能濟之人行善濟之道而屯難可以悉解矣按帝王圖治非守正不能黜功利之習非慎動不能抑僥幸之謀非建賢不能收輔助之益平險一理常變一揆而當屯難之時則所繫為尤重故聖人兢兢垂訓如此彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧此彖傳是釋屯彖辭以明濟屯之道也始交謂乾坤始交一索而得震難生謂遇坎險雷震象雨坎象草謂雜亂無序昧謂晦昧不明也孔子釋屯彖辭曰卦之名為屯者蓋以卦體震下坎上是乾剛坤柔一索得震而始交再索得坎而難生也以世道論則國家肇造之始中外多難經理需人惟卦以震動之德入於坎險之中是當大難方殷而能奮發有為撥亂而為治也故卦辭繫曰大亨但在險則勢未易動必有𢎞濟時艱之才又有從容觀變之略然後動能出險而所往有功故大亨而又繫之曰利貞夫出險濟屯之事不可枚舉其亟亟於利建侯者何也卦象雷雨交作盈滿於天地之間為天運初開雜亂晦冥之象此時人心未定名分未明一人之力不能削平大難必宜擇立賢哲建以為侯方可徐理天下之紛亂收集天下之人心然而立君之後又未可遽謂安寧之時也內切履危之戒外厪防患之謀惟不寧乃所以求寧惟事事求寧乃愈不敢自以為寧此真濟屯之正道矣按卦義隂陽不交則為否始交而未成澤則為屯澤及於物則為解萬物既通則為泰由否之泰全視乎濟屯之功而其道則主於震動天時動於上人事應於下皆震之德也惟其時至事起故曰貞有濟屯之責者其可不奮發以有為哉象曰雲雷屯君子以經綸此象傳是言君子濟屯之事也雲坎象鬱而未通故言雲而不言水經綸治絲之事先經以引之後綸以理之也孔子釋屯象曰此卦上坎為雲下震為雷雷雖動矣雲蓄雨而未降屯之象也君子以治亂世如治亂絲必先整其大綱而後可舉其衆目故經以引之使統紀既立復綸以理之使節目畢詳如制田里以厚民生而復為之經理樹畜俾區處之畫其宜設學校以正民性而復為之斟酌節文俾施行之有其序如是則人心大定名分昭明而何險難之不可立平哉夫屯與需皆有遇險之義其象皆為隂陽未和而需之飲食宴樂獨有異於屯者益需之時人事巳盡則不可以期速效屯之時天運未啓則不可以無事功義固各有取也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也此一爻是言濟屯者在有守正之德以得民心也磐石也桓柱也皆難進之象周公繫屯初爻曰初九以陽剛居動體當屯難之始亟宜進而有為然陽剛有能進之才而居下則無可進之勢動體有欲進之志而應柔則無引進之人是其心雖深切時艱而未免遲回審顧有磐桓難進之象夫天下躁進者非貞而難進者為貞惟初九處得其正故能相時而不輕動揆之濟屯之道原不利於欲速幸成而利於居貞以自守也且初為成卦之主德足濟時天下之仰其德者自利於建立為侯以削平禍亂又豈終於磐桓不進已哉孔子釋初象曰初之磐桓雖勢不能遽進而其志原在行正不肯妄為稍有不合於義寧從容藏器以待之此居貞之所以利也至其以陽剛居隂下盛德不驕而日以下恤民隱為念彼民在水火之中有不引領望救而願建以為侯者乎蓋能得民心者真定禍亂之根本耳大抵天下之治亂全視人心之向背匹夫匹婦非可以權制術馭而為我用也仁足以使之感義足以使之服然後奮發舉事而人不得而議之所以三代之得天下逆取順守之說屏而不用行一不義殺一不辜之事恥而不為王道之異於霸功此而已矣六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也此一爻是言二能以正自守而不茍於從人也邅邅回也班如分布不進之貌字許嫁也乘剛謂乘初剛之上反復也周公繫屯二爻曰六二與九五為正應義所當從但位逼初九為其所制是當屯難之時君臣不能遽合而見阻於强梁之人也其象為屯如邅如而所乘之馬班如而不能進焉夫初九之强與二合者原非與二為寇實欲其合力濟屯如婚媾之相親耳惟二隂柔中正執一不渝至於歷時既久數窮理極則妄求既去而正應乃復合矣不猶女子守貞不字至十年而乃字乎孔子釋二象曰六二之受難於人止以下乘初剛欲其變常道而與之合耳天下變常之事必不能久二之十年乃字正復反於常道而君臣㑹合獲遂其本志也君子尚其知所守哉按初九為一卦之主本為賢明剛正之人二與之合力濟時未為失節而聖人於二之守貞不字深加奬許者凡以出身事人義無私交倘或迫於侵逼之勢牽於比昵之情明知其不可而姑應之鮮不至於辱身敗節故以不字為正所以戒後世之懷二心者也六三即􅎷無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也此一爻是為躁進者示戒也即鹿逐鹿也虞虞人周公繫屯三爻曰凡任天下事者必內度之巳外度之人然後能進而亦能退六三隂柔居下是內無濟屯之才也正應非人是外無濟屯之助也乃好動輕進自取困窮如逐􅎷而無虞人導之惟有陷入于林莽之中而已雖欲退其可得乎夫其所以輕進取困者由不能見幾故耳天下事應行應止原有先見之幾妄行之必致於困此幾之灼然易見者也惟君子知之與其僥幸以圖利不如舍而勿往雖無所得而必不至有失身之患若貪利往逐自不免陷於屯矣何吝如之孔子釋三象曰無虞而即鹿是以身從禽而不知舍也三之貪利躁進不可動而妄動亦猶是而巳君子見其當舍即斷然舍之誠以往則必吝故不得不去之決耳聖人戒人急於求進者如此蓋濟屯者之入乎險中與田獵者之入於險阻其危一也方其猝然遇軼材之獸駭不存之地雖使虞人導之猶懼有銜橛之變况無虞乎所以聖人取象以忘身徇禽為忘身徇利者之喻誠以天下利之所在即害之所伏惟能見幾然後利害明利害明然後取舍決不然未有不自取困辱者也六四乘馬班如求婚媾往吉無不利象曰求而往明也此一爻是言濟屯者宜求賢自輔也求謂四求初往往濟屯也周公繫屯四爻曰六四居大臣之位本有濟屯之責而隂柔無才志欲進而力不逮故有乘馬班如之象然初九陽剛居下為四正應是乃與巳為婚媾者也誠能虛已求之藉其有為之才以同往濟屯則在初得展行正之志在四得成出險之功不亦吉無不利乎孔子釋四象曰凡不明者非昧於知人即蔽於自恃六四求初九之賢同往濟屯量已之不足資人之有餘不自用而任之其識見可謂明矣蓋人臣最忌蔽賢而又最患植黨二者或疑於相妨不知意主於為國則其所以勤延攬者皆公也意主於為已則其所以廣汲引者皆私也若外避植黨之名而內懷嫉賢之實其害與樹私交者正復相等以處無事之日必誤國家况可與之濟屯乎哉九五屯其膏小貞吉大貞凶象曰屯其膏施未光也此一爻是言時危無輔而德澤難施也小大謂小事大事周公繫屯五爻曰五以陽剛中正居至尊之位宜若可以有為但時當屯難陷於險中而正應六二又隂柔才弱不能出而濟險天下民心多繫屬於初九五雖有膏澤之施亦壅而不能下究為屯其膏之象以處小事則守正猶可獲吉若欲圖濟屯之大業雖得正不免於凶甚矣其時之難為也孔子釋五象曰在上者以德及生民為大九五之屯膏則以陷入險中陽為隂掩雖有膏澤不能遍及於人故所施為未光也按聖人立教責重人事雖時勢無可為猶必教之以出險濟難之道况屯之九五本有陽剛之才未為失德而直以大貞凶為戒何哉誠以有君無臣必不能成大業五專恃六二隂柔之應斯所往多阻卦之初九既為人望所歸使與六四同屈已下賢傾心委任而又內修德政以收拾人心未必膏澤不可以下流而經綸不可以徐布故辭曰屯膏以明求賢之宜急也上六乘馬班如泣血漣如象曰泣血漣如何可長也此一爻是言無才無輔不能出險也周公繫屯上爻曰從來天道人事窮極則通亂極則治上六居屯之極正有可亨之機乃隂柔無才又無輔助因循不進坐失事幾徒為無益之憂懼而已有乘馬班如泣血漣如之象孔子釋上象曰上六當屯極之時昧於出險之義既不能致治則必入於敗亡泣血漣如豈長久之道哉此聖人危其辭以為濟屯者戒也易之所重德與應而已陽剛之德雖無應猶可有濟若質本隂柔而復無陽剛之應鮮不敗矣即此卦而言二之班如以待五也四之班如以求二也皆為隂與陽應故有吉利而無凶悔就諸卦而言否之上九以才足傾否則喜蹇之上六以來就九五則吉其他如復如坎如困則無德無應與屯之上同一象矣故曰陽為貴隂為賤易之通義也坎下艮上蒙取飬蒙之義物生方稚養德更難于飬身聖人欲立教者動合于中而施當其可故卦辭豫之以亨而又戒之以利貞六爻四隂為蒙二陽為治蒙之人而上九過剛不中又以九二時中為一卦之主初承二則有利四逺二則有吝五應二則得吉五身居尊位而能自處于蒙以為天下率教者之倡此剛柔之所由相接而聖功之所由克成也至若三近于二宜與初相同而其正應在上舍上而從二有見利忘義之象故君子絶之蓋易卦之所重在應屯之二以不附初為有守所應正也蒙之三以下從二為失身所應不正也應失其正則身敗名辱雖有包蒙之教亦無所施是非用上九之擊蒙不足以遏其邪而止其惡矣大抵治蒙之法貴乎寬嚴適中而制之于早則易為力防之于後則難為功制於早者發蒙者也正法以繩之而有餘防于後者擊蒙者也干戈以禦之而不足所以聖人取象于初曰脫桎梏于上曰利禦寇正以立教之初意原主于寬其至于擊蒙禦寇蓋不得已而用之者也養正之功誠不可不豫矣哉蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞此卦坎下艮上山下有險內險外止俱有蒙滯未通之意故名為蒙卦辭言亨蒙之道貴當其可而要之以正也我指九二言童蒙指六五言文王繫蒙彖辭曰蒙雖稚昧未通然真明內含天良未鑿原有可通之機一開發之即通矣故蒙者得亨而不終于蒙然蒙之能亨雖蒙者有可亨之道亦由發蒙者得善教之宜教之之宜何如師道不可輕䙝有來學無往教匪我主教者先求童蒙而強為啓迪乃童蒙虛心遜志先束求我以決疑辨惑也且求我之心真實純一如初筮之誠則宜迎其機而告之庶言不煩而教易入若至再至三則煩瑣而瀆矣瀆則求教之心不切即告之亦必無益故隱而不告如是則蒙者固能求而明者又善告此蒙之所以得亨也然其所以告之者又必擴其良知充其良能非聖人之言勿道非先王之法勿陳而利于貞焉庶蒙者德日進於髙明業漸臻於光大而養蒙之道始無愧矣昔宋儒周敦頤有言人生而蒙長無師友則愚故師道立則善人多善人多則朝廷正而天下治矣然則擇師求道誠人生第一義也彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以飬正聖功也此彖傳是釋蒙彖辭而備言亨蒙之道也孔子釋蒙彖辭曰卦之所以名蒙者卦體坎下艮上上有艮山之阻下有坎水之險卦德內險外止內險已杌隉不安外止又滯礙難進正如物生之初蒙昧未通故曰蒙也至蒙之所以得亨者卦體九二以可亨之道行以教人已昭昭而教人昭昭且啓迪合宜語默中節而時中也何以見之如匪我求童蒙童蒙求我蓋以六五柔順虛中下應九二非二有求于五乃五尊賢樂道之志下應于二也此非二有亨蒙之道五未必求若使非時中則亦不待求而教之矣初筮告者以九二有剛中之德故能施教有節必待其誠而始告也若再三瀆瀆則不告者蓋蒙者再三固為瀆我我若告之蒙亦不能聽受彌增疑惑反瀆蒙矣故不告也此非二有亨蒙之道無以告蒙若使非時中則告之亦無節矣又曰利貞者何也蒙而飬之以正乃作聖之功也蓋人性本正當顓蒙之始其天真未漓則當保全其正者惟此時其情識漸開不可不範之以正者亦惟此時教者必及此時涵育薰陶擴充培養日使之親正人聞正言全其性命之體滿其知能之量則赤子之心不失而逹天立命之學在是矣非聖功而何夫蒙者之求教與教者之發蒙無不以聖人為期而聖功惟在養正可見天理人欲全在辨之于早若待外誘既深發然後禁則扞格而難勝矣伊訓云罔不在初召誥云王乃初服後世留心國本者必惓惓以早諭教為言其亦有見于此乎象曰山下出泉蒙君子以果行育德此象傳是言君子自飬之道貴內外交致其功也果行者勇決其行育德者涵飬其德孔子釋蒙象曰艮象為山坎象為泉山下出泉其水最清其流未逹猶人之童稚天良內具而鬱滯未通蒙之象也君子欲開一世之蒙必先有以自開其蒙于是體坎之象以果其行見善必遷有過必改如泉之始逹其機莫遏體艮之象以育其德培其知能葆其忠信如山之靜正其源常裕如是則內外交修本末一致所以開一已之蒙在是所以開天下之蒙亦在是矣蓋德者行之自出行者德之所形惟其所飬能厚故其所應不窮不然源之不深其流雖疾而亦易竭則育德尤為探本之功歟初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也此一爻是言發蒙之道貴寬嚴相濟也刑人用刑之人桎足械梏手械周公繫蒙初爻曰初六隂柔居下蒙之甚者教者欲開發其蒙當嚴之以威使之有所畏懼而不敢不勉于善用刑人以懲之乃為利也然嚴以束之又當寬以待之用說桎梏以俟其自悟自新相觀而化焉若徒恃嚴威往而不舍在我既失張弛之道蒙者即欲為善其道無由吝其能免乎孔子釋初象曰治天下有教化不能無刑罰教以養童蒙之君子刑以懼愚蒙之小人發初之蒙利用刑人者所以正治蒙之法使之有所畏懼而不敢犯也蓋發蒙之道既用刑以懲其初即用說以觀其後則飬之意未嘗不寓于法之中禮曰師嚴然後道尊道尊然後民知敬學書曰敬敷五教在寬然則寬以濟嚴嚴以濟寬發之道莫善于此矣九二包蒙吉納婦吉子克家象曰子克家剛柔接也此一爻是言施教之道貴曲成不遺也包涵育之意納受也婦羣隂之象周公繫蒙二爻曰九二有剛中之德膺發蒙之任不特樂育英才而已即隂柔蒙昧之人亦包之而不遺則智愚皆可成就何吉如之且不特奬掖善類而已即暗昧無知如婦者亦納之而不棄則賢否悉受陶成又何吉如之凡此敷教之任皆君事也大君以啓蒙之責委之於臣猶父母以治家之事委之於子也二能克盡厥職合智愚賢否而包納靡遺是臣之克相無負于君猶子之克家無忝于父也二誠以亨行時中者哉孔子釋二象曰二之子克家固因二有剛中之德足以發蒙亦由六五柔中虛已有以接之故二得行其時中之道以成發蒙之功也不然上下不交堂亷隔絶二雖有師世之才將安施乎昔伊尹負鼎鼐之才傅說具鹽梅之望使非成湯尊為元聖寵以阿衡高宗夢寐旁求爰立作相彼亦烏能化被當時聲施後世哉甚矣任賢圖治為萬世人君之要道也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也此一爻是言無德者必見棄以明行已之當慎也女指六三勿用取指上九金夫指九二順當作慎周公繫蒙三爻曰六三隂柔不中不正是下愚不移之人君子之所不屑教者如無德之女不可取之以為妻也蓋上九乃六三正應三舍上九而眤比九二如女之見金夫而不有其躬者穢德彰聞人皆賤之何所利乎孔子釋三象曰凡人立身當兢兢以禮自持女之所以不可取者以其蕩檢踰間素行不慎故也蓋與人為善固君子之用心而自暴自棄者則不得不痛斥之冀彼或生愧悔之念故均是女也在九二則宜納之以大其包荒之量有教無類也在上九則勿用取以嚴至正之防不屑之教也教固多術矣哉六四困蒙吝象曰困蒙之吝獨逺實也此一爻是言人貴能得師也周公繫蒙四爻曰蒙昧之人全賴親近剛明有道之士以開其蒙而啓其悟六四隂柔不中上承六五下乘六三而其應又在初六所親近者皆隂柔之人則蒙將終于蒙而永無開悟之日矣羞吝其能免乎孔子釋四象曰天下無不可變之質無不可啓之蒙四獨致困蒙之吝者何也蓋九二上九二陽俱有剛明之實德六四獨與之逺是衆人皆有道義之交而彼獨無賢明之助其困蒙而吝也宜矣昔仲虺誥成湯曰能自得師者王謂人莫已若者亡好問則裕自用則小夫成湯聖君也仲虺賢相也其君臣誥誡猶諄諄以得師好問相勸勉人固可以孤陋自處而甘致困蒙之吝哉六五童蒙吉象曰童蒙之吉順以巽也此一爻是言受教之道貴于能虛純心親賢則德業可成也周公繫蒙五爻曰六五柔中居尊下應九二其心純而不雜一而不二有初筮之誠無再三之瀆如童蒙之淳朴未漓知識未開者然如是則主心日明主德日懋其為吉也不獨在一人而在天下矣孔子釋五象曰六五取象于童蒙而獲吉者以其有柔順之德故能謙巽以從乎二也使非五順而巽二雖賢其能强五以從已乎蓋人主處至尊之位必親賢取善方可輔成其德然非卑躬遜志以求之則賢與善雖日在吾前而終不能得其益先儒嘗言此道與溺于利欲之人言之猶易與溺于意見之人言之甚難誠以人先有意見橫于胸中此心便蔽而不明雖有忠言讜論亦無由而入矣此童蒙之所以吉也上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也此一爻是言治蒙者宜以剛而又貴當其可也寇害也禦禁止也周公繫蒙上爻曰以九居上治蒙過剛有擊蒙之象然剛克之道施之貴得其宜始有利而無害如以過剛之道責蒙者以未能知之理未能行之事則阻其向往之機反有害于蒙是為寇也亦何利乎惟用此以捍其外誘以全其性真如禦寇者然使其私意盡屏而醇良不失庶幾作聖之功即在于是斯無不利矣孔子釋上象曰上之擊蒙利用禦寇者蓋以威嚴治蒙者之私心不悖剛克之道上固順矣蒙因教者之嚴而改過自新不敢恣肆于為惡下亦順也上下皆順又何不利之有哉此卦九二上九俱有剛明之德上雖不及二之中而亦當發蒙之任九二包蒙納婦利用寬上九擊蒙禦寇利用嚴寬以飬其善機嚴以止其邪念師教之道備矣日講易經解義卷二
