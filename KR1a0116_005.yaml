body:
  text: 欽定四庫全書日講易經解義卷五艮下坤上謙取退讓之義以山之髙而遜居於地之下能自屈而不居其盈其象謙聖人言君子立德立功於持身接物之間伐施盡化恭讓交孚斯無往不亨而身名俱泰故以亨而有終豫之且謂君子德以謙著天下莫能掩其光望以謙崇羣品莫能加其上由其秉心抑畏盡人道而合德於天地乃為君子之終而非以退為進以屈為伸者所可擬也故合六爻觀之初之善下二之有聞三之不有其功四之撝不違則五之不挾富有而得衆六之不騖逺略而治私可以濟險難可以宣義問可以讓大美可以輯臣鄰可以用征伐為下則罔以寵利居成功為上則不以崇貴驕天下宜其無往而不與吉應也至九三一爻勞而能謙天下既仰其豐功又髙其雅量彖曰君子有終爻辭亦不復易蓋乾三君子嚴夕惕之修坤三有終具含章之美皆為謙三之所兼有孔子特以萬民服歸之所以深著其忘矜伐戒滿假允符乎好謙之人道也故彖曰君子有終爻亦曰君子有終也聖人觀象繫辭之㫖不大可見哉謙亨君子有終此卦艮下坤上卦德止內順外是心不肆而行不驕卦象山髙地卑是以至髙而屈於至卑皆有而不居之義故名為謙卦辭言謙為人之美德人能謙則所行無不得也謙者有而不居之義有終謂先屈而後伸也文王繫謙彖辭曰謙者有德而不以德自居有功而不以功自居內則其心收斂而不矜外則卑以下人而不亢如是則行無不得動無所阻自無不亨其先也不敢自居其有雖似屈其究也不能沒其所有而必伸此君子之道為有終也接易六十四卦皆多危懼之辭即乾坤尚所不免獨繫謙彖爻無不吉亨者蓋海惟善下為百谷之王人惟能謙為衆祥之本書云滿招損謙受益詩云彼交匪傲萬福來求其即亨而有終之謂乎彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也此彖傳是釋謙彖辭明天地之道以謙而亨而造化人事俱不外乎謙道也光明謂化育光顯上行謂承天時行變謂傾壞流謂聚而歸之孔子釋謙彖辭曰卦之名為謙而得亨者蓋謙道至大雖天地有不能違者天雖居上而其氣常下降以濟萬物故氣一噓而萬物以生氣一縮而萬物以成其道之光明為何如是下濟為謙而光明則亨矣地道至卑而能承天時行以上配乎乾故物之生雖出於天不得地以承之則生物之功不終物之成雖主於天不得地以承之則成物之功不逐其道之上行為何如是卑為謙而上行則亨矣天地以謙而亨則人之謙而必亨不待言矣試博舉而曠觀之如在天道日中而昃月盈而蝕寒往暑來暑往寒來是虧盈而益謙也如在地道盈滿者傾變而反陷卑下者流注而益增是變盈而流謙也如鬼神於人物在人則貪滿者多禍守約者多福在物則茂盛者漸至於衰謝凋落者更見其發生是害盈而福謙也至於人之好惡則更有可見者其盈滿者必為人之所惡其謙下者必為人之所好在人豈有心於好惡哉亦在已者有以感召其好惡耳故居尊位而謙則為人道所好德因謙而益顯居卑位而謙亦為人道所好而人亦莫能過此皆君子有終之道也按天地鬼神不可知故據其迹之可見者言之若人則可知者故直言其情曰好惡以其不可知故常尊而逺之以其與人無以異則修吾人事而已志自滿九族乃離德日新萬邦惟懷人心之所順則天地鬼神亦豈能外是也歟象曰地中有山謙君子以裒多益寡稱物平施此象傳是言君子治世使謙之象也裒謂損益謂增孔子釋謙象曰此卦地中有山是地雖卑而中之所蘊則髙有謙之象君子法之以處世不可以自髙而卑人故有持平之道焉蓋自髙之見常患有餘自卑之情常患不足惟裒損其矜髙之多而謙以持已增益其謙下之寡而卑以下人稱量於人已之間而適符其當輕當重之等則施於人巳者自得其平矣按古之帝王皆有謙德如堯之允恭克讓舜之溫恭允塞禹之不自滿假皆此意也故聰明睿知守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙斯深得乎裒益之道者歟初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也此一爻是見謙德之能濟險也牧養也周公繫講初爻曰初六以柔處下深自抑損絶無矜才衒能之意此乃謙之獨至謙而又謙君子之行也本此謙謙之道用以濟險如涉大川之艱亦獲衆心之順助而得吉况平居乎孔子釋初象曰所謂謙謙之君子者非矯飾而然也夫居已於髙居人於卑者人之常情初六以卑下之道自養而不敢有上人之意蓋蓄於素者咸退遜之心斯發於外者皆謙抑之度所以成其為謙謙之君子耳斯豈致功於旦夕者所可幾歟按涉川為最險之事而屬之謙謙君子者蓋𢎞濟時艱必非尊已凌物一往用壯之士所能勝任也我心果能深自挹損退然處下則世雖有桀驁難馴之人見之必且意盡消沮縮伏而不敢動矣有何險之不化為平而禍之不轉為福也耶六二鳴謙貞吉象曰鳴謙貞吉中心得也此一爻是見謙德之盛而得其正也鳴謂聲聞周公繫謙二爻曰六二柔順中正有謙之資而又得乎謙之道由是積中著外謙而有聲聞矣此非違道以干譽乃理之所當然而得其正也由是人皆知之則志行孚而名譽著上可以得君下可以得民何往而非吉乎孔子釋二象曰六二之謙推原其心初非欲求聞於外也乃中心所自得耳然有是德積於中則必有是名聞於外斯豈外襲者哉朱熹有言太虛中本無物事業功勞於我何有此心體之本然也能知此意則禹稷之功名周公之制作皆我分內當為之事何所用其矜伐然有意為謙反失之矣六二中正適得於心體之本然其鳴謙也夫豈以聲音笑貌為哉九三勞謙君子有終吉象曰勞謙君子萬民服也此一爻是見大臣有功能謙而長保其盛也勞謂勳勞周公繫謙三爻曰凡為大臣者皆思建功於天下而恆不能以謙自處九三以一陽居下之上而為上下所歸是當位任之隆德盛業著而有功勞於天下者也乃三不自居其勞而退處於謙則不矜而天下莫與爭能不伐而天下莫與爭功自能有終而吉矣孔子釋三象曰謙固人之所難若有功勞而能謙則尤為人之所難今九三勞而能謙則豐功有以答天下之心而雅量有以洽人心之好此萬民之所以咸服也按繫辭于謙九三曰勞而不伐有功而不德厚之至也惟德厚之至故不自覺其功之盛自古有功之臣令終者鮮皆由器小易盈恃功驕恣所致故謙則終吉不謙則終凶出此入彼間不容髮繫辭又曰致恭以存其位雖贊之實勉之也夫六四無不利撝謙象曰無不利撝謙不違則也此一爻是見大臣之能謙而合乎道也撝謂發揮周公繫謙四爻曰六四柔而得正居上而能自下如是則在彼無惡在此無斁在邦在家無所往而不利固已見其謙矣然四居九三功臣之上功不及而位過之故當本謙德之已形凡見於辭氣容貌之際者一一發揮以示不敢自安於九三之上如此則為之上者嘉其謙而為之下者服其謙矣孔子釋四象曰四之無不利而撝謙者得無疑撝謙之或過乎不知四居九三功臣之上推賢讓能道理自當如此是四之撝謙乃適合乎謙之則也豈為過乎蓋推賢讓能庶官乃和此一個臣之無他技而天下之有技彥聖無不在其休休有容之中也六四與九三不惟無相忌之嫌而且有相讓之美三代而下若周勃之於陳平盧懷慎之於姚崇其猶有此風乎六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也此一爻是見居尊能謙而得人心之用也鄰衆也周公繫謙五爻曰人君馭下雖有崇髙之位不可無謙德以臨之六五以柔居尊是在上而能謙者居尊而謙則從之者必衆為不富而能以其鄰之象夫六五之謙以臨下則在下宜無不服矣而設有未服者不可已也蓋六五既得衆心之歸即用之侵伐以誅暴而去惡何不利之有然居上能謙何事不可為者不但利用侵伐也即用之他事而亦無不利矣孔子釋五象曰五之利用侵伐者豈觀兵以黷武哉以其冥頑之寇强暴之敵負固不服而征之耳非得已而不已也從來兵凶戰危聖王不得已而用之此爻以征伐為利者蓋師出無名謂之黷武師加不道謂之義兵為君者能用謙德綏諸侯而不以力征天下則師之所至有若時雨始雖崛强跋扈終未有不帖然馴伏者舜舞干而格有苗文因壘而降崇虎其明證矣上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也此一爻是美其謙德而惜其限於才位也邑國謂己之私邑周公繫謙上爻曰上六謙德著聞為人心所樂與則協力同心即用謙以行師而亦無不利矣但質柔無位則才既患其不足而力又不能以有餘是師之所行但可征己所治之邑國而不能以及逺也孔子釋上象曰上六謙德著聞宜乎人無不歸矣以其質柔則不足於才無位則不足於力故志獨未得而至於行師也雖可用行師亦不過足以治其私邑而已然豈不足於謙德者哉按謙之功用不特可以處常而正可以濟變觀初之用涉大川五之利用侵伐上之利用行師可見謙道非徒一於卑㢲而用武尤深戒夫振矜人主臨事應變而能以不驕不亢之德行之則亦安往而不如意哉坤下震上豫取和樂之義所以致和樂者由九四一陽統衆陰其志得行而卦德又順理以動故也然豫有二義卦之豫乃萬方和樂之徴雖建侯行師而亦利爻之豫率一已晏安之事有吉凶悔吝之不同天下之豫不可無而一身之豫不可有若初恃應而鳴其得意則凶三援勢而溺於久安則悔五處尊位耽樂而致疾上居動體縱極而始渝此皆過於逸樂者也即四能造天下之豫恐其治定之後疑忌易生故又勉之以開誠布公合聚同德相與共保其豫焉但在本爻有說安天下之志而在五爻涉攬權逼上之嫌又易之因爻起義者也惟介石之二中正自守無欲而靜絶耽戀之私炳幾先之哲自能行與吉會非諸爻之所及也至於三之悔上之渝皆有可以趨吉之機聖人亟開以自新之路惟恐其以佚欲終其垂戒之意切矣豫利建侯行師此卦坤下震上有人心和樂以應其上之義故名為豫卦辭言處豫者能合人心則大事無不可為也建侯謂立君行師謂命將文王繫豫彖辭曰有天下者至於豫此非常之遇而大有為之時也蓋天下事以得人心為本使人心未得而妄有作為鮮克濟矣當豫之時萬衆歸誠一人悅豫所謂樂以天下者也得天下心行天下事以之建侯則統馭有方而無强梁跋扈之患以之行師則大權在握而有除殘伐暴之威則其於他事亦無不利可知矣按比卦象曰建萬國親諸侯師卦象曰容民畜衆而豫之彖辭兼此二者雖皆得坤之順然師比遇坎猶有險難若豫則四方底定六服永清固非同屯之不寧而建侯謙之不服而侵伐也人主處此倘以時際宴安粉飾至治甚而濫加封爵賞非其功廣啓兵端罰非其罪豈保大定功之善術哉惟深思安不忘危治不忘亂則久安長治永永無疆已彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉此彖傳是釋豫彖辭極言豫之時義為大也剛指九四應是上下人心應之志行是九四之志得行不過以晷刻言不忒以節候言孔子釋豫彖辭曰卦之得名為豫豈偶然哉蓋人心不應則吾志不行而所動不順則人心不應今卦體九四一陽上下應之是大臣負天下之望朝野悅服而吾志得行矣卦德坤順震動是主豫者順理而動隨事得宜而人心協應矣故其卦名曰豫然是順以動也豈惟人事為然從來天人感應無非一理將見上而隂陽合其度下而剛柔適其宜人心和樂而天地以和樂應之亦如我之順動而不違矣何况建侯行師尤人和之可驗者乎由此推之彼氣機之通復天地之動也而順其常運則日月往來晷景長短無過差也四時代謝分至啓閉無愆忒也而天地不外乎順動矣彼政教之張弛聖人之動也而順其常道則獄訟衰息民志大畏無繁刑也勝殘去殺久道化成無怙惡也而聖人不外乎順動矣則是豫順以動天地聖人且不能違其為時義不誠大哉自豫以後凡十二卦豫隨遁旅姤言時義坎睽蹇言時用頤大過解革言時各隨卦體贊之蓋未有有時而無義有義而無用者所以皆謂之大哉以見其贊嘆之無盡也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考此象傳是言先王法豫之道也殷盛也孔子釋豫象曰雷始伏聲於地鬱而未舒今出地而作聲鼓天地之太和暢萬物之生意和之至豫之象也先王法此宣之以聲而宫商律吕之俱諧飾之以容而羽旄干戚之備具豈徒美觀聽已哉凡以一代之興必有一代之德藴之為精微之懿發之為謨烈之隆惟樂能昭明而崇顯之至其用之極盛而蔑以加者莫大乎祀冬至祭天於圜丘而配以祖季秋享帝於明堂而配以考大合衆樂備極九變達仁人孝子之誠展薦德歌功之志而天祖無不來格樂之洽神人和上下如此先王法豫之功何其至哉昔儒有言觀上天下澤而禮定於履觀雷出地奮而樂作於豫然禮猶可因時制宜而樂之作必在治定功成人心和悅之後人主當深思豫之為象而精求作樂之本豈可徒事於聲音文貌之間哉初六鳴豫凶象曰初六鳴豫志窮凶也此一爻是言附勢之小人自取凶咎也窮謂滿極周公繫豫初爻曰自古小人所以自取敗亡者豈有他哉惟知勢位之可恃而不識盈滿之為憂初六以隂柔小人上應九四之强援乘時肆志悅樂之極至於誇耀驕矜自鳴得意一旦勢衰禍不旋踵凶莫大焉孔子釋初象曰凡人志不可滿樂不可極初六而至於鳴豫者以有援在上求無不得志盈意滿不自斂戢以取敗亡其為凶也不亦宜乎按豫卦得名本為和樂然樂同天下則吉樂專一身則凶小人附權依勢惟知逞一己之私肆無忌憚馴至凶禍而不悟聖人之垂戒深矣六二介于石不終日貞吉象曰不終日貞吉以中正也此一爻是言守正之君子為能超於流俗炳於幾先也介石其守堅確如石不終日見幾之速周公繫豫二爻曰人情易溺於豫既溺於豫則必至反樂而為憂矣若六二中而得正獨能以德自守凡世間可喜可慕之事無一足動其中者故有介於石之象夫人溺於富貴逸樂其心易蔽其神易昏故事幾之來當前迷眩以介石者處此靜而能明安而能慮則凡微彰剛柔之幾一見即决轉移趨避有不待事之終日而始知者良由心中淡然無欲而得操守之正也貞而獲吉宜已孔子釋二象曰六二之不終日貞吉者以二居下卦之中得隂位之正中正自守不溺於豫靜虛之餘思慮自能精審所以知幾之速如此也使其耽樂是從而心無所主豈有是貞而獲吉哉按豫六爻九四外初之鳴豫三之盱豫五之貞疾上之冥豫皆溺於豫者也惟二介然守正操持固而審幾决獨貞而且吉蓋常人多欲其悟也恆在事後故咎至而不知至人無欲其覺也恆在幾先故超然而無咎聖人為處豫者示之極則如此六三盱豫悔遲有悔象曰盱豫有悔位不當也此一爻是戒附勢之小人望其改過以自新也盱上視貌上悔為悔悟之悔下悔為悔吝之悔周公繫豫三爻曰六三隂不中正素無介石之操惟知憑藉勢力以取富貴仰視九四大臣依阿取寵以恣所欲宜有悔者也倘能改絃易轍舍舊圖新猶可自免若依違寡斷遲久不決所謂過而不改是謂過矣安能免於悔哉孔子釋三象曰三雖近四亦復何傷特以不中不正處位不當故盱豫而有悔可見豫非溺人人自溺耳蓋吉凶倚伏惟人自取聖人於六三始則示以致悔之端終則勉以改過之勇為小人者奈何不翻然自省也哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也此一爻是言大臣當國宜得人以致豫也簪所以聚髮盍簪言皆速聚於我也周公繫豫四爻曰九四一陽居大臣之位任天下之重凡君之享和樂於上民之享和樂於下皆由我以致之生平事業無乎不遂所得孰大焉然天下之豫固由於已而所賴共保其豫者實在乎天下之賢但天下之賢非猜忌嫉妒者之所能致也必開誠布公一出於任賢勿二之志勿外信而內疑勿始信而終疑則我不疑人人亦不疑我同類之朋咸樂至而為我用如髮之聚於簪焉衆正皆升羣策並效一心一德以成保豫之功所得不誠大哉孔子釋四象曰大臣以道濟天下為志茍有一人之未豫則志必有所歉而弗行矣今在上在下莫不由我以致豫是其夙昔所期為上為德為下為民者至此大行而無遺憾也爻之繫大有得者以此蓋大臣𢎞濟艱難非一手一足可勝任故以得人助理為急然必先具知人之哲而後賢否不致混清邪正不相傾軋庶幾盍簪之朋皆同道之君子而不惑於同利之小人有任人之責者尚其致慎於聚之之正而毋溺於諂媚之徒則幾矣六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也此一爻是戒人君不可過柔因豫以致疾也貞疾猶言痼疾周公繫豫五爻曰六五當豫之時以柔居尊沈溺於豫固有致疾之理矣且上下皆應乎四强臣當國衆心附之以君而反制於臣太阿倒持威權盡失如負疾之人久而不愈瀕於危亡者然然以所處得中先世之流風善政尚有存者天下有所畏忌而不敢動國脉猶可以茍延又為恆不死之象焉果能一念振作奮發有為則未必不去疾而保豫也孔子釋五象曰六五之為貞疾者九四剛而不遜五以柔乘其上權歸於下勢孤於上故也其恆不死者以所處猶中先世之餘澤尚存故能保其虛位而不至於亡也豫卦於五專言為君之道不可偏過於柔蓋威福為人君治天下之具臣下欲竊之者必先以聲色貨利蕩其主心使之耽於佚豫然後可惟所欲為隂盜其柄而不覺人君誠知陵替之由皆起於耽樂兢兢業業日厲精於上則清明在躬志氣如神自可逆折强臣之萌而主威不至下移矣上六冥豫成有渝無咎象曰冥豫在上何可長也此一爻是戒人之終溺於豫而勉其遷善也渝變也周公繫豫上爻曰上六以隂柔居豫極是從於匪彝安其危利其災而不自覺者有昏𡨕於豫之象幸居動體冀其能變若因天理萌動之機一旦悔悟痛革前非事雖成而能有渝改過不吝自不罹縱欲敗度之愆何咎之有孔子釋上象曰上之為冥豫者以其昏迷於豫而至於如此何可長久而不知渝變乎茍能知逸豫之不可長幡然變其故我則冥冥者可為昭昭已人何不自勉焉按冥豫與冥升迷復同義聖人不言冥豫之凶而言成有渝之無咎取其能變則去凶而即無咎矣初六鳴豫即斷之以凶甚於初者所以遏其惡也上六𡨕豫則開之以無咎恕於終者所以誘其善也可以識處豫之道矣震下兑上隨取說從之義卦因剛來下柔此動彼說得名蓋上有徽柔之德則剛明之臣來而下之卦變之所謂隨也有振作之才則億兆之心說而附之卦德之所謂隨也大抵物之相隨與已能致物之隨以德孚則一於貞以私合難免乎咎此彖辭所為特致其丁寧而全卦以利貞為斷也雖卦言物隨爻言隨物所指不同義不外此六爻初有所渝則以廣大無私為貞二三有所係則以逺邪能守為貞四以同德之陽隨剛中之主則以誠積於中動合於道者善全其貞若九五以剛中正之君應柔中正之臣是猜嫌泯而嘉㑹成也上六以肫篤之極為聯屬之本是神明通而幽遐格也何一非正而固之實效乎合而觀之公正開隨之始至誠要隨之終盡乎締交之道矣處柔勿眤於宵人得志必敦乎名節位極人臣不以危疑存退避之跡惟以明哲昭靖獻之忱盡乎獲上信友之道矣至於陽剛之君孚嘉美之佐精神攸洽德業交成致吉之道無過於此彖所謂大亨貞無咎而天下隨之者備著乎九五一爻隨之義顧不大哉隨元亨利貞無咎此卦震下兑上為此動而彼說有隨之義故名為隨卦辭言為上者得人隨之益而又明隨之道當出於正也隨從也元亨以事言無咎以理言文王繫隨彖辭曰已有致隨之道而物有來隨之應同心者多則何事不立何功不建其得大亨固已然必已之致隨者無違道之私而物之隨我者非黨同之弊一出於貞斯於理為順於心為安無愧於隨之義矣何咎之有若所隨非正則為非道以相與雖可致亨而亦未免有咎也可不慎哉按天下之為隨不一而莫大乎君臣之相隨君之致人隨固貴乎正而臣之隨君尤宜審擇天命之所歸人心之所向必如張良之從漢髙鄧禹之從光武諸葛之從昭烈應天順人功建名立雖伊尹太公之業何以加兹茍不擇所隨失身依附楊雄之臣莽荀彧之仕魏甚至馮道之閲歷五朝寡廉鮮恥喪名敗節其能免當時之非笑後世之指摘哉此不貞之所以取咎也彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉此彖傳是釋隨卦彖辭而極言隨之貴於正也上隨時之時當作之下隨時之義當作隨之時義孔子釋隨彖辭曰卦之名隨者於義何所取哉卦變自困來者二之九下居初初之六上居二又自噬嗑來者上之九下居五五之六上居上而自未濟來者兼此二變柔皆自下而上剛皆自上而下是剛來下柔退居隂後也卦德震動兑說是此動而感乎彼彼說而從乎我皆有物來隨我之義此其所以為隨也夫當隨之時彼此相通樂從無强既元亨矣又必得正而無咎者何哉蓋正者人心同然之理也致隨之道惟出於正則一人之心適合乎天下人之心將見近說逺來無思不服盡天下而隨之帝之所以為帝王之所以為王皆在乎此非若歡虞小補之治而已此其時義豈不大哉按天下隨時本義依王肅釋作天下隨之諸儒之釋又皆以為隨時蓋正適於時之宜則隨乃盡乎正之利細而一語默一嚬笑一作息大而政事之張弛賞罰之先後禮樂之質文各順乎其時而變通以行其正是以剛而無虐柔而不屈動者不倦說者無厭而天下之相隨者相依固結而不可散也茍泥於正而違乎時非其時即非其正矣天下其孰能隨之此其義固可相發明耳象曰澤中有雷隨君子以嚮晦入宴息此象傳是言君子隨時靜養之道也嚮晦日暮之時孔子釋隨象曰兑上震下是澤中有雷陽氣之動奮者隨伏入之時而休息於下此隨之象也君子體此以為自强不息此心固不容以怠荒而動靜相生此身又不容以不息蓋日出羣動皆作則以作為正日入羣動皆息則又以息為正君子晝不居內夜不居外各隨其宜固如是耳蓋天道人事未嘗少異如窮冬閉塞雷隱澤中造化之宴息也日入冥晦君子處內人事之宴息也人身一動一靜默與天運相符必能保固精神而後可恆久不已否則進鋭者退必速始勤終怠之弊安能免哉初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也此一爻是言隨人者不可不正而又當廣其集益之道也官猶主也渝變也卦以物隨為義重物來隨已爻以隨物為義重已往隨人周公繫隨初爻曰初九以陽居下所謂剛來下柔也為震之主所謂此動彼說也卦之為隨皆在於初初為成卦之主隨之官也在我既有所隨則有心不若無心之公有主不若無主之虛而於廓然大公之本懷未免有所渝變為官有渝之象夫私於所隨固為未善然亦顧其所隨何如耳若其所隨皆正則無比匪之傷而有輔仁之益不亦吉乎而尤貴廣大公溥出門以交則已之取於人者無限人之資於已者靡窮事無不成業無不就其有功更為何如哉孔子釋初象曰初既官有渝矣何以得吉惟從正則所與得人而無損友之傷故吉也出門交有功者交之既廣則可以友天下之士而一善必録無所遺失此其所以有功也蓋隨之為義必以得正為善而又恐其可者與之不可者拒之度量褊淺取益未宏故以出門交有功朂之前聖之指示後人者切矣六二係小子失丈夫象曰係小子弗兼與也此一爻是言人之失其所隨為不正也係牽也小子陽之微者謂初丈夫陽之壯者謂五周公繫隨二爻曰凡隨人之道當以邪正為取舍不可以逺近為親疏今初陽在下小子之象雖非正應而近於二五陽在上丈夫之象雖為正應而逺於二以理而言二當唯五之從乃以隂柔禀性躁急不能寧耐自守反狃於近習而從初既從於初則不得復從於五矣為係小子失丈夫之象夫從所當舍舍所當從失隨之正凶吝何待言哉孔子釋二象曰人之所隨是非邪正無兩可之道二既係乎初之小子則必失乎五之丈夫其勢固不得而兼與也此君子所以必慎所從而不可牽於一時之茍合也哉夫二本柔順中正以五應之則為孚嘉而爻不之許者以情牽也情之所牽必至以私廢公以欲滅理所得者微而所失者巨矣推而廣之如見小利則大事不成或小不忍則亂大謀或貪近功而忘逺害孰非此一念致之哉六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也此一爻是言人之得其所隨而又戒以必出於正也丈夫謂九四小子亦謂初周公繫隨三爻曰四陽在上丈夫之象所當隨者初陽在下小子之象不當隨者三近四而逺初則惟近之從而不暇及於逺為係丈夫失小子之象夫四陽當任而已隨之何求不獲何欲不遂然使以有求必得之故而茍於求則又豈君子之道義自重者哉故必利於居貞不為夤緣茍且以圖僥幸之富貴而致入於邪媚庶乎其無失矣孔子釋三象曰三之係丈夫豈獨勢之弗兼與哉蓋其取舍之極定於中志在從四終身以之其視在下之初固非所當隨者毅然舍之而不隨也不然烏能决擇如此其有定哉按以六居三不正也以九居四亦不正也以不正相比恐其專計弋獲不能以道自處而遂至於詭隨故聖人以利居貞勉之以見人之失足權門希圖富貴不過僥幸一時之榮而身名一玷千載長羞孰得孰失何去何從可不致辨於此乎九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也此一爻是戒為臣者不可以權勢上陵而惟當盡誠正之道也在道以理自守明明哲也周公繫隨四爻曰九四以陽剛之才處近君之地是其德之盛位之隆而奮然大有為於天下亦何所圖而不成故隨而有獲也然四以人臣建不賞之功挾震主之勢駸駸上陵於五雖其所行咸出於正而疑忌之端决不能免凶可知矣處此者宜何如必也內焉殫忠君愛國之孚誠而無一念之敢欺外焉盡奉公守法之常道而無一事之敢僭以是明哲居之則此心光明洞達君嘉其讓而安於上民服其謙而安於下矣何咎之有孔子釋四象曰四既隨而有獲則逼上之患易生以理言之必得凶也其所以能有孚而在道者由其心實明哲知危疑之地處之甚難兢兢焉積誠以事君秉道以律已所以能有保身之功也不然其何以全上下之交歟自古人臣寵利最為難居惟當竭其誠敬而以成敗榮辱聽之於天區區挾智任數以求茍免詎有幸乎周公之恐懼居東王莽之謙恭下士同一卑退而一誠一僞較若天淵禍福相去亦甚懸絶居鼎鉉之任者其當惕然於有孚之戒矣九五孚于嘉吉象曰孚于嘉吉位正中也此一爻是言人君誠信任賢而見上下同德之盛也嘉美也指六二周公繫隨五爻曰六二柔順中正是臣之嘉美者也九五以陽剛中正應之是人君當隨之時以同德之與而極信任之至二之言嘉言也吾則聽之而不疑二之謀嘉謀也吾則用之而不二孚于嘉如此則上下同心有以植建中表正之體而天下隨之者其在是矣何吉如之哉孔子釋五象曰從來為政在人取人以身九五所居中正故能以我之正而信二之正以我之中而信二之中其相孚有如此也使已無其德則是非之鑑不明取舍之權不定又安能信善而得吉哉按九五居尊為天下所隨宜於天下之善無不兼收如出門之初舍下之三在道之四與維繫之上六無不可與相孚而獨惓惓於六二之嘉者蓋九五位在正中則必取天下之正中者以立相隨之凖故以六二之柔中配九五之剛中嘉耦定於是皇極即建於是凡屬臣民雖欲不隨之而不可得矣茍不能推誠任賢一德一心以成明良喜起之治親者疏而反欲疏者親豈有是理哉上六拘係之乃從維之王用亨于西山象曰拘係之上窮也此一爻是言隨道之極誠意固結者也拘係之從維之皆固結之意亨作享西山即岐山享于西山取誠意之象周公繫隨上爻曰上六居隨之極是其所以隨人者止此無妄之心合終始而不易隨之固結而不可解者也故其相知之深相信之篤如有物焉既拘係之更從而維之之象夫誠意之極可通神明故又有王用亨于西山之象明之所以隨乎人者以此幽之所以隨乎神者亦以此孔子釋上象曰上六拘係之者以其居卦之上處隨之極無復他往自然誠意固結而不解雖欲不如是而不能耳按隨之極言理不言事不可以一人一事該之如七十子之隨孔子雖畏匡厄陳蔡而相依不舍又如舅犯趙衰介子推之徒隨晉文出亡十九年備歷艱苦至於返國患難安樂無不共之皆由誠意固結之死靡他所以為隨之窮也㢲下艮上此見亂極當治而所以治之在人之有所事也蠱者事也乃既蠱而治之之事也卦象所以成蠱卦才所以治蠱或從天道說向人事或從人事說向天道是教人竭力承天不可自失機會皆以責人治蠱也當蠱之時不可茍安要必剛柔得中乃可轉禍而為福剛而不中則急治而失之貞柔而不中則緩而不治失之裕君虛中以任賢賢得中以濟世二五相應蠱所以不終於蠱也然失之貞者猶有撥亂反治之心失之裕者終無起弊扶衰之日蓋必有二五治蠱之君臣乃得全上九之髙尚不然將必出而任天下之事所謂利涉大川先甲後甲者必當引為己責矣是知有國家者誠宜臨變而亟為之圖尤宜未危而預為之防此持盈保泰之善術也夫蠱元亨利涉大川先甲三日後甲三日此卦㢲下艮上上下不交積弊叢生故名為蠱卦辭言當壞極有事之時能勇往以圖功自可轉亂而為治也甲干之始先甲三日為辛取更新之義後甲三日為丁取丁寧之義文王繫蠱彖辭曰天下治亂之機相為倚伏時至於蠱敗壞已極天心厭禍將撥亂而反治世道之所以得元亨此也然致亨之道全在以人事挽天運自非實有濟蠱之力者不能必也冒險越深毅然勇往直前若涉大川然乃為利耳涉川何如如國家之紀綱法度政令賞罰其行於夙昔者前事也前事過中而將壞必取先甲之辛以更新之起敝更化令來者之必可追其行於今日者後事也後事方起而尚新更取後甲之丁以丁寧之思患預防懲往者之不可諌兼此二者前弊可除後利可久乃為利涉而元亨也按蠱之為象蟲聚皿中勢必敗壞天下久安無事君驕於上臣諂於下釀禍生釁日削月割底於不可救此正蠱之象也卦辭垂訓以先甲救蠱之將成以後甲䇿蠱之未至此正治蠱萬全之術如必待蠱之既極而後圖之恐無及矣彼漢唐之季外戚宦官藩鎮盜賊禍亂已形而上下泄泄漫不經心馴至大壞極敝徒為他人驅除之資耳豈不可畏矣乎彖曰蠱剛上而柔下㢲而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也此彖傳是釋蠱彖辭原所以致蠱之由與所以治蠱之道也天行天運也孔子釋蠱彖辭曰卦之名蠱豈無故哉蓋世道之治必以君臣交通勵精圖治而後成今卦體艮剛居上㢲柔居下又卦變自賁來者初剛居上二柔居下自井來者五剛居上上柔居下自既濟來者兼此二變則是上情髙亢而不下接下情退縮而不上交兩情暌隔矣卦德下㢲上止是在下逡巡畏避而無敢為之心在上因循止息而無必為之志甘於自棄矣所以積弊而至於蠱也然卦辭曰元亨者蓋斯世之蠱患在治之無人當此壞極之際實有轉亂為治之機時雖未治而天下之治已决於此治蠱者誠能艱危自矢如涉大川以求必濟是往而有所事不可辭其責也至治之之道必先甲三日後甲三日者蓋撥亂反正之功一本倚伏循環之理時至而事起天命而人從有是時即有是事亂之終正治之始夫固天道之運行然耳按甲屬天干周而復始之象故以天言要之治蠱全關人事使不勉人事之當然而坐希天運之自至是名棄天䙝天而非善承天意者矣豈聖人繫蠱之㫖歟象曰山下有風蠱君子以振民育德此象傳是言君子體蠱之象盡自新新民之道也振者作興之謂猶風之鼓為號令也育者涵養之謂猶山之養成材力也孔子釋蠱象曰艮山㢲風此卦㢲在艮下是山下有風也披靡摧落撓亂解散蠱壞之象君子體此知蠱之時教化衰微風俗頽敝民德之委靡甚矣非大加振作使之去惡遷善革舊染以自新不可然民德之不振實由已德之昏故新民之本又在於自新必持養已德使天之與我者常存不喪而後推已及人斯民可得而理也誠能如此則成已成物兩極其功而豈猶有難治者哉蓋世道當積弊之後斯民陷溺已深欲以智驅而威脅之人不堪命激而成變速亂之道也惟反而自育其德則無長不仁之心自有以振民生無犯不義之事自有以振民行堯典時雍於變而先之以克明洪範無有淫朋比德而先之以作極此之謂也初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也此一爻是言幹蠱於初者易為功也蠱為前人已壞之緒子能幹之則飭治而振起矣幹如木之幹枝葉所附以立者也周公繫蠱初爻曰卦有父母之象諸爻皆其子也初六蠱未深而事易濟為子者乘時之易更而善反之故為有子能盡克家之道以蓋前人之愆而考得以無咎矣然既謂之蠱處勢甚危不可以為未深而易心處之必戰兢惕厲竭其幹蠱之力而使人不知為子之功始雖危而終得吉也孔子釋初象曰前人之蠱已壞無不望其子以掩覆之更張之有不可明言之隱志焉初之為幹蠱者事雖違考意實承考也有子如此非為父者所深願哉按幹蠱之時與天下更始不得不反前人之覆轍雖改臣改政有决不容已者豈可姑息以遂先人之過貽宗祀之憂乎大禹八年於外修鯀之功而鯀竟得以配天蔡仲克蓋前愆復邦於蔡而蔡叔得以延數百年之祀其千古臣子之極則歟九二幹母之蠱不可貞象曰幹母之蠱得中道也此一爻是見幹蠱者以得中為貴幹母尤難於幹父也母指六五周公繫蠱二爻曰六五柔順在上有母象焉治道太柔則廢業脞萬幾馴致蠱壞非為子者之責哉九二以剛中之德起而治蠱幹所當幹固其貞也但恐以剛承柔未免堅持拂戾則於以子事母之道有未盡安故當周旋委曲㢲以入之不可自以為貞而固執之也孔子釋二象曰幹母之蠱與幹父之蠱者不同二惟剛而得中自處㢲順凡事當變革者有匡救之方無矯枉之過得中以行非為子之善道歟按以臣幹君如以子幹母固不可一於柔順亦不可一於果决宋司馬光入相盡變熙寧之法可謂善矣而處之太過遂使奸人藉口改父之道為後日報復之端而衆正皆不免於得禍爻之以不可貞垂戒象以得中道申之兩聖人深知幹蠱之難者乎九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也此一爻是言急於幹蠱者雖蹈小悔而終無深咎也悔以心言咎以理言周公繫蠱三爻曰九居三位過剛不中承前人之弊不憚速於更張未免施為無漸振刷太繁寧無小悔然幸其㢲體得正㢲則可以制其過剛正則可以救其不中終於物理人事不甚拂戾豈有大咎乎孔子釋三象曰九三幹父之蠱雖若有悔然能振既隳之緒成再造之圖心迹為人所諒豈有三年無改之嫌終得無咎宜也何患其有小悔哉蓋人子改父之道隱衷必介然有所未安小有悔者所以原為子之心然能克蓋前非不顯其親之過終無咎者所以䇿為子之力傳言魏顆不從亂命而殉妾屈建不從宗老而薦芰君子嘉之由此以推可以得蠱九三之義矣六四裕父之蠱往見吝象曰裕父之蠱往未得也此一爻是言怠緩者不能幹蠱之失也周公繫蠱四爻曰前事既蠱為之後者當如拯溺救焚竭蹶以圖庶幾事或有濟六四以隂居隂不能有為樂因循而憚改作若處無事然有寬裕以治蠱之象如是以往則前人之墜緒終無振興之日立見羞吝可不以是為戒哉孔子釋四象曰四知父之為蠱矣則雖奮起從事猶懼或失之今乃寬裕以往與奮勇從事者正相反蠱將日甚一日而不可救未得幹蠱之道者也按三以剛居剛失之太過四以柔居柔失之不及然過者雖悔而蠱已除不及者終吝而蠱愈亟權於二者之間與其為吝母寧為悔也哉六五幹父之蠱用譽象曰幹父用譽承以德也此一爻是言人君能任賢以幹蠱光大業而永令名也譽聞譽也周公繫蠱五爻曰六五身居尊位值國事傾頽之會當圖振興再造之功但以其具柔中之德似難一旦奮然有為者所賴正應九二得剛中之臣以輔之虛已尊賢維持不逮用此式廓前烈為中興令辟善繼善述之名歸焉聲稱垂於天壤鴻號施於無窮幹蠱之最善者也孔子釋五象曰五之幹蠱而用譽者豈在上獨力所能致哉由其柔中任二而二承以剛中之德故也蓋委任得人自足以成天下之治故功在九二而名歸六五耳蓋運際艱難雖英明剛斷之君猶不能不望臣鄰之助况六五之柔中在上者乎太甲之於阿衡成王之於公旦惟其傾心信賢故能轉危為安易亂而治古今稱善守成者無以加焉誠任人之道得耳上九不事王侯髙尚其事象曰不事王侯志可則也此一爻是言無幹蠱之責者可以超然事外也周公繫蠱上爻曰上以陽剛處乎人位之外不與諸爻之為子者同任幹蠱之責是有幹蠱之能而無蠱之可幹矣不亦可優游事外理亂不聞而全身以隱遁哉故有不事王侯髙尚其事之象惟居吾仁由吾義以自治其一身而超然於天下後世而已矣孔子釋上象曰上九不事王侯是不見用於世而潔清自守志願之髙足以風厲人羣其功雖不及於一時而其節實可師乎百代則所禆益豈淺鮮哉蓋斯世之蠱必待斯世之人治之有心世道者豈忍坐視汙濁而不之救惟上九之時上有用譽治蠱之君下有剛中幹蠱之臣而已得以從容無事自全素尚如際唐堯之盛而後標箕潁之風遇光武之隆而後全桐江之節斯足尚耳否則甘為避人避世沮溺丈人之行又聖人之所不與也豈得援髙尚以自托哉兌下坤上臨之為卦總見陽當極盛之時君子道亨則小人自退然必守正預防乃可制於未亂也說而順剛中而應君子進臨小人之道也教思無窮容保民無疆大君臨蒞斯民之道也臨小人正以為斯民也夫以二陽而臨四隂陽雖長而隂猶盛非協力不足以勝故初二皆曰咸臨其上四隂以隂臨陽宜與陽相應三無應而近陽求媚宜無攸利四五有應而當位履中上雖去陽獨逺而志應乎內故有吉無咎之辭焉蓋為君者不能獨臨而委之賢宰相五與二應明君所以任賢故稱知臨為相者不能獨臨而委之賢有司執事四與初應大臣所以親賢故稱至臨用咸臨者而君子長矣去甘臨者而小人消矣由是司牧有人司教有人而敦臨之治可以垂衣而長享也臨天下者其亦深鑒於此乎臨元亨利貞至于八月有凶此卦兌下坤上二陽浸長以逼於隂故名為臨卦辭言陽道之方行而又戒其當慎始而慮終也臨進而凌逼於物也八月以爻數言臨與遁反自臨初爻至遁二爻在卦經八爻於月經八月也文王繫臨彖辭曰臨之為卦二陽方長於下陽道嚮盛之時已有可為之勢而卦德兑說坤順卦體二五相應又有善為之道則是羣隂可以盡去吾道可以大行當得元亨而又利於貞焉蓋陽剛勢盛固君子昌明之日然所行不正則德不合卦而失自處之道矣又安能得志哉故不可恃已之盛忽彼之衰必以公道存心正理處事則無疵可議無隙可乘乃可以致亨也然陽之長固可喜陽之消又可憂自臨之初爻至遁之二爻凡八月剛柔皆變則陽消而隂又長故有凶君子貴未然之防可不思守正以杜其漸哉按臨當二陽浸盛正君子道長之時必惕之以凶者蓋禍患之形即伏於方盛之日狃安富則驕侈生樂舒肆則綱紀壞忘變亂則釁蘖萌是以浸淫而至於不可救也惟及其盛而戒之則開元之隆不變為天寶慶歷之治不轉為熙寧矣何患保泰之無術乎彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也此彖傳是釋臨彖辭言當臨之時不可忘戒懼也浸漸也說而順以卦德言剛中指九二應謂六五應之以卦體言孔子釋臨彖辭曰卦名臨者方剝盡復生陽道甚微至此二陽竝進駸駸乎有不可禦之勢自此而泰而壯而夬以極於純乾皆勢所必至君子非有心於逼小人而小人殆無容足之地矣所以然者卦德兑說坤順是雖挾剛長之勢而有和說柔順之德卦體剛中而應又有剛柔交濟之美不同於恃壯用罔而一歸於正人事所至與天道相符以此臨人臨事莫不大亨而得正也又曰至于八月有凶者一陽固當方長之日然其退消亦只在數月之間不待于久君子宜預為之戒而思患預防豈可諉之天運之自然哉蓋隂陽之消長係賢奸之進退聖人深言消之不久者以見君子難進而易退小人難退而易進故雖正類盈庭之日而奸邪窺伺其旁乘間抵隙不久復熾為君子者但當嚴别邪正固守其貞勿使小人得混雜其間則陽道常亨矣唐虞之世豈無四凶惟投之遐荒以禦魑魅故四嶽九官十二牧得久安其位而萬世皆頌堯舜知人之明也可不鑒哉象曰澤上有地臨君子以教思無窮容保民無疆此象傳是言君子法臨之道而克盡教養之功也教思容保皆臨下之事教思無窮者兑也容保無疆者坤也孔子釋臨象曰兌下坤上是澤上有地而地臨于澤有臨之象君子觀此而得居上臨下之道焉臨下不可無教而教思有窮非教之至也君子於是設之庠序未已也而申之孝弟尤諄諄焉為之輔翼未已也而加之振德尤亹亹焉其教人之心無所不盡不與兑澤同其深乎臨下不可無養而容保有限非養之至也君子於是澤及畿甸未已也外而海隅亦弗遺焉惠我四方未已也逺而要荒亦勿棄焉其養人之心無有弗届不與坤地同其廣乎如是則教施而無一人不安其性養周而無一人不遂其生作君作師之道盡此矣按彖言君子臨逼小人而象以教民養民為言者蓋小人之害民不啻蟊賊之害稼君子欲逼而去之皆為斯民計也故聖人養賢以及萬民而蕭何則云養民以致賢人言在上能盡教養之道則在下之賢人必多世皆君子而無小人道其可以大行矣不可以證彖象相發之㫖乎初九咸臨貞吉象曰咸臨貞吉志行正也此一爻是見臨人者必先自正其身也咸皆也周公繫臨初爻曰卦惟二陽遍臨四隂凡隂柔小人皆在所臨者也故為咸臨然君子於小人不恃吾有常勝之勢而恃我有必勝之理初九剛而得正有貞之義其所以為臨者循乎義理之安而非發於意氣之私自治謹而慮事周則動出萬全在我無可議之疵在彼無可乘之隙小人可去而獲吉矣孔子釋初象曰咸臨以正而得吉者無他蓋自治之嚴慮事之密君子之正也誠能以正自持固不亂於小人之羣而亦不至為已甚之行如是而吉又何疑哉按臨一也而義不同有臨逼之臨初二爻是也有臨涖之臨三五上爻是也有親臨之臨六四一爻是也要之皆歸於正則臨之道得矣然獨於初云貞吉而諸爻不言者蓋二之咸臨與初同不必復言正三既憂之則反甘臨之不正而歸於正矣四五上曰至曰知曰敦則正亦在其中矣獨初居臨之始小人衆而君子獨非行之以正無以成制邪之功故卦既戒以利貞而又於此發之也歟九二咸臨吉無不利象曰咸臨吉無不利未順命也此一爻是言陽道得勢上進而臨人之功益盛也未順命謂所臨之小人未順天命周公繫臨二爻曰初二皆有咸臨之象初剛得正二剛得中而二之勢又上進則加盛矣舉動合宜所以臨之者有其道權勢在我所以臨之者有其機以是而臨小人則義足以服其心力足以制其暴隂邪可盡去而吾道靡不伸吉無不利宜也孔子釋二象曰二之咸臨吉無不利者何哉蓋君子以正道命令天下人無不順而從之彼小人於君子心術不侔趨向各異獨以隂僻之私排沮撓抑於其間邪類不詘則正道不伸君子之臨小人正為其未順命而不得不去之耳按未順命或以為未順天命或以為未順君子之命要之君子之命全乎天理即天命也邪正不兩立故小人不順於君子而君子必欲屏絶之正以其悖乎天理耳豈從一已之同異起見乎六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也此一爻是見無德者不可以臨人也周公繫臨三爻曰三居下卦之上臨人者也隂柔不中正又居說體無實德以臨人惟虛示甘美之情以臨在下之二陽而不知君子易事難說知其巧僞無實誰則信之宜乎無攸利矣若能知甘臨之難以感人憂之而改行從善焉則可見容於君子而何咎之有哉孔子釋三象曰三之甘臨以其隂柔不中正而位不當也已無其德而善柔成性邪媚存心是則小人之咎耳既知其無益而憂之則悔悟之下必能去僞存誠而甘臨之咎自不長也按六三以甘媚臨人而無攸利見君子之難說也既憂之無咎又見君子之易事也處已嚴故不受不正之說與人寬故不治既憂之人爻辭為六三開遷善之門然亦可見二陽之用心矣六四至臨無咎象曰至臨無咎位當也此一爻是見相臨之切至而靡間也周公繫臨四爻曰四以柔順得正下應初九隂陽相得其情密矣處近君之位守正而任賢以親臨於下情意􅈤到自無交踈間隙之咎宜其為臨之至者也孔子釋四象曰四之至臨無咎者由其以柔居柔處位得當故能與初情投而意洽也否則貌厚而情疏烏能切至如此乎按六四坤兑之交地與澤相臨之至在人事則以順正之人得正應而與之宜其相親愛如琴瑟之和塤箎之應矣然止曰無咎者蓋取其情意切至而不能大有所為大約柔爻原未易得吉但以無咎為幸耳六五知臨大君之宜吉象曰大君之宜行中之謂也此一爻是言臨天下者不自用而任人所以成其為大知也知臨是有任賢以臨下之智周公繫臨五爻曰五以柔中順體居尊位而下應於二剛中之臣倚任以成治功蓋知天下之大非一人心思所能周而屈已下賢資其聰明以廣吾之所不及誠得執簡御煩之要者此其為臨乃知者之事而大君之所宜也如是將見不用其聰而聰無不通不用其明而明無不照君道得而治可成矣吉何如之孔子釋五象曰人君勞於求賢而逸於任人乃天理當然之極即中道也世主或聰明自用而不肯下賢則失之過或昏昧自安而不知下賢則失之不及五以柔中應二之剛中是能任用賢人不偏不倚乃行中之謂也按知以髙明為德六五本柔何以知稱蓋人君沾沾自用豈能周於萬事故自任其知者適以成其不知中庸稱舜大智惟其好問好察而約之用中其得知臨之道者歟又言聰明睿知足以有臨則知自古臨天下者未有不要之於知而又非一人自用之謂也可以悟為君之道矣上六敦臨吉無咎象曰敦臨之吉志在內也此一爻是言上六之能下賢始終相與而無間也敦厚也內指下二陽言周公繫臨上爻曰上六居卦之上處臨之終與初二雖非正應而隂求於陽乃為至順故志在乎從二陽尊而應卑髙而從下敦厚之至也夫親賢取善常患其不克終惟敦臨者好德之心出於至誠始終如一其為吉而無咎又奚疑乎孔子釋上象曰內卦二陽咸臨之君子也上九志於順陽念茲釋兹專在於是愈久而愈不忘是以敦臨吉也臨之為道蔑以加已按上居坤體坤厚載物即法坤之厚以為臨坤土也故於臨之上曰敦臨吉艮亦土也故於艮之上曰敦艮吉可見厚於終者未有不吉而用之以待賢人尤為得其正也夫日講易經解義卷五
