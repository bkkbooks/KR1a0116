body:
  text: 欽定四庫全書日講易經解義卷八下經艮下兌上咸取義於感感之深者莫如夫婦故上經首乾坤者天地感而後有萬物下經首咸恆者夫婦感而後有人倫也咸卦二少相交夫婦之始恆卦二長相承夫婦之終所謂家齊而後國治天下平也咸以感為主而其道則仍取乎以正相悅彖傳極言感通之理推而至於天地聖人無不條貫而所以得亨者則全在虛中無我一本於人心天理之所固然蓋以我感人而不存一感之念以人應我而不見一應之迹斯感之正也六爻皆取象於人身如初之咸拇二之咸腓三之咸股六之咸輔頰皆躁於感者戒人之逐物而馳也五之咸脢則又無意於感者戒人之絶物而處也若四當心之位為感之主似乎可以感矣然必守正則得其理徇私則失其道益可見感之不可有意以求矣蓋天下之理本有自然之感應惟至誠乃可以服物繫辭所云寂然不動感而遂通天下之故也茍我無感人之誠而即求人之應我必致有違道干譽謏聞動衆之弊是以為治之要在於以實心行實政而不徒尚仁言仁聞之名為學之要在於以實學勵實行而不可蹈虛譽過情之失也咸亨利貞取女吉此卦艮下兌上卦體兌柔在上艮剛在下交相感應卦德艮止則感之專兌説則應之至卦象艮以少男下兌少女皆有交感之義故名為咸卦辭言相感者不外一正則感無不通也文王繫咸彖辭曰君子通天下之志必有所感則精神往來彼此交通毫無間隔故感則必亨然所謂感者又必自然而然一出夫天命人心之正勿雜乎私愛勿役乎情欲而利於貞焉如取女者備六禮先媒妁無一端之非正則非感以情而實感以理故吉也夫上經首乾坤下經首咸恆蓋以男女之交配天地之大義為人倫之首萬化之原也凡人處世自一室至於天下何所不感何所不應要其情之正不正必自其最切近者觀之男女之際得正則人心之所同悅不正則人心之所同恥此生民秉彝之性即天地萬物之情也堯之試舜不先於五典百揆賓門大麓而必觀厥刑於二女以為家難而天下易觀其難者處之得吉則其易者可知也孟子曰身不行道不行于妻子孔子曰人而不為周南召南其猶正墻面而立也與知此可以得取女吉之旨矣彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣此彖傳是釋咸彖辭而極言之以見造化人事皆不外於相感以正也柔指兌剛指艮天地感謂氣相通化氣化也生形生也孔子釋咸彖辭曰卦名咸者蓋天地之間無獨必有對有對斯有感有感斯有應咸也者取其交相感之義也卦辭曰亨利貞取女吉者卦體兌柔在上艮剛在下是剛之氣下感乎柔而柔以氣而應乎剛二氣感應以相與此非造化感通之得其正乎卦德艮止兌説是我之感者專一而不他彼之應者樂從而無強此非人已感通之得其正乎卦象艮以少男下於兌之少女是男先於女既不越分而以少配少又不過時此非男女感通之得其正乎三者皆感無不通亦無不正所以亨而利貞如取女則吉也試以感之理極言之雖天地聖人亦有然者夫天地者羣物之祖也天地以氣感萬物陽噓隂吸默運其鼓舞之機而物之同受是氣者或以氣化或以形生舉囿於乾始坤成之中矣聖人者萬民之寄也聖人以心感萬民神道設教觸發其固有之良而民之同有是心者無有乖戾無有反側蕩蕩乎有和平之氣象矣夫天地感感以正也而萬物化生非感而通乎聖人感人心者亦感以正也而天下和平非感而通乎不特此也觀此感通於造化則一施一受可以見天地之情觀此感通於萬物則相應相求可以見萬物之情宇宙間無一非隂陽之迹無一非感通之理真情所達殆昭昭然為天下之所共見矣然則感之道不其大哉此見天地之感溥萬物而無心聖人之感順萬物而無為萬物化生和平即在天地人心和平化生即在聖人人主誠能存理遏欲養其太虛無我之衷則喜怒哀樂自然發皆中節禮樂刑政自然施無不當位天地育萬物一心感之而有餘矣象曰山上有澤咸君子以虛受人此象傳是言君子之善受能無我以通天下之感也孔子釋咸象曰山上有澤山之虛受澤之潤有咸之象焉人心不虛烏乎受哉故君子湛其心於淡定之初廓其性於大公之天隨其所感惟本吾心之虛以受之亦如山之以虛而受澤也其感通之妙豈有二乎夫彖言感而象言受此見感應之理惟在我心之能虛然所謂虛者循乎天理而中絶意必固我之私如無適無莫而義之與比不必信果而惟義所在象之虛即彖之貞也若舍貞而言虛則是不以理為權衡而此心漫無所主必至薰蕕雜陳是非莫辨未獲受善之益而先受不善之害矣夫豈所以總一庶類裁制萬事之道乎初六咸其拇象曰咸其拇志在外也此一爻是言事未來而有心思感以著其將迎之私也拇足大指咸其拇謂感於最下之象周公繫咸初爻曰初六處咸之初感於最下事物未接而意見先萌蓋不能以虛受人而有意於感者也為咸其拇之象雖所感尚淺未著於形迹然躁動之念所不免矣孔子釋初象曰初六所謂咸其拇者何哉蓋志者感之主也感者心之纍也初之志主於感是心馳於外而不專主於內所以謂之咸拇也蓋君子之心廓然大公物來順應茍事未至而預動一將迎之念則在我先為物役安能臨事而不失其主宰免於悔吝之乘乎初之咸拇感雖未深而志在外卦之九四見利者必忘義徇人者必失已聖人雖不著其占而咎固在言外矣六二咸其腓凶居吉象曰雖凶居吉順不害也此一爻是言二遇感而妄動勉之以主靜則吉也腓足肚也欲行則先自動躁妄而不能固守者也周公繫咸二爻曰六二陰性躁動是方感之時不能物來順應而心即馳於物如咸其腓之象如是則虛眀之體既汨而處事將不勝其錯亂矣何凶如之然幸有中正之德本體未泯若能反躁而居以靜則時行而行時止而止心無私係而天下之事物不亦應之而有餘乎孔子釋二象曰六二之凶而居則吉者蓋天下感應之理本有自然之妙我惟返躁為靜順其理之自然而無所容心則靜固靜動亦靜矣不為事感所害吉孰大焉按止乎理而不遷曰居從乎理而不拂曰順居非不動不妄動也心存乎理雖酬酢萬變而其居自若也順非從外不茍從也心主乎理雖獨立不顧而其順自若也夫然乃不失乎貞不害乎感而作止語默莫非天理之流行矣九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也此一爻是言當感而不能自主者失感之貞也股髀也每隨足而動處謂靜守之意下謂卑陋之意周公繫咸三爻曰初二隂躁皆欲動者也三以陽剛之德固宜其定性之學有獨至者矣乃不能自守而亦隨之以動心無定主專於隨人為咸其股執其隨之象如是而往則中無所主而以身為天下役本原之地所喪多矣吝孰甚焉孔子釋三象曰初之咸拇二之咸腓其以陰躁而皆不處也固宜所望者惟三之剛耳今乃咸其股與之俱動亦不能靜守而處也是可惜也夫君子立志其所執當超然自命不與衆動俱逐而今乃志在隨人品之最卑者也所執不亦下乎此又可鄙之甚矣按隨之義有以隂隨陽者隨之六三上從九四而隨有求得者是也有以陽隨陰者咸之九三下從六二而執其隨者是也以陰隨陽則獲上而得其志理之正也以陽隨陰是舍髙而就卑棄貴而從賤志降身辱其愆於理不已甚乎然則君子處世可以知所自審矣九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也此一爻是言君子所以感人貴以公而不以私也憧憧求感之意周公繫咸四爻曰四之在咸當心之位感之主也心之感物貴於得正而以九居四嫌於不正宜有悔矣茍能虛中無我大公順應非無感也感而不役於感非無應也應而不係於應是之謂貞也由是事得其理物得其序何吉之不可得而悔之不可亡乎如不以理處物而常以物役心其感也庸心於感也其應也庸心於應也是之謂憧憧往來也則心有所係纍而情有所偏主即凡朋類之從者僅為思慮之所及而舉天下萬事萬變其遺於思慮之外者多矣安能以及逺哉孔子釋四象曰天下惟不正而感感斯有害若貞則感於無心意必固我毫不為纍未有私感之害也至於憧憧往來不正孰甚焉私意梗於中則心既為所蔽而暗昧又為所隘而狹小豈得云光眀廣大乎按咸六爻皆以人身取象拇也腓也股也脢也輔頰舌也各得其一體惟九四當心位心統百體至虛至公無所不感無所不通茍失其虛且公者而憧憧狃於朋從則心雖有統百體之名其實亦塊然一物耳安在其能光大哉先儒謂心猶鏡然居其所而物以形來則所鑒自廣若執鏡隨物以度其形為照幾何所以古今推大智者必以先覺為賢而小聰小察或反至招欺而受蔽殆以此夫九五咸其脢無悔象曰咸其脢志末也此一爻是言有心於絶感而反失之者也脢背肉與心相背者志末謂不能感物周公繫咸五爻曰人身五官四肢皆聽於心獨脢與心相背而不能感今九五適當其處是乃有心絶物而一無所感者為咸其脢之象如此則雖不能感物無九四之貞吉而未有私感亦無咸腓之凶執隨之吝僅免於悔而已孔子釋五象曰心之本體以天地萬物為量五乃一心絶物而以無悔為足則置心於寂滅之地失其能感之本體其志抑末耳何不進之於貞乎按諸爻動而無靜惟九五靜而無動皆非心之正也心體靈眀不可膠之使有亦不可絶之使無若專於絶物而以無悔自足則必流於釋老之教清靜寂滅而後已將經綸參贊之功皆可不設而聖君賢相無所庸心於其間矣其為世道之害可勝言乎象曰志末正欲人反而求之本也然則其本安在曰貞而已上六咸其輔頰舌象曰咸其輔頰舌滕口説也此一爻是言感人以言而無其實所以為不誠者戒也輔頰舌皆所以言者滕與騰同張口騁辭之貌周公繫咸上爻曰上六處兌之上既工於媚悅而居感之極又專於私感不能積誠動物但以便佞口給取悅於人為咸其輔頰舌之象夫有心於感非矣況以言乎感人以言非矣況無實乎凶咎不言可知矣孔子釋上象曰人之相感貴於心志之誠而不貴於言語之淺今咸其輔頰舌是至誠不足徒騰揚口説以悅人實德衰矣如之何能感人乎按言行君子之樞機辭説豈可偏廢但言不由中而務為巧佞以求悅世俗則其辭愈工其誠愈漓耳然截截諞言之徒雖不能以感人而常足以惑人往往顚倒是非變置黑白君臣父子夫婦朋友之間一受其欺害有不可勝言者此聖人之深惡夫利口也歟巽下震上恆與咸相次咸卦上少女而下少男以男下女為夫婦相感之始恆卦上長男而下長女男尊女卑乃夫婦居室之正也彖傳則推其象而極言之本諸天地擴之於四時日月驗之於聖人無非貞也無非恆也恆固以貞久為義然必極其變化乃可以久蓋天地間之氣運循環古今來之隨時制宜惟有變化無窮之用故能垂為萬古經常之道如膠執一定而以為可久幾何不至窒而不可行哉初爻執其常而不審其變則持守未定正而不恆四則久非其道恆而不正五順從而寡斷六過動而紛更要皆不免於凶也惟二以陽居下體之中似當有悔而克內自省察上應於五故成久中之德而悔不終悔其即所為久於其道者歟蓋恆之中有不易不已二義自其不易者論之則窮天地亘萬古而不可變也自其不已者論之則寒暑錯行日月代明而其變未嘗已君子體其不易則確焉有以自守而厲其介石之心體其不已則奮焉有以日新而懋其遷善之益斯恆道之所由立歟恆亨無咎利貞利有攸往此卦巽下震上是剛上柔下有分之常雷風相與有氣之常以巽而動有事之常剛柔相應有情之常皆有恆久之義故名為恆卦辭言道貴有恆而恆又貴以正也文王繫恆彖辭曰天下之理惟積久則能貫通若或作或輟見異而遷則事多扞格矣人能守其恆心篤信力行則功之純者理必得居之安者動必臧亨而無咎固其宜也然所謂恆者非徒茍焉以守之而已又必擇其是非辨其邪正使其所久者皆天命人心之公聖賢中正之道而偏端曲學不得參其間焉然後以天下之正理成天下之正功本體既端發用自裕經綸參贊無往而不利矣按維皇降衷若有恆性即所謂貞也自氣質拘之於前物欲蔽之於後於是失其貞性而誤用夫心恆非所恆者有之矣如楊墨佛老守為我兼愛清淨寂滅之説以終其身可謂之貞乎不可謂之貞豈可謂之恆乎是以君子為學必恆以致其功尤必貞以立其體未有不貞而能恆者先擇善而後固執焉可矣彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣此彖傳是釋恆彖辭而以恆道盡天地萬物之情也終謂充積之久始謂發用之端得天謂附麗於天也孔子釋恆彖辭曰卦之為恆者以有常道而可久也蓋卦體剛上柔下髙卑已定名分之常也卦象震雷巽風動散相承氣化之常也卦德巽順震動各極其用人事之常也又卦體六畫剛柔相應彼此相資人情之常也此恆之所以名也夫曰恆固知其亨無咎矣而又曰利貞者言必利於正乃為久於其道離正不可以言道也不觀諸天地乎於穆不已覆載無私天地亦惟此經常不易之道故恆久而不已而況於人乎以此見恆之必利於貞也夫能貞固知其久道矣而又曰利有攸往者何哉蓋天下未有有體而不足以利用者又不觀諸天地乎造化之理動靜妙於相生而會聚之極者必禪之以發散之用豈有終焉而不始者哉夫天地之運終則有始如此況人道之貞而安有弗利乎此貞之後而必繼以利往也是可見恆者道之常而貞者恆之道夫固具於卦而顯於辭者也然豈止於是而已哉以恆之道而極言之秉陰陽之精者日月也麗天以垂象運行代眀而不失其照之常非恆之見於日月乎分陰陽之氣者四時也循序以錯行寒暑往來而不失其歲之常非恆之見於四時乎若夫聖人至誠無息而治功悠久天下化於其道而成俗雖經權互用而總不失其道之常非恆之見於聖人乎即是恆久之道而觀諸天地則生成化育常理不愆而天地之情可見矣即是恆久之道而觀諸萬物則飛潛動植常性不易而萬物之情可見矣然則日月也四時也聖人也其功不同而同歸於恆天地也萬物也其情不同而同見夫恆恆道其大矣哉按天地得一以清寧聖人得一以為天下貞一者恆也即貞也天地一而不二則悠久無疆化育萬物聖人一而不二則純亦不已配合天地然聖人者又三才之主也故陰陽愆伏民物夭扎天地偶失其常而聖人皆引為一身之咎其必極中和之量盡參贊之功而後為久道化成之極致乎象曰雷風恆君子以立不易方此象傳言君子能盡悠久之功守定理以為恆也立謂植立不移不易謂不背方者理之定向也孔子釋恆象曰雷風至變也而相與萬古不易至變而有不變者存焉恆之象也君子體之而有確然不易之道即所謂方也但常人始則柔懦不振知之未必能立繼則持守不固立之未必能久惟君子擇之極其精而執之極其篤雖日用化裁之宜非拘守者可比而中有定見任萬物之遷移不能奪其所主宰與雷風之變而不變者一矣按天下之至靜者莫如山以山受澤而為咸可見寂然不動者正其感而遂通者也天下之至變者莫如風雷而以為恆可見變化無端者正其常久不已者也君子立此不易方之理以化裁利用恆非膠執方為通方人主誠能法雷風之象雖酬酢萬變隨時變易以從道而中之所立毅然有以自主則剛柔協應何難久道化成乎初六浚恆貞凶無攸利象曰浚恆之凶始求深也此一爻是言求望乎上者過深非惟無益而反有害也浚如浚井之浚謂深求之也周公繫恆初爻曰天下有理本正而勢不可行者當審勢以自止如初與四為正應固理之常然自初言之情分間隔未可深有所求自四言之好髙不下難以遽有所合今初六隂居巽下柔暗不自度量而過以常理望人不顧禍害祗求深入有浚恆之象焉是雖所求者正而踈逺莫信嫌隙易生其凶宜矣又何利之有孔子釋初象曰浚恆之凶者蓋初四相與之始交淺不可以言深而乃遽以深相求必欲其諫從計聽祗以取辱而已此所以為凶也蓋凡人既以正道自居尤貴相時度勢以行之故必相與既孚同心一德然後徐進吾言則言者不覺迂踈聽者自能虛受倘疏逖初進位卑言髙即使辭義剴切非惟無益而祗以取咎雖一身之榮辱得喪不足恤亦非君子信而後諫之道也人亦鑒於浚恆之凶而以至誠動之可矣九二悔亡象曰九二悔亡能久中也此一爻是言善反於恆者終能因中以得正也悔亡謂失之於初改之於終周公繫恆二爻曰九二以陽居陰本不正而有悔者然幸其所居得中是存心有常本體不虧即偶不出於正特一時一事之過耳終能善反以為功因中以求正自然內省不疚無惡於志悔不終悔而亡也孔子釋二象曰九二宜悔而亡者何哉以其中而能久是恆性常在而本體之明有未嘗息者故能覺悟其非而一反之於正小疚不足以纍其心矣何悔之不亡乎按貞者恆之道也此爻不言貞而言中者蓋恆之所貴者貞貞之所貴者中恆而非貞則失其恆故四以久非其位而失禽上以振恆而大無功貞而非中則失其貞故初之浚恆以貞而凶三之承羞以貞而吝五之恆其德以貞而有從婦之凶惟九二能久中則無過不及之弊中之所在即正之所在也程頤亦曰中重於正中則正矣正不必中欲求悔亡之道其可不勉於此哉九三不恆其德或承之羞貞吝象曰不恆其德無所容也此一爻言有德而無守者深眀不恆之咎也不恆其德謂有德而變其守也周公繫恆三爻曰九三居得其正固本有其德者然有德而能有恆則所存者正所操者純矣乃過剛不中志從於上見富貴功名而變易其守是固執之功未深不能久於其道一節或虧盡喪其生平人皆賤惡羞之者衆貞而不恆可吝莫甚於此矣孔子釋三象曰三有其德而不能有恆則內愧於己外愧於人既為君子所必棄又為衆議所難逃亦何所容於世乎蓋理欲之辨易淆而義利之防貴定要必以貞固不移者勵其志純一無間者致其功而後取舍以眀存養以密不至見異而或遷故無歆羡畔援之心而道岸可登也有聖敬日躋之學而昭假能久也若夫內多欲而外施仁義亦未體於有德有恆之義者乎九四田無禽象曰久非其位安得禽也此一爻是言恆非其道者終無所益也周公繫恆四爻曰凡人必久於正道斯內可以成己外可以成物恆而有益於得也九四以陽居陰是所久者皆異端曲學之私非聖賢中正之道反之身心而無益推之事物而無功猶田於無禽之地其所得者蓋鮮矣孔子釋四象曰九四所以取象於無禽何也蓋為期於成功猶田期於得禽也今四久非其位是不知所擇而恆非所當恆於無禽之地而田獵欲有所獲安可得乎夫三當恆而不恆是以可用之心不用於宜用之地則移於外誘遂失吾心之正此所以鮮有終也四不當恆而恆是以有用之心竟用於無用之地則偏於意見究踰大道之間尤為重可惜也故學術之要必以中正為歸而久於其道聖人之恆與天地配良有以夫六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也此一爻是言徒以順從為恆者失其剛斷之宜也德謂順從之德貞即恆其德也周公繫恆五爻曰六五以柔中應九二之剛中知上以任下為德一於傾信其下守之不易是恆其順從之德而貞固不變者也不知順者乃婦人之道故在婦人猶可獲吉至於夫子正位乎外當以果決行之若徒以順從為恆則志阻於逡巡而事敗於巽懦凶莫甚於此矣孔子釋五象曰五言婦人貞吉者蓋婦人無專制之義從夫子以終身故以順從為正而吉若夫子則舉宇宙四方之事皆吾分內之事而確然以義為斷制始無委靡不振之譏使亦如婦人之從人是以丈夫而從妾婦之道也其凶不亦宜乎蓋臣道猶婦道也忠順以事一人可也君道猶夫道也自當乾綱獨攬而不可下移者也茍徒以任臣為德則偏信生姦必致大害如漢元之委任王鳯兄弟眀皇之聽信林甫國忠是也夫自古英君誼辟非不勇於任人而必有獨斷之德以神其不測之權其待庶僚也既不可失於過嚴使臣下無靖獻之路其御貴臣也又不可失於太寬使國枋有廢弛之憂則剛柔合宜而貞恆之道得矣上六振恆凶象曰振恆在上大無功也此一爻是言過動失恆之害也振恆謂以振動為恆凶謂物欲盛而天性亡也周公繫恆上爻曰上六居恆之極極則不常又處震之終終則過動且陰柔不能固守居上非其所安忘貞正之德而易生外欲之纍好為變遷以振動為恆則紛更反常凶可知矣孔子釋上象曰上六以振恆而在上則情以妄動而擾性以逐物而亡既不能有裨於身心又不能有益於家國不止無功而且大無功矣夫天下時至而業起物來而已應豈有無故而自滋紛擾以為常行之道乎振而不恆猶為一時之失振恆而不在上不過一身之害惟振恆而在上則喜功好大輕躁妄動不肯與天下相安於無事而病國擾民所關甚巨豈止學問之際有見異而遷得半而怠之患也歟如宋之王安石借經術之名改易舊章專事變更以誤天下殆其人矣此用人者所當深察也艮下乾上遁為隂長之卦二陰生於下隂長將盛陽消而退當遁之時也能與時行而適得其宜處遁之義也彖辭統言四陽彖傳專言九五者以五為四陽之統善用其遁而有致亨之道也遁而後亨所以戒君子小必利貞所以戒小人正所以全君子也六爻惟四陽當遁其下初與二本屬陰爻而爻辭仍主陽而言初言遁之幾貴早見二言遁之志宜固守與四陽同義何哉此見聖人於陰長陽消之際為君子謀者至切也至九五一爻程傳以為遁非人君之事故不主君言然古來智深勇沉能善藏其用為除姦反正之君皆嘉遁而貞吉者也遁之時義所以為大不益可見乎遁亨小利貞此卦艮下乾上邪道漸長正人宜避故名為遁卦辭言君子當避小人而又戒小人毋害君子也亨者其道亨也小利貞言小人當存正道不可恃勢凌迫也文王繫遁彖辭曰君子之不能違者時也小人之不可越者理也此卦九五當位而六二應之似猶可以有為但二隂浸長於下有小人勝君子之漸茍不稍為隱藏則必身中其禍故宜善自退避形於外者不使嫌隙之或乘默為維持主於中者自得吾道之不屈蓋遁則能亨不遁則不亨也若小人憑浸長之勢凌轢君子雖一時若可得志然終非小人之福惟利正以自守而勿侵迫於陽乃得保其貞而無不利斯為小人計當如此耳按自古君子小人互為消長君子往往以疾惡過嚴而不知遁小人往往以比匪害正而不能貞卒之君子既罹其災小人終亦不能自保以至於兩敗今卦象二隂已見猶未及盛而逼陽君子雖不可遽求退避坐觀陰長然匡濟之術固宜默運而形迹之間尤貴善藏使不至觸小人之忌而潛消其悍然害正之心庶幾上可以安國家而下可以眀哲保身也哉彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉此彖傳乃釋遁彖辭以眀君子因時而退之義也剛謂九五當位以德而言應謂六二時謂二陰浸長之時孔子釋遁彖辭曰卦名遁而辭又言亨者蓋時所當遁必遁而後能亨也卦體九五當其位而二應之君子尚有可為之勢小人猶有順承之心似不必過為引避然君子見幾於未萌防患於未然當此時而退遜自守正其志而不降志恬淡為心全其身而不辱身迹不示異心不求同通乎時之運用而與之偕行所以亨也又曰小利貞者二陰浸長於下其氣日盛必至凌逼君子為害國家不利不貞孰甚焉故以利貞戒之也夫以九五當位若可不遁而在二陰浸長又不可不遁君子於此恝然遽去固非忠愛之初心顯與抗衡又懼危機之自蹈必因時而順應守義以化裁進退綽然亨其道而并以亨其身此其時義豈不大矣哉夫天地之不窮於剝以其剝而能復也世道之不窮於否以其否而能泰也君子之不窮於小人以其遁而能亨也惟遁故亨此君子所以貴審時耳蓋遁者臨之反對也二陽為臨則曰剛浸而長二陰為遁不曰柔浸而長而止曰浸而長誠以剛長可言而柔長不可言也聖人為世道計為君子謀至深且切矣時義者時在天義在我善自韜藏以俟時會消息相須既遁則必壯非達權而知變者其孰能與於斯乎象曰天下有山遁君子以逺小人不惡而嚴此象傳是言君子守正逺邪之道也孔子釋遁象曰此卦上乾為天下艮為山天體無窮山髙有限若將逺而去之者遁之象也君子體之而得逺小人之道焉君子之與小人不容並立然其所以逺之之道初非過為惡厲以深拒之惟嚴於自治以禮義亷耻為立身之大防以正大光眀為處事之大本毫釐不茍尺寸不移則一正足却百邪小人自逺退而不敢近矣此不惡而嚴乃所以為真嚴也夫峻以絶人之謂惡莊以持巳之謂嚴惟嚴則德威可畏而人敬之不惡則樂易可親而小人亦自感化君子精義之學與時偕行有遁之用而不見其遁之形雖日與小人周旋而不害其為遁也如謂恥與小人並立而必以逺遁為髙則正人盡去人君孰與相助為理乎初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也此一爻是見遁以早為貴而惕其不可有為也遁尾言不能早避厲謂禍及也周公繫遁初爻曰君子與時偕行時當可遁即以早遁為貴今初居卦下在遁為尾衆皆決去彼獨遲留失事機之宜而賈中傷之禍危且不免矣况欲往而有所為乎惟奉身以退靜以待時可也孔子釋初象曰遁之機貴先不貴後遁之理宜守不宜進遁尾之厲以不能早遁而妄欲往耳若能早以晦自處而不往則我不取災而災何由至乎此是君子當小人道長職居下位時既不可往而勢又不能往惟危行言遜而靜處以俟之則藏其用於有待既以得嘉遁之貞處其身於無危且以獲肥遁之利奈何甘為遁尾率意躁進以蹈攸往之災也乎六二執之用黃牛之革莫之勝説象曰執用黃牛固志也此一爻是言執中順之德以遁見遁之守宜堅也執謂執縛之黃者中色牛者順象革皮也説解也周公繫遁二爻曰六二時值當遁遂因時而退藏守其中順之德決於必遁執持甚固而人莫能解猶執物者用黃牛之皮而莫之能説也孔子釋二象曰遁不以迹而以志所志未固則韜晦不深係吝之私所不免矣今二之志確然不易沈潛中順雖萬鍾於我無加含章守貞即三公不易其介故爻言執用黃牛者固守其與時偕止之志而不轉移於外也蓋君子處當遁之時此身既已斂藏此心尤宜堅忍茍挾持未密而意氣或形此志遂為小人所窺正恐執之者不堅説之者紛至耳誠能識堅力固確不可移則中順之德在我自有所以遁之之理而固志之學在小人并不見所以遁之之迹此其所為不惡而嚴也歟九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也此一爻是言遁不宜有所係而深鄙其不能決也係謂有所係纍而不能遁疾謂有損名之病厲謂有中傷之禍周公繫遁三爻曰九三當遁之時下比二隂是危邦己不可入亂邦己不可居而猶戀戀於利祿而不忍釋也為係遁之象以理之得失而言有欲而不能克此行之疵也其疾宜也以勢之利害而言遇患而不能去此危之道也其厲宜也夫係戀之私斷非君子立身之大道或用此畜臣妾庶不嫌於比昵而可得其歡心耳若以之當進退去就之間如之何其可也孔子釋三象曰九三係遁之厲者言其有所係戀而不能遁則陰害中之必有疾憊也然以之畜臣妾則吉者蓋女子小人彼之事人者原不過以阿諛取容則我之結彼者亦不過以私恩相畜係與不係無足重輕若遁則出處大事千古之名節攸關一身之利害所係豈可以畜臣妾之道而處之乎蓋士君子一進一退原有不可踰之大間稍識義理者皆能辨之而身當其際往往濡滯而不決此無他其始也鮮剛正之德幾先之哲其繼也有因循之心覬覦之意其終也貽身名之羞致禍患之及皆此係之一念纍之也可毋戒歟九四好遁君子吉小人否象曰君子好遁小人否也此一爻是言能絶富貴之念而勇於遁者也好遁謂舍其私好而決然以遁周公繫遁四爻曰九四下應初六本有富貴之好然其體剛健能有以勝意念之私而絶之以遁焉此惟以理制欲之君子外不慕於紛華內惟存乎道義得遂其潔身之美吉何如焉若小人值之則徇欲忘返日役役於所好而必不能遁也孔子釋四象曰九四言君子吉小人否者蓋營私之念盡人之所同而制欲之功君子之所獨惟君子明於時之不可為能絶所好而必遁小人則牽於私情何能以果遁乎夫君子小人所異者其品所分者其心所辨者其義利邪正之介故君子之好遁必心性眀決機先有坐照之神而氣節剛方臨事無依回之念然後超然物纍之表所謂人各有志不可以好爵縻不能以榮名縶者也人亦審於吉凶之際而勉為君子可矣九五嘉遁貞吉象曰嘉遁貞吉以正志也此一爻是言見幾而遁有審時合宜之道也嘉遁謂遁合其宜正志謂所志者正周公擊遁五爻曰九五陽剛中正而下應亦柔順似猶有可為而不必遁然時則當遁而有不得不遁者惟能灼於幾先與時偕行而無濡滯不決之志是遁之至嘉者乃為得處遁之貞而所處皆吉也孔子釋五象曰時當可遁而或役志於功名此心已為外物所移志必不能正然身處於遁而或稍存其形迹則此志必為小人所忌遁亦不能嘉今五之嘉遁貞吉者以其先幾而動不蹈遁尾之災與時而行自免係遁之厲且可去即去凝然在中而若不見其所守也可速則速淡然於懷而并不見其所好也蓋能自正其志則富貴功名不能動其念故為嘉遁之貞吉耳按陽剛以守道為要故身退則亨九五以扶陽為貴故嘉遁則吉君子誠能內存正志而外與時宜則匪獨身名兩全而關於世道亦大矣上九肥遁無不利象曰肥遁無不利無所疑也此一爻是言超然物外者所以嘉其自得也肥謂處之裕如周公繫遁上爻曰眀決不足者當遁而不知遁物欲繫念者可遁而不能遁今上九陽剛有必遁之志而又居外無應不為世纍故遁自裕如有肥遁之象處進退之間隨在皆優遊之境也歷寵辱之交無入非自得之機也何不利之有哉孔子釋上象曰上九肥遁無不利者其心不為物纍無所疑慮故也蓋人心有所疑於中即不能決於外而利害禍福之念攖之斯進退出處之道失矣此上九之無疑不同於九三之係遁並不同於九四之好遁耳大約士君子出處之道必視其所際之時與所處之位不宜有一毫偏滯之心可行則行可止則止上九之肥遁亦順其時與位之當然如舜處深山之中與木石居與鹿豕遊浩浩落落其胸中之經綸自在天地間也此所謂肥遁者哉乾下震上大壯以陽長為義卦體四陽長盛故為大壯卦德內剛外動則又所以為壯也彖辭恐其恃壯而不正為處壯之人言彖傳因大而許之以正本致壯之德言義相發眀總不外於一正此利貞所以為善用其壯之道也以六爻言之初與三皆以陽居陽而不可為正者好進而過於剛者也五柔居中不能進而失其壯矣上柔居壯之終不能壯者而亦終用壯焉皆非得其正者也求其善者惟二四之貞乎夫二與四皆以陽居陰已不得其正而以為貞吉何也二所處得中能不失其宜是因中以求正也四惟以陽居陰為不極其剛是雖不正而有可以得正之理故均之為吉而悔亡也審是可以知用壯之道矣大壯利貞此卦乾下震上卦體四陽盛長卦德乾剛震動卦象雷行天上皆陽道方盛之勢故名大壯卦辭言君子處壯之道貴得其正不可恃勢而妄動也大指陽壯盛也文王繫大壯彖辭曰卦四陽盛長正君子得大行其道之時然君子所恃以壯者以理之正非勢之強也茍或自恃其壯則徇時妄動既有以起人心之爭挾勢自矜更無以濟天下之變而小人反得乘間以中傷之故必利於守貞凡存心制事之間一出夫禮義之正然後得處壯之道而可常保其終也按復臨泰陽長於內皆言亨大壯陽自內而達於外不言亨而言利貞者聖人既深喜陽道之盛而又恐過恃其盛或至輕動以取咎故諄諄戒之以貞也君子當此以剛正為立身之節以敬畏為存心之要言必中規行必合矩勿因亢激而失事機之會勿執意見而傷衆論之同於以處盛勢治休時不亦協恭和衷上下同心哉彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣此彖傳是釋大壯彖辭欲君子以理維勢而常保其壯也大指君子壯謂道大行孔子釋大壯彖辭曰卦名大壯者卦體四陽盛長氣運方隆君子則得時而行道焉故大者壯也然壯有盛勢而所以致壯則以德卦德乾剛震動是君子本天德之剛以動毅然眀道誼立名節既不屈於欲又不靡於氣聲勢日昌功業日盛所以壯也故名大壯然又曰利貞者何哉蓋天下之道陽正陰邪陽大陰小未有大而不正者也君子既有其大則所存者正自不涉於偏私所發者𢎞莫不本乎義理大者自正不正不可言大也如是而君子之正大固秉於天地天地之正大實同於君子矣天無所不覆地無所不載惟覆載無私而見其正乃能覆載廣被而成其大故正大而天地之情可見也按大者壯以氣言大者正以理言惟有此理以宰此氣則無往而不得其正君子本天德以為體秉禮義以為用則其氣自可以配道義塞天地我之正可通於天地之正而我之大可通於天地之大矣於以輔世長民經綸參贊孰非此陽剛之德為之哉象曰雷在天上大壯君子以非禮弗履此象傳是言君子心足以勝私而能壯也孔子釋大壯象曰此卦上震下乾雷行天上聲勢震動故名大壯君子體之亦如天雷之象嚴毅以持其志眀決以審其幾存於心者道以御情不敢或役於偏私而體於身者理以制欲尤必自範於中正則剛德常存禮義在我天下之壯孰大於此蓋德性本剛惟一為私纍則餒而不壯故非幾之漸每發於意念之不及持而間邪之功貴操於隱微之所獨覺君子制防極其嚴銷鎔極其淨時時有以自勝而非禮之私絶之於中不使履之於外則心存而理得義正而氣伸在我者凛然不可犯天下孰得而犯之此曾子之大勇惟其自反而縮也學者豈可任矜氣之為而忘克己之功哉初九壯于趾征凶有孚象曰壯于趾其孚窮也此一爻是言處卑位而恃壯輕進見其必致敗也壯于趾謂躁于有為有孚言其必然也周公繫大壯初爻曰初九以陽剛居下位雖時當大壯而權不我操正宜靜以自持相時而動若率意鋭進遽欲有所作為猶趾在下而妄動者然以是而往交淺言深上必見疑於天子位卑言髙下必取忌於大臣計未行謀未聽而禍已隨之其凶有必然矣孔子釋初象曰凡人在下則循其分之得為者而為之宜也今初九居下而當壯時恃剛躁動不安其分於理逆於勢拂即此始動之時已知其必至於困窮也蓋君子建業立功亦必度德量力或時有可為而勢不能為或才足有為而分不當為惟當守已待時無喜功而過舉無好事以矜髙則體用咸宜自有審時濟物之業經權合度乃為沈幾達變之才茍或事權不屬而輕舉妄動豈能免壯趾孚窮之害乎九二貞吉象曰九二貞吉以中也此一爻是言不恃壯而能得中以歸正也周公繫大壯二爻曰處壯之時所利者貞而已九二以陽居陰有恃壯妄動之意猶幸心本無私一覺其失即有以抑其血氣之剛而反於至正之道則謙以飭躬既不任剛而召釁禮以御物自能善俗而宜民其吉也不亦宜乎孔子釋二象曰九二之貞何以得吉哉蓋人心一有所偏則內失其貞而外多過舉事未發而悔吝已隨之今九二以貞自守心既得乎中則所行自無不吉也夫由二而上三則有羸角之愆由二而下初則有壯趾之失惟二以中獲吉不偏不倚不激不隨彼小人之姦謀既不能中我而在我之正道自無不可行其有合於利貞之旨也哉九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也此一爻是言恃壯者妄動而取厲也用壯謂憑恃勢力用罔謂蔑視小人羝羊善觸之物羸困也周公繫大壯三爻曰成天下之大業者必有忍人所不能忍之德性而後有為人所不能為之事功今三過剛不中而恃壯妄為此在小人任血氣之強不自度量任意紛更方抱其忿忿之私而用壯君子於此須善厥裁度深慮過防克濟其事乃亦恃剛妄動疾惡過嚴不以小人為意而蔑視之雖舉動未嘗違理而一念輕忽遂為用罔即自以為貞而不知適滋厲階耳夫小人方設機以自固君子不察以剛氣乘之我方恃壯而行彼益隂為盤結勢必罹其網羅如觸藩之羝羊而適自羸其角也孔子釋三象曰小人血氣未除其用壯而失固無足責乃號為君子正當以理御勢而乃亦以罔聞也厲可言哉蓋壯者本君子之道罔者本小人之私今小人反曰用壯正由君子不能審幾度勢輕用其壯而使小人得隂自為防則小人之用壯實君子之用罔有以使之然也夫君子之壯至為小人所竊用為君子者又不知慎重而復罔以乘之盈庭之排斥方嚴而宵小之藩籬愈固卒致蹈觸藩之愆甚而遭反噬之禍矣可毋戒歟九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也此一爻是言君子不恃壯而功業可建也藩決謂有可進之機輹壯謂有能往之具周公擊大壯四爻曰九四陽居隂位本有躁進之悔若恃剛以進而小人即有以摧阻其間矣乃四不用罔而貞以自處則動無不臧何吉如之夫吉凶悔吝生乎動如三之用罔觸藩則不免於悔今以理自勝而小人無隙可乘吾道得以因時表見又何悔之不可亡乎蓋小人之設備以傾陷君子者本由君子之排斥過嚴不得不陰為藩蔽也誠從容審處默奪潛消彼且服我之寬大而釋其猜疑我何不可坦示其公忠而毅然長往乎故取象於羊則藩籬已決而不至於羸取象於車則大輿輹壯而進有其具也孔子釋四象曰四惟不極其剛而貞則凡有舉動無乖於事勢無忤於人心天下自然咸服小人雖設其藩安得而阻拒之吾道大行攸往咸宜也此見君子任國家之事不可輕意妄動必使經濟在我運用不窮飭威儀以表德隅而實無稜角之可見本道德以為蹈履而自有坦途之可行則羣小豈惟不敢抑撓必且俯首聼命惟我所欲為下引同德之陽上輔柔中之主功無不成而志無不遂其九四之謂乎六五喪羊于易無悔象曰喪羊于易位不當也此一爻是言不能奮剛以御物而失壯之象也周公繫大壯五爻曰陽壯以剛為體今五以柔居中而剛壯之威忽然委靡為喪羊于易之象此陰柔不振不能奮威以御衆僅免于悔而已蓋有藩者羸其角亡羊則不至羸羸角者無攸利不羸則自無悔雖曰無悔其如失剛德何哉孔子釋五象曰六五言喪羊于易者處當剛之地而以陰居陽柔其所不必柔蓋由位之不當失其壯而不能進故有此象也此見人君乘乾御世貴去優柔不決之心而存剛毅眀決之德用人則立賢無方不以世類而拘去姦則疾惡如讐不以狎昵而恕則乾剛在我而綱紀畢張矣或謂六五當四陽在下其勢強盛惟柔順和易可以調伏之使帖然相安正漢光武所云吾治天下欲以柔道行之者然此乃帝王籠絡一世妙用外渾厚而內精眀故能因時制宜操縱全在乎我豈當斷不斷養亂長姦優遊歲月以徼幸無事者可比哉上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也此一爻是言躁進之難遂而示以知所進也遂進也周公繫大壯上爻曰壯終動極志之剛也故恃壯而動無所顧慮然其質本柔才之弱也故臨事而踈莫知所措如羝羊之觸藩既不能退而又不能遂其進亦何所利哉要其所以然以躁動而失之輕易耳猶幸其不剛庶不終於恃壯者若能詳慎於事幾酌量於時勢艱難持重而出之則天下之事可以徐觀其宜而善為之圖終得遂其進而吉矣孔子釋上象曰上六不能退不能遂者由其但知用壯而處之不詳慎也然艱則吉者言能不恃其剛而存克艱之念則所謀自能如意而不遂之咎不長矣故吉也蓋人心之躁進皆起於不知艱而剛德之純全必由於能詳慎故爻言艱而象言不詳皆所以抑其躁心而善其剛德也然則君子處方壯之時據得為之勢必以貞為壯之本以中為貞之用以禮為貞之表周詳敬慎不亢不激則天德在我既有以自勝即有以勝人倘若不能知艱輕於一擊是猶非時而震之雷適以泄天道之和氣而滋其乖戾耳亦何濟於事哉坤下離上晉卦象明出地上當明盛而有可進之時也然必有致主之德又遇虛中納賢之主方可以善成其功故言卦德則順麗離眀言卦變則柔進上行臣秉順節以事主君執柔道以報功此君臣一德相成世道所以日盛而有是寵光也六爻四柔二剛六五一柔為晉之主六自四而上升已進者也故往吉無不利下坤三柔皆欲進者而九四不中不正竊位畏人故有鼫鼠之象三與五近下接二柔志在上行三隂同志而四莫能間故曰衆允悔亡二在下卦之中去五漸逺則憂其欲進而不得進故晉如愁如初最逺於五當進之始上與四應而四不中正反為所抑故晉如摧如也上以剛居一卦之終而前無可進故有晉其角之象諸爻所處不同聖人教人以善進之道如此晉康侯用錫馬蕃庶晝日三接此卦坤下離上卦象日出地上有可進之時卦德順麗離眀有可進之德卦變自觀而來柔進上行有可進之君三者皆有上進之義故名為晉卦辭言人臣遇聖明之主可以立功而獲寵也康侯安國之侯文王繫晉彖辭曰人臣立大功於天下必有可為之時能為之德而遇有為之君乃可進而建不世之勳君子有此三者而為治國安民之康侯功在社稷澤被蒼生豐功偉烈既昭輔佐之隆休一德同心自荷寵榮之大典故不特錫馬而又加以蕃庶禮何厚也不特晝接而且加以三接情何殷也蓋以非常之功受非常之寵有不可以待下之常禮拘者如此自古為君者不可忘臣下之功為臣者不可恃人主之寵忘臣下之功則有德不酬有勞不報激勸之典廢而非所以待功臣矣恃人主之寵則貴必生驕祿必生侈眀哲之義乖而非功臣之所以自處矣觀晉之康侯膺隆遇而顯才猷此真三代以上君眀臣良之盛而非後世所可幾也彖曰晉進也眀出地上順而麗乎大眀柔進而上行是以康侯用錫馬蕃庶晝日三接也此彖傳是釋晉彖辭言當進而有為之時以申眀人臣獲寵之由也眀出地上以時言順麗以德言柔進上行謂五以柔中之德居崇髙之位以君言孔子釋晉彖辭曰卦名為晉者蓋言君子負經濟之才由草野而升諸廊廟有進之義也夫君子當上進之會固可以立安國之功矣然立功在己而報功在人已所難必卦辭何以曰康侯用錫馬蕃庶晝日三接哉蓋人臣出身而仕録功者時也居功者德也報功者君也今卦象眀出地上是世道維新賞罰攸當其帝臣不蔽之日乎所以録功者有其時矣卦德順麗大眀是以徽柔懿恭之臣事聰眀睿智之主其勞謙君子之美乎所以居功者有其德矣卦變自觀來四之六上居五柔進上行是人君秉溫恭之度而不挾勢以自髙其崇德尚賢之主乎所以報功者有其君矣夫有德則可以善處其功有君有時則可以不掩其功故康侯遭此殊遇而錫馬蕃庶之隆其賜晝日三接之厚其情也大抵人臣不難於建功之先而難於建功之後人君不難於待功臣之體而難於待功臣之心蓋遭時得位雖竪立竒勳而一念偶泰則猜忌之嫌必開一節偶踈則恪恭之道遂失主知未易結寵遇未易保也然即使臣節克盡而非在上有仁眀之主推心置腹至誠相孚亦豈能賞賚繁多接見頻數同心同德如是之盛哉此孔子告魯君禮與忠二者為千古事君使臣不易之經也象曰眀出地上晉君子以自昭眀德此象傳是言君子之學有日新之功也孔子釋晉象曰離眀出於坤地之上有進而上行之象君子體之以吾德本眀因蔽於物欲有時而昏然其或昏或昭之幾皆在於我不從外得也亦惟內自省察致其夙夜宥密之功不以人所不見而輟其敏皇之心不使已少寬假而昧其昭眀之體則進進不已而至德無虧亦如日之光眀不息焉君子自進之學如此夫此心也即湯之懋昭文之敬止也蓋勤則生敬敬則生眀聖人心學相接不外日新又新緝熙無斁者以復其眀德之本然私欲盡而天理昭皆於自心致之無事於他求也故乾曰君子以自強不息晉曰君子以自昭眀德正以至健莫如天以之自強我用我之強也至眀莫如日以之自昭我用我之眀也此固其微旨也歟初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也此一爻是言欲進者宜守正以待時也摧謂阻抑罔孚謂人不見信裕謂寬以自守周公繫晉初爻曰初六陰性躁妄必有不安於下而欲進者應不中正上遇妨賢病國之人而違之俾不通故其進也若或尼之而不免為見摧矣然出處大道豈可因人之摧抑而易厥守乎惟盡其義之在我而不自失其正則終必見信於上得遂其進而吉蓋貞雖所以自持非欲求信於人然貞則未有不吉者固其常也設若守正而猶未孚亦當寬裕以俟之從容於義命自安於操修益殫其守貞之道而不以用舍纍其心如是而後無自失之咎耳否則冒進之患生而寧免枉道之譏哉孔子釋初象曰當晉之時人皆欲進而忽見摧未有不喪其所守者初獨能守正以待時不汲汲以徇於私不悻悻以傷於義此所以得吉也裕無咎者蓋初居於下未有官守之命正可綽綽於進退故裕以處之而得無咎若既已受命則當有必信之道一不見信則志不行而職莫盡矣此見君子有守正不阿之操乃有隨時行道之妙有安分自得之樂乃見雍容進退之宜若枉已求人而且怨尤不絶於念則有流於依阿奔競大節或虧者矣安能全無咎之學而建命世之功哉六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也此一爻是言守正不阿自能以德而獲福也愁如謂憂其道之不行介大也王母指六五離為日王之象為中女母之象周公繫晉二爻曰六二有可進之德而無汲引之人欲進未能則得君行道之心阻矣有晉如愁如之象然不可因是而變其節也必直已守正以俟時而德足孚人終當得遂其進而吉且上有柔中之君重道崇賢必將知遇極其厚寵任極其隆不猶受兹介福于其王母乎此惟二之自守其貞故有必得之孚也孔子釋二象曰二之受兹介福者蓋以居下之中而得柔之正則是守其中於有素而卓然不倚有以慰人君行中之願矣存其正於無偏而凝然不阿有以動人君從正之思矣故能見知於五而介福之所以受也豈二之幸致哉蓋君子於天下行道濟世者其心持已中正者其學學以自修而大心以內固而純不必求孚於人而未有不孚於人者聖人教人以修德進身之義切矣六三衆允悔亡象曰衆允之志上行也此一爻是言三能見信於人而得遂其進也衆謂初與二允信也周公繫晉三爻曰六三不中不正宜不得進而有悔矣然居坤體之極與下二陰皆欲上進是以道同志合為衆所信相引以進得遂其尚往之心而無摧如愁如之患悔可亡矣孔子釋三象曰六三所以為衆所允者蓋士君子出處有二途而從違惟一道使人皆欲進而我獨矯之以退則同進者忌人皆欲退而吾獨矯之以進則異已者疑衆莫之允矣惟三上進之志與初二同故其志相孚而不覺相信之深也此見當晉之世以順麗為上進之道既可孚於同羣即可通於主志其守也不茍其進也非幸所謂信乎朋友而後獲乎上之義也若夫不以正道為衆允之本而止以衆允為上進之階則無忠君愛國之誠而反屬諧世求榮之計亦安能見信於衆而上麗乎君也哉九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也此一爻是言無德而據髙位者之終不能保也鼫鼠田鼠畏人之物周公繫晉四爻曰四不中正居下體之上是以無德而據髙位者上畏六五之疑下畏三隂之忌有晉如鼫鼠之象雖位出於君之所與得之未為不正然德之不稱終必失之厲亦甚矣吾是以知德薄位髙之不可而貪進忘退非人臣之福也孔子釋四象曰四所謂鼫鼠貞厲者蓋當晉之世主聖臣賢位必配德彼不中不正居位不當雖正亦危宜其厲也按詩以碩鼠刺貪晉以鼫鼠象四總之無德而貪於進即身處髙位其患得患失之心畏人攘而奪之有類於鼠之晝伏夜行也夫晉之時上輔離眀之君下建安國之績豈容此不中不正者久於其位乎故小人之戀位固寵終為無益而大君之命爵任人必審其當可耳六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也此一爻是言上以大公治天下而下自以大順應之也周公繫晉五爻曰六五以隂居陽未得其正似不免於有悔者惟其處離眀之中坤以順承之為眀在上而下皆順從故進居尊位而悔可亡也然眀不眀在我從不從在人狃於近效而有計功謀利之念則反失之矣今五自修其德以純心行純政但憂我道之未盡不慮人心之未服天下戴已吾弗知也天下未戴已吾亦弗知也失與得皆不以為恤如是則德盛而化日洽治隆而民益孚其往也吉無不利矣孔子釋五象曰天下之治以有心致之皆屬小補之功六五失得勿恤不期其效而為效益宏上以大公感下以大順應著無方之德化建無外之神功往而有慶即吉無不利也蓋人主求治之心不可以稍寬亦不可以過急稍寬則有因循不斷之憂過急則又有好大喜功之患惟端其心為出治之原而懋其修為作孚之本若舜之恭已無為而天下化之湯之敷政優優而百祿是遒其即失得勿恤之義往而有慶之驗乎上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也此一爻是言過於剛者之無所利也角剛鋭之象維獨也周公繫晉上爻曰陽剛不可為物先上九剛進之極純以剛用事而略無寬和之意為晉其角之象若是者固無往而可也惟以之治其不服之私邑雖兵凶戰危不免於厲而師尚威武猶可以責其成功庶乎吉而無咎也然以極剛治小邑即治所當治而過於威猛亦可羞矣夫以剛進之極用之治邑猶不免吝然則晉角者果何適而可耶孔子釋上象曰上九謂之維用伐邑則其功不足以及逺威不足以服衆其於道猶未光也若能以眀德照四方將無所施而不服豈特私邑而已哉信乎極剛之無所用也按晉卦離眀在上萬物普照為極盛而上下皆欲進之時聖人之意謂天下事非徒不進者之足患而惟躁進者之足憂下之附上急於求其信非正也上之進下急於求其附則貪也故下欲其罔孚裕無咎至三而衆允則無不孚矣順之至也上欲其失得勿恤至上而伐邑則有恤矣眀之過也知此者乃為善於處進矣程傳以伐邑為自治主克去已私而言夫既自治有功乃合於貞正之道何以反謂之吝乎此本義所以不取耳日講易經解義卷八
