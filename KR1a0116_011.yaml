body:
  text: 欽定四庫全書日講易經解義卷十一㢲下坤上進而上之謂升坤㢲爲和柔㢲順之卦宜乎退斂有餘進取不足然而際方升之時有能升之德處可升之地而升以名猶之柔嘉君子恬靜自持而身名俱泰天下之大美歸焉與夫躁進以干時者異矣彖傳柔以時升專指六四言剛中而應專指二五言而爻辭則六爻皆利於升葢衆正彚征無乎不吉也二固剛中而三亦剛正四固以時升而初以信五以正皆柔德之善者惟上居升之極則戒其昏㝠而誨之精進所以善升之終諸爻言人材之登進而六五言治化之升隆又所以正升之主審乎此而升庸之道得矣升元亨用見大人勿恤南征吉此卦㢲下坤上卦變自解而來柔進居四有自下升上之義故名爲升卦辭言君子乗時進用有得君行道之樂也南征前進也文王繫升彖辭曰升以自下進上為義時本當升且其卦内㢲外順有能進之德二剛中而五應又有與進之君士君子㓜學壯行乗時奮庸凡有所爲功成名立無不通利而元亨矣自其方升之始用此以見大人則君臣道合自可以必推心委任之隆而無堂高廉遠之患明良交㑹惟此時爲然無庸恤其不遇也自其旣升之後因此以南征則前進有爲遂可以建經綸斯世之猷而成匡濟生民之業大道爲公惟此時為然吉無有不得也所謂元亨者葢如此從來賢才之升降關乎時運之盛衰顧賢如㢲木升賢者如坤地地之栽培者厚則木之發榮者方盛故曰百年樹人其德足以輔世材足以匡時而成國家棟梁之用豈偶然哉彖曰柔以時升㢲而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也此彖傳是釋升彖辭言柔能因時而進深與其善而無不利也柔指六四大亨應作元亨孔子釋升彖辭曰卦名升者以卦變言自解而來柔本居三今進居乎四升於二陽之上是以柔嘉之士遇明盛之時而升聞於朝有必然者故為升也夫升何以得元亨哉以卦德言内㢲而外順内旣沈潛愼密不至欲速以躁進外又從容審圖不肯冒昧以干時是有可升之德也以卦體言九二剛中而六五應之剛毅中直在我有致君之具而虛中善任在上又有下賢之誠是有可升之㑹也德與㑹逢升無不利所以元亨者以此夫亨莫大於得君辭曰用見大人勿恤者謂本此善以利見一德交孚恩禮隆洽而泰交成朝夕論思而美利溥都俞吁咈之風邦家攸頼非徒一身之慶矣亨又莫大於行道辭曰南征吉者謂本此善以前進乗時布治大猷升而功在社稷嘉謀入而福被蒼生致主澤民之志施爲暢逹至是而無不行矣君臣相得吾道大行升之元亨聖人所爲深與之乎此見人材之升在於知時而又妙於用柔柔則從容和緩退處之心恒勝於上人之心故能量可而進不失其時剛中而應有慶志行孰非時升之元亨乎而本於㢲順則皆以柔道行之也若時未至而求進必剛躁者也豈知時升之義哉象曰地中生木升君子以順德積小以高大此象傳是言君子崇德之學由積漸而至於大成也順作愼孔子釋升象曰坤地之中而生㢲木漸長而上有升之象也君子以爲山木人心其理本一養木養心其機本同體之以愼脩其德必敬以直内由一念以至於念念曲而致之無不善義以方外自一事以至於事事擴而充之無不宜葢德本高大而必於細微處𤼵端如以爲小而忽之一息少懈前此之功必隳猶木之在地一日不長生生之機必息惟由積小以謹始敬終則德脩罔覺日新月異而不能巳自馴至於高明廣大不猶木之以漸升乎可見聖功王道不必遠求祗在敬小愼㣲日進不己則幾希之存得危微精一之傳愼獨之功致中和位育之效體用一原天人一致下學卽可以上逹升之義大矣哉初六允升大吉象曰允升大吉上合志也此一爻是言信友可以獲上得遂其進之由也上指九二九三合志是初合二陽之志周公繫升初爻曰初六㢲體而順德當升之時不務躁進以柔順而㢲於二陽則是溫恭自處有以動人之誠謙讓不爭足以起人之慕故二陽重而信之能使志行孚於同類名譽著於當時聲應氣求援以同升由是建大功而立大業所謂用見南征吉孰大焉孔子釋初象曰初之允升大吉何哉葢上之二陽或以剛中爲君所倚任或以剛正爲世所仰瞻其志奮發有爲皆欲上進者今初㢲於二陽而上與之合志合則道同得藉所援相引而升其大吉也不亦宜乎夫賢者在下非有特逹之知不能自奮而升然養之䆳者其孚必速不黨同以求合不務名而尚志是相信在未升之前雖欲弗升而不可得也信以同升志以成信與世之逐虛聲而求汲引者殆不可同日語矣九二孚乃利用禴无咎象曰九二之孚有喜也此一爻是言事君者當以至誠乃有得君之喜也周公繫升二爻曰當升之時人臣不患其不升但患感孚之未至耳今九二以中實上孚於五六五以中虛下應於二是爲臣者不求寵利惟本一念之精誠足以感孚其君自然情投誼合有以致君之孚契也惟旣孚矣則上下之間一以至誠相格乃可脱畧儀文而任吾樸忠猶祭者以誠敬享神卽用禴而亦利也如是則臣道盡而不欺君心感而無忌何咎之有孔子釋二象曰二能以孚誠事上豈惟爲臣之道无咎而已哉孚本於剛中誠實所感明良㑹合則信任必至而無疑貳之嫌寵遇永綏而有拜颺之盛明其有喜可見用孚之利感通若此无咎不足言矣自古臣之事主渉於疎畧固失之慢過於繁縟又失之偽慢與僞皆非純臣之道也故必精白一心以承休德昔周公之訓曰至治馨香感於神明此卽孚之義也三代盛時君臣交勉惟一誠相通事君者當知所兢兢云九三升虛邑象曰升虛邑无所疑也此一爻是言德與時㑹當進而無所阻也虛邑無所阻碍之象周公繫升三爻曰九三當升時而有陽剛之德旣備能升之具進臨於坤坤德順而體虛以推賢進能爲尚而無猜疑傾䧟之風乘此以升是以謀斷之才際雍熈之㑹王道蕩蕩無反無側可以致身堂陛利見而得乎君奮跡亨衢前進而行乎道其升之易象猶虛邑無人可進而無所阻碍矣孔子釋三象曰人當升時雖有其時而無其德未免有疑於已雖有其德而無其時未免有疑於人今三以能升之德値可升之時旣非短於材而見抑又非泥於勢而不通豁然上進而莫之違距復何所疑乎按㢲爲進退爲不果茍稍有以沮之則必疑滯而不能進矣今三之不疑如此正見坤之虛中善受能接引賢才故一往得通如木之生於地中者無不成廊廟之材此聖人樂得而與之也六四王用亨于岐山吉无咎象曰王用亨于岐山順事也此一爻是言推誠以格君可見忠順之至也亨富作享王用享于岐山用誠以事君之象周公繫升四爻曰六四體坤居柔以至順之德守純臣之節恪恭盡瘁無貳爾心是積誠以上升感格乎君有王用享于岐山之象如是則可以輔君躋斯世於雍和錫生民以多福得臣道之純而鮮隕越之失矣不亦吉而无咎乎孔子釋四象曰四之能格君猶王用享岐山者葢四有柔順之德以順事其君精白居衷常恐有僭偪之失靖共無忝不徒飾服事之名上則順承乎君下則順處其義恪守臣職而無遺憾焉是順之至者卽誠之至也宜吉且无咎矣按升卦二四兩爻不言升何也葢五爲君位二應五而四承五皆得時行道親近乎君者其位不可復升也升則疑於五有偪上之嫌矣故在四言順與在二言孚聖人明臣道之極安分守節爲萬世訓也其義深矣六五貞吉升階象曰貞吉升階大得志也此一爻是言人君以正道治天下可以遂致治之願也升階治化易成之意周公繫升五爻曰六五當升而居尊位然以陰居陽未免有不正之嫌故必能勉而貞反其不正以歸於正使經緯於一心張弛乎萬化者内則黜功利之私外則崇蕩平之軌則天德純而王道溥治理之升於大猷將不勞而自致其得吉也不猶升階之至易乎孔子釋五象曰大君志在天下有一夫不獲一物未安欲其志之得也葢亦難矣今言貞吉升階是以純王之心行純王之政則治定功成化行俗美仰嫓於帝王參贊於天地有以悉副其匡濟之初心其志乃可大得也先儒有言天下之事變化無窮無一不本於人主之心貞則正心可以正朝廷可以正天下四方萬里一歸於至正風動神速而知王道之易易焉故人君貴大居正也若後世用名法尚功利以為王道不可行而治流於雜覇不亦謬乎上六㝠升利于不息之貞象曰㝠升在上消不富也此一爻是言徇欲者理日亾敎人以轉移之法也㝠升言昏㝠於升也周公繫升上爻曰上六以陰柔之質居升之極是貪進無厭求升不已而陷於昏㝠者也患得患失無適而利矣必也反其求升之心用以進德使理之根柢於吾心者存養而不已理之流行於事物者日新而無窮則不息之貞積小以高大乃所爲利葢於貞而不息自於升必不㝠也孔子釋上象曰㝠升在上其心豈不欲長保富盛哉然升極當降長極當消揆之於理有固然者今上居升極自可以已乃知進而不知退將立見其消亾不復保其富有是則所謂㝠而已矣何利之有哉按豫上六曰㝠豫躭樂而不知反也升上六曰㝠升求進而不知止也顧豫之上體震欲動其悔過之心使終變其豫故以成有渝勉之升之上體坤欲順其不已之心使反移於貞故以利于不息誘之聖人敎人總於理欲消長之關設一變化之術是變易以從道也書云惟狂克念作聖其此爻之義歟坎下兌上天道無進而不窮人事無伸而不屈故升後受之以困然一困而不振者庸人也在困而能伸者君子也砥節固窮泰然不變其所守則身困而道益通故彖著亨吉无咎之辭而屬之大人所以敎處困之方也困以剛揜得名似乎二四五爲所揜之君子初三上爲揜剛之小人乃爻辭則皆以處困者言之葢易爲君子謀固如此耳當剛揜之時剛宜甚困柔宜不甚困乃二五剛中皆云利用九四雖不當位亦克有終而初三與上皆極危厲之辭葢天下惟陽剛君子所遇多窮亦惟陽剛君子無往不濟若陰柔碌碌平居無防患之識臨事無濟變之才一往而敗固其宜耳易之貴陽賤陰大抵類是困亨貞大人吉无咎有言不信此卦坎下兌上六爻陽爲陰揜不能自振有困窮之義故名爲困卦辭言處困之時當守貞處黙以善全其道也文王繫困彖辭曰困以困窮不能自振為義當此時者君子爲小人揜抑力窮氣沮不克自展舒其蘊抱也然處困者能樂天知命而不憂正已無求而不怨身雖困抑心自亨通則得處困之正道而能貞矣是貞也非涵養素積於中智識不淆於外者未足以當此故惟有守有學之大人敦仁安義而有自得之吉知幾固守而无自失之咎所謂亨而得貞者此也茍非其人不安乎義命憤時嫉俗形於議論則雖有言不能取信於人適足滋多口之憎而重益其困大人豈如是乎此又處困者所當戒也按天道不能有順而無逆人事不能有升而無困惟善處困者超然世外不爲物累故身困而心不困不善處困者忿懑自鳴招尤取怫故身困而心益困然則當困之時亦在人自審其所處而已矣彖曰困剛揜也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也此彖傳是釋困彖辭以明處困之有道所以得亨也孔子釋困彖辭曰卦何以名困上下三剛皆揜於柔是剛明之氣不能發舒正直之志無由展布所以爲困也然困何以得亨葢所謂亨者不於其身而於其心不於其時而於其道以卦德言之坎險而兌說雖當困窮鬱拂之時樂天知命此中泰然無累原自有所爲亨者窮居獨善常得而不自失此困之所以能亨也其惟見眞守定之君子能之乎苟非君子必不能也其曰貞大人吉何也以卦體言之二五剛而得中剛則不撓中則不躁葢困之移人非乘其柔荏卽因其矜激惟剛與中合旣不撓而屈於困又不躁而重其困所以守貞而爲大人有能亨之吉也其曰有言不信何也以困時所尚者宜用晦處黙反躬自信雖困不足以窮我惟心失所亨急於自明所尚者口給興戎賈怨乃爲所窮實自取耳可不戒哉夫當困之時身可窮而道不可窮葢道之所在不充詘於富貴不隕穫於貧賤無往而不得也如孔子之從我所好顔子之不改其樂湛然無為固不因困而得亦不因困而失適如其固有之初心而已若後世之士身處困窮或侈談横議或標榜相高徒足以招尤而召謗豈君子全身之道哉象曰澤无水困君子以致命遂志此象傳是言君子處困之道能守正而不屈其志也孔子釋困象曰澤以瀦水宜有水者也坎水下漏兌澤上枯澤中无水困之象也君子體之以處困凡綱常名敎所在爲吾志所欲成者若臨難以求免見義而偸生利害之念動於中是非之論不足惜因循顧戀是命不致則志不得遂也惟委致此命於度外論是非不論利害毅然獨往惟欲求成其是以遂吾不可奪之志則無愧無作可以對天地忘私忘家可以質幽獨吾志遂而亨莫大焉此處困之正道也夫君子居世常則脩身俟時命之在我者也變則成仁取義命之在天者也惟居常盡其在我理明識定故遇變不惑可以遂吾之志若夫一念慷慨輕生赴難𤼵乎意氣之動而非循乎義理之實者豈足以語此哉初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也此一爻是言處困無術身心交困而不克振也臀物之底也幽谷暗地三歲言其久也周公繫困初爻曰初六居困體之下卽以陽剛處之猶慮其不振况陰柔乎旣無出險之才束手坐困轉側受傷猶臀困于株木而不得所安也且所居至暗又乏觀變之識無知妄動益陷於險而終不能自出如入于幽谷而三歲之不覿也曷望其有濟乎孔子釋初象曰陽剛者明顯陰柔者暗昧初之入于幽谷者惟其以柔居暗迷焉而不覺昧焉而罔通是暗於心者自不能洞察於事宜其益入而終無所覿也按困六爻剛爲柔揜不特剛困而柔亦困葢小人處心暗昧旣不明於邪正又不明於利害殫精勞神思有以困君子而先已自受其困如初者居無安身之地行無見天之日良由心術之不明也故陽明為君子陰暗爲小人觀人者亦在乎心術之間而已矣九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也此一爻是言二膺寵遇之隆當竭誠以圖濟困之功也朱紱王者之服蔽膝也亨當作享周公繫困二爻曰九二剛中是其德能濟困者以一已繫天下安危之重位高禄厚任事賢勞反足維縶其身若困于酒食者然且上與五同德眷顧日隆其慇懃晉接之意有加無已又爲朱紱方來之象如是則君之寵遇已極人臣當此宜如何以承之也爲二計者惟有殫心盡力用格天享帝之誠以矢股肱心膂之報如享祀然雖時事孔艱未免以征則凶然義所當行而吾行之自不至於有咎耳孔子釋二象曰九二寵任之隆如此葢以二有中德自能盡忠竭智濟時之困而有保邦致治之慶也然則困于酒食者葢以一身之勞瘁致天下之福慶身雖困而道則亨凶與无咎不必言矣按事君之道不避難不辭賤言乎臣職之當然凡委贄者所同也然寵寄愈重則報稱愈難遺大投艱其責尤無容旁貸人臣處此誠一不貳勿以強弱利害動其心勿以成敗利鈍沮其氣竭股肱之力而濟不濟聽之天焉斯爲臣道之正乎六三困于石據于蒺蔾入于其宮不見其妻凶象曰據于蒺蔾乘剛也入于其宮不見其妻不祥也此一爻是言不善處困者益以致困爲可戒也石指九四蒺蔾指九二宮謂六三妻謂上六周公繫困三爻曰六三以陰柔之質不中不正處險極而用剛不自度其才德乃欲前推四以上進而四之剛則堅于石也是反受其困而不能動如困于石然欲退倚二以圖安而二之剛則銳于蒺蔾也是據非所據而不可依如據于蒺蔾然當此之時進退出入無一可展舒岌岌乎殆矣雖有上六以為應欲求配偶亦終失其所安而不可得見有入于其宮不見其妻之象是則禍必及身而家隨以喪凶莫甚焉孔子釋三象曰據于蒺蔾以三乘二之剛非所據而據其何能得安也故還而自顧孤立寡援一無依倚至於妻不可見則衆畔親離危亾立至不祥孰大於此所爲凶也按困之三陰始相締交以揜其剛䆒之初六之困旣以自陷於不明至六三之凶更且自召其不祥設心愈險則召禍愈深惟上六處困之極悔心漸萌猶可轉而得吉然則爲小人者盍亦思所自反乎九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也此一爻是言拯人之困有志者事終成也金車指九二周公繫困四爻曰九四與初爲正應初方困於下不能自振在四當急爲救援以圖共濟之功但以陽居陰才力不足棄之則不能坐視欲往則不可徑行遲回猶豫其來也徐徐然至初之望援豈不欲急於就四而前進哉祗爲九二所隔勢不能通若困于金車不得遂進者然是其始也四以已之所應急難方殷而才不能以速拯爲可吝矣䆒之相應者爲正中阻者爲邪邪不勝正終無日隔之勢而有自合之理彼此相得而有終也孔子釋四象曰四之來徐徐者其事雖若緩而志實在下其心未嘗不切也人患無其志耳苟志在初雖居柔不當位才不能濟而始離終合必得遂其相與庶幾困不終困矣按九四方爲柔揜乃欲藉初柔以有終何也葢君子之於小人絶之未嘗太嚴所以示包荒之量與之不可太速所以遠朋比之嫌故能用小人而不爲小人所害此四之善行其志也夫九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也此一爻是言五以至誠感人能解困而得亨也受傷於上曰劓受傷於下曰刖赤紱臣下之服周公繫困五爻曰九五上爲陰揜見蔽於近習下則乘剛又逼於强臣是上下皆受其傷而爲劓刖之象也如是則臣下不爲我用而反為其所制是爲困于赤紱也幸其剛中而居說體能善用其剛不動聲色從容和緩乃徐而圖之旣不失之因循復不傷於躁急卒之大權漸收不憂旁落始受傷於上下者今不終於傷而可有說耳推此道也至誠感物莫如祭祀用是以感化臣下而有不誠服者乎其為説也必矣孔子釋五象曰五之志本欲濟困今陰揜則蔽乘剛則危身自受困如此豈得志之時乎乃徐有說本由中德而以直行之中則不偏直則順理開誠布公困從此濟而志可得卽用以祭祀猶可以格神明而受福祐况在下之臣乎所以徐而有說也按拯困之功不在急躁而在舒徐急則忿激誤事緩則從容觀變靜俟機㑹而易以成功如光武焚書而安反側宋祖談笑而釋兵權得此道也漢唐末世時際艱難羣小播亂不思所以消導解散之術輕發潰決反致召禍此皆不審於徐之故歟上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也此一爻是言當困之極惟悔過可以得通也葛藟引蔓纒縛之草臲卼動搖不寧之貎周公繫困上爻曰上六陰柔處困之極才弱時窮欲動以求解則識力不充束縛而不能解欲靜以求安則事勢所廹又震撼而不能安爲困于葛藟于臲卼之象展轉思維才旣不足有為勢復難於安處動輒有悔無往而不困也所以然者惟柔而自廢失其處困之道故至此極耳爲上計者若能翻然振作興起悔悟之思以改其因循之習力反而征行則明作有功而吉可知矣孔子釋上象曰上之困于葛藟者以陰柔為累無解困之才所處未得其當也以未當而得悔卽以未當而能悔將窮則思變動罔不臧是以吉之道而行則其行爲吉行矣何困之不亨乎按困五爻皆不言吉而上獨言吉者葢物窮必變困極則通因其悔心之萌開以自新之路困則凶行則吉聖人所以挽回世道砥礪人心化小人而爲君子吉莫大於此矣㢲下坎上井取井養之義井體有定而不遷猶治道有常而不易也雖時勢推移不無因革而王者大經大法終不可變故卦辭示以法之當守而又戒其變法之凶也井以泉上出爲功猶之施其德以養人也初六以居下而見棄六四以陰柔而無功九二雖有剛中之德而上無汲引下無彚征懐才而未遇時者也必如五之德位兼隆上之博施濟衆始澤被天下收養道之大成焉至於九三居下之上又爲賢人在下不能有為之象然其德旣裕民望乆歸苟求賢之主登進而用之則勿幕之功可覩也是在用之者矣然以井之道究言之出之有原施之有序善法之則井収之吉也不善法之則羸瓶之凶也可不愼歟井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶此卦㢲下坎上㢲木入乎坎水之下而上出其水坎水行乎㢲木之中而滋潤乎木有井水上行之義故名爲井卦辭言治法有常當敬愼以守其成也汔幾也繘綆也羸敗也文王繫井彖辭曰井以養民爲義凡先王良法美意所以利養斯民者亦猶是也井體一定而不遷猶治法有常而不易雖時勢推移不無因革而王者大經大法所在歴萬世而不可變故養民者必恪守成憲如改邑而不改井然夫旣不改則無更張之害亦無創造之利循乎固然莫不沾其利澤不猶井體不遷无喪无得而往來者皆得井其井以爲利乎此守法之善道也如名為遵守而德意未加於民紛更隨起於後猶之汲井者幾至上出未盡収其綆而已敗其瓶則垂成之功盡棄無益有害凶何如之此見守法者尤當愼終以觀成也按養民之道莫備於先王本天理順人情不容少有加損原無喪與得之可言後世雄才大略之主喜近功見小利欲圖其得所喪實多天下之事成於始而敗於終者多矣善爲治者豈可不敬其有終歟彖曰㢲乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也此彖傳是釋井彖辭言成養民之功者在守法以圖終也孔子釋井彖辭曰卦何以名井以卦象言上坎下㢲是以㢲木入乎坎水之下而上出其水亦猶井泉在下可汲取上行而為利此井之象也以井之用言之體不動而功及物其出有源其施不匱日用飲食需養而不窮矣有事養民者本其美意布爲良法致養無窮道亦猶是也如此而可改易乎哉其曰改邑不改井者乃以二五之剛中也剛則强毅有守而持之能定中則意見不偏而因之可久故能恪遵成法而不致輕變也至若汔至亦未繘井是法度方行利澤未能及物而未有成功正其所當兢守焉者乃遽妄意紛更變亂舊章若羸其汲井之瓶是以幾成復敗貽害無窮而不免於凶豈非成法之不可不守而守法者尤不可不要其成乎按圖治者法守法者人先王創立制度無不盡美盡善而子孫率多紛更者大率起於好大喜功貪多務得之一念但思求勝於前人而不知自取其敗壞内多欲而外施仁義漢武之所以不及文景也此言改邑不改井而推本於剛中可見欲守法而成久安長治之功者端有頼於無欲之主人君方寸之地爲萬化所從起故曰二帝三王之治本於道二帝三王之道本於心治法未有不出於心法者也象曰木上有水井君子以勞民勸相此象傳是言君子曲盡養民之道得井養不窮之義也孔子釋井象曰㢲木之上而有坎水津潤上行井之象也君子體之以民待君以爲養自處於逸不可也則以身勞之如制田里敎樹畜一切身親其事謂之勞民使老者衣帛食肉黎民不饑不寒是也且民之待養無窮獨任其勞不足也又必勸勉之如通有無勤賙恤一切多方勸導謂之勸相使比閭族黨之相親貧賤患難之相助是也葢一則以君養民而上下之情通一則使民相養而彼此之誼洽不猶井之養物淵泉時出而不窮乎按古者養民之法莫善於井田勞徠勸助足衣食而脩婣睦王道之始卽王業所由成也後世制度旣湮井田久廢時異勢殊雖不可泥古之法苟師其意而行之省力役薄賦歛勤本抑末尚儉去奢使學校無濫士田野無游民孰謂三代之治不可再見於今哉初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也此一爻是言初無濟世之德而惜其爲時所棄也周公繫井初爻曰以陽剛爲泉者井之體以上出爲功者井之用今初六陰柔則不能爲泉而無以濟物居下則不能上出而難以利人德不足於已功不加於民是明王所不賓衆人所共棄猶井泥之汚濁不爲人所食也旣不爲人所食無補於生民日用將廢棄而爲舊井卽禽鳥亦莫之來顧矣無德而不見用於世者不猶是乎孔子釋初象曰井爲濟人之物今井泥不食者以井之居下其位最卑故也不能出身以加民欲求其博施以利物揆之於勢難矣况本無及物之德乎舊井无禽是一無所濟而爲時舍置理固宜也從來士品之高下關乎世道之汙隆故必裕經綸匡濟之才而後能建致主澤民之業有其具而人不用時爲之也無其具而爲人所棄窮無以善一身達無以善天下不亦可恥乎觀於此爻有心世道者當知所以自勉矣九二井谷射鮒甕敝漏象曰井谷射鮒无與也此一爻是言德不足以徧濟由限於遇而不得其助也谷井旁穴也射注及也鮒小魚也周公繫井二爻曰九二陽剛本有泉之井也但上無正應則汲引無人莫與同升下比初六則彚征無助莫與推轂雖有濟人之才旁出下流不能普徧及物故就其澤之所及取象於井猶井旁穴出之水僅能下注於鮒而不爲人所食澤不被遠也究其用之所施取象於汲井則如甕之敝壞而水漏於下功不上行無利濟之用也抱德而不遇時者其取象如此孔子釋二象曰井谷射鮒豈無濟人之才哉葢二雖剛中而无與故也若應與有人以圖共濟則澤可究而上行挹彼注兹足以致養而不窮矣按初之不食德不足也其咎在已二之射鮒時不遇也其咎在人君子藏器於身待時而動苟非上遇明主之甄収下獲同心之推挽亦烏能得志而有爲哉九三井渫不食爲我心惻可用汲王明竝受其福象曰井渫不食行惻也求王明受福也此一爻是言濟物者必爲時用而後可収其效也渫不停汚也周公繫井三爻曰九三陽剛居正有濟物之德但居下之上不爲時用是德本足以致君澤民未當通顯功效難施猶井之渫潔而不爲人食者然遂使人情致悼衆望徒殷未免於心惻者何哉正爲其德之可用以利人猶井之可汲以及物也特無如王之未明耳如有王之明者知其可用而用之則啓沃之方上可躋君德於雍熙惠鮮之澤下可引斯民於恬養君民咸利而無不受其福也孔子釋三象曰井渫不食豈惟同類興嗟卽行道之人能無爲惻乎原其惻之之心急在求王之明用以成功而上下實受其福耳是以受福之故而求則其求也人自爲求非三之有求於王也按人君以知人爲明用人爲急知之不眞則所求非所用所用非所求而爲害益甚此君之德必以明爲大也所謂明者至誠以將之虛已以待之本之衆論以取其公攬之一心以行其斷庶幾賢無不用而用必皆賢此知人之法也故曰君明臣忠則朝廷治安明之一言誠探本之論也夫六四井甃无咎象曰井甃无咎脩井也此一爻是言德脩於已而有自治之功也甃井旁之砌也周公繫井四爻曰六四柔得其正有清愼之德而無剛毅之才苐能反躬自治潔以居身不染於汚俗清以居世不混於濁流猶井之甃治而不停汚者然如是則進脩不已厥德日新雖澤未施於天下而獨善已具兼善之體又何咎焉孔子釋四象曰井甃无咎豈井之自爲甃哉正有所以脩之者也去舊以來新防汚以養潔必脩井而井始得甃亦猶脩身而身始得全也體旣立而用自裕將有寒泉上出之功而無井泥不食之咎矣按三居内卦曰井渫内以致其潔也四居外卦曰井甃外以禦其汚也葢不渫則汚者不潔不甃則潔者易污爲學之道必閑邪存誠内外交養亦猶是也此脩已爲治人之本先有體而後可兾其有用也歟九五井冽寒泉食象曰寒泉之食中正也此一爻是言本天德以行王道故能養而不窮也冽潔也周公繫井五爻曰九五居尊位而有陽剛中正之德其所涵蓄者旣資深而不匱其所施及者自周浹而無窮存之則為内聖之德行之則爲外王之道體立而用全不猶井之清冽不停汚濁而寒泉在中足以爲人所食者乎此淵泉時出德脩於已功及於人所謂井養而不窮者在是矣孔子釋五象曰寒泉而為人食者以陽剛爲泉有及物之澤陽剛而又中正則爲澤之所從出其見食於人宜也五具中正之德以純王之心行純王之政匹夫匹婦無不與被其澤固若斯耳按九五坎中一陽天一所生泉之不竭者也天下之求養者皆待命於五則五豈可以無本而易涸者應之哉使不加潔治則旁流之穢濁者得以汨亂之而無以為潤澤萬物之具矣五惟勤於自治然後寒泉之體性不失凡往來井井者皆知爲中正之道而得以竝受其福斯為混混之原泉而沾溉無窮者乎上六井収勿幕有孚元吉象曰元吉在上大成也此一爻是言養道之成由於實心而無不善也収者汲器之出幕者覆井之具周公繫井上爻曰井以上出爲功六居卦之上而坎口不掩是井養之德無所壅於上深仁厚澤導民之利而不私博施濟衆聽民之取而不禁象猶井旣収矣勿復加幕而往來者皆得井其井也所以然者本有孚之至誠積中發外以實心而為實政其德澤所施無所弗届豈非至善而爲元吉之道乎孔子釋上象曰養民之道小惠未徧不可以言成今元吉而在上過化存神其取擕之而不盡斟酌焉而彌新此眞井道之大成也彼施澤有限而功僅小補者奚足以當此按井六爻皆取井養之義初井泥二井谷皆廢井也三渫井之泥四甃井之谷則井體具矣五則井冽而泉食井之為用已備然必至乎上而後始全其上出之功所以他卦之終爲極爲變惟井之終爲大成之效可見井之道出之有本原施之有次第君人者善法之則爲井収之吉不善法之則爲羸瓶之凶義不兩立不可不愼也離下兌上革取變革之義凡事有必變之時聖人因有改易之事善革者準乎天人而合於至正始無妄革之弊故卦辭曰元亨又曰利貞而後悔乃亾六爻皆處革之人而所居之位不同象亦各異要貴一愼革之心而已初九有其才而非其時則以守分爲正愼其道於革之始上六處時之盛而無所用其才則以靜正爲中愼其道於革之終九三則過剛不中未免恃才任智而有不愼之嫌若九四之剛柔不偏則因愼而得吉矣六二柔順中正而上應九五則愼而從五以行革矣惟九五之陽剛中正以大人之德而為革之主収虎變文明之效斯以愼而成功也葢聖人重改作不得已而有革必審去故之義制因時之宜從可久之道以善其革所謂革而當也故二雖才足有爲權能任事必從容詳愼至已日而後革之者緣二爲人臣不當為革之先必上信下從而後可言革若五之經綸素裕通變宜民天下久已信從然後創制立法煥然一新也葢於初戒其躁妄於上戒其紛更可輕言革歟革已日乃孚元亨利貞悔亾此卦離下兌上離兌合體有兩相息而不相得之義故名爲革卦辭言革之爲道不可不愼當圖所以盡善也已日事已成之日文王繫革彖辭曰革以變革為義物理人情所當變革者皆是也凡人可與習常難與通變可與樂成難與慮始當革之初未免疑懼必待已革之日事久論定信所當然而後乃孚革之難有如是也然所以能致其孚者必審所當革盡善盡美可通行於天下後世而無不大亨且悉準乎天理人心而利於至正然後見之施為有利無害而輕舉妄動之悔乃可亾耳使亨貞一有不具安能致已日之孚而悔亾乎聖人之重言變革葢如此按革之道關乎治亂安危非聖人之得已也後世之患不失於因循以養禍則失於輕作以敗事故當革而不革法久則弊生不可也不當革而輕革興一利必復生一弊尤不可也革之悔亾鰓鰓乎慮之深而言之愼矣彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亾天地革而四時成湯武革命順乎天而應乎人革之時大矣哉此彖傳是釋革彖辭明革道期於至當而又極言之以贊其大也孔子釋革彖辭曰革之義何取哉以卦象言水上火下兩相息滅而勢不相容物理之當革也二女同居少上中下名位失序而志不相得人情之當革也故爲革革則通變以宜民宜乎人之卽信矣乃曰已日乃孚何也革故非常黎民懼焉有未卽孚人之志者必革之旣定有利於國不擾於民而人始信之曰此其變之不容已者耳若是而革可輕言乎卦德文明以說内灼夫義理而不失於妄外因乎時勢而不隳於躁凡其所擬議者必盡善可通而又一歸於正斯革為至當而其悔乃可亾耳設一有未當則所繫豈其微哉因是而極言之天地之道陰陽變化春革而爲夏秋革而爲冬寒暑代謝相推於不已而四時成焉商周之際時代逓遷湯革夏命爲商武革商命爲周天心人事不容少有矯拂而順且應焉若是者皆時為之也時未至而不能先時旣至而不敢後天地聖人皆因乎時之所趨而有不得不革者革之時豈不誠大矣哉然則因時以成革者明此爲文明順此爲和悅是爲大亨以正革無不當而悔亾若此也按書曰道有升降政由俗革繼治繼亂莫不各有當然之道如盤庚之遷始則民心未孚旣定而衆志乃安此革之而當者也如嬴秦之壞封建開阡陌良法蕩然前宋之廢祖制行新法貽害無窮安能免於悔歟謀國者當知所計矣象曰澤中有火革君子以治歴明時此象傳言變革之道莫大於明時也孔子釋革象曰兌澤之中而有離火水決則火滅而火受其變矣爲革之象也君子體之以天道人事關乎四時乃變革之大者於是制爲歴書設占歩之法以推天象運行之度立布算之術以察氣機旋轉之變一一理㑹以明乎四時使晦朔弦望各因其序分至啓閉不愆其期將在上者得以敬天勤民在下者得以因時趨事豈非革道之至大者乎按堯典首命羲和敬授人時聖門之論為邦亦必以夏時為先時若是其重也凡民之生因天之時以興地之利不明其時則民不知所興作是無以爲生卽無以爲民也何以成三才之道乎君子體革之要務於此可見矣初九鞏用黄牛之革象曰鞏用黃牛不可以有爲也此一爻是示初以固守之義爲妄動者戒也鞏固也黄牛之革取堅固之義周公繫革初爻曰變革之事大矣必有其時有其應而後可初九雖有陽剛之才然當革之初時猶有待上無正應事不我任若違時拂勢而遽言變革是不失之躁妄卽失之勉强豈計之得乎初惟安常守分無所變更以不妄革為中不强革爲順持之甚堅而守之甚固象猶鞏用黄牛之革然此處革初之善道也孔子釋初象曰初之固執其守如此豈當革而不革乎特以所處之時非有爲之時所居之勢非得爲之勢斷之以義知其不可有爲也知其不可爲而不為此其爲中順之守而無輕動之失矣按國家之患好大喜功輕言變革每由於新進生事之人三代而下若賈生本王佐之材然當遇主之初立談俄頃不度時勢遂欲變法盡棄其舊而新是圖論者謂才有餘而識不足卒為時所忌嫉不得竟其用此爻之垂戒誠有以夫六二已日乃革之征吉无咎象曰已日革之行有嘉也此一爻是言能愼於用革斯行無不利也已日猶言姑停一日再加詳審之意周公繫革二爻曰六二柔順中正上應陽剛之君體順則無違悖以持其理中正則無偏蔽以審其機且才足有為權能任事可以革矣然革乃大事非得已者化可更而無以善治則不容遽更變可通而無以宜民則未可輕變必從容詳愼至於已日而後革之如是而征行從五以革則去故以圖新上可利國下可便民吉且无咎矣孔子釋二象曰時事之當革者革而不當難乎其有嘉也必已日而後革其愼重如此以是而行則弊無不去治無不新是為有嘉而宜征耳按人臣不當爲革之先必上下信從而後可言革故卦曰已日乃孚此則曰已日乃革者言乎君之革不避艱難旣革之已日而始孚臣之革不敢創造旣信之已日而後革也此二之從五以行革道爲能敬愼而無失歟九三征凶貞厲革言三就有孚象曰革言三就又何之矣此一爻是言善革者當戒其躁動而貴詳審也周公繫革三爻曰九三過剛不中居離之極恃才任智不加詳愼此非善於革者也以是征行一以急躁為之則事有不通人有不信貽天下之害而凶矣卽使革所當革亦不免矯枉太過徒滋紛擾雖貞而亦危厲之道也然於時當革所患者惟不能審耳誠反其躁動而詳審焉議革之言必深思熟慮至再至三而後成就則利害可否無不區畫周詳當乎事體合乎人情足以有孚而可革矣孔子釋三象曰革之可疑者患乎未審也如革言至於三就則情理旣明致審之極無可復加而又何之焉葢未審則不可輕革旣審而猶不斷則當革不革亦非處革之善道也可見圖天下事者在乎謀成天下事者在乎斷寡謀則輕以昧理少斷則緩以失機凡事皆然况處革之時尤所當計者乎昔唐貞觀之治革隋季之弊善謀而濟之以能斷天下稱房杜焉三之三就而可革殆能兼之矣九四悔亾有孚改命吉象曰改命之吉信志也此一爻是言革道之善能見信於天下也周公繫革四爻曰革道利貞九四居陰不正宜若有悔以其體居兌說有剛柔不偏之用又卦已過中値水火變革之時旣有其德又遇其時是以變而得中革無不當而悔可亾也然其所以能當者要在處之以至誠必其所存止此憂民體國之心經營圖度不由矯拂其有孚也早已見信於人至臨時通變以之更改命令可以除前弊而収後效不惟悔亾亦且善治而得吉矣孔子釋四象曰改命之吉者四之變革之志本在於福蒼生而利天下則其誠懇無私因時順理有不敢輕革而又不得不革者使上下樂從固已昭然共信其志也又何疑改命之吉乎此見事㑹當變革之日時勢兩難每多因循坐視皆避悔之一念萌之也經權常變苟能自信其心一出於大公至正卽可信於天下後世古之人所以定大䇿決大疑而中外安之若行所無事者惟此而已矣九五大人虎變未占有孚象曰大人虎變其文炳也此一爻是言革道之極盛以見其成功之大也周公繫革五爻曰九五陽剛中正以大人之德為革之主順天人以改革則其存於中者有自新新民之極而其見於世者有創制立法之猷於是禮明樂備治定功成煥然一新於天下象猶虎之變而文明之有赫也然所以致此者豈易得哉世㑹當極敝之日非更化不足以善治吾惟經綸素裕實有其可通變宜民者則雖未占決而天下之人久已信從不待已日而始有孚矣孔子釋五象曰大人御世制作一新惟其未革之先誠信畜於中至旣革之後文章煥於外皇猷帝治炳然可觀象之爲虎變也非德位兼隆之大人烏足以當此按革必取於孚信者不信則不從也自三至五皆言有孚三議革而後孚四有孚而後改至九五之孚過化存神不但無議革之言亦不待改命之志積之久而發之大所謂殺不怨利不庸遷善而不知革之道斯極至矣理本於自新而効極於新民帝德王功之盛孰有加於此哉上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也此一爻是言革道之大成當靜正以守其終也面猶向革面言易向也周公繫革上爻曰上六革道已成當繼體守文之日化行俗美在君子漸漬於文敎遷善日新光輝外見如豹文之變然在小人亦懾服於王章畏威遠罪遵道遵路而革面易向也當此之時治道極隆豈復有加哉若更有所征行好大喜功適足以啓紛更之弊是為已甚而不免於凶惟居貞靜正率由舊章與天下相安於無事乃可得吉革道之不可過也如此孔子釋上象曰君子豹變非潤飾於其外也道德積中英華發外由其充養之旣粹而文自蔚然可觀也小人革面雖未必中心能革而奉法稟令易向知方亦且效順以從乎君上也合言之道德一而風俗同革道不於此大成乎夫天下事始則患其難革已革又患其難守故三之征凶戒於未革之先上之征凶戒於旣革之後總見變革之大非聖人所得已也丁寧告戒始終愼重固知開創難守成尤不易有周之文武不可無成康有漢高不可無文景久安長治其在斯乎㢲下離上鼎重器也得之難守之不易必才德兼備輔相得人用以合天心而順民志乃可以奠重器於無虞也鼎卦初應於四為所舉用陰柔不足以勝任而當卦之初鼎未有實故无咎也二乘於初密邇陰柔幸剛中自守不爲所溺五居尊位虛中以應九二之賢上九復剛柔相濟以佐之此所以上下之相成而保鼎之道得也九三越五應上舍可事之君從避世之士如鼎耳方革不可舉移之象也然能以正自守則五終必求於三三亦必應於五終有明良相遇之吉此卦大約言有虛中之德養聖賢以輔佐之意且卦象臣之分多君之分少鼎有足臣任之鼎有腹臣實之鼎有鉉臣備之君惟處兩耳之間耳故鼎得所輔而勢不孤鼎得所扶而器乃重此得中應剛之説尤爲急也鼎元吉亨此卦㢲下離上六爻有鼎之體二象有鼎之用故名爲鼎卦辭言人君得保鼎之道斯治化大通也鼎烹餁之器吉字衍文文王繫鼎彖辭曰國家之重器莫若鼎自非德位兼隆而得賢才以輔之無以成保定之功今卦象本皇躬以建極而有其德卦變履大寶以出治而有其位卦體登俊乂以立政而有其輔三者兼備故能補偏救弊除舊布新躋斯世於文明措治理於盡善上焉而天命以凝下焉而民心以固永奠重器於磐石之安不亦元亨乎按帝王之撫有此鼎也創業固艱而守成尤不易傳曰在德不在鼎書曰任官惟賢才言乎脩德乃保鼎之本而用賢實輔德之原也人主處豐亨豫大之時能常思神器之不易守勢位爲不足慿而日以廸德簡賢爲兢兢斯乃萬世不拔之業也歟彖曰鼎象也以木㢲火亨餁也聖人亨以享上帝而大亨以養聖賢㢲而耳目聰明柔進而上行得中而應乎剛是以元亨此彖傳是釋鼎彖辭而極言其用之大以明得亨之故也象形象也㢲入也謂以木入火烹餁飲食之屬孔子釋鼎彖辭曰卦名鼎者何哉初陰下峙爲足二三四陽中實爲腹五隂對峙爲耳上陽横亘爲鉉有鼎之象以㢲木入離火藉以烹餁又有鼎之用故曰鼎也此豈直一物之微已哉報功之典莫大於享帝特牲以迓居歆而必用鼎以烹之始可以將其誠經邦之道莫重於養賢饔飱以明式燕而必用鼎以烹之始得以申其敬鼎之用洵大矣苐凝鼎必恃乎有德卦象上離為目而五爲耳是在内則心思㢲順而在外則耳目聰明也主鼎必恃乎有權卦變從㢲來陰進居五是以溫恭之主而居元后之尊也調鼎必恃乎有輔卦體得中應剛是以純心之君而獲剛明之臣也夫德位兼隆明良交濟洵可永爲享帝養賢之令辟矣其元亨也不亦宜哉按敬天禮賢聖王致治之要道明堂宗祀所以享帝而本之曰夙夜畏威則格天卽以脩德笙筐燕饗所以優賓而終之曰視民不佻則籲俊卽以安邦有天下者其可不加之意乎象曰木上有火鼎君子以正位凝命此象傳是言君子保鼎之道也凝命謂保有天命而不墜孔子釋鼎象曰木上有火而烹餁有資鼎之象也君子體之以鼎乃天下之重器猶人君所居之位乃天下之重寶鼎不正則所受之實無以聚位不正則所受之命何以凝故敬愼以正其内而存於心者戲渝之必袪端莊以正其外而持諸躬者跛倚之必戒則所發皆正言所行皆正道於以上凝天命自然鞏固而無傾危之患矣按正位凝命乃身世交盡之功天人合一之道葢朝廷正而百官萬民罔有不正者矣百官萬民正而天命罔有不凝者矣書言疾敬厥德而卽推之於祈天永命詩言顒卬令望而卽驗之於四方爲綱亦此旨也夫初六鼎顚趾利出否得妾以其子无咎象曰鼎顚趾未悖也利出否以從貴也此一爻是言初才德不足以勝任戒其當自奮勉也周公繫鼎初爻曰初六在卦之下上應九四乃四所舉以登用者有鼎趾之象焉苐力不足以任重未免傾覆之虞猶鼎之顚而趾反居上也然能因其無德致敗而翻然惕慮舍舊圖新袪陰柔之習而振奮勉之功如鼎雖顚趾而舊日之否惡由之而出則得其利矣葢轉敗爲功猶得妾以其子因賤而致貴也何至終罹於咎哉孔子釋初象曰克盡其職者人臣之道鼎而顚趾於道爲悖而實未爲悖者以其出否也葢初上應九四之陽剛從乎可貴之德而强毅有為自可不負所托如鼎之利於瀉惡而受美未為悖也按易之理貴陽而賤陰可見柔靡之人不足以任事然苟能一念自奮發憤有爲則始屈終伸如管仲舉於囚辱之餘孟明用於累敗之後因而成大名顯當世者多矣自古明王用人本不求備馬或奔踶而致千里士或有負俗之累而立功名由濯磨淬勵之有道耳出否從貴之義寓意豈不遠哉九二鼎有實我仇有疾不我能卽吉象曰鼎有實愼所之也我仇有疾終无尤也此一爻是言二能剛正自持而不爲小人所比昵也我仇謂初六怨耦曰仇不善之匹也周公繫鼎二爻曰九二以剛居中是君子有充實之德足以承天養民而爲世用者爲鼎有實之象然近比初六隂柔之小人欲與我爲仇匹相求非正適爲已之疾害使於此而不能自守則陷於惡矣乃二秉剛中以禔躬分别甚嚴不爲所凂是雖密近小人而終不能我卽也如此則剛中之實德不虧而潤身濟物之大功可成吉之道也孔子釋二象曰小人之得以累君子者未始非君子有以致之吾鼎有實而自加愼重不輕所往雖我仇有疾害之理而終不能凂自不至陷於匪類何有失身之尤乎按君子小人邪正之途勢不竝立苟君子不愼所交則必有敗德之累而爲釀禍之階始之不謹終悔莫及故擇善遠惡爲守已處人之大防虞典曰惇德允元而難任人周書曰勿以憸人其惟吉士然則古帝王治天下之良法又孰不以棄斥小人爲保邦立政之本哉九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也此一爻是言三始雖不偶於君而有悔終當相遇而得吉也耳指五革謂不相屬不肯就君也雉膏謂道德之美也方雨謂君臣之合猶陰陽和而雨作也周公繫鼎三爻曰三爲鼎腹上承離體本有養民之腴也顧鼎之舉行在耳士之致用在君三與五旣非正應情不相屬不得乎君則道何由而行衆何由而濟如鼎耳方革不可舉移而其行阻塞雖有雉膏之美而不能爲世饔飱之用上負吾君下負吾學為有悔也然能以正自守則五終必求於三而三亦必應於五陰陽相合明良交㑹如將雨然向者去君長往之失可無矣是初雖有不遇之悔終得相遇而吉也孔子釋三象曰君子之仕原以行義鼎耳革則狷介而不爲時用自失其義也夫豈可哉按士君子處世詭隨以希遇則失已獨善以忘君則廢倫惟自居中正之道不急急於功名亦不甘心於隱逸斯得之矣然自古聖帝明王尤重尊德樂義之士故士或守已以抗節而君必屈體以下賢未有懷才抱異而見棄於明時者此三所以終免不食之悔也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也此一爻是爲大臣輕任匪人而悞國者戒也覆謂傾餗謂饌形渥作刑剭謂重刑也周公繫鼎四爻曰九四居大臣之位任天下之重者也天下之事豈一人所能獨任必當求天下之賢智與之恊力乃四反下應初六之陰柔則任託小人必至敗壞天下國家之事為鼎折足而傾覆公餗之象刑剭之誅無所逃矣凶莫甚焉孔子釋四象曰大臣見用於君其始所自許者未有不欲薦賢籲俊以成元亨之治今四悞用小人以至敗事與向者相期許之意如何矣不亦自愧大烹之養乎按帝王欲用天下之人必先擇一用人之人周禮六官其屬各六十以人事君者大臣之職但須用得其人耳葢用人之得失實關大臣之休戚亦非獨關大臣之休戚而實係國家之治亂用非其人自取刑戮禍止於一身凶猶可言也乃竟以此負聖主之託敗朝廷之事禍并中於天下凶不可言也然則在上者欲擇用人之人可不愼哉六五鼎黄耳金鉉利貞象曰鼎黄耳中以爲實也此一爻是美人君以虛中之德下賢也五於象爲耳而有中德故云黄耳金堅剛之物鉉謂貫耳以舉鼎者周公繫鼎五爻曰六五虛中而應九二之堅剛是純德之君而又得賢臣以助之明良喜起猶鼎黄耳而貫之以金鉉也正位凝命不待言矣然必任賢之誠始終勿移以底於貞固焉斯賢者樂爲効用而鼎器之重可頼之以共舉矣孔子釋五象曰君必得臣以建功臣必得君以𢎞化五之取象於黄耳者以六五有虛中之實德故能忘已以任賢非矯飾於外而爲之也按天下重器非得人不可共濟古之聖主一心用賢以致泰交之盛治者非有他術也惟其中之虛而任之誠耳葢虛則無予知自矜之失而賢者得以盡其才誠則無奸邪雜進之虞而賢者得以久其位書曰任賢勿貳去邪勿疑詩曰中心好之曷飲食之其虛與誠之謂歟上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也此一爻是美上臣德之純也玉鉉剛而能溫之象節者制而不過也周公繫鼎上爻曰上九耳目之臣佐君𢎞化猶鼎藉鉉之貫耳以舉也苐輔鼎太剛則失爕理之宜今以陽居隂剛而能溫是本其參和之德而出之爲劑量之施直栗而濟以寛溫惇大以成其明作有鼎玉鉉之象焉如此則競絿不偏事皆盡善而大吉且上可成致主之猷下可敷澤民之化而无所不利矣孔子釋上象曰上九居輔弼之任其取象於鉉宜矣然不徒曰鼎鉉而曰玉鉉者葢溫潤而栗玉之節也上九以陽居陰則剛不一於剛而又節之以柔夫其剛也一玉之栗也其柔節也一玉之溫潤也上之取象於玉鉉其以此夫按五象鼎耳以上爲鉉以九爲金虛中以納鉉之剛君之聖也上象鼎鉉以九爲鉉以上爲玉質剛而用之以柔臣之節也君之於臣惟恐其有所畏難而忠藎不盡故曰金卽大舜汝無面從之義也臣之於君雖効其直言而恪恭不替故曰玉卽文王小心翼翼之義也君不挾其亢心而謙抑於上臣不恃其正氣而敬謹於下則天命凝而神器奠矣日講易經解義卷十一
