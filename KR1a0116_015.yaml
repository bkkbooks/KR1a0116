body:
  text: 欽定四庫全書日講易經解義卷十五繫辭上傳繫辭傳上下二篇孔子通論一經之卦爻大體凡例所為作也先儒謂其無經可附而自分上下云按繫辭作上下傳者王肅本也司馬遷則稱易大傳孔子晚而好易讀之韋編三絶而因作十翼何謂十翼彖辭上傳彖辭下傳象辭上傳象辭下傳繫辭上傳繫辭下傳文言傳說卦傳序卦傳雜卦傳也古易文王之卦辭周公之爻辭與孔子之十翼離為十二篇經自為經傳自為傳自漢費直始將彖傳象傳文言傳雜入卦中而繫辭說卦序卦雜卦諸傳另為一書晉王弼作注皆依之即所謂無經可附者此也宋儒程頤易傳一如費直之本自朱熹為本義乃復古易之舊而經傳又分明洪武間頒行學宮令士子程朱傳義兼習成化時奉化教諭成矩始單刻本義行世而篇章次第又悉依程氏非復朱熹原本今世所共習者是也此為易經分合源流故叙其梗概如此程頤曰聖人用意深處全在繫辭繫辭本欲明易若不先求卦義則亦不可以讀繫辭也天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣此一章是言聖人作易之大原示人體易之實學而此一節是孔子以造化之實明作經之理見天地有自然之易也天地者乾坤之形體乾坤者天地之性情卑髙兼天地人物言方者情動之始物則指人而言之也象形變化所成之體也孔子意曰易之首乾坤者何也蓋天地者萬物之大父母也天確然在上而居尊地隤然在下而處卑而易中之卦純陽至健而為乾純陰至順而為坤者已定立於此矣由是而地與萬物之卑者陳於下天與萬物之髙者陳於上而易中卦爻之上者貴下者賤己位列於此矣天與萬物之陽者為開闢為發舒而其動有常地與萬物之陰者為閉藏為收斂而其靜有常而易中卦爻之陽而性動者稱乎剛陰而性靜者稱乎柔已剖斷於此矣天下之事情有善惡而衆理衆欲以類而聚物類亦有善惡而同道同惡以羣而分此陰陽淑慝自然之理也而易中卦爻占決之辭或時之息事之得而為吉或時之消事之失而為凶者即生於此矣日月星辰在天而成輕清之象山川動植在地而成重濁之形此皆實理之變化也而易中蓍䇿所揲之卦爻陽窮於九則退而化為八陰窮於六則進而變為七者即見於此矣蓋易書之有乾坤且有貴賤剛柔吉凶變化無一不備皆非聖人私智之為也不過因陰陽之實體而形容摹寫之是故因至著之象以見至微之理觀天地即可以見易也大哉易乎天地且不能隱而况於人物萬事之變乎是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能此五節是言聖人作易而乾坤之理分見於天地也摩摩戛也蕩推蕩也風亦云潤者承雨而言爾知管也作造也成就也孔子意曰伏羲見天地間無往非易不過陰陽兩端是故畫竒偶以象之竒則稱剛偶則稱柔也剛柔既立變化無窮以一剛為主而以一剛一柔摩於其上則為太陽少陰以一柔為主而以一剛一柔摩於其上則為少陽太陰而四象立矣太陽與少陰相摩而生乾兑離震太陰與少陽相摩而生巽坎艮坤而八卦成矣所謂兩儀生四象四象生八卦易之小成也由是以乾兌離震為主各以八卦推蕩其上則自乾至復三十二之陽卦立矣以巽坎艮坤為主各以八卦推蕩其上則自姤至坤三十二之陰卦立矣所謂八卦相錯因而重之易之大成也易既作則凡造物所有孰非易理之著見如陰陽搏擊而為雷霆之鼓動陰陽和暢而為風雨之潤澤日者陽之精月者陰之精則運行而代明焉寒者陰之肅暑者陽之舒則迭運而無端焉此成象之實體也即此剛此柔也天地絪緼萬物化生陽而健者乾之道也人物得陽之多則成男陰而順者坤之道也人物得陰之多則成女此成形之實體也亦此剛此柔也然成男成女雖乾坤一定之分其實有相須之功故凡人物之始也乾皆有以主之質雖未形而胚胎朕兆已全於一施之初矣其成也坤皆有以作之即乾之所始者悉為之翕受培養而醖釀造就以終其事矣陰陽之不能相無者如此夫盡物而始乎乾宜若難矣然乾健而動常有餘力故氣一至而萬物俱生理一行而萬物即動初無艱深留滯之勞何易如之盡物而成乎坤宜若煩矣然坤順而靜皆不自作故承乎氣以成形因乎理以成性初無區畫增益於其間何簡如之天地生成之妙無心而成化者又如此乃知易之未作易在造化易之既作造化在易論乾坤之功至博而無外論乾坤之德又至要而不煩而人事之效法天地者從可識矣易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此二節是贊聖人之德始於法天地終於參天地也孔子意曰易簡豈專屬之乾坤哉人心之良亦自有易簡自私欲纍之而易者險簡者阻矣有能法乾坤之道一主乎理而無所容心則其易如乾矣一循乎理而行所無事則其簡如坤矣易則光明洞達無一毫人欲之艱深盡人皆知其中心之所存矣豈不易知簡則徑直平順無一毫人欲之紛擾盡人皆能循其途轍以作事矣豈不易從易知則不逺人以為道而同心者衆故有親易從則盡人皆可與能而協力者多故有功有親則因人之信從足以驗我所存之是而精一自信始終以之故其中之所存者可以至於久而不變也有功則因人之協力足以輔我行之不逮而兼人之能為己之能故其外之所行者可以至於大而益𢎞也可久則純亦不已與天同其悠久矣可大則巍乎成功與地同其廣大矣非賢於人之德業乎然其所以然者則以我之易簡與乾坤之易簡同原故也易簡而天下萬殊之理莫不貫通於我心統㑹於我身是故天有是易我亦有是易地有是簡我亦有是簡可以成人位於天地之中與之竝立而無歉焉此體道之極功聖人之能事也要之人心本自明白正大自為私意所蔽物欲所擾往往艱深使人不可近煩碎使人不可行如權謀術數之流天下之理必皆扞格而不相入易者存理而已矣簡者循理而已矣其始不過坦白要約而其終至於德崇業廣與天地參善學易者何不從易簡求之乎聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也此一章是言聖人繫辭明道之功君子玩辭體易之學而此四節言聖人繫辭之事也聖人文王周公也設陳也言設卦則爻在其中矣象謂卦爻本然之象辭謂卦爻辭憂慮也虞安也憂虞言象者猶云倣佛之意非觀象之象也下放此進退者造化之消息剛柔之未定者也晝夜者造化之幽明剛柔之已成者也六爻之動九六之變化也三極天地人之理也孔子意曰伏羲畫卦吉凶之理已默示之矣然有畫無文民用弗彰也文王周公取伏羲所畫之卦而布列焉統觀卦象而時有消息則繫卦辭以斷全體之吉凶析觀爻象而位有當否則繫爻辭以斷一節之吉凶於是易道大備而利用之功大矣然辭固因象而繫而象又因變而著卦爻之間九為剛六為柔柔退之極則剛推去乎柔而柔變為剛剛進之極則柔推去乎剛而剛化為柔其變化之間消息當否無不具焉此聖人所由觀之以繫辭者也由觀象繫辭言之辭之吉者即人事順理而得之象也辭之凶者即人事逆理而失之象也辭有自凶趨吉之悔即人事既失之後困心衡慮而為憂之象也辭有自吉向凶之吝即人事未決之先安意肆志而為虞之象也辭占之符於人事者如此由剛柔相推言之柔變而趨夫剛者即氣機之退極則漸長而為進之象也剛化而趨夫柔者即氣機之進極則漸消而為退之象也既變而剛是即陽明用事萬物照臨而為晝之象也既化為柔是即陰晦用事羣動宴息而為夜之象也至於剛柔變化流行於一卦六爻之間九六迭運所謂動也其即三極之道乎一太極也而天地人各得之為三極其動於初二爻者即地道之剛柔交錯也其動於三四爻者即人道之仁義時措也其動於五上爻者即天道之陰陽迭運也何動非道何道非極象變之符於造化者又如此按太極者本然之妙動靜者所乘之機故三才各一太極而太極各兼陰陽有陰陽則有變化邵子所謂天地人之至妙者也自卦爻而析言之則爻各一道一物各具一太極也自卦爻而統言之則六爻一道萬物統體一太極也聖人觀象繫辭亦止發揮太極之妙而已矣是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利此二節言君子學易之事也上言居者處之也謂以易道自居也下言居者靜也指未筮時而言也易之序指卦爻辭獨言爻者爻言乎變尤在所當玩也變即象也占即辭也所異者未筮既筮之别耳孔子意曰辭占象變之既備則有須臾不能離者而可不學乎是故學易君子其身之居處安固而不遷者則在易之序蓋觀其剛柔消息一定之次第以為進退出入之度也其心之愛樂玩味而不置者則在爻之辭蓋觀其吉凶悔吝無窮之精理以為悅心研慮之資也惟君子身心不外乎易是故動靜不間其功方其居而未及卜筮也則觀卦爻之時位而玩其辭凡得失憂虞之象吉凶悔吝之由皆其心之所㑹也而居安樂玩無間於靜矣及其動而謀及卜筮也則觀當動之卦爻而玩其占凡剛柔相推之變吉凶所占之決又皆措諸事焉而居安樂玩無間於動矣夫學乎易即合乎理合乎理即順乎天窮此理於無事之時則靜與天俱循此理於有事之日則動與天游是以自天祐之所趨皆吉所避皆凶受休嘉之福而得利順之應也按前章言伏羲之易而以易知簡能久大德業責成於體易者此章言文周之易而以居安樂玩動靜交修責成於學易者蓋天地間剛柔變化無一時之間人在大化中吉凶悔吝亦無一息之停必動靜之間舉無違理方盡學易之功方不負聖人作易之意彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之此一章是釋卦爻辭之通例也悔我自尤也吝人尤我也介善惡所分之路也各指其所之其指卦而言之向往也孔子意曰聖人觀象於卦而繫彖辭彖者言乎全體之象舉竒偶純雜內外消長之形莫不稱名取類以擬其形容也觀變乎爻而繫爻辭爻者言乎一節之變舉隱顯貴賤當否比應之殊莫不支分節解以觀其㑹通也卦爻之辭有所謂吉凶者言乎象變中時有消長位有當否而為失為得失則從逆而凶得則惠迪而吉也有所謂悔吝者言乎象變中剛柔雜居善惡未定向於得而未得尚有小疵則內自怨艾而悔生也向於失而未失已有小疵則外招尤釁而吝生也有所謂無咎者言乎象變中有以處非其地行非其事承乘比應非其人足以致咎然其間不無一節之善一念之良焉則能圖回更改而補其所過也由卦爻辭申言之是故爻言乎變而變之所示有貴賤凡居上而尊者皆貴也凡處下而卑者皆賤也易列之而等級分明則在乎六爻之位焉彖言乎象而象之所陳有小大如姤遁否之類陰為主者皆小也如復臨泰之類陽為主者皆大也易齊之而使不相雜則在乎六十四卦焉夫位有貴賤卦有小大而錯綜更迭得失形焉本有吉凶之理特隱而未形耳易辨之以明得失之報則在乎卦爻之辭焉若夫卦爻有小疵則有悔吝而易辭一遇悔吝必為憂之惟恐人之至於是而慮逺說詳不能自釋焉則存乎善惡初分之介人能體易之憂則一念之善有必充一念之惡有必遏豈猶至於悔吝乎卦爻善補過則為無咎而易辭一遇無咎必為震之惟恐人之終於過而奮發警惕不能自寧焉則存乎天理萌動之悔人能體易之震則怨艾深而勇於舍舊覺悟切而急於圖新不有以補過而無咎乎是故卦分陰陽有小大矣辭别吉凶悔吝無咎有險易矣然辭之有險易者正以卦之情所向不同而言蓋小卦之情回互而艱深為人欲之私是以不之於失則之於小疵而凶悔吝之險辭隨之大卦之情坦易而明白乃天理之公是以不之於得則之於補過而吉無咎之易辭隨之辭豈有外於卦哉言卦則爻可知矣可見聖人繫辭無非使人趨吉避凶坦然知所率由惕然知所畏避其曰憂悔吝者即君子慎獨之幾大賢不逺之復也其曰震無咎者即成湯改過不吝之勇太甲自怨自艾之誠也趨避之道莫要於此聖人一一著之於辭其意深矣易與天地凖故能彌綸天地之道此一章是言易道之大惟聖人能用之而此一節先極贊其大以起下文用易之事也易指易書而言彌聫合之意綸條理之意孔子意曰至大者莫如天地凡囿於覆載之中者皆不足以擬之而惟易與之齊凖蓋天地之道不過一陰一陽之變易以道陰陽竒偶二畫包含變化故於是道有以彌綸之彌者自其外以統觀而陰陽生生之妙無不包括於卦爻之中其全體渾合初無一毫之缺缺也綸者自其內以細觀而分陰分陽之理莫不精密於統貫之內其脈絡條理又無一節之淆雜也天地有是道而易書亦有是道謂之相凖不誠然哉夫易之未作法天地之道以為易之道故曰凖易之既作還以易之道理天地之道故曰彌曰綸彌之則萬合為一渾然不漏猶中庸言大德敦化也綸之則一實萬分粲然有倫猶中庸言小德川流也天地之道即下文所云幽明死生鬼神仁智晝夜與夫天地之化育萬物之生成皆是也易既能聨合而分理之則理性命無不畢具而聖人用易以彌綸天地之道亦不外乎此矣仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說精氣為物遊魂為變是故知鬼神之情狀此一節是言聖人窮理之事也天象燦然有章故曰文地形井然有條故曰理原者推之於前反者要之於後精重濁為陰氣輕清為陽物之所受以生而未屬於物者也物既成則謂之魂魄矣游者散而逺去之意魂升則魄必降舉魂可以該魄也情狀猶言氣象也孔子意曰易既能彌綸天地之道故聖人以易之理仰觀天文即陰陽之循環以觀其晝夜即陰陽之升降以觀其上下焉俯察地理即陰陽之對待以察其南北即陰陽之雜居以察其髙深焉天文之夜與下地理之北與深幽也而其所以幽者陽之變而為陰也天文之晝與上地理之南與髙明也而其所以明者陰之變而為陽也幽明之故以易而知之矣以易之理推原人物之所以始始即終之發端反觀人物之所以終終即始之歸宿其始之生氣凝於妙合之際而理隨以全陰之變而為陽也其終之死氣散於殂落之餘而理隨以盡陽之變而為陰也死生之說以易而知之矣以易之理究其精與氣之凝聚而既有知覺又有運動則為物精與氣之消散而魂升於天魄降於地則為變為物者自無而有神之來也伸也陰之變而為陽也為變者自有而無鬼之往也屈也陽之變而為陰也此蓋造化之迹二氣之良能其情無形而其狀有象鬼神之情狀不又以易而知之乎易固聖人窮理之書也總之幽明者陰陽之顯晦死生者陰陽之消息鬼神者陰陽之聚散此三者理之難窮者也聖人皆有以知之則凡天地人物造物之理殆無一之不窮矣是以崇效卑法生順沒寧而與鬼神同其吉凶也聖人窮理之功大矣哉與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛此一節是言聖人盡性之事也土者身所處之地也敦厚也孔子意曰天地之道聖人之性雖有不同然其為理則一而已聖人盡性故能與天地配合而相似相似則立此參彼無毫髮之違悖矣其相似者何如蓋天髙明其道為知地博厚其道為仁皆陰陽之理而易書具之聖人盡乎其知則聰明洞達而於萬物之理無不各究其極盡乎其仁則區處條理而於天下之人無不各得其所如此則仁以成知而知有實用非騖於髙逺非淪於空虛何過之有此聖人及物之仁知其處常者然也若夫事有不可以常理行時有不可以常法處者聖人又為之稱其輕重委曲遷就以處之不膠於一定之中是所謂旁行也旁行則疑其易流然行權之中亦天理之所在自合乎道義之歸而不流於變詐之術此聖人應事之仁知其處變者然也天者仁義忠信之理樂之則默契吻合而內重外輕命者吉凶禍福之數知之則昭融洞徹而修身以俟見之明守之固凡事變得失之數自不足介於光大之心矣又何憂焉聖人知之盡如此凡人不安土則自擇便利而濟物之心亡故仁不敦不敦仁則私意間隔而愛物之體隳故愛有限聖人素位而行無入不得則物我不形而天理周流惻怛慈愛之念無時而不存矣是安土即敦乎仁也夫既有以立愛之體則必有以達仁之用以不忍人之心行不忍人之政自無一夫之不獲一物之失所矣聖人仁之至如此此則知與天道同其髙明仁與地道同其博厚故曰與天地相似而不違也易固聖人盡性之書也按仁知二者天德王道之大端也知周道濟則體用合一矣旁行不流則經權悉當矣樂天知命安土敦仁則與天為徒與物同體矣此聖人之全功也而求其用力則有要焉中庸言知仁始於好學力行孟子言知者仁者無不知無不愛必以當務為急親賢為務可以知其用力之要矣範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體此一節是言聖人至命之事也範圍謂裁成其過曲成謂輔相不及兩在不測之謂神變化不窮之謂易孔子意曰天地之化陰陽之氣也二氣流行在天成象在地成形無非化也然其化渾渾淪淪無有紀極不能無或過者聖人則有以範圍之如順四時之序以定分至辨九州之界以理疆土之類一如鑄金之有範城郭之成圍使天地之化無不就裁以適於中而不過焉萬物陰陽之形也萬物賦形人有智愚物有動植皆待成也然萬物藝藝總總難以周遍不能無或遺者聖人則有以曲成之如厚生正德以立民事樽節愛養以盡物宜之類一一委曲周到知之明處之當使萬物無不得所以受其成而不遺焉晝夜陰陽之運也幽明死生鬼神一屈一伸循環之理皆晝夜之道也其理互根動靜無端陰陽無始聖人則有以兼通而知之知晝矣又兼乎夜之道而知知夜矣又兼乎晝之道而知如明也生也神也晝之屬也晝為陽而陽實根於陰幽也死也鬼也夜之屬也夜為陰而陰實根於陽一晝一夜迭運不窮亘古今皆是道也聖人之心與之契合無間通乎其道而知焉所謂知化育也夫天地之化一陰陽之氣萬物一陰陽之形晝夜一陰陽之運而易書亦陰陽之變也聖人範圍不過曲成不遺通乎其道而知有如此豈非得其至神之妙而易之變化在心者乎故言乎神則周流不居既在此又在彼在陽者忽在於陰在陰者忽在於陽得一以神無在而無不在無方所也而言乎易則百千萬變既為此又為彼為陽矣而亦為陰為陰矣而亦為陽用兩而化無為而無不為無形體也易固聖人至命之書也此易之所以與天地凖而能彌綸天地之道也按仰觀俯察智周道濟範圍曲成所以窮天地之理盡天地之性立天地之命也其道甚大而實體之則非求之幽逺者也不外一動一靜致中致和而已窮理盡性以至於命聖人反身而皆備焉一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣此一章言道之體用不外乎陰陽而未嘗倚於陰陽而此三節言道之命於天而禀於人者兼示人以體用全備之道也孔子意曰自有天地萬物則有天地萬物之理所謂道也盈天地間無非道而所謂道者無他只是一陰一陽而已陰陽氣也氣之流行一動一靜互為其根一陰矣又一陽焉一陽矣又一陰焉大而一闔一闢小而一噓一吸莫不皆然所以然者無非實理之所為此之謂道也是道也其在天命流行靜之終動之始可以觀其繼焉繼之者當接續之間此理方動出於天而將賦於物生理所發化育為功全是天道之本然無二無雜純然善也至於賦豫於物各具是道可以觀其成焉成之者物各得其所以生之理受天所賦人有為人物有為物實理具備隨在各足乃為性也繼善者成性之方發陽之事也成性者繼善之已成陰之事也此一陰一陽之道在天命之流行賦豫者然也若夫成性之後其在人也有得陽之動而成性者仁者也仁者偏於陽氣居多故同是道也自仁者見之則但識其動而及物之機以發生布德之仁目為道之全體而謂道在是焉則竟謂之仁矣有得陰之靜而成性者知者也知者偏於陰氣居多故同是道也自知者見之則但識其復而幹事之體以凝靜生明之智目為道之全體而謂道在是焉則竟謂之知矣蓋天命之善本無偏而氣質之受則有偏也至於蚩蚩之氓百姓也未嘗不囿於道之中行焉習焉終身由之日用是道者也而不著不察一無所見不知有道之仁亦不知有道之知焉此又愚不肖之輩也夫道之全體陰陽無偏者也乃仁者知者各有所見而得其偏百姓則於道無所知是以君子陰陽合德體用全備之道終鮮其人矣夫仁陽也知陰也百姓日用亦皆陰陽所在也仁知雖偏而道本不偏百姓雖愚而道無不在則一陰一陽之道又可見矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德此二節是以造化出入之機言道之在天地者不離陰陽互根之妙也仁謂造化之功天地生物之心也用謂機緘之妙機是弩之機緘是絲之總結機一發緘一啓妙用存焉故以言用也孔子意曰一陰一陽之道天地之化機不外是焉大德曰生天地之仁也仁本在內者也自內而外以顯諸仁如春夏之發生始亨暢遂無非造化之功此分一本為萬殊所以鼓萬物之出機也神妙變化天地之用也用本在外者也自外而內以藏諸用如秋冬之收斂性情貞固自有機緘之妙此合萬殊於一本所以鼓萬物之入機也一顯一藏循環無端一出一入變化莫測以此鼓萬物而無心成化其視聖人之有心生成萬物而常懷憂患者且不與同矣顯仁藏用之妙為何如哉夫仁德也而顯仁則德之發也發而本於德則德盛於內者也用業也而藏用則業之本也本而發為用則業大於外者也盛德大業表裏互根皆無心之化機其妙不可名言至矣哉然則大業在外者也而由藏用以言大業則無外非內也蓋方其藏用之時此理無乎不有萬物氣機洪纎髙下一一歸根復命而靜斂其生生化化之機於無聲無臭之中冲漠無朕而萬象森然已具何其富有也是大而無外者也此之謂大業也盛德在內者也乃由顯仁以言盛德則無內非外也蓋方其顯仁之時此理日生不已新機遞引萬物發育源源而出動舒其形形色色之象於千變萬化之際物與無妄而知其生意肫然在內所以日新也是久而無窮者也此之謂盛德也夫顯仁陽也而顯其所藏之仁藏用陰也而藏其所顯之用於顯仁見盛德則體具於用之中於藏用見大業則用妙於體之內是以大業非富有不能盛德以日新而見此體用一原顯微無間陰陽互根者也一陰一陽之道其在化機之出入者如此生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事陰陽不測之謂神此四節言陰陽變易生生無窮法象變數莫非是道而終言其道之妙一神之所為也孔子意曰一陰一陽之道迭運而無端則相生而不已於是見其生生焉陰生陽陽生陰生而又生無有間斷陰生陽則陰變為陽陽生陰則陽變為陰凡天地之消息盈虛人物之動靜榮悴其生也不息故其變易也無窮是生生之謂易也此皆陰陽之道無乎不在者也吾觀於物而得乾坤焉乾以始物氣初凝而形未具舉物之形容一一命意以成無中之有倣佛可象是曰成象此輕清未形陽之動也是之謂乾也坤以成物氣既聚而形已受舉物之體質一一呈見而效一定之則詳密有法是曰效法此重濁有迹陰之靜也是之謂坤也一象一法陽始陰成此道之在生物者然也吾觀於筮而得占事焉筮者抱蓍問易推極七八九六之數以求所值卦爻之動靜而孰吉孰凶遂知來物此則事之未定者方在占決是之謂占也屬乎陽也既占之後由極數知來以通乎凡事之變而適其吉凶趨避之宜此乃占之已決者見之行事是之謂事也屬乎陰也為占為事陽動陰靜此道之在占事者然也然則一陰一陽之道繼善成性者此也見仁見知者此也顯仁藏用者此也成象效法者此也極數通變者此也凡天下之有不離乎陰陽而其所以然者則未嘗倚於陰陽其為道也妙於無方莫知其鄉即陰而道在陰即陽而道在陽在陽亦在陰在陰亦在陽陰陽迭運而道無不在不可測度乃天下之至神也名之謂神庶乎見道之妙也已按生生之謂易本義云理與書皆然也蓋由易書言之太極生兩儀兩儀生四象四象生八卦由是生生無窮此易書中之陰陽變易也生卦生爻總不外乎乾坤乾陽三竒坤陰三偶法象備焉此易書中之成象效法也卦爻既列制為筮法極數通變以定吉凶以生大業此易書之所以前民用也凡此皆在易書者然也孔子贊易只以理言之而易書則具有此焉可見易書所以摹寫此理六十四卦三百八十四爻一陰陽也陰陽一道也道之妙神也至哉易也是在思而得之矣夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時陰陽之義配日月易簡之善配至德此一章是贊易之道極其廣大而其原由於乾坤故凡易之有配之天道人事而悉凖也孔子意曰夫易書之作以道陰陽也陰陽之理足以盡天地萬物之理故易之為書無所不載而含蓄於其中其理廣矣無所不包而統括於無外其理大矣以言乎逺則四海萬世易之理無乎不到而莫之止禦也以言乎邇則瞬息几席易之理不待安排布置而各正不偏也以言乎天地之間則洪纎髙下易之理無所不有備乎是矣豈不廣大矣乎夫易何以廣大如是以易中具有乾坤之理也夫乾天也乾道始物動靜生焉當其靜也方與坤别而利貞以立其體其生物之心常存不他專一於此及其動也既與坤交而元亨以行其用生意沛然直遂以達莫可止遏由專而直則乾一之氣行乎坤兩之中萬物皆受氣於此而大生焉易中純陽之乾具有此理易之所以大也夫坤地也坤道成物動靜形焉當其靜也方與乾别而利貞以立其體收斂生意在內翕聚而無餘及其動也既與乾交而元亨以行其用乾氣一至受以生物將無窮生意發散在外無不開闢由翕而闢則坤兩之體順承乎乾一之施萬物皆受形於此而廣生焉易中純陰之坤具有此理易之所以廣也夫易之廣大既得乾坤之理則可以配天地之道矣言乎廣大莫如天地而易中三竒為乾三耦為坤乾知大始坤作成物兼天地之化焉是易之廣大配乎天地言乎變通莫如四時而易中一陰一陽之謂變變而不窮之謂通合四時之序焉是易之變通配乎四時天道之運日為陽精月為陰精而易中卦爻稱陰稱陽名義存焉是陰陽之義配乎日月人心至德如乾之易如坤之簡而易中卦爻健者恆易順者恆簡至善存焉是易簡之善配乎至德夫天地四時日月與人心之至德盡乎天道人事矣而易無不配焉易誠廣矣大矣按首章論乾坤之尊卑結之以易簡而理得此章論乾坤之廣大結之以易簡配至德然則易簡者聖德之根柢也天得一以清地得一以寧王者得一以為天下貞易簡之道也即書之所謂允執厥中也而所以得此者安在曰存天理遏人欲間人心體道心而已矣日講易經解義卷十五
