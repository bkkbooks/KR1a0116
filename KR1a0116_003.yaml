body:
  text: 欽定四庫全書日講易經解義卷三乾下坎上需有二義以全體言之坎險在前下卦乾體剛健能不冒進以陷於險有能需之才以九五一爻言之陽剛居尊值當需之時能建中表正不欲速邀功有能需之德有其才又有其德此所以能需而有亨吉涉川之效也然四陽乾健知險固能需矣而四上二隂亦能出穴終吉何也坤順知阻能從陽也四順聼九五上敬順三陽故雖需血入穴而終能出穴獲吉剛德真足貴哉需有孚光亨貞吉利涉大川此卦乾下坎上以乾健臨坎險知險不進有需待之意故名為需卦辭言善需者必以天德行王道然後可以濟險而成功也文王繫需彖辭曰乾坤開闢而後既建侯以統治之復立師以教育之治道巳盡矣此時或有未通之聲教或有未消之隱憂惟當靜以待之不宜欲速邀功卦體九五有陽剛中正之德其需也非限於時也非屈於勢也乃根於至誠惻怛不欲擾民動衆之一心也有孚如是則不為利障不為欲牽豈不光亨且本純王之心發為純王之政規模逺大不行險徼幸而貞焉則久道化成天下皆享安靜和平之福何吉如之即一旦臨大難而從容可以觀變詳慎可以圖機雖涉大川亦無不利甚矣治道之貴需也昔武王克商天下已定其時猶多頑梗未化之民成王周公知其當需也故不以兵刑勝之惟丁寧誥誡悠優漸漬而涵濡之卒之頑消梗化不動聲色而措天下於泰山之安非孚貞之眀效天驗耶彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也此彖傳是釋需彖辭以眀能需之實也孔子釋需彖辭曰卦名需者須待之義此卦坎在乾上是險難在前時固當需而以乾之剛健臨之剛則能斷健則知險既有定識又有定力自不肯冒進以陷於險揆之於義宜乎其不困窮矣辭曰有孚光亨貞吉者卦體以九居五是以陽剛之德居天子之位為位乎天位有正中之德也正則大道為公無茍且邀功之事中則定靜不擾無營私計利之心孚貞如是其光亨而吉也不亦宜乎又曰利涉大川者蓋本此正中之德往以濟險圖功則安詳鎮定之中自裕觀變濟時之略又何難不可平而何功不可建哉夫有國家者內而宫府外而海甸艱難險阻往往伏於不測雖盛眀之世亦所必有惟在人主秉剛健之德審時而動行正道以成大功耳信乎非有德者不能需非能需者不能涉大川也哉象曰雲上於天需君子以飲食宴樂此象傳是言君子處需之道也孔子釋需象曰卦體下乾上坎乾為天坎為雲雲上於天將雨而猶未雨有須待之意需之象也君子法之以治道值當需之時不宜妄作生事勞心擾民凡所以定祻亂而開太平者既經綸創作於前此時惟宜恭已無為飲食宴樂養其氣體怡其心神徐以俟德化之成可也蓋眀作固所以圖功而時未可有為則紛更反以致擾故優游靜鎮以俟運㑹之自至誠有不得不需者耳豈耽溺晏安而矯托清淨坐致廢弛者可藉口哉初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也此一爻是眀逺害之道貴能守其常也郊曠逺之地周公繫需初爻曰初九在下去險最逺而陽德剛健又能自守有需于郊之象然天下有才之人往往為才所使倘此心妄動不能持久而冒進圖功于事無濟祗取咎耳故必慎終如始超然利害之外確乎若將終身焉則收身名兩全之利而決不至躁進以取咎矣孔子釋初象曰天下何地無險何時無險特患人不眀不哲冥行自犯耳初九之髙蹈逺引需于郊者乃審機眀而持志決自不犯險難而行也夫無位難以圖功而局外不宜生事初之不犯難行乃常分亦常道也所謂利用恆無咎者揆之常分常道未為失也蓋聖賢處世時至事起原無可强致之功業彼不能義命自安汲汲有為以速戾者亦未眀乎恆之義耳九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也此一爻是見二有剛中之德故終能逺害也沙近水二近坎故有沙象衍寬裕也周公繫需二爻曰九二漸近于險而剛中能需不肯冒進有需于沙之象夫九二上應九五出身任事非若初之超然世外者比乃亦遲回却顧需而不前不有退懦之譏必有觀望之誚小有言所不免矣然二志存濟險獨能觀變相時不為浮議所搖則剛健不陷終成濟險之功何吉如之孔子釋二象曰九二之需于沙由其剛而得中居心寬裕譽不加喜謗不加憂故雖小有言毫不動念卒能從容鎮定險濟功成而以吉終也自古豪傑有志濟世急欲圖功往往因一言不平逞意氣于一擊至於奮不顧身故聖人以小有言警之使知濟天下之險者當沈其謀老其識堅其守以俟時宜甚不可因人言而輕動其心冒昧前進自貽伊戚也九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也此一爻是為過剛不中不善需者示戒也泥陷人之地周公繫需三爻曰九三切近坎體將陷于險有需于泥之象夫水涯之泥善陷三需於此而過剛不中輕躁妄動寇害之至實自致之將誰尤哉孔子釋三象曰初之需于郊逺之而不敢進也二之需于沙進矣而未敢逼也三之需于泥則逼于水而禍害巳在目前矣此即善需猶恐不免况剛而不中意氣過激適足以速寇乎然此總由不知敬慎故耳若能兢業小心時時敬慎庶操心危而慮患深猶可轉危為安不至禍敗也蓋天下事未有不成于敬慎而敗于疏忽者東漢陳蕃竇武手握大權欲清宦豎卒之奸惡未除反遭其害唐張柬之等反周為唐乃忽三思養虎遺患喪身誤國非皆不知敬慎之義者耶六四需于血出自穴象曰需于血順以聽也此一爻是眀出險之道在于順時也坎為血卦故有血象又為隱伏故有穴象周公繫需四爻曰六四入于坎體是其身當大難之衝進固不可退亦不能有需于血之象幸順正知阻持重括囊卒能潛身逺害免冒險之禍又有出自穴之象則雖未能有濟國謀而眀哲亦可以自保矣孔子釋四象曰四之需于血而終能出自穴者以其有柔正之德晦迹韜光不冒進强爭而順聼乎機㑹之自然也按三能敬慎雖迫于險而不敗四能順聼即陷于險而可出然則能敬且順又何險難之不可處哉九五需于酒食貞吉象曰酒食貞吉以中正也此一爻是言人君處德位兼隆之時自恭已而成化也周公繫需五爻曰九五位乎天位而有剛健中正之德夫剛健既知險而中正又善需是治道至當需之時閒暇安恬無係無營有需于酒食之象如是則一人養無為之度天下享寧謐之休不亦貞而吉乎孔子釋五象曰凡人主值當需之時而不能需者皆由無德而求治太急也五之需于酒食貞吉以中心無為克守至正故喜功之念不作急遽之謀全消惟怡然自養以養天下故能合乎正道而吉也自古帝王未有不歷艱危險阻而底定天下者及大難既平小民甫離湯火急宜安靜勿擾休養而生息之三代以前尚矣漢之文帝承髙惠之後一切更定制度謙讓未遑惟勤勤于勸農養老薄賦蠲租卒致海內向風幾于刑措其有合於此爻之義者歟上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也此一爻是言得賢共濟為出險之道也不速之客三人指下三陽爻言周公繫需上爻曰上六隂柔無濟險之才又處險極困窮所不免矣故有入于穴之象幸下應九三九三與下二陽同德同體需極並進是衆賢不用約結不須號召合志協謀偕來赴難有不速之客三人來之象倘能竭誠盡禮敬以待之借其剛健之才以拯一時之險始雖不免困窮終當濟險出穴而吉可必也孔子釋上六象曰能需固貴有德而出險尤須借才上六入于穴是巳陷于險矣以不速之客來敬之而得終吉者上雖德不稱位不善處需然敬賢自輔集思廣益猶可出險免患不至於大有失也夫德不當位茍知敬賢猶可獲吉若德與位稱而能虛巳下賢其功效更當何如先儒謂需又有急切相須之義欲濟天下之險艱必需羣才之輻輳殆於上爻見之矣坎下乾上訟之六爻惟五聼訟惟三不訟餘皆訟者也然初不永所事二不克訟四不克訟而得吉上以訟受服遂有終朝之褫皆言訟不可成而使民無訟之意蓋可見矣初三兩柔爻皆係以終吉九二九四以剛居柔故皆不克訟卦辭有孚惕中指九二乃卦辭稱吉而爻辭僅曰無眚者卦辭取其有孚得中爻則兼以自下訟上為義所取不同也訟有孚窒惕中吉終凶利見大人不利涉大川此卦坎下乾上乾剛坎險在上下為相制內外為相濟人已為相敵皆致訟之道也故名為訟卦辭言處訟者當曲盡其道以歸於無訟也有孚是理實窒是屈而不通惕憂懼之意涉大川猶駕虛辭以求勝也文王繫訟彖辭曰訟為爭辨之義非人之得已也惟理直見枉情真受誣屈抑而不能自通是有孚見窒勢不得不出於訟然所以處之之道何如必也反求在我心存憂懼而能惕度於事理辨眀即已而能中則有孚之窒可伸而訟復於無訟豈不為吉若自恃其理可止不止終極其訟而不惕中則尚氣以損德好勝以敗業凶可知矣且又非自逞其胸臆能剖白以冀免必利見公眀之大人資其眀斷始可據理以獲伸如於孚窒之外妄生事端駕虛以求勝如涉川然冒險僥幸不能惕中之甚者矣雖訟本有理而好剛自陷其何能免乎此所為不利也按聖人不貴聼訟而貴無訟惟使人懷兢惕知所畏懼所以消弭勝心而一反於至當之理故能內自訟者又為無訟之本也可不加之意哉彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入於淵也此彖傳是釋訟彖辭以眀險健為致訟之象而中正乃無訟之道反覆開喻以垂訓也入於淵猶陷於罪孔子釋訟彖辭曰訟之為卦卦德上乾剛而下坎險是為上剛以陵其下下險以伺其上以一人言則內險以懷詐外健以恃強以二人言則又已險能攻彼短彼健能欺此弱是以為訟也夫訟之端多生於人心之不平辭所謂有孚見窒人心所甚不堪者乃能惕中而吉何哉卦變九自遁來而居二剛來為柔所掩而不能自伸惟其得中能以情恕而不為己甚以理遣而不欲過求有爭事而無爭心故渙然冰釋得無訟之吉又言終凶者天下事惟善者可成訟則德喪而招尤怨深而召患揆之於理斷乎不可成也終則不可成而成所以凶也至所謂利見大人卦體九五居上卦之中得陽位之正中則先事而無偏主正則臨事而決猜疑所尚如此訟之不中者咸歸於中不正者一反於正故利也又言不利涉大川卦象坎為險陷有淵之義焉乾以剛實乘之是訟者情真反駕虛求勝自陷其身入於罪惡之淵而不知何利之有按民生有欲不能無爭欲莫大於飲食此訟之次乎需也若以爭濟之則衆起興戎終為厲階故又次之以師聖人為世道人心慮至深逺矣然則處訟之道孰吉孰凶孰利孰不利烏可不致審乎哉象曰天與水違行訟君子以作事謀始此象傅言君子謹始以慮終為絶訟之源也孔子釋訟象曰天髙在上水流就下其行相違此訟之象也君子體之以為訟不起於爭訟之時而起於作事之始其始不慎少有乖違始於微而終於著訟所由起故不待發聲徴色見於云為當事幾之初必順乎人情息是非於未萌協乎天理杜利害於未見不但無違於言亦且無違於心訟何由得生乎作事如此則始於自訟終於無訟而中吉終凶更不必言矣可見修德者貴慎初念圖治者貴憂未然堯舜君臣反復咨嗟致警於幾微之際凡有興作莫不謀始以塞違又豈獨止訟一端為兢兢歟初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨眀也此一爻見能畏慎以處訟所以終得免訟之吉也永即是終意周公繫訟初爻曰凡人自恃剛强居髙挾勢往往逞求勝之心訟所以終極而為凶也初六隂柔才弱本無健訟之資居下勢卑又無能訟之力故中心畏惕虛巳讓人不敢終極其事而訟不至於成雖小有言辨不過眀其有孚之窒而情可以白理無不伸有不終吉乎孔子釋初象曰初之不永所事者非特絀於才勢而已以理度之訟非美事固不可長也知其不可長有慚忿而無遂心則所發亦易收小有言說止於微訴而不敢於大訟則所爭亦易釋其辨既眀終訟何為哉以是知惕中而能得吉也夫人處世貴乎識時勢尤貴乎眀理義體之於已有自量之心衡之於物無好勝之念此訟之初所以不言訟而言事者冀其不成訟而善其中止之意也如此九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也此一爻見能守義分可免犯上之患也克勝也歸逋猶退避意邑人三百户是邑之小者言自處卑弱之意掇自取也周公繫訟二爻曰九二陽剛而主險逞其智謀有能訟之才又有欲訟之心但以剛居柔得下之中能反躬自審裁度於理而且上應九五之尊屈於勢分不能相敵則雖欲訟烏能克勝乎故幡然退避自處卑約不敢與之抗衡是為歸而逋其邑人三百户之象此正能懼而得中當屈而屈不至越禮犯分何眚之有孔子釋二象曰凡人不肯退讓皆由終訟而求勝二惟不克宜其歸休而逋竄能全身以逺害也所以然者上尊下卑有一定之分若以下訟上既乖於分而不相安又絀於勢而不自下以之樹怨賈禍患之至也不猶自取之易乎記有之曰分爭辨訟非禮不決禮所以别尊卑定上下防患於未然也若後世爭奪相尚僭名越分駸駸乎出於禮入於刑矣訟之九二嚴其辨於上下之間不特止訟亦維世之深意也夫六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也此一爻見守常安正能始終以求無訟者也食舊德是守常分貞是守正理也周公繫訟三爻曰六三隂柔處險而介二剛之間非能訟者但知守其常分享所固有而已足由乎正理行所當然而不違是食舊德而能貞者也雖有意外之侵侮不免於危厲而能泰然自得衆莫能傾况必無厲者乎吉不待言矣然而守分實難必若從王之事事權在握易逞功能而退遜自處一無専成之心此真能守舊居貞而得吉者也孔子釋三象曰食舊德何以得吉凡訟皆有上人之心必非能從人者也三惟委心聽命以順從乎上則欿然自視退讓於人不敢自主其事宜其恪守素分居卑處厚而得無訟之吉乎大抵聖賢學問不外素位而行分所當得不與人競利分所不得越不與人競功蓋一有功利之心即與世相違而不能相從訟所由作矣三之從上而吉者從則安分而不違為弭訟之善道也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也此一爻言能改過以絶訟端為得理之正也即就也命猶理也渝變也貞理之正也周公繫訟四爻曰凡人一有好訟之心更不思正理所在九四剛而不中本欲訟者幸其居柔而剛以柔克知訟不可成以理自制故亦為不克能平情恕物反其健訟之行以復就於理無爭事也且悔過遷善變其欲訟之心以安處於正無爭心也是訟可歸於無訟而得惕中之吉者矣孔子釋四象曰凡終於訟者悖理忘害不知命而大無正是其失也今四能不克至於復而能即渝而得安內外一歸於正雖前有欲訟之失而剛心既盡忿氣自消訟不至於成豈尚有失乎吉可知也按天之所命者理也人心惟危何以遂能安貞惟在乾健一惕間耳前念之惕即為後念之貞競心之忘即為道心之正聖人不貴無過而貴改過於此可見矣九五訟元吉象曰訟元吉以中正也此一爻見大人以德化民能得訟之平而盡善也周公繫訟五爻曰九五以聖德而居天位所謂大人而利見者能以德化生民而使民無訟者也即有時聽訟無不各得其平使理直見枉者得以上伸情真受誣者可由上達有孚不至於見窒不惟天下無寃民而且民自不寃矣非大善而吉者乎孔子釋五象曰訟何以得元吉以五之德本中心一於公則未聽之前已無偏主五之德本正事得其宜則既聽之後皆能當理將見刑清民服謂之元吉信矣按聖人論治必言使民無訟而此曰訟元吉者正欲化有訟為無訟也九五以中正在上正己而物正是以靡爭之化百辟其刑最險如九二已歸逋矣最健如上九已三褫矣其餘復即命者食舊德者不永所事者皆已忘險忘健無訟可聽此訟者所以利見大人也若止以聽不偏斷合理為得聽訟之道一眀察之吏能之豈所望於大人者乎此訟獄之歸大舜虞芮之質文王至德之感人深而化民成俗斯義得焉耳上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也此一爻甚言終訟之凶不可幸勝以取辱也鞶帶命服之飾褫奪也周公繫訟上爻曰上九剛居訟極以健訟之才而濟以必訟之志誣僞以為真矯曲以為直終極其訟以求勝凶所固然也即使恃強而獲勝或錫之以鞶帶焉然是非情僞不踰時而立辨以訟得之必且以訟失之終朝甚暫而奪之者至於三矣况必無取勝之理而有必敗之道乎甚矣訟之不可終也孔子釋上象曰終訟之人雖幸勝而有受服之寵本非德賞則授之者非道服之者不終縱使受而不褫亦安足敬哉而况終朝之褫俄頃隨至矣訟之不可成也如此按五服五章天之所以命有德也禮曰君子恥服其服而無其容况以訟受服恥孰大焉亦不足敬其殆有甚於三褫者乎此聖人原心之論所以深愧之而使人自省也坎下坤上一陽之卦得位者師比而已先王之制民無事則為比閭族黨故比卦衆在內一陽在上為之主君象也有事則為伍兩卒旅故師卦衆在外一陽在下為之主將帥象也九二剛中所謂丈人長子者也故卦辭曰吉無咎九二爻辭亦曰吉無咎要之一本乎貞而已聖人之兵以順動猶曰毒天下者蓋兵凶器戰危事也雖以順動猶不免於毒此聖人之特筆也六爻中出師駐師將兵將將與夫奉辭伐罪旋師班賞之道無一不偹後世言兵之書總不出此而其義光眀正大非後世權謀可比王者不得己而行師豈舍此而他求哉師貞丈人吉無咎此卦坎下坤上坎水為險坤地為順藏險於順有寓兵於農之意九二六五有將兵命將之象故名為師卦辭言用師之道利於得正而又在命將得人以制勝也貞是正道丈人才德老成之人文王繫師彖辭曰師以興兵動衆非聖人之得己也可不正乎必也順天人行弔伐討亂誅暴所至若時雨出於至正而無私所謂貞也然將非其人以國豫敵又必重専征之選嚴閫外之寄使得老成持重好謀而能懼如丈人者而任焉斯師出有名天討彰而聲靈振兵行有紀衆心服而勝算成是以有戰克攻取之吉而無窮兵黷武之咎師之道偹矣按傳有之曰秦之鋭士不敵桓文之節制桓文之節制不敵湯武之仁義師以仁義為本又得仁義之將如黃髮之尚父元老之方叔故吉且無咎惟三代之師為然若後世嬴秦之滅六國吉矣而不免於咎武侯之伐魏無咎而不能必吉豈所稱出於萬全者哉彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣此彖傳是釋師彖辭見師貴乎貞而率師者又貴能順以得人心而成王業也孔子釋師彖辭曰所謂師者伍兩卒旅之衆也興師動衆必由仁義以張撻伐是貞之為言正也凡行師之道用以伐暴而不為暴用以驅害而不為害一出於正而凡不正者無不輸誠向化於以順天心答民望無敵於天下而為王者之師不亦然乎此師之所以貴乎貞而率師者貴乎丈人蓋有在矣其在卦體九二剛中而五應之是為將者威而能惠勇而好謀有丈人之德焉而且委任既専事權不患於中阻是將固有丈人之德而君又能任此丈人之將也卦德坎險而坤順兵雖凶器戰雖危事而行乎險道然以征不義則叛者討而服者舍以誅暴慢則近者悅而逺者懷是險而能順矣若此者以剛中之德行順民之事當兵戎所至見為勞民傷財不免毒害天下實則除殘救民東征西怨民不謂毒而樂從之將見功成於一舉難靖於四方是將能順從乎民而民心始順從乎上也吉而又何咎哉按兵者聖人不得已而用之有殺戮之慘供億之苦所至荆棘毒害隨之故言乎毒者如攻病然毒藥所施非沈疴堅癥不可輕用也然則兵可輕動乎哉是在率師者以正舉以順動庶乎可矣象曰地中有水師君子以容民畜衆此象傳言兵民合一為養師之良法也孔子釋師象曰坤地之中而有坎水猶庶民之中而有兵衆師之象也君子體之以為師豈一時所能聚哉古者民與衆非有二也於無事時制田里謀生聚養之者有定制足民正所以足兵也設學校眀倫序教之者有成法訓民即所以訓兵也何則以之容保者此民以之畜聚者亦即此衆也故居常則比閭相居有事則守望相援不必征求調發而桓桓之衆即在此元元之民矣以是知藏兵於民有兵之利而無兵之害亦猶藏水於地有水之利而無水之害君子之善用師也如此按自井田之法廢兵農既分天下不患無兵而患在有兵故出巳力以衛民莫若以民衛民之更切出巳財以養兵莫若以民養民之更易此管仲作內政以寓軍令為得井田之遺法其尚有合於容民畜衆之義乎初六師出以律否臧凶象曰師出以律失律凶也此一爻戒出師者當守法以謹其始也律法律也否臧不善也周公繫師初爻曰在卦之初為師之始所以鼓三軍之氣而懾多士之心可不謹其始哉故師旅一行賞罰必眀則衆志始服部伍必整則衆力始齊此出師之常道不可不慎也若不以律則號令不足以信服耳目不能以専一是為否臧而喪敗隨之不教之兵以卒豫敵凶其可免乎孔子釋初象曰師一出而國家之存亡人命之安危皆繫焉其不可不用律者必然之理茍一失其律則衆渙心離一潰而不可收無制之兵難免喪師之辱所謂否臧之凶可勝言哉按師之有律猶樂之有律森眀諧協法至嚴也書曰不愆於四伐五伐六伐七伐乃止齊焉所以用律也若後之兵法所謂以正合以竒勝者隂謀祕計可謂律乎故善用兵者教正而不教竒猶有律之意存焉爾九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也此一爻見命將得人受君之寵任能體君心以立功也周公繫師二爻曰九二在下為衆隂所歸有將帥之任剛而得中則仁義竝濟寬猛咸宜又有將帥之才卦之所謂丈人者也以此而在師中司専閫之命則勇足以懾衆而奮往常先恩足以結心而捍衛不懈故能計出萬全有戰勝之吉而無荼毒之咎矣且以六五正應在上委任獨隆殊恩異數洊加於授鉞之後又再三錫命焉則事權歸一賞罰必行其膚公克奏也不亦宜乎孔子釋二象曰自古未有寵任不加而大將能建功於外者二之在師中吉實由上承天寵得君既専自宜克效其心膂盡展其才猷二固不得矜之為己功也亦未有君心不在於天下而能任將以成功者六五之錫命惟其欲懷保萬邦救民除害宜其専任必及於有功寵命不靳於再三二尤不得私之為己寵也此吉且無咎為能無愧於丈人哉按人臣無専制之義故受閫外之寄者必協乎中道而適合乎時宜然後専之可也又必君命再三恩禮偹至斯下無専擅之嫌上無中制之失志存底定者其亦善用斯道哉六三師或輿尸凶象曰師或輿尸大無功也此一爻見輕敵喪師為貪功者示戒也輿尸師徒撓敗之象周公繫師三爻曰凡師之道必審已之力量敵之形可進可退故能全師而保衆也六三隂柔才弱居陽志剛不中不正以此用師則才德俱絀既患師行失律在已無制勝之方犯非其分又疑師出無名在彼無可乘之釁由此以戰必致徒衆撓敗有或輿尸之象外生敵患內貽君憂凶孰甚焉孔子釋三象曰三意本在貪功不能量力度德玩敵躁進致有輿尸之凶膏血塗於原野而殘民命鋒鏑遍於疆場而損國威所喪實多而大無功矣可不戒哉從來國家之患莫大於貪功師旅之禍莫甚於輕敵故兵志有之曰知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗此行師者先為不可敗以求可勝斯無意外之虞矣六四師左次無咎象曰左次無咎未失常也此一爻見知難而退為得全師之道也兵事尚右左次謂退舍也三宿曰次周公繫師四爻曰六四隂柔不中無勝敵之才非能進而克捷者也但居隂得正有量敵之智故自審才力不足以致勝外度時勢未可以成功即全師而退逺舍以避其鋒堅壁以圖其後有左次之象焉雖軍庸未奏而為國慮勝不敢以衆士之死生爭一人之功伐其所見者逺所全者大何咎之有孔子釋四象曰師以能進為勇將以得俊為功師左次似乎退避而辱國矣何以得無咎不知見可而進者自不宜遽退以示弱知難而退者又不可輕進以僨事因時施宜行師之常道也四能未失其常自無輿尸失律之咎矣按書曰同力度德同德度義帝王之師貴出萬全當計其得失成敗不當論其進退遲速也若後之言兵者高坐廟堂之中逆料境外之事惟欲其功之速成而不計其勢之可否豈知當退而退者易之垂戒固巳昭然較著乎六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也此一爻是言師出必以正又任將當専然後可成出師之功也禽是害稼者執言謂聲罪致討長子謂九二弟子謂三四也周公繫師五爻曰六五為用師之主柔順居中非喜功好大擅啓兵端者也如敵加於已侵害生民不得已而聲罪以致討猶禽暴我田以傷禾稼利於執言而搏擊也此仁義之師攻非為暴取非為貪何有黷武之咎乎然師行固不可不正而任將又不可非人如剛中之九二師之所謂丈人而君之所謂長子也老謀壯事位望孚人既使之帥師矣又使新進弟子如三四之才德本無足稱得與參謀議則事權不専號令不一必至撓敗而輿尸名義雖正而貞不免喪敗而取凶矣孔子釋五象曰二為長子而以之帥師是能以剛中之道而行師恩以濟威謀以濟勇固能勝任而不忝矣任茍不専一使非中行者剛柔寬猛悉違其道則輿尸致敗是豈弟子之罪哉由於任使之不當也可見命將之道不可不審尤不可不専不審則使非其人或至喪師而辱國得其人而任之不専則事無統攝不歸於一亦覆敗之所由也後世如趙盾河曲之戰而謀出趙穿荀林父邲之戰而令由先縠可為眀鑒矣上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也此一爻見人君報功當有正典不可濫及非人以肇亂之源也周公繫師上爻曰六居師之終則武功告成處順之極則天下大定論功行賞正在此時大君於是有賞功之命功大者非封國無以酬其戡定之勳則開拓疆宇使為諸侯功小者非承家無以報其捍禦之烈則寧承世業使為卿大夫其賞必酬功報必償勞如此然其中或有餘於才不足於德之小人則又勿用以預政事臨民上焉是非堅樹國本保全功臣之要道乎孔子釋上象曰大君有命所以程功之大小而賞當其功也故開國而不為濫承家而不為吝無偏無頗正以論定其功自可無徼幸怨望之心矣然曷云小人勿用小人戮力師中用之奔走禦侮或可以效功若用之撫綏底定則挾功自恃始以靖亂者終必至於肇亂豈王者懷保萬邦之至意乎六之垂戒深矣按師之為卦萬世論兵之道皆不出乎此至上六之終於報功之典寓黜陟之權所以優功臣而隆封建見聖人待天下之公逺小人而絶禍端見聖人慮天下之深後之保邦圖治者尚其深鑒於此哉坤下坎上比之為卦一陽居尊而五隂應之彖言五隂比一陽象言一陽比五隂以互相發明比之義始盡凡彖傳應字多謂剛柔兩爻相應此則謂上下五隂應乎五之剛又一例也六爻自九五稱顯比外餘五爻皆稱比之比之之詞初比之無咎二四比之貞吉皆以其比五也獨三比之匪人而傷上比之無首而凶是三上自相為比而不比五也自卦言之羣隂皆比於五自爻言之或逺或近或來或不來有未可一律拘者蓋卦以眀一統之義而爻各隨其位之所之所以盡比之變也比吉原筮元永貞無咎不寧方來後夫凶此卦坤下坎上以坎水比坤地故名為比卦辭言人君比天下必盡比天下之道斯能得天下之比也原再也筮謂審察元謂元善之德永謂存元善而無閒於始終貞謂行元善而不流於姑息不寧謂未得所比之人後夫謂不早歸附者文王繫比彖辭曰比卦以一陽居尊位而得其正上下五隂順而從之以上之比下言則以一人而撫萬邦以下之比上言則以四海而仰一人比則當為人所親厚輔助而吉然民之比我比於我之有德也故必再為審察果有元善好生之德足以長人而元善之德果永而不至於間斷貞而不失於駁雜自無忝於作民元后之責而無咎矣由是仁恩四洽凡未比而不安寧者方歸來未已彼負固如後夫祗自貽其戚而凶耳於王者何損哉按比則天下歸心定於一統雖或頑梗弗率亦有自外王化之時然帝王止自修其德以盡其安內攘外之實故虞帝舞干羽於兩階而有苖自格南越尉他自立為帝漢文以德懷之而他遂稱臣則修德又比人之本與彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比吉也三字衍文此彖傳是釋比彖辭以眀比之義也剛中謂九五上下謂五隂指臣民言孔子釋比彖辭曰卦名為比者何所取哉以比有親輔之義也以卦體言之九五陽剛在上五隂順而從之是在下之臣民莫不傾心向化也故為比辭謂原筮元永貞無咎者何所取哉蓋君德貴剛而剛貴乎得中九五以陽居中是主之以眀作之心而濟之以時措之善則體仁長人而為元者一剛中之德為之且纍世不息而為永無私不雜而為貞皆剛中之德為之也此所以當衆之來歸而無咎又謂不寧方來者卦體上下五隂皆應九五是合上下臣民之衆而皆比於一人也又謂後夫凶者蓋九五德足致天下之比則民心之歸己非一日若後夫自棄德化以比之道揆之自當困窮此其所以凶也蓋上下順從之日自外王化理合致窮然王者之心但問吾之可比不可比不計彼之來與不來此大公之道庶幾九五之顯比者歟象曰地上有水比先王以建萬國親諸侯此象傳是言先王體比象而能盡比天下之道也孔子釋比象曰地上有水水比於地不容有間有比之象先王觀比之象而得比天下之道焉謂天下可以一人統之而不可以一人治之乃列爵分土而建為公侯伯子男之國又恐逺近不同化幽隱不得達制為巡狩述職之典以親諸侯令其承宣德意恩澤下流天子以親天下者而親諸侯諸侯以親天下者而報天子如此則有以比天下而無間矣按人君以一身居九重之上萬國之廣人民之衆安得一一而親比之故建國親侯乃比天下之大權實比天下之要道也漢賈誼論衆建諸侯令海內之勢如身之使臂臂之使指莫不制從其得比天下之道者哉初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也此一爻是勉始仕之臣以誠事君也缶瓦器也盈缶充實之象周公繫比初爻曰人臣事君貴於誠信初六居此之初當服官之始情意尚隔於勢分所恃以進結於君者惟此孚誠而巳惟內孚之心外孚之事無非忠君愛國之念以此比君可無忝於臣職而無咎矣然有孚非易言也必無一念之不誠無一事之不實無少虧缺若盈缶然則終當感格君心而寵遇之來若出意外有他吉焉孔子釋初象曰孚在比初即推之至於盈缶亦止此一念之誠以此格君君恩之來自在尋常意計之外宜有他吉也蓋人臣事主其始進之日一念之誠僞終身之邪正分焉始進不以誠後未有能出於誠者也聖人於比之初六以有他吉許之可以為人臣勸矣六二比之自內貞吉象曰比之自內不自失也此一爻是美其以道事君而能得君以行道也周公繫比二爻曰六二柔順中正上應九五其方出而仕也一本其內之素養者以自靖焉是進非茍合而可以得君於比之道為得其正而吉也孔子釋二象曰徇人者失己比之自內則達不離道不自失也蓋得事君之正矣可見擇才而用雖在乎上而以身許國必由於巳二五以中正之道相比故為得正若降志辱身汲汲以求比者非君子自重之道矣國家亦奚賴有若人而用之乎六三比之匪人象曰比之匪人不亦傷乎此一爻是眀三之不能擇人而比為可鄙也匪人指上六周公繫比三爻曰六三隂柔而不中正隂柔則暗昧而無識不中正則邪僻而不良而况上下與應皆隂則所近舉非正人以三之暗昧邪僻有不入其流者乎是所比為匪人矣孔子釋三象曰六二六四之貞吉由於所比得人也六三既比匪人是暗於擇友之眀不惟無益而反為纍矣入於不善而同惡相濟不亦傷乎蓋甚言比匪之必傷也按初之應四二之應五皆為比得其人惟三居不正之位乘承應皆隂是比之匪人也如馬援勸隗囂専意東方而囂乃降於蜀卒至殺身亡宗為天下笑亦大可傷矣六四外比之貞吉象曰外比于賢以從上也此一爻是言人臣盡事上之義絶內顧之私為臣道之正也賢謂九五周公繫比四爻曰六四以柔居柔外比九五以柔正之德而居近君之位是國爾忘家公爾忘私得所比之正也自是眀良相遇有以輔君德而成顯比之治矣何吉如之孔子釋四象曰九五以陽剛居上而得其正不但有其位而又有其德蓋賢君也六四固外比于九五之賢矣然豈止從其賢而已哉蓋君臣天地之大義無所容逃臣子忠愛之至性必不可解故必從之以盡其分也按四當與內應乃內無可比而外比于五舍柔暗而事高眀為得其正此其所以吉歟九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也此一爻是言九五以大公之道比天下也顯比謂顯其比而無私三驅謂天子之田不合圍也不誡謂不相警偹使中謂上之德有以使其得中也周公繫比五爻曰九五一陽居尊以剛健中正之德為上下五隂所比是聖人而在天子之位親比天下普大公無私之心而天下之戴之者無一不從王者之化而忘于不知如天子之畋圍合三面前開一路使之可去惟取其不出而反入者則禽之前去者皆免矣凡同驅私屬之邑人咸曉上意亦不相警僃以求必得為王用三驅失前禽而邑人不誡之象蓋在上之人不必求得而在下化之亦不求其必得也凡此皆吉之道也孔子釋五象曰所謂顯比之吉者以五有正中之德其自心而達之政皆蕩平而無私故能為天下所歸往也又謂失前禽者網開一面逆我而去者則舍之如後夫不能强之來則舍之而巳向我而歸者則取之如方來者不能使之去則取之而已故聽前禽之失也邑人不誡者由王者建中於上而下以不偏之德應之有不期然而然者若或使之耳按程傳謂顯比非唯人君比天下之道如此如以臣於君言之竭其忠誠致其才力乃顯其比君之道也用之與否在君而已不可阿諛逢迎求其比己也在朋友亦然修身誠意以待之親己與否在人而已不可巧言令色曲從茍合以求人之比己也此于三驅失前禽之義更為詳盡可為讀易者之法矣上六比之無首凶象曰比之無首無所終也此一爻是言無德不能為民所比也無首謂無德而居上周公繫比上爻曰人必有剛中之德然後可首出庶物而為人所比上六隂柔居上無剛健之德以比下為比之無首之象如此則何以為人所比乎衆叛親離凶其不免矣孔子釋上象曰人君為天下所比者以其德也比既無首則不成為比矣何能保其終以善其後乎此其所以凶也按首對終而言上六以隂居終不能率先天下以從君而依險自固其甘為後夫而自取滅亡者乎乾下㢲上以大畜小以陽畜隂其常經也然亦有君子欲行事而小人得以擾係之大事之將就而小故得以邀阻之皆小畜也以統體言之卦惟六四一隂上下五陽皆為所畜若析言之下三爻乾體受畜者也上三爻巽體為畜者也以一柔下畜三剛本是難事以得五與合志而後能畜至上九則畜道已成而不雨者變為既雨矣要之隂亦豈能畜陽惟陽失其道乃為所制乾體三爻初二皆復三眤於四而不復小畜亦但能畜九三一爻而已由三之不能正室自失其道也四雖畜陽曰血曰惕有戒辭焉聖人扶抑之意深矣小畜亨密雲不雨自我西郊此卦乾下巽上以巽隂而畜乾陽故名為小畜卦辭言君子當小畜之時道猶可亨而得行其志也畜止之之義也密雲隂物西郊隂方我者文王自謂也文王演易於羑里視岐周為西方也文王繫小畜彖辭曰此卦惟六四一隂上下五陽皆為所畜是以小畜大也夫陽之力大方能畜隂今以巽之柔順而畜三陽能係而不能固則所畜者小矣夫陽為隂畜難以得亨然卦德內健外巽有能為之才卦體二五皆陽有可為之勢在君子猶得安其位以伸其志而亨但畜未極而施未行則所積者未厚而所施者不能及逺如雲雖密而不能致雨徒起自西郊而已故有密雲不雨自我西郊之象焉按雲能致雨今乃密雲不雨者何耶蓋東北陽方西南隂方陽唱隂和隂唱故陽不和而不能成雨也是密雲不雨以其起自西郊耳彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也此彖傳是釋小畜彖辭以眀畜而得亨之道且以勉君子向往之功也柔得位指六居四上下謂五陽尚往言畜之未極其氣猶上進也孔子釋小畜彖辭曰卦名小畜者蓋以卦體六四柔得位而上下應之上下五陽皆為六四一隂所畜是一小人處髙位而衆君子為其所牽制有以小畜大之義故為小畜夫陽為隂所畜宜不得亨而卦辭繫曰亨者何哉蓋以卦德內健外巽是其立心則有不屈之操處事復有善入之道其才可以有為卦體二五皆陽是乾二之陽用事於下而巽五之陽用事於上則其勢又得以有為此所以不為其所畜而猶可以亨也又云密雲不雨者何哉蓋君子以澤及天下為心若所積未厚正當懋其進修之力奮其向往之功今則畜未極而尚往也自我西郊者正言德未能以逺及無以兼濟萬物潤澤生民施未行於天下也按自乾坤而下屯蒙需訟師比皆三男陽卦用事至此方見巽之一隂用事而以小畜名焉聖人於陽既幸其志行復期其尚往總不欲隂勝乎陽也如此象曰風行天上小畜君子以懿文德此象傳是言君子當盡威儀文辭之美也懿美也文德謂德之發見於外者孔子釋小畜象曰風行天上但有氣而無質能畜物而不能久畜小畜之象也君子當小畜之時不能厚積而逺施而德之發見於外者則不可以不修飾而致謹之故於威儀則致其美而為君子之容於文辭則致其美而為君子之辭使一身之章觀聽之美無不歸於盡善焉蓋細行不矜終纍大德皆君子之所戒也由是養盛而為大畜則所施自不止於淑其身矣夫君子之文德所以修身者在是所以御物者亦在是故小畜之懿德與大畜之蓄德雖有功力之殊原無精粗之别是以君子尤不可不致謹於斯也初九復自道何其咎吉象曰復自道其義吉也此一爻是言能以正道自守而無枉已徇人之失也復者上進之意復自道言以自己道義為復也周公繫小畜初爻曰初九體乾居下得正前逺於隂雖與四為正應而能自守以正不為小人所畜夫陽本在上之物今不為小人所畜而得居所當居之位有進復自道之象如是則既無枉道之失而復有正人之功自不至於有咎而吉矣孔子釋初象曰枉己者不能以正人今初九進復自道則進必以正不為隂邪所制上足以正君而下足以正民以義揆之當得吉也蓋君子未嘗不欲進而特惡進非其道初之復能以道自勝而不失足於小人則大節挺然邪自不得而凂之矣此正色獨立之士國家禱祀而求之者實以其足為朝廷重歟九二牽復吉象曰牽復在中亦不自失也此一爻是言同德竝進而不為小人所畜也牽連也周公繫小畜二爻曰九二亦欲上進而漸近於隂似若為隂所畜者以二有剛中之德則亦能以正自守而與初九之剛正者同德而升不為隂所係畜有牽復之象則正氣伸而道可行故吉也孔子釋二象曰九二與初九牽復者豈無德而能復乎蓋人無自守之德鮮有不自失者今九二有剛中之德自能與初九之剛志合道同其牽而復也亦不至於自失矣按君子小人不容竝立然君子之類常孤小人之黨常衆故君子必剛正自守援同德以俱升乃不為小人所制此九二所以貴牽復也不然小人衆而君子孤漫然以進而不受其害者鮮矣九三輿說輻夫妻反目象曰夫妻反目不能正室也此一爻是言不能進復自道始為小人所制而終與之爭也輿說輻謂車說其輻而不能進也夫妻三陽與四隂之象周公繫小畜三爻曰九三欲進之心雖與初二同然剛而不中迫近於四不中則無靜守之節近四則有易昵之私是援結小人以進卒為所制而不得進如輿之說輻然乃三之志剛不安受其制始則隂陽相恱有如夫婦究之心不能平而與之爭為夫妻反目之象孔子釋三象曰夫妻反目豈皆妻之過哉夫為婦倡未有夫不失道而妻能制之者也由九三剛而不中自處不以其道則說輻反目乃三自為之耳於四何尤乎按初與二皆能復獨三畜於四而不復者與四相比而恱也使陽不失道則隂豈能畜之哉是可為失身於小人者之大戒也六四有孚血去惕出無咎象曰有孚惕出上合志也此一爻是言六四能以孚誠獲上而得免於咎也血去謂免於傷害惕出謂免於憂懼上謂五上二陽周公繫小畜四爻曰六四以一隂畜衆陽勢不相敵本不免於傷害憂懼者幸其柔順得正虛中巽體為能取信於上一誠所感二陽亦相信而助之故外之得以安其身而免於傷害內之得以安其心而免於憂懼為有孚血去惕出之象如是則可藉二陽之力以成其畜之功而無咎矣孔子釋四象曰四之血去惕出雖賴二陽之力然豈無自而得二陽之助乎以四能有孚固結於上而上二陽與之合志故得免於憂患也按六四一爻為畜衆陽之主然以隂柔力弱而又與五上二爻同為巽體故必借助於二陽共成其畜之道聖人以有孚戒之欲其反而自求必誠信在中足以感孚乎人而後可免意外之災懼其辭蓋深切矣九五有孚攣如富以其鄰象曰有孚攣如不獨富也此一爻是言五合上下之力以畜乾也攣如固結之意富謂富厚之力以謂能左右之也周公繫小畜五爻曰三陽上進其勢正盛畜之為難九五巽體居中而有孚處尊而富厚是其孚誠既足以感人使上下相為維繫且身處尊位而富厚之力又足以屈羣力而為我用蓋四與上在五左右有鄰之象而五之力為能左右之以行己意也心同而力復同何三陽之不為所畜哉孔子釋五象曰九五既有孚攣如是有孚乃感召之本則衆志之所以信從者莫非此孚誠為之也豈獨以其富厚之力使人乎此卦彖傳言以一隂畜五陽而爻辭則言在上之陽與隂合志朱熹本義因謂巽體三爻同力畜乾是下三爻主陽為隂畜而上三爻又主以上畜下之義也易理變動不居一爻各立一義如此若以全卦之理論則四為隂柔五當合諸陽之力以制之而乃以四同巽體受其籠絡與之合志非得處畜之正道者爻雖不言凶悔而亦無吉占則聖人言外之意亦可見矣上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也此一爻是言君子為小人所制因戒小人不當害正而君子亦當自防也既雨謂與隂相和既處謂與隂相止載滿也婦隂柔小人之象月隂類幾望己盛之象也疑窒礙而不通也周公繫小畜上爻曰上九雖陽爻而居巽體對下乾爻亦為隂類上九居畜之極是隂力已盛其力足以制陽而陽亦受制於隂陽不得不與之和是向之不雨者今隂陽和而既雨矣既與之和是隂能制陽陽至是而不得不止也所以然者以君子尊尚隂德至於積滿而然耳夫隂之常分本不可以加陽今乃以隂加陽如婦之抗夫雖或得正而亦不免於危厲在君子當隂未盛尚猶可往至隂盛如月之幾望則往必受小人之害而凶矣孔子釋上象曰陽與隂和而既雨既處者豈君子之得已哉由陽不能防之於始尊尚其德至於盈滿其勢不得不與之和也當此時而征則凶者隂盛抗陽動輒得咎自然窒礙而難行矣君子至此豈可以妄行哉按隂雖極盛不得有加於陽陽不失道豈為隂制乃以隂畜陽畜極而隂陽俱為不利則隂亦何利於畜陽哉細玩上九爻辭固為君子戒亦深為小人戒矣日講易經解義卷三
